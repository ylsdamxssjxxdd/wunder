  <script id="docs-page-data" type="application/json">{"slug":"en/start/server","language":"en","title":"Server Deployment","summary":"The choice for teams and organizations. Multi-user, permission management, channel integration, unified governance.","updated_at":"2026-04-10","read_when":["You need multiple people sharing wunder","You need an admin backend and unified management"],"source_docs":["docs/API文档.md"],"tab":"Getting Started","group":"Onboarding","group_path":["Onboarding"],"url":"/docs/en/start/server/","headings":[{"id":"section-1","level":1,"text":"Server Deployment"},{"id":"section-2","level":2,"text":"When to Choose Server"},{"id":"section-3","level":2,"text":"Prerequisites"},{"id":"section-4","level":2,"text":"3 Steps to Deploy"},{"id":"section-5","level":3,"text":"1. Get the Code"},{"id":"section-6","level":3,"text":"2. Start the Service"},{"id":"section-7","level":3,"text":"3. Access the System"},{"id":"section-8","level":2,"text":"Post-Deployment Checklist"},{"id":"section-9","level":2,"text":"Core Capabilities"},{"id":"section-10","level":3,"text":"Multi-tenancy"},{"id":"section-11","level":3,"text":"Channel Integration"},{"id":"section-12","level":3,"text":"Observability"},{"id":"section-13","level":3,"text":"Security"},{"id":"section-14","level":2,"text":"Configuration Files"},{"id":"section-15","level":2,"text":"Next Steps"}],"prev_slug":"en/start/desktop","next_slug":"en/start/cli","markdown":"# Server Deployment\n\nServer is the choice for teams and organizations. Multi-user collaboration, permission management, channel integration — all require deploying Server first.\n\n## When to Choose Server\n\n| Scenario | Choose Server |\n|----------|--------------|\n| Multiple people sharing one system | ✅ |\n| Need an admin backend | ✅ |\n| Need to connect Feishu, WeChat, etc. | ✅ |\n| Need unified governance and auditing | ✅ |\n| Just for personal use | ❌ Choose Desktop |\n\n## Prerequisites\n\n- Docker and Docker Compose (recommended)\n- At least 4GB available memory\n- PostgreSQL database (included automatically with Docker deployment)\n\n## 3 Steps to Deploy\n\n### 1. Get the Code\n\n```bash\ngit clone <repo-url>\ncd wunder\n```\n\n### 2. Start the Service\n\n```bash\n# x86 architecture\ndocker-compose -f docker-compose-x86.yml up -d\n\n# ARM architecture\ndocker-compose -f docker-compose-arm.yml up -d\n```\n\n### 3. Access the System\n\n- User frontend: http://localhost:18002\n- Admin & docs: http://localhost:18000\n- Default admin: admin / admin\n\n**Change the default password immediately after first login.**\n\n## Post-Deployment Checklist\n\n1. **Change default password**: The admin default password is not secure\n2. **Configure models**: Admin → Model Configuration → Add API Key\n3. **Create users**: Admin → User Management → Add users or enable registration\n4. **Check channels**: If you need external channels, configure credentials first\n\n## Core Capabilities\n\n### Multi-tenancy\n\n- Users and organizations managed in layers\n- Permissions assigned by role\n- Data isolation\n\n### Channel Integration\n\nSupported external channels:\n- Feishu (Lark)\n- WeCom / WeChat\n- QQ Bot\n- WhatsApp Cloud\n- XMPP\n\n### Observability\n\n- Service health monitoring\n- Performance metrics\n- Logs and auditing\n\n### Security\n\n- Token-based authentication\n- Sandbox isolation\n- Approval policies\n- Request limits\n\n## Configuration Files\n\nMain configuration files are in the `config/` directory:\n\n- Model configuration\n- Tool configuration\n- Channel configuration\n- Security policies\n\nChanges usually require a service restart.\n\n## Next Steps\n\n- [Admin Interface](/docs/en/surfaces/web-admin/)\n- [Authentication & Security](/docs/en/ops/auth-and-security/)\n- [Deployment & Operations](/docs/en/ops/deployment/)\n- [Configuration Reference](/docs/en/reference/config/)\n","source_path":"使用说明书/en/start/server.md"}</script>
