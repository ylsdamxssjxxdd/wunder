  <script id="docs-page-data" type="application/json">{"slug":"en/start/cli","language":"en","title":"CLI Usage","summary":"The entry point for developers and automation. Terminal-driven, scriptable, JSONL output.","updated_at":"2026-04-10","read_when":["You want to use wunder in the terminal","You want to integrate wunder into scripts or automation"],"source_docs":["wunder-cli/src/main.rs"],"tab":"Getting Started","group":"Onboarding","group_path":["Onboarding"],"url":"/docs/en/start/cli/","headings":[{"id":"section-1","level":1,"text":"CLI Usage"},{"id":"section-2","level":2,"text":"When to Choose CLI"},{"id":"section-3","level":2,"text":"Installation"},{"id":"section-4","level":2,"text":"First Session"},{"id":"section-5","level":2,"text":"Common Commands"},{"id":"section-6","level":2,"text":"TUI Interface"},{"id":"section-7","level":2,"text":"JSONL Output"},{"id":"section-8","level":2,"text":"Automation Scenarios"},{"id":"section-9","level":2,"text":"Next Steps"}],"prev_slug":"en/start/server","next_slug":"en/start/hubs","markdown":"# CLI Usage\n\nCLI is the entry point for developers and automation. Use it directly in the terminal — no GUI needed.\n\n## When to Choose CLI\n\n| Scenario | Choose CLI |\n|----------|-----------|\n| Prefer terminal operations | ✅ |\n| Need scripting and automation | ✅ |\n| Want to pipe output to other tools | ✅ |\n| Don't want to install Desktop | ✅ |\n| Need a graphical interface | ❌ Choose Desktop |\n\n## Installation\n\n```bash\n# Build (requires Rust toolchain)\ncargo build --release\n\n# Run\n./target/release/wunder-cli\n```\n\n## First Session\n\n```bash\nwunder-cli\n> Write a Hello World Python script\n```\n\nYou'll see: model thinks → calls tools → shows results → gives reply.\n\n## Common Commands\n\n| Command | Action |\n|---------|--------|\n| `/new` | Create new thread |\n| `/stop` | Stop current execution |\n| `/compact` | Compress current conversation |\n| `/fork` | Fork current thread |\n| `/resume` | Resume a previous thread |\n| `/help` | Show help |\n| `/quit` | Exit |\n\n## TUI Interface\n\nCLI includes a built-in TUI (Terminal User Interface), similar to Codex:\n\n- Top: Conversation area\n- Bottom: Input area\n- Side: Thread list\n\n## JSONL Output\n\nCLI supports JSONL format output for piping and automation:\n\n```bash\nwunder-cli --format jsonl\n```\n\nEach line is a JSON object with event type and content.\n\n## Automation Scenarios\n\nCLI is great for:\n\n- Calling agents in CI/CD pipelines\n- Batch processing tasks\n- Combining with other CLI tools\n- Scheduled task triggers\n\n## Next Steps\n\n- [Quick Start](/docs/en/start/quickstart/)\n- [Core Concepts](/docs/en/concepts/)\n- [Tools Overview](/docs/en/tools/)\n","source_path":"使用说明书/en/start/cli.md"}</script>
