  <script id="docs-page-data" type="application/json">{"slug":"en/surfaces/web-admin","language":"en","title":"Admin Interface","summary":"The admin's backend workbench. Model configuration, tool management, user governance, channel integration — all here.","updated_at":"2026-04-24","read_when":[],"source_docs":[],"tab":"Surfaces","group":"Frontend and Desktop","group_path":["Frontend and Desktop"],"url":"/docs/en/surfaces/web-admin/","headings":[{"id":"section-1","level":1,"text":"Admin Interface"},{"id":"section-2","level":2,"text":"When You Need the Admin Interface"},{"id":"section-3","level":2,"text":"Core Features"},{"id":"section-4","level":3,"text":"Model Configuration"},{"id":"section-5","level":3,"text":"Preset Agents"},{"id":"section-6","level":3,"text":"Tool Management"},{"id":"section-7","level":3,"text":"Users & Organizations"},{"id":"section-8","level":3,"text":"Channel Management"},{"id":"section-9","level":3,"text":"System Monitoring"},{"id":"section-10","level":2,"text":"Access"},{"id":"section-11","level":2,"text":"Further Reading"}],"prev_slug":"en/surfaces/orchestration","next_slug":"en/surfaces/desktop-ui","markdown":"# Admin Interface\n\nThe admin interface is the system administrator's backend workbench. Regular users don't see this interface.\n\n## When You Need the Admin Interface\n\n- Need to configure models and API Keys\n- Need to manage users, organizations, permissions\n- Need to connect external channels (Feishu, WeChat, etc.)\n- Need to manage tools and skills\n- Need to view system running status\n\n## Core Features\n\n### Model Configuration\n\n- Add, edit, delete models\n- Configure API Keys and endpoints\n- Test model connections\n- Set default models\n\n### Preset Agents\n\n- Manage preset agent cards\n- Configure avatar, name, description\n- Set model, tools, prompts\n- Manage built-in skills\n\n### Tool Management\n\n- View all available tools\n- Enable / disable tools\n- Manage skill files\n- Configure MCP / A2A services\n\n### Users & Organizations\n\n- User list and status management\n- Organization management\n- Permission and role assignment\n- Token management\n\n### Channel Management\n\n- Configure Feishu, WeCom, QQ, and other channels\n- Manage channel credentials\n- View channel running status\n\n### System Monitoring\n\n- Service health status\n- Performance metrics\n- Log viewing\n\n## Access\n\nThe admin interface is typically accessed via browser after Server deployment, default port 18000.\n\n## Further Reading\n\n- [Server Deployment](/docs/en/start/server/)\n- [Authentication & Security](/docs/en/ops/auth-and-security/)\n- [Configuration Reference](/docs/en/reference/config/)\n","source_path":"使用说明书/en/surfaces/web-admin.md"}</script>
