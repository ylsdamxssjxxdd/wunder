  <script id="docs-page-data" type="application/json">{"slug":"en/tools/skill-call","language":"en","title":"Skill Call","summary":"How `skill_call` returns the skill body, root directory, and file tree to the model.","updated_at":"2026-04-10","read_when":["You need to load a `SKILL.md` file and its directory context"],"source_docs":["src/services/tools.rs"],"tab":"Tools","group":"Files and Code","group_path":["Files and Code"],"url":"/docs/en/tools/skill-call/","headings":[{"id":"section-1","level":1,"text":"Skill Call"},{"id":"section-2","level":2,"text":"Minimum arguments"},{"id":"section-3","level":2,"text":"Success result"},{"id":"section-4","level":2,"text":"Key changes"},{"id":"section-5","level":2,"text":"Common failures"}],"prev_slug":"en/tools/lsp","next_slug":"en/tools/web-fetch","markdown":"# Skill Call\n\n`skill_call` does not execute a skill. It **loads the skill content into the current context** so the model can continue by following that skill's workflow.\n\n## Minimum arguments\n\n```json\n{\n  \"name\": \"openai-docs\"\n}\n```\n\n## Success result\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"skill_call\",\n  \"state\": \"completed\",\n  \"summary\": \"Loaded skill openai-docs.\",\n  \"data\": {\n    \"name\": \"openai-docs\",\n    \"description\": \"Use official OpenAI docs...\",\n    \"path\": \"C:/.../SKILL.md\",\n    \"root\": \"C:/.../openai-docs\",\n    \"content\": \"# SKILL ... {{SKILL_ROOT}} ...\",\n    \"tree\": [\n      \"SKILL.md\",\n      \"references/\",\n      \"scripts/\"\n    ]\n  }\n}\n```\n\n## Key changes\n\n- `content` is rendered in a form that is easier for the model to read\n- `root` explicitly returns the skill root directory\n- `{{SKILL_ROOT}}` can be used as a placeholder inside the content\n- `tree` tells the model what additional files exist under the skill directory\n\n## Common failures\n\n- the skill name is empty\n- the skill does not exist\n- the skill name is ambiguous\n- the skill file could not be read\n\nThese failures are usually returned as ordinary direct errors. This is not a complex asynchronous tool.\n","source_path":"使用说明书/en/tools/skill-call.md"}</script>
