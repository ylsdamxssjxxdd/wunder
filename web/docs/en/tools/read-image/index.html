  <script id="docs-page-data" type="application/json">{"slug":"en/tools/read-image","language":"en","title":"Read Image","summary":"The purpose and return structure of `read_image`.","updated_at":"2026-04-10","read_when":["You need to send a local image into the current model context"],"source_docs":["src/services/tools/read_image_tool.rs"],"tab":"Tools","group":"Files and Code","group_path":["Files and Code"],"url":"/docs/en/tools/read-image/","headings":[{"id":"section-1","level":1,"text":"Read Image"},{"id":"section-2","level":2,"text":"Minimum arguments"},{"id":"section-3","level":2,"text":"Success result"},{"id":"section-4","level":2,"text":"Key point"}],"prev_slug":"en/tools/apply-patch","next_slug":"en/tools/lsp","markdown":"# Read Image\n\n`read_image` prepares local visual media and prompts the system to append the derived visual context into the upcoming conversation as an additional message.\n\nIt now supports:\n\n- static images\n- animated GIFs\n- local videos\n\n## Minimum arguments\n\n```json\n{\n  \"path\": \"screenshots/demo.png\"\n}\n```\n\nGIF example:\n\n```json\n{\n  \"path\": \"captures/demo.gif\",\n  \"frame_step\": 2\n}\n```\n\nVideo example:\n\n```json\n{\n  \"path\": \"captures/demo.mp4\",\n  \"frame_rate\": 1\n}\n```\n\n## Success result\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"read_image\",\n  \"state\": \"completed\",\n  \"summary\": \"Prepared visual media screenshots/demo.png for model inspection.\",\n  \"data\": {\n    \"path\": \"screenshots/demo.png\",\n    \"resolved_path\": \"C:/.../screenshots/demo.png\",\n    \"media_kind\": \"image\",\n    \"size_bytes\": 182233,\n    \"prompt\": \"Inspect the attached image carefully...\",\n    \"result\": {\n      \"kind\": \"image\"\n    }\n  }\n}\n```\n\n## Key point\n\n- Static images are forwarded as image input.\n- GIFs are normalized before entering the model context.\n  Default behavior is first frame only.\n  Set `frame_step` to sample frames by interval.\n- Videos are normalized into image frames and optional audio transcript context.\n- The tool result itself is not the analysis conclusion. It only means the visual media has been prepared for inspection.\n","source_path":"使用说明书/en/tools/read-image.md"}</script>
