  <script id="docs-page-data" type="application/json">{"slug":"en/tools/ptc","language":"en","title":"ptc","summary":"The current behavior and return structure of the temporary Python script execution tool.","updated_at":"2026-04-10","read_when":["You need a complete Python snippet to finish a local task"],"source_docs":["src/services/tools.rs","src/services/tools/catalog.rs"],"tab":"Tools","group":"Files and Code","group_path":["Files and Code"],"url":"/docs/en/tools/ptc/","headings":[{"id":"section-1","level":1,"text":"ptc"},{"id":"section-2","level":2,"text":"Minimum arguments"},{"id":"section-3","level":2,"text":"Success result"},{"id":"section-4","level":2,"text":"Failure results"},{"id":"section-5","level":2,"text":"Usage boundary"}],"prev_slug":"en/tools/exec","next_slug":"en/tools/apply-patch","markdown":"# ptc\n\n`ptc` stands for programmatic tool call. Its job is to:\n\n- write a complete Python script into a temporary file\n- run it under the specified `workdir`\n- return `stdout`, `stderr`, and `returncode`\n\nIt is not a generic replacement for shell execution. For ordinary command-line work, prefer [Execute Command](/docs/en/tools/exec/).\n\n## Minimum arguments\n\n```json\n{\n  \"filename\": \"helper.py\",\n  \"content\": \"print('hello')\"\n}\n```\n\n## Success result\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"ptc\",\n  \"state\": \"completed\",\n  \"summary\": \"Executed Python script C:/.../ptc_temp/helper.py.\",\n  \"data\": {\n    \"path\": \"ptc_temp/helper.py\",\n    \"workdir\": \".\",\n    \"returncode\": 0,\n    \"stdout\": \"hello\\n\",\n    \"stderr\": \"\"\n  }\n}\n```\n\n## Failure results\n\nCommon error codes:\n\n- `TOOL_PTC_INVALID_FILENAME`\n- `TOOL_PTC_CONTENT_REQUIRED`\n- `TOOL_PTC_EXEC_ERROR`\n- `TOOL_PTC_TIMEOUT`\n- `TOOL_PTC_EXEC_FAILED`\n\nOn failure, `data` usually still preserves:\n\n- `path`\n- `workdir`\n- `returncode`\n- `stdout`\n- `stderr`\n\n## Usage boundary\n\nGood fit:\n\n- temporary data processing\n- small Python parsers\n- a few steps of Python logic that are not worth turning into a durable project file\n\nPoor fit:\n\n- multi-command shell workflows\n- persistent script projects\n- complex build pipelines\n\nFor those cases, [Execute Command](/docs/en/tools/exec/) is a better fit.\n","source_path":"使用说明书/en/tools/ptc.md"}</script>
