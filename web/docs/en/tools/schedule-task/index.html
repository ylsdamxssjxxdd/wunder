  <script id="docs-page-data" type="application/json">{"slug":"en/tools/schedule-task","language":"en","title":"Schedule Task","summary":"The flat input style, scheduling actions, and compact return shape of `schedule_task`.","updated_at":"2026-04-10","read_when":["You need to create, update, inspect, or trigger scheduled jobs"],"source_docs":["src/services/tools/dispatch.rs","src/services/cron.rs"],"tab":"Tools","group":"UI and Automation","group_path":["UI and Automation"],"url":"/docs/en/tools/schedule-task/","headings":[{"id":"section-1","level":1,"text":"Schedule Task"},{"id":"section-2","level":2,"text":"Supported actions"},{"id":"section-3","level":2,"text":"Recommended input style"},{"id":"section-4","level":2,"text":"Success results"},{"id":"section-5","level":3,"text":"status"},{"id":"section-6","level":3,"text":"add, update, and get"},{"id":"section-7","level":3,"text":"list"},{"id":"section-8","level":2,"text":"Key points"}],"prev_slug":"en/tools/panels-and-a2ui","next_slug":"en/tools/final-response","markdown":"# Schedule Task\n\n`schedule_task` is a clear exception in the current tool system:\n\n- the input side supports model-friendly flat fields\n- the success side returns compact scheduling objects\n- **it does not use the unified success envelope**\n\n## Supported actions\n\n- `add`\n- `update`\n- `remove`\n- `enable`\n- `disable`\n- `get`\n- `list`\n- `run`\n- `status`\n\n## Recommended input style\n\nPrefer flat fields first:\n\n```json\n{\n  \"action\": \"add\",\n  \"job_id\": \"job_daily_report\",\n  \"name\": \"Daily report reminder\",\n  \"schedule_text\": \"every 5 minutes\",\n  \"message\": \"Please generate the daily report\",\n  \"session\": \"main\",\n  \"enabled\": true\n}\n```\n\nOnly use the nested `schedule` object when you need exact control:\n\n```json\n{\n  \"action\": \"add\",\n  \"job_id\": \"job_cron_demo\",\n  \"schedule\": {\n    \"kind\": \"cron\",\n    \"cron\": \"*/5 * * * *\",\n    \"tz\": \"Asia/Shanghai\"\n  },\n  \"message\": \"Run the inspection\"\n}\n```\n\n## Success results\n\n### `status`\n\n```json\n{\n  \"action\": \"status\",\n  \"scheduler\": {\n    \"enabled\": true,\n    \"poll_interval_ms\": 1000,\n    \"running_jobs\": 1,\n    \"next_run_at\": 1760000000,\n    \"next_run_at_text\": \"2026-04-10T10:00:00+08:00\"\n  },\n  \"user_jobs\": {\n    \"total\": 3,\n    \"enabled\": 2,\n    \"running\": 1,\n    \"next_run_at\": 1760000000,\n    \"next_run_at_text\": \"2026-04-10T10:00:00+08:00\"\n  }\n}\n```\n\n### `add`, `update`, and `get`\n\n```json\n{\n  \"action\": \"add\",\n  \"job\": {\n    \"job_id\": \"job_daily_report\",\n    \"name\": \"Daily report reminder\",\n    \"enabled\": true,\n    \"schedule\": {\n      \"kind\": \"every\",\n      \"every_ms\": 300000\n    },\n    \"next_run_at\": 1760000000,\n    \"next_run_at_text\": \"2026-04-10T10:00:00+08:00\",\n    \"last_run_at\": null,\n    \"last_status\": null\n  },\n  \"deduped\": false\n}\n```\n\n### `list`\n\n```json\n{\n  \"action\": \"list\",\n  \"jobs\": [\n    {\n      \"job_id\": \"job_daily_report\",\n      \"name\": \"Daily report reminder\",\n      \"enabled\": true,\n      \"schedule\": { \"kind\": \"every\", \"every_ms\": 300000 },\n      \"next_run_at\": \"2026-04-10T10:00:00+08:00\",\n      \"last_run_at\": null\n    }\n  ]\n}\n```\n\n## Key points\n\n- This is one of the few tools that still does not use `ok/action/state/summary/data`\n- Prefer flat input fields when the model writes arguments\n- The most important result fields are `job`, `jobs`, `scheduler`, and `user_jobs`\n","source_path":"使用说明书/en/tools/schedule-task.md"}</script>
