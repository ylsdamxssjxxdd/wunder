  <script id="docs-page-data" type="application/json">{"slug":"en/tools/subagent-control","language":"en","title":"Subagent Control","summary":"The actions, waiting semantics, state semantics, and return structure of `subagent_control`.","updated_at":"2026-04-10","read_when":["You need to spawn temporary child agents inside the current session"],"source_docs":["src/services/tools/subagent_control.rs"],"tab":"Tools","group":"Sessions and Collaboration","group_path":["Sessions and Collaboration"],"url":"/docs/en/tools/subagent-control/","headings":[{"id":"section-1","level":1,"text":"Subagent Control"},{"id":"section-2","level":2,"text":"When it fits"},{"id":"section-3","level":2,"text":"Main actions"},{"id":"section-4","level":2,"text":"spawn"},{"id":"section-5","level":2,"text":"list"},{"id":"section-6","level":2,"text":"history"},{"id":"section-7","level":2,"text":"status and wait"},{"id":"section-8","level":3,"text":"status"},{"id":"section-9","level":3,"text":"wait"},{"id":"section-10","level":2,"text":"interrupt, close, and resume"},{"id":"section-11","level":2,"text":"Key interpretation"}],"prev_slug":"en/tools/thread-control","next_slug":"en/tools/agent-swarm","markdown":"# Subagent Control\n\n`subagent_control` is now a clear multi-action tool rather than the older simple \"spawn a child thread\" interface.\n\n## When it fits\n\nGood fit:\n\n- temporarily spawning child agents inside the current main-agent session\n- inspecting, waiting for, interrupting, closing, or resuming those child runs\n- performing one or more rounds of delegated collaboration\n\nNot a fit:\n\n- dispatching other formal agents that already belong to the user  \nThat belongs to [Agent Swarm](/docs/en/tools/agent-swarm/)\n\n## Main actions\n\n- `list`\n- `history`\n- `send`\n- `spawn`\n- `batch_spawn`\n- `status`\n- `wait`\n- `interrupt`\n- `close`\n- `resume`\n\n## `spawn`\n\nThis action starts a new child-agent run.\n\nA typical result is \"accepted but not finished\":\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"spawn\",\n  \"state\": \"accepted\",\n  \"summary\": \"Spawned child run ...\",\n  \"data\": {\n    \"run_id\": \"run_xxx\",\n    \"session_id\": \"sess_xxx\",\n    \"status\": \"accepted\"\n  },\n  \"next_step_hint\": \"Use subagent_control.wait/status/history before treating unfinished child runs as complete.\"\n}\n```\n\n## `list`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"list\",\n  \"state\": \"completed\",\n  \"summary\": \"Found 3 child sessions.\",\n  \"data\": {\n    \"total\": 3,\n    \"items\": [\n      {\n        \"dispatch_id\": \"dispatch_xxx\",\n        \"run_id\": \"run_xxx\",\n        \"session_id\": \"sess_xxx\",\n        \"status\": \"running\",\n        \"terminal\": false,\n        \"failed\": false,\n        \"agent_id\": \"worker-a\",\n        \"label\": \"Research materials\",\n        \"elapsed_s\": 12.3,\n        \"result_preview\": null,\n        \"error\": null\n      }\n    ]\n  }\n}\n```\n\n## `history`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"history\",\n  \"state\": \"completed\",\n  \"summary\": \"Loaded 18 messages from child session history.\",\n  \"data\": {\n    \"session_id\": \"sess_xxx\",\n    \"messages\": [ ... ]\n  }\n}\n```\n\n## `status` and `wait`\n\nThese are the two most important actions.\n\n### `status`\n\nSnapshot only, without blocking:\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"status\",\n  \"state\": \"running\",\n  \"summary\": \"1 child runs are still active.\",\n  \"data\": {\n    \"status\": \"running\",\n    \"items\": [ ... ],\n    \"selected_items\": [ ... ]\n  }\n}\n```\n\n### `wait`\n\nThis action polls and waits. Depending on what happens, `state` may become:\n\n- `completed`\n- `running`\n- `timeout`\n- `partial`\n\nIt often includes:\n\n```json\n{\n  \"next_step_hint\": \"Use subagent_control.wait/status/history before treating unfinished child runs as complete.\"\n}\n```\n\n## `interrupt`, `close`, and `resume`\n\nThese actions focus on which child sessions were updated:\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"interrupt\",\n  \"state\": \"completed\",\n  \"summary\": \"interrupt updated 1 child sessions.\",\n  \"data\": {\n    \"updated_total\": 1,\n    \"items\": [\n      {\n        \"session_id\": \"sess_xxx\",\n        \"status\": \"cancelling\"\n      }\n    ]\n  }\n}\n```\n\n## Key interpretation\n\n- `accepted` does not mean completed\n- `status` is for snapshots\n- `wait` is for convergence\n- if `next_step_hint` exists, the system is explicitly telling you to follow up rather than wrap up\n","source_path":"使用说明书/en/tools/subagent-control.md"}</script>
