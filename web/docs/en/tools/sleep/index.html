  <script id="docs-page-data" type="application/json">{"slug":"en/tools/sleep","language":"en","title":"Sleep and Yield","summary":"The semantic difference between `sleep` and `sessions_yield`.","updated_at":"2026-04-10","read_when":["You need to wait for a while, or temporarily yield control of the current turn"],"source_docs":["src/services/tools/sleep_tool.rs","src/services/tools/sessions_yield_tool.rs"],"tab":"Tools","group":"UI and Automation","group_path":["UI and Automation"],"url":"/docs/en/tools/sleep/","headings":[{"id":"section-1","level":1,"text":"Sleep and Yield"},{"id":"section-2","level":2,"text":"sleep"},{"id":"section-3","level":3,"text":"Minimum arguments"},{"id":"section-4","level":3,"text":"Success result"},{"id":"section-5","level":2,"text":"sessionsyield"},{"id":"section-6","level":3,"text":"Minimum arguments"},{"id":"section-7","level":3,"text":"Success result"},{"id":"section-8","level":2,"text":"How to choose"}],"prev_slug":"en/tools/final-response","next_slug":"en/tools/thread-control","markdown":"# Sleep and Yield\n\nThis page covers two different tools:\n\n- `sleep`\n- `sessions_yield`\n\nDo not mix them up.\n\n## `sleep`\n\n### Minimum arguments\n\n```json\n{\n  \"seconds\": 1.5\n}\n```\n\n### Success result\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"sleep\",\n  \"state\": \"completed\",\n  \"summary\": \"Slept for 1.5 seconds.\",\n  \"data\": {\n    \"requested_seconds\": 1.5,\n    \"elapsed_ms\": 1502,\n    \"reason\": null\n  }\n}\n```\n\nIt means: **the current turn actually blocked and waited for a period of time.**\n\n## `sessions_yield`\n\n### Minimum arguments\n\n```json\n{\n  \"message\": \"The task was submitted and is waiting for an external result\"\n}\n```\n\n### Success result\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"sessions_yield\",\n  \"state\": \"yielded\",\n  \"summary\": \"Yielded the current turn and is waiting.\",\n  \"data\": {\n    \"status\": \"yielded\",\n    \"message\": \"The task was submitted and is waiting for an external result\"\n  },\n  \"meta\": {\n    \"turn_control\": {\n      \"kind\": \"yield\",\n      \"message\": \"The task was submitted and is waiting for an external result\"\n    }\n  }\n}\n```\n\nIt means: **the current turn yielded control and did not produce a final reply.**\n\n## How to choose\n\n- For a simple polling delay, use `sleep`\n- If you need to tell the system \"stop this turn here for now,\" use `sessions_yield`\n","source_path":"使用说明书/en/tools/sleep.md"}</script>
