  <script id="docs-page-data" type="application/json">{"slug":"en/tools/self-status","language":"en","title":"Self Status","summary":"`self_status` is used to inspect the current session, model, events, and thread runtime state.","updated_at":"2026-04-10","read_when":["You need to understand exactly where the current session is in its execution flow"],"source_docs":["src/services/tools/self_status_tool.rs"],"tab":"Tools","group":"Sessions and Collaboration","group_path":["Sessions and Collaboration"],"url":"/docs/en/tools/self-status/","headings":[{"id":"section-1","level":1,"text":"Self Status"},{"id":"section-2","level":2,"text":"Minimum arguments"},{"id":"section-3","level":2,"text":"Common arguments"},{"id":"section-4","level":2,"text":"Return structure"},{"id":"section-5","level":2,"text":"Key points"}],"prev_slug":"en/tools/channel","next_slug":"en/tools/user-world","markdown":"# Self Status\n\n`self_status` is a diagnostic tool.  \nUnlike most tools, it returns a raw status object on success rather than the unified `ok/action/state/summary/data` envelope.\n\n## Minimum arguments\n\n```json\n{\n  \"detail_level\": \"standard\"\n}\n```\n\n## Common arguments\n\n- `detail_level`: `basic`, `standard`, or `full`\n- `include_events`\n- `events_limit`\n- `include_system_metrics`\n\n## Return structure\n\n```json\n{\n  \"tool\": \"self_status\",\n  \"detail_level\": \"standard\",\n  \"session\": {\n    \"user_id\": \"user_xxx\",\n    \"session_id\": \"sess_xxx\",\n    \"workspace_id\": \"user_xxx\",\n    \"agent_id\": \"agent_docs\",\n    \"is_admin\": false\n  },\n  \"model\": {\n    \"active\": { ... },\n    \"configured_default\": { ... }\n  },\n  \"context\": {\n    \"context_occupancy_tokens\": 12345,\n    \"context_overflow\": false,\n    \"monitor_context_tokens\": 12000,\n    \"monitor_context_tokens_peak\": 18000\n  },\n  \"monitor\": {\n    \"status\": \"running\",\n    \"stage\": \"tool_call\",\n    \"summary\": \"Waiting for a subagent result\",\n    \"updated_time\": 1760000000\n  },\n  \"thread\": { ... },\n  \"rounds\": {\n    \"user_rounds\": 3,\n    \"model_rounds_peak\": 12,\n    \"event_user_round_peak\": 3\n  },\n  \"events\": {\n    \"total\": 48,\n    \"last_event_id\": 128,\n    \"counts\": {\n      \"llm_request\": 5,\n      \"tool_call\": 12,\n      \"tool_result\": 12,\n      \"approval_request\": 0,\n      \"approval_resolved\": 0\n    },\n    \"by_type\": { ... },\n    \"recent_limit\": 20,\n    \"recent\": [ ... ]\n  },\n  \"system_metrics\": { ... }\n}\n```\n\n## Key points\n\n- `detail_level=full` usually includes more events and system metrics\n- `events.recent` is the fastest way to see what happened most recently\n- `thread` and `monitor` are the most useful sections when you need to know whether the current thread is still running and which stage it is stuck in\n","source_path":"使用说明书/en/tools/self-status.md"}</script>
