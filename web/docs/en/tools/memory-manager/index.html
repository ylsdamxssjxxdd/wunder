  <script id="docs-page-data" type="application/json">{"slug":"en/tools/memory-manager","language":"en","title":"Memory Manager","summary":"The actions, memory scopes, and return structure of `memory_manager`.","updated_at":"2026-04-10","read_when":["You need to add, remove, update, list, or recall long-term memory entries"],"source_docs":["src/services/tools/memory_manager_tool.rs"],"tab":"Tools","group":"Sessions and Collaboration","group_path":["Sessions and Collaboration"],"url":"/docs/en/tools/memory-manager/","headings":[{"id":"section-1","level":1,"text":"Memory Manager"},{"id":"section-2","level":2,"text":"list"},{"id":"section-3","level":2,"text":"add"},{"id":"section-4","level":2,"text":"recall"},{"id":"section-5","level":2,"text":"Key points"}],"prev_slug":"en/tools/agent-swarm","next_slug":"en/tools/channel","markdown":"# Memory Manager\n\n`memory_manager` now fully uses the standard success envelope.  \nIts main actions are:\n\n- `list`\n- `recall`\n- `add`\n- `update`\n- `delete`\n- `clear`\n\n## `list`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"list\",\n  \"state\": \"completed\",\n  \"summary\": \"Listed 3 memory entries.\",\n  \"data\": {\n    \"count\": 3,\n    \"items\": [\n      {\n        \"memory_id\": \"mem_xxx\",\n        \"title\": \"User preference\",\n        \"summary\": \"Prefers concise answers\",\n        \"content\": \"The user prefers concise answers\",\n        \"category\": \"tool-note\",\n        \"tags\": [\"preference\"],\n        \"status\": \"active\",\n        \"updated_at\": 1760000000\n      }\n    ],\n    \"agent_id\": \"agent_docs\"\n  }\n}\n```\n\n## `add`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"add\",\n  \"state\": \"completed\",\n  \"summary\": \"Saved a memory entry.\",\n  \"data\": {\n    \"memory_id\": \"mem_xxx\",\n    \"saved\": true,\n    \"agent_id\": \"agent_docs\"\n  },\n  \"next_step_hint\": \"...\"\n}\n```\n\n## `recall`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"recall\",\n  \"state\": \"completed\",\n  \"summary\": \"Recalled 2 memory entries.\",\n  \"data\": {\n    \"query\": \"user preference\",\n    \"count\": 2,\n    \"items\": [\n      {\n        \"memory_id\": \"mem_xxx\",\n        \"title\": \"User preference\",\n        \"summary\": \"Prefers concise answers\",\n        \"content\": \"The user prefers concise answers\",\n        \"category\": \"tool-note\",\n        \"tags\": [\"preference\"],\n        \"status\": \"active\",\n        \"updated_at\": 1760000000,\n        \"why\": \"matched user preference; in title/summary\"\n      }\n    ],\n    \"agent_id\": \"agent_docs\"\n  }\n}\n```\n\n## Key points\n\n- `agent_id` is injected directly into `data`\n- `recall` is primarily for bringing relevant memory into the current context\n- some successful calls include `next_step_hint`, often to remind you that the effect only applies to new sessions or only changes recall semantics for the current session\n","source_path":"使用说明书/en/tools/memory-manager.md"}</script>
