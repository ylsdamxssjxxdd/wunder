  <script id="docs-page-data" type="application/json">{"slug":"en/tools/node-invoke","language":"en","title":"Node Invoke","summary":"Gateway node listing and command invocation.","updated_at":"2026-04-10","read_when":["You need to list available nodes or send a command to a specific node"],"source_docs":["src/services/tools.rs"],"tab":"Tools","group":"System Bridges","group_path":["System Bridges"],"url":"/docs/en/tools/node-invoke/","headings":[{"id":"section-1","level":1,"text":"Node Invoke"},{"id":"section-2","level":2,"text":"list"},{"id":"section-3","level":2,"text":"invoke"},{"id":"section-4","level":2,"text":"Key points"}],"prev_slug":"en/tools/a2a-tools","next_slug":"en/integration/index","markdown":"# Node Invoke\n\n`node_invoke` mainly exposes two actions:\n\n- `list`\n- `invoke`\n\n## `list`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"list\",\n  \"state\": \"completed\",\n  \"summary\": \"Listed 6 gateway nodes.\",\n  \"data\": {\n    \"state_version\": 42,\n    \"count\": 6,\n    \"nodes\": [ ... ]\n  }\n}\n```\n\n## `invoke`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"invoke\",\n  \"state\": \"completed\",\n  \"summary\": \"Invoked command ping on node node_a.\",\n  \"data\": {\n    \"node_id\": \"node_a\",\n    \"command\": \"ping\",\n    \"result\": { ... }\n  }\n}\n```\n\n## Key points\n\n- Call `list` before `invoke`\n- The real command output lives in `data.result`\n","source_path":"使用说明书/en/tools/node-invoke.md"}</script>
