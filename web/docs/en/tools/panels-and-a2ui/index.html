  <script id="docs-page-data" type="application/json">{"slug":"en/tools/panels-and-a2ui","language":"en","title":"Panels and a2ui","summary":"The semantics and return structures of `a2ui`, `plan_update`, and `question_panel`.","updated_at":"2026-04-10","read_when":["You need to update the frontend plan panel, open a question panel, or send structured UI instructions"],"source_docs":["src/services/tools.rs","src/services/tools/catalog.rs"],"tab":"Tools","group":"UI and Automation","group_path":["UI and Automation"],"url":"/docs/en/tools/panels-and-a2ui/","headings":[{"id":"section-1","level":1,"text":"Panels and a2ui"},{"id":"section-2","level":2,"text":"a2ui"},{"id":"section-3","level":2,"text":"planupdate"},{"id":"section-4","level":3,"text":"Minimum arguments"},{"id":"section-5","level":3,"text":"Success result"},{"id":"section-6","level":2,"text":"questionpanel"},{"id":"section-7","level":3,"text":"Minimum arguments"},{"id":"section-8","level":3,"text":"Success result"},{"id":"section-9","level":2,"text":"Key points"}],"prev_slug":"en/tools/desktop-control","next_slug":"en/tools/schedule-task","markdown":"# Panels and a2ui\n\nThere are three things on this page:\n\n- `a2ui`\n- `plan_update`\n- `question_panel`\n\n`a2ui` is an exception in the return format. The other two already use the unified success envelope.\n\n## `a2ui`\n\nThis tool sends structured UI instructions directly to the frontend, so its return shape stays very thin:\n\n```json\n{\n  \"uid\": \"surface_xxx\",\n  \"a2ui\": [\n    {\n      \"beginRendering\": {}\n    }\n  ],\n  \"content\": \"optional text\"\n}\n```\n\nRecommended message shapes:\n\n- `beginRendering`\n- `surfaceUpdate`\n- `dataModelUpdate`\n- `deleteSurface`\n\n## `plan_update`\n\n### Minimum arguments\n\n```json\n{\n  \"plan\": [\n    { \"step\": \"Analyze the code\", \"status\": \"completed\" },\n    { \"step\": \"Update the docs\", \"status\": \"in_progress\" }\n  ]\n}\n```\n\n### Success result\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"plan_update\",\n  \"state\": \"completed\",\n  \"summary\": \"Updated the execution plan.\",\n  \"data\": {\n    \"status\": \"ok\"\n  }\n}\n```\n\n## `question_panel`\n\n### Minimum arguments\n\n```json\n{\n  \"question\": \"Choose how to proceed\",\n  \"routes\": [\n    {\n      \"label\": \"Conservative fix\",\n      \"description\": \"Start with the smallest safe repair\",\n      \"recommended\": true\n    }\n  ],\n  \"multiple\": false\n}\n```\n\n### Success result\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"question_panel\",\n  \"state\": \"awaiting_input\",\n  \"summary\": \"Opened a question panel and is waiting for user input.\",\n  \"data\": {\n    \"question\": \"Choose how to proceed\",\n    \"routes\": [\n      {\n        \"label\": \"Conservative fix\",\n        \"description\": \"Start with the smallest safe repair\",\n        \"recommended\": true\n      }\n    ],\n    \"multiple\": false\n  }\n}\n```\n\n## Key points\n\n- `plan_update` only updates the display. It is not a task executor.\n- `question_panel` succeeding does not mean the task is done. It only means the system entered `awaiting_input`.\n- `a2ui` is the lower-level option and should be used when you already know the exact frontend structure to send\n","source_path":"使用说明书/en/tools/panels-and-a2ui.md"}</script>
