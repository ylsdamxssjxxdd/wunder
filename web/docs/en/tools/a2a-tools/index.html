  <script id="docs-page-data" type="application/json">{"slug":"en/tools/a2a-tools","language":"en","title":"A2A Tools","summary":"The current return structures of `a2a@service`, `a2a_observe`, and `a2a_wait`.","updated_at":"2026-04-10","read_when":["You need to call an external A2A service and track task status"],"source_docs":["src/services/tools.rs"],"tab":"Tools","group":"System Bridges","group_path":["System Bridges"],"url":"/docs/en/tools/a2a-tools/","headings":[{"id":"section-1","level":1,"text":"A2A Tools"},{"id":"section-2","level":2,"text":"a2a@service-name"},{"id":"section-3","level":2,"text":"a2aobserve"},{"id":"section-4","level":2,"text":"a2await"},{"id":"section-5","level":2,"text":"Key points"}],"prev_slug":"en/tools/user-world","next_slug":"en/tools/node-invoke","markdown":"# A2A Tools\n\nA2A is currently a small tool group:\n\n- `a2a@service-name`\n- `a2a_observe`\n- `a2a_wait`\n\n## `a2a@service-name`\n\nThis submits a task and usually returns an accepted state:\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"a2a_send\",\n  \"state\": \"accepted\",\n  \"summary\": \"Submitted task task_xxx to A2A service helper.\",\n  \"data\": {\n    \"endpoint\": \"https://a2a.example.com\",\n    \"service_name\": \"helper\",\n    \"task_id\": \"task_xxx\",\n    \"context_id\": \"ctx_xxx\",\n    \"status\": \"submitted\",\n    \"answer\": null\n  }\n}\n```\n\n## `a2a_observe`\n\nThis checks the current snapshot:\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"a2a_observe\",\n  \"state\": \"running\",\n  \"summary\": \"Observed 2 A2A tasks; 1 still pending.\",\n  \"data\": {\n    \"tasks\": [ ... ],\n    \"pending\": [ ... ],\n    \"pending_total\": 1,\n    \"timeout\": false\n  }\n}\n```\n\n## `a2a_wait`\n\nThis waits for a period of time until completion or timeout:\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"a2a_wait\",\n  \"state\": \"running\",\n  \"summary\": \"Observed 2 A2A tasks; 1 still pending.\",\n  \"data\": {\n    \"tasks\": [ ... ],\n    \"pending\": [ ... ],\n    \"pending_total\": 1,\n    \"elapsed_s\": 1.25,\n    \"timeout\": true\n  },\n  \"next_step_hint\": \"Call a2a_wait again or inspect the pending tasks before assuming the A2A workflow is complete.\"\n}\n```\n\n## Key points\n\n- `a2a@service-name` starts the work\n- `a2a_observe` checks the snapshot\n- `a2a_wait` performs the waiting loop\n","source_path":"使用说明书/en/tools/a2a-tools.md"}</script>
