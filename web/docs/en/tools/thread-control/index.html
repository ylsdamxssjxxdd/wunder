  <script id="docs-page-data" type="application/json">{"slug":"en/tools/thread-control","language":"en","title":"Thread Control","summary":"The actions, thread relationships, and return structure of `thread_control`.","updated_at":"2026-04-10","read_when":["You need to create, switch, archive, restore, or assign the main thread"],"source_docs":["src/services/tools/thread_control_tool.rs"],"tab":"Tools","group":"Sessions and Collaboration","group_path":["Sessions and Collaboration"],"url":"/docs/en/tools/thread-control/","headings":[{"id":"section-1","level":1,"text":"Thread Control"},{"id":"section-2","level":2,"text":"Main actions"},{"id":"section-3","level":2,"text":"Return envelope"},{"id":"section-4","level":2,"text":"list"},{"id":"section-5","level":2,"text":"create"},{"id":"section-6","level":2,"text":"setmain"},{"id":"section-7","level":2,"text":"Difference from subagentcontrol"}],"prev_slug":"en/tools/sleep","next_slug":"en/tools/subagent-control","markdown":"# Thread Control\n\n`thread_control` manages conversation threads between the current user and the current agent. It does not manage child-agent runs.\n\n## Main actions\n\n- `list`\n- `info`\n- `create`\n- `switch`\n- `back`\n- `update_title`\n- `archive`\n- `restore`\n- `set_main`\n\n## Return envelope\n\nSuccessful calls share this structure:\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"create\",\n  \"state\": \"completed\",\n  \"summary\": \"Created a new thread.\",\n  \"data\": { ... }\n}\n```\n\nSome actions also include `next_step_hint`.\n\n## `list`\n\nTypical result:\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"list\",\n  \"state\": \"completed\",\n  \"summary\": \"Listed 5 threads.\",\n  \"data\": {\n    \"scope\": \"branch\",\n    \"status\": \"active\",\n    \"items\": [\n      {\n        \"id\": \"sess_xxx\",\n        \"title\": \"Tool documentation update\",\n        \"status\": \"active\",\n        \"created_at\": \"2026-04-10T10:00:00+08:00\",\n        \"updated_at\": \"2026-04-10T10:03:00+08:00\",\n        \"last_message_at\": \"2026-04-10T10:03:00+08:00\",\n        \"agent_id\": \"agent_docs\",\n        \"parent_session_id\": null,\n        \"spawn_label\": null,\n        \"is_main\": true,\n        \"runtime_status\": \"idle\"\n      }\n    ]\n  }\n}\n```\n\n## `create`\n\nThe key point is that creation can also be combined with:\n\n- `switch`\n- `set_main`\n\nThat means you can create a thread and immediately switch to it or mark it as the main thread.\n\n## `set_main`\n\nThis is an important action. It binds a given conversation thread as the current agent's first-class main thread.\n\n## Difference from `subagent_control`\n\n- `thread_control`: manages the conversation threads themselves\n- `subagent_control`: manages temporary child-agent runs\n\nIf you want to manage main threads, branch threads, or archive status, use `thread_control`.  \nIf you need to wait for a subagent, interrupt it, or inspect its history, use `subagent_control`.\n","source_path":"使用说明书/en/tools/thread-control.md"}</script>
