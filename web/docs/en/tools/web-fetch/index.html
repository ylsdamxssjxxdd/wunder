  <script id="docs-page-data" type="application/json">{"slug":"en/tools/web-fetch","language":"en","title":"Web Fetch","summary":"Direct fetch, browser fallback, and success or failure results for `web_fetch`.","updated_at":"2026-04-10","read_when":["You need to read public webpage content rather than drive a browser"],"source_docs":["src/services/tools/web_fetch_tool.rs"],"tab":"Tools","group":"Web and Desktop","group_path":["Web and Desktop"],"url":"/docs/en/tools/web-fetch/","headings":[{"id":"section-1","level":1,"text":"Web Fetch"},{"id":"section-2","level":2,"text":"Minimum arguments"},{"id":"section-3","level":2,"text":"Success result"},{"id":"section-4","level":2,"text":"Important fields"},{"id":"section-5","level":2,"text":"Browser fallback"},{"id":"section-6","level":2,"text":"Failure results"},{"id":"section-7","level":2,"text":"When not to use it"}],"prev_slug":"en/tools/skill-call","next_slug":"en/tools/browser","markdown":"# Web Fetch\n\n`web_fetch` is still one of the deliberate exceptions in the tool system.  \nOn success, it returns the fetched result object directly rather than the unified `ok/action/state/summary/data` envelope.\n\n## Minimum arguments\n\n```json\n{\n  \"url\": \"https://example.com\"\n}\n```\n\n## Success result\n\n```json\n{\n  \"url\": \"https://example.com\",\n  \"final_url\": \"https://example.com\",\n  \"status\": 200,\n  \"title\": \"Example Domain\",\n  \"content_type\": \"text/html; charset=UTF-8\",\n  \"content_kind\": \"html\",\n  \"fetch_strategy\": \"direct_http\",\n  \"format\": \"markdown\",\n  \"extractor\": \"readability\",\n  \"truncated\": false,\n  \"warning\": null,\n  \"cached\": false,\n  \"fetched_at\": \"2026-04-10T03:00:00Z\",\n  \"content\": \"...\"\n}\n```\n\n## Important fields\n\n- `fetch_strategy`: for example `direct_http` or `browser_fallback`\n- `format`: usually `markdown` or `text`\n- `extractor`: the extractor that actually produced the content\n- `truncated`: whether the main content was cut\n- `warning`: extra fetch-time hints or warnings\n\n## Browser fallback\n\nIf direct HTTP only returns a frontend shell, an anti-bot page, or meaningless HTML, `web_fetch` may automatically attempt browser fallback.  \nWhen that happens successfully, you will see:\n\n```json\n{\n  \"fetch_strategy\": \"browser_fallback\"\n}\n```\n\n## Failure results\n\nOn failure, the tool falls back to the unified failure envelope and adds fetch diagnostics such as:\n\n- `phase`\n- `failure_summary`\n- `error_detail_head`\n- `next_step_hint`\n- `normalized_url`\n- `host`\n- `error_meta.code`\n\n## When not to use it\n\n- If you need to click, type, or scroll, use [Browser](/docs/en/tools/browser/)\n- If you need to inspect a local HTML file, this is not the right tool\n","source_path":"使用说明书/en/tools/web-fetch.md"}</script>
