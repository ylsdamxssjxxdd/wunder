  <script id="docs-page-data" type="application/json">{"slug":"en/tools/web-fetch","language":"en","title":"Web Fetch","summary":"The split between `web_search` and `web_fetch`, plus direct fetch, browser fallback, and success or failure results for `web_fetch`.","updated_at":"2026-05-15","read_when":["You need to read public webpage content rather than drive a browser"],"source_docs":["src/services/tools/web_search_tool.rs","src/services/tools/web_fetch_tool.rs"],"tab":"Tools","group":"Web and Desktop","group_path":["Web and Desktop"],"url":"/docs/en/tools/web-fetch/","headings":[{"id":"section-1","level":1,"text":"Web Fetch"},{"id":"section-2","level":2,"text":"Search vs. fetch"},{"id":"section-3","level":2,"text":"Minimum arguments"},{"id":"section-4","level":2,"text":"Success result"},{"id":"section-5","level":2,"text":"Important fields"},{"id":"section-6","level":2,"text":"Providers"},{"id":"section-7","level":2,"text":"Browser fallback"},{"id":"section-8","level":2,"text":"Failure results"},{"id":"section-9","level":2,"text":"When not to use it"}],"prev_slug":"en/tools/skill-call","next_slug":"en/tools/browser","markdown":"# Web Fetch\n\n## Search vs. fetch\n\n- `web_search`: takes keywords and returns candidate result titles, URLs, and snippets.\n- `web_fetch`: takes one confirmed URL and reads that page's main content.\n\nWhen you only have keywords, start with `web_search`:\n\n```json\n{\n  \"query\": \"example project official docs GitHub\",\n  \"count\": 5\n}\n```\n\nIf you already have a site or domain and only want to search inside it, pass `site` or `sites`; do not build a search-result URL and send it to `web_fetch`:\n\n```json\n{\n  \"site\": \"example.com\",\n  \"query\": \"install configuration\",\n  \"count\": 5\n}\n```\n\nThen pass concrete result URLs to `web_fetch`. Do not pass Bing, Baidu, Google, or other search-result page URLs to `web_fetch`.\n\n`web_fetch` is still one of the deliberate exceptions in the tool system.  \nOn success, it returns the fetched result object directly rather than the unified `ok/action/state/summary/data` envelope.\n\n## Minimum arguments\n\n```json\n{\n  \"url\": \"https://example.com\"\n}\n```\n\n## Success result\n\n```json\n{\n  \"url\": \"https://example.com\",\n  \"final_url\": \"https://example.com\",\n  \"status\": 200,\n  \"title\": \"Example Domain\",\n  \"content_type\": \"text/html; charset=UTF-8\",\n  \"content_kind\": \"html\",\n  \"fetch_strategy\": \"direct_http\",\n  \"format\": \"markdown\",\n  \"extractor\": \"readability\",\n  \"truncated\": false,\n  \"warning\": null,\n  \"cached\": false,\n  \"fetched_at\": \"2026-04-10T03:00:00Z\",\n  \"content\": \"...\"\n}\n```\n\n## Important fields\n\n- `fetch_strategy`: for example `direct_http` or `browser_fallback`\n- `provider`: present when an external provider such as `firecrawl` handled the fetch\n- `format`: usually `markdown` or `text`\n- `extractor`: the extractor that actually produced the content\n- `truncated`: whether the main content was cut\n- `warning`: extra fetch-time hints or warnings\n\n## Providers\n\n`tools.web.search.provider` currently supports `firecrawl`, using Firecrawl `/v2/search`. Self-hosted Firecrawl can use `http://wunder-firecrawl:3002`; Firecrawl Cloud uses `https://api.firecrawl.dev` and requires an API key.\n\n`web_fetch` keeps the model-facing arguments small. Provider selection is configured by the system:\n\n```yaml\ntools:\n  web:\n    fetch:\n      provider: direct # direct | auto | firecrawl\n      firecrawl:\n        api_key: ${FIRECRAWL_API_KEY:-}\n        base_url: ${FIRECRAWL_BASE_URL:-https://api.firecrawl.dev}\n```\n\n- `direct`: built-in Wunder HTTP fetcher.\n- `firecrawl`: use Firecrawl `/v2/scrape`.\n- `auto`: use Firecrawl when an API key or custom base URL is configured, otherwise fall back to `direct`.\n\nFirecrawl Cloud uses `https://api.firecrawl.dev` and requires an API key. A self-hosted service can use a URL such as `http://wunder-firecrawl:3002` and usually does not require an API key. The Docker compose files include a self-hosted Firecrawl service group and start `wunder-firecrawl-nuq-postgres`, which initializes the `nuq` queue tables and maintenance jobs through Firecrawl's NUQ Postgres image; the admin settings page only stores Wunder's connection parameters and does not control Docker service lifecycle.\n\n## Browser fallback\n\nIf direct HTTP only returns a frontend shell, an anti-bot page, or meaningless HTML, `web_fetch` may automatically attempt browser fallback.  \nWhen that happens successfully, you will see:\n\n```json\n{\n  \"fetch_strategy\": \"browser_fallback\"\n}\n```\n\n## Failure results\n\nOn failure, the tool falls back to the unified failure envelope and adds fetch diagnostics such as:\n\n- `phase`\n- `failure_summary`\n- `error_detail_head`\n- `next_step_hint`\n- `normalized_url`\n- `host`\n- `error_meta.code`\n\n## When not to use it\n\n- If you have search keywords, use a search tool first. `web_fetch` rejects search-result URLs such as `bing.com/search?...`.\n- If you need to click, type, or scroll, use [Browser](/docs/en/tools/browser/)\n- If you need to inspect a local HTML file, this is not the right tool\n","source_path":"使用说明书/en/tools/web-fetch.md"}</script>
