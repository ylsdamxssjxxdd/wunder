  <script id="docs-page-data" type="application/json">{"slug":"en/tools/final-response","language":"en","title":"Final Response","summary":"The sole job of `final_response` is to end the current turn with the reply for the user.","updated_at":"2026-04-10","read_when":["You have finished tool calls and reasoning and are ready to answer the user"],"source_docs":["src/services/tools/dispatch.rs","src/services/tools/catalog.rs"],"tab":"Tools","group":"UI and Automation","group_path":["UI and Automation"],"url":"/docs/en/tools/final-response/","headings":[{"id":"section-1","level":1,"text":"Final Response"},{"id":"section-2","level":2,"text":"Input"},{"id":"section-3","level":2,"text":"Return"},{"id":"section-4","level":2,"text":"Key points"}],"prev_slug":"en/tools/schedule-task","next_slug":"en/tools/sleep","markdown":"# Final Response\n\n`final_response` is not a normal business tool. It is only a termination signal.\n\n## Input\n\n```json\n{\n  \"content\": \"This is the final reply\"\n}\n```\n\n## Return\n\n```json\n{\n  \"answer\": \"This is the final reply\"\n}\n```\n\n## Key points\n\n- It does not use the unified success envelope\n- It does not include `ok`, `action`, `state`, `summary`, or `data`\n- It should only be called when the task is genuinely ready to close\n\nIf the system still needs to wait for a child task, keep polling, or request more input from the user, this is not the right tool yet.\n","source_path":"使用说明书/en/tools/final-response.md"}</script>
