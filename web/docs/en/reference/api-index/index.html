  <script id="docs-page-data" type="application/json">{"slug":"en/reference/api-index","language":"en","title":"API Index","summary":"This is an index page for Wunder's most commonly used interface groups, used for quickly locating endpoints rather than replacing the full API documentation.","updated_at":"2026-04-13","read_when":["You are looking for which category an interface roughly belongs to","You don't want to browse through the complete `docs/API文档.md` directly"],"source_docs":["docs/API文档.md","docs/系统介绍.md"],"tab":"Reference","group":"System Reference","group_path":["System Reference"],"url":"/docs/en/reference/api-index/","headings":[{"id":"section-1","level":1,"text":"API Index"},{"id":"section-2","level":2,"text":"Core Execution Endpoints"},{"id":"section-3","level":2,"text":"Chat Session Domain"},{"id":"section-4","level":2,"text":"A2A"},{"id":"section-5","level":2,"text":"MCP"},{"id":"section-6","level":2,"text":"User World"},{"id":"section-7","level":2,"text":"Admin Interfaces"},{"id":"section-8","level":2,"text":"When to Return to Full API Documentation"},{"id":"section-9","level":2,"text":"Further Reading"}],"prev_slug":"en/reference/index","next_slug":"en/reference/config","markdown":"# API Index\n\nThis is not a complete API manual, but an index page for Wunder's main interface groups.\n\n## Core Execution Endpoints\n\n- `POST /wunder`\n- `POST /wunder/system_prompt`\n- `GET /wunder/tools`\n\nRecommended reading:\n\n- [wunder API](/docs/en/integration/wunder-api/)\n\n## Chat Session Domain\n\n- `GET/POST /wunder/chat/sessions`\n- `POST /wunder/chat/attachments/convert`\n- `POST /wunder/chat/attachments/media/process`\n- `POST /wunder/chat/sessions/{session_id}/messages`\n- `GET /wunder/chat/sessions/{session_id}/resume`\n- `POST /wunder/chat/sessions/{session_id}/cancel`\n- `GET /wunder/chat/ws`\n\nRecommended reading:\n\n- [Chat Sessions](/docs/en/integration/chat-sessions/)\n- [Temp Directory and Document Conversion](/docs/en/integration/temp-dir/)\n- [Chat WebSocket](/docs/en/integration/chat-ws/)\n- [Sessions and Rounds](/docs/en/concepts/sessions-and-rounds/)\n\n## A2A\n\n- `POST /a2a`\n- `GET /.well-known/agent-card.json`\n- `GET /a2a/agentCard`\n- `GET /a2a/extendedAgentCard`\n\nRecommended reading:\n\n- [A2A Interface](/docs/en/integration/a2a/)\n\n## MCP\n\n- `POST /wunder/mcp`\n- `GET/POST /wunder/admin/mcp`\n- `POST /wunder/admin/mcp/tools`\n- `POST /wunder/admin/mcp/tools/call`\n\nRecommended reading:\n\n- [MCP Endpoint](/docs/en/integration/mcp-endpoint/)\n\n## User World\n\n- `GET /wunder/user_world/contacts`\n- `GET /wunder/user_world/groups`\n- `GET /wunder/user_world/conversations`\n- `GET /wunder/user_world/ws`\n\n## Admin Interfaces\n\nMost admin interfaces are under:\n\n- `/wunder/admin/*`\n\nThey cover:\n\n- Models\n- Tools\n- Users and Organizations\n- Preset Agents\n- Benchmarks\n- Channel Governance\n\n## When to Return to Full API Documentation\n\nYou should go back to the full documentation when you need:\n\n- Field-level request bodies\n- Response structures\n- Error codes\n- Authentication details\n- Backward compatibility fields\n\n## Further Reading\n\n- [wunder API](/docs/en/integration/wunder-api/)\n- [Configuration](/docs/en/reference/config/)\n- [Troubleshooting](/docs/en/help/troubleshooting/)\n","source_path":"使用说明书/en/reference/api-index.md"}</script>
