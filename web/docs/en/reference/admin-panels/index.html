  <script id="docs-page-data" type="application/json">{"slug":"en/reference/admin-panels","language":"en","title":"Admin Panels","summary":"The admin-side frontend is not a single debug page, but a set of well-organized governance panels with clear responsibilities.","updated_at":"2026-04-13","read_when":["You are using the admin side for the first time","You want to know where to find a specific configuration, monitoring view, or documentation entry"],"source_docs":["docs/系统介绍.md","docs/设计方案.md","web/index.html"],"tab":"Reference","group":"System Reference","group_path":["System Reference"],"url":"/docs/en/reference/admin-panels/","headings":[{"id":"section-1","level":1,"text":"Admin Panels"},{"id":"section-2","level":2,"text":"System Group"},{"id":"section-3","level":3,"text":"User Management Supplement"},{"id":"section-4","level":2,"text":"Agent Group"},{"id":"section-5","level":2,"text":"Debug Group"},{"id":"section-6","level":2,"text":"Documentation Group"},{"id":"section-7","level":3,"text":"User Guide"},{"id":"section-8","level":3,"text":"API Reference"},{"id":"section-9","level":2,"text":"What Different Roles Use Most"},{"id":"section-10","level":3,"text":"Administrators"},{"id":"section-11","level":3,"text":"Developers"},{"id":"section-12","level":3,"text":"Delivery or Training Staff"},{"id":"section-13","level":2,"text":"A Practical Tip"},{"id":"section-14","level":2,"text":"Further Reading"}],"prev_slug":"en/reference/prompt-templates","next_slug":"en/concepts/architecture","markdown":"# Admin Panels\n\nThe key value of the admin-side frontend is not \"cram everything onto one page\", but grouping governance entry points by function.\n\n## System Group\n\nThis group is oriented toward global governance:\n\n- Internal Status\n- System Settings\n- Organization Management\n- User Management\n- Link Management\n- Channel Monitoring\n\nIf you need to check runtime state, organizational structure, or global configuration, start here.\n\n### User Management Supplement\n\nThe settings dialog in User Management now also handles Token account governance:\n\n- You can directly modify a regular user's Token balance\n- You can issue or deduct Tokens with proper accounting semantics\n- Deductions validate the available balance to prevent over-drafting\n- Admin accounts are not subject to these balance restrictions\n\n## Agent Group\n\nThis group is oriented toward conversation and capability governance:\n\n- Model Configuration\n- Thread Management\n- Preset Agents\n- Tool Management\n- System Prompt Templates\n\nIf you need to see \"how models are configured and exposed\", start here.\n\n## Debug Group\n\nThis group is oriented toward engineering validation:\n\n- Throughput Testing\n- Performance Testing\n- Swarm Testing\n- Capability Evaluation\n- Debug Panel\n- LSP\n\nIf you are doing integration testing, load testing, or capability verification, this group is the most important.\n\n## Documentation Group\n\nThe admin side now groups documentation entries separately, mainly including:\n\n- User Guide\n- API Reference\n\nThey serve different purposes.\n\n### User Guide\n\nThis is an embedded entry point to the public documentation site.\n\nGood for looking up:\n\n- Getting Started\n- Core Concepts\n- Integration\n- Operations\n- Reference\n\n### API Reference\n\nGood for:\n\n- Quickly looking up `/wunder` and related endpoints\n- Viewing fields, examples, and integration methods\n\n## What Different Roles Use Most\n\n### Administrators\n\nMost frequently use:\n\n- System Settings\n- User Management\n- Channel Monitoring\n- User Guide\n\n### Developers\n\nMost frequently use:\n\n- Debug Panel\n- API Reference\n- Tool Management\n- Performance Testing\n\n### Delivery or Training Staff\n\nMost frequently use:\n\n- User Guide\n\n## A Practical Tip\n\nIf you are not sure where to start investigating a problem, follow this order:\n\n1. Check the User Guide for existing documentation\n2. Check the API Reference for field definitions\n3. Go to the relevant governance panel to verify\n\n## Further Reading\n\n- [Admin Interface](/docs/en/surfaces/web-admin/)\n- [Configuration Reference](/docs/en/reference/config/)\n- [Stream Events Reference](/docs/en/reference/stream-events/)\n","source_path":"使用说明书/en/reference/admin-panels.md"}</script>
