  <script id="docs-page-data" type="application/json">{"slug":"en/integration/chat-ws","language":"en","title":"Chat WebSocket","summary":"`/wunder/chat/ws` is Wunder's primary real-time chat channel; real-time sessions prefer WS, with SSE as fallback.","updated_at":"2026-04-13","read_when":["You are developing chat UI or desktop real-time sessions","You need to handle start/resume/watch/cancel/approval"],"source_docs":["docs/API文档.md","docs/系统介绍.md","src/api/chat_ws.rs"],"tab":"Integrations","group":"Core Interfaces","group_path":["Core Interfaces"],"url":"/docs/en/integration/chat-ws/","headings":[{"id":"section-1","level":1,"text":"Chat WebSocket"},{"id":"section-2","level":2,"text":"Applicable Scenarios"},{"id":"section-3","level":2,"text":"Endpoint"},{"id":"section-4","level":2,"text":"Actions Available After Connection"},{"id":"section-5","level":2,"text":"Minimal Integration Sequence"},{"id":"section-6","level":2,"text":"Minimal Handshake Example"},{"id":"section-7","level":2,"text":"Start an Execution"},{"id":"section-8","level":2,"text":"Key Events Clients Should Focus On"},{"id":"section-9","level":2,"text":"Common Pitfalls"},{"id":"section-10","level":2,"text":"Fallback on Failure"},{"id":"section-11","level":2,"text":"Further Reading"}],"prev_slug":"en/integration/wunder-api","next_slug":"en/integration/chat-sessions","markdown":"# Chat WebSocket\n\n`/wunder/chat/ws` is not just an \"event stream\"; it's also a session control channel.\n\n## Applicable Scenarios\n\n- Chat workbench or desktop sessions\n- Execute `start / resume / watch / cancel` within the same connection\n- Requires long-lived connection keepalive and real-time state consistency\n\n## Endpoint\n\n- `GET /wunder/chat/ws`\n\n## Actions Available After Connection\n\n- `connect`: Handshake and protocol negotiation\n- `start`: Start an execution\n- `resume`: Continue receiving events after disconnection\n- `watch`: Only observe a session\n- `cancel`: Cancel current execution\n- `approval`: Return approval decision\n- `ping`: Keepalive\n\nKey server responses: `ready`, `event`, `error`, `pong`\n\n## Minimal Integration Sequence\n\n1. `POST /wunder/chat/sessions` to get `session_id`\n2. Establish `WebSocket /wunder/chat/ws`\n3. Send `connect`\n4. Receive `ready`\n5. Send `start`\n6. Consume subsequent `event` until `turn_terminal`\n\n## Minimal Handshake Example\n\n```json\n{\n  \"kind\": \"connect\",\n  \"request_id\": \"req_connect_01\",\n  \"payload\": {\n    \"protocol_version\": \"1.0\",\n    \"client_name\": \"my-chat-ui\"\n  }\n}\n```\n\n## Start an Execution\n\n```json\n{\n  \"kind\": \"start\",\n  \"request_id\": \"req_start_01\",\n  \"session_id\": \"sess_xxx\",\n  \"payload\": {\n    \"content\": \"Continue helping me organize that weekly report from earlier\",\n    \"stream\": true\n  }\n}\n```\n\n## Key Events Clients Should Focus On\n\n- `queued`\n- `approval_resolved`\n- `error`\n- `turn_terminal`\n\n`turn_terminal` is the terminal state signal for a single execution round, recommended as the frontend convergence condition.\n\n## Common Pitfalls\n\n- `start` must explicitly pass `session_id`.\n- The text field is `content`, not `/wunder`'s `question`.\n- `resume` (catch up on events) and `watch` (observe session) are not the same action.\n- WS approval only handles approval items with `source=chat_ws`.\n\n## Fallback on Failure\n\nWhen WS is unavailable:\n\n- Fallback to `POST /wunder` (SSE)\n- Or fallback to `GET /wunder/chat/sessions/{session_id}/resume`\n\n## Further Reading\n\n- [Chat Sessions](/docs/en/integration/chat-sessions/)\n- [wunder API](/docs/en/integration/wunder-api/)\n- [Stream Events Reference](/docs/en/reference/stream-events/)\n","source_path":"使用说明书/en/integration/chat-ws.md"}</script>
