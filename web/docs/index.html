  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/index","language":"zh-CN","title":"wunder 心舰","summary":"wunder 是统一承载 server、cli、desktop 三种运行形态的智能体调度系统；入口建议先按角色和目标分流，再进入具体文档。","updated_at":"2026-03-23","read_when":["你第一次了解 wunder","你需要快速判断先看 desktop、server 还是 cli","你要定位接入、运维和工具文档入口"],"source_docs":["README.md","docs/系统介绍.md","docs/设计方案.md"],"tab":"开始","group":"首页","group_path":["首页"],"url":"/docs/","headings":[{"id":"section-1","level":1,"text":"wunder 心舰"},{"id":"section-2","level":2,"text":"什么是 wunder？"},{"id":"section-3","level":2,"text":"它能做什么？"},{"id":"section-4","level":2,"text":"系统结构（1 分钟理解）"},{"id":"section-5","level":2,"text":"按你的角色选入口"},{"id":"section-6","level":2,"text":"核心特性一览"},{"id":"section-7","level":3,"text":"五维能力框架"},{"id":"section-8","level":3,"text":"技术亮点"},{"id":"section-9","level":2,"text":"最容易搞错的点"},{"id":"section-10","level":2,"text":"快速导航"},{"id":"section-11","level":3,"text":"第一次使用？"},{"id":"section-12","level":3,"text":"想深入理解？"},{"id":"section-13","level":3,"text":"需要接入开发？"},{"id":"section-14","level":3,"text":"遇到问题？"},{"id":"section-15","level":2,"text":"延伸阅读"}],"prev_slug":null,"next_slug":"zh-CN/start/quickstart","markdown":"# wunder 心舰\n\n<p class=\"docs-eyebrow\">Agent Orchestration Kernel | server / cli / desktop<\/p>\n\n## 什么是 wunder？\n\nwunder 是一个**会执行任务的智能体系统**。你告诉它目标，它会自动拆解任务、调用工具、并行协作，最终交付结果。\n\n它不是一个简单的聊天机器人——而是一个**可编程的智能体执行引擎**，支持三种运行形态：\n\n| 形态 | 面向人群 | 核心价值 |\n|------|----------|----------|\n| **Desktop** | 个人用户 | 下载即用，本地智能体工作台 |\n| **Server** | 团队/组织 | 多租户治理、统一接入、权限管控 |\n| **CLI** | 开发者/自动化 | 终端驱动、脚本化、流水线集成 |\n\n## 它能做什么？\n\n想象一下，你有一个智能助手团队：\n\n- **文件与代码**：读取文件、编辑代码、执行命令、重构项目\n- **办公自动化**：整理文档、生成报告、处理表格、做会议纪要\n- **多智能体协作**：一个查资料、一个写稿、一个复核，并行加速\n- **持续任务**：定时巡检、周期提醒、跨渠道消息处理\n- **系统集成**：连接 MCP/外部系统，组合 Skills 固化流程\n\n## 系统结构（1 分钟理解）\n\n![wunder 系统结构示意图：心舰到用户、蜂群、智能体、线程的分层关系](/docs/diagrams/system-intro/08-hierarchy-structure.svg)\n\n抓住这条主线：\n\n```\n心舰（wunder）\n  └─ 用户（资源隔离边界）\n      └─ 蜂群（协作单元）\n          └─ 智能体（执行角色）\n              └─ 线程（连续上下文与状态承载体）\n```\n\n一句话总结：**请求先落到用户域，再由蜂群编排智能体，最终在线程中持续执行。**\n\n## 按你的角色选入口\n\n<div class=\"docs-card-grid\">\n  <a class=\"docs-card\" href=\"/docs/zh-CN/start/desktop/\">\n    <strong>个人用户<\/strong>\n    <span>直接下载 desktop，5 分钟上手。<\/span>\n  <\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/start/server/\">\n    <strong>团队管理员<\/strong>\n    <span>部署 server，统一管理多用户与权限。<\/span>\n  <\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/start/cli/\">\n    <strong>开发者<\/strong>\n    <span>使用 CLI，脚本化与自动化集成。<\/span>\n  <\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/integration/\">\n    <strong>系统集成<\/strong>\n    <span>接入 /wunder 接口，嵌入到你的系统。<\/span>\n  <\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/\">\n    <strong>运维人员<\/strong>\n    <span>部署、监控、性能调优。<\/span>\n  <\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/tools/\">\n    <strong>工具开发者<\/strong>\n    <span>探索内置工具、MCP、Skills。<\/span>\n  <\/a>\n<\/div>\n\n## 核心特性一览\n\n### 五维能力框架\n\n| 维度 | 说明 |\n|------|------|\n| **形态协同** | desktop / server / cli 共享同一套核心引擎 |\n| **租户治理** | 多用户、单位树、配额管理、权限控制 |\n| **智能体协作** | 蜂群分工、并行执行、结果归并 |\n| **工具生态** | 内置工具 + MCP + Skills + 知识库 |\n| **接口开放** | WebSocket/SSE 流式、RESTful、A2A 标准 |\n\n### 技术亮点\n\n- **流式优先**：WebSocket 默认，SSE 兜底，支持断线恢复\n- **线程冻结**：system prompt 首次确定后锁定，避免缓存失效\n- **长期记忆**：结构化记忆碎片，支持手动/自动提炼\n- **上下文压缩**：智能摘要 + 预算控制，应对长对话\n- **原子写入**：文件操作采用临时文件 + rename 策略\n- **工具防爆**：双层裁剪 + 预算控制，防止上下文爆炸\n\n## 最容易搞错的点\n\n在继续之前，先澄清几个常见误区：\n\n| 误区 | 正确理解 |\n|------|----------|\n| `/wunder` 的 `user_id` 必须是已注册用户 | 不需要，可以是任意虚拟标识 |\n| token 统计就是账单消耗 | 记录的是**上下文占用量**，不是总消耗量 |\n| 线程每次都会重写 system prompt | 首次确定后会**冻结**，后续轮次不再改写 |\n| 长期记忆每轮都会注入 | 只在线程**初始化时注入一次** |\n\n## 快速导航\n\n### 第一次使用？\n\n先看 [快速开始](/docs/zh-CN/start/quickstart/)，10 分钟内跑通第一条链路。\n\n### 想深入理解？\n\n从 [概念概览](/docs/zh-CN/concepts/) 开始，建立系统运行模型。\n\n### 需要接入开发？\n\n去 [接入概览](/docs/zh-CN/integration/)，找到适合你的接入方式。\n\n### 遇到问题？\n\n查 [故障排查](/docs/zh-CN/help/troubleshooting/)，或看 [FAQ](/docs/zh-CN/help/faq/)。\n\n## 延伸阅读\n\n- [文档总览](/docs/zh-CN/start/hubs/)\n- [API 索引](/docs/zh-CN/reference/api-index/)\n- [系统介绍](/docs/系统介绍.md)\n- [设计方案](/docs/设计方案.md)\n","source_path":"静态站文档/zh-CN/index.md"}</script>
