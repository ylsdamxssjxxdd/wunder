  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/browser","language":"zh-CN","title":"浏览器","summary":"浏览器自动化工具的动作、返回特征与和 `web_fetch` 的分工。","updated_at":"2026-04-10","read_when":["你要打开网页、点击、输入、截图或读取动态页面"],"source_docs":["src/services/tools/browser_tool.rs","src/services/browser/runtime.rs"],"tab":"工具","group":"网页与桌面","group_path":["网页与桌面"],"url":"/docs/zh-CN/tools/browser/","headings":[{"id":"section-1","level":1,"text":"浏览器"},{"id":"section-2","level":2,"text":"什么时候用它"},{"id":"section-3","level":2,"text":"常用动作"},{"id":"section-4","level":2,"text":"最小参数示例"},{"id":"section-5","level":2,"text":"返回结构怎么理解"},{"id":"section-6","level":3,"text":"status"},{"id":"section-7","level":3,"text":"stop"},{"id":"section-8","level":3,"text":"screenshot"},{"id":"section-9","level":3,"text":"readpage / snapshot / navigate / tabs"},{"id":"section-10","level":2,"text":"与 webfetch 的区别"}],"prev_slug":"zh-CN/tools/web-fetch","next_slug":"zh-CN/tools/desktop-control","markdown":"# 浏览器\n\n浏览器工具的最大特点是：**成功结果主要透传浏览器运行时，而不是统一包一层 `summary/data`。**\n\n所以看它的返回时，不要机械地期待所有动作都长成统一骨架。\n\n## 什么时候用它\n\n- 页面是动态渲染的\n- 需要点击、输入、按键、等待\n- 需要浏览器截图\n- `web_fetch` 抓不到有效正文\n\n## 常用动作\n\n- `status`\n- `profiles`\n- `start`\n- `stop`\n- `tabs`\n- `open`\n- `focus`\n- `close`\n- `navigate`\n- `snapshot`\n- `act`\n- `screenshot`\n- `read_page`\n- 快捷动作：`click`、`type`、`press`、`hover`、`wait`\n\n## 最小参数示例\n\n导航：\n\n```json\n{\n  \"action\": \"navigate\",\n  \"browser_session_id\": \"sess_xxx\",\n  \"url\": \"https://example.com\"\n}\n```\n\n读取页面：\n\n```json\n{\n  \"action\": \"read_page\",\n  \"browser_session_id\": \"sess_xxx\",\n  \"max_chars\": 12000\n}\n```\n\n## 返回结构怎么理解\n\n### `status`\n\n更像运行时状态：\n\n```json\n{\n  \"ok\": true,\n  \"enabled\": true,\n  \"tool_visible\": true,\n  \"default_profile\": \"default\",\n  \"profiles\": [\"default\"],\n  \"limits\": { ... },\n  \"playwright\": { ... },\n  \"docker\": { ... },\n  \"control\": { ... },\n  \"sessions\": [\"sess_xxx\"]\n}\n```\n\n### `stop`\n\n```json\n{\n  \"ok\": true,\n  \"closed\": true,\n  \"browser_session_id\": \"sess_xxx\"\n}\n```\n\n### `screenshot`\n\n会把桥接层回传的 `image_base64` 落成文件，再返回下载信息，典型字段包括：\n\n```json\n{\n  \"ok\": true,\n  \"filename\": \"browser_xxx.png\",\n  \"download_url\": \"/wunder/temp_dir/download?...\",\n  \"...\": \"other browser runtime fields\"\n}\n```\n\n### `read_page` / `snapshot` / `navigate` / `tabs`\n\n这些字段由浏览器桥接层决定，通常至少会有 `ok: true` 和动作相关数据。\n\n## 与 `web_fetch` 的区别\n\n- `web_fetch`：优先读静态正文，成本更低\n- `browser`：优先解决交互、动态渲染、页面自动化\n\n如果只是读公开网页正文，先用 [网页抓取](/docs/zh-CN/tools/web-fetch/)。  \n只有在页面依赖前端渲染、验证流程或必须交互时，再切到浏览器。\n","source_path":"使用说明书/zh-CN/tools/browser.md"}</script>
