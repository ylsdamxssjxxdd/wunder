  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/browser","language":"zh-CN","title":"浏览器","summary":"浏览器是交互型工具，用于在 desktop 模式下真实打开页面、点击、输入和截图，与 web_fetch 分工明确。","updated_at":"2026-03-21","read_when":["你在做桌面自动化或网页交互","你要区分浏览器和网页抓取"],"source_docs":["src/services/tools/browser_tool.rs","src/services/tools/catalog.rs"],"tab":"工具","group":"网页与桌面","group_path":["网页与桌面"],"url":"/docs/zh-CN/tools/browser/","headings":[{"id":"section-1","level":1,"text":"浏览器"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"支持的动作"},{"id":"section-5","level":2,"text":"使用示例"},{"id":"section-6","level":3,"text":"导航到页面"},{"id":"section-7","level":3,"text":"点击元素"},{"id":"section-8","level":3,"text":"输入文本"},{"id":"section-9","level":3,"text":"截图"},{"id":"section-10","level":2,"text":"完整工作流示例"},{"id":"section-11","level":3,"text":"搜索并截图"},{"id":"section-12","level":2,"text":"与 webfetch 的对比"},{"id":"section-13","level":2,"text":"适用场景"},{"id":"section-14","level":2,"text":"可见性限制"},{"id":"section-15","level":2,"text":"注意事项"},{"id":"section-16","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/web-fetch","next_slug":"zh-CN/tools/desktop-control","markdown":"# 浏览器\n\n真实网页交互工具，仅在 Desktop 模式下可用。\n\n---\n\n## 功能说明\n\n`浏览器` 是交互型工具，用于真实打开页面、点击、输入和截图。\n\n**别名**：\n- `browser`\n- `browser_tool`\n\n**独立动作别名**：\n- `browser_navigate`\n- `browser_click`\n- `browser_type`\n- `browser_screenshot`\n- `browser_read_page`\n- `browser_close`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `action` | string | ✅ | 要执行的动作 |\n| `url` | string | ❌ | 目标 URL（navigate 动作使用） |\n| `selector` | string | ❌ | CSS 选择器（click/type 动作使用） |\n| `text` | string | ❌ | 要输入的文本（type 动作使用） |\n\n---\n\n## 支持的动作\n\n| 动作 | 说明 | 必填附加参数 |\n|------|------|--------------|\n| `navigate` | 导航到 URL | `url` |\n| `click` | 点击元素 | `selector` |\n| `type` | 输入文本 | `selector`, `text` |\n| `screenshot` | 截图 | - |\n| `read_page` | 读取页面 | - |\n| `close` | 关闭浏览器 | - |\n\n---\n\n## 使用示例\n\n### 导航到页面\n\n```json\n{\n  \"action\": \"navigate\",\n  \"url\": \"https://example.com\"\n}\n```\n\n### 点击元素\n\n```json\n{\n  \"action\": \"click\",\n  \"selector\": \"#submit-button\"\n}\n```\n\n### 输入文本\n\n```json\n{\n  \"action\": \"type\",\n  \"selector\": \"#username\",\n  \"text\": \"myusername\"\n}\n```\n\n### 截图\n\n```json\n{\n  \"action\": \"screenshot\"\n}\n```\n\n---\n\n## 完整工作流示例\n\n### 搜索并截图\n\n```json\n// 1. 导航到搜索引擎\n{\n  \"action\": \"navigate\",\n  \"url\": \"https://www.bing.com\"\n}\n\n// 2. 输入搜索词\n{\n  \"action\": \"type\",\n  \"selector\": \"#sb_form_q\",\n  \"text\": \"wunder AI\"\n}\n\n// 3. 点击搜索按钮\n{\n  \"action\": \"click\",\n  \"selector\": \"#sb_form_go\"\n}\n\n// 4. 等待页面加载\n{\n  \"wait_ms\": 2000\n}\n\n// 5. 截图\n{\n  \"action\": \"screenshot\"\n}\n\n// 6. 关闭浏览器\n{\n  \"action\": \"close\"\n}\n```\n\n---\n\n## 与 web_fetch 的对比\n\n| 特性 | 浏览器 | [网页抓取](/docs/zh-CN/tools/web-fetch/) |\n|------|--------|--------------------------------|\n| 用途 | 交互型操作 | 读网页正文 |\n| 成本 | 较高（需要真实浏览器） | 较低（直接 HTTP 请求） |\n| 能力 | 点击、输入、截图 | 提取正文 |\n| 推荐使用 | 需要交互时 | 只需要读正文时 |\n\n---\n\n## 适用场景\n\n✅ **适合使用浏览器**：\n- 需要真实打开页面\n- 需要点击或输入\n- 需要截图确认页面状态\n- 要在同一个页面会话里继续操作\n\n❌ **不适合使用浏览器**：\n- 只是想读一篇文章或帮助页正文\n- 不需要交互\n- 想尽量减少上下文噪声和执行成本\n\n这些场景优先用 [网页抓取](/docs/zh-CN/tools/web-fetch/)。\n\n---\n\n## 可见性限制\n\n浏览器工具仅在以下条件下可用：\n- 运行形态是 `desktop`\n- 配置 `tools.browser.enabled = true`\n\nServer 和 CLI 模式下不可用。\n\n---\n\n## 注意事项\n\n1. **不是更强版网页抓取**：\n   - 浏览器和 web_fetch 解决的是两类问题\n   - 不要混淆使用\n\n2. **会话保持**：\n   - 既然已经进入浏览器会话，再退回 web_fetch 读同一页面，通常会丢失交互上下文\n\n3. **使用限制**：\n   - 浏览器工具可见，不代表当前运行环境就适合高频自动化\n   - 它仍然受 desktop 条件限制\n\n---\n\n## 延伸阅读\n\n- [网页抓取](/docs/zh-CN/tools/web-fetch/)\n- [桌面控制](/docs/zh-CN/tools/desktop-control/)\n- [Desktop 界面](/docs/zh-CN/surfaces/desktop-ui/)\n","source_path":"静态站文档/zh-CN/tools/browser.md"}</script>
