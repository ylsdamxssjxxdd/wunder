  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/browser","language":"zh-CN","title":"浏览器","summary":"浏览器是交互型工具，用于操作浏览器运行时，支持会话、标签页、snapshot/ref/act、截图与读页。","updated_at":"2026-03-27","read_when":["你需要真实打开页面并持续交互","你需要通过 snapshot/ref 操作页面元素","你在评估 desktop、server、docker 中的浏览器自动化能力"],"source_docs":["src/services/browser/runtime.rs","src/services/tools/browser_tool.rs","src/api/browser_control.rs","src/services/tools/catalog.rs"],"tab":"工具","group":"网页与桌面","group_path":["网页与桌面"],"url":"/docs/zh-CN/tools/browser/","headings":[{"id":"section-1","level":1,"text":"浏览器"},{"id":"section-2","level":2,"text":"能力概览"},{"id":"section-3","level":2,"text":"关键设计"},{"id":"section-4","level":3,"text":"1. 会话与标签页"},{"id":"section-5","level":3,"text":"2. snapshot/ref/act"},{"id":"section-6","level":3,"text":"3. legacy 兼容"},{"id":"section-7","level":2,"text":"常用参数"},{"id":"section-8","level":2,"text":"推荐工作流"},{"id":"section-9","level":3,"text":"浏览和交互"},{"id":"section-10","level":3,"text":"多标签页"},{"id":"section-11","level":2,"text":"示例"},{"id":"section-12","level":3,"text":"打开页面并抓取快照"},{"id":"section-13","level":3,"text":"用 ref 点击元素"},{"id":"section-14","level":3,"text":"输入文本"},{"id":"section-15","level":3,"text":"管理标签页"},{"id":"section-16","level":2,"text":"配置"},{"id":"section-17","level":2,"text":"Docker 准备"},{"id":"section-18","level":2,"text":"与网页抓取的区别"},{"id":"section-19","level":2,"text":"扩展接口"}],"prev_slug":"zh-CN/tools/web-fetch","next_slug":"zh-CN/tools/desktop-control","markdown":"# 浏览器\n\n`浏览器` 是 Wunder 的浏览器运行时入口，不再只是旧版的 `navigate/click/type` 脚本包装。\n\n它现在有三层职责：\n\n- 对模型暴露统一工具协议\n- 维护浏览器会话与标签页\n- 提供 `snapshot -> ref -> act` 的交互链路\n\n---\n\n## 能力概览\n\n主工具名：\n\n- `浏览器`\n- 英文别名：`browser`\n\n保留的 legacy 别名：\n\n- `browser_navigate`\n- `browser_click`\n- `browser_type`\n- `browser_screenshot`\n- `browser_read_page`\n- `browser_close`\n\n统一 action：\n\n- `status`\n- `profiles`\n- `start`\n- `stop`\n- `tabs`\n- `open`\n- `focus`\n- `close`\n- `navigate`\n- `snapshot`\n- `act`\n- `click`\n- `type`\n- `press`\n- `hover`\n- `wait`\n- `screenshot`\n- `read_page`\n\n---\n\n## 关键设计\n\n### 1. 会话与标签页\n\n- 同一智能体会话会复用一个浏览器 session\n- 每个 session 支持多个标签页\n- `tabs/open/focus/close` 用于 tab 生命周期管理\n\n### 2. snapshot/ref/act\n\n- `snapshot` 返回结构化页面快照\n- 每个可交互元素会分配 `ref`\n- `act` 优先通过 `ref` 定位，不再鼓励模型猜 CSS selector\n\n### 3. legacy 兼容\n\n- 旧的 `browser_click/browser_type/...` 仍可用\n- 内部会自动转发到新的浏览器运行时\n\n---\n\n## 常用参数\n\n| 参数 | 类型 | 说明 |\n|------|------|------|\n| `action` | string | 要执行的动作 |\n| `profile` | string | 可选，浏览器 profile，默认 `managed` |\n| `browser_session_id` | string | 可选，显式浏览器会话 ID |\n| `target_id` | string | 可选，标签页 ID |\n| `url` | string | 导航或开新标签页时使用 |\n| `format` | string | `snapshot` 格式：`role/aria/ai` |\n| `ref` | string | `snapshot` 返回的元素引用 |\n| `selector` | string | 兼容入口，仍可直接传 CSS selector |\n| `text` | string | 输入文本或等待文本 |\n| `key` | string | `press` 动作使用的键值 |\n| `request` | object | `act` 的结构化请求 |\n| `full_page` | boolean | 截图是否抓整页 |\n| `max_chars` | integer | `snapshot/read_page` 最大字符数 |\n\n---\n\n## 推荐工作流\n\n### 浏览和交互\n\n1. `start` 或直接 `navigate`\n2. `snapshot`\n3. 读取 `ref`\n4. `act`\n5. 必要时再次 `snapshot`\n\n### 多标签页\n\n1. `open`\n2. `tabs`\n3. `focus`\n4. `navigate/act`\n\n---\n\n## 示例\n\n### 打开页面并抓取快照\n\n```json\n{\n  \"action\": \"navigate\",\n  \"url\": \"https://example.com\"\n}\n```\n\n```json\n{\n  \"action\": \"snapshot\",\n  \"format\": \"role\"\n}\n```\n\n### 用 ref 点击元素\n\n```json\n{\n  \"action\": \"act\",\n  \"request\": {\n    \"kind\": \"click\",\n    \"ref\": \"e1\"\n  }\n}\n```\n\n### 输入文本\n\n```json\n{\n  \"action\": \"act\",\n  \"request\": {\n    \"kind\": \"type\",\n    \"ref\": \"e2\",\n    \"text\": \"wunder browser runtime\"\n  }\n}\n```\n\n### 管理标签页\n\n```json\n{\n  \"action\": \"open\",\n  \"url\": \"https://www.bing.com\"\n}\n```\n\n```json\n{\n  \"action\": \"tabs\"\n}\n```\n\n```json\n{\n  \"action\": \"focus\",\n  \"target_id\": \"tab-2\"\n}\n```\n\n---\n\n## 配置\n\n模型可见性：\n\n```yaml\ntools:\n  browser:\n    enabled: true\n```\n\n浏览器运行时：\n\n```yaml\nbrowser:\n  enabled: true\n  docker:\n    enabled: true\n```\n\n不需要再把 `浏览器` 写进 `tools.builtin.enabled`，系统会在 `tools.browser.enabled=true` 时自动挂载工具。\n\n兼容旧版 desktop：\n\n- `server.mode=desktop`\n- `tools.browser.enabled=true`\n\n即使没有显式开启 `browser.enabled`，legacy desktop 仍然可用。\n\n---\n\n## Docker 准备\n\n当前实现已经为 Docker 预留了运行条件：\n\n- `PLAYWRIGHT_BROWSERS_PATH`\n- `INSTALL_PLAYWRIGHT_BROWSERS`\n- `/app/config/data/browser`\n- `/app/config/data/browser/downloads`\n- `--no-sandbox`\n- `--disable-dev-shm-usage`\n- `shm_size: 2gb`\n\n当前仓库里的 Docker Compose 默认会：\n\n- 构建时安装 Chromium（`INSTALL_PLAYWRIGHT_BROWSERS=1`）\n- 运行时开启浏览器工具和浏览器运行时\n- 给 Chromium 预留更大的 `/dev/shm`，避免白屏、崩溃和截图失败\n\n建议：\n\n- server 容器内运行 headless 浏览器\n- 通过 volume 持久化浏览器缓存和下载目录\n- 在生产环境收紧 `browser.security.allow_private_network`\n\n---\n\n## 与网页抓取的区别\n\n| 工具 | 适合场景 |\n|------|----------|\n| `浏览器` | 真实交互、点击、输入、截图、跨标签页操作 |\n| `网页抓取` | 直接读取网页正文、低噪声内容提取 |\n\n---\n\n## 扩展接口\n\n除了模型工具外，还提供：\n\n- `GET /wunder/browser/health`\n- `GET /wunder/browser/status`\n- `GET /wunder/browser/profiles`\n- `POST /wunder/browser/session/start`\n- `POST /wunder/browser/session/stop`\n- `GET /wunder/browser/tabs`\n- `POST /wunder/browser/tabs/open`\n- `POST /wunder/browser/tabs/focus`\n- `POST /wunder/browser/tabs/close`\n- `POST /wunder/browser/navigate`\n- `POST /wunder/browser/snapshot`\n- `POST /wunder/browser/act`\n- `POST /wunder/browser/screenshot`\n- `POST /wunder/browser/read_page`\n\n这些接口主要服务于后续调试面板、sidecar 和 Docker 运行形态。\n","source_path":"静态站文档/zh-CN/tools/browser.md"}</script>
