  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/browser","language":"zh-CN","title":"浏览器","summary":"`浏览器` 是 Wunder 在 desktop 模式下提供的交互型工具；需要真实页面会话时用它，不要用 `web_fetch` 硬顶。","updated_at":"2026-03-20","read_when":["你在做桌面自动化或网页交互","你要区分浏览器和网页抓取"],"source_docs":["docs/API文档.md","docs/系统介绍.md","src/services/tools/browser_tool.rs"],"tab":"工具","group":"网页与桌面","group_path":["网页与桌面"],"url":"/docs/zh-CN/tools/browser/","headings":[{"id":"section-1","level":1,"text":"浏览器"},{"id":"section-2","level":2,"text":"这页解决什么"},{"id":"section-3","level":2,"text":"先记这几条"},{"id":"section-4","level":2,"text":"什么时候先用它"},{"id":"section-5","level":2,"text":"当前动作"},{"id":"section-6","level":2,"text":"什么时候不要先用它"},{"id":"section-7","level":2,"text":"它为什么通常只在 desktop 下可用"},{"id":"section-8","level":2,"text":"readpage 和 webfetch 的区别"},{"id":"section-9","level":2,"text":"最容易搞错的点"},{"id":"section-10","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/tools/web-fetch","next_slug":"zh-CN/tools/desktop-control","markdown":"# 浏览器\n\n`浏览器` 是交互型工具，不是正文抓取工具。\n\n如果你要真实打开页面、点击、输入和截图，这页先看。\n\n## 这页解决什么\n\n- 浏览器工具能做哪些动作\n- 它和 `web_fetch` 的区别到底是什么\n- 为什么它通常只在 desktop 语境下出现\n\n## 先记这几条\n\n- 浏览器工具更偏 desktop 本地能力。\n- 它要求真实页面会话，所以成本比 `web_fetch` 更高，但交互能力也更强。\n- 当你已经在浏览器会话里操作页面时，继续用浏览器链路通常更自然。\n\n## 什么时候先用它\n\n- 你需要真的打开页面\n- 你需要点击或输入\n- 你需要截图确认页面状态\n- 你要在同一个页面会话里继续 `read_page`\n\n## 当前动作\n\n浏览器工具当前统一通过 `action` 驱动，核心动作包括：\n\n- `navigate`\n- `click`\n- `type`\n- `screenshot`\n- `read_page`\n- `close`\n\n常用参数也很直接：\n\n- `url`\n- `selector`\n- `text`\n\n## 什么时候不要先用它\n\n- 你只是想读一篇文章或帮助页正文\n- 你不需要交互\n- 你想尽量减少上下文噪声和执行成本\n\n这些场景优先看 [网页抓取](/docs/zh-CN/tools/web-fetch/)。\n\n## 它为什么通常只在 desktop 下可用\n\n当前可见性条件不是“代码里有这个工具就行”，而是：\n\n- 运行形态是 `desktop`\n- `tools.browser.enabled=true`\n\n所以文档里默认应把它理解成 desktop 本地交互工具，而不是所有 server 环境都天然可用。\n\n## `read_page` 和 `web_fetch` 的区别\n\n两者都能“读页面”，但语义不同：\n\n- `web_fetch`：直接提取正文\n- `browser.read_page`：建立在真实页面会话上的读取\n\n可以这样选：\n\n- 先读正文，优先 `web_fetch`\n- 先交互再读页，优先浏览器\n\n## 最容易搞错的点\n\n- 浏览器不是“更强版网页抓取”，它们解决的是两类问题。\n- 既然已经进入浏览器会话，再退回 `web_fetch` 读同一页面，通常会丢失交互上下文。\n- 浏览器工具可见，不代表当前运行环境就适合高频自动化；它仍然受 desktop 条件限制。\n\n## 相关文档\n\n- [网页抓取](/docs/zh-CN/tools/web-fetch/)\n- [桌面控制](/docs/zh-CN/tools/desktop-control/)\n- [Desktop 界面](/docs/zh-CN/surfaces/desktop-ui/)\n","source_path":"静态站文档/zh-CN/tools/browser.md"}</script>
