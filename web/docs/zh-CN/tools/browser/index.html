  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/browser","language":"zh-CN","title":"浏览器","summary":"`浏览器` 是 Wunder 在 desktop 模式下提供的页面交互工具，支持导航、点击、输入、截图和读页。","read_when":["你在做桌面自动化或网页交互","你要区分浏览器和网页抓取"],"source_docs":["docs/API文档.md","docs/系统介绍.md","src/services/tools/browser_tool.rs"],"tab":"工具","group":"网页与桌面","group_path":["网页与桌面"],"url":"/docs/zh-CN/tools/browser/","headings":[{"id":"section-1","level":1,"text":"浏览器"},{"id":"section-2","level":2,"text":"这页解决什么"},{"id":"section-3","level":2,"text":"当前动作"},{"id":"section-4","level":2,"text":"什么时候用它"},{"id":"section-5","level":2,"text":"为什么它通常是 desktop 工具"},{"id":"section-6","level":2,"text":"readpage 和网页抓取的区别"},{"id":"section-7","level":2,"text":"你最需要记住的点"},{"id":"section-8","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/tools/web-fetch","next_slug":"zh-CN/tools/desktop-control","markdown":"# 浏览器\n\n`浏览器` 是交互型工具，不是正文抓取工具。\n\n## 这页解决什么\n\n这页只解释：\n\n- 浏览器工具能做哪些动作\n- 它和网页抓取有什么区别\n- 为什么它通常只在 desktop 语境下出现\n\n## 当前动作\n\n浏览器工具当前统一通过 `action` 驱动，核心动作包括：\n\n- `navigate`\n- `click`\n- `type`\n- `screenshot`\n- `read_page`\n- `close`\n\n常用参数也很直接：\n\n- `url`\n- `selector`\n- `text`\n\n## 什么时候用它\n\n- 需要真的打开页面\n- 需要点击或输入\n- 需要截图确认页面状态\n\n## 为什么它通常是 desktop 工具\n\n因为当前 Wunder 的浏览器链路更偏本地桌面运行能力。\n\n所以文档里应默认理解为：\n\n- 这是 desktop 模式下的交互工具\n\n而不是所有 server 环境都天然可用。\n\n## `read_page` 和网页抓取的区别\n\n两者都能“读页面”，但语义不同：\n\n- `网页抓取`：直接提取正文\n- `浏览器.read_page`：建立在真实页面会话上的读取\n\n如果你已经在浏览器会话里交互了，通常继续用浏览器链路更自然。\n\n## 你最需要记住的点\n\n- 交互用浏览器，正文抓取用网页抓取。\n- 当前浏览器工具更偏 desktop 本地能力。\n- 核心动作是导航、点击、输入、截图和读页。\n\n## 相关文档\n\n- [网页抓取](/docs/zh-CN/tools/web-fetch/)\n- [桌面控制](/docs/zh-CN/tools/desktop-control/)\n- [Desktop 界面](/docs/zh-CN/surfaces/desktop-ui/)\n","source_path":"静态站文档/zh-CN/tools/browser.md"}</script>
