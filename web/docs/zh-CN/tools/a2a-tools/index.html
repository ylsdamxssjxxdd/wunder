  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/a2a-tools","language":"zh-CN","title":"A2A 工具","summary":"`a2a@service`、`a2a_observe`、`a2a_wait` 的当前返回结构。","updated_at":"2026-04-10","read_when":["你要调用外部 A2A 服务并跟踪任务状态"],"source_docs":["src/services/tools.rs"],"tab":"工具","group":"系统桥接","group_path":["系统桥接"],"url":"/docs/zh-CN/tools/a2a-tools/","headings":[{"id":"section-1","level":1,"text":"A2A 工具"},{"id":"section-2","level":2,"text":"a2a@服务名"},{"id":"section-3","level":2,"text":"a2aobserve"},{"id":"section-4","level":2,"text":"a2await"},{"id":"section-5","level":2,"text":"重点"}],"prev_slug":"zh-CN/tools/user-world","next_slug":"zh-CN/tools/node-invoke","markdown":"# A2A 工具\n\nA2A 现在是一组工具：\n\n- `a2a@服务名`\n- `a2a_observe`\n- `a2a_wait`\n\n## `a2a@服务名`\n\n提交任务，通常是接收态：\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"a2a_send\",\n  \"state\": \"accepted\",\n  \"summary\": \"Submitted task task_xxx to A2A service helper.\",\n  \"data\": {\n    \"endpoint\": \"https://a2a.example.com\",\n    \"service_name\": \"helper\",\n    \"task_id\": \"task_xxx\",\n    \"context_id\": \"ctx_xxx\",\n    \"status\": \"submitted\",\n    \"answer\": null\n  }\n}\n```\n\n## `a2a_observe`\n\n看当前快照：\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"a2a_observe\",\n  \"state\": \"running\",\n  \"summary\": \"Observed 2 A2A tasks; 1 still pending.\",\n  \"data\": {\n    \"tasks\": [ ... ],\n    \"pending\": [ ... ],\n    \"pending_total\": 1,\n    \"timeout\": false\n  }\n}\n```\n\n## `a2a_wait`\n\n等待一段时间直到完成或超时：\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"a2a_wait\",\n  \"state\": \"running\",\n  \"summary\": \"Observed 2 A2A tasks; 1 still pending.\",\n  \"data\": {\n    \"tasks\": [ ... ],\n    \"pending\": [ ... ],\n    \"pending_total\": 1,\n    \"elapsed_s\": 1.25,\n    \"timeout\": true\n  },\n  \"next_step_hint\": \"Call a2a_wait again or inspect the pending tasks before assuming the A2A workflow is complete.\"\n}\n```\n\n## 重点\n\n- `a2a@服务名` 负责发起\n- `a2a_observe` 负责看快照\n- `a2a_wait` 负责轮询等待\n","source_path":"使用说明书/zh-CN/tools/a2a-tools.md"}</script>
