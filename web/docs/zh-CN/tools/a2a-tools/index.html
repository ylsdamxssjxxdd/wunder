  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/a2a-tools","language":"zh-CN","title":"A2A 工具","summary":"Wunder 会把每个已启用的 A2A 服务暴露成 `a2a@服务名` 工具，再配合 `a2a观察`、`a2a等待` 做状态跟踪。","updated_at":"2026-03-20","read_when":["你要调用外部 A2A 服务","你要跟踪 A2A 任务的完成状态"],"source_docs":["src/services/tools/catalog.rs","src/services/tools.rs","docs/API文档.md"],"tab":"工具","group":"系统桥接","group_path":["系统桥接"],"url":"/docs/zh-CN/tools/a2a-tools/","headings":[{"id":"section-1","level":1,"text":"A2A 工具"},{"id":"section-2","level":2,"text":"a2a@服务名"},{"id":"section-3","level":2,"text":"a2a观察"},{"id":"section-4","level":2,"text":"a2a等待"},{"id":"section-5","level":2,"text":"推荐路径"},{"id":"section-6","level":2,"text":"和 MCP 的区别"},{"id":"section-7","level":2,"text":"实施建议"},{"id":"section-8","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/user-world","next_slug":"zh-CN/tools/node-invoke","markdown":"# A2A 工具\n\nWunder 的 A2A 能力不是一个固定工具名，而是一组工具：\n\n- `a2a@服务名`\n- `a2a观察`\n- `a2a等待`\n\n## `a2a@服务名`\n\n每个启用中的 A2A service 都会成为一个可直接调用的工具名。\n\n常用参数通常是：\n\n- `content`\n- `session_id`\n\n调用后系统会把任务信息写入本地任务存储，并返回：\n\n- `task_id`\n- `context_id`\n- `status`\n- `answer`\n\n## `a2a观察`\n\n`a2a观察` 用来拿当前任务快照。\n\n常用参数：\n\n- `task_ids`\n- `tasks`\n- `endpoint`\n- `service_name`\n- `refresh`\n- `timeout_s`\n\n它适合“看一眼现在进行到哪了”。\n\n## `a2a等待`\n\n`a2a等待` 用来轮询直到任务完成或超时。\n\n常用参数：\n\n- `wait_s`\n- `poll_interval_s`\n- `task_ids`\n- `tasks`\n- `endpoint`\n- `service_name`\n\n它适合“先发任务，再等结果回来”。\n\n## 推荐路径\n\n最常见的使用顺序是：\n\n- `a2a@服务名`\n- `a2a观察`\n- `a2a等待`\n\n如果你只想拿最终结果，通常直接 `a2a@服务名 -> a2a等待` 就够了。\n\n## 和 MCP 的区别\n\n- A2A 更像“面向智能体服务”的任务调用。\n- MCP 更像“面向工具服务器”的能力接入。\n\n两者都会进入统一工具体系，但协议模型不同。\n\n## 实施建议\n\n- A2A 真正的执行入口是 `a2a@服务名`。\n- `a2a观察` 看快照，`a2a等待` 做轮询等待。\n- Wunder 会把任务状态写回本地存储，而不是只在内存里短暂保留。\n\n## 延伸阅读\n\n- [A2A 接口](/docs/zh-CN/integration/a2a/)\n- [MCP 入口](/docs/zh-CN/integration/mcp-endpoint/)\n- [蜂群协作](/docs/zh-CN/concepts/swarm/)\n","source_path":"静态站文档/zh-CN/tools/a2a-tools.md"}</script>
