  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/memory-manager","language":"zh-CN","title":"记忆管理","summary":"记忆管理是 Wunder 的结构化长期记忆工具，重点动作是 list、add、update、delete、clear 和 recall。","updated_at":"2026-03-21","read_when":["你要理解模型如何主动检索和维护记忆碎片","你想知道 recall 为什么不会回写当前线程 prompt"],"source_docs":["src/services/tools/memory_manager_tool.rs","src/services/tools/catalog.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/memory-manager/","headings":[{"id":"section-1","level":1,"text":"记忆管理"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"支持的动作"},{"id":"section-5","level":2,"text":"使用示例"},{"id":"section-6","level":3,"text":"列出记忆"},{"id":"section-7","level":3,"text":"添加记忆"},{"id":"section-8","level":3,"text":"更新记忆"},{"id":"section-9","level":3,"text":"删除记忆"},{"id":"section-10","level":3,"text":"召回记忆"},{"id":"section-11","level":2,"text":"recall 的定位"},{"id":"section-12","level":2,"text":"适用场景"},{"id":"section-13","level":2,"text":"常见误区"},{"id":"section-14","level":3,"text":"把 recall 当成 prompt 重写"},{"id":"section-15","level":3,"text":"把记忆工具当普通笔记工具"},{"id":"section-16","level":2,"text":"注意事项"},{"id":"section-17","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/agent-swarm","next_slug":"zh-CN/tools/channel","markdown":"# 记忆管理\n\n结构化长期记忆工具。\n\n---\n\n## 功能说明\n\n`记忆管理` 不是「把一段文本塞进 prompt」，而是结构化长期记忆的工具入口。\n\n**别名**：\n- `memory_manager`\n- `memory_manage`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `action` | string | ✅ | 要执行的动作 |\n| 其他参数 | - | ❌ | 根据 action 不同而不同 |\n\n---\n\n## 支持的动作\n\n| 动作 | 说明 | 常用附加参数 |\n|------|------|--------------|\n| `list` | 列出记忆 | - |\n| `add` | 添加记忆 | `title`, `content`, `category`, `tags` |\n| `update` | 更新记忆 | `id`, `title`, `content`, `category`, `tags` |\n| `delete` | 删除记忆 | `id` |\n| `clear` | 清空记忆 | - |\n| `recall` | 召回记忆 | `query`, `limit` |\n\n---\n\n## 使用示例\n\n### 列出记忆\n\n```json\n{\n  \"action\": \"list\"\n}\n```\n\n### 添加记忆\n\n```json\n{\n  \"action\": \"add\",\n  \"title\": \"用户偏好\",\n  \"content\": \"用户喜欢使用深色主题，偏好简洁的界面设计\",\n  \"category\": \"user_preference\",\n  \"tags\": [\"theme\", \"ui\", \"preference\"]\n}\n```\n\n### 更新记忆\n\n```json\n{\n  \"action\": \"update\",\n  \"id\": \"mem-123\",\n  \"title\": \"用户偏好\",\n  \"content\": \"用户喜欢使用深色主题，偏好简洁的界面设计，字体大小偏好 14px\",\n  \"category\": \"user_preference\",\n  \"tags\": [\"theme\", \"ui\", \"preference\", \"font\"]\n}\n```\n\n### 删除记忆\n\n```json\n{\n  \"action\": \"delete\",\n  \"id\": \"mem-123\"\n}\n```\n\n### 召回记忆\n\n```json\n{\n  \"action\": \"recall\",\n  \"query\": \"用户主题偏好\",\n  \"limit\": 5\n}\n```\n\n---\n\n## recall 的定位\n\n当前 `recall` 更强调：\n- 轻量关键词召回\n\n而不是：\n- 每轮自动改写线程 system prompt\n\n这点非常重要，因为 Wunder 的线程提示词一旦冻结，就不会在后续轮次被回写。\n\n---\n\n## 适用场景\n\n✅ **适合使用记忆管理**：\n- 模型对某个用户偏好或历史事实没有把握\n- 用户刚指出「你记错了」\n- 当前问题需要查已有长期记忆碎片\n- 保存重要的用户偏好、事实、上下文\n- 按关键词召回相关记忆\n\n---\n\n## 常见误区\n\n### 把 recall 当成 prompt 重写\n\n❌ 不对。它返回的是召回结果，不是直接重写当前线程的冻结提示词。\n\n### 把记忆工具当普通笔记工具\n\n❌ 也不对。这里更关注结构化事实、标题、分类、标签和版本替代关系。\n\n---\n\n## 注意事项\n\n1. **不是动态 prompt 改写器**：\n   - 是结构化长期记忆工具\n   - 不是动态 prompt 改写器\n\n2. **recall 的目标**：\n   - `recall` 的目标是主动检索\n   - 不是回写当前线程\n\n3. **线程冻结规则**：\n   - 记忆治理要和线程冻结规则一起理解\n   - 线程提示词一旦冻结就不会再被改写\n\n---\n\n## 延伸阅读\n\n- [长期记忆](/docs/zh-CN/concepts/memory/)\n- [提示词与技能](/docs/zh-CN/concepts/prompt-and-skills/)\n- [额度与 Token 占用](/docs/zh-CN/concepts/quota-and-token-usage/)\n","source_path":"静态站文档/zh-CN/tools/memory-manager.md"}</script>
