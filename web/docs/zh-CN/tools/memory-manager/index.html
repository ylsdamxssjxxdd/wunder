  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/memory-manager","language":"zh-CN","title":"记忆管理","summary":"`记忆管理` 是 Wunder 的结构化长期记忆工具，重点动作是 list、add、update、delete、clear 和 recall。","updated_at":"2026-03-20","read_when":["你要理解模型如何主动检索和维护记忆碎片","你想知道 recall 为什么不会回写当前线程 prompt"],"source_docs":["docs/API文档.md","docs/设计方案.md","src/services/tools/memory_manager_tool.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/memory-manager/","headings":[{"id":"section-1","level":1,"text":"记忆管理"},{"id":"section-2","level":2,"text":"当前动作"},{"id":"section-3","level":2,"text":"recall 现在的定位"},{"id":"section-4","level":2,"text":"什么时候该用它"},{"id":"section-5","level":2,"text":"常见误区"},{"id":"section-6","level":3,"text":"把 recall 当成 prompt 重写"},{"id":"section-7","level":3,"text":"把记忆工具当普通笔记工具"},{"id":"section-8","level":2,"text":"实施建议"},{"id":"section-9","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/agent-swarm","next_slug":"zh-CN/tools/channel","markdown":"# 记忆管理\n\n`记忆管理` 不是“把一段文本塞进 prompt”，而是结构化长期记忆的工具入口。\n\n## 当前动作\n\n- `list`\n- `add`\n- `update`\n- `delete`\n- `clear`\n- `recall`\n\n其中最关键的通常是：\n\n- `add`\n- `update`\n- `recall`\n\n## `recall` 现在的定位\n\n当前 `recall` 更强调：\n\n- 轻量关键词召回\n\n而不是：\n\n- 每轮自动改写线程 system prompt\n\n这点非常重要，因为 Wunder 的线程提示词一旦冻结，就不会在后续轮次被回写。\n\n## 什么时候该用它\n\n- 模型对某个用户偏好或历史事实没有把握\n- 用户刚指出“你记错了”\n- 当前问题需要查已有长期记忆碎片\n\n## 常见误区\n\n### 把 recall 当成 prompt 重写\n\n不对。\n\n它返回的是召回结果，不是直接重写当前线程的冻结提示词。\n\n### 把记忆工具当普通笔记工具\n\n也不对。\n\n这里更关注结构化事实、标题、分类、标签和版本替代关系。\n\n## 实施建议\n\n- `记忆管理` 是结构化长期记忆工具，不是动态 prompt 改写器。\n- `recall` 的目标是主动检索，不是回写当前线程。\n- 记忆治理要和线程冻结规则一起理解。\n\n## 延伸阅读\n\n- [长期记忆](/docs/zh-CN/concepts/memory/)\n- [提示词与技能](/docs/zh-CN/concepts/prompt-and-skills/)\n- [额度与 Token 占用](/docs/zh-CN/concepts/quota-and-token-usage/)\n","source_path":"静态站文档/zh-CN/tools/memory-manager.md"}</script>
