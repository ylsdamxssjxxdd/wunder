  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/memory-manager","language":"zh-CN","title":"记忆管理","summary":"说明 `memory_manager` 的当前动作、精简结构，以及“短索引注入 + get 取全文”的使用方式。","updated_at":"2026-04-12","read_when":["你要新增、检索、读取、更新或删除长期记忆碎片"],"source_docs":["src/services/tools/memory_manager_tool.rs","src/services/memory_fragments.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/memory-manager/","headings":[{"id":"section-1","level":1,"text":"记忆管理"},{"id":"section-2","level":2,"text":"使用原则"},{"id":"section-3","level":2,"text":"list"},{"id":"section-4","level":2,"text":"search"},{"id":"section-5","level":2,"text":"get"},{"id":"section-6","level":2,"text":"写入示例"},{"id":"section-7","level":2,"text":"关键约束"}],"prev_slug":"zh-CN/tools/agent-swarm","next_slug":"zh-CN/tools/channel","markdown":"# 记忆管理\n\n`memory_manager` 用于管理当前智能体在当前用户作用域下的长期记忆。\n\n当前标准动作：\n\n- `list`\n- `search`\n- `get`\n- `add`\n- `update`\n- `remove`\n- `clear`\n\n## 使用原则\n\n- system prompt 默认只注入短 `memory_id + title` 索引\n- 不会自动注入完整 `content`\n- 需要完整细节时，先用 `list/search` 找到 `memory_id`，再用 `get`\n- 模型侧 `memory_id` 尽量保持 8 个字符以内，方便搜索与定位\n- `add/update` 只使用当前核心字段：\n  - `title`\n  - `content`\n  - `tag`\n  - `related_memory_id`\n  - `memory_time`\n\n## `list`\n\n返回最近记忆索引，默认 30 条。\n\n```json\n{\n  \"action\": \"list\",\n  \"data\": {\n    \"count\": 1,\n    \"items\": [\n      {\n        \"memory_id\": \"0695f345\",\n        \"title\": \"用户姓名\",\n        \"tag\": \"profile\",\n        \"updated_at\": 1775957851\n      }\n    ]\n  }\n}\n```\n\n## `search`\n\n搜索标题或内容匹配项，默认 10 条。\n\n```json\n{\n  \"action\": \"search\",\n  \"data\": {\n    \"query\": \"周华健\",\n    \"count\": 1,\n    \"items\": [\n      {\n        \"memory_id\": \"0695f345\",\n        \"title\": \"用户姓名\",\n        \"tag\": \"profile\",\n        \"snippet\": \"用户的名字是周华健。这是用户在对话开始时自我介绍提供的信息。\",\n        \"matched_in\": [\"content\"],\n        \"updated_at\": 1775957851\n      }\n    ]\n  }\n}\n```\n\n## `get`\n\n按 `memory_id` 读取完整内容。\n\n```json\n{\n  \"action\": \"get\",\n  \"data\": {\n    \"memory_id\": \"0695f345\",\n    \"item\": {\n      \"memory_id\": \"0695f345\",\n      \"title\": \"用户姓名\",\n      \"content\": \"用户的名字是周华健。这是用户在对话开始时自我介绍提供的信息。\",\n      \"tag\": \"profile\",\n      \"related_memory_id\": null,\n      \"memory_time\": 1775957820,\n      \"updated_at\": 1775957851\n    }\n  }\n}\n```\n\n## 写入示例\n\n```json\n{\n  \"action\": \"add\",\n  \"title\": \"用户姓名\",\n  \"content\": \"用户的名字是周华健。这是用户在对话开始时自我介绍提供的信息。\",\n  \"tag\": \"profile\",\n  \"memory_time\": \"2026-04-12T08:37:00+08:00\"\n}\n```\n\n## 关键约束\n\n以下旧字段不再作为推荐输入：\n\n- `summary`\n- `tags`\n- `entities`\n- `category`\n\n实用规则：\n\n- `list/search` 是主检索动作\n- `get` 是唯一完整详情读取动作\n- 写入只影响后续新线程，不会回写已冻结线程的 system prompt\n","source_path":"使用说明书/zh-CN/tools/memory-manager.md"}</script>
