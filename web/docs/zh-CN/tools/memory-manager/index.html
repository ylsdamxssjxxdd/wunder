  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/memory-manager","language":"zh-CN","title":"记忆管理","summary":"`memory_manager` 的动作、记忆范围与返回结构。","updated_at":"2026-04-10","read_when":["你要增删改查长期记忆片段"],"source_docs":["src/services/tools/memory_manager_tool.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/memory-manager/","headings":[{"id":"section-1","level":1,"text":"记忆管理"},{"id":"section-2","level":2,"text":"list"},{"id":"section-3","level":2,"text":"add"},{"id":"section-4","level":2,"text":"recall"},{"id":"section-5","level":2,"text":"重点"}],"prev_slug":"zh-CN/tools/agent-swarm","next_slug":"zh-CN/tools/channel","markdown":"# 记忆管理\n\n`memory_manager` 已经统一到标准成功骨架。  \n主要动作：\n\n- `list`\n- `recall`\n- `add`\n- `update`\n- `delete`\n- `clear`\n\n## `list`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"list\",\n  \"state\": \"completed\",\n  \"summary\": \"Listed 3 memory entries.\",\n  \"data\": {\n    \"count\": 3,\n    \"items\": [\n      {\n        \"memory_id\": \"mem_xxx\",\n        \"title\": \"用户偏好\",\n        \"summary\": \"偏好简洁回答\",\n        \"content\": \"用户希望回答简洁\",\n        \"category\": \"tool-note\",\n        \"tags\": [\"preference\"],\n        \"status\": \"active\",\n        \"updated_at\": 1760000000\n      }\n    ],\n    \"agent_id\": \"agent_docs\"\n  }\n}\n```\n\n## `add`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"add\",\n  \"state\": \"completed\",\n  \"summary\": \"Saved a memory entry.\",\n  \"data\": {\n    \"memory_id\": \"mem_xxx\",\n    \"saved\": true,\n    \"agent_id\": \"agent_docs\"\n  },\n  \"next_step_hint\": \"...\"\n}\n```\n\n## `recall`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"recall\",\n  \"state\": \"completed\",\n  \"summary\": \"Recalled 2 memory entries.\",\n  \"data\": {\n    \"query\": \"用户偏好\",\n    \"count\": 2,\n    \"items\": [\n      {\n        \"memory_id\": \"mem_xxx\",\n        \"title\": \"用户偏好\",\n        \"summary\": \"偏好简洁回答\",\n        \"content\": \"用户希望回答简洁\",\n        \"category\": \"tool-note\",\n        \"tags\": [\"preference\"],\n        \"status\": \"active\",\n        \"updated_at\": 1760000000,\n        \"why\": \"matched 用户偏好; in title/summary\"\n      }\n    ],\n    \"agent_id\": \"agent_docs\"\n  }\n}\n```\n\n## 重点\n\n- 返回里会把 `agent_id` 直接补进 `data`\n- `recall` 更偏向“给当前上下文提供回忆”\n- 一些成功返回会带 `next_step_hint`，提醒只对新会话生效或只影响当前会话回忆语义\n","source_path":"使用说明书/zh-CN/tools/memory-manager.md"}</script>
