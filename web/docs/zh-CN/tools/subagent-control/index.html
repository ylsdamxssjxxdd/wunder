  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/subagent-control","language":"zh-CN","title":"子智能体控制","summary":"子智能体控制面向单个子会话运行的发现、历史查看、发消息和派生，适合盯住一个子运行而不是大范围并发派发。","updated_at":"2026-03-21","read_when":["你要查看或操作某个子会话","你要区分子智能体控制和智能体蜂群"],"source_docs":["src/services/tools/catalog.rs","src/services/tools.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/subagent-control/","headings":[{"id":"section-1","level":1,"text":"子智能体控制"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"支持的动作"},{"id":"section-5","level":2,"text":"使用示例"},{"id":"section-6","level":3,"text":"列出子会话"},{"id":"section-7","level":3,"text":"查看子会话历史"},{"id":"section-8","level":3,"text":"给子会话发消息"},{"id":"section-9","level":3,"text":"派生新子会话"},{"id":"section-10","level":2,"text":"与其他协作工具的区别"},{"id":"section-11","level":2,"text":"推荐路径"},{"id":"section-12","level":2,"text":"适用场景"},{"id":"section-13","level":2,"text":"注意事项"},{"id":"section-14","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/thread-control","next_slug":"zh-CN/tools/agent-swarm","markdown":"# 子智能体控制\n\n管理单个子会话的工具。\n\n---\n\n## 功能说明\n\n如果 `会话线程控制` 解决的是线程树，`子智能体控制` 解决的就是单个子运行本身。\n\n**别名**：\n- `subagent_control`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `action` | string | ✅ | 要执行的动作 |\n| 其他参数 | - | ❌ | 根据 action 不同而不同 |\n\n---\n\n## 支持的动作\n\n| 动作 | 说明 | 常用附加参数 |\n|------|------|--------------|\n| `list` | 列出子会话 | `parentId`, `limit`, `activeMinutes` |\n| `history` | 查看子会话历史 | `session_id`, `sessionKey`, `messageLimit` |\n| `send` | 给子会话发消息 | `session_id`, `sessionKey`, `message`, `timeoutSeconds` |\n| `spawn` | 派生新子会话 | `parentId`, `task`, `label`, `agentId`, `model`, `runTimeoutSeconds`, `cleanup` |\n\n---\n\n## 使用示例\n\n### 列出子会话\n\n```json\n{\n  \"action\": \"list\",\n  \"parentId\": \"main-session-123\",\n  \"limit\": 10,\n  \"activeMinutes\": 60\n}\n```\n\n### 查看子会话历史\n\n```json\n{\n  \"action\": \"history\",\n  \"sessionKey\": \"sub-session-456\",\n  \"messageLimit\": 50\n}\n```\n\n### 给子会话发消息\n\n```json\n{\n  \"action\": \"send\",\n  \"sessionKey\": \"sub-session-456\",\n  \"message\": \"请继续分析这个问题\",\n  \"timeoutSeconds\": 300\n}\n```\n\n### 派生新子会话\n\n```json\n{\n  \"action\": \"spawn\",\n  \"parentId\": \"main-session-123\",\n  \"task\": \"分析这个代码的性能问题\",\n  \"label\": \"性能分析\",\n  \"agentId\": \"code-analyzer\",\n  \"model\": \"gpt-4\",\n  \"runTimeoutSeconds\": 600,\n  \"cleanup\": true\n}\n```\n\n---\n\n## 与其他协作工具的区别\n\n| 工具 | 说明 | 适用场景 |\n|------|------|----------|\n| [会话线程控制](/docs/zh-CN/tools/thread-control/) | 线程树结构管理 | 管理线程树和主线程 |\n| 子智能体控制 | 单个子会话管理 | 盯住一个子运行 |\n| [智能体蜂群](/docs/zh-CN/tools/agent-swarm/) | 多智能体并发协作 | 大范围并发派发 |\n\n---\n\n## 推荐路径\n\n- 看子运行列表：`list`\n- 查某个子运行内容：`history`\n- 派生新子运行：`spawn`\n- 继续追问已有子运行：`send`\n\n---\n\n## 适用场景\n\n✅ **适合使用子智能体控制**：\n- 列出某个父会话下的子运行\n- 查看某个子会话历史\n- 给指定子会话继续发消息\n- 派生一个新的子运行\n\n---\n\n## 注意事项\n\n1. **单个子会话**：\n   - 面向单个子会话，不是面向整个线程树\n   - 如果已经知道要操作哪一个子会话，这个工具最直接\n\n2. **spawn 与 send 的区别**：\n   - `spawn` 更像派生一次后台运行\n   - `send` 更像继续驱动已有子会话\n\n3. **单目标工具**：\n   - 它是单目标工具\n   - 多目标并发优先看智能体蜂群\n\n---\n\n## 延伸阅读\n\n- [会话线程控制](/docs/zh-CN/tools/thread-control/)\n- [智能体蜂群](/docs/zh-CN/tools/agent-swarm/)\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n","source_path":"静态站文档/zh-CN/tools/subagent-control.md"}</script>
