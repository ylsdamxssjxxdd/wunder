  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/subagent-control","language":"zh-CN","title":"子智能体控制","summary":"`subagent_control` 的动作、等待语义、状态语义与返回结构。","updated_at":"2026-04-10","read_when":["你要在当前会话内派生子智能体临时工作"],"source_docs":["src/services/tools/subagent_control.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/subagent-control/","headings":[{"id":"section-1","level":1,"text":"子智能体控制"},{"id":"section-2","level":2,"text":"适用场景"},{"id":"section-3","level":2,"text":"主要动作"},{"id":"section-4","level":2,"text":"spawn"},{"id":"section-5","level":2,"text":"list"},{"id":"section-6","level":2,"text":"history"},{"id":"section-7","level":2,"text":"status / wait"},{"id":"section-8","level":3,"text":"status"},{"id":"section-9","level":3,"text":"wait"},{"id":"section-10","level":2,"text":"interrupt / close / resume"},{"id":"section-11","level":2,"text":"重点理解"}],"prev_slug":"zh-CN/tools/thread-control","next_slug":"zh-CN/tools/agent-swarm","markdown":"# 子智能体控制\n\n`subagent_control` 现在是一个明确的多动作工具，不再只是旧版的简单“拉子线程”。\n\n## 适用场景\n\n它适合：\n\n- 在当前主智能体会话里临时派生子智能体\n- 查看、等待、打断、关闭、恢复这些子运行\n- 做一轮或多轮派生协作\n\n它不适合：\n\n- 调度用户已经存在的其他正式智能体  \n那是 [智能体蜂群](/docs/zh-CN/tools/agent-swarm/)\n\n## 主要动作\n\n- `list`\n- `history`\n- `send`\n- `spawn`\n- `batch_spawn`\n- `status`\n- `wait`\n- `interrupt`\n- `close`\n- `resume`\n\n## `spawn`\n\n用于拉起新的子智能体运行。\n\n典型返回会是“已接收但尚未结束”：\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"spawn\",\n  \"state\": \"accepted\",\n  \"summary\": \"Spawned child run ...\",\n  \"data\": {\n    \"run_id\": \"run_xxx\",\n    \"session_id\": \"sess_xxx\",\n    \"status\": \"accepted\"\n  },\n  \"next_step_hint\": \"Use subagent_control.wait/status/history before treating unfinished child runs as complete.\"\n}\n```\n\n## `list`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"list\",\n  \"state\": \"completed\",\n  \"summary\": \"Found 3 child sessions.\",\n  \"data\": {\n    \"total\": 3,\n    \"items\": [\n      {\n        \"dispatch_id\": \"dispatch_xxx\",\n        \"run_id\": \"run_xxx\",\n        \"session_id\": \"sess_xxx\",\n        \"status\": \"running\",\n        \"terminal\": false,\n        \"failed\": false,\n        \"agent_id\": \"worker-a\",\n        \"label\": \"检索资料\",\n        \"elapsed_s\": 12.3,\n        \"result_preview\": null,\n        \"error\": null\n      }\n    ]\n  }\n}\n```\n\n## `history`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"history\",\n  \"state\": \"completed\",\n  \"summary\": \"Loaded 18 messages from child session history.\",\n  \"data\": {\n    \"session_id\": \"sess_xxx\",\n    \"messages\": [ ... ]\n  }\n}\n```\n\n## `status` / `wait`\n\n这两个动作最关键。\n\n### `status`\n\n看快照，不阻塞：\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"status\",\n  \"state\": \"running\",\n  \"summary\": \"1 child runs are still active.\",\n  \"data\": {\n    \"status\": \"running\",\n    \"items\": [ ... ],\n    \"selected_items\": [ ... ]\n  }\n}\n```\n\n### `wait`\n\n轮询等待，会根据结果变成：\n\n- `completed`\n- `running`\n- `timeout`\n- `partial`\n\n并且常带：\n\n```json\n{\n  \"next_step_hint\": \"Use subagent_control.wait/status/history before treating unfinished child runs as complete.\"\n}\n```\n\n## `interrupt` / `close` / `resume`\n\n这几个动作返回的核心是“哪些子会话被更新了”：\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"interrupt\",\n  \"state\": \"completed\",\n  \"summary\": \"interrupt updated 1 child sessions.\",\n  \"data\": {\n    \"updated_total\": 1,\n    \"items\": [\n      {\n        \"session_id\": \"sess_xxx\",\n        \"status\": \"cancelling\"\n      }\n    ]\n  }\n}\n```\n\n## 重点理解\n\n- `accepted` 不等于完成\n- `status` 是看快照\n- `wait` 才是等待收敛\n- 有 `next_step_hint` 时，说明系统明确希望你继续跟进而不是直接收尾\n","source_path":"使用说明书/zh-CN/tools/subagent-control.md"}</script>
