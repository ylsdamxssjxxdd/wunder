  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/desktop-control","language":"zh-CN","title":"桌面控制","summary":"桌面控制器和桌面监视器提供完整的桌面自动化能力，基于坐标框执行桌面动作和截图观察。","updated_at":"2026-03-21","read_when":["你要在 Desktop 模式下自动化桌面操作","你需要了解 bbox 坐标框的使用方法"],"source_docs":["src/services/tools/desktop_control.rs","src/services/tools/catalog.rs"],"tab":"工具","group":"网页与桌面","group_path":["网页与桌面"],"url":"/docs/zh-CN/tools/desktop-control/","headings":[{"id":"section-1","level":1,"text":"桌面控制"},{"id":"section-2","level":2,"text":"桌面控制器"},{"id":"section-3","level":3,"text":"功能说明"},{"id":"section-4","level":3,"text":"参数说明"},{"id":"section-5","level":3,"text":"支持的动作"},{"id":"section-6","level":3,"text":"使用示例"},{"id":"section-7","level":4,"text":"左键单击"},{"id":"section-8","level":4,"text":"输入文本"},{"id":"section-9","level":4,"text":"按键操作"},{"id":"section-10","level":4,"text":"拖拽操作"},{"id":"section-11","level":2,"text":"桌面监视器"},{"id":"section-12","level":3,"text":"功能说明"},{"id":"section-13","level":3,"text":"参数说明"},{"id":"section-14","level":3,"text":"使用示例"},{"id":"section-15","level":2,"text":"完整工作流示例"},{"id":"section-16","level":3,"text":"打开记事本并输入文本"},{"id":"section-17","level":2,"text":"注意事项"},{"id":"section-18","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/browser","next_slug":"zh-CN/tools/panels-and-a2ui","markdown":"# 桌面控制\n\n桌面自动化由两个核心工具组成：\n- **桌面控制器**：执行各种桌面动作\n- **桌面监视器**：观察桌面状态变化\n\n---\n\n## 桌面控制器\n\n### 功能说明\n\n基于 `bbox + action` 执行桌面操作，支持鼠标、键盘、拖拽等完整操作。\n\n**别名**：\n- `desktop_controller`\n- `desktop_control`\n- `desktop`\n\n### 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `bbox` | array | ✅ | 目标区域坐标，支持 2 或 4 个整数 |\n| `action` | string | ✅ | 要执行的动作 |\n| `description` | string | ✅ | 动作说明，用于日志和审计 |\n| `key` | string | ❌ | 按键名称（press_key 动作使用） |\n| `text` | string | ❌ | 要输入的文本（type_text 动作使用） |\n| `delay_ms` | integer | ❌ | 延迟毫秒数 |\n| `duration_ms` | integer | ❌ | 持续时间毫秒数 |\n| `scroll_steps` | integer | ❌ | 滚动步数 |\n| `to_bbox` | array | ❌ | 拖拽目标坐标（drag_drop 动作使用） |\n\n### 支持的动作\n\n| 动作 | 说明 | 必填附加参数 |\n|------|------|--------------|\n| `left_click` | 左键单击 | - |\n| `left_double_click` | 左键双击 | - |\n| `right_click` | 右键单击 | - |\n| `middle_click` | 中键单击 | - |\n| `left_hold` | 左键按住 | `duration_ms` |\n| `right_hold` | 右键按住 | `duration_ms` |\n| `middle_hold` | 中键按住 | `duration_ms` |\n| `left_release` | 左键释放 | - |\n| `right_release` | 右键释放 | - |\n| `middle_release` | 中键释放 | - |\n| `scroll_down` | 向下滚动 | `scroll_steps` |\n| `scroll_up` | 向上滚动 | `scroll_steps` |\n| `press_key` | 按键 | `key` |\n| `type_text` | 输入文本 | `text` |\n| `delay` | 延迟等待 | `delay_ms` |\n| `move_mouse` | 移动鼠标 | - |\n| `drag_drop` | 拖拽 | `to_bbox` |\n\n### 使用示例\n\n#### 左键单击\n```json\n{\n  \"bbox\": [100, 200, 300, 400],\n  \"action\": \"left_click\",\n  \"description\": \"点击开始按钮\"\n}\n```\n\n#### 输入文本\n```json\n{\n  \"bbox\": [500, 300],\n  \"action\": \"type_text\",\n  \"text\": \"Hello World!\",\n  \"description\": \"在输入框中输入文本\"\n}\n```\n\n#### 按键操作\n```json\n{\n  \"bbox\": [200, 150],\n  \"action\": \"press_key\",\n  \"key\": \"enter\",\n  \"description\": \"按下回车键\"\n}\n```\n\n#### 拖拽操作\n```json\n{\n  \"bbox\": [100, 100, 200, 200],\n  \"action\": \"drag_drop\",\n  \"to_bbox\": [300, 300, 400, 400],\n  \"description\": \"拖拽文件到目标位置\"\n}\n```\n\n---\n\n## 桌面监视器\n\n### 功能说明\n\n等待指定时间后返回桌面截图，用于观察桌面状态变化。\n\n**别名**：\n- `desktop_monitor`\n- `desktop_screenshot`\n\n### 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `wait_ms` | integer | ✅ | 等待毫秒数，最大 30000 毫秒（30 秒） |\n| `note` | string | ❌ | 观察说明 |\n\n### 使用示例\n\n```json\n{\n  \"wait_ms\": 2000,\n  \"note\": \"等待 2 秒后截图观察界面变化\"\n}\n```\n\n---\n\n## 完整工作流示例\n\n### 打开记事本并输入文本\n\n```json\n// 1. 先截图确认当前状态\n{\n  \"wait_ms\": 500,\n  \"note\": \"初始状态观察\"\n}\n\n// 2. 点击开始菜单\n{\n  \"bbox\": [50, 1050, 150, 1080],\n  \"action\": \"left_click\",\n  \"description\": \"点击开始菜单\"\n}\n\n// 3. 等待菜单打开\n{\n  \"wait_ms\": 1000,\n  \"note\": \"等待菜单打开\"\n}\n\n// 4. 输入记事本\n{\n  \"bbox\": [100, 200],\n  \"action\": \"type_text\",\n  \"text\": \"记事本\",\n  \"description\": \"搜索记事本\"\n}\n\n// 5. 按回车打开\n{\n  \"bbox\": [150, 250],\n  \"action\": \"press_key\",\n  \"key\": \"enter\",\n  \"description\": \"打开记事本\"\n}\n\n// 6. 等待记事本打开\n{\n  \"wait_ms\": 2000,\n  \"note\": \"等待记事本打开\"\n}\n\n// 7. 在记事本中输入文本\n{\n  \"bbox\": [300, 300, 800, 600],\n  \"action\": \"type_text\",\n  \"text\": \"Hello from wunder!\",\n  \"description\": \"在记事本中输入文本\"\n}\n\n// 8. 截图确认结果\n{\n  \"wait_ms\": 1000,\n  \"note\": \"确认操作完成观察\"\n}\n```\n\n---\n\n## 注意事项\n\n1. **`bbox` 坐标格式说明：\n   - 4 个整数：`[x1, y1, x2, y2]` - 矩形区域\n   - 2 个整数：`[x, y]` - 点坐标\n\n2. **`description` 必须填写**：\n   - 桌面操作比文件工具更危险\n   - 便于日志、审计和后续排障\n\n3. **可见性限制**：\n   - 仅在 Desktop 模式下可用\n   - Server 和 CLI 模式不可用\n\n4. **安全提示**：\n   - 操作前先用 `桌面监视器` 确认状态\n   - 操作后再次确认结果\n\n---\n\n## 延伸阅读\n\n- [浏览器](/docs/zh-CN/tools/browser/)\n- [Desktop 界面](/docs/zh-CN/surfaces/desktop-ui/)\n","source_path":"静态站文档/zh-CN/tools/desktop-control.md"}</script>
