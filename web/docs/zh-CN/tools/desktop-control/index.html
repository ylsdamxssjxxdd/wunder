  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/desktop-control","language":"zh-CN","title":"桌面控制","summary":"`desktop_controller` 与 `desktop_monitor` 的最新行为和返回结构。","updated_at":"2026-04-10","read_when":["你要控制本机桌面或观察桌面截图"],"source_docs":["src/services/tools/desktop_control.rs"],"tab":"工具","group":"网页与桌面","group_path":["网页与桌面"],"url":"/docs/zh-CN/tools/desktop-control/","headings":[{"id":"section-1","level":1,"text":"桌面控制"},{"id":"section-2","level":2,"text":"desktopcontroller"},{"id":"section-3","level":3,"text":"最小参数"},{"id":"section-4","level":3,"text":"成功返回"},{"id":"section-5","level":2,"text":"desktopmonitor"},{"id":"section-6","level":3,"text":"最小参数"},{"id":"section-7","level":3,"text":"成功返回"},{"id":"section-8","level":2,"text":"注意点"},{"id":"section-9","level":2,"text":"与浏览器的区别"}],"prev_slug":"zh-CN/tools/browser","next_slug":"zh-CN/tools/panels-and-a2ui","markdown":"# 桌面控制\n\n这一组工具是：\n\n- `desktop_controller`\n- `desktop_monitor`\n\n它们成功时走统一骨架，但 `data` 里会带截图路径、下载地址和 follow-up prompt。  \n随后系统还可能自动补一条带图片的后续 user message，供模型继续看图。\n\n## `desktop_controller`\n\n### 最小参数\n\n```json\n{\n  \"bbox\": { \"x\": 100, \"y\": 100, \"width\": 80, \"height\": 40 },\n  \"action\": \"left_click\",\n  \"description\": \"点击保存按钮\"\n}\n```\n\n### 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"desktop_controller\",\n  \"state\": \"completed\",\n  \"summary\": \"Completed desktop action left_click.\",\n  \"data\": {\n    \"action\": \"left_click\",\n    \"description\": \"点击保存按钮\",\n    \"center_norm\": [640, 360],\n    \"center_screen\": [960, 540],\n    \"normalized_width\": 1280,\n    \"normalized_height\": 720,\n    \"screen_width\": 1920,\n    \"screen_height\": 1080,\n    \"screenshot_path\": \"C:/.../desktop_controller/a.png\",\n    \"previous_screenshot_path\": null,\n    \"screenshot_download_url\": \"/wunder/temp_dir/download?...\",\n    \"screenshot_bytes\": 182233,\n    \"elapsed_ms\": 742,\n    \"followup_prompt\": \"...\"\n  }\n}\n```\n\n## `desktop_monitor`\n\n### 最小参数\n\n```json\n{\n  \"wait_ms\": 1000,\n  \"note\": \"等页面稳定后再截图\"\n}\n```\n\n### 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"desktop_monitor\",\n  \"state\": \"completed\",\n  \"summary\": \"Captured a desktop screenshot for inspection.\",\n  \"data\": {\n    \"wait_ms\": 1000,\n    \"normalized_width\": 1280,\n    \"normalized_height\": 720,\n    \"screen_width\": 1920,\n    \"screen_height\": 1080,\n    \"screenshot_path\": \"C:/.../desktop_controller/b.png\",\n    \"previous_screenshot_path\": \"C:/.../desktop_controller/a.png\",\n    \"screenshot_download_url\": \"/wunder/temp_dir/download?...\",\n    \"screenshot_bytes\": 191002,\n    \"followup_prompt\": \"...\",\n    \"note\": \"等页面稳定后再截图\"\n  }\n}\n```\n\n## 注意点\n\n- 这是本机桌面，不是网页 DOM\n- 每次动作后都会尽量回传新截图\n- 前后截图可能一起进入后续多模态判断\n\n## 与浏览器的区别\n\n- 网页 DOM 级操作：用 [浏览器](/docs/zh-CN/tools/browser/)\n- 整个桌面与原生应用操作：用桌面控制\n","source_path":"使用说明书/zh-CN/tools/desktop-control.md"}</script>
