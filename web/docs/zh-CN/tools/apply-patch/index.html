  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/apply-patch","language":"zh-CN","title":"应用补丁","summary":"`apply_patch` 的精确编辑语义、成功返回和 patch 失败码。","updated_at":"2026-04-10","read_when":["你要做小范围、可审查、可回放的精确修改"],"source_docs":["src/services/tools/apply_patch_tool.rs","src/services/tools/tool_apply_patch.lark"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/apply-patch/","headings":[{"id":"section-1","level":1,"text":"应用补丁"},{"id":"section-2","level":2,"text":"输入不是 JSON patch，而是 grammar 文本"},{"id":"section-3","level":2,"text":"成功返回"},{"id":"section-4","level":2,"text":"dryrun"},{"id":"section-5","level":2,"text":"失败返回"},{"id":"section-6","level":2,"text":"什么时候用它，什么时候别用它"},{"id":"section-7","level":2,"text":"与 writefile 的区别"}],"prev_slug":"zh-CN/tools/ptc","next_slug":"zh-CN/tools/read-image","markdown":"# 应用补丁\n\n`apply_patch` 是当前最适合做“少量文件、少量块、明确上下文”的编辑工具。\n\n它的定位很明确：\n\n- 不是整文件写入工具\n- 不是命令执行工具\n- 是结构化、小步、可验证的精确修改工具\n\n## 输入不是 JSON patch，而是 grammar 文本\n\n最小示例：\n\n```text\n*** Begin Patch\n*** Update File: src/main.rs\n@@\n-fn old() {}\n+fn new() {}\n*** End Patch\n```\n\n模型侧常用参数只有两个：\n\n- `input`\n- `dry_run`\n\n## 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"apply_patch\",\n  \"state\": \"completed\",\n  \"summary\": \"Applied patch touching 2 files.\",\n  \"data\": {\n    \"changed_files\": 2,\n    \"added\": 1,\n    \"updated\": 1,\n    \"deleted\": 0,\n    \"moved\": 0,\n    \"hunks_applied\": 3,\n    \"files\": [\n      {\n        \"action\": \"update\",\n        \"path\": \"src/main.rs\",\n        \"to_path\": null,\n        \"hunks\": 1\n      }\n    ],\n    \"lsp\": [\n      {\n        \"path\": \"C:/.../src/main.rs\",\n        \"state\": {\n          \"enabled\": true,\n          \"matched\": true,\n          \"touched\": true\n        }\n      }\n    ]\n  }\n}\n```\n\n## `dry_run`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"apply_patch\",\n  \"state\": \"dry_run\",\n  \"summary\": \"Validated patch touching 2 files without applying it.\",\n  \"data\": {\n    \"dry_run\": true,\n    \"changed_files\": 2,\n    \"added\": 1,\n    \"updated\": 1,\n    \"deleted\": 0,\n    \"moved\": 0,\n    \"hunks_applied\": 3,\n    \"files\": [ ... ],\n    \"lsp\": []\n  }\n}\n```\n\n## 失败返回\n\n`apply_patch` 失败时虽然也会落到统一失败骨架，但错误码比普通文件工具更细：\n\n- `PATCH_LIMIT_INPUT_TOO_LARGE`\n- `PATCH_FORMAT_EMPTY_PATCH`\n- `PATCH_LIMIT_TOO_MANY_FILE_OPS`\n- `PATCH_LIMIT_TOO_MANY_CHUNKS`\n- `PATCH_RUNTIME_TASK_FAILED`\n\n此外还会有解析、路径越界、目标冲突、上下文不匹配等 patch 级错误。\n\n## 什么时候用它，什么时候别用它\n\n适合：\n\n- 改几行代码\n- 增加一个小函数\n- 调整几个独立文件\n\n不适合：\n\n- 整文件重写\n- 大批量生成文档或资源\n- 需要先运行脚本再产出结果的修改\n\n这些场景分别考虑：\n\n- 整文件重写：`write_file`\n- 先跑命令：`execute_command`\n\n## 与 `write_file` 的区别\n\n- `apply_patch`：保留上下文，便于审查\n- `write_file`：直接覆盖最终内容\n\n如果你已经知道“整个文件的新内容就应该是什么”，用 `write_file` 更直接。  \n如果你只想做精确改动，`apply_patch` 更稳。\n","source_path":"使用说明书/zh-CN/tools/apply-patch.md"}</script>
