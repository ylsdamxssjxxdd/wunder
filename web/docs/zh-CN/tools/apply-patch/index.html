  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/apply-patch","language":"zh-CN","title":"应用补丁","summary":"应用补丁是做多文件、多位置结构化编辑的主力工具，比多次零碎写文件更稳定、更安全。","updated_at":"2026-03-21","read_when":["你要跨多个文件做精确编辑","你在调试补丁格式为什么没被正确应用"],"source_docs":["src/services/tools/apply_patch_tool.rs","src/services/tools/catalog.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/apply-patch/","headings":[{"id":"section-1","level":1,"text":"应用补丁"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"补丁格式"},{"id":"section-5","level":3,"text":"基本结构"},{"id":"section-6","level":3,"text":"多文件修改"},{"id":"section-7","level":3,"text":"同一文件多位置修改"},{"id":"section-8","level":2,"text":"使用示例"},{"id":"section-9","level":3,"text":"单文件修改"},{"id":"section-10","level":3,"text":"预演模式"},{"id":"section-11","level":2,"text":"为什么用补丁而不是写入文件"},{"id":"section-12","level":2,"text":"dryrun 的用途"},{"id":"section-13","level":2,"text":"常见误区"},{"id":"section-14","level":3,"text":"把它当普通文本替换"},{"id":"section-15","level":3,"text":"补丁写得太松"},{"id":"section-16","level":3,"text":"单文件全量生成还用补丁"},{"id":"section-17","level":2,"text":"注意事项"},{"id":"section-18","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/ptc","next_slug":"zh-CN/tools/read-image","markdown":"# 应用补丁\n\n多文件、多位置结构化编辑的主力工具。\n\n---\n\n## 功能说明\n\n`应用补丁` 适合多文件和多位置修改场景，采用临时文件 + rename 策略保证原子写入。\n\n**别名**：\n- `apply_patch`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `input` | string | ✅ | 完整补丁文本 |\n| `dry_run` | boolean | ❌ | 预演模式，不实际写入 |\n\n---\n\n## 补丁格式\n\n### 基本结构\n\n```text\n*** Begin Patch\n*** Update File: src/main.rs\n@@\n-    println!(\"Hello\");\n+    println!(\"Hello, world!\");\n*** End Patch\n```\n\n### 多文件修改\n\n```text\n*** Begin Patch\n*** Update File: src/main.rs\n@@\n-    println!(\"Hello\");\n+    println!(\"Hello, world!\");\n*** Update File: src/utils.rs\n@@\n-const VERSION = \"1.0\";\n+const VERSION = \"2.0\";\n*** End Patch\n```\n\n### 同一文件多位置修改\n\n```text\n*** Begin Patch\n*** Update File: src/main.rs\n@@\n-fn greet() {\n+fn greet(name: &str) {\n@@\n-    println!(\"Hello\");\n+    println!(\"Hello, {}!\", name);\n*** End Patch\n```\n\n---\n\n## 使用示例\n\n### 单文件修改\n\n```json\n{\n  \"input\": \"*** Begin Patch\\n*** Update File: src/main.rs\\n@@\\n-fn main() {\\n+fn main() {\\n+    println!(\\\"Starting...\\\");\\n*** End Patch\",\n  \"dry_run\": false\n}\n```\n\n### 预演模式\n\n```json\n{\n  \"input\": \"*** Begin Patch\\n*** Update File: src/main.rs\\n@@\\n-const DEBUG = true;\\n+const DEBUG = false;\\n*** End Patch\",\n  \"dry_run\": true\n}\n```\n\n---\n\n## 为什么用补丁而不是写入文件\n\n| 特性 | 应用补丁 | 写入文件 |\n|------|----------|----------|\n| 多文件修改 | ✅ 单个工具调用 | ❌ 需要多次调用 |\n| 多位置修改 | ✅ 单个工具调用 | ❌ 需要多次调用 |\n| 原子性 | ✅ 全成功或全失败 | ⚠️ 单个文件原子 |\n| 上下文定位 | ✅ 基于上下文匹配 | ❌ 全量替换 |\n| 代码审查 | ✅ 更易审查 | ⚠️ 全量对比 |\n\n---\n\n## dry_run 的用途\n\n1. **验证补丁语法**：检查补丁格式是否正确\n2. **验证目标文件**：确认目标文件存在且可匹配\n3. **预览修改**：查看会改动哪些文件，再决定是否落盘\n\n---\n\n## 常见误区\n\n### 把它当普通文本替换\n❌ 补丁依赖上下文定位，不是单纯的全局替换字符串。\n\n### 补丁写得太松\n⚠️ 上下文过少时，命中位置会更脆弱，建议提供足够的上下文。\n\n### 单文件全量生成还用补丁\n❌ 如果是简单新文件，直接用 `写入文件` 更干净。\n\n---\n\n## 注意事项\n\n1. **原子写入**：采用临时文件 + rename 策略\n2. **上下文匹配**：补丁需要足够的上下文来准确定位\n3. **dry_run 推荐**：复杂修改先用 dry_run 预览\n4. **工具选型**：\n   - 多位置、多文件修改 → 应用补丁\n   - 单文件全量覆盖 → 写入文件\n\n---\n\n## 延伸阅读\n\n- [文件与工作区工具](/docs/zh-CN/tools/workspace-files/)\n- [执行命令](/docs/zh-CN/tools/exec/)\n","source_path":"静态站文档/zh-CN/tools/apply-patch.md"}</script>
