  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/apply-patch","language":"zh-CN","title":"应用补丁","summary":"`apply_patch` 的精确编辑语义、成功返回和 patch 失败码。","updated_at":"2026-05-08","read_when":["你要做小范围、可审查、可回放的精确修改"],"source_docs":["src/services/tools/apply_patch_tool.rs","src/services/tools/tool_apply_patch.lark"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/apply-patch/","headings":[{"id":"section-1","level":1,"text":"应用补丁"},{"id":"section-2","level":2,"text":"输入不是 JSON patch，而是 grammar 文本"},{"id":"section-3","level":2,"text":"推荐给弱模型的最小流程"},{"id":"section-4","level":2,"text":"Update File 的硬规则"},{"id":"section-5","level":2,"text":"成功返回"},{"id":"section-6","level":2,"text":"dryrun"},{"id":"section-7","level":2,"text":"失败返回"},{"id":"section-8","level":2,"text":"常见失败原因"},{"id":"section-9","level":2,"text":"典型修正建议"},{"id":"section-10","level":2,"text":"什么时候用它，什么时候别用它"},{"id":"section-11","level":2,"text":"与 writefile 的区别"}],"prev_slug":"zh-CN/tools/ptc","next_slug":"zh-CN/tools/read-image","markdown":"# 应用补丁\n\n`apply_patch` 是当前最适合做“少量文件、少量块、明确上下文”的编辑工具。\n\n它的定位很明确：\n\n- 不是整文件写入工具\n- 不是命令执行工具\n- 是结构化、小步、可验证的精确修改工具\n\n## 输入不是 JSON patch，而是 grammar 文本\n\n最小示例：\n\n```text\n*** Begin Patch\n*** Update File: src/main.rs\n@@\n-fn old() {}\n+fn new() {}\n*** End Patch\n```\n\n模型侧常用参数只有两个：\n\n- `input`\n- `dry_run`\n\n## 推荐给弱模型的最小流程\n\n按下面顺序做，成功率最高：\n\n1. 先 `read_file` 读取目标文件或精确片段\n2. 一次只构造一个很小的 patch\n3. 如果不确定上下文是否稳定，先加 `dry_run`\n4. 预演通过后，再去掉 `dry_run` 正式提交\n5. 如果修改跨很多分散区域，或已经接近整文件改写，直接换 `write_file`\n\n## Update File 的硬规则\n\n- `@@` 之后每一行都必须以前缀开头：空格 / `-` / `+`\n- 空白上下文行不能留空，必须写成“只有一个前导空格的一行”\n- 真正修改某一行时，必须明确写成 `-旧行` 再 `+新行`\n- 不要把旧行和新行都写成普通上下文行\n- 不要复制 `read_file` 输出里的 `>>> 路径`、`N: ` 行号或分隔符\n- 每处修改前后优先保留 2-3 行当前文件中的原始上下文\n\n## 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"apply_patch\",\n  \"state\": \"completed\",\n  \"summary\": \"Applied patch touching 2 files.\",\n  \"data\": {\n    \"changed_files\": 2,\n    \"added\": 1,\n    \"updated\": 1,\n    \"deleted\": 0,\n    \"moved\": 0,\n    \"hunks_applied\": 3,\n    \"files\": [\n      {\n        \"action\": \"update\",\n        \"path\": \"src/main.rs\",\n        \"to_path\": null,\n        \"hunks\": 1\n      }\n    ],\n    \"lsp\": [\n      {\n        \"path\": \"C:/.../src/main.rs\",\n        \"state\": {\n          \"enabled\": true,\n          \"matched\": true,\n          \"touched\": true\n        }\n      }\n    ]\n  }\n}\n```\n\n## `dry_run`\n\n`dry_run` 只做解析和匹配预演，不会落盘。以下情况优先使用：\n\n- 刚从 `read_file` 拼出第一个 patch，还不确定格式是否正确\n- 修改位置比较敏感，担心上下文匹配失败\n- 能力较弱的模型第一次尝试该工具\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"apply_patch\",\n  \"state\": \"dry_run\",\n  \"summary\": \"Validated patch touching 2 files without applying it.\",\n  \"data\": {\n    \"dry_run\": true,\n    \"changed_files\": 2,\n    \"added\": 1,\n    \"updated\": 1,\n    \"deleted\": 0,\n    \"moved\": 0,\n    \"hunks_applied\": 3,\n    \"files\": [ ... ],\n    \"lsp\": []\n  }\n}\n```\n\n## 失败返回\n\n`apply_patch` 失败时虽然也会落到统一失败骨架，但错误码比普通文件工具更细：\n\n- `PATCH_LIMIT_INPUT_TOO_LARGE`\n- `PATCH_FORMAT_EMPTY_PATCH`\n- `PATCH_LIMIT_TOO_MANY_FILE_OPS`\n- `PATCH_LIMIT_TOO_MANY_CHUNKS`\n- `PATCH_RUNTIME_TASK_FAILED`\n\n此外还会有解析、路径越界、目标冲突、上下文不匹配等 patch 级错误。\n\n## 常见失败原因\n\n- 把补丁正文又包进了一层 JSON 或 Markdown 代码块\n- `@@` 后直接粘贴原文件内容，没有给每一行加前缀\n- 把空白上下文行写成了真正的空行\n- 把旧行和新行都写成空格前缀的上下文行\n- 复制了 `read_file` 的展示行号或 `>>> 路径`\n- 一次性修改太多分散区域，超出 `apply_patch` 的设计范围\n- `-旧行` 和 `+新行` 实际写成了同一个内容，导致补丁“成功执行但没有任何变化”\n\n## 典型修正建议\n\n当前工具在部分 `PATCH_CONTEXT_NOT_FOUND` 场景下，会尽量给出更具体的修正方向，而不只是泛泛地说“上下文没找到”。例如：\n\n- 如果前一个变更块只有上下文、没有实际改动，提示会指出这是“空 hunk”\n- 如果后一个变更块复用了前一个空 hunk 的同一组锚点，提示会指出这是“重复锚点/多写了一个 @@ 块”\n- 如果上下文行和删除行重复出现，提示会指出“要删除的行不应同时作为上下文行”\n- 如果补丁看起来有改动，但最终文件完全没变化，提示会进一步区分“只有上下文、没有真实变更”和“旧行/新行实际相同”\n\n遇到这类提示时，优先做下面几件事：\n\n- 删除没有任何 `+` / `-` 的空 hunk\n- 把同一处插入或替换内容合并回一个 hunk\n- 不要让两个连续 hunk 复用同一组锚点\n- 纯插入 hunk 尽量同时保留头部和尾部未修改原文，避免只靠单侧锚点定位\n\n## 什么时候用它，什么时候别用它\n\n当前版本相比最早实现已经放宽了一些范围限制，允许单次补丁覆盖更多分散区域；但它依然更适合“中小批量精确编辑”，而不是整文件级重写。\n\n适合：\n\n- 改几行代码\n- 增加一个小函数\n- 调整几个独立文件\n\n不适合：\n\n- 整文件重写\n- 大批量生成文档或资源\n- 需要先运行脚本再产出结果的修改\n- 跨很多分散区域的大型重构\n\n这些场景分别考虑：\n\n- 整文件重写：`write_file`\n- 先跑命令：`execute_command`\n\n## 与 `write_file` 的区别\n\n- `apply_patch`：保留上下文，便于审查\n- `write_file`：直接覆盖最终内容\n\n如果你已经知道“整个文件的新内容就应该是什么”，用 `write_file` 更直接。  \n如果你只想做精确改动，`apply_patch` 更稳。\n","source_path":"使用说明书/zh-CN/tools/apply-patch.md"}</script>
