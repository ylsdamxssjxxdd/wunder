  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/read-image","language":"zh-CN","title":"读图工具","summary":"`read_image` 的用途与返回结构。","updated_at":"2026-04-29","read_when":["你要把本地视觉媒体送入当前模型上下文"],"source_docs":["src/services/tools/read_image_tool.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/read-image/","headings":[{"id":"section-1","level":1,"text":"读图工具"},{"id":"section-2","level":2,"text":"最小参数"},{"id":"section-3","level":2,"text":"成功返回"},{"id":"section-4","level":2,"text":"重点"}],"prev_slug":"zh-CN/tools/apply-patch","next_slug":"zh-CN/tools/lsp","markdown":"# 读图工具\n\n`read_image` 现在不只读静态图片。  \n它会把本地视觉媒体预处理好，并提示系统在后续上下文里附上可供模型继续分析的视觉消息。\n\n当前支持：\n\n- 静态图片\n- GIF 动图\n- 本地视频\n\n## 最小参数\n\n```json\n{\n  \"path\": \"screenshots/demo.png\"\n}\n```\n\nGIF 示例：\n\n```json\n{\n  \"path\": \"captures/demo.gif\",\n  \"frame_step\": 2\n}\n```\n\n视频示例：\n\n```json\n{\n  \"path\": \"captures/demo.mp4\",\n  \"frame_rate\": 1\n}\n```\n\n## 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"read_image\",\n  \"state\": \"completed\",\n  \"summary\": \"Prepared visual media screenshots/demo.png for model inspection.\",\n  \"data\": {\n    \"path\": \"screenshots/demo.png\",\n    \"resolved_path\": \"C:/.../screenshots/demo.png\",\n    \"media_kind\": \"image\",\n    \"size_bytes\": 182233,\n    \"prompt\": \"Inspect the attached image carefully...\",\n    \"result\": {\n      \"kind\": \"image\"\n    }\n  }\n}\n```\n\n## 重点\n\n- 静态图片会直接作为图片输入进入上下文。\n- GIF 不会再原样送模型。\n  默认只取首帧。\n  如果提供 `frame_step`，则按间隔取帧。\n- 视频会被规范化成图片帧序列，并在可用时附带音轨转写文本。\n- 这个工具结果本身不是图像分析结论，只表示视觉媒体已经准备好，可以继续让模型分析。\n","source_path":"使用说明书/zh-CN/tools/read-image.md"}</script>
