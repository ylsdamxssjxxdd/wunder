  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/read-image","language":"zh-CN","title":"读图工具","summary":"读图工具让模型能分析本地图片，把图片以多模态消息形式注入到后续模型调用里，与读取文件分工明确。","updated_at":"2026-03-21","read_when":["你要让模型看本地图片","你要区分读取文件和读图工具的边界"],"source_docs":["src/services/tools/read_image_tool.rs","src/services/tools/catalog.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/read-image/","headings":[{"id":"section-1","level":1,"text":"读图工具"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"使用示例"},{"id":"section-5","level":3,"text":"简单读图"},{"id":"section-6","level":3,"text":"带提示词"},{"id":"section-7","level":3,"text":"分析错误截图"},{"id":"section-8","level":2,"text":"处理流程"},{"id":"section-9","level":2,"text":"支持的图片格式"},{"id":"section-10","level":2,"text":"与读取文件的对比"},{"id":"section-11","level":2,"text":"适用场景"},{"id":"section-12","level":2,"text":"注意事项"},{"id":"section-13","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/apply-patch","next_slug":"zh-CN/tools/lsp","markdown":"# 读图工具\n\n多模态图片分析工具，让模型能看懂本地图片。\n\n---\n\n## 功能说明\n\n`读图工具` 校验本地图片路径后，把图片以多模态消息形式注入到后续模型调用里。\n\n**别名**：\n- `read_image`\n- `view_image`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `path` | string | ✅ | 图片文件路径 |\n| `prompt` | string | ❌ | 附带给多模态模型的说明文字 |\n\n---\n\n## 使用示例\n\n### 简单读图\n\n```json\n{\n  \"path\": \"screenshot.png\"\n}\n```\n\n### 带提示词\n\n```json\n{\n  \"path\": \"design.png\",\n  \"prompt\": \"分析这个界面设计，指出可以改进的地方\"\n}\n```\n\n### 分析错误截图\n\n```json\n{\n  \"path\": \"error.png\",\n  \"prompt\": \"解释这个错误信息是什么意思\"\n}\n```\n\n---\n\n## 处理流程\n\n1. 解析并校验路径\n2. 校验文件存在且是文件\n3. 校验大小上限\n4. 识别图片 MIME 类型\n5. 生成后续消息里的 `image_url`\n\n---\n\n## 支持的图片格式\n\n- PNG\n- JPEG\n- GIF\n- WebP\n- BMP\n- TIFF\n- AVIF\n\n---\n\n## 与读取文件的对比\n\n| 特性 | 读图工具 | [读取文件](/docs/zh-CN/tools/workspace-files/) |\n|------|----------|--------------------------------|\n| 目标 | 图片文件 | 纯文本文件 |\n| 输入 | 图片路径 | 文本文件路径 |\n| 输出 | 多模态消息 | 文本内容 |\n| 推荐使用 | 分析图片 | 读取代码、文档 |\n\n---\n\n## 适用场景\n\n✅ **适合使用读图工具**：\n- 让模型解释截图\n- 让模型分析设计图或错误弹窗\n- 让模型看本地生成的图片产物\n\n❌ **不适合使用读图工具**：\n- 读取文本文件 → 用 `读取文件`\n- 读取二进制文件（非图片）→ 不支持\n\n---\n\n## 注意事项\n\n1. **路径限制**：\n   - path 指向工作区或允许读取根目录里的图片文件\n   - 不能读取任意路径的图片\n\n2. **大小限制**：\n   - 当前实现会限制图片大小\n   - 避免把超大二进制直接塞进上下文\n\n3. **核心功能**：\n   - 不是返回像素内容\n   - 而是构造后续多模态消息\n\n---\n\n## 延伸阅读\n\n- [文件与工作区工具](/docs/zh-CN/tools/workspace-files/)\n- [浏览器](/docs/zh-CN/tools/browser/)\n- [桌面控制](/docs/zh-CN/tools/desktop-control/)\n","source_path":"静态站文档/zh-CN/tools/read-image.md"}</script>
