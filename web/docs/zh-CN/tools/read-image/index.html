  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/read-image","language":"zh-CN","title":"读图工具","summary":"`read_image` 的用途与返回结构。","updated_at":"2026-04-10","read_when":["你要把本地图片送入当前模型上下文"],"source_docs":["src/services/tools/read_image_tool.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/read-image/","headings":[{"id":"section-1","level":1,"text":"读图工具"},{"id":"section-2","level":2,"text":"最小参数"},{"id":"section-3","level":2,"text":"成功返回"},{"id":"section-4","level":2,"text":"重点"}],"prev_slug":"zh-CN/tools/apply-patch","next_slug":"zh-CN/tools/lsp","markdown":"# 读图工具\n\n`read_image` 做的事很简单：  \n把本地图片准备好，并提示系统在后续上下文里附上一条图片消息。\n\n## 最小参数\n\n```json\n{\n  \"path\": \"screenshots/demo.png\"\n}\n```\n\n## 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"read_image\",\n  \"state\": \"completed\",\n  \"summary\": \"Prepared image screenshots/demo.png for model inspection.\",\n  \"data\": {\n    \"path\": \"screenshots/demo.png\",\n    \"resolved_path\": \"C:/.../screenshots/demo.png\",\n    \"mime_type\": \"image/png\",\n    \"size_bytes\": 182233,\n    \"prompt\": \"Inspect the attached image carefully...\"\n  }\n}\n```\n\n## 重点\n\n- 真正的图片内容通常会在这次工具调用之后，以额外 user message 的形式进上下文\n- 所以这个工具结果本身不是图像分析结论，只是“图片已准备好”\n","source_path":"使用说明书/zh-CN/tools/read-image.md"}</script>
