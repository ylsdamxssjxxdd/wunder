  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/user-world","language":"zh-CN","title":"用户世界工具","summary":"`用户世界工具` 面向 Wunder 系统内的注册用户目录和站内消息发送，不等同于外部渠道消息工具。","updated_at":"2026-03-19","read_when":["你要在 Wunder 内部查用户或发站内消息","你要区分 `用户世界工具` 和 `渠道工具`"],"source_docs":["src/services/tools/catalog.rs","src/services/tools.rs","docs/API文档.md"],"tab":"工具","group":"系统桥接","group_path":["系统桥接"],"url":"/docs/zh-CN/tools/user-world/","headings":[{"id":"section-1","level":1,"text":"用户世界工具"},{"id":"section-2","level":2,"text":"核心动作"},{"id":"section-3","level":2,"text":"常用参数"},{"id":"section-4","level":3,"text":"listusers"},{"id":"section-5","level":3,"text":"sendmessage"},{"id":"section-6","level":2,"text":"一个很实用的细节"},{"id":"section-7","level":2,"text":"和渠道工具的区别"},{"id":"section-8","level":2,"text":"你最需要记住的点"},{"id":"section-9","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/tools/channel","next_slug":"zh-CN/tools/a2a-tools","markdown":"# 用户世界工具\n\n`用户世界工具` 主要做两件事：\n\n- 查系统内用户\n- 给系统内用户发消息\n\n## 核心动作\n\n- `list_users`\n- `send_message`\n\n## 常用参数\n\n### `list_users`\n\n- `keyword`\n- `offset`\n- `limit`\n\n返回结果会包含用户目录里的基础信息，例如：\n\n- `user_id`\n- `username`\n- `status`\n- `unit_id`\n\n### `send_message`\n\n- `user_id`\n- `user_ids`\n- `content`\n- `content_type`\n- `client_msg_id`\n\n`send_message` 至少要给出：\n\n- 消息内容\n- 一个目标用户或一组目标用户\n\n## 一个很实用的细节\n\n发送站内消息时，内容里的本地文件引用可以被系统识别并暂存。\n\n也就是说，模型不只是能发纯文本，还能把工作区里的文件引用整理后一起带过去。\n\n这也是结果里会出现 `staged_files` 的原因。\n\n## 和渠道工具的区别\n\n- `用户世界工具` 面向 Wunder 系统内部用户。\n- [渠道工具](/docs/zh-CN/tools/channel/) 面向微信、Slack、Telegram 一类外部渠道。\n\n如果目标是站内协作，优先看这页。\n\n如果目标是跨外部 IM 平台发消息，优先看渠道工具。\n\n## 你最需要记住的点\n\n- `用户世界工具` 只处理系统内用户，不处理外部渠道联系人。\n- `list_users` 查目录，`send_message` 发站内消息。\n- 它支持把工作区文件引用整理成可发送的暂存文件。\n\n## 相关文档\n\n- [渠道工具](/docs/zh-CN/tools/channel/)\n- [用户世界接入](/docs/zh-CN/integration/user-world/)\n- [用户侧前端](/docs/zh-CN/surfaces/frontend/)\n","source_path":"静态站文档/zh-CN/tools/user-world.md"}</script>
