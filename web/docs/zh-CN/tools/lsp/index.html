  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/lsp","language":"zh-CN","title":"LSP 查询","summary":"`lsp_query` 的操作类型、位置参数与返回结构。","updated_at":"2026-04-10","read_when":["你要查定义、引用、悬停、实现、调用层级或符号"],"source_docs":["src/services/tools.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/lsp/","headings":[{"id":"section-1","level":1,"text":"LSP 查询"},{"id":"section-2","level":2,"text":"最小参数"},{"id":"section-3","level":2,"text":"支持的主要操作"},{"id":"section-4","level":2,"text":"成功返回"},{"id":"section-5","level":2,"text":"注意点"},{"id":"section-6","level":2,"text":"什么时候别用它"}],"prev_slug":"zh-CN/tools/read-image","next_slug":"zh-CN/tools/skill-call","markdown":"# LSP 查询\n\n`lsp_query` 不是读文件工具，而是符号级查询工具。  \n先用它的正确顺序通常是：\n\n1. 用文件工具定位路径\n2. 再用 `lsp_query` 查定义/引用\n\n## 最小参数\n\n查定义：\n\n```json\n{\n  \"operation\": \"definition\",\n  \"path\": \"src/services/tools.rs\",\n  \"line\": 120,\n  \"character\": 18\n}\n```\n\n查工作区符号：\n\n```json\n{\n  \"operation\": \"workspaceSymbol\",\n  \"path\": \"src/services/tools.rs\",\n  \"query\": \"build_model_tool_success\"\n}\n```\n\n## 支持的主要操作\n\n- `definition`\n- `references`\n- `hover`\n- `documentSymbol`\n- `workspaceSymbol`\n- `implementation`\n- `callHierarchy`\n\n其中这些操作需要位置：\n\n- `definition`\n- `references`\n- `hover`\n- `implementation`\n- `callHierarchy`\n\n## 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"lsp_query\",\n  \"state\": \"completed\",\n  \"summary\": \"Ran LSP definition on src/services/tools.rs across 2 servers.\",\n  \"data\": {\n    \"operation\": \"definition\",\n    \"path\": \"src/services/tools.rs\",\n    \"results\": [\n      {\n        \"server_id\": \"rust-analyzer\",\n        \"server_name\": \"rust-analyzer\",\n        \"result\": [ ... ]\n      }\n    ],\n    \"server_count\": 2\n  }\n}\n```\n\n如果没有任何 LSP 服务器返回结果，可能还会有：\n\n```json\n{\n  \"next_step_hint\": \"No LSP servers returned a result for this file...\"\n}\n```\n\n## 注意点\n\n- `line` 和 `character` 在输入里是 1-based\n- 内部发给 LSP 时会转换成 0-based\n- `path` 必须是真实存在的文件\n\n## 什么时候别用它\n\n- 只是想看文件内容：用 [工作区文件](/docs/zh-CN/tools/workspace-files/)\n- 只是全文搜索文本：用 [工作区文件](/docs/zh-CN/tools/workspace-files/) 里的 `search_content`\n","source_path":"使用说明书/zh-CN/tools/lsp.md"}</script>
