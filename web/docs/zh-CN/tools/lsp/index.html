  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/lsp","language":"zh-CN","title":"LSP 查询","summary":"LSP查询 面向代码语义导航，提供定义跳转、引用搜索、悬停说明、符号树和调用层级，与文本搜索分工明确。","updated_at":"2026-03-21","read_when":["你要查定义、引用或调用关系","你要区分 LSP 查询和文本搜索的边界"],"source_docs":["src/services/tools/catalog.rs","src/services/tools.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/lsp/","headings":[{"id":"section-1","level":1,"text":"LSP 查询"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"支持的操作"},{"id":"section-5","level":2,"text":"使用示例"},{"id":"section-6","level":3,"text":"查找定义"},{"id":"section-7","level":3,"text":"查找引用"},{"id":"section-8","level":3,"text":"查找符号"},{"id":"section-9","level":3,"text":"查看文件结构"},{"id":"section-10","level":3,"text":"查看调用层级"},{"id":"section-11","level":2,"text":"处理流程"},{"id":"section-12","level":2,"text":"与搜索内容的对比"},{"id":"section-13","level":2,"text":"适用场景"},{"id":"section-14","level":2,"text":"注意事项"},{"id":"section-15","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/read-image","next_slug":"zh-CN/tools/skill-call","markdown":"# LSP 查询\n\n代码语义导航工具，基于 LSP 协议。\n\n---\n\n## 功能说明\n\n`LSP查询` 面向代码语义导航，提供定义跳转、引用搜索、悬停说明、符号树和调用层级。\n\n**别名**：\n- `lsp`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `operation` | string | ✅ | 要执行的操作 |\n| `path` | string | ❌ | 文件路径 |\n| `line` | integer | ❌ | 行号（1-based） |\n| `character` | integer | ❌ | 列号（1-based） |\n| `query` | string | ❌ | 查询字符串 |\n| `call_hierarchy_direction` | string | ❌ | 调用层级方向：`incoming` 或 `outgoing` |\n\n---\n\n## 支持的操作\n\n| 操作 | 说明 | 必填参数 |\n|------|------|----------|\n| `definition` | 查找定义 | `path`, `line`, `character` |\n| `references` | 查找引用 | `path`, `line`, `character` |\n| `hover` | 悬停说明 | `path`, `line`, `character` |\n| `documentSymbol` | 文档符号 | `path` |\n| `workspaceSymbol` | 工作区符号 | `query` |\n| `implementation` | 查找实现 | `path`, `line`, `character` |\n| `callHierarchy` | 调用层级 | `path`, `line`, `character`, `call_hierarchy_direction` |\n\n---\n\n## 使用示例\n\n### 查找定义\n\n```json\n{\n  \"operation\": \"definition\",\n  \"path\": \"src/main.rs\",\n  \"line\": 10,\n  \"character\": 5\n}\n```\n\n### 查找引用\n\n```json\n{\n  \"operation\": \"references\",\n  \"path\": \"src/main.rs\",\n  \"line\": 10,\n  \"character\": 5\n}\n```\n\n### 查找符号\n\n```json\n{\n  \"operation\": \"workspaceSymbol\",\n  \"query\": \"execute_tool\"\n}\n```\n\n### 查看文件结构\n\n```json\n{\n  \"operation\": \"documentSymbol\",\n  \"path\": \"src/main.rs\"\n}\n```\n\n### 查看调用层级\n\n```json\n{\n  \"operation\": \"callHierarchy\",\n  \"path\": \"src/main.rs\",\n  \"line\": 10,\n  \"character\": 5,\n  \"call_hierarchy_direction\": \"outgoing\"\n}\n```\n\n---\n\n## 处理流程\n\n1. 校验 `lsp.enabled` 配置\n2. 校验目标文件存在\n3. 让对应文件进入 LSP 管理器的观察范围\n4. 把请求分发给当前命中的 LSP 客户端\n\n---\n\n## 与搜索内容的对比\n\n| 特性 | LSP查询 | [搜索内容](/docs/zh-CN/tools/workspace-files/) |\n|------|---------|--------------------------------|\n| 目标 | 代码语义导航 | 模糊文本搜索 |\n| 输入 | 位置或符号名 | 关键词 |\n| 推荐使用 | 找定义、引用、调用链 | 找关键词 |\n\n---\n\n## 适用场景\n\n✅ **适合使用 LSP查询**：\n- 想找某个函数在哪定义 → 用 `definition`\n- 想找所有调用点 → 用 `references`\n- 想看文件结构 → 用 `documentSymbol`\n- 想找工作区符号 → 用 `workspaceSymbol`\n- 想看调用层级 → 用 `callHierarchy`\n\n❌ **不适合使用 LSP查询**：\n- 只有关键词，没有明确代码位置 → 先用文本搜索\n\n---\n\n## 注意事项\n\n1. **1-based 位置**：\n   - `line` 和 `character` 都是从 1 开始计数\n   - 不是 0-based\n\n2. **多个 LSP 服务端**：\n   - 返回结果可能来自多个 LSP 服务端\n   - 不一定只有一份结果\n\n3. **不是全文检索**：\n   - 如果只有关键词，没有明确代码位置\n   - 先用文本搜索通常更快\n\n---\n\n## 延伸阅读\n\n- [文件与工作区工具](/docs/zh-CN/tools/workspace-files/)\n- [应用补丁](/docs/zh-CN/tools/apply-patch/)\n- [系统架构](/docs/zh-CN/concepts/architecture/)\n","source_path":"静态站文档/zh-CN/tools/lsp.md"}</script>
