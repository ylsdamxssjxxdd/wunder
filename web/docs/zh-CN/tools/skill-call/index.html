  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/skill-call","language":"zh-CN","title":"技能调用","summary":"技能调用会按技能名返回完整 SKILL.md 和技能目录结构，是模型读取技能正文的正式入口。","updated_at":"2026-04-02","read_when":["你要理解技能为什么不是只在提示词里露一个名字","你在排查 {{SKILL_ROOT}} 为什么会被替换"],"source_docs":["src/services/tools/skill_call.rs","src/services/tools/catalog.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/skill-call/","headings":[{"id":"section-1","level":1,"text":"技能调用"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"使用示例"},{"id":"section-5","level":2,"text":"返回内容"},{"id":"section-6","level":2,"text":"{{SKILLROOT}} 占位符"},{"id":"section-7","level":3,"text":"用途"},{"id":"section-8","level":3,"text":"替换规则"},{"id":"section-9","level":3,"text":"优势"},{"id":"section-10","level":3,"text":"使用示例"},{"id":"section-11","level":2,"text":"为什么比只在 prompt 里写技能名更好"},{"id":"section-12","level":2,"text":"适用场景"},{"id":"section-13","level":2,"text":"注意事项"},{"id":"section-14","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/lsp","next_slug":"zh-CN/tools/web-fetch","markdown":"# 技能调用\n\n读取技能文档的正式工具入口。\n\n---\n\n## 功能说明\n\n`技能调用` 让技能从「一个名称」变成「模型可主动读取的操作手册」。\n\n**别名**：\n- `skill_call`\n- `skill_get`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `name` | string | ✅ | 技能名称 |\n\n---\n\n## 使用示例\n\n```json\n{\n  \"name\": \"代码重构\"\n}\n```\n\n---\n\n## 返回内容\n\n调用后会返回：\n\n| 内容 | 说明 |\n|------|------|\n| `SKILL.md` | 完整的技能文档 |\n| 技能目录结构 | 技能的文件结构 |\n\n---\n\n## {{SKILL_ROOT}} 占位符\n\n### 用途\n\n技能文档里建议使用 `{{SKILL_ROOT}}` 来引用脚本、示例和工作流文件。\n\n### 替换规则\n\n当 `技能调用` 返回正文时，`{{SKILL_ROOT}}` 会被替换成当前可见的真实技能根目录路径。\n\n### 优势\n\n- ✅ 避免 server、desktop、cli 下路径不一致\n- ✅ 技能迁移后文档路径不会失效\n- ✅ 跨形态复用同一套技能文档\n\n### 使用示例\n\n在 SKILL.md 中：\n\n```markdown\n# 代码重构技能\n\n## 脚本\n\n使用脚本：`{{SKILL_ROOT}}/scripts/refactor.py`\n\n## 示例\n\n参考示例：`{{SKILL_ROOT}}/examples/before/` 和 `{{SKILL_ROOT}}/examples/after/`\n```\n\n---\n\n## 为什么比只在 prompt 里写技能名更好\n\n很多复杂技能真正重要的是：\n- 细节步骤\n- 资源路径\n- 约束条件\n\n如果只把技能名丢给模型，模型很容易误用。\n\n---\n\n## 适用场景\n\n✅ **适合使用技能调用**：\n- 读取固化流程的详细步骤\n- 获取技能相关的资源路径\n- 复用已定义的最佳实践\n- 避免重复编写相同的提示词\n\n---\n\n## 注意事项\n\n1. **技能不只是元信息**：\n   - 应该被看作模型可读取的执行手册\n   - 包含详细步骤和约束条件\n\n2. **路径占位符**：\n   - 使用 `{{SKILL_ROOT}}` 引用技能内资源\n   - 系统会自动替换成真实路径\n\n3. **正式入口**：\n   - `技能调用` 是读取技能正文的正式工具入口\n   - 不要直接猜测技能路径\n\n---\n\n## 延伸阅读\n\n- [提示词与技能](/docs/zh-CN/concepts/prompt-and-skills/)\n- [工具体系](/docs/zh-CN/concepts/tools/)\n","source_path":"使用说明书/zh-CN/tools/skill-call.md"}</script>
