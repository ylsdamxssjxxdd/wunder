  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/skill-call","language":"zh-CN","title":"技能调用","summary":"`skill_call` 如何把技能正文、根目录和文件树返回给模型。","updated_at":"2026-04-10","read_when":["你要加载某个 `SKILL.md` 及其目录信息"],"source_docs":["src/services/tools.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/skill-call/","headings":[{"id":"section-1","level":1,"text":"技能调用"},{"id":"section-2","level":2,"text":"最小参数"},{"id":"section-3","level":2,"text":"成功返回"},{"id":"section-4","level":2,"text":"重点变化"},{"id":"section-5","level":2,"text":"常见失败"}],"prev_slug":"zh-CN/tools/lsp","next_slug":"zh-CN/tools/web-fetch","markdown":"# 技能调用\n\n`skill_call` 的作用不是执行技能，而是**把技能内容加载进当前上下文**，让模型按技能流程继续工作。\n\n## 最小参数\n\n```json\n{\n  \"name\": \"openai-docs\"\n}\n```\n\n## 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"skill_call\",\n  \"state\": \"completed\",\n  \"summary\": \"Loaded skill openai-docs.\",\n  \"data\": {\n    \"name\": \"openai-docs\",\n    \"description\": \"Use official OpenAI docs...\",\n    \"path\": \"C:/.../SKILL.md\",\n    \"root\": \"C:/.../openai-docs\",\n    \"content\": \"# SKILL ... {{SKILL_ROOT}} ...\",\n    \"tree\": [\n      \"SKILL.md\",\n      \"references/\",\n      \"scripts/\"\n    ]\n  }\n}\n```\n\n## 重点变化\n\n- `content` 会做适合模型阅读的渲染\n- `root` 会明确返回技能根目录\n- 文中可用 `{{SKILL_ROOT}}` 占位\n- `tree` 让模型知道技能目录还有哪些附加文件\n\n## 常见失败\n\n- 技能名为空\n- 技能不存在\n- 技能名有歧义\n- 技能文件读取失败\n\n这些错误通常直接以普通错误返回，不属于复杂异步工具。\n","source_path":"使用说明书/zh-CN/tools/skill-call.md"}</script>
