  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/schedule-task","language":"zh-CN","title":"定时任务","summary":"`定时任务` 把 cron 能力做成正式工具，支持新增、更新、禁用、运行、查看状态，并把任务持久化到系统存储里。","updated_at":"2026-03-20","read_when":["你要让 Wunder 延迟执行或周期执行任务","你要查 `定时任务` 工具和 `/wunder/cron/*` 接口的对应关系"],"source_docs":["src/services/tools/catalog.rs","src/services/tools/dispatch.rs","src/services/cron.rs","docs/API文档.md"],"tab":"工具","group":"界面与自动化","group_path":["界面与自动化"],"url":"/docs/zh-CN/tools/schedule-task/","headings":[{"id":"section-1","level":1,"text":"定时任务"},{"id":"section-2","level":2,"text":"核心动作"},{"id":"section-3","level":2,"text":"常用参数"},{"id":"section-4","level":2,"text":"它怎么运行"},{"id":"section-5","level":2,"text":"什么时候该用它"},{"id":"section-6","level":2,"text":"用循环定时任务实现“心跳式巡检”"},{"id":"section-7","level":3,"text":"推荐做法"},{"id":"section-8","level":3,"text":"为什么推荐 isolated"},{"id":"section-9","level":3,"text":"这种方式适合什么"},{"id":"section-10","level":3,"text":"这种方式不等于专门 heartbeat"},{"id":"section-11","level":2,"text":"常见误区"},{"id":"section-12","level":3,"text":"它不是 休眠等待"},{"id":"section-13","level":3,"text":"scheduletext 和结构化 schedule"},{"id":"section-14","level":2,"text":"实施建议"},{"id":"section-15","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/panels-and-a2ui","next_slug":"zh-CN/tools/thread-control","markdown":"# 定时任务\n\n`定时任务` 是 Wunder 的内置 cron 工具。\n\n它不是简单的前端提醒，而是会落到系统存储、由调度器持续执行的正式任务。\n\n## 核心动作\n\n- `add`\n- `update`\n- `remove`\n- `enable`\n- `disable`\n- `get`\n- `list`\n- `run`\n- `status`\n\n## 常用参数\n\n- `action`\n- `job.job_id`\n- `job.name`\n- `job.schedule`\n- `job.schedule_text`\n- `job.session`\n- `job.payload.message`\n- `job.deliver`\n- `job.enabled`\n- `job.delete_after_run`\n- `job.dedupe_key`\n\n其中：\n\n- `schedule.kind` 支持 `at`、`every`、`cron`\n- `session` 支持 `main`、`isolated`\n- `payload.message` 是最关键的执行载荷\n\n## 它怎么运行\n\n任务会被持久化到 cron 任务表中，由调度器按时间领取并执行。\n\n如果 `session` 设为：\n\n- `main`：沿用主会话语境\n- `isolated`：新开隔离会话执行\n\n如果 `delete_after_run=true`，任务成功后会自动删除。\n\n## 什么时候该用它\n\n- 固定时间提醒\n- 周期性巡检\n- 延迟触发某段消息或任务\n- 后台定时执行用户任务\n\n## 用循环定时任务实现“心跳式巡检”\n\n如果你想要的是类似 heartbeat 的效果，当前在 Wunder 里可以直接用：\n\n- 一个 `schedule.kind=every` 的循环定时任务\n- 智能体工作目录里的一个巡检清单文件\n- 一条固定提示词，让智能体每次被唤醒时先检查清单，再决定是否继续执行、记录结果或提醒用户\n\n这是一种很实用的实现方式：\n\n- 不需要额外引入专门的 heartbeat 机制\n- 直接复用现有 `定时任务` 调度能力\n- 清单状态放在工作目录里，用户和智能体都能直接查看和更新\n\n### 推荐做法\n\n建议把任务配置成：\n\n- `schedule.kind = every`\n- `session = isolated`\n- `payload.message` 写成固定巡检提示\n\n例如：\n\n```json\n{\n  \"action\": \"add\",\n  \"job\": {\n    \"name\": \"每30分钟巡检一次清单\",\n    \"session\": \"isolated\",\n    \"schedule\": {\n      \"kind\": \"every\",\n      \"every_ms\": 1800000\n    },\n    \"payload\": {\n      \"message\": \"检查工作目录中的巡检清单文件。先判断哪些事项已经完成，哪些事项仍未完成；已完成的不要重复执行，未完成的继续处理；如果没有新事项，不要输出冗长回复。\"\n    }\n  }\n}\n```\n\n对应的工作目录清单可以保持简短、稳定、可持续更新，例如：\n\n```md\n# 巡检清单\n\n- 检查是否有新的待办文件需要整理\n- 检查是否有失败的批处理任务需要重试\n- 检查是否有需要提醒用户的阻塞项\n- 已完成的事项要从执行角度跳过，不要反复做同样的动作\n```\n\n### 为什么推荐 `isolated`\n\n如果这类巡检任务总是跑在 `main` 会话里，长期下来会不断累积无意义的巡检轮次，增加上下文占用。\n\n因此更推荐：\n\n- 周期巡检跑在 `isolated`\n- 真正需要通知用户时，再输出简洁结果\n\n这样更接近 heartbeat 的用途：定期检查，而不是不断污染主聊天上下文。\n\n### 这种方式适合什么\n\n- 周期性检查某个目录、文件或状态清单\n- 每隔一段时间做一次“是否还有未完成事项”的回看\n- 用工作目录里的 Markdown 文件驱动智能体做持续性维护\n\n### 这种方式不等于专门 heartbeat\n\n这种方案已经可以实现 heartbeat 风格的巡检，但它本质上仍然是：\n\n- `cron` 调度\n- 固定提示词\n- 文件驱动状态\n\n它不是独立的系统级 heartbeat runner，因此：\n\n- 更简单\n- 更容易理解\n- 也更依赖你写给智能体的提示词和清单质量\n\n如果你的目标只是“让智能体周期性看一眼清单并继续推进”，这种做法通常已经够用。\n\n## 常见误区\n\n### 它不是 `休眠等待`\n\n`休眠等待` 只是在当前链路里短暂停顿。\n\n`定时任务` 是持久化调度。\n\n### `schedule_text` 和结构化 `schedule`\n\n这两个字段都在描述调度规则，但真正落地时最终都会归一到系统的调度结构中。\n\n如果你已经能明确表达 `at/every/cron`，直接给结构化 `schedule` 通常更稳。\n\n## 实施建议\n\n- `定时任务` 是持久化的系统调度工具，不是一次性等待。\n- 最重要的载荷是 `payload.message`。\n- `isolated` 会新开运行语境，`delete_after_run` 会在成功后自动清理任务。\n\n## 延伸阅读\n\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n- [聊天会话](/docs/zh-CN/integration/chat-sessions/)\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n","source_path":"静态站文档/zh-CN/tools/schedule-task.md"}</script>
