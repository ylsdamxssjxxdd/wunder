  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/schedule-task","language":"zh-CN","title":"定时任务","summary":"`schedule_task` 的扁平参数、调度动作与压缩返回。","updated_at":"2026-04-10","read_when":["你要新增、更新、查询或触发定时任务"],"source_docs":["src/services/tools/dispatch.rs","src/services/cron.rs"],"tab":"工具","group":"界面与自动化","group_path":["界面与自动化"],"url":"/docs/zh-CN/tools/schedule-task/","headings":[{"id":"section-1","level":1,"text":"定时任务"},{"id":"section-2","level":2,"text":"支持动作"},{"id":"section-3","level":2,"text":"推荐输入风格"},{"id":"section-4","level":2,"text":"成功返回"},{"id":"section-5","level":3,"text":"status"},{"id":"section-6","level":3,"text":"add / update / get"},{"id":"section-7","level":3,"text":"list"},{"id":"section-8","level":2,"text":"重点"}],"prev_slug":"zh-CN/tools/panels-and-a2ui","next_slug":"zh-CN/tools/thread-control","markdown":"# 定时任务\n\n`schedule_task` 是当前工具体系里一个明确的例外：\n\n- 输入侧支持模型友好的扁平字段\n- 成功返回侧是压缩调度结果\n- **不走统一成功骨架**\n\n## 支持动作\n\n- `add`\n- `update`\n- `remove`\n- `enable`\n- `disable`\n- `get`\n- `list`\n- `run`\n- `status`\n\n## 推荐输入风格\n\n优先用扁平字段：\n\n```json\n{\n  \"action\": \"add\",\n  \"job_id\": \"job_daily_report\",\n  \"name\": \"日报提醒\",\n  \"schedule_text\": \"every 5 minutes\",\n  \"message\": \"请生成日报\",\n  \"session\": \"main\",\n  \"enabled\": true\n}\n```\n\n只有在需要精确表达时再用 `schedule`：\n\n```json\n{\n  \"action\": \"add\",\n  \"job_id\": \"job_cron_demo\",\n  \"schedule\": {\n    \"kind\": \"cron\",\n    \"cron\": \"*/5 * * * *\",\n    \"tz\": \"Asia/Shanghai\"\n  },\n  \"message\": \"执行巡检\"\n}\n```\n\n## 成功返回\n\n### `status`\n\n```json\n{\n  \"action\": \"status\",\n  \"scheduler\": {\n    \"enabled\": true,\n    \"poll_interval_ms\": 1000,\n    \"running_jobs\": 1,\n    \"next_run_at\": 1760000000,\n    \"next_run_at_text\": \"2026-04-10T10:00:00+08:00\"\n  },\n  \"user_jobs\": {\n    \"total\": 3,\n    \"enabled\": 2,\n    \"running\": 1,\n    \"next_run_at\": 1760000000,\n    \"next_run_at_text\": \"2026-04-10T10:00:00+08:00\"\n  }\n}\n```\n\n### `add` / `update` / `get`\n\n```json\n{\n  \"action\": \"add\",\n  \"job\": {\n    \"job_id\": \"job_daily_report\",\n    \"name\": \"日报提醒\",\n    \"enabled\": true,\n    \"schedule\": {\n      \"kind\": \"every\",\n      \"every_ms\": 300000\n    },\n    \"next_run_at\": 1760000000,\n    \"next_run_at_text\": \"2026-04-10T10:00:00+08:00\",\n    \"last_run_at\": null,\n    \"last_status\": null\n  },\n  \"deduped\": false\n}\n```\n\n### `list`\n\n```json\n{\n  \"action\": \"list\",\n  \"jobs\": [\n    {\n      \"job_id\": \"job_daily_report\",\n      \"name\": \"日报提醒\",\n      \"enabled\": true,\n      \"schedule\": { \"kind\": \"every\", \"every_ms\": 300000 },\n      \"next_run_at\": \"2026-04-10T10:00:00+08:00\",\n      \"last_run_at\": null\n    }\n  ]\n}\n```\n\n## 重点\n\n- 这是少数仍未统一到 `ok/action/state/summary/data` 的工具\n- 模型侧写参数时优先扁平字段\n- 结果里真正重要的是 `job`、`jobs`、`scheduler`、`user_jobs`\n","source_path":"使用说明书/zh-CN/tools/schedule-task.md"}</script>
