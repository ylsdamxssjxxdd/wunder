  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/schedule-task","language":"zh-CN","title":"定时任务","summary":"`schedule_task` 的推荐写法、线程投递语义与调度行为。","updated_at":"2026-04-29","read_when":["你要新增、更新、查询或触发定时任务"],"source_docs":["src/services/tools/dispatch.rs","src/services/cron.rs"],"tab":"工具","group":"UI and Automation","group_path":["UI and Automation"],"url":"/docs/zh-CN/tools/schedule-task/","headings":[{"id":"section-1","level":1,"text":"定时任务"},{"id":"section-2","level":2,"text":"支持动作"},{"id":"section-3","level":2,"text":"推荐写法"},{"id":"section-4","level":2,"text":"字段说明"},{"id":"section-5","level":2,"text":"session 语义"},{"id":"section-6","level":2,"text":"循环任务是否会堆积"},{"id":"section-7","level":2,"text":"成功返回"},{"id":"section-8","level":3,"text":"status"},{"id":"section-9","level":3,"text":"add / update / get"},{"id":"section-10","level":3,"text":"list"},{"id":"section-11","level":2,"text":"注意"}],"prev_slug":"zh-CN/tools/panels-and-a2ui","next_slug":"zh-CN/tools/final-response","markdown":"# 定时任务\n\n`schedule_task` 用来创建、更新、查询、立即执行和启停定时任务。\n\n它是当前工具体系里的一个特例：\n\n- 输入支持模型更容易调用的扁平字段\n- 成功结果返回压缩后的调度信息\n- 不走统一的 `ok/action/state/summary/data` 成功骨架\n\n## 支持动作\n\n- `add`\n- `update`\n- `remove`\n- `enable`\n- `disable`\n- `get`\n- `list`\n- `run`\n- `status`\n\n## 推荐写法\n\n优先用扁平字段，不必先手写完整 `job` 对象：\n\n```json\n{\n  \"action\": \"add\",\n  \"job_id\": \"job_daily_report\",\n  \"name\": \"日报提醒\",\n  \"schedule_text\": \"every 5 minutes\",\n  \"message\": \"请生成日报\",\n  \"session\": \"main\",\n  \"enabled\": true\n}\n```\n\n只有在需要精确控制时，再使用嵌套的 `schedule`：\n\n```json\n{\n  \"action\": \"add\",\n  \"job_id\": \"job_cron_demo\",\n  \"schedule\": {\n    \"kind\": \"cron\",\n    \"cron\": \"*/5 * * * *\",\n    \"tz\": \"Asia/Shanghai\"\n  },\n  \"message\": \"执行巡检\",\n  \"session\": \"isolated\"\n}\n```\n\n## 字段说明\n\n- `action`：本次要执行的动作。\n- `job_id`：任务标识。更新、删除、启停、立即执行、查询时复用它。\n- `name`：任务的展示名称。\n- `schedule_text`：推荐填写。可用自然语言或 cron 文本。\n- `schedule`：仅在需要精确表达 `at/every/cron` 时填写。\n- `message`：到点后发给智能体的消息。\n- `session`：执行线程策略，只支持 `main` 或 `isolated`。\n- `enabled`：创建后是否立即启用。\n\n## `session` 语义\n\n- `main`\n  触发时把消息发送到该智能体**当前主线程**。\n  不是任务创建时记住的旧线程。\n\n- `isolated`\n  触发时先新建干净线程执行任务，再把结果回送到该智能体**当前主线程**。\n\n如果任务没有绑定智能体主线程，则回退到任务记录里的 `session_id`。\n\n## 循环任务是否会堆积\n\n不会按“漏了多少次就补跑多少次”去堆积。\n\n当前行为是：\n\n- 同一个循环任务同一时刻最多只有一个活跃执行\n- 如果 `every 1s`，但单次执行耗时远超 1 秒，不会并发堆出很多份相同任务\n- 错过的间隔会被跳过或折叠，下一次执行时间会基于当前时间重新推进\n\n这意味着它更接近“保最新节奏”，而不是“补齐全部历史 tick”。\n\n## 成功返回\n\n### `status`\n\n```json\n{\n  \"action\": \"status\",\n  \"scheduler\": {\n    \"enabled\": true,\n    \"poll_interval_ms\": 1000,\n    \"running_jobs\": 1,\n    \"next_run_at\": 1760000000,\n    \"next_run_at_text\": \"2026-04-29T10:00:00+08:00\"\n  },\n  \"user_jobs\": {\n    \"total\": 3,\n    \"enabled\": 2,\n    \"running\": 1,\n    \"next_run_at\": 1760000000,\n    \"next_run_at_text\": \"2026-04-29T10:00:00+08:00\"\n  }\n}\n```\n\n### `add` / `update` / `get`\n\n```json\n{\n  \"action\": \"add\",\n  \"job\": {\n    \"job_id\": \"job_daily_report\",\n    \"name\": \"日报提醒\",\n    \"enabled\": true,\n    \"schedule\": {\n      \"kind\": \"every\",\n      \"every_ms\": 300000\n    },\n    \"next_run_at\": \"2026-04-29T10:00:00+08:00\",\n    \"last_run_at\": null,\n    \"last_status\": null\n  }\n}\n```\n\n### `list`\n\n```json\n{\n  \"action\": \"list\",\n  \"jobs\": [\n    {\n      \"job_id\": \"job_daily_report\",\n      \"name\": \"日报提醒\",\n      \"enabled\": true,\n      \"schedule\": { \"kind\": \"every\", \"every_ms\": 300000 },\n      \"next_run_at\": \"2026-04-29T10:00:00+08:00\",\n      \"last_run_at\": null,\n      \"last_status\": null\n    }\n  ]\n}\n```\n\n## 注意\n\n- `schedule_text` 和 `schedule` 同时传入时，以 `schedule` 为准。\n- `schedule.every_ms` 最小为 `1000`。\n- 参数必须是完整 JSON 对象；如果 JSON 没闭合，工具会直接报参数无效。\n","source_path":"使用说明书/zh-CN/tools/schedule-task.md"}</script>
