  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/ptc","language":"zh-CN","title":"ptc","summary":"Python 临时脚本执行工具的当前行为与返回结构。","updated_at":"2026-04-10","read_when":["你要用一段完整 Python 脚本完成局部任务"],"source_docs":["src/services/tools.rs","src/services/tools/catalog.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/ptc/","headings":[{"id":"section-1","level":1,"text":"ptc"},{"id":"section-2","level":2,"text":"最小参数"},{"id":"section-3","level":2,"text":"成功返回"},{"id":"section-4","level":2,"text":"失败返回"},{"id":"section-5","level":2,"text":"使用边界"}],"prev_slug":"zh-CN/tools/exec","next_slug":"zh-CN/tools/apply-patch","markdown":"# ptc\n\n`ptc` 是 programmatic tool call，定位是：\n\n- 把一段完整 Python 脚本写到临时文件\n- 在指定 `workdir` 下执行\n- 返回 `stdout/stderr/returncode`\n\n它不是随便执行 shell 的替代品。纯命令行任务还是优先用 [执行命令](/docs/zh-CN/tools/exec/)。\n\n## 最小参数\n\n```json\n{\n  \"filename\": \"helper.py\",\n  \"content\": \"print('hello')\"\n}\n```\n\n## 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"ptc\",\n  \"state\": \"completed\",\n  \"summary\": \"Executed Python script C:/.../ptc_temp/helper.py.\",\n  \"data\": {\n    \"path\": \"ptc_temp/helper.py\",\n    \"workdir\": \".\",\n    \"returncode\": 0,\n    \"stdout\": \"hello\\n\",\n    \"stderr\": \"\"\n  }\n}\n```\n\n## 失败返回\n\n常见错误码：\n\n- `TOOL_PTC_INVALID_FILENAME`\n- `TOOL_PTC_CONTENT_REQUIRED`\n- `TOOL_PTC_EXEC_ERROR`\n- `TOOL_PTC_TIMEOUT`\n- `TOOL_PTC_EXEC_FAILED`\n\n失败时 `data` 里通常仍会保留：\n\n- `path`\n- `workdir`\n- `returncode`\n- `stdout`\n- `stderr`\n\n## 使用边界\n\n适合：\n\n- 临时数据处理\n- 小型 Python 解析\n- 需要几步 Python 逻辑但不值得单独落盘项目文件\n\n不适合：\n\n- 多命令 shell 流程\n- 持续性脚本工程\n- 复杂系统编译流程\n\n这些更适合 [执行命令](/docs/zh-CN/tools/exec/)。\n","source_path":"使用说明书/zh-CN/tools/ptc.md"}</script>
