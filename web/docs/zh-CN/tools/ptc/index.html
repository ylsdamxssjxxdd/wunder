  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/ptc","language":"zh-CN","title":"ptc (Python 程序化执行)","summary":"ptc 会把 Python 脚本内容写入工作区临时目录并执行，适合图表、表格、程序化中间产物这类先生成再运行的场景。","updated_at":"2026-03-21","read_when":["你要理解 ptc 和执行命令的分工","你要生成脚本产物而不是直接跑已有命令"],"source_docs":["src/services/tools/catalog.rs","src/services/tools.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/ptc/","headings":[{"id":"section-1","level":1,"text":"ptc (Python 程序化执行)"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"使用示例"},{"id":"section-5","level":3,"text":"生成图表"},{"id":"section-6","level":3,"text":"数据处理"},{"id":"section-7","level":2,"text":"与执行命令的对比"},{"id":"section-8","level":2,"text":"适用场景"},{"id":"section-9","level":2,"text":"执行流程"},{"id":"section-10","level":2,"text":"注意事项"},{"id":"section-11","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/exec","next_slug":"zh-CN/tools/apply-patch","markdown":"# ptc (Python 程序化执行)\n\n先生成脚本再执行的程序化工具。\n\n---\n\n## 功能说明\n\n`ptc` (Programmatic Tool Call) 让模型先给出一段 Python 脚本内容，再由系统把脚本写入临时目录并执行。\n\n**别名**：\n- `programmatic_tool_call`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `filename` | string | ❌ | 文件名，不允许路径段 |\n| `workdir` | string | ❌ | 工作目录 |\n| `content` | string | ✅ | Python 脚本内容 |\n\n---\n\n## 使用示例\n\n### 生成图表\n\n```json\n{\n  \"filename\": \"plot.py\",\n  \"content\": \"import matplotlib.pyplot as plt\\nimport numpy as np\\n\\nx = np.linspace(0, 10, 100)\\ny = np.sin(x)\\n\\nplt.plot(x, y)\\nplt.savefig('plot.png')\\nprint('Plot saved to plot.png')\"\n}\n```\n\n### 数据处理\n\n```json\n{\n  \"content\": \"import pandas as pd\\n\\ndata = pd.read_csv('data.csv')\\nsummary = data.describe()\\nsummary.to_csv('summary.csv')\\nprint('Summary saved to summary.csv')\"\n}\n```\n\n---\n\n## 与执行命令的对比\n\n| 特性 | ptc | [执行命令](/docs/zh-CN/tools/exec/) |\n|------|-----|--------------------------------|\n| 适用场景 | 先生成脚本再执行 | 运行已有命令 |\n| 输入 | Python 脚本内容 | 命令字符串 |\n| 推荐使用 | 图表、数据处理、程序化 | 编译、测试、脚本 |\n| 文件编辑 | ❌ 不适合 | ❌ 不适合 |\n\n---\n\n## 适用场景\n\n✅ **适合使用 ptc**：\n- 生成图表（matplotlib、plotly）\n- 数据清洗和转换（pandas）\n- 输出结构化中间文件\n- 先形成脚本再继续执行链路\n\n❌ **不适合使用 ptc**：\n- 运行已有命令 → 用 `执行命令`\n- 编辑仓库文件 → 用 `写入文件` 或 `应用补丁`\n- 执行系统命令串 → 用 `执行命令`\n\n---\n\n## 执行流程\n\n1. 系统把脚本写到工作区下的临时目录（如 `ptc_temp`）\n2. 调用 Python 执行脚本\n3. 返回执行结果和输出\n\n---\n\n## 注意事项\n\n1. **文件名限制**：\n   - 只接受简单文件名，不允许路径段\n   - 没写扩展名时，按 Python 脚本处理\n   - 非 Python 扩展会被拒绝\n\n2. **用途定位**：\n   - 重点不是编辑仓库源码\n   - 而是快速产生一次性的程序化产物\n\n3. **文件编辑不用 ptc**：\n   - 真正要改仓库文件，优先用文件工具\n\n---\n\n## 延伸阅读\n\n- [执行命令](/docs/zh-CN/tools/exec/)\n- [应用补丁](/docs/zh-CN/tools/apply-patch/)\n- [文件与工作区工具](/docs/zh-CN/tools/workspace-files/)\n","source_path":"静态站文档/zh-CN/tools/ptc.md"}</script>
