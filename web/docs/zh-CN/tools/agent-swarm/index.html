  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/agent-swarm","language":"zh-CN","title":"智能体蜂群","summary":"智能体蜂群面向多智能体协作，支持单目标发送、批量派发、等待聚合结果和按会话回看历史。","updated_at":"2026-04-10","read_when":["你要同时调度多个智能体","你要查 `batch_send -> wait` 这条典型协作路径"],"source_docs":["docs/API文档.md","src/services/tools/catalog.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/agent-swarm/","headings":[{"id":"section-1","level":1,"text":"智能体蜂群"},{"id":"section-2","level":2,"text":"先判断适不适合用它"},{"id":"section-3","level":2,"text":"支持的动作"},{"id":"section-4","level":2,"text":"最常用路径"},{"id":"section-5","level":2,"text":"send 的关键语义"},{"id":"section-6","level":3,"text":"示例：单目标发送"},{"id":"section-7","level":2,"text":"batchsend 的关键语义"},{"id":"section-8","level":3,"text":"示例：批量派发"},{"id":"section-9","level":2,"text":"wait 怎么理解"},{"id":"section-10","level":3,"text":"示例：等待结果"},{"id":"section-11","level":2,"text":"spawn 什么时候用"},{"id":"section-12","level":3,"text":"示例：继续派生"},{"id":"section-13","level":2,"text":"与子智能体控制的区别"},{"id":"section-14","level":2,"text":"常见误区"},{"id":"section-15","level":3,"text":"误区一：send 一定会复用老线程"},{"id":"section-16","level":3,"text":"误区二：wait 的输入是会话标题"},{"id":"section-17","level":3,"text":"误区三：蜂群和子智能体是一回事"},{"id":"section-18","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/subagent-control","next_slug":"zh-CN/tools/memory-manager","markdown":"# 智能体蜂群\n\n多智能体并发协作工具。\n\n## 先判断适不适合用它\n\n`智能体蜂群` 只管理当前用户名下**已存在的其他智能体**。\n\n如果你只是想给当前会话临时派生一个子运行，不要用这里，改看 [子智能体控制](/docs/zh-CN/tools/subagent-control/)。\n\n别名：\n\n- `agent_swarm`\n- `swarm_control`\n\n## 支持的动作\n\n| 动作 | 用途 | 常用参数 |\n|------|------|----------|\n| `list` | 列出可用智能体 | - |\n| `send` | 向单个智能体发送任务 | `agentId/agentName/name/sessionKey`、`message` |\n| `batch_send` | 批量并发派发 | `tasks[]` |\n| `wait` | 等待一组运行结果 | `runIds` |\n| `status` | 查看运行状态快照 | `runIds` |\n| `history` | 查看某个工蜂线程历史 | `sessionKey` |\n| `spawn` | 让已存在智能体继续派生运行 | `agentId/agentName/name`、`task` |\n\n## 最常用路径\n\n最推荐的调用顺序是：\n\n1. `list`\n2. `send` 或 `batch_send`\n3. `wait`\n4. 必要时再 `status` 或 `history`\n\n如果是多工蜂协作，优先：\n\n1. `batch_send`\n2. `wait`\n\n## `send` 的关键语义\n\n`send` 需要：\n\n- 一个目标：`agentId`、`agentName`、`name` 或 `sessionKey`\n- 一条消息：`message`\n\n最重要的行为约定是：\n\n- 如果**没有显式提供** `sessionKey`，系统会为目标工蜂新建线程\n- 这个新线程会绑定成该工蜂新的主线程\n\n这样做是为了让工蜂上下文保持干净。\n\n只有你显式提供 `sessionKey` 时，系统才会复用指定线程。\n\n### 示例：单目标发送\n\n```json\n{\n  \"action\": \"send\",\n  \"agentId\": \"researcher\",\n  \"message\": \"研究这个技术方案的可行性\"\n}\n```\n\n## `batch_send` 的关键语义\n\n`batch_send` 适合一次并发派给多个工蜂。\n\n每个 `tasks[]` 项都需要：\n\n- 目标智能体或目标线程\n- `message`\n\n### 示例：批量派发\n\n```json\n{\n  \"action\": \"batch_send\",\n  \"tasks\": [\n    {\n      \"agentId\": \"researcher\",\n      \"message\": \"整理背景资料\"\n    },\n    {\n      \"agentId\": \"writer\",\n      \"message\": \"基于背景资料写初稿\"\n    },\n    {\n      \"agentId\": \"reviewer\",\n      \"message\": \"准备质量检查清单\"\n    }\n  ]\n}\n```\n\n## `wait` 怎么理解\n\n`wait` 用于等待已派发运行收敛。\n\n它的输入是：\n\n- `runIds`\n\n不是会话标题，也不是智能体名称。\n\n### 示例：等待结果\n\n```json\n{\n  \"action\": \"wait\",\n  \"runIds\": [\"run-1\", \"run-2\", \"run-3\"]\n}\n```\n\n等待语义分三种：\n\n- 显式传 `0`：立即返回当前快照\n- 显式传正数：等待指定超时\n- 不传等待参数：走系统默认超时\n\n## `spawn` 什么时候用\n\n`spawn` 仍然面向已存在智能体，但它更像“继续派生一段运行”。\n\n它需要：\n\n- `agentId`、`agentName` 或 `name`\n- `task`\n\n### 示例：继续派生\n\n```json\n{\n  \"action\": \"spawn\",\n  \"agentName\": \"researcher\",\n  \"task\": \"继续分析这份方案的风险\"\n}\n```\n\n## 与子智能体控制的区别\n\n| 工具 | 适用场景 |\n|------|----------|\n| [子智能体控制](/docs/zh-CN/tools/subagent-control/) | 当前会话内的临时子运行 |\n| 智能体蜂群 | 调度当前用户已有的其他智能体 |\n\n## 常见误区\n\n### 误区一：`send` 一定会复用老线程\n\n不会。\n\n默认是新建线程并切成目标工蜂的主线程，只有显式传 `sessionKey` 才会复用。\n\n### 误区二：`wait` 的输入是会话标题\n\n不是。\n\n`wait` 看的是 `runIds`。\n\n### 误区三：蜂群和子智能体是一回事\n\n不是。\n\n蜂群调的是已有智能体，子智能体是临时派生运行。\n\n## 延伸阅读\n\n- [蜂群协作](/docs/zh-CN/concepts/swarm/)\n- [子智能体控制](/docs/zh-CN/tools/subagent-control/)\n- [会话线程控制](/docs/zh-CN/tools/thread-control/)\n","source_path":"使用说明书/zh-CN/tools/agent-swarm.md"}</script>
