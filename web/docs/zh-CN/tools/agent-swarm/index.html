  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/agent-swarm","language":"zh-CN","title":"智能体蜂群","summary":"调度已存在智能体的多智能体协作工具。","updated_at":"2026-04-10","read_when":["你要调度当前用户已经拥有的其他正式智能体"],"source_docs":["src/services/tools.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/agent-swarm/","headings":[{"id":"section-1","level":1,"text":"智能体蜂群"},{"id":"section-2","level":2,"text":"主要动作"},{"id":"section-3","level":2,"text":"list"},{"id":"section-4","level":2,"text":"spawn"},{"id":"section-5","level":2,"text":"status"},{"id":"section-6","level":2,"text":"状态语义"}],"prev_slug":"zh-CN/tools/subagent-control","next_slug":"zh-CN/tools/memory-manager","markdown":"# 智能体蜂群\n\n`agent_swarm` 和 `subagent_control` 最大的区别是：\n\n- `subagent_control`：当前会话里临时派生子运行\n- `agent_swarm`：调度用户已经存在的其他正式智能体\n\n## 主要动作\n\n- `list`\n- `send`\n- `batch_send`\n- `spawn`\n- `wait`\n- `status`\n- `history`\n\n## `list`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"list\",\n  \"state\": \"completed\",\n  \"summary\": \"Listed 4 swarm workers.\",\n  \"data\": {\n    \"total\": 4,\n    \"items\": [ ... ]\n  }\n}\n```\n\n## `spawn`\n\n典型是异步接收态：\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"spawn\",\n  \"state\": \"accepted\",\n  \"summary\": \"Spawned swarm task ...\",\n  \"data\": {\n    \"task_id\": \"task_xxx\",\n    \"run_id\": \"run_xxx\",\n    \"session_id\": \"sess_xxx\",\n    \"agent_id\": \"agent_research\",\n    \"agent_name\": \"研究员\",\n    \"created_session\": true\n  },\n  \"next_step_hint\": \"Use agent_swarm.wait or status/history before treating the worker result as final.\"\n}\n```\n\n## `status`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"status\",\n  \"state\": \"completed\",\n  \"summary\": \"Loaded swarm status for 研究员.\",\n  \"data\": {\n    \"agent\": { ... },\n    \"session_total\": 6,\n    \"active_session_total\": 2,\n    \"running_session_total\": 1,\n    \"lock_session_total\": 0,\n    \"active_session_ids\": [\"sess_xxx\"],\n    \"recent_sessions\": [ ... ]\n  }\n}\n```\n\n## 状态语义\n\n`agent_swarm` 常见 `state`：\n\n- `completed`\n- `accepted`\n- `running`\n- `timeout`\n- `partial`\n- `cancelled`\n- `error`\n\n看到 `accepted`、`running`、`timeout` 时，通常都不该直接当最终结果，而应继续 `wait` 或 `status/history`。\n","source_path":"使用说明书/zh-CN/tools/agent-swarm.md"}</script>
