  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/agent-swarm","language":"zh-CN","title":"智能体蜂群","summary":"智能体蜂群面向多智能体协作，支持单目标发送、批量派发、等待聚合结果和按会话回看历史。","updated_at":"2026-03-21","read_when":["你要同时调度多个智能体","你要查 batch_send -&gt; wait 这条典型协作路径"],"source_docs":["src/services/tools/catalog.rs","src/services/tools.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/agent-swarm/","headings":[{"id":"section-1","level":1,"text":"智能体蜂群"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"支持的动作"},{"id":"section-5","level":2,"text":"使用示例"},{"id":"section-6","level":3,"text":"列出可用智能体"},{"id":"section-7","level":3,"text":"单目标发送"},{"id":"section-8","level":3,"text":"批量派发"},{"id":"section-9","level":3,"text":"等待结果"},{"id":"section-10","level":3,"text":"查看运行状态"},{"id":"section-11","level":2,"text":"完整工作流示例"},{"id":"section-12","level":2,"text":"推荐路径"},{"id":"section-13","level":2,"text":"与子智能体控制的区别"},{"id":"section-14","level":2,"text":"适用场景"},{"id":"section-15","level":2,"text":"注意事项"},{"id":"section-16","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/subagent-control","next_slug":"zh-CN/tools/memory-manager","markdown":"# 智能体蜂群\n\n多智能体并发协作工具。\n\n---\n\n## 功能说明\n\n`智能体蜂群` 是 Wunder 里最接近「多智能体协作总线」的内置工具。\n\n**别名**：\n- `agent_swarm`\n- `swarm_control`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `action` | string | ✅ | 要执行的动作 |\n| 其他参数 | - | ❌ | 根据 action 不同而不同 |\n\n---\n\n## 支持的动作\n\n| 动作 | 说明 | 常用附加参数 |\n|------|------|--------------|\n| `list` | 列出可用智能体 | - |\n| `status` | 查看运行状态 | `runIds` |\n| `send` | 单目标发送 | `agentId`, `sessionKey`, `message`, `task` |\n| `history` | 查看历史 | `sessionKey` |\n| `spawn` | 派生运行 | `agentId`, `task`, `label` |\n| `batch_send` | 批量派发 | `tasks` |\n| `wait` | 等待结果 | `runIds` |\n\n---\n\n## 使用示例\n\n### 列出可用智能体\n\n```json\n{\n  \"action\": \"list\"\n}\n```\n\n### 单目标发送\n\n```json\n{\n  \"action\": \"send\",\n  \"agentId\": \"researcher\",\n  \"task\": \"研究这个技术方案的可行性\"\n}\n```\n\n### 批量派发\n\n```json\n{\n  \"action\": \"batch_send\",\n  \"tasks\": [\n    {\n      \"agentId\": \"researcher\",\n      \"task\": \"研究技术方案\"\n    },\n    {\n      \"agentId\": \"lawyer\",\n      \"task\": \"审查法律风险\"\n    },\n    {\n      \"agentId\": \"finance\",\n      \"task\": \"评估成本\"\n    }\n  ]\n}\n```\n\n### 等待结果\n\n```json\n{\n  \"action\": \"wait\",\n  \"runIds\": [\"run-1\", \"run-2\", \"run-3\"]\n}\n```\n\n### 查看运行状态\n\n```json\n{\n  \"action\": \"status\",\n  \"runIds\": [\"run-1\", \"run-2\", \"run-3\"]\n}\n```\n\n---\n\n## 完整工作流示例\n\n```json\n// 1. 列出可用智能体\n{\n  \"action\": \"list\"\n}\n\n// 2. 批量派发任务\n{\n  \"action\": \"batch_send\",\n  \"tasks\": [\n    {\n      \"agentId\": \"researcher\",\n      \"task\": \"研究技术方案\",\n      \"label\": \"技术研究\"\n    },\n    {\n      \"agentId\": \"writer\",\n      \"task\": \"撰写报告\",\n      \"label\": \"报告撰写\"\n    }\n  ]\n}\n\n// 3. 等待结果\n{\n  \"action\": \"wait\",\n  \"runIds\": [\"run-1\", \"run-2\"]\n}\n\n// 4. 查看状态\n{\n  \"action\": \"status\",\n  \"runIds\": [\"run-1\", \"run-2\"]\n}\n\n// 5. 查看历史\n{\n  \"action\": \"history\",\n  \"sessionKey\": \"session-123\"\n}\n```\n\n---\n\n## 推荐路径\n\n最常见的路径是：\n1. `list` - 列出可用智能体\n2. `send` 或 `batch_send` - 发送任务\n3. `wait` - 等待结果\n4. `history` 或 `status` - 查看结果\n\n这条路径和「先派发，再等待，再取结果」很接近。\n\n---\n\n## 与子智能体控制的区别\n\n| 工具 | 说明 | 适用场景 |\n|------|------|----------|\n| [子智能体控制](/docs/zh-CN/tools/subagent-control/) | 单个子会话 | 只盯一个子运行 |\n| 智能体蜂群 | 多目标、多智能体并发 | 大范围并发派发 |\n\n---\n\n## 适用场景\n\n✅ **适合使用智能体蜂群**：\n- 让不同智能体分别做研究、法务、财务、写作\n- 把同一任务拆给多个角色并行处理\n- 在主线程之外做批量协作\n- 单目标发送或批量派发\n- 等待聚合结果\n\n---\n\n## 注意事项\n\n1. **核心路径**：\n   - 最核心的路径是 `list -> send/batch_send -> wait -> history/status`\n   - 按这个顺序使用最顺畅\n\n2. **单目标 vs 多目标**：\n   - `send` 适合单目标\n   - `batch_send` 适合多目标\n\n3. **wait 的输入**：\n   - `wait` 的输入是运行 ID\n   - 不是普通会话标题\n\n---\n\n## 延伸阅读\n\n- [子智能体控制](/docs/zh-CN/tools/subagent-control/)\n- [会话线程控制](/docs/zh-CN/tools/thread-control/)\n- [蜂群协作](/docs/zh-CN/concepts/swarm/)\n","source_path":"静态站文档/zh-CN/tools/agent-swarm.md"}</script>
