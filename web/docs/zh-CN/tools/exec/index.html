  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/exec","language":"zh-CN","title":"执行命令","summary":"在工作区中执行系统命令，支持编译、测试、运行脚本，受安全策略和预算约束。","updated_at":"2026-04-02","read_when":["你需要在工作区中运行命令","你想了解命令执行的安全边界"],"source_docs":["src/services/tools/catalog.rs","config/wunder-example.yaml"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/exec/","headings":[{"id":"section-1","level":1,"text":"执行命令"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"使用示例"},{"id":"section-5","level":3,"text":"简单命令"},{"id":"section-6","level":3,"text":"指定工作目录"},{"id":"section-7","level":3,"text":"带超时设置"},{"id":"section-8","level":3,"text":"预演模式"},{"id":"section-9","level":2,"text":"安全边界"},{"id":"section-10","level":2,"text":"与 ptc 的对比"},{"id":"section-11","level":2,"text":"常见场景"},{"id":"section-12","level":3,"text":"编译 Rust 项目"},{"id":"section-13","level":3,"text":"运行 Python 脚本"},{"id":"section-14","level":3,"text":"安装 npm 依赖"},{"id":"section-15","level":3,"text":"运行测试"},{"id":"section-16","level":2,"text":"注意事项"},{"id":"section-17","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/workspace-files","next_slug":"zh-CN/tools/ptc","markdown":"# 执行命令\n\n在工作区中执行系统命令，如编译、测试、运行脚本等。\n\n---\n\n## 功能说明\n\n`执行命令` 用于在当前工作区中执行系统命令，适用于：\n- 编译项目\n- 运行测试\n- 执行脚本\n- 产物检查\n\n**别名**：\n- `execute_command`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `content` | string | ✅ | 要执行的命令 |\n| `workdir` | string | ❌ | 工作目录，默认为工作区根目录 |\n| `timeout_s` | integer | ❌ | 超时时间（秒） |\n| `dry_run` | boolean | ❌ | 预演模式 |\n| `time_budget_ms` | integer | ❌ | 时间预算（毫秒） |\n| `output_budget_bytes` | integer | ❌ | 输出预算（字节） |\n| `max_commands` | integer | ❌ | 最大命令数 |\n\n---\n\n## 使用示例\n\n### 简单命令\n```json\n{\n  \"content\": \"ls -la\"\n}\n```\n\n### 指定工作目录\n```json\n{\n  \"content\": \"cargo build\",\n  \"workdir\": \"src\"\n}\n```\n\n### 带超时设置\n```json\n{\n  \"content\": \"npm install\",\n  \"timeout_s\": 300\n}\n```\n\n### 预演模式\n```json\n{\n  \"content\": \"rm -rf temp/\",\n  \"dry_run\": true\n}\n```\n\n---\n\n## 安全边界\n\n`执行命令` 不是完全自由的，受以下约束：\n\n| 约束项 | 说明 |\n|--------|------|\n| `allow_commands` | 允许的命令列表 |\n| `allow_paths` | 允许的路径列表 |\n| `deny_globs` | 拒绝的文件模式 |\n| 执行环境 | 本机执行或沙盒执行 |\n\n---\n\n## 与 ptc 的对比\n\n| 特性 | 执行命令 | [ptc](/docs/zh-CN/tools/ptc/) |\n|------|----------|--------------------------------|\n| 适用场景 | 运行已有命令、脚本、构建 | 先形成脚本再执行 |\n| 目标 | 执行外部命令 | 程序化执行 |\n| 推荐使用 | 执行已有命令 | 复杂逻辑、图表生成 |\n\n---\n\n## 常见场景\n\n### 编译 Rust 项目\n```json\n{\n  \"content\": \"cargo build --release\"\n}\n```\n\n### 运行 Python 脚本\n```json\n{\n  \"content\": \"python script.py\"\n}\n```\n\n### 安装 npm 依赖\n```json\n{\n  \"content\": \"npm install\"\n}\n```\n\n### 运行测试\n```json\n{\n  \"content\": \"cargo test\"\n}\n```\n\n---\n\n## 注意事项\n\n1. **预算控制很重要**：\n   - 长命令和海量输出可能拖爆上下文\n   - 使用 `output_budget_bytes` 限制输出大小\n\n2. **文件编辑不用命令**：\n   - 文件编辑优先用 `写入文件` 或 `应用补丁`\n   - 不要用 `echo` 等命令创建文件\n\n3. **安全第一**：\n   - 危险命令先用 `dry_run` 预览\n   - 注意命令的影响范围\n\n---\n\n## 延伸阅读\n\n- [ptc](/docs/zh-CN/tools/ptc/)\n- [应用补丁](/docs/zh-CN/tools/apply-patch/)\n- [文件与工作区工具](/docs/zh-CN/tools/workspace-files/)\n","source_path":"使用说明书/zh-CN/tools/exec.md"}</script>
