  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/exec","language":"zh-CN","title":"执行命令","summary":"`execute_command` 的预算、dry-run、输出守卫与返回结构。","updated_at":"2026-04-10","read_when":["你要运行 shell 命令、编译、测试或调用现成 CLI"],"source_docs":["src/services/tools.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/exec/","headings":[{"id":"section-1","level":1,"text":"执行命令"},{"id":"section-2","level":2,"text":"最小参数"},{"id":"section-3","level":2,"text":"常用参数"},{"id":"section-4","level":2,"text":"成功返回"},{"id":"section-5","level":2,"text":"dryrun"},{"id":"section-6","level":2,"text":"失败返回"},{"id":"section-7","level":2,"text":"特殊行为：误把 patch 文本传进来"},{"id":"section-8","level":2,"text":"什么时候别用它"}],"prev_slug":"zh-CN/tools/workspace-files","next_slug":"zh-CN/tools/ptc","markdown":"# 执行命令\n\n`execute_command` 现在不是“随便扔一串 shell 文本然后读 stdout”那么简单了。它的关键变化有三点：\n\n- 支持 `dry_run`\n- 支持命令预算与输出守卫\n- 会把误传入的 patch 文本自动拦截到 `apply_patch`\n\n## 最小参数\n\n```json\n{\n  \"content\": \"cargo check --release\"\n}\n```\n\n## 常用参数\n\n- `content`\n- `workdir`\n- `timeout_s`\n- `budget`\n- `dry_run`\n\n`budget` 常见字段：\n\n- `time_budget_ms`\n- `output_budget_bytes`\n- `max_commands`\n\n## 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"execute_command\",\n  \"state\": \"completed\",\n  \"summary\": \"Executed 1 commands.\",\n  \"data\": {\n    \"results\": [\n      {\n        \"command\": \"cargo check --release\",\n        \"command_index\": 0,\n        \"command_session_id\": \"cmd_xxx\",\n        \"returncode\": 0,\n        \"stdout\": \"...\",\n        \"stderr\": \"\",\n        \"output_meta\": {\n          \"truncated\": false,\n          \"total_bytes\": 1024,\n          \"omitted_bytes\": 0,\n          \"stdout\": { \"truncated\": false },\n          \"stderr\": { \"truncated\": false }\n        }\n      }\n    ],\n    \"budget\": {\n      \"time_budget_ms\": 60000,\n      \"output_budget_bytes\": 32768,\n      \"max_commands\": 4\n    },\n    \"output_guard\": {\n      \"truncated\": false,\n      \"commands\": 1,\n      \"truncated_commands\": 0,\n      \"total_bytes\": 1024,\n      \"omitted_bytes\": 0,\n      \"effective_total_bytes\": 32768\n    },\n    \"sandbox\": false\n  }\n}\n```\n\n如果输出被守卫裁剪，还会出现：\n\n```json\n{\n  \"next_step_hint\": \"Command output was truncated by the output guard...\"\n}\n```\n\n## `dry_run`\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"execute_command\",\n  \"state\": \"dry_run\",\n  \"summary\": \"Validated command plan without execution.\",\n  \"data\": {\n    \"dry_run\": true,\n    \"workdir\": \"C:/.../workspace\",\n    \"command_count\": 1,\n    \"commands\": [\"cargo check --release\"],\n    \"timeout_s\": 60,\n    \"budget\": { ... },\n    \"output_guard\": { ... },\n    \"sandbox\": false\n  }\n}\n```\n\n## 失败返回\n\n非零退出、超时、工作目录错误都走统一失败骨架。常见错误码：\n\n- `TOOL_EXEC_COMMAND_REQUIRED`\n- `TOOL_EXEC_WORKDIR_NOT_FOUND`\n- `TOOL_EXEC_WORKDIR_NOT_DIR`\n- `TOOL_EXEC_NOT_ALLOWED`\n- `TOOL_EXEC_TIMEOUT`\n- `TOOL_EXEC_NON_ZERO_EXIT`\n- `TOOL_EXEC_BUDGET_COMMAND_LIMIT`\n\n超时或非零退出时，`data.results` 里仍会保留已经收集到的 stdout/stderr，方便继续判断。\n\n## 特殊行为：误把 patch 文本传进来\n\n如果 `content` 里不是命令，而是完整的 `*** Begin Patch ... *** End Patch`，系统会自动转去执行 `apply_patch`，并在结果上补一个字段：\n\n```json\n{\n  \"intercepted_from\": \"execute_command\"\n}\n```\n\n## 什么时候别用它\n\n- 只想小范围改文件：用 [应用补丁](/docs/zh-CN/tools/apply-patch/)\n- 纯 Python 临时程序：用 [ptc](/docs/zh-CN/tools/ptc/)\n- 只是想读代码：用 [工作区文件](/docs/zh-CN/tools/workspace-files/)\n","source_path":"使用说明书/zh-CN/tools/exec.md"}</script>
