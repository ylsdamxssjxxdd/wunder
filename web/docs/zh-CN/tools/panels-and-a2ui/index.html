  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/panels-and-a2ui","language":"zh-CN","title":"界面协同工具","summary":"`a2ui`、`计划面板`、`问询面板` 负责把模型执行过程变成前端可展示、可交互的界面状态，而不是只输出一段文本。","updated_at":"2026-03-20","read_when":["你要理解 Wunder 前端为什么能展示计划和问询分流","你要知道哪些工具专门用来驱动界面"],"source_docs":["src/services/tools/catalog.rs","src/services/tools.rs","docs/API文档.md"],"tab":"工具","group":"界面与自动化","group_path":["界面与自动化"],"url":"/docs/zh-CN/tools/panels-and-a2ui/","headings":[{"id":"section-1","level":1,"text":"界面协同工具"},{"id":"section-2","level":2,"text":"a2ui"},{"id":"section-3","level":2,"text":"计划面板"},{"id":"section-4","level":2,"text":"问询面板"},{"id":"section-5","level":2,"text":"这组工具适合什么"},{"id":"section-6","level":2,"text":"它们和最终回复的区别"},{"id":"section-7","level":2,"text":"实施建议"},{"id":"section-8","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/desktop-control","next_slug":"zh-CN/tools/schedule-task","markdown":"# 界面协同工具\n\n这组工具和文件、命令、网页抓取不同。\n\n它们的目标不是直接“完成外部动作”，而是把模型当前状态显式投到界面层。\n\n## `a2ui`\n\n`a2ui` 用于把结构化 UI 消息发给前端。\n\n常用字段：\n\n- `uid`\n- `a2ui`\n- `content`\n\n它更像界面层载荷，而不是普通文本回复。\n\n## `计划面板`\n\n`计划面板` 用来展示步骤化执行计划。\n\n常用字段：\n\n- `explanation`\n- `plan`\n\n其中每个 `plan` 项都包含：\n\n- `step`\n- `status`\n\n系统会自动规范状态值，并且只保留一个 `in_progress` 项，其余会回落为 `pending`。\n\n## `问询面板`\n\n`问询面板` 用来让前端展示一个可选路线面板。\n\n常用字段：\n\n- `question`\n- `routes`\n- `multiple`\n\n其中每个 `route` 主要包含：\n\n- `label`\n- `description`\n- `recommended`\n\n## 这组工具适合什么\n\n- 展示执行计划\n- 在多个实现路径之间让用户选路\n- 把结构化界面状态推给前端\n\n这也是 Wunder 前端不只是“聊天框”的原因之一。\n\n## 它们和最终回复的区别\n\n- `最终回复` 负责结束本轮并返回最终答案。\n- 这组工具负责在过程里给界面补结构化状态。\n\n所以它们更像“过程可视化工具”。\n\n## 实施建议\n\n- `a2ui`、计划面板、问询面板都属于界面驱动工具。\n- 它们的目标是让前端展示状态和选择，而不是替代最终回复。\n- 这类工具最适合配合用户侧前端和管理端调试面板理解执行过程。\n\n## 延伸阅读\n\n- [用户侧前端](/docs/zh-CN/surfaces/frontend/)\n- [管理端界面](/docs/zh-CN/surfaces/web-admin/)\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n","source_path":"静态站文档/zh-CN/tools/panels-and-a2ui.md"}</script>
