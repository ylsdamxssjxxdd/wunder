  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/panels-and-a2ui","language":"zh-CN","title":"界面协同工具","summary":"a2ui、计划面板、问询面板负责把模型执行过程变成前端可展示、可交互的界面状态，而不是只输出一段文本。","updated_at":"2026-03-21","read_when":["你要理解 Wunder 前端为什么能展示计划和问询分流","你要知道哪些工具专门用来驱动界面"],"source_docs":["src/services/tools/catalog.rs","src/services/tools.rs"],"tab":"工具","group":"界面与自动化","group_path":["界面与自动化"],"url":"/docs/zh-CN/tools/panels-and-a2ui/","headings":[{"id":"section-1","level":1,"text":"界面协同工具"},{"id":"section-2","level":2,"text":"工具概览"},{"id":"section-3","level":2,"text":"a2ui"},{"id":"section-4","level":3,"text":"功能说明"},{"id":"section-5","level":3,"text":"参数说明"},{"id":"section-6","level":2,"text":"计划面板"},{"id":"section-7","level":3,"text":"功能说明"},{"id":"section-8","level":3,"text":"参数说明"},{"id":"section-9","level":3,"text":"使用示例"},{"id":"section-10","level":2,"text":"问询面板"},{"id":"section-11","level":3,"text":"功能说明"},{"id":"section-12","level":3,"text":"参数说明"},{"id":"section-13","level":3,"text":"使用示例"},{"id":"section-14","level":2,"text":"适用场景"},{"id":"section-15","level":2,"text":"与最终回复的区别"},{"id":"section-16","level":2,"text":"注意事项"},{"id":"section-17","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/desktop-control","next_slug":"zh-CN/tools/schedule-task","markdown":"# 界面协同工具\n\n把模型执行过程可视化的界面驱动工具。\n\n---\n\n## 工具概览\n\n界面协同工具包含三个工具：\n\n| 工具名 | 说明 | 别名 |\n|--------|------|------|\n| `a2ui` | 发送结构化 UI 消息 | - |\n| `计划面板` | 展示步骤化执行计划 | `update_plan` |\n| `问询面板` | 让用户选择实现路线 | `question_panel`、`ask_panel` |\n\n---\n\n## a2ui\n\n### 功能说明\n\n把结构化 UI 消息发送给前端，用于展示各种 UI 组件。\n\n### 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `uid` | string | ❌ | 唯一标识符 |\n| `a2ui` | object | ✅ | UI 载荷 |\n| `content` | string | ❌ | 内容文本 |\n\n---\n\n## 计划面板\n\n### 功能说明\n\n展示步骤化执行计划，让用户了解当前进度和后续步骤。\n\n**别名**：\n- `update_plan`\n\n### 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `explanation` | string | ❌ | 计划说明 |\n| `plan` | array | ✅ | 计划步骤数组 |\n\n每个 plan 项包含：\n| 字段 | 类型 | 说明 |\n|------|------|------|\n| `step` | string | 步骤名称 |\n| `status` | string | 状态：`pending`/`in_progress`/`completed` |\n\n**系统自动处理**：\n- 只保留一个 `in_progress` 项\n- 其余会自动回落为 `pending`\n\n### 使用示例\n\n```json\n{\n  \"explanation\": \"正在重构项目结构\",\n  \"plan\": [\n    {\n      \"step\": \"分析当前目录结构\",\n      \"status\": \"completed\"\n    },\n    {\n      \"step\": \"创建新的模块目录\",\n      \"status\": \"in_progress\"\n    },\n    {\n      \"step\": \"移动文件到新位置\",\n      \"status\": \"pending\"\n    },\n    {\n      \"step\": \"更新导入语句\",\n      \"status\": \"pending\"\n    }\n  ]\n}\n```\n\n---\n\n## 问询面板\n\n### 功能说明\n\n让前端展示一个可选路线面板，让用户选择实现方案。\n\n**别名**：\n- `question_panel`\n- `ask_panel`\n\n### 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `question` | string | ✅ | 问题文本 |\n| `routes` | array | ✅ | 可选路线数组 |\n| `multiple` | boolean | ❌ | 是否允许多选，默认 false |\n\n每个 route 项包含：\n| 字段 | 类型 | 说明 |\n|------|------|------|\n| `label` | string | 选项标签 |\n| `description` | string | 选项说明 |\n| `recommended` | boolean | 是否推荐 |\n\n### 使用示例\n\n```json\n{\n  \"question\": \"你想采用哪种重构方案？\",\n  \"multiple\": false,\n  \"routes\": [\n    {\n      \"label\": \"方案 A：渐进式重构\",\n      \"description\": \"逐步迁移，风险较低\",\n      \"recommended\": true\n    },\n    {\n      \"label\": \"方案 B：大爆炸重构\",\n      \"description\": \"一次性完成，风险较高\",\n      \"recommended\": false\n    }\n  ]\n}\n```\n\n---\n\n## 适用场景\n\n✅ **适合使用界面协同工具**：\n- 展示执行计划和进度\n- 在多个实现路径之间让用户选路\n- 把结构化界面状态推给前端\n- 让用户参与决策过程\n\n---\n\n## 与最终回复的区别\n\n| 特性 | 界面协同工具 | [最终回复](/docs/zh-CN/tools/final-response/) |\n|------|-------------|--------------------------------|\n| 目标 | 过程可视化 | 结束本轮 |\n| 时机 | 执行过程中 | 最后一步 |\n| 作用 | 给界面补结构化状态 | 返回最终答案 |\n\n---\n\n## 注意事项\n\n1. **不是替代最终回复**：\n   - 界面协同工具负责过程展示\n   - 最终仍然需要用 `最终回复` 结束\n\n2. **状态管理**：\n   - `计划面板` 的状态会自动规范化\n   - 只保留一个 `in_progress` 项\n\n3. **前端展示**：\n   - 这些工具最适合配合用户侧前端和管理端调试面板\n   - 能更好地理解执行过程\n\n---\n\n## 延伸阅读\n\n- [用户侧前端](/docs/zh-CN/surfaces/frontend/)\n- [管理端界面](/docs/zh-CN/surfaces/web-admin/)\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n","source_path":"静态站文档/zh-CN/tools/panels-and-a2ui.md"}</script>
