  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/panels-and-a2ui","language":"zh-CN","title":"面板与 a2ui","summary":"`a2ui`、`plan_update`、`question_panel` 的语义与返回。","updated_at":"2026-04-10","read_when":["你要更新前端计划面板、问询面板或发送结构化 UI 指令"],"source_docs":["src/services/tools.rs","src/services/tools/catalog.rs"],"tab":"工具","group":"界面与自动化","group_path":["界面与自动化"],"url":"/docs/zh-CN/tools/panels-and-a2ui/","headings":[{"id":"section-1","level":1,"text":"面板与 a2ui"},{"id":"section-2","level":2,"text":"a2ui"},{"id":"section-3","level":2,"text":"planupdate"},{"id":"section-4","level":3,"text":"最小参数"},{"id":"section-5","level":3,"text":"成功返回"},{"id":"section-6","level":2,"text":"questionpanel"},{"id":"section-7","level":3,"text":"最小参数"},{"id":"section-8","level":3,"text":"成功返回"},{"id":"section-9","level":2,"text":"重点"}],"prev_slug":"zh-CN/tools/desktop-control","next_slug":"zh-CN/tools/schedule-task","markdown":"# 面板与 a2ui\n\n这里有三类东西：\n\n- `a2ui`\n- `plan_update`\n- `question_panel`\n\n其中 `a2ui` 是返回例外项，后两者已经走统一成功骨架。\n\n## `a2ui`\n\n它直接把结构化 UI 指令发给前端，返回也很薄：\n\n```json\n{\n  \"uid\": \"surface_xxx\",\n  \"a2ui\": [\n    {\n      \"beginRendering\": { }\n    }\n  ],\n  \"content\": \"optional text\"\n}\n```\n\n推荐只使用这几种消息形状：\n\n- `beginRendering`\n- `surfaceUpdate`\n- `dataModelUpdate`\n- `deleteSurface`\n\n## `plan_update`\n\n### 最小参数\n\n```json\n{\n  \"plan\": [\n    { \"step\": \"分析代码\", \"status\": \"completed\" },\n    { \"step\": \"更新文档\", \"status\": \"in_progress\" }\n  ]\n}\n```\n\n### 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"plan_update\",\n  \"state\": \"completed\",\n  \"summary\": \"Updated the execution plan.\",\n  \"data\": {\n    \"status\": \"ok\"\n  }\n}\n```\n\n## `question_panel`\n\n### 最小参数\n\n```json\n{\n  \"question\": \"请选择处理方式\",\n  \"routes\": [\n    {\n      \"label\": \"保守修复\",\n      \"description\": \"先最小化修复\",\n      \"recommended\": true\n    }\n  ],\n  \"multiple\": false\n}\n```\n\n### 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"question_panel\",\n  \"state\": \"awaiting_input\",\n  \"summary\": \"Opened a question panel and is waiting for user input.\",\n  \"data\": {\n    \"question\": \"请选择处理方式\",\n    \"routes\": [\n      {\n        \"label\": \"保守修复\",\n        \"description\": \"先最小化修复\",\n        \"recommended\": true\n      }\n    ],\n    \"multiple\": false\n  }\n}\n```\n\n## 重点\n\n- `plan_update` 只是更新展示，不是任务执行器\n- `question_panel` 成功并不等于任务结束，它只是进入 `awaiting_input`\n- `a2ui` 更底层，适合明确知道前端要接什么结构时使用\n","source_path":"使用说明书/zh-CN/tools/panels-and-a2ui.md"}</script>
