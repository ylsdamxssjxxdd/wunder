  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/self-status","language":"zh-CN","title":"自我状态","summary":"`self_status` 用于查看当前会话、模型、事件与线程运行态。","updated_at":"2026-04-10","read_when":["你要查看当前会话到底跑到了哪一步"],"source_docs":["src/services/tools/self_status_tool.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/self-status/","headings":[{"id":"section-1","level":1,"text":"自我状态"},{"id":"section-2","level":2,"text":"最小参数"},{"id":"section-3","level":2,"text":"常用参数"},{"id":"section-4","level":2,"text":"返回结构"},{"id":"section-5","level":2,"text":"重点"}],"prev_slug":"zh-CN/tools/channel","next_slug":"zh-CN/tools/user-world","markdown":"# 自我状态\n\n`self_status` 是一个诊断型工具。  \n它和大多数工具不同，成功时直接返回状态对象，不包统一的 `ok/action/state/summary/data`。\n\n## 最小参数\n\n```json\n{\n  \"detail_level\": \"standard\"\n}\n```\n\n## 常用参数\n\n- `detail_level`：`basic` / `standard` / `full`\n- `include_events`\n- `events_limit`\n- `include_system_metrics`\n\n## 返回结构\n\n```json\n{\n  \"tool\": \"self_status\",\n  \"detail_level\": \"standard\",\n  \"session\": {\n    \"user_id\": \"user_xxx\",\n    \"session_id\": \"sess_xxx\",\n    \"workspace_id\": \"user_xxx\",\n    \"agent_id\": \"agent_docs\",\n    \"is_admin\": false\n  },\n  \"model\": {\n    \"active\": { ... },\n    \"configured_default\": { ... }\n  },\n  \"context\": {\n    \"context_occupancy_tokens\": 12345,\n    \"context_overflow\": false,\n    \"monitor_context_tokens\": 12000,\n    \"monitor_context_tokens_peak\": 18000\n  },\n  \"monitor\": {\n    \"status\": \"running\",\n    \"stage\": \"tool_call\",\n    \"summary\": \"正在等待子智能体结果\",\n    \"updated_time\": 1760000000\n  },\n  \"thread\": { ... },\n  \"rounds\": {\n    \"user_rounds\": 3,\n    \"model_rounds_peak\": 12,\n    \"event_user_round_peak\": 3\n  },\n  \"events\": {\n    \"total\": 48,\n    \"last_event_id\": 128,\n    \"counts\": {\n      \"llm_request\": 5,\n      \"tool_call\": 12,\n      \"tool_result\": 12,\n      \"approval_request\": 0,\n      \"approval_resolved\": 0\n    },\n    \"by_type\": { ... },\n    \"recent_limit\": 20,\n    \"recent\": [ ... ]\n  },\n  \"system_metrics\": { ... }\n}\n```\n\n## 重点\n\n- `detail_level=full` 时默认会带更多事件和系统指标\n- `events.recent` 适合看最近发生了什么\n- `thread` 和 `monitor` 适合看当前线程是否还在运行、卡在哪个阶段\n","source_path":"使用说明书/zh-CN/tools/self-status.md"}</script>
