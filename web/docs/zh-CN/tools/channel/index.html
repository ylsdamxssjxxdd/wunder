  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/channel","language":"zh-CN","title":"渠道工具","summary":"`channel_tool` 的联系人查询、发信与同步/异步回执结构。","updated_at":"2026-04-10","read_when":["你要列外部渠道联系人或发送渠道消息"],"source_docs":["src/services/tools/channel_tool.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/channel/","headings":[{"id":"section-1","level":1,"text":"渠道工具"},{"id":"section-2","level":2,"text":"listcontacts"},{"id":"section-3","level":3,"text":"最小参数"},{"id":"section-4","level":3,"text":"成功返回"},{"id":"section-5","level":2,"text":"sendmessage"},{"id":"section-6","level":3,"text":"最小参数"},{"id":"section-7","level":3,"text":"wait=true 时"},{"id":"section-8","level":3,"text":"wait=false 时"},{"id":"section-9","level":2,"text":"重点"}],"prev_slug":"zh-CN/tools/memory-manager","next_slug":"zh-CN/tools/self-status","markdown":"# 渠道工具\n\n`channel_tool` 主要有两个动作：\n\n- `list_contacts`\n- `send_message`\n\n## `list_contacts`\n\n### 最小参数\n\n```json\n{\n  \"action\": \"list_contacts\",\n  \"channel\": \"xmpp\",\n  \"account_id\": \"acc_xxx\",\n  \"keyword\": \"alice\"\n}\n```\n\n### 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"list_contacts\",\n  \"state\": \"completed\",\n  \"summary\": \"Listed 12 contacts.\",\n  \"data\": {\n    \"action\": \"list_contacts\",\n    \"items\": [ ... ],\n    \"total\": 12,\n    \"offset\": 0,\n    \"limit\": 20,\n    \"warnings\": [],\n    \"resolved_scope\": {\n      \"source\": \"session\",\n      \"channel\": \"xmpp\",\n      \"account_id\": \"acc_xxx\"\n    }\n  }\n}\n```\n\n## `send_message`\n\n### 最小参数\n\n```json\n{\n  \"action\": \"send_message\",\n  \"to\": \"alice@example.com\",\n  \"peer_kind\": \"user\",\n  \"content\": \"你好\",\n  \"wait\": true\n}\n```\n\n### `wait=true` 时\n\n更接近同步投递完成：\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"send_message\",\n  \"state\": \"completed\",\n  \"summary\": \"Sent channel message.\",\n  \"data\": {\n    \"delivery\": { ... },\n    \"resolved\": { ... }\n  }\n}\n```\n\n### `wait=false` 时\n\n更接近已入发件箱：\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"send_message\",\n  \"state\": \"accepted\",\n  \"summary\": \"Queued channel message for delivery.\",\n  \"data\": {\n    \"outbox_id\": \"out_xxx\",\n    \"status\": \"pending\",\n    \"resolved\": { ... }\n  },\n  \"next_step_hint\": \"...\"\n}\n```\n\n## 重点\n\n- 正文统一用 `content`\n- `wait` 决定你拿到的是“已送达结果”还是“已排队结果”\n","source_path":"使用说明书/zh-CN/tools/channel.md"}</script>
