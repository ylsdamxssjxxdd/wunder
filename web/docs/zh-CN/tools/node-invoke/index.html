  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/node-invoke","language":"zh-CN","title":"节点调用","summary":"`节点调用` 是 Wunder 的底层节点桥接工具，既能列出可用节点，也能把具体命令和参数发到指定节点执行。","read_when":["你要理解节点桥接能力","你要区分节点调用和浏览器/桌面控制的边界"],"source_docs":["src/services/tools/catalog.rs","src/services/tools.rs"],"tab":"工具","group":"系统桥接","group_path":["系统桥接"],"url":"/docs/zh-CN/tools/node-invoke/","headings":[{"id":"section-1","level":1,"text":"节点调用"},{"id":"section-2","level":2,"text":"核心动作"},{"id":"section-3","level":2,"text":"常用参数"},{"id":"section-4","level":2,"text":"它适合什么"},{"id":"section-5","level":2,"text":"和浏览器、桌面控制的区别"},{"id":"section-6","level":2,"text":"你最需要记住的点"},{"id":"section-7","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/tools/a2a-tools","next_slug":"zh-CN/integration/index","markdown":"# 节点调用\n\n`节点调用` 是更底层的系统桥接工具。\n\n如果说浏览器和桌面控制是面向具体交互动作，那么节点调用更像“把命令发给指定节点”。\n\n## 核心动作\n\n- `list`\n- `invoke`\n\n同时它也兼容一种简写方式：\n\n- 直接给 `node_id + command`\n\n## 常用参数\n\n- `action`\n- `node_id`\n- `command`\n- `args`\n- `timeout_s`\n- `metadata`\n\n## 它适合什么\n\n- 列出系统当前可用节点\n- 把命令发送给某个指定节点\n- 做更底层的节点级桥接调用\n\n## 和浏览器、桌面控制的区别\n\n- [浏览器](/docs/zh-CN/tools/browser/) 面向网页交互。\n- [桌面控制](/docs/zh-CN/tools/desktop-control/) 面向桌面动作。\n- `节点调用` 面向底层节点命令。\n\n如果你已经有更明确的浏览器或桌面动作，不必先走节点调用。\n\n## 你最需要记住的点\n\n- `节点调用` 更底层，也更通用。\n- 最常见动作是 `list` 和 `invoke`。\n- 它更像系统桥接层，不是普通用户第一优先工具。\n\n## 相关文档\n\n- [浏览器](/docs/zh-CN/tools/browser/)\n- [桌面控制](/docs/zh-CN/tools/desktop-control/)\n- [管理端界面](/docs/zh-CN/surfaces/web-admin/)\n","source_path":"静态站文档/zh-CN/tools/node-invoke.md"}</script>
