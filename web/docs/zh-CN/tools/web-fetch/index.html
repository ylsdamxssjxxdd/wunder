  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/web-fetch","language":"zh-CN","title":"网页抓取","summary":"`网页抓取` 的英文别名是 `web_fetch`。它适合读网页正文，不适合代替真实浏览器交互。","updated_at":"2026-03-20","read_when":["你要让模型读取网页正文","你不确定该用网页抓取还是浏览器"],"source_docs":["config/wunder-example.yaml","src/services/tools/web_fetch_tool.rs","docs/系统介绍.md"],"tab":"工具","group":"网页与桌面","group_path":["网页与桌面"],"url":"/docs/zh-CN/tools/web-fetch/","headings":[{"id":"section-1","level":1,"text":"网页抓取"},{"id":"section-2","level":2,"text":"这页解决什么"},{"id":"section-3","level":2,"text":"先记这几条"},{"id":"section-4","level":2,"text":"什么时候先用它"},{"id":"section-5","level":2,"text":"什么时候不要先用它"},{"id":"section-6","level":2,"text":"最常用的入参"},{"id":"section-7","level":2,"text":"返回里你最该看什么"},{"id":"section-8","level":2,"text":"它为什么比直接读原始 HTML 更适合模型"},{"id":"section-9","level":2,"text":"配置开关在哪里"},{"id":"section-10","level":2,"text":"最容易搞错的点"},{"id":"section-11","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/tools/skill-call","next_slug":"zh-CN/tools/browser","markdown":"# 网页抓取\n\n`网页抓取` 的英文别名就是 `web_fetch`。\n\n如果你现在只想让模型读一个网页，不要先打开浏览器，先看这个工具。\n\n## 这页解决什么\n\n- `web_fetch` 适合什么，不适合什么\n- 它最常见的入参和返回是什么\n- 它和浏览器的边界到底在哪\n\n## 先记这几条\n\n- `web_fetch` 直接通过 HTTP/HTTPS 拉取页面，不维护真实浏览器会话。\n- 它会先做正文提取、噪声剔除和字符预算裁剪，再把结果返回给模型。\n- 它会拦截私网或内网目标，并对重定向逐跳复校验。\n\n## 什么时候先用它\n\n- 你只想读文章、帮助页、说明页正文\n- 你不需要点击、输入、登录和表单提交\n- 目标页面主要是静态内容\n- 你希望结果尽量短、干净、适合直接进模型上下文\n\n## 什么时候不要先用它\n\n- 你要点按钮\n- 你要填表单\n- 你要登录后再读页面\n- 你要在真实页面状态里连续交互\n\n这些场景优先看 [浏览器](/docs/zh-CN/tools/browser/)。\n\n## 最常用的入参\n\n- `url`\n- `extract_mode`\n- `max_chars`\n\n兼容别名也已经支持：\n\n- `extractMode`\n- `maxChars`\n\n`extract_mode` 当前主要是：\n\n- `markdown`\n- `text`\n\n如果你不传，默认会走更适合阅读的 `markdown` 提取。\n\n## 返回里你最该看什么\n\n`web_fetch` 返回的不只是正文，一般还会带这些字段：\n\n- `final_url`\n- `status`\n- `title`\n- `content_type`\n- `format`\n- `extractor`\n- `truncated`\n- `warning`\n- `cached`\n- `fetched_at`\n- `content`\n\n最值得先看的通常是：\n\n- `content`：正文结果\n- `truncated`：这次有没有被裁剪\n- `warning`：是否有响应体截断或正文预算截断\n- `cached`：是不是命中了短 TTL 缓存\n\n## 它为什么比直接读原始 HTML 更适合模型\n\n因为它不是简单返回页面源码，而是先做这些事：\n\n- 正文定位\n- 导航、页脚、相关推荐等噪声过滤\n- 重复块去重\n- 字符预算裁剪\n\n所以它更像“网页正文提取器”，不是“网页源码下载器”。\n\n## 配置开关在哪里\n\n核心配置位于 `tools.web.fetch.*`。\n\n当前默认值来自运行配置：\n\n- `enabled=true`\n- `timeout_secs=20`\n- `max_redirects=3`\n- `max_response_bytes=2MB`\n- `max_chars=12000`\n- `max_chars_cap=30000`\n- `cache_ttl_secs=600`\n\n如果你排查“为什么这个工具没出来”或“为什么结果比预期短”，先查这组配置。\n\n## 最容易搞错的点\n\n- `web_fetch` 不是浏览器的轻量模式，它根本不维护交互状态。\n- `max_chars` 是结果预算，不代表网页原始大小。\n- 能抓到页面，不等于适合继续做交互；交互任务仍然应该切到浏览器。\n- 目标站点如果是 JS 强交互页面，`web_fetch` 往往不如浏览器可靠。\n\n## 相关文档\n\n- [浏览器](/docs/zh-CN/tools/browser/)\n- [工具总览](/docs/zh-CN/tools/)\n- [接入概览](/docs/zh-CN/integration/)\n","source_path":"静态站文档/zh-CN/tools/web-fetch.md"}</script>
