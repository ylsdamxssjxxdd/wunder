  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/web-fetch","language":"zh-CN","title":"网页抓取","summary":"`web_search` 与 `web_fetch` 的分工，以及 `web_fetch` 的直接抓取、浏览器回退与成功/失败返回。","updated_at":"2026-05-15","read_when":["你要读取公开网页正文，而不是操控浏览器"],"source_docs":["src/services/tools/web_search_tool.rs","src/services/tools/web_fetch_tool.rs"],"tab":"工具","group":"网页与桌面","group_path":["网页与桌面"],"url":"/docs/zh-CN/tools/web-fetch/","headings":[{"id":"section-1","level":1,"text":"网页抓取"},{"id":"section-2","level":2,"text":"先分清搜索和抓取"},{"id":"section-3","level":2,"text":"最小参数"},{"id":"section-4","level":2,"text":"成功返回"},{"id":"section-5","level":2,"text":"重点字段"},{"id":"section-6","level":2,"text":"Firecrawl Provider"},{"id":"section-7","level":2,"text":"浏览器回退"},{"id":"section-8","level":2,"text":"失败返回"},{"id":"section-9","level":2,"text":"什么时候别用它"}],"prev_slug":"zh-CN/tools/skill-call","next_slug":"zh-CN/tools/browser","markdown":"# 网页抓取\n\n## 先分清搜索和抓取\n\n- `web_search`：输入关键词，返回候选网页的标题、URL 和摘要。\n- `web_fetch`：输入一个已确认的具体 URL，读取该网页正文。\n\n只有关键词时，先用 `web_search`：\n\n```json\n{\n  \"query\": \"示例项目 官方 文档 GitHub\",\n  \"count\": 5\n}\n```\n\n如果你已有一个站点或域名，只想在该来源内搜索，传 `site` 或 `sites`，不要把搜索页 URL 拼好后交给 `web_fetch`：\n\n```json\n{\n  \"site\": \"example.com\",\n  \"query\": \"安装 配置\",\n  \"count\": 5\n}\n```\n\n拿到具体 URL 后，再用 `web_fetch` 抓正文。不要把 Bing、百度、Google 等搜索结果页 URL 传给 `web_fetch`。\n\n`web_fetch` 当前仍然是成功返回的例外项。  \n它成功时直接返回抓取结果对象，不包统一的 `ok/action/state/summary/data`。\n\n## 最小参数\n\n```json\n{\n  \"url\": \"https://example.com\"\n}\n```\n\n## 成功返回\n\n```json\n{\n  \"url\": \"https://example.com\",\n  \"final_url\": \"https://example.com\",\n  \"status\": 200,\n  \"title\": \"Example Domain\",\n  \"content_type\": \"text/html; charset=UTF-8\",\n  \"content_kind\": \"html\",\n  \"fetch_strategy\": \"direct_http\",\n  \"format\": \"markdown\",\n  \"extractor\": \"readability\",\n  \"truncated\": false,\n  \"warning\": null,\n  \"cached\": false,\n  \"fetched_at\": \"2026-04-10T03:00:00Z\",\n  \"content\": \"...\"\n}\n```\n\n## 重点字段\n\n- `fetch_strategy`：例如 `direct_http`、`browser_fallback`\n- `format`：通常是 `markdown` 或 `text`\n- `extractor`：实际抽取器\n- `truncated`：正文是否被截断\n- `warning`：抓取过程中的额外提示\n\n## Firecrawl Provider\n\n`tools.web.search.provider` 当前支持 `firecrawl`，调用 Firecrawl `/v2/search`。自托管 Firecrawl 可使用 `http://wunder-firecrawl:3002`；Firecrawl Cloud 使用 `https://api.firecrawl.dev`，并且需要 API Key。\n\n`tools.web.fetch.provider` 支持 `direct`、`auto`、`firecrawl`。`auto` 会在配置了 `FIRECRAWL_API_KEY` 或 `FIRECRAWL_BASE_URL` 时优先使用 Firecrawl，否则回退到内置抓取器。\n\nDocker 自托管 Firecrawl 可使用 `http://wunder-firecrawl:3002`。Firecrawl Cloud 使用 `https://api.firecrawl.dev`，并且需要 API Key。compose 会同时启动 `wunder-firecrawl-nuq-postgres`，由官方 NUQ Postgres 镜像初始化 `nuq` 队列表与维护任务；管理员系统设置页只保存 Wunder 连接 Firecrawl 的参数，不启动或停止 Docker 服务。\n\n## 浏览器回退\n\n如果直接 HTTP 抓到的只是前端壳、反爬校验页或无意义 HTML，`web_fetch` 可能会自动尝试浏览器回退。  \n成功时你会看到：\n\n```json\n{\n  \"fetch_strategy\": \"browser_fallback\"\n}\n```\n\n## 失败返回\n\n失败时会走统一失败骨架，并补充抓取诊断字段，例如：\n\n- `phase`\n- `failure_summary`\n- `error_detail_head`\n- `next_step_hint`\n- `normalized_url`\n- `host`\n- `error_meta.code`\n\n## 什么时候别用它\n\n- 有搜索关键词但没有具体 URL：先用 `web_search`\n- 要点击、输入、滚动：用 [浏览器](/docs/zh-CN/tools/browser/)\n- 要看本地 HTML 文件：这不是它的场景\n","source_path":"使用说明书/zh-CN/tools/web-fetch.md"}</script>
