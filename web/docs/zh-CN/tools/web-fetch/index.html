  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/web-fetch","language":"zh-CN","title":"网页抓取","summary":"web_fetch 适合读取网页正文，通过 HTTP/HTTPS 拉取页面，不维护浏览器会话，与浏览器工具分工明确。","updated_at":"2026-03-23","read_when":["你要让模型读取网页正文","你不确定该用网页抓取还是浏览器"],"source_docs":["src/services/tools/web_fetch_tool.rs","src/services/tools/catalog.rs"],"tab":"工具","group":"网页与桌面","group_path":["网页与桌面"],"url":"/docs/zh-CN/tools/web-fetch/","headings":[{"id":"section-1","level":1,"text":"网页抓取"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"使用示例"},{"id":"section-5","level":3,"text":"简单抓取"},{"id":"section-6","level":3,"text":"指定提取模式"},{"id":"section-7","level":3,"text":"限制输出长度"},{"id":"section-8","level":2,"text":"返回字段"},{"id":"section-9","level":2,"text":"处理流程"},{"id":"section-10","level":2,"text":"与浏览器的对比"},{"id":"section-11","level":2,"text":"适用场景"},{"id":"section-12","level":2,"text":"配置说明"},{"id":"section-13","level":2,"text":"注意事项"},{"id":"section-14","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/skill-call","next_slug":"zh-CN/tools/browser","markdown":"# 网页抓取\n\n网页正文提取工具，直接通过 HTTP/HTTPS 拉取页面。\n\n---\n\n## 功能说明\n\n`web_fetch` 通过 HTTP/HTTPS 拉取页面，先做正文提取、噪声剔除和字符预算裁剪，再返回给模型。\n\n**别名**：\n- `web_fetch`\n- `web_fetch_tool`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `url` | string | ✅ | 目标 URL |\n| `extract_mode` | string | ❌ | 提取模式：`markdown` 或 `text`，默认 `markdown` |\n| `max_chars` | integer | ❌ | 最大字符数，最小 100 |\n\n---\n\n## 使用示例\n\n### 简单抓取\n\n```json\n{\n  \"url\": \"https://example.com\"\n}\n```\n\n### 指定提取模式\n\n```json\n{\n  \"url\": \"https://example.com\",\n  \"extract_mode\": \"text\"\n}\n```\n\n### 限制输出长度\n\n```json\n{\n  \"url\": \"https://example.com\",\n  \"max_chars\": 5000\n}\n```\n\n---\n\n## 返回字段\n\n| 字段 | 说明 |\n|------|------|\n| `final_url` | 最终 URL（跟随重定向后） |\n| `status` | HTTP 状态码 |\n| `title` | 页面标题 |\n| `content_type` | 内容类型 |\n| `format` | 返回格式 |\n| `extractor` | 使用的提取器 |\n| `truncated` | 是否被截断 |\n| `warning` | 警告信息 |\n| `cached` | 是否命中缓存 |\n| `fetched_at` | 获取时间 |\n| `content` | 正文内容 |\n\n---\n\n## 处理流程\n\n1. 拦截私网或内网目标\n2. 对重定向逐跳复校验\n3. 正文定位和提取\n4. 过滤导航、页脚、相关推荐等噪声\n5. 重复块去重\n6. 字符预算裁剪\n\n---\n\n## 与浏览器的对比\n\n| 特性 | 网页抓取 | [浏览器](/docs/zh-CN/tools/browser/) |\n|------|----------|--------------------------------|\n| 方式 | HTTP/HTTPS 请求 | 真实浏览器会话 |\n| 成本 | 较低 | 较高 |\n| 能力 | 提取正文 | 点击、输入、截图、交互 |\n| 推荐使用 | 只需要读正文 | 需要交互 |\n\n---\n\n## 适用场景\n\n✅ **适合使用 web_fetch**：\n- 读文章、帮助页、说明页正文\n- 不需要点击、输入、登录和表单提交\n- 目标页面主要是静态内容\n- 希望结果尽量短、干净、适合直接进模型上下文\n\n❌ **不适合使用 web_fetch**：\n- 要点按钮、填表单\n- 要登录后再读页面\n- 要在真实页面状态里连续交互\n- JS 强交互页面\n\n这些场景优先用 [浏览器](/docs/zh-CN/tools/browser/)。\n\n---\n\n## 配置说明\n\n核心配置位于 `tools.web.fetch.*`：\n\n| 配置项 | 默认值 | 说明 |\n|--------|--------|------|\n| `enabled` | `true` | 是否启用 |\n| `timeout_secs` | `20` | 超时时间（秒） |\n| `max_redirects` | `3` | 最大重定向次数 |\n| `max_response_bytes` | `2MB` | 最大响应字节数 |\n| `max_chars` | `12000` | 默认最大字符数 |\n| `max_chars_cap` | `30000` | 最大字符数上限 |\n| `cache_ttl_secs` | `600` | 缓存 TTL（秒） |\n\n---\n\n## 注意事项\n\n1. **不是浏览器的轻量模式**：\n   - web_fetch 根本不维护交互状态\n   - 不要与浏览器工具混淆\n\n2. **max_chars 是结果预算**：\n   - 不代表网页原始大小\n   - 超过会被截断\n\n3. **JS 强交互页面**：\n   - web_fetch 往往不如浏览器可靠\n   - 建议用浏览器工具\n\n---\n\n## 延伸阅读\n\n- [浏览器](/docs/zh-CN/tools/browser/)\n- [工具总览](/docs/zh-CN/tools/)\n","source_path":"静态站文档/zh-CN/tools/web-fetch.md"}</script>
