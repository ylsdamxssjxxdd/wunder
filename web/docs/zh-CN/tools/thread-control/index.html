  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/thread-control","language":"zh-CN","title":"会话线程控制","summary":"`thread_control` 的动作、线程关系与返回结构。","updated_at":"2026-04-10","read_when":["你要创建、切换、归档或设置主线程"],"source_docs":["src/services/tools/thread_control_tool.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/thread-control/","headings":[{"id":"section-1","level":1,"text":"会话线程控制"},{"id":"section-2","level":2,"text":"主要动作"},{"id":"section-3","level":2,"text":"返回骨架"},{"id":"section-4","level":2,"text":"list"},{"id":"section-5","level":2,"text":"create"},{"id":"section-6","level":2,"text":"setmain"},{"id":"section-7","level":2,"text":"和 subagentcontrol 的区别"}],"prev_slug":"zh-CN/tools/schedule-task","next_slug":"zh-CN/tools/subagent-control","markdown":"# 会话线程控制\n\n`thread_control` 管的是当前用户与智能体的会话线程，而不是子智能体运行控制。\n\n## 主要动作\n\n- `list`\n- `info`\n- `create`\n- `switch`\n- `back`\n- `update_title`\n- `archive`\n- `restore`\n- `set_main`\n\n## 返回骨架\n\n它成功时统一是：\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"create\",\n  \"state\": \"completed\",\n  \"summary\": \"Created a new thread.\",\n  \"data\": { ... }\n}\n```\n\n有些动作还会附带 `next_step_hint`。\n\n## `list`\n\n典型返回：\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"list\",\n  \"state\": \"completed\",\n  \"summary\": \"Listed 5 threads.\",\n  \"data\": {\n    \"scope\": \"branch\",\n    \"status\": \"active\",\n    \"items\": [\n      {\n        \"id\": \"sess_xxx\",\n        \"title\": \"工具文档更新\",\n        \"status\": \"active\",\n        \"created_at\": \"2026-04-10T10:00:00+08:00\",\n        \"updated_at\": \"2026-04-10T10:03:00+08:00\",\n        \"last_message_at\": \"2026-04-10T10:03:00+08:00\",\n        \"agent_id\": \"agent_docs\",\n        \"parent_session_id\": null,\n        \"spawn_label\": null,\n        \"is_main\": true,\n        \"runtime_status\": \"idle\"\n      }\n    ]\n  }\n}\n```\n\n## `create`\n\n重点不只是新建，还可以：\n\n- `switch`\n- `set_main`\n\n也就是新建后是否立刻切过去、是否设置为主线程。\n\n## `set_main`\n\n这个动作很重要。它会把某个会话线程绑定为当前智能体的一等现实主线程。\n\n## 和 `subagent_control` 的区别\n\n- `thread_control`：管会话线程本身\n- `subagent_control`：管临时派生的子智能体运行\n\n如果你想管理主线程、分支线程、归档状态，用 `thread_control`。  \n如果你想等子智能体跑完、打断它、看它历史，用 `subagent_control`。\n","source_path":"使用说明书/zh-CN/tools/thread-control.md"}</script>
