  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/thread-control","language":"zh-CN","title":"会话线程控制","summary":"会话线程控制负责线程树、主线程和派生会话管理，是 Wunder 会话结构层的正式工具。","updated_at":"2026-03-21","read_when":["你要管理线程树、主线程和派生会话","你要区分线程结构控制和多智能体协作"],"source_docs":["src/services/tools/thread_control_tool.rs","src/services/tools/catalog.rs"],"tab":"工具","group":"会话与协作","group_path":["会话与协作"],"url":"/docs/zh-CN/tools/thread-control/","headings":[{"id":"section-1","level":1,"text":"会话线程控制"},{"id":"section-2","level":2,"text":"功能说明"},{"id":"section-3","level":2,"text":"参数说明"},{"id":"section-4","level":2,"text":"支持的动作"},{"id":"section-5","level":2,"text":"使用示例"},{"id":"section-6","level":3,"text":"列出所有线程"},{"id":"section-7","level":3,"text":"创建子线程"},{"id":"section-8","level":3,"text":"切换线程"},{"id":"section-9","level":3,"text":"设为主线程"},{"id":"section-10","level":2,"text":"真正改变什么"},{"id":"section-11","level":2,"text":"与其他协作工具的区别"},{"id":"section-12","level":2,"text":"适用场景"},{"id":"section-13","level":2,"text":"注意事项"},{"id":"section-14","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/schedule-task","next_slug":"zh-CN/tools/subagent-control","markdown":"# 会话线程控制\n\n管理会话线程树的正式工具。\n\n---\n\n## 功能说明\n\n会话树不是「前端自己记一下当前对话是哪个」，而是正式工具能力。\n\n**别名**：\n- `thread_control`\n- `session_control`\n\n---\n\n## 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `action` | string | ✅ | 要执行的动作 |\n| 其他参数 | - | ❌ | 根据 action 不同而不同 |\n\n---\n\n## 支持的动作\n\n| 动作 | 说明 | 附加参数 |\n|------|------|----------|\n| `list` | 列出所有线程 | - |\n| `info` | 获取线程信息 | `thread_id` |\n| `create` | 创建新线程 | `title`, `parent_id` |\n| `switch` | 切换到线程 | `thread_id` |\n| `back` | 返回父线程 | - |\n| `update_title` | 更新线程标题 | `thread_id`, `title` |\n| `archive` | 归档线程 | `thread_id` |\n| `restore` | 恢复线程 | `thread_id` |\n| `set_main` | 设为主线程 | `thread_id` |\n\n---\n\n## 使用示例\n\n### 列出所有线程\n\n```json\n{\n  \"action\": \"list\"\n}\n```\n\n### 创建子线程\n\n```json\n{\n  \"action\": \"create\",\n  \"title\": \"重构任务分支\",\n  \"parent_id\": \"main-thread-123\"\n}\n```\n\n### 切换线程\n\n```json\n{\n  \"action\": \"switch\",\n  \"thread_id\": \"thread-456\"\n}\n```\n\n### 设为主线程\n\n```json\n{\n  \"action\": \"set_main\",\n  \"thread_id\": \"thread-456\"\n}\n```\n\n---\n\n## 真正改变什么\n\n它不是简单的聊天接口包装，而是直接改变：\n\n- 线程结构\n- 会话归属\n- 主线程映射\n\n---\n\n## 与其他协作工具的区别\n\n| 工具 | 说明 | 适用场景 |\n|------|------|----------|\n| 会话线程控制 | 线程树和主线程管理 | 把哪条线程设为当前主线 |\n| [子智能体控制](/docs/zh-CN/tools/subagent-control/) | 单个子会话运行 | 把任务扔给另一个智能体去跑 |\n| [智能体蜂群](/docs/zh-CN/tools/agent-swarm/) | 多智能体并发协作 | 并行派发多个智能体 |\n\n---\n\n## 适用场景\n\n✅ **适合使用会话线程控制**：\n- 新建子线程进行分支探索\n- 在线程树里切换上下文\n- 返回父线程继续之前的工作\n- 归档或恢复历史线程\n- 把某条线程设为主线程\n\n---\n\n## 注意事项\n\n1. **不只是切对话**：\n   - 线程控制是会话树工具\n   - 会影响系统对主线程的映射\n\n2. **set_main 的影响**：\n   - 会改变系统对主线程的映射\n   - 影响后续的会话归属\n\n3. **工具分工**：\n   - 子会话和蜂群协作是相关但独立的另外两类工具\n   - 注意区分使用场景\n\n---\n\n## 延伸阅读\n\n- [子智能体控制](/docs/zh-CN/tools/subagent-control/)\n- [智能体蜂群](/docs/zh-CN/tools/agent-swarm/)\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n- [蜂群协作](/docs/zh-CN/concepts/swarm/)\n- [聊天会话](/docs/zh-CN/integration/chat-sessions/)\n","source_path":"静态站文档/zh-CN/tools/thread-control.md"}</script>
