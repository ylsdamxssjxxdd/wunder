  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/workspace-files","language":"zh-CN","title":"文件与工作区工具","summary":"文件与工作区工具是最常用的内置工具，覆盖列出文件、搜索内容、读取文件、写入文件四大核心功能。","updated_at":"2026-04-05","read_when":["你需要在工作区中操作文件","你想了解文件工具的正确使用顺序"],"source_docs":["src/services/tools/catalog.rs","docs/API文档.md"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/workspace-files/","headings":[{"id":"section-1","level":1,"text":"文件与工作区工具"},{"id":"section-2","level":2,"text":"推荐智能体循环"},{"id":"section-3","level":2,"text":"列出文件"},{"id":"section-4","level":3,"text":"功能说明"},{"id":"section-5","level":3,"text":"参数说明"},{"id":"section-6","level":3,"text":"使用示例"},{"id":"section-7","level":4,"text":"列出根目录"},{"id":"section-8","level":4,"text":"列出 src 目录"},{"id":"section-9","level":2,"text":"搜索内容"},{"id":"section-10","level":3,"text":"功能说明"},{"id":"section-11","level":3,"text":"参数说明"},{"id":"section-12","level":3,"text":"使用示例"},{"id":"section-13","level":4,"text":"简单搜索"},{"id":"section-14","level":4,"text":"推荐的 rg 风格搜索"},{"id":"section-15","level":4,"text":"固定字符串模式"},{"id":"section-16","level":4,"text":"按类型过滤并带上下文"},{"id":"section-17","level":2,"text":"读取文件"},{"id":"section-18","level":3,"text":"功能说明"},{"id":"section-19","level":3,"text":"参数说明"},{"id":"section-20","level":3,"text":"使用示例"},{"id":"section-21","level":4,"text":"读取整个文件"},{"id":"section-22","level":4,"text":"读取指定行范围"},{"id":"section-23","level":4,"text":"读取多个不连续范围"},{"id":"section-24","level":2,"text":"写入文件"},{"id":"section-25","level":3,"text":"功能说明"},{"id":"section-26","level":3,"text":"参数说明"},{"id":"section-27","level":3,"text":"使用示例"},{"id":"section-28","level":4,"text":"创建新文件"},{"id":"section-29","level":4,"text":"全量覆盖文件"},{"id":"section-30","level":2,"text":"工具对比"},{"id":"section-31","level":2,"text":"注意事项"},{"id":"section-32","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/tools/index","next_slug":"zh-CN/tools/exec","markdown":"# 文件与工作区工具\n\n这是最常用的一组内置工具，包含：\n- **列出文件**：浏览目录结构\n- **搜索内容**：在文件中搜索\n- **读取文件**：读取文件内容\n- **写入文件**：创建或覆盖文件\n\n---\n\n## 推荐智能体循环\n\n使用文件工具的推荐顺序：\n1. **先列目录** → 了解文件结构\n2. **再搜索** → 定位目标内容\n3. **然后读取** → 查看具体内容\n4. **最后写入** → 进行修改\n\n这套顺序比直接读取整个文件更稳定，也更省上下文。\n\n---\n\n## 列出文件\n\n### 功能说明\n\n浏览目录结构，查看文件树。\n\n**别名**：\n- `list_files`\n\n### 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `path` | string | ❌ | 目标路径，默认为工作区根目录 |\n| `max_depth` | integer | ❌ | 最大遍历深度，默认 3 |\n| `file_pattern` | string | ❌ | 文件匹配模式 |\n\n### 使用示例\n\n#### 列出根目录\n```json\n{\n  \"path\": \".\",\n  \"max_depth\": 2\n}\n```\n\n#### 列出 src 目录\n```json\n{\n  \"path\": \"src\",\n  \"max_depth\": 3\n}\n```\n\n---\n\n## 搜索内容\n\n### 功能说明\n\n在工作区中按关键词搜索代码、配置或日志。\n\n推荐按 `rg` 的思路组织搜索参数：\n- 用 `path` 先缩小目录范围\n- 用 `pattern`/`query` 写字面量或正则\n- 用 `glob`/`file_pattern`/`type` 过滤文件\n- 用 `context` 或 `-A`/`-B`/`-C` 请求上下文\n\n**别名**：\n- `search_content`\n\n### 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `query` | string | ❌ | 主查询输入；默认按 `literal` 匹配。若多词精确短语无结果，工具可能自动回退为按词检索 |\n| `pattern` | string | ❌ | 推荐的 `rg` 风格输入；仅传 `pattern` 且未显式设置 `query_mode`/`-F` 时，默认按 `regex` 处理 |\n| `path` | string | ❌ | 搜索路径，默认为工作区根目录 |\n| `file_pattern` | string | ❌ | 文件匹配模式，如 `*.rs` |\n| `glob` | string | ❌ | 推荐的 `rg` 风格别名，等价于 `file_pattern` |\n| `type` | string/array | ❌ | 常见类型快捷过滤，如 `rust`、`rs`、`ts`、`tsx`、`js`、`py`、`md` |\n| `query_mode` | string | ❌ | 搜索模式：`literal`/`regex`。省略时，`query` 默认按 `literal`，`pattern` 默认按 `regex` |\n| `regex` | boolean | ❌ | `true` 等价于 `query_mode=regex` |\n| `fixed_strings` / `-F` | boolean | ❌ | 强制按字面量匹配，等价于 `query_mode=literal` |\n| `case_sensitive` | boolean | ❌ | 是否区分大小写，默认 false |\n| `ignore_case` / `-i` | boolean | ❌ | `rg` 风格别名，`true` 表示忽略大小写 |\n| `max_depth` | integer | ❌ | 最大搜索深度，默认 5 |\n| `max_files` | integer | ❌ | 最大文件数 |\n| `max_matches` | integer | ❌ | 最大匹配数 |\n| `max_count` / `head_limit` | integer | ❌ | `rg` 风格别名，等价于 `max_matches` |\n| `context` / `-C` | integer | ❌ | 同时设置前后上下文行数 |\n| `context_before` | integer | ❌ | 匹配前显示行数 |\n| `context_after` | integer | ❌ | 匹配后显示行数 |\n| `-B` | integer | ❌ | `rg` 风格别名，等价于 `context_before` |\n| `-A` | integer | ❌ | `rg` 风格别名，等价于 `context_after` |\n| `dry_run` | boolean | ❌ | 预演模式 |\n| `time_budget_ms` | integer | ❌ | 时间预算（毫秒） |\n| `output_budget_bytes` | integer | ❌ | 输出预算（字节） |\n\n补充说明：\n- `query` 适合自然语言或固定短语检索，优先保证精确度；必要时才自动做按词回退。\n- `pattern` 更适合 `rg`/正则心智模型；若需要固定字符串语义，请显式传 `-F` 或 `query_mode=literal`。\n- 返回结果会优先按相关性排序，并在 `summary`/`meta.search` 中提供实际采用的策略、尝试过的查询计划和下一步提示。\n\n### 使用示例\n\n#### 简单搜索\n```json\n{\n  \"query\": \"fn main\",\n  \"file_pattern\": \"*.rs\"\n}\n```\n\n#### 推荐的 rg 风格搜索\n```json\n{\n  \"pattern\": \"turn_terminal|event title|resolve.*title\",\n  \"path\": \"src\",\n  \"glob\": \"*.rs\",\n  \"context\": 2,\n  \"max_count\": 50\n}\n```\n\n#### 固定字符串模式\n```json\n{\n  \"pattern\": \"foo.bar\",\n  \"-F\": true,\n  \"glob\": \"*.rs\"\n}\n```\n\n#### 按类型过滤并带上下文\n```json\n{\n  \"pattern\": \"execute_tool\",\n  \"type\": \"rust\",\n  \"-B\": 3,\n  \"-A\": 5\n}\n```\n\n---\n\n## 读取文件\n\n### 功能说明\n\n读取文件内容，支持切片读取，不鼓励大文件整段读取。\n\n**别名**：\n- `read_file`\n\n### 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `path` | string | ✅ | 文件路径 |\n| `start_line` | integer | ❌ | 起始行号 |\n| `end_line` | integer | ❌ | 结束行号 |\n| `line_ranges` | array | ❌ | 行范围数组 |\n| `mode` | string | ❌ | 读取模式：`full`/`indentation` |\n\n### 使用示例\n\n#### 读取整个文件\n```json\n{\n  \"path\": \"src/main.rs\"\n}\n```\n\n#### 读取指定行范围\n```json\n{\n  \"path\": \"src/main.rs\",\n  \"start_line\": 1,\n  \"end_line\": 50\n}\n```\n\n#### 读取多个不连续范围\n```json\n{\n  \"path\": \"src/main.rs\",\n  \"line_ranges\": [[1, 20], [50, 100]]\n}\n```\n\n---\n\n## 写入文件\n\n### 功能说明\n\n创建新文件或全量覆盖现有文件。\n\n**别名**：\n- `write_file`\n\n### 参数说明\n\n| 参数名 | 类型 | 必填 | 说明 |\n|--------|------|------|------|\n| `path` | string | ✅ | 文件路径 |\n| `content` | string | ✅ | 文件内容 |\n| `dry_run` | boolean | ❌ | 预演模式 |\n\n### 使用示例\n\n#### 创建新文件\n```json\n{\n  \"path\": \"src/hello.rs\",\n  \"content\": \"fn main() {\\n    println!(\\\"Hello, world!\\\");\\n}\\n\"\n}\n```\n\n#### 全量覆盖文件\n```json\n{\n  \"path\": \"config.yaml\",\n  \"content\": \"server:\\n  port: 8080\\n\"\n}\n```\n\n---\n\n## 工具对比\n\n| 场景 | 推荐工具 | 说明 |\n|------|----------|------|\n| 单文件全量替换 | 写入文件 | 适用于新文件或短文件 |\n| 多位置精确编辑 | [应用补丁](/docs/zh-CN/tools/apply-patch/) | 结构化修改，更安全 |\n| 查找关键词 | 搜索内容 | 快速定位，省上下文 |\n| 浏览目录 | 列出文件 | 了解文件结构 |\n| 读取局部内容 | 读取文件 | 切片读取，不浪费 |\n\n---\n\n## 注意事项\n\n1. **原子写入**：\n   - `写入文件` 采用临时文件 + rename 策略\n   - 降低异常中断与并发覆盖风险\n\n2. **预算控制**：\n   - `搜索内容` 支持预算参数\n   - 避免大搜索拖慢系统\n\n3. **工具选型**：\n   - 单文件全量替换用 `写入文件`\n   - 多位置编辑用 `应用补丁`\n   - 不要混用\n\n---\n\n## 延伸阅读\n\n- [应用补丁](/docs/zh-CN/tools/apply-patch/)\n- [LSP查询](/docs/zh-CN/tools/lsp/)\n- [执行命令](/docs/zh-CN/tools/exec/)\n- [工作区 API](/docs/zh-CN/integration/workspace-api/)\n","source_path":"使用说明书/zh-CN/tools/workspace-files.md"}</script>
