  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/workspace-files","language":"zh-CN","title":"工作区文件","summary":"`list_files`、`search_content`、`read_file`、`write_file` 的最新参数与返回结构。","updated_at":"2026-04-10","read_when":["你要浏览工作区、搜索代码、读文件或写文件"],"source_docs":["src/services/tools.rs","src/services/tools/search_content_tool.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/workspace-files/","headings":[{"id":"section-1","level":1,"text":"工作区文件"},{"id":"section-2","level":2,"text":"什么时候优先用它"},{"id":"section-3","level":2,"text":"listfiles"},{"id":"section-4","level":3,"text":"最小参数"},{"id":"section-5","level":3,"text":"成功返回"},{"id":"section-6","level":2,"text":"searchcontent"},{"id":"section-7","level":3,"text":"最小参数"},{"id":"section-8","level":3,"text":"常用参数"},{"id":"section-9","level":3,"text":"成功返回"},{"id":"section-10","level":2,"text":"readfile"},{"id":"section-11","level":3,"text":"最小参数"},{"id":"section-12","level":3,"text":"成功返回"},{"id":"section-13","level":2,"text":"writefile"},{"id":"section-14","level":3,"text":"最小参数"},{"id":"section-15","level":3,"text":"成功返回"},{"id":"section-16","level":3,"text":"什么时候不要用它"},{"id":"section-17","level":2,"text":"失败返回怎么读"}],"prev_slug":"zh-CN/tools/index","next_slug":"zh-CN/tools/exec","markdown":"# 工作区文件\n\n这一页覆盖四个最常用的本地工具：\n\n- `list_files`\n- `search_content`\n- `read_file`\n- `write_file`\n\n它们都已经走统一成功/失败骨架。\n\n## 什么时候优先用它\n\n- 先看目录：`list_files`\n- 先定位关键词：`search_content`\n- 已经知道路径，读具体片段：`read_file`\n- 整文件创建或覆盖：`write_file`\n\n## `list_files`\n\n### 最小参数\n\n```json\n{\n  \"path\": \".\",\n  \"max_depth\": 2,\n  \"limit\": 200\n}\n```\n\n### 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"list_files\",\n  \"state\": \"completed\",\n  \"summary\": \"Listed 120 entries from frontend/src.\",\n  \"data\": {\n    \"path\": \"frontend/src\",\n    \"items\": [\"views/\", \"components/\", \"main.ts\"],\n    \"offset\": 0,\n    \"limit\": 200,\n    \"returned\": 120,\n    \"has_more\": false,\n    \"next_offset\": null,\n    \"next_cursor\": null,\n    \"max_depth\": 2\n  }\n}\n```\n\n重点字段：\n\n- `items`：目录项列表，目录会带 `/`\n- `next_cursor`：目录很多时继续翻页用\n- `has_more`：是否还有下一页\n\n## `search_content`\n\n### 最小参数\n\n```json\n{\n  \"query\": \"spawn_agent\",\n  \"path\": \"src\",\n  \"max_matches\": 50\n}\n```\n\n### 常用参数\n\n- `query` / `pattern`\n- `path`\n- `file_pattern`\n- `query_mode`\n- `context_before`\n- `context_after`\n- `max_matches`\n- `max_files`\n- `max_candidates`\n- `budget`\n- `dry_run`\n\n### 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"search_content\",\n  \"state\": \"completed\",\n  \"summary\": \"Found 8 hits in 3 files.\",\n  \"data\": {\n    \"query\": \"spawn_agent\",\n    \"query_used\": \"spawn_agent\",\n    \"path\": \"src\",\n    \"query_mode\": \"literal\",\n    \"matched_file_count\": 3,\n    \"returned_match_count\": 8,\n    \"truncated\": false,\n    \"truncation_reasons\": [],\n    \"elapsed_ms\": 132,\n    \"hits\": [\n      {\n        \"path\": \"services/tools/subagent_control.rs\",\n        \"line\": 240,\n        \"content\": \"spawn(context, args).await\",\n        \"segments\": [\n          { \"text\": \"spawn\", \"matched\": true }\n        ],\n        \"matched_terms\": [\"spawn_agent\"],\n        \"before\": [],\n        \"after\": []\n      }\n    ]\n  }\n}\n```\n\n重点字段：\n\n- `hits`：真正给模型读的搜索命中\n- `truncated` / `truncation_reasons`：结果被预算截断时必须看\n- `dry_run` 时会返回搜索计划而不是命中结果\n\n## `read_file`\n\n### 最小参数\n\n```json\n{\n  \"path\": \"src/services/tools.rs\",\n  \"start_line\": 1,\n  \"end_line\": 120\n}\n```\n\n也支持批量：\n\n```json\n{\n  \"files\": [\n    {\n      \"path\": \"src/services/tools.rs\",\n      \"line_ranges\": [[1, 120]]\n    }\n  ]\n}\n```\n\n### 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"read_file\",\n  \"state\": \"completed\",\n  \"summary\": \"Read 1 files.\",\n  \"data\": {\n    \"content\": \">>> src/services/tools.rs\\n1: use ...\",\n    \"files\": [\n      {\n        \"path\": \"src/services/tools.rs\",\n        \"mode\": \"slice\",\n        \"requested_ranges\": [[1, 120]],\n        \"loaded_ranges\": [[1, 120]],\n        \"read_lines\": 120,\n        \"total_lines\": 3000,\n        \"complete\": false,\n        \"truncated_by_size\": false,\n        \"used_default_range\": false\n      }\n    ],\n    \"dry_run\": false,\n    \"requested_files\": 1,\n    \"processed_files\": 1,\n    \"budget_file_limit_hit\": false,\n    \"timeout_hit\": false,\n    \"output_budget_hit\": false,\n    \"output_budget_omitted_bytes\": 0,\n    \"content_bytes_before_budget\": 4096,\n    \"budget\": {\n      \"time_budget_ms\": null,\n      \"output_budget_bytes\": null,\n      \"max_files\": null\n    },\n    \"continuation_required\": true,\n    \"continuation_hint\": \"...\"\n  }\n}\n```\n\n重点字段：\n\n- `content`：拼好的可直接阅读文本\n- `files`：每个文件的摘要\n- `continuation_required`：默认窗口不够或预算截断时会出现\n\n## `write_file`\n\n### 最小参数\n\n```json\n{\n  \"path\": \"docs/demo.md\",\n  \"content\": \"# Demo\"\n}\n```\n\n### 成功返回\n\n```json\n{\n  \"ok\": true,\n  \"action\": \"write_file\",\n  \"state\": \"completed\",\n  \"summary\": \"Created file docs/demo.md.\",\n  \"data\": {\n    \"path\": \"docs/demo.md\",\n    \"bytes\": 7,\n    \"dry_run\": false,\n    \"existed\": false,\n    \"previous_bytes\": 0,\n    \"target\": \"C:/.../docs/demo.md\",\n    \"lsp\": {\n      \"enabled\": true,\n      \"matched\": true,\n      \"touched\": true,\n      \"diagnostics\": null,\n      \"error\": null\n    }\n  }\n}\n```\n\n### 什么时候不要用它\n\n- 小范围精确修改代码，不要用 `write_file`，改用 [应用补丁](/docs/zh-CN/tools/apply-patch/)\n- 要执行脚本、跑构建，不要用它，改用 [执行命令](/docs/zh-CN/tools/exec/)\n\n## 失败返回怎么读\n\n这四个工具失败时都优先看：\n\n- `error_meta.code`\n- `error_meta.hint`\n- `data`\n\n常见错误码：\n\n- `TOOL_LIST_PATH_NOT_FOUND`\n- `TOOL_SEARCH_INVALID_ARGS`\n- `TOOL_SEARCH_PATH_NOT_FOUND`\n- `TOOL_READ_NOT_FOUND`\n- `TOOL_READ_BINARY_FILE`\n- `TOOL_WRITE_PATH_REQUIRED`\n- `TOOL_WRITE_FAILED`\n","source_path":"使用说明书/zh-CN/tools/workspace-files.md"}</script>
