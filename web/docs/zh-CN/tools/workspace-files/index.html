  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/tools/workspace-files","language":"zh-CN","title":"文件与工作区工具","summary":"Wunder 最常用的一组内置工具就是文件工具，它们覆盖列目录、搜索、切片读取和直接写文件。","updated_at":"2026-03-19","read_when":["你想知道模型为什么优先用工具，而不是直接猜文件内容","你要区分文件工具和工作区 HTTP API 的职责"],"source_docs":["docs/API文档.md","docs/设计方案.md","src/services/tools/catalog.rs"],"tab":"工具","group":"文件与代码","group_path":["文件与代码"],"url":"/docs/zh-CN/tools/workspace-files/","headings":[{"id":"section-1","level":1,"text":"文件与工作区工具"},{"id":"section-2","level":2,"text":"这页解决什么"},{"id":"section-3","level":2,"text":"什么时候优先用它们"},{"id":"section-4","level":2,"text":"列出文件"},{"id":"section-5","level":2,"text":"搜索内容"},{"id":"section-6","level":2,"text":"读取文件"},{"id":"section-7","level":2,"text":"写入文件"},{"id":"section-8","level":2,"text":"文件工具和工作区 API 的区别"},{"id":"section-9","level":2,"text":"你最需要记住的点"},{"id":"section-10","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/tools/index","next_slug":"zh-CN/tools/exec","markdown":"# 文件与工作区工具\n\nWunder 的高频工具首先不是浏览器，而是文件工具。\n\n## 这页解决什么\n\n这页只讲这一组内置工具：\n\n- `列出文件`\n- `搜索内容`\n- `读取文件`\n- `写入文件`\n\n它们是模型处理代码、配置、日志和 Markdown 的第一入口。\n\n## 什么时候优先用它们\n\n- 先看目录结构：`列出文件`\n- 先定位关键词：`搜索内容`\n- 再读局部代码或配置：`读取文件`\n- 最后直接写入单文件：`写入文件`\n\n这套顺序比“上来整文件硬读”更稳定，也更省上下文。\n\n## `列出文件`\n\n适合：\n\n- 快速看某个目录是否为空\n- 看文件树结构\n- 给后续搜索或读取确定路径\n\n常用参数：\n\n- `path`\n- `max_depth`\n\n## `搜索内容`\n\n适合：\n\n- 在工作区里按关键词定位代码、配置或日志\n- 先缩小候选文件，再决定读哪一段\n\n常用参数：\n\n- `query`\n- `path`\n- `file_pattern`\n- `query_mode`\n- `case_sensitive`\n- `max_depth`\n- `max_files`\n- `max_matches`\n- `context_before`\n- `context_after`\n\n这一工具还支持预算和预演参数，例如：\n\n- `dry_run`\n- `time_budget_ms`\n- `output_budget_bytes`\n\n## `读取文件`\n\n适合：\n\n- 读一小段代码\n- 读多段不连续范围\n- 按缩进块读结构化片段\n\n常见用法不只是一刀切读取，还包括：\n\n- `start_line/end_line`\n- `line_ranges`\n- `mode=indentation`\n\n所以它不是普通的“cat 文件”，而是偏面向模型消费的切片读取工具。\n\n## `写入文件`\n\n适合：\n\n- 直接生成一个新文件\n- 全量覆盖一个较短文件\n\n如果你要做多位置修改，通常不该先选它，而应看：\n\n- [应用补丁](/docs/zh-CN/tools/apply-patch/)\n\n## 文件工具和工作区 API 的区别\n\n可以这样记：\n\n- 文件工具：给模型在推理链路里直接调用\n- 工作区 API：给前端或外部系统做文件面板和上传下载\n\n两者都围绕工作区，但使用者不同。\n\n## 你最需要记住的点\n\n- 先列目录，再搜索，再切片读取，是更稳定的文件工作流。\n- `读取文件` 强调局部读取，不鼓励大文件整段硬塞上下文。\n- 单文件直接覆盖用 `写入文件`，多位置编辑用 `应用补丁`。\n\n## 相关文档\n\n- [应用补丁](/docs/zh-CN/tools/apply-patch/)\n- [工作区 API](/docs/zh-CN/integration/workspace-api/)\n- [工作区路由参考](/docs/zh-CN/reference/workspace-routing/)\n","source_path":"静态站文档/zh-CN/tools/workspace-files.md"}</script>
