  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/desktop","language":"zh-CN","title":"Desktop 入门","summary":"wunder-desktop 是当前主推形态，适合个人用户与本地优先使用。","read_when":["你要先把 wunder 用起来","你更关心桌面工作台，而不是先搭整套服务"],"source_docs":["README.md","docs/系统介绍.md","docs/设计方案.md"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/desktop/","headings":[{"id":"section-1","level":1,"text":"Desktop 入门"},{"id":"section-2","level":2,"text":"适合谁"},{"id":"section-3","level":2,"text":"Desktop 的核心特点"},{"id":"section-4","level":2,"text":"你会看到什么"},{"id":"section-5","level":2,"text":"Desktop 模式下的重要约定"},{"id":"section-6","level":2,"text":"什么时候切远端"},{"id":"section-7","level":2,"text":"推荐下一步"},{"id":"section-8","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/start/quickstart","next_slug":"zh-CN/start/server","markdown":"# Desktop 入门\n\n`wunder-desktop` 是当前 wunder 的主交付形态。\n\n它强调本地优先、桌面工作台、低门槛启动，以及在需要时接入远端 server。\n\n## 适合谁\n\n- 想直接使用智能体而不是先部署整套服务的人\n- 需要本地文件、桌面窗口和聊天工作台的人\n- 希望未来再接远端网关的人\n\n## Desktop 的核心特点\n\n- 默认优先本地运行\n- 提供完整用户侧界面\n- 支持工作区与本地目录映射\n- 支持在本地模式与远端 gateway 之间切换\n- 桌面端依旧复用统一的 `/wunder` 调度内核\n\n## 你会看到什么\n\nDesktop 打开后，主要是一个统一消息工作台：\n\n- 左侧：导航与功能入口\n- 中间：会话、联系人、智能体或列表视图\n- 右侧：聊天主区域、工作流、设置与扩展面板\n\n这套界面不是单纯聊天，而是承载：\n\n- 用户与智能体会话\n- 用户世界通信\n- 工作区与文件\n- 智能体设置\n- 本地模式与远端接入设置\n\n## Desktop 模式下的重要约定\n\n- 本地模式优先使用附带的 Python 运行时\n- 本地工作目录与容器目录默认按持久目录处理，不做 24 小时自动清理\n- 用户私有工作目录与智能体容器目录是不同的作用域\n- 工作区文件能力会直接影响聊天中的智能体可操作范围\n\n## 什么时候切远端\n\n如果你只是个人使用，本地模式通常已经够用。\n\n如果你遇到这些需求，再考虑接远端：\n\n- 需要组织级用户管理\n- 需要统一管理员后台\n- 需要团队协作和多租户治理\n- 需要把桌面端作为 server 的一个接入端\n\n## 推荐下一步\n\n- [系统架构](/docs/zh-CN/concepts/architecture/)\n- [管理端界面](/docs/zh-CN/surfaces/web-admin/)\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n\n## 相关文档\n\n- [快速开始](/docs/zh-CN/start/quickstart/)\n- [桌面界面](/docs/zh-CN/surfaces/desktop-ui/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"静态站文档/zh-CN/start/desktop.md"}</script>
