  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/desktop","language":"zh-CN","title":"Desktop 入门","summary":"先把 Wunder 用起来时，优先看 desktop；它是个人用户和本地优先场景的默认入口。","updated_at":"2026-04-10","read_when":["你要先把 wunder 用起来","你更关心桌面工作台，而不是先搭整套服务"],"source_docs":["docs/API文档.md","frontend/src/components/messenger/DesktopRuntimeSettingsPanel.vue","frontend/src/components/messenger/MessengerSettingsPanel.vue"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/desktop/","headings":[{"id":"section-1","level":1,"text":"Desktop 入门"},{"id":"section-2","level":2,"text":"什么时候选 Desktop"},{"id":"section-3","level":2,"text":"Desktop 是什么"},{"id":"section-4","level":2,"text":"你打开后会看到什么"},{"id":"section-5","level":2,"text":"5 步上手"},{"id":"section-6","level":3,"text":"1. 下载安装"},{"id":"section-7","level":3,"text":"2. 首次启动"},{"id":"section-8","level":3,"text":"3. 配置模型"},{"id":"section-9","level":3,"text":"4. 处理账号资料"},{"id":"section-10","level":3,"text":"5. 发起第一次对话"},{"id":"section-11","level":2,"text":"两个你很快会遇到的交互约束"},{"id":"section-12","level":3,"text":"运行中不能直接新建线程"},{"id":"section-13","level":3,"text":"蜂群运行会有持续高亮"},{"id":"section-14","level":2,"text":"系统设置里的恢复入口"},{"id":"section-15","level":2,"text":"本地模式下的额外输入能力"},{"id":"section-16","level":2,"text":"不会用时，直接打开帮助手册"},{"id":"section-17","level":2,"text":"下一步"}],"prev_slug":"zh-CN/start/quickstart","next_slug":"zh-CN/start/server","markdown":"# Desktop 入门\n\n如果你想马上用起来，不要先搭 server，直接用 `wunder-desktop`。\n\n它面向个人用户和本地优先场景，打开就是一套完整的智能体工作台。\n\n## 什么时候选 Desktop\n\n| 场景 | 选 Desktop |\n|------|-----------|\n| 你想直接开始用，不想先部署服务 | ✅ |\n| 你需要本地文件、窗口、浏览器能力 | ✅ |\n| 你更习惯图形界面 | ✅ |\n| 你后面可能接远端，但现在先跑起来 | ✅ |\n| 你需要多用户治理和管理员后台 | ❌ 选 Server |\n\n## Desktop 是什么\n\nDesktop 不是“简化版 Server”，它是本地优先的独立运行形态：\n\n```text\nwunder-desktop\n  ├─ 用户侧前端（聊天、资料、蜂群、设置）\n  ├─ 本地桥接（截图、录音、桌面环境能力）\n  └─ Rust 核心引擎（调度、工具、工作区）\n```\n\n## 你打开后会看到什么\n\nDesktop 仍然是统一三栏：\n\n- 左侧：导航\n- 中间：会话、智能体、蜂群和资源列表\n- 右侧：聊天区、工作流、资料页、设置页\n\n它不只是聊天，还包含：\n\n- 用户与智能体会话\n- 工作区与文件管理\n- 蜂群协作与多智能体\n- 系统设置与本地运行偏好\n- 我的概况与账号资料\n\n## 5 步上手\n\n### 1. 下载安装\n\n- 从 Releases 下载对应系统安装包\n\n### 2. 首次启动\n\n启动后会自动：\n\n- 创建本地工作目录 `WUNDER_WORK/`\n- 创建配置目录 `WUNDER_TEMPD/`\n- 准备内置技能和运行资源\n\n### 3. 配置模型\n\n进入“系统设置”配置：\n\n- API Key\n- Endpoint\n- Model Name\n\n保存前建议先点一次“测试连接”。\n\n### 4. 处理账号资料\n\n首次用自己的账号时，建议顺手完成这几件事：\n\n- 在登录页确认是否需要注册或重置密码\n- 进入“我的概况 -> 编辑资料”修改用户名或邮箱\n- 如果这是长期使用账号，顺便设置新的登录密码\n\n登录页的重置密码只需要：\n\n- 用户名\n- 邮箱\n- 新密码\n\n已登录后的修改密码则需要当前密码校验。\n\n### 5. 发起第一次对话\n\n回到聊天页，输入：\n\n```text\n帮我列出当前工作目录的文件\n```\n\n你会看到：\n\n- 模型开始执行\n- 工具工作流逐步出现\n- 最终回复落到聊天区\n\n## 两个你很快会遇到的交互约束\n\n### 运行中不能直接新建线程\n\n当当前智能体还在运行时，`新建线程` 按钮会被禁用。\n\n这是为了避免运行中的主线程和新线程抢状态。正确做法是：\n\n- 等它完成\n- 或者先停止当前会话，再新建线程\n\n### 蜂群运行会有持续高亮\n\n如果某个蜂群还在活动中：\n\n- 中栏的蜂群条目会持续呼吸高亮\n- 画布上的母蜂、工蜂、子智能体节点会保留工作流轨迹\n\n## 系统设置里的恢复入口\n\n如果你把会话、蜂群或工作区跑乱了，可以用“系统设置”里的 `一键重置工作状态`。\n\n它会：\n\n- 中止当前运行中的会话和任务\n- 终止蜂群运行\n- 为默认智能体和各用户智能体重建主线程\n- 清理工作态目录\n\n它不会清空用户长期资产，例如：\n\n- `global`\n- `skills`\n- `knowledge`\n\n## 本地模式下的额外输入能力\n\n如果当前是 Desktop 本地模式，聊天区通常还会看到：\n\n- 麦克风按钮\n- 截图按钮\n\n这些按钮是否可用，取决于当前机器权限和桌面桥接能力。\n\n## 不会用时，直接打开帮助手册\n\nDesktop 已经内置文档入口：\n\n- 左栏进入“更多”\n- 中栏选择“帮助手册”\n- 右栏直接打开文档站\n\n## 下一步\n\n- 想理解界面分区：看 [用户侧前端](/docs/zh-CN/surfaces/frontend/)\n- 想理解本地模式边界：看 [Desktop 本地模式](/docs/zh-CN/ops/desktop-local-mode/)\n- 想看蜂群协作：看 [蜂群协作](/docs/zh-CN/concepts/swarm/)\n- 遇到问题：看 [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"使用说明书/zh-CN/start/desktop.md"}</script>
