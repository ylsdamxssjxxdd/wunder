  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/desktop","language":"zh-CN","title":"Desktop 入门","summary":"先把 Wunder 用起来时，优先看 desktop；它是个人用户和本地优先场景的默认入口。","updated_at":"2026-03-21","read_when":["你要先把 wunder 用起来","你更关心桌面工作台，而不是先搭整套服务"],"source_docs":["README.md","docs/系统介绍.md","docs/设计方案.md"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/desktop/","headings":[{"id":"section-1","level":1,"text":"Desktop 入门"},{"id":"section-2","level":2,"text":"什么时候选 Desktop？"},{"id":"section-3","level":2,"text":"Desktop 是什么？"},{"id":"section-4","level":3,"text":"你会看到什么"},{"id":"section-5","level":3,"text":"它不只是聊天"},{"id":"section-6","level":2,"text":"5 步上手 Desktop"},{"id":"section-7","level":3,"text":"1. 下载安装"},{"id":"section-8","level":3,"text":"2. 首次启动"},{"id":"section-9","level":3,"text":"3. 配置模型"},{"id":"section-10","level":3,"text":"4. 发起第一次对话"},{"id":"section-11","level":3,"text":"5. 探索更多能力"},{"id":"section-12","level":2,"text":"本地模式的关键约定"},{"id":"section-13","level":3,"text":"工作区持久化"},{"id":"section-14","level":3,"text":"容器分层"},{"id":"section-15","level":3,"text":"智能体内见系统"},{"id":"section-16","level":2,"text":"Desktop 特有能力"},{"id":"section-17","level":3,"text":"桌面控制（仅本地模式）"},{"id":"section-18","level":3,"text":"端云协同"},{"id":"section-19","level":3,"text":"在线更新"},{"id":"section-20","level":2,"text":"常见问题"},{"id":"section-21","level":2,"text":"下一步"}],"prev_slug":"zh-CN/start/quickstart","next_slug":"zh-CN/start/server","markdown":"# Desktop 入门\n\n如果你想**马上用起来**，不要先去搭 server，直接用 `wunder-desktop`。\n\n它是面向个人用户和本地优先场景的主入口——打开就是一个完整的智能体工作台。\n\n---\n\n## 什么时候选 Desktop？\n\n| 场景 | 选 Desktop |\n|------|-----------|\n| 你想直接开始用，不想先部署服务 | ✅ |\n| 你需要操作本地文件、窗口、浏览器 | ✅ |\n| 你更习惯图形界面，不想从命令行开始 | ✅ |\n| 你后面可能会接远端，但今天先想跑起来 | ✅ |\n| 你需要多用户治理和统一管理 | ❌ 选 Server |\n\n---\n\n## Desktop 是什么？\n\nDesktop 不是「简化版 Server」，它是一个**本地优先的独立运行形态**：\n\n```\n┌─────────────────────────────────────┐\n│     wunder-desktop                  │\n│  ┌───────────────────────────────┐ │\n│  │  用户侧前端（Vue3）           │ │\n│  │  - 聊天界面                   │ │\n│  │  - 智能体管理                 │ │\n│  │  - 工作区文件                 │ │\n│  │  - 系统设置                   │ │\n│  └───────────────────────────────┘ │\n│  ↓ 本地桥接                         │\n│  ┌───────────────────────────────┐ │\n│  │  Rust 核心引擎                │ │\n│  │  - 调度器                     │ │\n│  │  - 工具链                     │ │\n│  │  - 本地工作区                 │ │\n│  └───────────────────────────────┘ │\n└─────────────────────────────────────┘\n```\n\n### 你会看到什么\n\nDesktop 打开后，是一个统一的三栏消息工作台：\n\n| 区域 | 功能 |\n|------|------|\n| **左侧** | 导航栏：聊天、智能体、用户世界、工作区、工具、设置 |\n| **中间** | 列表视图：会话列表、智能体列表、联系人、文件等 |\n| **右侧** | 主区域：聊天界面、工作流、设置面板、扩展功能 |\n\n### 它不只是聊天\n\nDesktop 承载的是一整套工作台：\n\n- ✅ 用户与智能体会话\n- ✅ 工作区与文件管理\n- ✅ 桌面能力和本地目录映射\n- ✅ 本地模式与远端接入切换\n- ✅ 蜂群协作与多智能体\n- ✅ 渠道接入（飞书、微信、QQ、XMPP 等）\n\n---\n\n## 5 步上手 Desktop\n\n### 1. 下载安装\n\n- 去项目 Releases 页面下载匹配你系统的安装包\n- Windows: `.exe` 或 `.msi`\n- macOS: `.dmg`\n- Linux: `.AppImage` 或 `.deb`\n\n### 2. 首次启动\n\n启动后，系统会自动：\n- 创建本地工作目录 `WUNDER_WORK/`\n- 创建配置目录 `WUNDER_TEMPD/`\n- 同步内置技能到本地\n\n### 3. 配置模型\n\n打开「系统设置」→「模型配置」：\n\n```\n必填项：\n- API Key: 你的大模型 API Key\n- Endpoint: API 端点地址\n- Model Name: 模型名称（如 gpt-4o）\n\n可选：\n- 工具调用模式：tool_call / function_call / freeform_call\n- 最大轮次：防止无限循环\n```\n\n点击「测试连接」确认可用后保存。\n\n### 4. 发起第一次对话\n\n回到聊天界面，输入：\n\n```\n帮我列出当前工作目录的文件\n```\n\n你会看到：\n- 模型思考\n- 调用「列出文件」工具\n- 展示文件列表\n- 给出最终回复\n\n### 5. 探索更多能力\n\n试试这些：\n\n| 任务 | 输入示例 |\n|------|----------|\n| 写代码 | `写一个 Python 脚本，读取 CSV 并生成图表` |\n| 编辑文件 | `打开 main.py，在第 10 行后添加日志` |\n| 浏览网页 | `打开 https://example.com 并提取正文` |\n| 多智能体 | `用蜂群协作：一个查资料，一个写稿，一个复核` |\n\n---\n\n## 本地模式的关键约定\n\n### 工作区持久化\n\n- 本地工作目录 `WUNDER_WORK/` 按**持久目录**处理\n- **不会**被 24 小时自动清理\n- 各容器目录可独立映射到本地\n\n### 容器分层\n\n| container_id | 用途 | 说明 |\n|--------------|------|------|\n| 0 | 用户私有文件 | `global/`、`skills/`、`agents/<agent_id>/` |\n| 1~10 | 智能体运行空间 | 每个智能体可独立配置映射 |\n\n### 智能体内见系统\n\n用户私有容器（container_id=0）同时作为「智能体内见系统」根目录：\n\n```\nWUNDER_WORK/\n├── global/\n│   └── tooling.json          # 用户级工具配置\n├── skills/\n│   ├── builtin/              # 内置技能（只读）\n│   └── custom/               # 用户自定义技能\n└── agents/\n    └── <agent_id>/\n        ├── worker-card.json   # 智能体配置\n        └── system_prompt.md  # 系统提示词\n```\n\n智能体可以直接读写这些配置文件！\n\n---\n\n## Desktop 特有能力\n\n### 桌面控制（仅本地模式）\n\n- **浏览器自动化**：打开网页、点击、输入、截图\n- **桌面控制器**：操作窗口、截图、监视变化\n- **读图工具**：视觉模型可分析本地图片\n\n### 端云协同\n\nDesktop 不仅能本地运行，还能：\n\n- 接入远端 Gateway\n- 使用远端 Server 的能力\n- 在本地和远端之间切换\n\n### 在线更新\n\nTauri 版本支持：\n- 自动检测更新\n- 一键安装更新\n- 签名验证\n\n---\n\n## 常见问题\n\n**Q: Desktop 需要联网吗？**  \nA: 模型调用需要联网，但工具执行可以纯本地。\n\n**Q: 我的文件安全吗？**  \nA: 本地模式下，文件只在你电脑上，不会上传到服务器。\n\n**Q: 能和 Server 配合用吗？**  \nA: 可以！Desktop 可以接入远端 Gateway，享受端云协同。\n\n**Q: 内置技能会被覆盖吗？**  \nA: 内置技能是只读的，重装时会自动更新到最新版。\n\n---\n\n## 下一步\n\n- 想了解界面？→ [桌面界面](/docs/zh-CN/surfaces/desktop-ui/)\n- 想看所有工具？→ [工具总览](/docs/zh-CN/tools/)\n- 遇到问题？→ [故障排查](/docs/zh-CN/help/troubleshooting/)\n- 想深入概念？→ [概念概览](/docs/zh-CN/concepts/)\n","source_path":"静态站文档/zh-CN/start/desktop.md"}</script>
