  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/desktop","language":"zh-CN","title":"Desktop 入门","summary":"个人用户优先看这页。下载安装就能用，不需要先搭服务器。","updated_at":"2026-04-10","read_when":["你要先把 wunder 用起来","你更关心桌面工作台，而不是先搭整套服务"],"source_docs":["docs/API文档.md","frontend/src/components/messenger/DesktopRuntimeSettingsPanel.vue","frontend/src/components/messenger/MessengerSettingsPanel.vue"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/desktop/","headings":[{"id":"section-1","level":1,"text":"Desktop 入门"},{"id":"section-2","level":2,"text":"什么时候选 Desktop"},{"id":"section-3","level":2,"text":"你打开后会看到什么"},{"id":"section-4","level":2,"text":"5 步上手"},{"id":"section-5","level":3,"text":"1. 下载安装"},{"id":"section-6","level":3,"text":"2. 首次启动"},{"id":"section-7","level":3,"text":"3. 配置模型"},{"id":"section-8","level":3,"text":"4. 完善账号资料"},{"id":"section-9","level":3,"text":"5. 发起第一次对话"},{"id":"section-10","level":2,"text":"两个常见交互约束"},{"id":"section-11","level":3,"text":"运行中不能新建线程"},{"id":"section-12","level":3,"text":"蜂群运行时会有高亮提示"},{"id":"section-13","level":2,"text":"状态乱了怎么办？"},{"id":"section-14","level":2,"text":"本地模式额外能力"},{"id":"section-15","level":2,"text":"不会用时，直接打开帮助手册"},{"id":"section-16","level":2,"text":"下一步"}],"prev_slug":"zh-CN/start/quickstart","next_slug":"zh-CN/start/server","markdown":"# Desktop 入门\n\n如果你想马上用起来，不要先搭 server，直接用 Desktop。\n\n打开就是一套完整的智能体工作台，不需要服务器。\n\n## 什么时候选 Desktop\n\n| 场景 | 选 Desktop |\n|------|-----------|\n| 想直接开始用，不想先部署服务 | ✅ |\n| 需要操作本地文件、窗口、浏览器 | ✅ |\n| 更习惯图形界面 | ✅ |\n| 后面可能接远端，但现在先跑起来 | ✅ |\n| 需要多用户治理和管理员后台 | ❌ 选 Server |\n\n## 你打开后会看到什么\n\nDesktop 是统一三栏布局：\n\n- **左栏**：导航（聊天、文件、智能体、工具、设置、帮助）\n- **中栏**：列表（会话、文件、智能体列表等）\n- **右栏**：工作区（聊天、文件预览、设置面板等）\n\n## 5 步上手\n\n### 1. 下载安装\n\n从 Releases 下载对应系统的安装包，安装后启动。\n\n### 2. 首次启动\n\n启动后会自动创建本地工作目录和配置目录，不需要手动操作。\n\n### 3. 配置模型\n\n进入「系统设置」→「模型配置」，填入：\n\n- API Key\n- 接口地址\n- 模型名称\n\n保存前建议先点「测试连接」确认能用。\n\n### 4. 完善账号资料\n\n首次登录后建议：\n\n- 去「我的概况 → 编辑资料」修改用户名或邮箱\n- 如果是长期使用，顺便设置新的登录密码\n\n### 5. 发起第一次对话\n\n回到聊天页，输入：\n\n```\n帮我列出当前工作目录的文件\n```\n\n你会看到模型开始执行 → 工具逐步工作 → 最终回复落到聊天区。\n\n## 两个常见交互约束\n\n### 运行中不能新建线程\n\n当前智能体还在运行时，「新建线程」按钮会被禁用。这是正常保护，等它完成或先停止当前会话再新建。\n\n### 蜂群运行时会有高亮提示\n\n如果某个蜂群还在活动中，中栏的蜂群条目会持续呼吸高亮，这是在提醒你它还在工作。\n\n## 状态乱了怎么办？\n\n如果你把会话、蜂群或工作区跑乱了，用「系统设置」里的**一键重置工作状态**。\n\n它会清理运行中的状态，但不会删除你的技能、知识库等长期资产。\n\n## 本地模式额外能力\n\nDesktop 本地模式下，聊天区还会看到：\n\n- 🎤 麦克风按钮（语音输入）\n- 📷 截图按钮（截屏分析）\n\n是否可用取决于当前机器权限。\n\n## 不会用时，直接打开帮助手册\n\n左栏 → 更多 → 帮助手册，可以直接在应用内查阅文档。\n\n## 下一步\n\n- 想理解界面分区：[用户端界面](/docs/zh-CN/surfaces/frontend/)\n- 想理解本地模式边界：[Desktop 本地模式](/docs/zh-CN/ops/desktop-local-mode/)\n- 想看蜂群协作：[蜂群协作](/docs/zh-CN/concepts/swarm/)\n- 遇到问题：[故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"使用说明书/zh-CN/start/desktop.md"}</script>
