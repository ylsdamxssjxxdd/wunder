  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/desktop","language":"zh-CN","title":"Desktop 入门","summary":"先把 Wunder 用起来时，优先看 desktop；它是个人用户和本地优先场景的默认入口。","updated_at":"2026-03-20","read_when":["你要先把 wunder 用起来","你更关心桌面工作台，而不是先搭整套服务"],"source_docs":["README.md","docs/系统介绍.md","docs/设计方案.md"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/desktop/","headings":[{"id":"section-1","level":1,"text":"Desktop 入门"},{"id":"section-2","level":2,"text":"这页解决什么"},{"id":"section-3","level":2,"text":"先看这几条"},{"id":"section-4","level":2,"text":"什么时候先选 Desktop"},{"id":"section-5","level":2,"text":"你会在 Desktop 里看到什么"},{"id":"section-6","level":2,"text":"本地模式下要记住什么"},{"id":"section-7","level":2,"text":"什么时候不要先看这页"},{"id":"section-8","level":2,"text":"最容易搞错的点"},{"id":"section-9","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/start/quickstart","next_slug":"zh-CN/start/server","markdown":"# Desktop 入门\n\n如果你现在只是想先把 Wunder 用起来，不要先去搭 server，先看 `wunder-desktop`。\n\n它是面向个人用户和本地优先场景的主入口，打开就能进入消息工作台、文件工作区和桌面交互壳。\n\n## 这页解决什么\n\n- 什么时候应该先用 desktop\n- desktop 和 cli、server 的分工差别\n- 本地模式下有哪些关键约定\n\n## 先看这几条\n\n- `desktop` 适合个人使用、演示、桌面工作台和本地文件协作。\n- 它默认优先本地运行，但需要时也能接远端 gateway 或 server。\n- 你看到的不只是聊天窗口，而是一整套工作台。\n\n## 什么时候先选 Desktop\n\n- 你想直接开始用，而不是先部署一套服务\n- 你需要本地文件、窗口和工作区\n- 你更习惯图形界面，不想从命令行开始\n- 你后面可能会接远端，但今天先想跑起来\n\n## 你会在 Desktop 里看到什么\n\nDesktop 打开后，主要是一个统一消息工作台：\n\n- 左侧：导航与功能入口\n- 中间：会话、联系人、智能体或列表视图\n- 右侧：聊天主区域、工作流、设置与扩展面板\n\n这意味着 desktop 不只是“聊一句回一句”，它还承载：\n\n- 用户与智能体会话\n- 工作区与文件\n- 桌面能力和本地目录映射\n- 本地模式与远端接入切换\n\n## 本地模式下要记住什么\n\n- 本地模式优先使用附带的 Python 运行时\n- 本地工作目录与容器目录默认按持久目录处理，不做 24 小时自动清理\n- 用户私有工作目录与智能体容器目录是不同的作用域\n- 工作区文件能力会直接影响聊天中的智能体可操作范围\n\n## 什么时候不要先看这页\n\n- 你在做团队部署、多用户治理或管理员后台\n- 你要统一对外提供 `/wunder`、`/a2a` 和聊天接口\n- 你主要做脚本、终端自动化和开发调试\n\n## 最容易搞错的点\n\n- `desktop` 不是“简化版 server”，它是本地优先的独立运行形态。\n- 本地模式够个人使用，但不等于适合团队治理。\n- 工作区文件会影响工具可见范围，所以不要把它当纯展示目录。\n\n## 相关文档\n\n- [系统架构](/docs/zh-CN/concepts/architecture/)\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [快速开始](/docs/zh-CN/start/quickstart/)\n- [桌面界面](/docs/zh-CN/surfaces/desktop-ui/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"静态站文档/zh-CN/start/desktop.md"}</script>
