  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/cli","language":"zh-CN","title":"CLI 使用","summary":"需要终端执行、脚本化接入或开发调试时，再看 `wunder-cli`。","updated_at":"2026-03-20","read_when":["你想在终端中直接使用 wunder","你更关注开发调试、脚本任务和工作区驱动执行"],"source_docs":["docs/系统介绍.md","docs/设计方案.md"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/cli/","headings":[{"id":"section-1","level":1,"text":"CLI 使用"},{"id":"section-2","level":2,"text":"这页解决什么"},{"id":"section-3","level":2,"text":"先看这几条"},{"id":"section-4","level":2,"text":"什么时候先用 CLI"},{"id":"section-5","level":2,"text":"CLI 最适合的场景"},{"id":"section-6","level":2,"text":"什么时候不要先看这页"},{"id":"section-7","level":2,"text":"最容易搞错的点"},{"id":"section-8","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/start/server","next_slug":"zh-CN/start/hubs","markdown":"# CLI 使用\n\n如果你主要在终端里工作，这页先看。\n\n`wunder-cli` 是 Wunder 的命令行形态，适合开发者、本地任务、脚本化调用和工作区驱动执行。\n\n## 这页解决什么\n\n- 什么时候优先用 CLI\n- CLI 最适合哪些任务\n- CLI 和 desktop、server 的分工差别\n\n## 先看这几条\n\n- CLI 适合开发调试、批处理、脚本自动化和工作区驱动执行。\n- 它通常直接使用当前目录或指定目录作为工作空间。\n- 它和 desktop、server 复用同一套调度内核，差别主要在交互壳。\n\n## 什么时候先用 CLI\n\n- 你要做编程类任务或文件处理\n- 你要在终端里观察事件、工具调用和产物\n- 你要接脚本、CI、批处理或自动化流程\n- 你需要 JSONL 事件流或 TUI 交互\n\n## CLI 最适合的场景\n\n- 一次性的本地任务\n- 以目录为中心的工作区操作\n- 调模型、调工具、看运行细节\n- 不需要完整图形界面的开发工作流\n\n## 什么时候不要先看这页\n\n- 你只是想直接日常使用 Wunder，不想碰终端\n- 你在做团队部署、管理员后台或统一对外接口\n- 你需要桌面窗口、本地 GUI 和消息工作台\n\n## 最容易搞错的点\n\n- CLI 不是“功能更少的 desktop”，它更适合开发和自动化。\n- CLI 适合单用户本地执行，不负责多用户治理。\n- 工作目录就是上下文的一部分，换目录往往就换了任务作用域。\n\n## 相关文档\n\n- [快速开始](/docs/zh-CN/start/quickstart/)\n- [系统架构](/docs/zh-CN/concepts/architecture/)\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"静态站文档/zh-CN/start/cli.md"}</script>
