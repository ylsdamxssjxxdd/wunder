  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/cli","language":"zh-CN","title":"CLI 使用","summary":"需要终端执行、脚本化接入或开发调试时，再看 `wunder-cli`。","updated_at":"2026-03-21","read_when":["你想在终端中直接使用 wunder","你更关注开发调试、脚本任务和工作区驱动执行"],"source_docs":["docs/系统介绍.md","docs/设计方案.md"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/cli/","headings":[{"id":"section-1","level":1,"text":"CLI 使用"},{"id":"section-2","level":2,"text":"什么时候选 CLI？"},{"id":"section-3","level":2,"text":"CLI 是什么？"},{"id":"section-4","level":3,"text":"CLI 核心能力"},{"id":"section-5","level":2,"text":"5 步上手 CLI"},{"id":"section-6","level":3,"text":"1. 安装 CLI"},{"id":"section-7","level":3,"text":"2. 配置模型"},{"id":"section-8","level":3,"text":"3. 启动交互模式"},{"id":"section-9","level":3,"text":"4. 发起第一次任务"},{"id":"section-10","level":3,"text":"5. 探索 CLI 命令"},{"id":"section-11","level":2,"text":"CLI 特有能力"},{"id":"section-12","level":3,"text":"TUI 交互界面"},{"id":"section-13","level":3,"text":"会话管理"},{"id":"section-14","level":3,"text":"脚本化和自动化"},{"id":"section-15","level":3,"text":"工作区驱动"},{"id":"section-16","level":2,"text":"常见问题"},{"id":"section-17","level":2,"text":"下一步"}],"prev_slug":"zh-CN/start/server","next_slug":"zh-CN/start/hubs","markdown":"# CLI 使用\n\n如果你主要在终端里工作，这页先看。\n\n`wunder-cli` 是 Wunder 的命令行形态，适合开发者、本地任务、脚本化调用和工作区驱动执行。\n\n---\n\n## 什么时候选 CLI？\n\n| 场景 | 选 CLI |\n|------|--------|\n| 你要做编程类任务或文件处理 | ✅ |\n| 你要在终端里观察事件、工具调用和产物 | ✅ |\n| 你要接脚本、CI、批处理或自动化流程 | ✅ |\n| 你需要 JSONL 事件流或 TUI 交互 | ✅ |\n| 你只是想直接日常使用，不想碰终端 | ❌ 选 Desktop |\n\n---\n\n## CLI 是什么？\n\nCLI 不是「功能更少的 Desktop」，它是一个**终端优先的独立运行形态**：\n\n```\n┌─────────────────────────────────────┐\n│     wunder-cli                      │\n│  ┌───────────────────────────────┐ │\n│  │  TUI 交互界面（可选）          │ │\n│  │  - 类似 Codex 的终端体验       │ │\n│  │  - 实时显示事件流              │ │\n│  └───────────────────────────────┘ │\n│  ↓ 命令行驱动                       │\n│  ┌───────────────────────────────┐ │\n│  │  Rust 核心引擎                │ │\n│  │  - 调度器                     │ │\n│  │  - 工具链                     │ │\n│  │  - 当前目录作为工作区          │ │\n│  └───────────────────────────────┘ │\n└─────────────────────────────────────┘\n```\n\n### CLI 核心能力\n\n- ✅ 完整的智能体调度和工具链\n- ✅ TUI 交互界面（类 Codex 体验）\n- ✅ JSONL 输出，便于管道和自动化\n- ✅ 会话管理（fork、compact、resume）\n- ✅ 渠道接入（飞书、微信、QQ、XMPP 等）\n- ✅ 调试工具（debug-config、statusline）\n\n---\n\n## 5 步上手 CLI\n\n### 1. 安装 CLI\n\n**从源码编译（需要 Rust 1.70+）：**\n```bash\ngit clone <repo-url>\ncd wunder\ncargo build --release\n```\n\n编译后，可执行文件在 `./target/release/wunder-cli`\n\n### 2. 配置模型\n\n创建或编辑 `~/.wunder/config.yaml`：\n\n```yaml\nllm:\n  models:\n    - name: gpt-4o\n      api_key: your-api-key\n      endpoint: https://api.openai.com/v1\n      max_context: 128000\n      max_rounds: 20\n```\n\n### 3. 启动交互模式\n\n```bash\n# 进入当前目录作为工作区\ncd my-project\nwunder-cli\n```\n\n你会看到：\n```\nwunder-cli v0.1.0\n工作区: /path/to/my-project\n输入 /help 查看命令\n> \n```\n\n### 4. 发起第一次任务\n\n```\n> 帮我列出当前目录的文件\n```\n\n你会看到：\n- 模型思考\n- 调用「列出文件」工具\n- 展示文件列表\n- 给出最终回复\n\n### 5. 探索 CLI 命令\n\n试试这些内置命令：\n\n| 命令 | 说明 |\n|------|------|\n| `/help` | 显示所有可用命令 |\n| `/fork` | 分叉当前会话 |\n| `/compact` | 压缩会话历史 |\n| `/resume <id>` | 恢复历史会话 |\n| `/debug-config` | 显示当前配置 |\n| `/statusline` | 显示运行状态 |\n\n---\n\n## CLI 特有能力\n\n### TUI 交互界面\n\n启动时加上 `--tui` 参数：\n```bash\nwunder-cli --tui\n```\n\n你会得到类似 Codex 的终端体验：\n- 左侧：会话列表\n- 中间：聊天区域\n- 右侧：工具调用和状态\n- 底部：输入框\n\n### 会话管理\n\n```\n> /fork          # 分叉当前会话（保留历史）\n> /compact       # 压缩会话历史（节省 token）\n> /resume abc123 # 恢复会话 abc123\n> /list          # 列出所有会话\n```\n\n### 脚本化和自动化\n\n**单次执行模式：**\n```bash\nwunder-cli --execute \"帮我写一个 Hello World\"\n```\n\n**JSONL 输出（便于管道）：**\n```bash\nwunder-cli --jsonl --execute \"列出文件\" | jq .\n```\n\n**从文件读取任务：**\n```bash\nwunder-cli --file task.txt\n```\n\n### 工作区驱动\n\nCLI 默认使用**当前目录**作为工作区：\n```bash\ncd my-project\nwunder-cli  # 工作区就是 my-project\n```\n\n也可以指定工作区：\n```bash\nwunder-cli --workspace /path/to/workspace\n```\n\n---\n\n## 常见问题\n\n**Q: CLI 需要联网吗？**  \nA: 模型调用需要联网，但工具执行可以纯本地。\n\n**Q: 能和 Desktop/Server 配合用吗？**  \nA: 可以！三者共享同一套核心引擎，工作区格式兼容。\n\n**Q: 如何在 CI/CD 中使用？**  \nA: 用 `--execute` + `--jsonl` 模式，便于脚本集成。\n\n**Q: 会话数据存在哪里？**  \nA: 默认在 `~/.wunder/sessions/`，可以通过配置修改。\n\n---\n\n## 下一步\n\n- 想看所有工具？→ [工具总览](/docs/zh-CN/tools/)\n- 要做自动化？→ [接入概览](/docs/zh-CN/integration/)\n- 遇到问题？→ [故障排查](/docs/zh-CN/help/troubleshooting/)\n- 想深入概念？→ [概念概览](/docs/zh-CN/concepts/)\n","source_path":"静态站文档/zh-CN/start/cli.md"}</script>
