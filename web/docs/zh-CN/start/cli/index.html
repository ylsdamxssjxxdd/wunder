  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/cli","language":"zh-CN","title":"CLI 使用","summary":"开发者和自动化场景的入口。终端驱动、脚本化、JSONL 输出。","updated_at":"2026-04-10","read_when":["你需要在终端中使用 wunder","你要把 wunder 集成到脚本或自动化流程"],"source_docs":["wunder-cli/src/main.rs","wunder-cli/src/tui/"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/cli/","headings":[{"id":"section-1","level":1,"text":"CLI 使用"},{"id":"section-2","level":2,"text":"什么时候选 CLI"},{"id":"section-3","level":2,"text":"安装"},{"id":"section-4","level":2,"text":"第一次会话"},{"id":"section-5","level":2,"text":"常用命令"},{"id":"section-6","level":2,"text":"TUI 界面"},{"id":"section-7","level":2,"text":"JSONL 输出"},{"id":"section-8","level":2,"text":"自动化场景"},{"id":"section-9","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/start/server","next_slug":"zh-CN/start/hubs","markdown":"# CLI 使用\n\nCLI 是开发者和自动化场景的入口。在终端里直接用，不需要图形界面。\n\n## 什么时候选 CLI\n\n| 场景 | 选 CLI |\n|------|--------|\n| 习惯终端操作 | ✅ |\n| 需要脚本化、自动化 | ✅ |\n| 要管道输出到其他工具 | ✅ |\n| 不想装桌面端 | ✅ |\n| 需要图形界面 | ❌ 选 Desktop |\n\n## 安装\n\n```bash\n# 编译（需要 Rust 工具链）\ncargo build --release\n\n# 运行\n./target/release/wunder-cli\n```\n\n## 第一次会话\n\n```bash\nwunder-cli\n> 帮我写一个 Hello World 的 Python 脚本\n```\n\n你会看到模型思考 → 调用工具 → 展示结果 → 给出回复。\n\n## 常用命令\n\n| 命令 | 作用 |\n|------|------|\n| `/new` | 新建线程 |\n| `/stop` | 停止当前执行 |\n| `/compact` | 压缩当前对话 |\n| `/fork` | 分叉当前线程 |\n| `/resume` | 恢复之前的线程 |\n| `/help` | 查看帮助 |\n| `/quit` | 退出 |\n\n## TUI 界面\n\nCLI 内置 TUI（终端用户界面），类似 Codex 的交互体验：\n\n- 上方：对话区\n- 下方：输入区\n- 侧边：线程列表\n\n## JSONL 输出\n\nCLI 支持 JSONL 格式输出，便于管道和自动化集成：\n\n```bash\nwunder-cli --format jsonl\n```\n\n每行一个 JSON 对象，包含事件类型和内容。\n\n## 自动化场景\n\nCLI 适合以下自动化场景：\n\n- CI/CD 流水线中调用智能体\n- 批量处理任务\n- 与其他命令行工具组合\n- 定时任务触发\n\n## 延伸阅读\n\n- [快速开始](/docs/zh-CN/start/quickstart/)\n- [核心概览](/docs/zh-CN/concepts/)\n- [工具总览](/docs/zh-CN/tools/)\n","source_path":"使用说明书/zh-CN/start/cli.md"}</script>
