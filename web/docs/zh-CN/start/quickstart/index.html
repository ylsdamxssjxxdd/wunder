  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/quickstart","language":"zh-CN","title":"快速开始","summary":"用最短路径跑通 wunder 的第一条可用链路；默认推荐 desktop，其次按 server 或 cli 分流。","updated_at":"2026-03-21","read_when":["你第一次使用 wunder","你需要在 10 分钟内跑通一个可验证结果"],"source_docs":["README.md","docs/系统介绍.md","docs/设计方案.md"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/quickstart/","headings":[{"id":"section-1","level":1,"text":"快速开始"},{"id":"section-2","level":2,"text":"第一步：选对你的路径"},{"id":"section-3","level":2,"text":"最短路径：Desktop（推荐）"},{"id":"section-4","level":3,"text":"5 步跑通"},{"id":"section-5","level":3,"text":"Desktop 特有能力"},{"id":"section-6","level":2,"text":"团队路径：Server"},{"id":"section-7","level":3,"text":"启动前准备"},{"id":"section-8","level":3,"text":"3 步部署"},{"id":"section-9","level":3,"text":"Server 核心能力"},{"id":"section-10","level":2,"text":"开发路径：CLI"},{"id":"section-11","level":3,"text":"安装与运行"},{"id":"section-12","level":3,"text":"第一次会话"},{"id":"section-13","level":3,"text":"CLI 特有能力"},{"id":"section-14","level":2,"text":"验收清单"},{"id":"section-15","level":2,"text":"下一步"}],"prev_slug":"zh-CN/index","next_slug":"zh-CN/start/desktop","markdown":"# 快速开始\n\n这页只做一件事：**帮你在 10 分钟内跑通第一条可用链路**。\n\n## 第一步：选对你的路径\n\n| 你的情况 | 推荐入口 | 为什么？ |\n|----------|----------|----------|\n| 我只是想马上用起来 | [Desktop 入门](/docs/zh-CN/start/desktop/) | 门槛最低，下载即用 |\n| 我需要团队协作和管理 | [Server 部署](/docs/zh-CN/start/server/) | 多用户、权限、统一治理 |\n| 我是开发者，要做自动化 | [CLI 使用](/docs/zh-CN/start/cli/) | 终端驱动、脚本化、流水线 |\n\n---\n\n## 最短路径：Desktop（推荐）\n\n适合：个人用户、本地演示、桌面工作台\n\n### 5 步跑通\n\n1. **下载安装**\n   - 去 Releases 下载匹配你系统的 `wunder-desktop`\n   - 安装或解压后启动\n\n2. **配置模型**\n   - 打开「系统设置」→「模型配置」\n   - 填入你的 API Key 和端点\n   - 保存并测试连接\n\n3. **发起第一次对话**\n   - 回到聊天界面\n   - 输入：`帮我列出当前目录的文件`\n   - 回车发送\n\n4. **观察执行过程**\n   - 你会看到：\n     - 模型思考\n     - 工具调用（列出文件）\n     - 中间结果\n     - 最终回复\n\n5. **验收通过**\n   - 如果看到了完整的执行过程和结果\n   - 恭喜，你的核心链路已经通了！\n\n### Desktop 特有能力\n\n- **本地优先**：默认本地运行，也可接远端 gateway\n- **桌面控制**：可操作本地窗口、文件、浏览器\n- **持久工作区**：文件不会被 24 小时自动清理\n- **智能体内见**：可直接编辑智能体配置和提示词\n\n---\n\n## 团队路径：Server\n\n适合：多用户协作、组织治理、统一接入\n\n### 启动前准备\n\n- Docker 和 Docker Compose（推荐）\n- PostgreSQL 数据库（或用 compose 自带）\n- 至少 4GB 可用内存\n\n### 3 步部署\n\n1. **获取代码**\n   ```bash\n   git clone <repo-url>\n   cd wunder\n   ```\n\n2. **启动服务**\n   ```bash\n   # x86 架构\n   docker-compose -f docker-compose-x86.yml up -d\n   \n   # ARM 架构\n   docker-compose -f docker-compose-arm.yml up -d\n   ```\n\n3. **访问系统**\n   - 用户前端：http://localhost:18001\n   - 管理端：http://localhost:18000\n   - 默认管理员：admin / admin\n\n### Server 核心能力\n\n- **多租户**：用户、单位、权限分层治理\n- **统一接口**：`/wunder`、`/wunder/chat/*`、`/a2a`\n- **渠道接入**：飞书、微信、QQ、XMPP 等（三种形态均支持）\n- **可观测性**：监控、压测、能力评估\n\n---\n\n## 开发路径：CLI\n\n适合：开发者、自动化脚本、终端任务\n\n### 安装与运行\n\n```bash\n# 编译（需要 Rust）\ncargo build --release\n\n# 运行\n./target/release/wunder-cli\n```\n\n### 第一次会话\n\n```bash\n# 启动并进入交互模式\nwunder-cli\n\n# 输入任务\n> 帮我写一个 Hello World 的 Python 脚本\n```\n\n### CLI 特有能力\n\n- **TUI 界面**：类似 Codex 的终端交互\n- **会话管理**：`/fork` 分叉、`/compact` 压缩、`/resume` 恢复\n- **调试工具**：`/debug-config`、`/statusline`\n- **JSONL 输出**：便于管道和自动化集成\n\n---\n\n## 验收清单\n\n不管选哪条路径，确认以下几点：\n\n- [ ] 可以成功发起一次执行请求\n- [ ] 可以看到流式过程（中间步骤、工具调用）\n- [ ] 可以拿到最终结果\n- [ ] 知道下一步该看什么文档\n\n---\n\n## 下一步\n\n- 想深入理解系统？→ [概念概览](/docs/zh-CN/concepts/)\n- 要接入到你的系统？→ [接入概览](/docs/zh-CN/integration/)\n- 遇到问题了？→ [故障排查](/docs/zh-CN/help/troubleshooting/)\n- 想看所有工具？→ [工具总览](/docs/zh-CN/tools/)\n","source_path":"静态站文档/zh-CN/start/quickstart.md"}</script>
