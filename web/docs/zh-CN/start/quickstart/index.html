  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/quickstart","language":"zh-CN","title":"快速开始","summary":"用最短路径跑通 wunder 的第一条主链路，优先推荐 desktop。","read_when":["你第一次使用 wunder","你想在 desktop、server、cli 中先跑通一条可用链路"],"source_docs":["README.md","docs/系统介绍.md","docs/设计方案.md"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/quickstart/","headings":[{"id":"section-1","level":1,"text":"快速开始"},{"id":"section-2","level":2,"text":"推荐顺序"},{"id":"section-3","level":2,"text":"最短可用路径：Desktop"},{"id":"section-4","level":2,"text":"如果你要部署 Server"},{"id":"section-5","level":2,"text":"如果你要用 CLI"},{"id":"section-6","level":2,"text":"运行前你至少需要知道的事"},{"id":"section-7","level":2,"text":"推荐阅读顺序"},{"id":"section-8","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/index","next_slug":"zh-CN/start/desktop","markdown":"# 快速开始\n\n这篇文档给你一条最短路径，帮助你先把 wunder 跑起来。\n\n## 推荐顺序\n\n1. 普通用户优先从 [Desktop 入门](/docs/zh-CN/start/desktop/) 开始\n2. 团队部署或接口接入从 [Server 部署](/docs/zh-CN/start/server/) 开始\n3. 开发者调试或脚本任务从 [CLI 使用](/docs/zh-CN/start/cli/) 开始\n\n## 最短可用路径：Desktop\n\n如果你的目标是尽快实际使用 wunder，而不是先研究架构，建议走这条路径：\n\n1. 启动 `wunder-desktop`\n2. 确认本地模式可以打开聊天界面\n3. 选择或配置一个可用模型\n4. 在输入框里直接提出任务\n5. 观察模型回复、工具调用、工作区产物与会话状态\n\nDesktop 是当前主推形态，因为它同时验证了：\n\n- 模型调用链路\n- 用户侧前端交互\n- 工作区与本地文件能力\n- 智能体设置与对话执行主链路\n\n## 如果你要部署 Server\n\nServer 适合这些场景：\n\n- 多用户、多单位、多租户\n- 网页端统一访问\n- 需要管理员侧治理能力\n- 需要渠道、蜂群、用户管理、MCP 统一接入\n\n直接阅读：\n\n- [Server 部署](/docs/zh-CN/start/server/)\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n\n## 如果你要用 CLI\n\nCLI 适合这些场景：\n\n- 本地终端任务\n- 脚本化调用\n- 开发者调试\n- 工作区驱动任务执行\n\n直接阅读：\n\n- [CLI 使用](/docs/zh-CN/start/cli/)\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n- [工具体系](/docs/zh-CN/concepts/tools/)\n\n## 运行前你至少需要知道的事\n\n- wunder 有三种运行形态：`server / cli / desktop`\n- `server` 是核心能力底座\n- `desktop` 是当前主交付产品\n- `cli` 适合开发与自动化\n- 用户请求优先走 WebSocket，SSE 作为兜底\n\n## 推荐阅读顺序\n\n- [Desktop 入门](/docs/zh-CN/start/desktop/)\n- [系统架构](/docs/zh-CN/concepts/architecture/)\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n\n## 相关文档\n\n- [Desktop 入门](/docs/zh-CN/start/desktop/)\n- [Server 部署](/docs/zh-CN/start/server/)\n- [CLI 使用](/docs/zh-CN/start/cli/)\n","source_path":"静态站文档/zh-CN/start/quickstart.md"}</script>
