  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/quickstart","language":"zh-CN","title":"快速开始","summary":"用最短路径跑通 wunder 的第一条可用链路；默认推荐 desktop，其次按 server 或 cli 分流。","updated_at":"2026-03-20","read_when":["你第一次使用 wunder","你需要在 10 分钟内跑通一个可验证结果"],"source_docs":["README.md","docs/系统介绍.md","docs/设计方案.md"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/quickstart/","headings":[{"id":"section-1","level":1,"text":"快速开始"},{"id":"section-2","level":2,"text":"第一步：选运行形态"},{"id":"section-3","level":2,"text":"最短路径：Desktop"},{"id":"section-4","level":2,"text":"团队路径：Server"},{"id":"section-5","level":2,"text":"开发路径：CLI"},{"id":"section-6","level":2,"text":"验收清单"},{"id":"section-7","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/index","next_slug":"zh-CN/start/desktop","markdown":"# 快速开始\n\n这页只做一件事：帮你选对起步路径，并快速跑通第一条主链路。\n\n## 第一步：选运行形态\n\n1. 个人直接使用：走 [Desktop 入门](/docs/zh-CN/start/desktop/)\n2. 团队服务部署：走 [Server 部署](/docs/zh-CN/start/server/)\n3. 终端与自动化：走 [CLI 使用](/docs/zh-CN/start/cli/)\n\n## 最短路径：Desktop\n\n1. 启动 `wunder-desktop`\n2. 打开聊天界面，确认本地模式可用\n3. 配置可用模型\n4. 发一条测试消息\n5. 检查是否能看到：中间过程、工具调用、最终回复\n\n如果这 5 步都通过，说明你的核心执行链路已经可用。\n\n## 团队路径：Server\n\n适合这些场景：\n\n- 多用户与多单位\n- 管理员治理、应用发布、权限控制\n- 渠道接入（Webhook/长连接）\n\n建议阅读顺序：\n\n1. [Server 部署](/docs/zh-CN/start/server/)\n2. [部署与运行](/docs/zh-CN/ops/deployment/)\n3. [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n\n## 开发路径：CLI\n\n适合这些场景：\n\n- 本地研发和脚本任务\n- 工具链调试\n- 自动化执行\n\n建议阅读顺序：\n\n1. [CLI 使用](/docs/zh-CN/start/cli/)\n2. [工具总览](/docs/zh-CN/tools/)\n3. [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n\n## 验收清单\n\n- 可以成功发起一次执行\n- 可以看到流式过程与终态\n- 能区分当前运行形态是 `desktop / server / cli`\n- 能定位下一步要看的文档入口\n\n## 延伸阅读\n\n- [文档总览](/docs/zh-CN/start/hubs/)\n- [接入概览](/docs/zh-CN/integration/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"静态站文档/zh-CN/start/quickstart.md"}</script>
