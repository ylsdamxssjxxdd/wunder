  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/server","language":"zh-CN","title":"Server 部署","summary":"团队和组织的选择。多用户、权限管理、渠道接入、统一治理。","updated_at":"2026-04-10","read_when":["你需要多人共用 wunder","你需要管理员后台和统一管理"],"source_docs":["docs/API文档.md","packaging/docker/"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/server/","headings":[{"id":"section-1","level":1,"text":"Server 部署"},{"id":"section-2","level":2,"text":"什么时候选 Server"},{"id":"section-3","level":2,"text":"部署前准备"},{"id":"section-4","level":2,"text":"3 步部署"},{"id":"section-5","level":3,"text":"1. 获取代码"},{"id":"section-6","level":3,"text":"2. 启动服务"},{"id":"section-7","level":3,"text":"3. 访问系统"},{"id":"section-8","level":2,"text":"部署后必做"},{"id":"section-9","level":2,"text":"核心能力"},{"id":"section-10","level":3,"text":"多租户"},{"id":"section-11","level":3,"text":"渠道接入"},{"id":"section-12","level":3,"text":"可观测性"},{"id":"section-13","level":3,"text":"安全"},{"id":"section-14","level":2,"text":"配置文件"},{"id":"section-15","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/start/desktop","next_slug":"zh-CN/start/cli","markdown":"# Server 部署\n\nServer 是团队和组织的选择。多用户协作、权限管理、渠道接入——都需要先部署 Server。\n\n## 什么时候选 Server\n\n| 场景 | 选 Server |\n|------|-----------|\n| 多人共用一个系统 | ✅ |\n| 需要管理员后台 | ✅ |\n| 需要接入飞书、微信等渠道 | ✅ |\n| 需要统一治理和审计 | ✅ |\n| 只是个人用 | ❌ 选 Desktop |\n\n## 部署前准备\n\n- Docker 和 Docker Compose（推荐方式）\n- 至少 4GB 可用内存\n- PostgreSQL 数据库（Docker 部署时自动包含）\n\n## 3 步部署\n\n### 1. 获取代码\n\n```bash\ngit clone <repo-url>\ncd wunder\n```\n\n### 2. 启动服务\n\n```bash\n# x86 架构\ndocker-compose -f docker-compose-x86.yml up -d\n\n# ARM 架构\ndocker-compose -f docker-compose-arm.yml up -d\n```\n\n### 3. 访问系统\n\n- 用户前端：http://localhost:18002\n- 管理端与文档：http://localhost:18000\n- 默认管理员：admin / admin\n\n**首次登录后请立即修改默认密码。**\n\n## 部署后必做\n\n1. **修改默认密码**：admin 账号的默认密码不安全\n2. **配置模型**：管理端 → 模型配置 → 添加 API Key\n3. **创建用户**：管理端 → 用户管理 → 添加用户或开放注册\n4. **检查渠道**：如果需要接入外部渠道，先配置凭证\n\n## 核心能力\n\n### 多租户\n\n- 用户和单位分层管理\n- 权限按角色分配\n- 数据隔离\n\n### 渠道接入\n\n支持的外部渠道：\n- 飞书\n- 企业微信 / 微信\n- QQ Bot\n- WhatsApp Cloud\n- XMPP\n\n### 可观测性\n\n- 服务健康监控\n- 性能指标\n- 日志与审计\n\n### 安全\n\n- 令牌鉴权\n- 沙盒隔离\n- 审批策略\n- 请求限制\n\n## 配置文件\n\n主要配置文件位于 `config/` 目录：\n\n- 模型配置\n- 工具配置\n- 渠道配置\n- 安全策略\n\n修改配置后通常需要重启服务。\n\n## 延伸阅读\n\n- [管理端界面](/docs/zh-CN/surfaces/web-admin/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [配置说明](/docs/zh-CN/reference/config/)\n","source_path":"使用说明书/zh-CN/start/server.md"}</script>
