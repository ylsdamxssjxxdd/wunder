  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/server","language":"zh-CN","title":"Server 部署","summary":"需要多用户治理、统一接入层和管理员后台时，再看 `wunder-server` 这条线。","updated_at":"2026-03-21","read_when":["你要部署 server 形态","你需要多用户、组织治理和对外接入能力"],"source_docs":["docs/系统介绍.md","docs/设计方案.md","docs/API文档.md"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/server/","headings":[{"id":"section-1","level":1,"text":"Server 部署"},{"id":"section-2","level":2,"text":"什么时候必须上 Server？"},{"id":"section-3","level":2,"text":"Server 架构概览"},{"id":"section-4","level":3,"text":"Server 负责什么"},{"id":"section-5","level":2,"text":"部署前准备"},{"id":"section-6","level":3,"text":"硬件要求"},{"id":"section-7","level":3,"text":"软件依赖"},{"id":"section-8","level":3,"text":"数据库选择"},{"id":"section-9","level":2,"text":"Docker Compose 部署（推荐）"},{"id":"section-10","level":3,"text":"1. 获取代码"},{"id":"section-11","level":3,"text":"2. 配置环境变量（可选）"},{"id":"section-12","level":3,"text":"3. 启动服务"},{"id":"section-13","level":3,"text":"4. 等待启动"},{"id":"section-14","level":3,"text":"5. 访问系统"},{"id":"section-15","level":2,"text":"关键配置项"},{"id":"section-16","level":3,"text":"配置文件"},{"id":"section-17","level":3,"text":"持久化数据"},{"id":"section-18","level":2,"text":"对外访问规划"},{"id":"section-19","level":3,"text":"暴露哪些路径"},{"id":"section-20","level":3,"text":"关键约束"},{"id":"section-21","level":2,"text":"生产环境检查清单"},{"id":"section-22","level":2,"text":"常见问题"},{"id":"section-23","level":2,"text":"下一步"}],"prev_slug":"zh-CN/start/desktop","next_slug":"zh-CN/start/cli","markdown":"# Server 部署\n\n如果你需要**团队协作、多用户治理、统一对外接口**，这页才用看。\n\n`wunder-server` 是 Wunder 的核心服务形态，负责多租户治理、统一接入和管理员后台。\n\n---\n\n## 什么时候必须上 Server？\n\n| 场景 | 选 Server |\n|------|-----------|\n| 多用户并发访问 | ✅ |\n| 组织、单位、租户和管理员治理 | ✅ |\n| 统一暴露 `/wunder`、聊天接口和 `A2A` | ✅ |\n| 把 Wunder 当平台能力接给别的系统 | ✅ |\n| 只是个人本地使用 | ❌ 选 Desktop |\n\n---\n\n## Server 架构概览\n\n```\n                    ┌─────────────────┐\n                    │   外部访问      │\n                    │  (用户/业务方)  │\n                    └────────┬────────┘\n                             │\n                    ┌────────▼────────┐\n                    │   Nginx (18001)│\n                    │  反向代理 + 静态│\n                    └────────┬────────┘\n         ┌───────────────────┼───────────────────┐\n         │                   │                   │\n    ┌────▼────┐        ┌────▼────┐        ┌────▼────┐\n    │ Frontend│        │ wunder- │        │ 静态文档 │\n    │  (用户) │        │ server  │        │   站     │\n    └─────────┘        └────┬────┘        └─────────┘\n                             │\n         ┌───────────────────┼───────────────────┐\n         │                   │                   │\n    ┌────▼────┐        ┌────▼────┐        ┌────▼────┐\n    │Postgres │        │ Weaviate│        │ wunder- │\n    │  (主库) │        │(向量库) │        │ sandbox │\n    └─────────┘        └─────────┘        └─────────┘\n         │                                       │\n    ┌────▼────┐                             ┌────▼────┐\n    │ 工作区  │                             │ extra-  │\n    │ 存储    │                             │ mcp     │\n    └─────────┘                             └─────────┘\n```\n\n### Server 负责什么\n\n| 能力 | 说明 |\n|------|------|\n| **执行入口** | `/wunder` 底层智能体调度 |\n| **会话入口** | `/wunder/chat/*` 完整聊天接口 |\n| **A2A 接口** | `/a2a` 系统级智能体互通 |\n| **流式能力** | WebSocket + SSE 双链路 |\n| **治理能力** | 用户、单位、权限、配额 |\n| **渠道接入** | 飞书、微信、QQ、XMPP 等（三种形态均支持） |\n\n---\n\n## 部署前准备\n\n### 硬件要求\n\n| 规模 | CPU | 内存 | 磁盘 |\n|------|-----|------|------|\n| 小规模（<10 用户） | 2 核 | 4GB | 50GB |\n| 中规模（10-50 用户） | 4 核 | 8GB | 100GB |\n| 大规模（>50 用户） | 8 核+ | 16GB+ | 200GB+ |\n\n### 软件依赖\n\n- Docker 20.10+\n- Docker Compose 2.0+\n- 或直接运行 Rust 二进制（需要 PostgreSQL）\n\n### 数据库选择\n\n| 场景 | 数据库 |\n|------|--------|\n| 生产环境 | PostgreSQL（推荐） |\n| 开发测试 | PostgreSQL（Docker 自带） |\n| 桌面端 | SQLite3 |\n\n> **注意**：Server 形态**不使用** SQLite，必须用 PostgreSQL。\n\n---\n\n## Docker Compose 部署（推荐）\n\n### 1. 获取代码\n\n```bash\ngit clone <repo-url>\ncd wunder\n```\n\n### 2. 配置环境变量（可选）\n\n复制 `.env.example` 为 `.env`，根据需要修改：\n\n```bash\ncp .env.example .env\n```\n\n关键配置：\n\n| 配置项 | 说明 | 默认值 |\n|--------|------|--------|\n| `WUNDER_PORT` | Server 端口 | 18000 |\n| `WUNDER_TEMP_DIR_ROOT` | 临时文件目录 | ./temp_dir |\n| `DATABASE_URL` | PostgreSQL 连接串 | postgres://... |\n\n### 3. 启动服务\n\n**x86 架构：**\n```bash\ndocker-compose -f docker-compose-x86.yml up -d\n```\n\n**ARM 架构（Mac M1/M2/M3、树莓派）：**\n```bash\ndocker-compose -f docker-compose-arm.yml up -d\n```\n\n### 4. 等待启动\n\n首次启动会：\n- 拉取或构建镜像\n- 初始化 PostgreSQL 数据库\n- 启动 wunder-server、frontend、sandbox 等\n\n等待约 1-2 分钟，检查状态：\n\n```bash\ndocker-compose -f docker-compose-x86.yml ps\n```\n\n### 5. 访问系统\n\n| 服务 | 地址 | 说明 |\n|------|------|------|\n| 用户前端 | http://localhost:18001 | 普通用户入口 |\n| 管理端 | http://localhost:18000 | 管理员后台 |\n| 默认管理员 | admin / admin | 首次登录请修改密码 |\n\n---\n\n## 关键配置项\n\n### 配置文件\n\n主配置文件：`config/wunder.yaml`\n\n```yaml\nserver:\n  mode: server\n  port: 18000\n  max_active_sessions: 100\n\nllm:\n  models:\n    - name: gpt-4o\n      api_key: your-api-key\n      endpoint: https://api.openai.com/v1\n      max_context: 128000\n      max_rounds: 20\n\ndatabase:\n  url: postgres://wunder:wunder@postgres:5432/wunder\n\nsecurity:\n  api_key: your-admin-api-key\n  cors:\n    allowed_origins:\n      - http://localhost:18001\n```\n\n### 持久化数据\n\n| 数据类型 | Docker 卷 | 说明 |\n|----------|-----------|------|\n| 用户工作区 | `wunder_workspaces` | `/workspaces` |\n| PostgreSQL 数据 | `wunder_logs` | PostgreSQL 数据目录 |\n| 临时文件 | `./temp_dir` | 临时上传/下载 |\n\n> **重要**：不要把长期业务数据放进 `data/` 目录，容易被清理或覆盖！\n\n---\n\n## 对外访问规划\n\n### 暴露哪些路径\n\n通过 Nginx 反向代理，建议暴露：\n\n| 路径 | 说明 |\n|------|------|\n| `/` | 用户前端 |\n| `/wunder` | 核心 API |\n| `/wunder/chat` | 聊天 API |\n| `/wunder/admin` | 管理端 API（需保护） |\n| `/a2a` | A2A 接口 |\n| `/.well-known/agent-card.json` | 智能体发现 |\n\n### 关键约束\n\n| 约束 | 说明 |\n|------|------|\n| `user_id` 不要求注册 | 可以传任意虚拟标识 |\n| 优先 WebSocket | SSE 作为兜底 |\n| 业务方接 `/wunder` | 底层执行入口 |\n| 稳定调用接 `/wunder/chat/*` | 完整会话入口 |\n\n---\n\n## 生产环境检查清单\n\n- [ ] 使用 PostgreSQL 而非 SQLite\n- [ ] 配置数据库备份策略\n- [ ] 工作区存储持久化\n- [ ] HTTPS 证书配置\n- [ ] CORS 策略收紧\n- [ ] API Key 复杂度足够\n- [ ] 日志收集配置\n- [ ] 监控告警设置\n- [ ] 资源限制配置\n\n---\n\n## 常见问题\n\n**Q: 能和 Desktop 配合用吗？**  \nA: 可以！Desktop 可以接入 Server 作为远端 Gateway。\n\n**Q: user_id 必须先注册吗？**  \nA: 不需要！外部调用可以传任意虚拟 user_id。\n\n**Q: 只暴露 /wunder 够吗？**  \nA: 建议同时规划聊天域和 WebSocket，体验更好。\n\n**Q: 如何升级？**  \nA: 拉取最新代码，重新 `docker-compose up -d` 即可。\n\n---\n\n## 下一步\n\n- 想了解部署细节？→ [部署与运行](/docs/zh-CN/ops/deployment/)\n- 要配置安全？→ [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- 想看系统架构？→ [系统架构](/docs/zh-CN/concepts/architecture/)\n- 要接入 API？→ [wunder API](/docs/zh-CN/integration/wunder-api/)\n","source_path":"静态站文档/zh-CN/start/server.md"}</script>
