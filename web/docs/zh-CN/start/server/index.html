  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/start/server","language":"zh-CN","title":"Server 部署","summary":"需要多用户治理、统一接入层和管理员后台时，再看 `wunder-server` 这条线。","updated_at":"2026-03-20","read_when":["你要部署 server 形态","你需要多用户、组织治理和对外接入能力"],"source_docs":["docs/系统介绍.md","docs/设计方案.md","docs/API文档.md"],"tab":"开始","group":"入门","group_path":["入门"],"url":"/docs/zh-CN/start/server/","headings":[{"id":"section-1","level":1,"text":"Server 部署"},{"id":"section-2","level":2,"text":"本页重点"},{"id":"section-3","level":2,"text":"关键结论"},{"id":"section-4","level":2,"text":"什么时候必须上 Server"},{"id":"section-5","level":2,"text":"Server 负责什么"},{"id":"section-6","level":2,"text":"部署前先定这些事"},{"id":"section-7","level":2,"text":"对外访问关键约束"},{"id":"section-8","level":2,"text":"常见误区"},{"id":"section-9","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/start/desktop","next_slug":"zh-CN/start/cli","markdown":"# Server 部署\n\n如果你已经确定要做团队部署、管理员后台或统一对外接口，这页再看。\n\n`wunder-server` 是 Wunder 的核心运行形态，负责多用户、多单位、多租户治理，以及 `/wunder`、`/wunder/chat/*`、`/a2a` 等公开入口。\n\n## 本页重点\n\n- 什么时候必须上 server\n- server 负责哪些能力\n- 部署前要先定哪些关键项\n\n## 关键结论\n\n- `server` 是团队和组织场景的主入口，不是个人本地模式的替代叫法。\n- 网页端 server 形态使用 PostgreSQL，不是 SQLite。\n- `user_id` 不要求一定是已注册用户，外部调用也可以传虚拟用户标识。\n- 实时链路优先 WebSocket，SSE 作为兜底。\n\n## 什么时候必须上 Server\n\n- 你要多用户并发访问\n- 你要组织、单位、租户和管理员治理\n- 你要统一暴露 `/wunder`、聊天接口和 `A2A`\n- 你要把 Wunder 当平台能力接给别的系统\n\n## Server 负责什么\n\n- `/wunder` 底层执行入口\n- `/wunder/chat/*` 完整智能体会话入口\n- `/a2a` 系统级 A2A 接口\n- WebSocket 和 SSE 流式能力\n- 用户与管理员接口\n- 智能体调度与工具编排\n- 用户、单位、权限与治理能力\n\n## 部署前先定这些事\n\n- 数据库放 PostgreSQL，连通性和备份方案先定好\n- 用户工作区要持久化，不要落到临时目录\n- 需不需要同时部署 sandbox、MCP、A2A 和静态文档站\n- 对外域名下准备暴露哪些路径\n\n## 对外访问关键约束\n\n- 业务方可以把 `/wunder` 当成底层执行入口\n- 如果要稳定调用某个独立人格智能体，优先走 `/wunder/chat/*`\n- `user_id` 不要求一定是注册用户\n- A2A 当前暴露的是系统级路由卡，不是每个智能体一张独立卡\n\n## 常见误区\n\n- 把 `desktop` 当成 server 的部署方式，这是两条线。\n- 只暴露了 `/wunder`，却没规划聊天域和 WebSocket。\n- 误以为 `user_id` 必须先在用户管理里注册。\n- 把长期业务数据放进 `data/`，后面很容易被清理或覆盖。\n\n## 延伸阅读\n\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- [系统架构](/docs/zh-CN/concepts/architecture/)\n- [管理端界面](/docs/zh-CN/surfaces/web-admin/)\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n- [聊天 WebSocket](/docs/zh-CN/integration/chat-ws/)\n","source_path":"静态站文档/zh-CN/start/server.md"}</script>
