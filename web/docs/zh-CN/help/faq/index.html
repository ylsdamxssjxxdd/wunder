  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/help/faq","language":"zh-CN","title":"FAQ","summary":"wunder 的高频问题快速答复，适合在进入详细排障前先做判断。","updated_at":"2026-04-10","read_when":["你有高频使用疑问","你想先快速判断是否属于故障"],"source_docs":["docs/API文档.md","frontend/src/views/LoginView.vue","frontend/src/views/MessengerView.vue"],"tab":"帮助","group":"帮助","group_path":["帮助"],"url":"/docs/zh-CN/help/faq/","headings":[{"id":"section-1","level":1,"text":"FAQ"},{"id":"section-2","level":2,"text":"/wunder 的 userid 必须是注册用户吗？"},{"id":"section-3","level":2,"text":"我做聊天产品时，应该优先接 /wunder 还是 /wunder/chat/？"},{"id":"section-4","level":2,"text":"SSE 和 WebSocket 怎么选？"},{"id":"section-5","level":2,"text":"token 统计为什么和账单不一致？"},{"id":"section-6","level":2,"text":"登录页重置密码需要什么？"},{"id":"section-7","level":2,"text":"已登录后在哪里改用户名或密码？"},{"id":"section-8","level":2,"text":"为什么新建线程按钮有时是灰的？"},{"id":"section-9","level":2,"text":"蜂群和子智能体怎么选？"},{"id":"section-10","level":2,"text":"tempdir 可以当长期存储目录吗？"},{"id":"section-11","level":2,"text":"为什么工具在某个会话里看不到？"},{"id":"section-12","level":2,"text":"Desktop 模式是否必须先部署 Server？"},{"id":"section-13","level":2,"text":"webfetch 和浏览器工具有什么区别？"},{"id":"section-14","level":2,"text":"出现问题时先看哪一页？"}],"prev_slug":"zh-CN/help/troubleshooting","next_slug":"zh-CN/help/glossary","markdown":"# FAQ\n\n## `/wunder` 的 `user_id` 必须是注册用户吗？\n\n不必须。`user_id` 是隔离与归属标识，可以是业务侧传入的虚拟用户标识。\n\n## 我做聊天产品时，应该优先接 `/wunder` 还是 `/wunder/chat/*`？\n\n优先 `/wunder/chat/*`，并配合 `/wunder/chat/ws`。`/wunder` 更适合能力调用型接入。\n\n## SSE 和 WebSocket 怎么选？\n\n实时聊天优先 WebSocket；SSE 作为兜底。\n\n## token 统计为什么和账单不一致？\n\n要分两层看：\n\n- `round_usage.total_tokens` 是单轮请求完成后的实际上下文占用\n- 实际总消耗按每次请求的 `round_usage.total_tokens` 逐次累加\n\n## 登录页重置密码需要什么？\n\n只需要：\n\n- 用户名\n- 邮箱\n- 新密码\n\n## 已登录后在哪里改用户名或密码？\n\n去“我的概况 -> 编辑资料”。\n\n这里可以：\n\n- 改用户名\n- 改邮箱\n- 改登录密码\n\n## 为什么新建线程按钮有时是灰的？\n\n因为当前智能体还在运行。\n\n前端会在运行中禁用 `新建线程`，避免主线程状态错位。等它完成，或先停止当前会话再新建。\n\n## 蜂群和子智能体怎么选？\n\n- 要调用已有其他智能体协作：用蜂群\n- 要从当前会话临时派生一条子运行：用子智能体控制\n\n## `temp_dir` 可以当长期存储目录吗？\n\n不建议。`temp_dir` 是临时目录，业务长期数据应放数据库或工作区持久目录。\n\n## 为什么工具在某个会话里看不到？\n\n通常与工具挂载策略、运行形态能力、会话级参数或 MCP/A2A 启用状态有关。\n\n## Desktop 模式是否必须先部署 Server？\n\n不必须。Desktop 可本地独立运行；需要多租户治理和统一接入时再部署 Server。\n\n## `web_fetch` 和浏览器工具有什么区别？\n\n`web_fetch` 用于正文抓取；浏览器工具用于真实页面交互。\n\n## 出现问题时先看哪一页？\n\n先看 [故障排查](/docs/zh-CN/help/troubleshooting/)。\n","source_path":"使用说明书/zh-CN/help/faq.md"}</script>
