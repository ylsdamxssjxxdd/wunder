  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/help/faq","language":"zh-CN","title":"FAQ","summary":"使用 wunder 时的常见问题，先看这里再查详细排障。","updated_at":"2026-04-10","read_when":["你有使用疑问","你想快速判断是不是故障"],"source_docs":["docs/API文档.md","frontend/src/views/LoginView.vue","frontend/src/views/MessengerView.vue"],"tab":"帮助","group":"帮助","group_path":["帮助"],"url":"/docs/zh-CN/help/faq/","headings":[{"id":"section-1","level":1,"text":"FAQ"},{"id":"section-2","level":2,"text":"必须先注册账号才能用吗？"},{"id":"section-3","level":2,"text":"页面上显示的 Token 数就是我的费用吗？"},{"id":"section-4","level":2,"text":"每次发消息，智能体都会重新学习一遍我的要求吗？"},{"id":"section-5","level":2,"text":"智能体每次对话都会重新读取我的历史记忆吗？"},{"id":"section-6","level":2,"text":"为什么新建线程按钮有时是灰的？"},{"id":"section-7","level":2,"text":"蜂群和子智能体怎么选？"},{"id":"section-8","level":2,"text":"Desktop 必须先部署 Server 吗？"},{"id":"section-9","level":2,"text":"怎么改用户名或密码？"},{"id":"section-10","level":2,"text":"忘记密码怎么办？"},{"id":"section-11","level":2,"text":"上传的文件会被自动删除吗？"},{"id":"section-12","level":2,"text":"为什么有些工具在某个会话里看不到？"},{"id":"section-13","level":2,"text":"webfetch 和浏览器工具有什么区别？"},{"id":"section-14","level":2,"text":"出现问题时先看哪一页？"}],"prev_slug":"zh-CN/help/troubleshooting","next_slug":"zh-CN/help/glossary","markdown":"# FAQ\n\n## 必须先注册账号才能用吗？\n\n不需要。你可以用任意名称直接开始对话，系统会自动为你创建身份。\n\n## 页面上显示的 Token 数就是我的费用吗？\n\n不是。Token 数只是当前对话的上下文长度参考，实际费用取决于你使用的模型服务商的计费规则。\n\n## 每次发消息，智能体都会重新学习一遍我的要求吗？\n\n不会。你在对话开头设定的要求会被系统记住并锁定，后续消息都会遵守，不需要重复说明。\n\n## 智能体每次对话都会重新读取我的历史记忆吗？\n\n不会。你的长期记忆只在对话开始时加载一次，不会在每轮对话中反复读取。\n\n## 为什么新建线程按钮有时是灰的？\n\n因为当前智能体还在运行。等它完成，或先停止当前会话再新建。\n\n## 蜂群和子智能体怎么选？\n\n- **蜂群**：让已有的多个智能体协作完成一个任务\n- **子智能体**：从当前会话临时派生一个独立运行\n\n## Desktop 必须先部署 Server 吗？\n\n不必须。Desktop 可以本地独立运行。需要多人协作和统一管理时再部署 Server。\n\n## 怎么改用户名或密码？\n\n去「我的概况 → 编辑资料」。改密码需要输入当前密码。\n\n## 忘记密码怎么办？\n\n在登录页点「重置密码」，只需要用户名、邮箱和新密码，不需要旧密码。\n\n## 上传的文件会被自动删除吗？\n\n临时目录里的文件可能会被清理，重要文件请放在工作区持久目录中。\n\n## 为什么有些工具在某个会话里看不到？\n\n可能原因：工具未启用、MCP/A2A 服务未开启、当前智能体没有挂载该工具。\n\n## `web_fetch` 和浏览器工具有什么区别？\n\n- **web_fetch**：抓取网页正文内容\n- **浏览器工具**：像真人一样操作网页（点击、滚动、填表）\n\n## 出现问题时先看哪一页？\n\n先看 [故障排查](/docs/zh-CN/help/troubleshooting/)。\n","source_path":"使用说明书/zh-CN/help/faq.md"}</script>
