  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/help/faq","language":"zh-CN","title":"FAQ","summary":"wunder 的高频问题快速答复，适合在进入详细排障前先做判断。","updated_at":"2026-03-20","read_when":["你有高频使用疑问","你想先快速判断是否属于故障"],"source_docs":["docs/系统介绍.md","docs/API文档.md","docs/设计方案.md"],"tab":"帮助","group":"帮助","group_path":["帮助"],"url":"/docs/zh-CN/help/faq/","headings":[{"id":"section-1","level":1,"text":"FAQ"},{"id":"section-2","level":2,"text":"/wunder 的 userid 必须是注册用户吗？"},{"id":"section-3","level":2,"text":"我做聊天产品时，应该优先接 /wunder 还是 /wunder/chat/？"},{"id":"section-4","level":2,"text":"SSE 和 WebSocket 怎么选？"},{"id":"section-5","level":2,"text":"token 统计为什么和账单不一致？"},{"id":"section-6","level":2,"text":"线程 system prompt 会在每轮重算吗？"},{"id":"section-7","level":2,"text":"长期记忆会在每轮自动重新注入吗？"},{"id":"section-8","level":2,"text":"tempdir 可以当长期存储目录吗？"},{"id":"section-9","level":2,"text":"为什么工具在某个会话里看不到？"},{"id":"section-10","level":2,"text":"Desktop 模式是否必须先部署 Server？"},{"id":"section-11","level":2,"text":"webfetch 和浏览器工具有什么区别？"},{"id":"section-12","level":2,"text":"渠道接入失败通常先查哪里？"},{"id":"section-13","level":2,"text":"出现问题时先看哪一页？"}],"prev_slug":"zh-CN/help/troubleshooting","next_slug":"zh-CN/help/glossary","markdown":"# FAQ\n\n## `/wunder` 的 `user_id` 必须是注册用户吗？\n\n不必须。`user_id` 是隔离与归属标识，可以是业务侧传入的虚拟用户标识。\n\n## 我做聊天产品时，应该优先接 `/wunder` 还是 `/wunder/chat/*`？\n\n优先 `/wunder/chat/*`，并配合 `/wunder/chat/ws`。`/wunder` 更适合能力调用型接入。\n\n## SSE 和 WebSocket 怎么选？\n\n实时聊天优先 WebSocket；SSE 作为兜底。\n\n## token 统计为什么和账单不一致？\n\n系统记录的是上下文占用量（用于运行态和容量评估），不是账单总消耗口径。\n\n## 线程 system prompt 会在每轮重算吗？\n\n不会。线程首次确定后会冻结，后续轮次不会改写该线程 system prompt。\n\n## 长期记忆会在每轮自动重新注入吗？\n\n不会。长期记忆只在线程初始化阶段注入一次。\n\n## `temp_dir` 可以当长期存储目录吗？\n\n不建议。`temp_dir` 是临时目录，业务长期数据应放数据库或工作区持久目录。\n\n## 为什么工具在某个会话里看不到？\n\n通常与工具挂载策略、运行形态能力、会话级参数或 MCP/A2A 启用状态有关。\n\n## Desktop 模式是否必须先部署 Server？\n\n不必须。Desktop 可本地独立运行；需要多租户治理和统一接入时再部署 Server。\n\n## `web_fetch` 和浏览器工具有什么区别？\n\n`web_fetch` 用于正文抓取；浏览器工具用于真实页面交互（点击、输入、导航）。\n\n## 渠道接入失败通常先查哪里？\n\n先查渠道运行态、Webhook 验签、outbox 投递，再看模型链路。\n\n## 出现问题时先看哪一页？\n\n先看 [故障排查](/docs/zh-CN/help/troubleshooting/)。\n","source_path":"静态站文档/zh-CN/help/faq.md"}</script>
