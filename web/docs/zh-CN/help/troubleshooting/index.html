  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/help/troubleshooting","language":"zh-CN","title":"故障排查","summary":"排查 Wunder 问题时，优先从入口、鉴权、配置、依赖服务和实时通道五个方向切。","updated_at":"2026-03-20","read_when":["Wunder 跑不起来","你已经确定不是简单使用疑问，而是真故障"],"source_docs":["docs/API文档.md","docs/系统介绍.md","config/wunder-example.yaml"],"tab":"帮助","group":"帮助","group_path":["帮助"],"url":"/docs/zh-CN/help/troubleshooting/","headings":[{"id":"section-1","level":1,"text":"故障排查"},{"id":"section-2","level":2,"text":"最先看什么"},{"id":"section-3","level":2,"text":"入口是否通"},{"id":"section-4","level":2,"text":"常见的“它坏了”情况"},{"id":"section-5","level":3,"text":"接口直接 401 / 403"},{"id":"section-6","level":3,"text":"配置改了但系统没反应"},{"id":"section-7","level":3,"text":"服务启动了，但核心能力还是不可用"},{"id":"section-8","level":3,"text":"聊天收不到中间过程或实时状态"},{"id":"section-9","level":3,"text":"工具为什么没出现"},{"id":"section-10","level":3,"text":"模型一直报权限或审批"},{"id":"section-11","level":3,"text":"Desktop 本地模式看起来坏了"},{"id":"section-12","level":2,"text":"如果你还没定位到问题"},{"id":"section-13","level":2,"text":"提交问题时带什么"}],"prev_slug":"zh-CN/help/index","next_slug":"zh-CN/help/faq","markdown":"# 故障排查\n\n排查 wunder，不要一上来翻所有日志。\n\n先按下面顺序切问题。\n\n## 最先看什么\n\n先做这几步：\n\n1. 确认你访问的是对的运行形态和地址\n2. 确认核心入口能通\n3. 再去看鉴权、配置和依赖服务\n\n## 入口是否通\n\n先检查这些入口：\n\n- `/wunder`\n- `/wunder/chat/ws`\n- `/a2a/agentCard`\n- `/wunder/mcp`\n- `/docs/`\n\n如果入口都不通，先不要继续查上层逻辑。\n\n## 常见的“它坏了”情况\n\n### 接口直接 401 / 403\n\n优先检查鉴权：\n\n- 管理端接口却用了用户 Token\n- 用户侧接口却用了 API Key\n- `/a2a` 或 `/wunder/mcp` 没带 API Key\n- 外链嵌入没有配置 `external_auth_key`\n\n### 配置改了但系统没反应\n\n优先确认这些事：\n\n- 实际读取的是 `config/wunder.yaml` 还是 example\n- 管理端是否写入了 `data/config/wunder.override.yaml`\n- 你改的是 server 配置还是 extra_mcp 配置\n\n### 服务启动了，但核心能力还是不可用\n\n服务端部署最常见的问题是依赖没起来：\n\n- PostgreSQL 未就绪\n- sandbox 不可达\n- `extra_mcp` 未启动\n- 外部 MCP/A2A 目标不可达\n\n### 聊天收不到中间过程或实时状态\n\n优先按这个顺序看：\n\n1. 先看 `/wunder/chat/ws` 是否能建连\n2. 再看是否已自动回退 SSE\n3. 再看 `resume/watch` 是否传错 `session_id` 或 `after_event_id`\n\n### 工具为什么没出现\n\n优先检查：\n\n- 工具是否在配置里启用\n- MCP server 是否 enabled\n- A2A 服务是否 enabled\n- 当前智能体或会话是否真的挂载了目标工具\n\n### 模型一直报权限或审批\n\n排查这几个方向：\n\n- 当前 `approval_mode`\n- 命令与路径白名单\n- sandbox 是否开启\n- 工具是否进入了等待审批态但前端没正确回传\n\n### Desktop 本地模式看起来坏了\n\n最常见的是这几类：\n\n- 误以为必须先部署 server\n- 本地工作目录没持久化\n- 远端接入配置错误后以为本地模式也坏了\n- 以为可以自定义 Python 路径，但当前默认是附带运行时优先\n\n## 如果你还没定位到问题\n\n下一步通常回这些页面：\n\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- [配置说明](/docs/zh-CN/reference/config/)\n\n## 提交问题时带什么\n\n至少带上这些信息：\n\n- 你跑的是 `desktop`、`server` 还是 `cli`\n- 出问题的具体入口或页面\n- 相关日志片段\n- 是否涉及 WebSocket、SSE、渠道、MCP 或 A2A\n","source_path":"静态站文档/zh-CN/help/troubleshooting.md"}</script>
