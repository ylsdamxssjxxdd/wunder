  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/help/troubleshooting","language":"zh-CN","title":"故障排查","summary":"按“入口 -> 鉴权 -> 配置 -> 依赖 -> 实时通道”顺序排查，可快速定位大部分 Wunder 故障。","updated_at":"2026-04-10","read_when":["Wunder 跑不起来或行为异常","你已确认不是单纯使用问题"],"source_docs":["docs/API文档.md","frontend/src/views/LoginView.vue","frontend/src/views/MessengerView.vue","frontend/src/components/messenger/DesktopRuntimeSettingsPanel.vue"],"tab":"帮助","group":"帮助","group_path":["帮助"],"url":"/docs/zh-CN/help/troubleshooting/","headings":[{"id":"section-1","level":1,"text":"故障排查"},{"id":"section-2","level":2,"text":"60 秒健康检查"},{"id":"section-3","level":2,"text":"症状 -> 检查路径"},{"id":"section-4","level":3,"text":"1. 接口直接 401 / 403"},{"id":"section-5","level":3,"text":"2. 配置改了没生效"},{"id":"section-6","level":3,"text":"3. 服务启动成功但能力不可用"},{"id":"section-7","level":3,"text":"4. 实时状态不更新、看不到中间过程"},{"id":"section-8","level":3,"text":"5. 工具不出现或无法调用"},{"id":"section-9","level":3,"text":"6. 附件一直处理中，或者上传后无法发送"},{"id":"section-10","level":3,"text":"7. 登录页重置密码失败"},{"id":"section-11","level":3,"text":"8. 编辑资料或修改密码保存失败"},{"id":"section-12","level":3,"text":"9. 新建线程按钮是灰的"},{"id":"section-13","level":3,"text":"10. 蜂群页面状态看起来不对"},{"id":"section-14","level":3,"text":"11. 会话或蜂群状态整体乱了"},{"id":"section-15","level":3,"text":"12. 麦克风或截图按钮不可用"},{"id":"section-16","level":3,"text":"13. 帮助手册空白或打不开"},{"id":"section-17","level":2,"text":"仍未定位时"},{"id":"section-18","level":2,"text":"提交问题时建议附带"}],"prev_slug":"zh-CN/help/index","next_slug":"zh-CN/help/faq","markdown":"# 故障排查\n\n建议按链路排查，不建议先全量翻日志。\n\n## 60 秒健康检查\n\n1. 核心入口是否可达：`/wunder`、`/wunder/chat/ws`\n2. 鉴权是否匹配：API Key / 用户 Token / 外链鉴权\n3. 依赖是否就绪：数据库、sandbox、MCP\n\n## 症状 -> 检查路径\n\n### 1. 接口直接 401 / 403\n\n优先检查：\n\n- 管理接口是否误用用户 Token\n- 用户接口是否误用 API Key\n- `/a2a`、`/wunder/mcp` 是否携带 API Key\n- 外链场景是否配置 `external_auth_key`\n\n### 2. 配置改了没生效\n\n优先检查：\n\n- 实际加载的是 `config/wunder.yaml` 还是示例文件\n- 当前实例是否实际读取 `config/wunder.yaml` 或本地运行时 `WUNDER_TEMP/config/wunder.yaml`\n- 你改的是 server 配置、extra_mcp 配置，还是前端配置\n\n### 3. 服务启动成功但能力不可用\n\n优先检查依赖：\n\n- PostgreSQL / SQLite 是否可连\n- sandbox 是否可达\n- extra_mcp 是否启动\n- 外部 MCP/A2A 目标是否在线\n\n### 4. 实时状态不更新、看不到中间过程\n\n优先检查：\n\n1. `/wunder/chat/ws` 是否建连成功\n2. 是否已回退 SSE\n3. `session_id`、`after_event_id` 是否正确\n\n### 5. 工具不出现或无法调用\n\n优先检查：\n\n- 工具是否启用\n- MCP / A2A 服务是否 `enabled`\n- 当前会话或智能体是否挂载目标工具\n- 是否卡在审批态但前端没回传 `approval`\n\n### 6. 附件一直处理中，或者上传后无法发送\n\n优先检查：\n\n- 上传的是否是当前支持的类型：图片、音频、视频、常见文本或 Office 文档\n- 文档转换链路是否正常：`POST /wunder/chat/attachments/convert`\n- 媒体处理链路是否正常：`POST /wunder/chat/attachments/media/process`\n- `temp_dir` 和用户私有工作区是否可写\n- 如果是视频重新抽帧失败，检查源文件是否还在，`source_public_path` 是否仍然有效\n\n补充说明：\n\n- 聊天输入区在附件处理完成前会阻止发送，这是正常保护\n- 长视频会被自动限制总帧数，所以“请求 FPS”和“实际 FPS”可能不同\n\n### 7. 登录页重置密码失败\n\n优先检查：\n\n- 用户名是否正确\n- 邮箱是否与该账号一致\n- 两次输入的新密码是否一致\n\n补充说明：\n\n- 登录页的重置密码只认“用户名 + 邮箱 + 新密码”\n- 它不要求先登录，也不要求旧密码\n\n### 8. 编辑资料或修改密码保存失败\n\n优先检查：\n\n- 用户名是否为空\n- 如果改密码，是否输入了当前密码\n- 新密码和确认新密码是否一致\n- 新密码是否和当前密码相同\n\n补充说明：\n\n- 只改用户名或邮箱时，密码项可以留空\n- 已登录后的改密一定会校验当前密码\n\n### 9. 新建线程按钮是灰的\n\n先判断当前会话是不是还在运行。\n\n这是前端保护，不是故障。当前智能体运行中时，聊天页会禁用 `新建线程`，避免主线程状态错位。\n\n处理方式：\n\n- 等当前运行完成\n- 或者先停止当前会话，再新建线程\n\n### 10. 蜂群页面状态看起来不对\n\n优先检查：\n\n- 蜂群实时通道是否仍在线\n- 当前 mission 是否其实已经终态，但前端还没收到最新事件\n- 页面刷新后是否恢复正常\n\n补充说明：\n\n- 中栏蜂群条目只要仍有运行中的 mission，就会呼吸高亮\n- 画布工作流区域当前优先显示工具轨迹，不应长期只剩状态/摘要\n\n### 11. 会话或蜂群状态整体乱了\n\n优先尝试“系统设置 -> 一键重置工作状态”。\n\n它会：\n\n- 中止运行中的会话\n- 清空排队任务\n- 终止蜂群运行\n- 重建默认智能体和各用户智能体的主线程\n- 清理工作态目录\n\n补充说明：\n\n- 它清的是工作态，不是长期资产\n- `skills`、`knowledge`、`global` 这类长期内容会保留\n\n### 12. 麦克风或截图按钮不可用\n\n优先检查：\n\n- 当前是否为支持对应能力的运行环境\n- 麦克风权限是否被系统或浏览器拒绝\n- 浏览器是否支持 `getUserMedia` / `MediaRecorder` / `AudioContext`\n- 桌面桥接是否暴露了录音或截图能力\n\n### 13. 帮助手册空白或打不开\n\n优先检查：\n\n- `/docs/` 静态站点是否已构建并可访问\n- 反向代理是否把 `/docs/` 正确暴露到前端所在域名\n- 如果是远端 API 模式，当前源站是否真的提供 `/docs/`\n\n## 仍未定位时\n\n回到以下页面继续缩小范围：\n\n- [Desktop 本地模式](/docs/zh-CN/ops/desktop-local-mode/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- [配置说明](/docs/zh-CN/reference/config/)\n- [流式事件参考](/docs/zh-CN/reference/stream-events/)\n\n## 提交问题时建议附带\n\n- 运行形态：`desktop / server / cli`\n- 失败入口与时间点\n- 关键日志片段\n- 是否涉及 WS、SSE、蜂群、子智能体、MCP、A2A\n","source_path":"使用说明书/zh-CN/help/troubleshooting.md"}</script>
