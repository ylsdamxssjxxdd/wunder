  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/help/troubleshooting","language":"zh-CN","title":"故障排查","summary":"按症状找原因，快速定位大部分问题。","updated_at":"2026-04-10","read_when":["wunder 跑不起来或行为异常","你已确认不是单纯使用问题"],"source_docs":["docs/API文档.md","frontend/src/views/LoginView.vue","frontend/src/views/MessengerView.vue","frontend/src/components/messenger/DesktopRuntimeSettingsPanel.vue"],"tab":"帮助","group":"帮助","group_path":["帮助"],"url":"/docs/zh-CN/help/troubleshooting/","headings":[{"id":"section-1","level":1,"text":"故障排查"},{"id":"section-2","level":2,"text":"60 秒健康检查"},{"id":"section-3","level":2,"text":"按症状查找"},{"id":"section-4","level":3,"text":"登录失败或提示无权限"},{"id":"section-5","level":3,"text":"配置改了没生效"},{"id":"section-6","level":3,"text":"服务启动成功但功能不可用"},{"id":"section-7","level":3,"text":"实时状态不更新、看不到中间过程"},{"id":"section-8","level":3,"text":"工具不出现或无法调用"},{"id":"section-9","level":3,"text":"附件上传后无法发送"},{"id":"section-10","level":3,"text":"忘记密码怎么办"},{"id":"section-11","level":3,"text":"修改密码保存失败"},{"id":"section-12","level":3,"text":"新建线程按钮是灰的"},{"id":"section-13","level":3,"text":"蜂群页面状态不对"},{"id":"section-14","level":3,"text":"会话或蜂群状态整体乱了"},{"id":"section-15","level":3,"text":"麦克风或截图按钮不可用"},{"id":"section-16","level":3,"text":"帮助手册空白或打不开"},{"id":"section-17","level":2,"text":"仍未解决？"},{"id":"section-18","level":2,"text":"提交问题时建议附带"}],"prev_slug":"zh-CN/help/index","next_slug":"zh-CN/help/faq","markdown":"# 故障排查\n\n建议按症状找原因，不要上来就翻日志。\n\n## 60 秒健康检查\n\n1. 服务是否在运行？能否打开页面？\n2. 登录是否正常？账号密码对不对？\n3. 模型配置是否正确？API Key 能不能用？\n\n## 按症状查找\n\n### 登录失败或提示无权限\n\n检查：\n- 用户名和密码是否正确\n- 管理端和用户端是否用错了入口\n- 账号是否被禁用\n\n### 配置改了没生效\n\n检查：\n- 改的是不是正确的配置文件\n- 修改后是否需要重启服务\n- 当前实例是否真的加载了你改的配置\n\n### 服务启动成功但功能不可用\n\n检查：\n- 数据库是否正常连接\n- 外部工具服务（MCP、A2A）是否在线\n- 沙盒服务是否可达\n\n### 实时状态不更新、看不到中间过程\n\n检查：\n- 网络连接是否稳定\n- 是否被防火墙或代理拦截了 WebSocket\n- 刷新页面后是否恢复\n\n### 工具不出现或无法调用\n\n检查：\n- 工具是否已启用\n- MCP / A2A 服务是否开启\n- 当前智能体是否挂载了该工具\n- 是否在等待审批但没看到提示\n\n### 附件上传后无法发送\n\n检查：\n- 文件类型是否支持（图片、音频、视频、常见文档）\n- 文件是否还在处理中（处理完成前发送按钮会被禁用）\n- 工作区是否有写入权限\n\n### 忘记密码怎么办\n\n在登录页点「重置密码」，只需要：\n- 用户名\n- 邮箱\n- 新密码\n\n不需要旧密码，也不需要先登录。\n\n### 修改密码保存失败\n\n检查：\n- 是否输入了当前密码（已登录后改密必须验证旧密码）\n- 新密码和确认密码是否一致\n- 新密码是否和当前密码相同\n\n### 新建线程按钮是灰的\n\n这不是故障。当前智能体运行中时，系统会禁用新建线程。等它完成或先停止当前会话。\n\n### 蜂群页面状态不对\n\n检查：\n- 刷新页面后是否恢复\n- 蜂群任务是否已经结束但页面还没更新\n- 实时通道是否断开\n\n### 会话或蜂群状态整体乱了\n\n用「系统设置 → 一键重置工作状态」。\n\n它会：\n- 停止运行中的会话和任务\n- 终止蜂群运行\n- 重建干净的线程\n\n不会删除你的技能、知识库等长期资产。\n\n### 麦克风或截图按钮不可用\n\n检查：\n- 当前是否在支持这些功能的运行环境\n- 浏览器是否授权了麦克风/屏幕权限\n- 桌面桥接是否正常工作\n\n### 帮助手册空白或打不开\n\n检查：\n- 文档站点是否已构建\n- 反向代理是否正确配置了 `/docs/` 路径\n\n## 仍未解决？\n\n继续查看：\n\n- [Desktop 本地模式](/docs/zh-CN/ops/desktop-local-mode/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- [配置说明](/docs/zh-CN/reference/config/)\n\n## 提交问题时建议附带\n\n- 运行形态：desktop / server / cli\n- 出问题的操作步骤\n- 关键报错信息\n- 是否涉及蜂群、MCP、A2A 等\n","source_path":"使用说明书/zh-CN/help/troubleshooting.md"}</script>
