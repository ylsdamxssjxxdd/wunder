  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/help/troubleshooting","language":"zh-CN","title":"故障排查","summary":"按“入口 -> 鉴权 -> 配置 -> 依赖 -> 实时通道”顺序排查，可快速定位大部分 Wunder 故障。","updated_at":"2026-03-27","read_when":["Wunder 跑不起来或行为异常","你已确认不是单纯使用问题"],"source_docs":["docs/API文档.md","docs/系统介绍.md","config/wunder-example.yaml"],"tab":"帮助","group":"帮助","group_path":["帮助"],"url":"/docs/zh-CN/help/troubleshooting/","headings":[{"id":"section-1","level":1,"text":"故障排查"},{"id":"section-2","level":2,"text":"60 秒健康检查"},{"id":"section-3","level":2,"text":"症状 -> 检查路径"},{"id":"section-4","level":3,"text":"1) 接口直接 401 / 403"},{"id":"section-5","level":3,"text":"2) 配置改了没生效"},{"id":"section-6","level":3,"text":"3) 服务启动成功但能力不可用"},{"id":"section-7","level":3,"text":"4) 实时状态不更新、看不到中间过程"},{"id":"section-8","level":3,"text":"5) 工具不出现或无法调用"},{"id":"section-9","level":2,"text":"仍未定位时"},{"id":"section-10","level":2,"text":"提交问题建议附带信息"}],"prev_slug":"zh-CN/help/index","next_slug":"zh-CN/help/faq","markdown":"# 故障排查\n\n建议按链路排查，不建议先全量翻日志。\n\n## 60 秒健康检查\n\n1. 核心入口是否可达：`/wunder`、`/wunder/chat/ws`\n2. 鉴权是否匹配：API Key / 用户 Token / 外链鉴权\n3. 依赖是否就绪：数据库、sandbox、MCP\n\n## 症状 -> 检查路径\n\n### 1) 接口直接 401 / 403\n\n优先检查：\n\n- 管理接口是否误用用户 Token\n- 用户接口是否误用 API Key\n- `/a2a`、`/wunder/mcp` 是否携带 API Key\n- 外链场景是否配置 `external_auth_key`\n\n### 2) 配置改了没生效\n\n优先检查：\n\n- 实际加载的是 `config/wunder.yaml` 还是示例文件\n- 当前实例是否实际读取 `config/wunder.yaml` 或本地运行时 `WUNDER_TEMP/config/wunder.yaml`\n- 你改的是 server 配置、extra_mcp 配置，还是前端配置\n\n### 3) 服务启动成功但能力不可用\n\n优先检查依赖：\n\n- PostgreSQL / SQLite 是否可连\n- sandbox 是否可达\n- extra_mcp 是否启动\n- 外部 MCP/A2A 目标是否在线\n\n### 4) 实时状态不更新、看不到中间过程\n\n优先检查：\n\n1. `/wunder/chat/ws` 是否建连成功\n2. 是否已回退 SSE\n3. `session_id`、`after_event_id` 是否正确\n\n### 5) 工具不出现或无法调用\n\n优先检查：\n\n- 工具是否启用\n- MCP / A2A 服务是否 `enabled`\n- 当前会话或智能体是否挂载目标工具\n- 是否卡在审批态但前端没回传 `approval`\n\n## 仍未定位时\n\n回到以下页面继续缩小范围：\n\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- [配置说明](/docs/zh-CN/reference/config/)\n- [流式事件参考](/docs/zh-CN/reference/stream-events/)\n\n## 提交问题建议附带信息\n\n- 运行形态：`desktop / server / cli`\n- 失败入口与时间点\n- 关键日志片段\n- 是否涉及 WS、SSE、渠道、MCP、A2A\n","source_path":"静态站文档/zh-CN/help/troubleshooting.md"}</script>
