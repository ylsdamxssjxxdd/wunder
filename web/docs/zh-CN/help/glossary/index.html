  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/help/glossary","language":"zh-CN","title":"术语表","summary":"这页用于快速统一 Wunder 文档里的核心术语，避免把 user、session、thread、container、agent 混成一个概念。","updated_at":"2026-03-19","read_when":["你第一次系统性阅读 Wunder 文档","你发现很多词看起来相近但不知道边界"],"source_docs":["docs/系统介绍.md","docs/设计方案.md","docs/API文档.md"],"tab":"帮助","group":"帮助","group_path":["帮助"],"url":"/docs/zh-CN/help/glossary/","headings":[{"id":"section-1","level":1,"text":"术语表"},{"id":"section-2","level":2,"text":"userid"},{"id":"section-3","level":2,"text":"注册用户"},{"id":"section-4","level":2,"text":"agentid"},{"id":"section-5","level":2,"text":"sessionid"},{"id":"section-6","level":2,"text":"线程"},{"id":"section-7","level":2,"text":"用户轮次 / 模型轮次"},{"id":"section-8","level":2,"text":"containerid"},{"id":"section-9","level":2,"text":"工作区"},{"id":"section-10","level":2,"text":"skill"},{"id":"section-11","level":2,"text":"skillcall"},{"id":"section-12","level":2,"text":"MCP"},{"id":"section-13","level":2,"text":"A2A"},{"id":"section-14","level":2,"text":"channel"},{"id":"section-15","level":2,"text":"outbox"},{"id":"section-16","level":2,"text":"turnterminal"},{"id":"section-17","level":2,"text":"threadstatus"},{"id":"section-18","level":2,"text":"approvalresolved"},{"id":"section-19","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/help/faq","next_slug":null,"markdown":"# 术语表\n\n## `user_id`\n\nWunder 请求里的用户标识。\n\n它可以是注册用户，也可以只是一个虚拟隔离标识。\n\n## 注册用户\n\n指真正存在于用户管理体系里的账号。\n\n它和 `/wunder` 调用里传入的任意 `user_id` 不是一回事。\n\n## `agent_id`\n\n智能体应用标识。\n\n它通常决定：\n\n- 智能体配置\n- 追加提示词\n- 工具挂载\n- 容器路由\n\n## `session_id`\n\n一次具体会话的标识。\n\n它是对话恢复和继续发送消息时最重要的上下文编号。\n\n## 线程\n\nWunder 文档里说“线程”时，通常不是操作系统线程，而是会话级运行单元。\n\n它会绑定：\n\n- 冻结后的 system prompt\n- 历史消息\n- 当前运行态\n\n## 用户轮次 / 模型轮次\n\n用户每发一条消息，记 1 轮用户轮次。\n\n模型每执行一次动作，记 1 轮模型轮次。动作包括：\n\n- 模型调用\n- 工具调用\n- 最终回复\n\n## `container_id`\n\n工作区容器编号。\n\n当前约定：\n\n- `0`：用户私有容器\n- `1~10`：智能体运行容器\n\n## 工作区\n\nWunder 的持久文件空间。\n\n它按 `user_id + container_id` 隔离，而不是单纯“当前目录”。\n\n## `skill`\n\n面向模型的技能包。\n\n通常包含：\n\n- `SKILL.md`\n- 脚本\n- 资源文件\n\n## `skill_call`\n\n内置技能调用工具。\n\n模型可用它直接读取技能正文和目录结构。\n\n## MCP\n\n模型上下文协议接入面。\n\n在 Wunder 里，它既可以是 Wunder 自己暴露出去的服务，也可以是 Wunder 接入的外部服务。\n\n## A2A\n\n智能体之间的标准互操作协议接入面。\n\n它更偏“系统对系统”，而不是普通业务接口。\n\n## `channel`\n\n外部消息渠道。\n\n例如飞书、企业微信、QQBot、XMPP 等。\n\n## `outbox`\n\n渠道出站缓冲与重试层。\n\n它让渠道发送从同步操作变成可恢复的异步链路。\n\n## `turn_terminal`\n\n一轮执行的终结事件。\n\n判断一轮是否结束时，应优先看它。\n\n## `thread_status`\n\n线程当前运行态事件。\n\n判断线程现在是否在运行、等待审批或空闲时，应优先看它。\n\n## `approval_resolved`\n\n审批闭环事件。\n\n表示待审批请求已经进入终态。\n\n## 相关文档\n\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n- [工作区与容器](/docs/zh-CN/concepts/workspaces/)\n- [流式事件参考](/docs/zh-CN/reference/stream-events/)\n","source_path":"静态站文档/zh-CN/help/glossary.md"}</script>
