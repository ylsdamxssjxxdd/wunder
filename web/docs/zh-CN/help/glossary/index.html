  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/help/glossary","language":"zh-CN","title":"术语表","summary":"wunder 文档里的核心术语，用大白话解释，避免混淆。","updated_at":"2026-04-24","read_when":["你第一次系统性阅读 wunder 文档","你发现很多词看起来相近但不知道区别"],"source_docs":["docs/系统介绍.md","docs/设计方案.md","docs/API文档.md"],"tab":"帮助","group":"帮助","group_path":["帮助"],"url":"/docs/zh-CN/help/glossary/","headings":[{"id":"section-1","level":1,"text":"术语表"},{"id":"section-2","level":2,"text":"用户"},{"id":"section-3","level":2,"text":"智能体"},{"id":"section-4","level":2,"text":"线程"},{"id":"section-5","level":2,"text":"蜂群"},{"id":"section-6","level":2,"text":"母蜂"},{"id":"section-7","level":2,"text":"工蜂"},{"id":"section-8","level":2,"text":"用户轮次"},{"id":"section-9","level":2,"text":"模型轮次"},{"id":"section-10","level":2,"text":"工作区"},{"id":"section-11","level":2,"text":"容器"},{"id":"section-12","level":2,"text":"技能（Skill）"},{"id":"section-13","level":2,"text":"MCP"},{"id":"section-14","level":2,"text":"A2A"},{"id":"section-15","level":2,"text":"渠道（Channel）"},{"id":"section-16","level":2,"text":"Token"},{"id":"section-17","level":2,"text":"上下文压缩"},{"id":"section-18","level":2,"text":"长期记忆"},{"id":"section-19","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/help/faq","next_slug":"en/index","markdown":"# 术语表\n\n## 用户\n\n你的身份标识。可以是注册账号，也可以是临时用的虚拟名称，系统都能识别。\n\n## 智能体\n\n执行任务的 AI 角色。每个智能体有自己的模型、工具和提示词配置。\n\n## 线程\n\n一次连续的对话。一个智能体可以有多个线程，每个线程独立维护上下文。\n\n## 蜂群\n\n多个智能体协作的小组。蜂群里有一个母蜂负责分配任务，多个工蜂负责执行。\n\n## 母蜂\n\n蜂群中负责统筹和分配任务的角色。\n\n## 工蜂\n\n蜂群中负责具体执行任务的角色。\n\n## 用户轮次\n\n你每发一条消息，就是一轮用户轮次。\n\n## 模型轮次\n\n模型每执行一次动作（思考、调用工具、回复），就是一轮模型轮次。一轮用户轮次里可能包含多轮模型轮次。\n\n## 工作区\n\n你的持久文件空间。文件放在这里不会被自动清理。\n\n## 容器\n\n工作区里的隔离分区。容器 0 是你的私人空间，容器 1~10 是智能体的运行空间。\n\n## 技能（Skill）\n\n给模型用的能力包。通常包含说明文档、脚本和资源文件，让智能体能完成特定类型的任务。\n\n## MCP\n\n模型上下文协议。一种标准接口，让 wunder 能接入外部工具服务。\n\n## A2A\n\n智能体之间的互操作协议。让不同系统的智能体能互相发现和协作。\n\n## 渠道（Channel）\n\n外部消息通道，比如飞书、企业微信、QQ、XMPP 等。通过渠道，智能体能收发外部消息。\n\n## Token\n\n模型处理文本的基本计量单位。Token 数反映当前对话的上下文长度，不等于实际费用。\n\n## 上下文压缩\n\n对话太长时，系统会自动压缩历史内容，让模型能继续工作而不丢失关键信息。\n\n## 长期记忆\n\n智能体跨对话记住的知识。可以手动添加，也可以让系统自动提炼。\n\n## 延伸阅读\n\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n- [工作区与容器](/docs/zh-CN/concepts/workspaces/)\n- [流式事件参考](/docs/zh-CN/reference/stream-events/)\n","source_path":"使用说明书/zh-CN/help/glossary.md"}</script>
