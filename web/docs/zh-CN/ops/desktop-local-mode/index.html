  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/desktop-local-mode","language":"zh-CN","title":"Desktop 本地模式","summary":"Desktop 本地模式不是缩小版 server，而是一套本地优先、持久目录优先的运行形态。","updated_at":"2026-04-10","read_when":["你主要使用 wunder-desktop","你要判断本地模式和远端 server 模式分别适合什么"],"source_docs":["docs/API文档.md","src/api/desktop.rs","frontend/src/components/messenger/DesktopRuntimeSettingsPanel.vue"],"tab":"运维","group":"部署与治理","group_path":["部署与治理"],"url":"/docs/zh-CN/ops/desktop-local-mode/","headings":[{"id":"section-1","level":1,"text":"Desktop 本地模式"},{"id":"section-2","level":2,"text":"先不要把它理解成什么"},{"id":"section-3","level":2,"text":"本地模式最核心的特点"},{"id":"section-4","level":3,"text":"工作目录是持久的"},{"id":"section-5","level":3,"text":"仍然保留容器语义"},{"id":"section-6","level":3,"text":"优先使用附带运行时"},{"id":"section-7","level":2,"text":"本地模式为什么适合作为第一入口"},{"id":"section-8","level":2,"text":"本地模式下文件能力有什么特殊点"},{"id":"section-9","level":2,"text":"一键重置工作状态是什么"},{"id":"section-10","level":2,"text":"重置后会保留什么"},{"id":"section-11","level":2,"text":"什么时候该切远端"},{"id":"section-12","level":2,"text":"本地模式容易踩的坑"},{"id":"section-13","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/ops/data-and-storage","next_slug":"zh-CN/ops/auth-and-security","markdown":"# Desktop 本地模式\n\nDesktop 本地模式是 Wunder 当前最贴近真实个人使用的形态。\n\n## 先不要把它理解成什么\n\n不要把它理解成：\n\n- 小号 server\n- 只少了管理员后台的 server\n- 临时试玩模式\n\n它更准确的定位是：\n\n- 本地优先运行形态\n- 桌面工作台\n- 端云协同的前半段\n\n## 本地模式最核心的特点\n\n### 工作目录是持久的\n\n本地模式下，工作目录不是临时 sandbox。\n\n- `WUNDER_WORK/` 按持久目录处理\n- 不走 24 小时自动清理\n\n### 仍然保留容器语义\n\n虽然是本地模式，但仍区分：\n\n- 用户私有容器\n- 智能体运行容器\n\n只是这些容器会映射到真实本地目录。\n\n### 优先使用附带运行时\n\nDesktop 本地模式优先使用安装包附带的 Python 运行时，减少首次配置成本。\n\n## 本地模式为什么适合作为第一入口\n\n因为它一次性覆盖了完整主链路：\n\n- 用户侧界面\n- 对话执行\n- 工具调用\n- 工作区文件\n- 智能体设置\n- 蜂群协作\n\n## 本地模式下文件能力有什么特殊点\n\n当前一个关键约定是：\n\n- 本地模式下，内置文件工具可以访问本机绝对路径\n\n这比纯工作区限制更灵活，但也意味着你要更清楚本地目录边界。\n\n## 一键重置工作状态是什么\n\n本地模式现在提供 `一键重置工作状态`。\n\n它适合这些场景：\n\n- 会话卡在运行中\n- 蜂群任务状态明显不一致\n- 工作区里留下半截运行态文件\n- 你想让默认智能体和各自定义智能体回到干净主线程\n\n执行后会：\n\n- 中止当前用户仍在运行的会话\n- 清空排队任务\n- 终止当前蜂群任务\n- 为默认智能体和全部用户智能体重建主线程\n- 清理对应工作态目录\n\n## 重置后会保留什么\n\n这次重置针对的是“工作态”，不是“长期资产”。\n\n会保留的典型内容包括：\n\n- `global`\n- `skills`\n- `knowledge`\n- 用户长期配置\n\n所以它更像“把运行现场清干净”，不是“恢复出厂设置”。\n\n## 什么时候该切远端\n\n如果你只是个人使用，本地模式通常已经够用。\n\n当你开始需要这些能力时，再考虑接远端 server：\n\n- 多用户治理\n- 管理员后台\n- 单位/组织控制\n- 统一渠道与服务接入\n\n## 本地模式容易踩的坑\n\n- 把本地模式当作无状态运行\n- 忘了本地目录仍区分容器\n- 以为修改提示词会回写当前老线程\n- 以为重置工作状态会顺手删除长期技能或知识\n\n## 延伸阅读\n\n- [Desktop 入门](/docs/zh-CN/start/desktop/)\n- [用户侧前端](/docs/zh-CN/surfaces/frontend/)\n- [工作区与容器](/docs/zh-CN/concepts/workspaces/)\n","source_path":"使用说明书/zh-CN/ops/desktop-local-mode.md"}</script>
