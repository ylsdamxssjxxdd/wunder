  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/deployment","language":"zh-CN","title":"部署与运行","summary":"部署前先想清楚用哪种形态、准备什么环境。Server 部署至少需要数据库、工作区和后端服务。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"运维","group":"部署与治理","group_path":["部署与治理"],"url":"/docs/zh-CN/ops/deployment/","headings":[{"id":"section-1","level":1,"text":"部署与运行"},{"id":"section-2","level":2,"text":"先选形态"},{"id":"section-3","level":2,"text":"Desktop 部署"},{"id":"section-4","level":2,"text":"Server 部署"},{"id":"section-5","level":3,"text":"最少需要什么"},{"id":"section-6","level":3,"text":"推荐部署方式"},{"id":"section-7","level":3,"text":"网络规划"},{"id":"section-8","level":3,"text":"启动后检查"},{"id":"section-9","level":3,"text":"关键环境变量"},{"id":"section-10","level":3,"text":"Docker 下的浏览器"},{"id":"section-11","level":2,"text":"升级策略"},{"id":"section-12","level":2,"text":"常见部署问题"},{"id":"section-13","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/ops/index","next_slug":"zh-CN/ops/data-and-storage","markdown":"# 部署与运行\n\n## 先选形态\n\n部署前先回答一个问题：**你打算怎么用？**\n\n| 形态 | 适合谁 | 需要什么 |\n|------|--------|----------|\n| **Desktop** | 个人使用 | 下载安装包，开箱即用 |\n| **Server** | 团队/组织 | 服务器 + 数据库 + 配置 |\n| **本地开发** | 开发调试 | 本地编译环境 |\n\n## Desktop 部署\n\n最简单的方式：\n1. 下载安装包\n2. 安装并启动\n3. 开始使用\n\n不需要额外配置。数据存在本地，使用 SQLite。\n\n详细步骤见 [Desktop 入门](/docs/zh-CN/start/desktop/)。\n\n## Server 部署\n\n### 最少需要什么\n\n| 组件 | 说明 | 必须？ |\n|------|------|--------|\n| 后端服务 | wunder-server | 是 |\n| PostgreSQL | 主数据库 | 是 |\n| 工作区存储 | 用户文件空间 | 是 |\n| 前端静态资源 | 用户端/管理端页面 | 推荐 |\n| MCP 服务 | 外部工具能力 | 按需 |\n| 沙盒服务 | 隔离执行环境 | 按需 |\n| 向量数据库 | 知识库检索 | 按需 |\n\n### 推荐部署方式\n\n**Docker Compose**（推荐）：\n- 一键启动所有组件\n- 配置统一管理\n- 升级方便\n\n### 网络规划\n\n部署前先规划好对外的网络入口：\n\n| 入口 | 用途 |\n|------|------|\n| 主服务地址 | 后端接口 |\n| WebSocket 通道 | 实时通信 |\n| 管理端地址 | 管理后台 |\n| 文档站地址 | 使用说明书 |\n\n建议统一在同一域名下，通过路径区分。\n\n### 启动后检查\n\n启动完成后，按这个清单检查：\n\n1. 后端服务是否正常运行\n2. 数据库连接是否正常\n3. WebSocket 是否可建立连接\n4. 管理端是否可打开\n5. 用户端是否可访问\n6. 文档站是否可访问\n\n### 关键环境变量\n\n| 变量 | 作用 |\n|------|------|\n| `WUNDER_HOST` | 服务监听地址 |\n| `WUNDER_PORT` | 服务端口 |\n| `WUNDER_API_KEY` | API 密钥 |\n| `WUNDER_POSTGRES_DSN` | PostgreSQL 连接串 |\n| `WUNDER_CONFIG_PATH` | 配置文件路径 |\n\n### Docker 下的浏览器\n\n如果需要在 Docker 中使用浏览器工具：\n- 确保镜像构建时安装了 Chromium\n- 分配足够的共享内存（`shm_size: 2gb`）\n- 启用浏览器相关环境变量\n\n## 升级策略\n\n- 滚动更新：逐个替换实例，不中断服务\n- 数据库迁移：系统自动处理，不需要手动操作\n- 配置兼容：新版本会自动适配旧配置格式\n\n## 常见部署问题\n\n| 问题 | 原因 | 解决 |\n|------|------|------|\n| 启动失败 | PostgreSQL 未准备好 | 确保数据库先启动 |\n| WebSocket 连不上 | 端口或代理配置问题 | 检查端口和反向代理配置 |\n| 工作区丢失 | 没有持久化存储 | 使用数据卷挂载 |\n| 临时文件堆积 | 没有清理策略 | 配置定期清理任务 |\n| 浏览器工具不可用 | Docker 未安装 Chromium | 检查镜像构建配置 |\n\n## 延伸阅读\n\n- [Server 入门](/docs/zh-CN/start/server/)\n- [数据与存储](/docs/zh-CN/ops/data-and-storage/)\n- [系统设置参考](/docs/zh-CN/reference/config/)\n","source_path":"使用说明书/zh-CN/ops/deployment.md"}</script>
