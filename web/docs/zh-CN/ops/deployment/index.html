  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/deployment","language":"zh-CN","title":"部署与运行","summary":"Wunder 的部署要先分清 desktop、本地开发和 server 三条路径。","read_when":["你要部署 Wunder","你要确认数据库、MCP、sandbox 和工作区怎么放"],"source_docs":["README.md","docs/API文档.md","docs/系统介绍.md","config/wunder-example.yaml"],"tab":"运维","group":"部署与治理","group_path":["部署与治理"],"url":"/docs/zh-CN/ops/deployment/","headings":[{"id":"section-1","level":1,"text":"部署与运行"},{"id":"section-2","level":2,"text":"三条部署路径"},{"id":"section-3","level":3,"text":"Desktop"},{"id":"section-4","level":3,"text":"Server"},{"id":"section-5","level":3,"text":"本地开发"},{"id":"section-6","level":2,"text":"Server 侧推荐组成"},{"id":"section-7","level":2,"text":"数据与存储要点"},{"id":"section-8","level":2,"text":"关键配置文件"},{"id":"section-9","level":2,"text":"常见环境变量"},{"id":"section-10","level":2,"text":"单端口与路径规划"},{"id":"section-11","level":2,"text":"启动后至少检查什么"},{"id":"section-12","level":2,"text":"最容易忽略的部署问题"},{"id":"section-13","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/ops/index","next_slug":"zh-CN/ops/data-and-storage","markdown":"# 部署与运行\n\n部署 Wunder 之前，先不要问“怎么启动”，先问“我要哪种运行形态”。\n\n## 三条部署路径\n\n### Desktop\n\n适合个人直接使用。\n\n特点：\n\n- 本地优先\n- 自带桌面壳\n- 不要求先搭完整 server\n\n### Server\n\n适合团队、组织与统一治理。\n\n特点：\n\n- 多用户\n- 多租户\n- 管理端与用户端协同\n- 可接 sandbox、MCP、A2A、渠道\n\n### 本地开发\n\n适合开发者联调。\n\n特点：\n\n- Rust 后端\n- 前端 dev server\n- 可单独调某一层\n\n## Server 侧推荐组成\n\n典型部署里，至少会涉及这些组件：\n\n- `wunder-server`\n- `wunder-sandbox`\n- `extra-mcp`\n- PostgreSQL\n\n如果需要用户侧生产前端，通常还会有静态资源服务。\n\n## 数据与存储要点\n\n- 网页端 server 使用 PostgreSQL\n- desktop 本地模式使用 SQLite\n- 用户工作区需要持久化\n- `data/` 是临时目录，不要把长期业务资料沉进去\n\n## 关键配置文件\n\n- `config/wunder.yaml`\n- `config/wunder-example.yaml`\n- `data/config/wunder.override.yaml`\n- `extra_mcp/mcp_config.json`\n\n## 常见环境变量\n\n- `WUNDER_HOST`\n- `WUNDER_PORT`\n- `WUNDER_API_KEY`\n- `WUNDER_POSTGRES_DSN`\n- `WUNDER_SANDBOX_ENDPOINT`\n- `WUNDER_MCP_HOST`\n- `WUNDER_CONFIG_PATH`\n- `WUNDER_CONFIG_OVERRIDE_PATH`\n\n## 单端口与路径规划\n\n当前系统已经支持把这些对外入口收口：\n\n- `/wunder`\n- `/a2a`\n- `/.well-known/agent-card.json`\n- `/docs/`\n\n这意味着你可以把业务 API、协议入口和文档站统一挂在同一服务域名下。\n\n## 启动后至少检查什么\n\n建议按这个顺序检查：\n\n1. `/wunder` 是否可返回\n2. `/wunder/chat/ws` 是否可建连\n3. `/a2a/agentCard` 是否可读\n4. `/wunder/mcp` 是否可达\n5. `/docs/` 是否能打开文档站\n\n## 最容易忽略的部署问题\n\n- 只启动了 server，但没准备好 Postgres\n- 开启了 MCP 配置，但目标服务没通\n- 工作区没有持久化，导致产物丢失\n- 把长期业务数据放进了 `data/`\n- 误把 desktop 本地模式当成 server 部署方式\n\n## 相关文档\n\n- [Server 部署](/docs/zh-CN/start/server/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- [配置说明](/docs/zh-CN/reference/config/)\n","source_path":"静态站文档/zh-CN/ops/deployment.md"}</script>
