  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/benchmark-and-observability","language":"zh-CN","title":"监控与评估","summary":"四类观测能力各有分工：会话监控看线程、工具统计看热点、性能采样看链路、Benchmark 看能力质量。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"运维","group":"部署与治理","group_path":["部署与治理"],"url":"/docs/zh-CN/ops/benchmark-and-observability/","headings":[{"id":"section-1","level":1,"text":"监控与评估"},{"id":"section-2","level":2,"text":"四类观测能力"},{"id":"section-3","level":2,"text":"会话监控"},{"id":"section-4","level":3,"text":"看什么"},{"id":"section-5","level":3,"text":"什么时候用"},{"id":"section-6","level":2,"text":"工具统计"},{"id":"section-7","level":3,"text":"看什么"},{"id":"section-8","level":3,"text":"什么时候用"},{"id":"section-9","level":2,"text":"性能与吞吐"},{"id":"section-10","level":3,"text":"性能采样"},{"id":"section-11","level":3,"text":"吞吐压测"},{"id":"section-12","level":3,"text":"两者区别"},{"id":"section-13","level":2,"text":"能力评估（Benchmark）"},{"id":"section-14","level":3,"text":"看什么"},{"id":"section-15","level":3,"text":"与压测的区别"},{"id":"section-16","level":3,"text":"什么时候用"},{"id":"section-17","level":2,"text":"关键指标"},{"id":"section-18","level":3,"text":"健康指标"},{"id":"section-19","level":3,"text":"资源指标"},{"id":"section-20","level":3,"text":"业务指标"},{"id":"section-21","level":2,"text":"服务端日志"},{"id":"section-22","level":2,"text":"实践"},{"id":"section-23","level":3,"text":"日常巡检"},{"id":"section-24","level":3,"text":"周期评估"},{"id":"section-25","level":3,"text":"问题排查"},{"id":"section-26","level":2,"text":"常见误区"},{"id":"section-27","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/ops/auth-and-security","next_slug":"zh-CN/ops/channel-runtime","markdown":"# 监控与评估\n\n## 四类观测能力\n\nWunder 的观测不是单一监控页，而是四类各有分工的能力：\n\n| 能力 | 看什么 | 回答什么问题 |\n|------|--------|-------------|\n| **会话监控** | 线程运行细节 | 线程在干什么？卡在哪？ |\n| **工具统计** | 工具使用情况 | 哪个工具最忙？有没有异常？ |\n| **性能采样** | 系统链路基线 | 系统扛得住吗？慢在哪？ |\n| **吞吐压测** | 并发承受能力 | 最大能扛多少？ |\n| **能力评估** | 任务完成质量 | 答得好不好？有没有退化？ |\n\n## 会话监控\n\n### 看什么\n\n- 活跃线程列表\n- 每个线程的当前状态和阶段\n- Token 占用统计\n- 工具调用记录\n- 事件时间线\n\n### 什么时候用\n\n- 排查线程卡住或异常\n- 查看某个会话的执行详情\n- 强制取消异常线程\n- 触发上下文压缩\n\n## 工具统计\n\n### 看什么\n\n- 各工具的调用次数\n- 工具调用成功率\n- 哪些用户在使用哪些工具\n- 工具调用与线程状态的关系\n\n### 什么时候用\n\n- 某个工具成了性能瓶颈\n- 工具调用异常频繁\n- 评估工具使用模式\n\n## 性能与吞吐\n\n### 性能采样\n\n测量单请求的延迟基线：\n- 模型响应速度\n- 工具执行速度\n- 端到端延迟\n\n### 吞吐压测\n\n测试系统在高并发下的表现：\n- 最大并发会话数\n- 队列处理速度\n- 资源使用率\n\n### 两者区别\n\n- **性能采样**：单请求级别的延迟\n- **吞吐压测**：系统级别的承压能力\n\n## 能力评估（Benchmark）\n\n### 看什么\n\n- 任务完成质量评分\n- 不同模型的能力对比\n- 版本间的能力回归检测\n\n### 与压测的区别\n\n- **吞吐压测**：关注\"快不快、扛不扛得住\"\n- **能力评估**：关注\"答得好不好、有没有退化\"\n\n### 什么时候用\n\n- 新版本发布前评估\n- 对比不同模型的能力\n- 验证优化是否有效\n\n## 关键指标\n\n### 健康指标\n\n| 指标 | 正常范围 | 告警阈值 |\n|------|----------|----------|\n| 活跃会话数 | < 最大限制的 80% | > 80% |\n| 队列深度 | < 50 | > 100 |\n| 错误率 | < 1% | > 5% |\n| 平均延迟 | < 10s | > 30s |\n\n### 资源指标\n\n| 指标 | 关注点 |\n|------|--------|\n| CPU 使用率 | 是否有异常峰值 |\n| 内存使用率 | 是否持续增长（可能有泄漏） |\n| 磁盘使用率 | 工作区和日志是否过大 |\n| 网络流量 | 是否有异常流量 |\n\n### 业务指标\n\n| 指标 | 关注点 |\n|------|--------|\n| 日活用户数 | 系统使用趋势 |\n| 每日 Token 消耗 | 资源使用趋势 |\n| 工具调用分布 | 用户使用模式 |\n| 渠道消息量 | 各渠道使用情况 |\n\n## 服务端日志\n\nServer 模式下，运行日志保存在 `config/data/logs/server/`：\n- 按天轮转的 JSONL 文件\n- 默认保留 14 天\n- 包含请求、工具调用、错误等记录\n- 出问题时优先查看最新日志\n\n## 实践\n\n### 日常巡检\n\n每天看一眼：\n- 系统健康状态\n- 错误率趋势\n- 队列积压情况\n- 磁盘空间\n\n### 周期评估\n\n每周或每月：\n- Token 消耗趋势\n- 工具使用统计\n- 性能基线变化\n- 能力评估结果\n\n### 问题排查\n\n遇到问题时：\n1. 看会话监控找到异常线程\n2. 查看工具调用记录\n3. 检查性能指标\n4. 查看服务端日志\n\n## 常见误区\n\n- **Benchmark = 压测？** 不是。Benchmark 评估能力质量，压测评估承压能力。\n- **日志多 = 可观测性好？** 不是。要有结构、有分层、有指标。\n- **只看一层就够？** 不够。很多问题需要把监控、日志、统计一起看。\n\n## 延伸阅读\n\n- [可观测性](/docs/zh-CN/concepts/core-observability/) —— 观测的设计原则\n- [会话状态说明](/docs/zh-CN/reference/stream-events/) —— 状态指标含义\n- [管理端面板指南](/docs/zh-CN/reference/admin-panels/) —— 监控入口\n","source_path":"使用说明书/zh-CN/ops/benchmark-and-observability.md"}</script>
