  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/auth-and-security","language":"zh-CN","title":"账户与安全","summary":"分清不同账户类型和权限层级，配置好安全边界，让系统在可控范围内运行。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"运维","group":"部署与治理","group_path":["部署与治理"],"url":"/docs/zh-CN/ops/auth-and-security/","headings":[{"id":"section-1","level":1,"text":"账户与安全"},{"id":"section-2","level":2,"text":"账户体系"},{"id":"section-3","level":3,"text":"管理员账户"},{"id":"section-4","level":3,"text":"普通用户账户"},{"id":"section-5","level":3,"text":"外部身份"},{"id":"section-6","level":2,"text":"安全分层"},{"id":"section-7","level":2,"text":"工具执行安全"},{"id":"section-8","level":3,"text":"路径控制"},{"id":"section-9","level":3,"text":"命令控制"},{"id":"section-10","level":3,"text":"审批机制"},{"id":"section-11","level":2,"text":"数据隔离"},{"id":"section-12","level":3,"text":"用户级隔离"},{"id":"section-13","level":3,"text":"容器级隔离"},{"id":"section-14","level":3,"text":"数据库隔离"},{"id":"section-15","level":2,"text":"安全配置建议"},{"id":"section-16","level":3,"text":"API 密钥"},{"id":"section-17","level":3,"text":"传输安全"},{"id":"section-18","level":3,"text":"CORS 策略"},{"id":"section-19","level":3,"text":"日志审计"},{"id":"section-20","level":2,"text":"常见安全问题与处理"},{"id":"section-21","level":3,"text":"密钥泄露"},{"id":"section-22","level":3,"text":"越权访问"},{"id":"section-23","level":3,"text":"暴力破解"},{"id":"section-24","level":2,"text":"安全检查清单"},{"id":"section-25","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/ops/desktop-local-mode","next_slug":"zh-CN/ops/benchmark-and-observability","markdown":"# 账户与安全\n\n## 账户体系\n\nWunder 有多种身份类型，各有各的用途：\n\n### 管理员账户\n\n- 拥有系统治理权限\n- 可以管理用户、配置系统\n- 不受 Token 余额限制\n- 负责安全策略的配置\n\n### 普通用户账户\n\n- 日常使用系统的用户\n- 受 Token 余额限制\n- 只能访问自己的数据\n- 可以创建和管理自己的智能体\n\n### 外部身份\n\n从飞书、企业微信等外部平台映射过来的用户身份。不一定是注册用户，但仍然有独立的隔离空间。\n\n## 安全分层\n\n安全不是单一措施，而是分层防护：\n\n```\n┌─────────────────────────────────────┐\n│   操作安全：工具审批、权限控制       │\n├─────────────────────────────────────┤\n│   接口安全：鉴权、限流、CORS        │\n├─────────────────────────────────────┤\n│   传输安全：HTTPS、加密通信          │\n├─────────────────────────────────────┤\n│   网络安全：网络隔离、容器安全       │\n└─────────────────────────────────────┘\n```\n\n## 工具执行安全\n\n### 路径控制\n\n管理员可以配置：\n- **允许的路径**：智能体可以操作的目录范围\n- **禁止的模式**：禁止访问的文件类型或路径\n\n**安全建议**：\n- 不要无限制开放整个文件系统\n- 明确指定允许访问的目录\n- 禁止访问系统敏感目录\n\n### 命令控制\n\n- 控制智能体可以执行哪些命令\n- 高风险命令需要审批\n- 管理员可以设置白名单或黑名单\n\n### 审批机制\n\n敏感操作需要用户确认：\n- 修改重要文件\n- 执行敏感命令\n- 访问受限路径\n\n审批模式的严格程度可以配置。\n\n## 数据隔离\n\n### 用户级隔离\n\n- 工作区：每个用户只能访问自己的文件\n- 会话：每个用户只能看到自己的对话\n- 配置：个人设置不影响他人\n\n### 容器级隔离\n\n同一用户内，个人文件和智能体文件也是分开的。\n\n### 数据库隔离\n\n所有数据访问都经过权限检查，不会出现跨用户数据泄露。\n\n## 安全配置建议\n\n### API 密钥\n\n- 使用足够复杂的密钥（超过 16 位，混合字符）\n- 定期更换密钥\n- 不要在代码或配置中硬编码\n- 不要把密钥提交到版本控制\n\n### 传输安全\n\n- 生产环境必须使用 HTTPS\n- 配置 TLS 证书并自动续期\n- WebSocket 使用 wss 协议\n\n### CORS 策略\n\n- 只允许必要的域名\n- 不要使用通配符 `*`\n- 按环境区分（开发/生产）\n\n### 日志审计\n\n- 记录关键操作（登录、配置变更、文件操作）\n- 日志保留足够时间\n- 敏感信息脱敏\n\n## 常见安全问题与处理\n\n### 密钥泄露\n\n1. 立即更换密钥\n2. 检查是否有异常访问\n3. 审查日志确认影响范围\n\n### 越权访问\n\n1. 检查权限配置\n2. 确认数据隔离正常\n3. 必要时重置用户状态\n\n### 暴力破解\n\n1. 配置登录限流\n2. 设置账户锁定策略\n3. 监控异常登录尝试\n\n## 安全检查清单\n\n- [ ] API 密钥复杂度足够\n- [ ] HTTPS 已配置\n- [ ] CORS 策略已收紧\n- [ ] 工具审批模式已配置\n- [ ] 路径和命令限制已设置\n- [ ] 数据库访问受控\n- [ ] 日志审计已启用\n- [ ] 管理员密码定期更换\n\n## 延伸阅读\n\n- [系统设置参考](/docs/zh-CN/reference/config/)\n- [多用户管理](/docs/zh-CN/concepts/core-multi-user-management/)\n- [管理端面板指南](/docs/zh-CN/reference/admin-panels/)\n","source_path":"使用说明书/zh-CN/ops/auth-and-security.md"}</script>
