  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/auth-and-security","language":"zh-CN","title":"认证与安全","summary":"Wunder 需要同时区分 API Key、用户 Token、外链鉴权和工具执行边界。","updated_at":"2026-03-19","read_when":["你要把 Wunder 放到可长期运行环境","你要判断哪些入口该用哪种凭证"],"source_docs":["docs/API文档.md","docs/系统介绍.md","src/core/auth.rs","config/wunder-example.yaml"],"tab":"运维","group":"部署与治理","group_path":["部署与治理"],"url":"/docs/zh-CN/ops/auth-and-security/","headings":[{"id":"section-1","level":1,"text":"认证与安全"},{"id":"section-2","level":2,"text":"先分清四类凭证"},{"id":"section-3","level":3,"text":"API Key"},{"id":"section-4","level":3,"text":"用户 Bearer Token"},{"id":"section-5","level":3,"text":"外链嵌入鉴权"},{"id":"section-6","level":3,"text":"登录后用户身份"},{"id":"section-7","level":2,"text":"一个容易混淆但很重要的约定"},{"id":"section-8","level":2,"text":"路径保护边界"},{"id":"section-9","level":2,"text":"工具执行安全"},{"id":"section-10","level":2,"text":"线程安全约定"},{"id":"section-11","level":2,"text":"WebSocket 与审批隔离"},{"id":"section-12","level":2,"text":"你应该优先检查哪些安全配置"},{"id":"section-13","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/ops/desktop-local-mode","next_slug":"zh-CN/ops/benchmark-and-observability","markdown":"# 认证与安全\n\nWunder 不是只有一种身份和一种入口，所以认证不能只看“有没有 Token”。\n\n## 先分清四类凭证\n\n### API Key\n\n主要给这些入口用：\n\n- `/wunder`\n- `/a2a`\n- `/wunder/mcp`\n- 管理端接口\n\n传法通常是：\n\n- `X-API-Key`\n- `Authorization: Bearer <api_key>`\n\n### 用户 Bearer Token\n\n主要给用户侧接口用：\n\n- `/wunder/chat/*`\n- `/wunder/user_world/*`\n- `/wunder/workspace/*`\n- `/wunder/user_tools/*`\n\n### 外链嵌入鉴权\n\n主要给外部系统嵌入 Wunder 时用：\n\n- `/wunder/auth/external/*`\n\n对应配置项：\n\n- `security.external_auth_key`\n\n### 登录后用户身份\n\n这层是注册用户、单位、组织治理对应的真实业务身份。\n\n它和 `/wunder` 调用里传入的任意 `user_id` 不是一个概念。\n\n## 一个容易混淆但很重要的约定\n\n`/wunder` 传入的 `user_id` 不要求一定是已注册用户。\n\n它可以只是：\n\n- 线程隔离标识\n- 工作区隔离标识\n- 外部系统映射标识\n\n真实注册用户管理，走的是用户体系接口。\n\n## 路径保护边界\n\n当前实现里，大致可以这样理解：\n\n- `/a2a` 按受保护入口处理\n- `/wunder/mcp` 按受保护入口处理\n- 用户聊天和工作区路径属于用户态接口\n- `/docs/` 作为静态文档站独立于这些业务鉴权路径\n\n把文档放到 `/docs/`，就是为了避免把它卷进 `/wunder/*` 的鉴权逻辑里。\n\n## 工具执行安全\n\nWunder 的安全边界不只在 HTTP 层，还在工具层。\n\n关键约束包括：\n\n- `allow_commands`\n- `allow_paths`\n- `deny_globs`\n- sandbox 下沉执行\n\n也就是说，即使模型能调用工具，真正能做什么仍受配置约束。\n\n## 线程安全约定\n\n这两个约定非常重要：\n\n- 线程的 system prompt 一旦首次确定后必须冻结\n- 长期记忆只允许在线程初始化时注入一次\n\n这样做不是形式要求，而是为了保证：\n\n- 提示词缓存稳定\n- 线程行为可预测\n- 长任务不会因系统提示词被反复改写而漂移\n\n## WebSocket 与审批隔离\n\n当前系统已经把待审批请求统一放到共享注册表里，但不同入口仍按 `source` 隔离消费。\n\n这意味着：\n\n- chat/ws 的审批不会误清理渠道审批\n- 渠道侧审批也不会误操作 WebSocket 会话\n\n## 你应该优先检查哪些安全配置\n\n- `security.api_key`\n- `security.external_auth_key`\n- `allow_commands`\n- `allow_paths`\n- `deny_globs`\n- sandbox 是否启用\n\n## 相关文档\n\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n- [配置说明](/docs/zh-CN/reference/config/)\n","source_path":"静态站文档/zh-CN/ops/auth-and-security.md"}</script>
