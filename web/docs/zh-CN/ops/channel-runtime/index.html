  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/channel-runtime","language":"zh-CN","title":"渠道运行态","summary":"渠道问题很多时候不在模型，而在账号、长连接、Webhook、outbox 和下载链接改写这条接入链路里。","updated_at":"2026-03-19","read_when":["你在排查飞书、微信、QQBot、WhatsApp、XMPP 等渠道异常","你想知道管理员侧和用户侧分别有哪些渠道运行态接口"],"source_docs":["docs/API文档.md","docs/设计方案.md","docs/系统介绍.md"],"tab":"运维","group":"部署与治理","group_path":["部署与治理"],"url":"/docs/zh-CN/ops/channel-runtime/","headings":[{"id":"section-1","level":1,"text":"渠道运行态"},{"id":"section-2","level":2,"text":"这页解决什么"},{"id":"section-3","level":2,"text":"管理员侧最重要的入口"},{"id":"section-4","level":2,"text":"用户侧运行日志入口"},{"id":"section-5","level":2,"text":"什么时候不要先怪模型"},{"id":"section-6","level":2,"text":"文件为什么在渠道里常变成下载链接"},{"id":"section-7","level":2,"text":"你最需要记住的点"},{"id":"section-8","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/ops/benchmark-and-observability","next_slug":"zh-CN/reference/index","markdown":"# 渠道运行态\n\n很多渠道问题表面上像“模型没答出来”，其实更早就坏在接入层。\n\n## 这页解决什么\n\n这页只讲渠道运维要先看哪些面：\n\n- 账号是否真的在线\n- 长连接是否活着\n- 入站有没有进来\n- 出站有没有卡在 outbox\n\n## 管理员侧最重要的入口\n\n- `GET /wunder/admin/channels/accounts`\n- `POST /wunder/admin/channels/accounts/batch`\n- `DELETE /wunder/admin/channels/accounts/{channel}/{account_id}`\n- `GET /wunder/admin/channels/accounts/{channel}/{account_id}/impact`\n- `GET /wunder/admin/channels/bindings`\n- `GET /wunder/admin/channels/user_bindings`\n- `GET /wunder/admin/channels/sessions`\n\n这组接口适合回答：\n\n- 哪些账号异常\n- 哪些绑定会受到影响\n- 某渠道会话到底绑到了哪个 `user_id` / `agent_id`\n\n## 用户侧运行日志入口\n\n- `GET /wunder/channels/runtime_logs`\n- `POST /wunder/channels/runtime_logs/probe`\n\n这组接口适合回答：\n\n- 当前用户可见账号最近有没有长连接失败、重连、运行告警\n- 日志面板是不是被权限或过滤条件挡住了\n\n## 什么时候不要先怪模型\n\n如果出现这些症状，先排查渠道层：\n\n- Webhook 配置看着存在，但没有任何入站\n- 出站一直 retry 或 failed\n- 长连接渠道时好时坏\n- 外部客户端点不开文件\n\n## 文件为什么在渠道里常变成下载链接\n\n因为渠道客户端通常无法直接理解 Wunder 内部的 `/workspaces/...` 路径。\n\n所以出站前会把这些路径改写到：\n\n- `/wunder/temp_dir/download`\n\n如果这条链路坏了，渠道看起来就像“消息发出去了，但附件打不开”。\n\n## 你最需要记住的点\n\n- 渠道问题经常发生在账号、长连接、outbox 和下载改写，不一定是模型问题。\n- 管理员侧看账号、绑定和渠道会话；用户侧看 runtime logs。\n- 外部附件打不开时，优先检查 `temp_dir` 下载链路和改写逻辑。\n\n## 相关文档\n\n- [渠道 Webhook](/docs/zh-CN/integration/channel-webhook/)\n- [临时目录与文档转换](/docs/zh-CN/integration/temp-dir/)\n- [管理端界面](/docs/zh-CN/surfaces/web-admin/)\n","source_path":"静态站文档/zh-CN/ops/channel-runtime.md"}</script>
