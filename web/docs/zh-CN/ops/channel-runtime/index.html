  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/channel-runtime","language":"zh-CN","title":"渠道管理","summary":"外部渠道（飞书、微信等）的接入与日常运维。渠道问题很多时候不在模型，而在接入层。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"运维","group":"部署与治理","group_path":["部署与治理"],"url":"/docs/zh-CN/ops/channel-runtime/","headings":[{"id":"section-1","level":1,"text":"渠道管理"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"渠道架构"},{"id":"section-4","level":3,"text":"关键组件"},{"id":"section-5","level":2,"text":"作用"},{"id":"section-6","level":2,"text":"实践"},{"id":"section-7","level":3,"text":"接入新渠道"},{"id":"section-8","level":3,"text":"监控渠道运行"},{"id":"section-9","level":3,"text":"排查渠道问题"},{"id":"section-10","level":3,"text":"常见渠道问题"},{"id":"section-11","level":2,"text":"渠道日常维护"},{"id":"section-12","level":3,"text":"定期检查"},{"id":"section-13","level":3,"text":"账号管理"},{"id":"section-14","level":3,"text":"日志管理"},{"id":"section-15","level":2,"text":"常见误区"},{"id":"section-16","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/ops/benchmark-and-observability","next_slug":"zh-CN/reference/index","markdown":"# 渠道管理\n\n## 原理\n\n渠道是 Wunder 与外部平台的桥梁。通过渠道，用户可以在飞书、企业微信等熟悉的平台直接与智能体对话。\n\n### 渠道架构\n\n```\n外部平台（飞书/微信/QQ/WhatsApp/XMPP）\n        ↓ Webhook / 长连接\n    统一接入层（ChannelHub）\n        ↓\n    入站队列（快速接收）\n        ↓\n    调度执行（处理消息）\n        ↓\n    出站队列（投递回复）\n        ↓\n    渠道适配器（发送到平台）\n```\n\n### 关键组件\n\n| 组件 | 作用 |\n|------|------|\n| **渠道账号** | 绑定到外部平台的身份 |\n| **绑定关系** | 渠道用户与系统用户的映射 |\n| **入站链路** | 外部消息进入系统 |\n| **出站链路** | 系统回复发送到外部 |\n| **运行日志** | 渠道运行状态记录 |\n\n## 作用\n\n- 让用户在熟悉的平台使用智能体\n- 统一管理所有渠道的接入和运行\n- 集中监控渠道健康状态\n- 快速定位和解决渠道问题\n\n## 实践\n\n### 接入新渠道\n\n**通用步骤**：\n\n1. **在外部平台创建应用**\n   - 如飞书自建应用、企业微信应用\n   - 获取 AppID、AppSecret 等凭证\n\n2. **在管理端添加渠道账号**\n   - 管理端 → 渠道管理 → 添加账号\n   - 填写渠道类型和凭证信息\n\n3. **配置 Webhook**\n   - 设置消息接收地址\n   - 在外部平台配置 Webhook URL\n   - 确保地址可从外部访问\n\n4. **测试连接**\n   - 在外部平台发送测试消息\n   - 检查是否正常收到回复\n   - 查看运行日志确认\n\n5. **绑定用户**\n   - 将渠道用户绑定到系统用户\n   - 确认消息路由正确\n\n### 监控渠道运行\n\n**管理端查看**：\n- 渠道账号状态（在线/离线）\n- 消息收发统计\n- 异常告警记录\n\n**用户端查看**：\n- 运行日志面板\n- 连接状态\n- 最近活动记录\n\n### 排查渠道问题\n\n当渠道出现问题时，按这个顺序排查：\n\n**1. 账号是否在线**\n- 管理端查看账号状态\n- 如果离线，检查凭证和网络\n\n**2. Webhook 是否正常**\n- 检查 Webhook 地址是否可访问\n- 查看平台侧的消息推送日志\n- 确认回调地址没有变更\n\n**3. 入站是否正常**\n- 外部消息是否进入了系统\n- 检查入站日志\n\n**4. 出站是否卡住**\n- 回复是否在队列中积压\n- 检查出站队列状态\n- 查看是否有发送失败的记录\n\n**5. 文件附件是否正常**\n- 渠道客户端是否能打开附件链接\n- 检查临时目录下载服务是否正常\n\n### 常见渠道问题\n\n| 问题 | 可能原因 | 排查方向 |\n|------|----------|----------|\n| 收不到消息 | Webhook 未通 | 检查地址和配置 |\n| 消息发不出去 | 出站队列积压 | 查看出站队列 |\n| 附件打不开 | 下载链接失效 | 检查临时目录 |\n| 连接时断时续 | 网络或凭证问题 | 检查账号和网络 |\n| 回复重复 | 消息重复投递 | 检查幂等处理 |\n\n## 渠道日常维护\n\n### 定期检查\n\n- 账号在线状态\n- 消息收发是否正常\n- 是否有积压或失败\n\n### 账号管理\n\n- 批量管理渠道账号\n- 查看绑定影响范围\n- 清理无效绑定\n\n### 日志管理\n\n- 查看运行日志了解异常\n- 定期归档历史日志\n- 关注告警和重连记录\n\n## 常见误区\n\n- **渠道问题 = 模型问题？** 不是。大部分渠道问题出在接入层，先查接入再查模型。\n- **消息发出去了就完事了？** 不是。要确认对方收到了，还要确认出站队列正常。\n- **渠道配置好就不用管了？** 不是。需要持续监控和维护。\n\n## 延伸阅读\n\n- [渠道（核心概念）](/docs/zh-CN/concepts/core-channels/)\n- [稳定性](/docs/zh-CN/concepts/core-stability/) —— 错误恢复机制\n- [管理端面板指南](/docs/zh-CN/reference/admin-panels/) —— 管理入口\n","source_path":"使用说明书/zh-CN/ops/channel-runtime.md"}</script>
