  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/data-and-storage","language":"zh-CN","title":"数据与存储","summary":"Wunder 的持久化需要同时分清数据库、工作区、向量存储和临时目录。","read_when":["你要部署或迁移数据","你要理解 PostgreSQL、SQLite、Weaviate、workspaces、temp_dir 分别放什么"],"source_docs":["config/wunder-example.yaml","docs/API文档.md","docs/设计方案.md","docs/系统介绍.md"],"tab":"运维","group":"部署与治理","group_path":["部署与治理"],"url":"/docs/zh-CN/ops/data-and-storage/","headings":[{"id":"section-1","level":1,"text":"数据与存储"},{"id":"section-2","level":2,"text":"先分四类数据"},{"id":"section-3","level":3,"text":"关系型主数据"},{"id":"section-4","level":3,"text":"工作区文件"},{"id":"section-5","level":3,"text":"向量知识库"},{"id":"section-6","level":3,"text":"临时目录"},{"id":"section-7","level":2,"text":"storage.backend 决定什么"},{"id":"section-8","level":2,"text":"server 和 desktop 的典型选择"},{"id":"section-9","level":2,"text":"Weaviate 放什么"},{"id":"section-10","level":2,"text":"工作区放什么"},{"id":"section-11","level":2,"text":"tempdir 是什么"},{"id":"section-12","level":2,"text":"为什么工作区和 tempdir 一定要分开"},{"id":"section-13","level":2,"text":"典型持久化检查清单"},{"id":"section-14","level":2,"text":"最常见误区"},{"id":"section-15","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/ops/deployment","next_slug":"zh-CN/ops/desktop-local-mode","markdown":"# 数据与存储\n\n部署 Wunder 时，最容易乱的是“到底什么该持久化，什么只是临时目录”。\n\n这页只解决这件事。\n\n## 先分四类数据\n\n### 关系型主数据\n\n这是业务核心数据。\n\n例如：\n\n- 会话\n- 用户\n- 渠道\n- 记忆\n- 用户世界消息\n- 管理配置\n\n### 工作区文件\n\n这是用户和智能体运行过程里产生的持久文件空间。\n\n它和数据库不是一类东西。\n\n### 向量知识库\n\n这是检索相关数据，不应该和普通会话表混为一谈。\n\n### 临时目录\n\n这是中转区，不是长期存储区。\n\n## `storage.backend` 决定什么\n\n配置里当前支持：\n\n- `auto`\n- `sqlite`\n- `postgres`\n\n它决定的是主业务存储后端。\n\n## server 和 desktop 的典型选择\n\n当前实践上应这样理解：\n\n- 网页端 / server：优先 PostgreSQL\n- desktop 本地模式：优先 SQLite\n\n这不是风格问题，而是运行形态决定的：\n\n- server 面向多用户、多租户和持续并发\n- desktop 更偏单机、本地和轻量持久化\n\n## Weaviate 放什么\n\n向量知识库相关能力当前使用：\n\n- `vector_store.weaviate`\n\n它主要承接向量检索侧数据。\n\n所以不要把它理解成“主业务数据库的替代品”。\n\n## 工作区放什么\n\n工作区根通常由：\n\n- `workspace.root`\n\n控制。\n\n它承载的是：\n\n- 用户私有文件\n- 智能体容器文件\n- 任务产物\n- 可被后续工具继续处理的落盘结果\n\n如果数据库任务导出到 `/workspaces/{user_id}/...`，它最终也会进入这里。\n\n## `temp_dir` 是什么\n\n`/wunder/temp_dir/*` 对应的是临时目录。\n\n它适合：\n\n- 上传中转\n- 下载转发\n- 外部客户端取临时文件\n\n不适合：\n\n- 存长期业务资料\n- 当正式工作区使用\n\n## 为什么工作区和 temp_dir 一定要分开\n\n因为两者生命周期不一样：\n\n- 工作区强调可持续引用\n- temp_dir 强调临时分发和中转\n\n如果混在一起，排障和清理都会很痛苦。\n\n## 典型持久化检查清单\n\n部署后至少确认：\n\n1. 主数据库是你预期的后端\n2. 工作区目录有持久卷\n3. 向量库有持久卷\n4. `temp_dir` 不被当成长存储\n\n## 最常见误区\n\n- 以为 SQLite 和 PostgreSQL 只是“性能差异”\n- 把工作区产物只写进 temp_dir\n- 忘记给 `/workspaces` 做持久化\n- 以为 Weaviate 里会自动保存全部业务数据\n\n## 相关文档\n\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [工作区与容器](/docs/zh-CN/concepts/workspaces/)\n- [配置说明](/docs/zh-CN/reference/config/)\n","source_path":"静态站文档/zh-CN/ops/data-and-storage.md"}</script>
