  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/data-and-storage","language":"zh-CN","title":"数据与存储","summary":"分清数据库、工作区、向量库和临时目录各自的职责，该持久化的不丢，该清理的不留。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"运维","group":"部署与治理","group_path":["部署与治理"],"url":"/docs/zh-CN/ops/data-and-storage/","headings":[{"id":"section-1","level":1,"text":"数据与存储"},{"id":"section-2","level":2,"text":"四类数据"},{"id":"section-3","level":2,"text":"数据库选择"},{"id":"section-4","level":3,"text":"SQLite vs PostgreSQL"},{"id":"section-5","level":3,"text":"数据库存什么"},{"id":"section-6","level":3,"text":"备份策略"},{"id":"section-7","level":2,"text":"工作区存储"},{"id":"section-8","level":3,"text":"工作区存什么"},{"id":"section-9","level":3,"text":"存储要点"},{"id":"section-10","level":3,"text":"空间管理"},{"id":"section-11","level":2,"text":"向量知识库"},{"id":"section-12","level":3,"text":"作用"},{"id":"section-13","level":3,"text":"注意"},{"id":"section-14","level":2,"text":"临时目录"},{"id":"section-15","level":3,"text":"用途"},{"id":"section-16","level":3,"text":"注意"},{"id":"section-17","level":2,"text":"数据迁移"},{"id":"section-18","level":3,"text":"从 SQLite 迁移到 PostgreSQL"},{"id":"section-19","level":3,"text":"工作区迁移"},{"id":"section-20","level":2,"text":"常见误区"},{"id":"section-21","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/ops/deployment","next_slug":"zh-CN/ops/desktop-local-mode","markdown":"# 数据与存储\n\n## 四类数据\n\nWunder 的数据分为四类，各有各的存储方式和生命周期：\n\n| 类型 | 内容 | 存储 | 生命周期 |\n|------|------|------|----------|\n| **业务数据** | 用户、会话、配置 | 数据库 | 持久 |\n| **文件数据** | 用户文件、智能体产物 | 工作区 | 持久 |\n| **向量数据** | 知识库检索 | 向量库 | 持久 |\n| **临时数据** | 上传下载中转 | 临时目录 | 短期 |\n\n**核心原则**：分清什么该持久化，什么只是临时中转。\n\n## 数据库选择\n\n### SQLite vs PostgreSQL\n\n| | SQLite | PostgreSQL |\n|--|--------|------------|\n| **适合** | Desktop 本地模式 | Server 多用户模式 |\n| **特点** | 轻量、无额外安装 | 专业级、支持高并发 |\n| **部署** | 自动创建 | 需要单独部署 |\n\n**选择建议**：\n- 个人使用（Desktop）→ SQLite\n- 团队使用（Server）→ PostgreSQL\n\n这不是性能差异的问题，而是运行形态决定的。\n\n### 数据库存什么\n\n数据库存储所有业务核心数据：\n- 用户账户和组织信息\n- 会话记录和消息历史\n- 智能体配置\n- 渠道绑定和运行日志\n- 系统配置\n\n### 备份策略\n\n- **PostgreSQL**：定期全量备份 + 日志增量\n- **SQLite**：定期复制数据库文件\n- **重要**：备份要验证可恢复性\n\n## 工作区存储\n\n### 工作区存什么\n\n- 用户上传的文件\n- 智能体生成的文件\n- 技能和知识文件\n- 智能体配置文件\n\n### 存储要点\n\n- **Server 模式**：工作区必须持久化（使用 NAS 或网络存储）\n- **Desktop 模式**：工作区在本地目录，自动持久化\n- **不要**把工作区放在临时目录\n\n### 空间管理\n\n- 定期检查工作区空间使用\n- 不需要的文件及时清理\n- 大文件考虑归档策略\n\n## 向量知识库\n\n### 作用\n\n向量库用于知识库的语义检索功能，让智能体能快速找到相关知识内容。\n\n### 注意\n\n- 向量库**不是**主数据库的替代品\n- 它只承担检索功能\n- 备份时应与主数据库一起备份\n\n## 临时目录\n\n### 用途\n\n临时目录是文件传输的中转区：\n- 文件上传时的临时存放\n- 文件下载时的转发\n- 文档转换过程中的中间文件\n\n### 注意\n\n- **不要**在临时目录存放长期文件\n- 临时文件会被定期清理\n- 生产环境应配置自动清理策略\n\n## 数据迁移\n\n### 从 SQLite 迁移到 PostgreSQL\n\n当团队规模增长需要从本地模式迁移到服务器模式时：\n1. 导出 SQLite 数据\n2. 配置 PostgreSQL 连接\n3. 导入数据到 PostgreSQL\n4. 迁移工作区文件\n5. 验证数据完整性\n\n### 工作区迁移\n\n迁移工作区文件时：\n1. 复制整个工作区目录\n2. 保持目录结构不变\n3. 更新配置中的路径指向\n4. 验证文件可访问\n\n## 常见误区\n\n| 误区 | 正确理解 |\n|------|----------|\n| SQLite 和 PostgreSQL 只是性能不同 | 它们适合不同的运行形态 |\n| 临时目录也能存长期文件 | 临时目录会被清理 |\n| 向量库存所有数据 | 向量库只存检索数据 |\n| 工作区放在 config 目录 | config 是运行时目录，不是数据目录 |\n\n## 延伸阅读\n\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [工作区与容器](/docs/zh-CN/concepts/workspaces/)\n- [系统设置参考](/docs/zh-CN/reference/config/)\n","source_path":"使用说明书/zh-CN/ops/data-and-storage.md"}</script>
