  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/index","language":"zh-CN","title":"运维概览","summary":"Wunder 运维包含部署、存储、安全、渠道运行态与可观测；目标是让系统可持续稳定运行，而不只是「启动成功」。","updated_at":"2026-03-21","read_when":["你在部署或接手 Wunder 运行环境","你要快速定位运维与治理入口"],"source_docs":["docs/系统介绍.md","docs/设计方案.md","docs/API文档.md"],"tab":"运维","group":"概览","group_path":["概览"],"url":"/docs/zh-CN/ops/","headings":[{"id":"section-1","level":1,"text":"运维概览"},{"id":"section-2","level":2,"text":"运维入口总览"},{"id":"section-3","level":2,"text":"五条运维主线"},{"id":"section-4","level":3,"text":"1. 部署与运行"},{"id":"section-5","level":3,"text":"2. 数据与存储"},{"id":"section-6","level":3,"text":"3. 认证与安全"},{"id":"section-7","level":3,"text":"4. 渠道运行态"},{"id":"section-8","level":3,"text":"5. 监控与 Benchmark"},{"id":"section-9","level":2,"text":"排障优先级建议"},{"id":"section-10","level":2,"text":"生产环境检查清单"},{"id":"section-11","level":2,"text":"常见误区澄清"},{"id":"section-12","level":2,"text":"下一步"}],"prev_slug":"zh-CN/surfaces/desktop-ui","next_slug":"zh-CN/ops/deployment","markdown":"# 运维概览\n\n把 Wunder 运维理解成**五条主线**会更清晰：部署、存储、安全、渠道、观测。\n\n目标是：让系统**可持续稳定运行 10 年以上**，而不只是「启动成功」。\n\n---\n\n## 运维入口总览\n\n<div class=\"docs-card-grid docs-card-grid-compact\">\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/deployment/\">\n    <strong>部署与运行<\/strong>\n    <span>启动路径、依赖与健康检查。<\/span>\n  <\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/data-and-storage/\">\n    <strong>数据与存储<\/strong>\n    <span>Postgres/SQLite/Weaviate/workspaces/temp_dir。<\/span>\n  <\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/auth-and-security/\">\n    <strong>认证与安全<\/strong>\n    <span>令牌体系、边界与审批策略。<\/span>\n  <\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/channel-runtime/\">\n    <strong>渠道运行态<\/strong>\n    <span>Webhook、长连接、outbox 与恢复。<\/span>\n  <\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/benchmark-and-observability/\">\n    <strong>监控与 Benchmark<\/strong>\n    <span>吞吐、延迟、错误和容量评估。<\/span>\n  <\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/desktop-local-mode/\">\n    <strong>Desktop 本地模式<\/strong>\n    <span>本地运行边界与治理要点。<\/span>\n  <\/a>\n<\/div>\n\n---\n\n## 五条运维主线\n\n### 1. 部署与运行\n\n**目标**：一键启动、健康检查、优雅升级\n\n**关键点**：\n- Docker Compose 是推荐部署方式\n- 分离构建、依赖、运行态\n- 健康检查：前端等待后端、Nginx 等待前端\n- 升级策略：滚动更新、数据迁移自动处理\n\n**检查清单**：\n- [ ] Docker 和 Docker Compose 版本足够新\n- [ ] 端口不冲突（18000、18001）\n- [ ] 数据卷挂载正确\n- [ ] 健康检查通过\n\n---\n\n### 2. 数据与存储\n\n**目标**：不丢数据、快速恢复、性能足够\n\n**存储分层**：\n\n| 层级 | 技术 | 用途 | 备份策略 |\n|------|------|------|----------|\n| **关系数据** | PostgreSQL | 用户、会话、配置 | 定期全量 + binlog |\n| **向量数据** | Weaviate | 知识库检索 | 随 PostgreSQL 备份 |\n| **文件存储** | 本地磁盘/NAS | 用户工作区 | 文件系统备份 |\n| **临时数据** | 本地磁盘 | 上传、下载、转换 | 定期清理 |\n\n**关键提醒**：\n- ❌ 不要把长期业务数据放进 `data/` 目录\n- ❌ 不要把 `temp_dir` 当业务仓库\n- ✅ 用户工作区要持久化\n- ✅ PostgreSQL 必须有备份策略\n\n---\n\n### 3. 认证与安全\n\n**目标**：防止越权、审计可追溯、数据安全\n\n**安全分层**：\n\n```\n┌─────────────────────────────────────┐\n│   应用层：工具审批、权限控制       │\n│   - approval_mode                  │\n│   - 工具白名单/黑名单              │\n└─────────────────────────────────────┘\n              ↑\n┌─────────────────────────────────────┐\n│   接口层：鉴权、CORS、限流         │\n│   - API Key / Bearer Token         │\n│   - CORS 策略                       │\n│   - 速率限制                        │\n└─────────────────────────────────────┘\n              ↑\n┌─────────────────────────────────────┐\n│   网络层：HTTPS、反向代理           │\n│   - Nginx TLS 终止                 │\n│   - Origin 校验                     │\n└─────────────────────────────────────┘\n              ↑\n┌─────────────────────────────────────┐\n│   基础设施：网络隔离、容器安全      │\n│   - 网络策略                        │\n│   - 容器只读根文件系统              │\n└─────────────────────────────────────┘\n```\n\n**关键配置**：\n- `security.api_key`：管理员 API Key（要复杂！）\n- `security.cors.allowed_origins`：收紧 CORS 策略\n- `tools.builtin.enabled`：控制内置工具可见性\n- `approval_mode`：工具审批级别\n\n---\n\n### 4. 渠道运行态\n\n**目标**：消息不丢、自动重连、可观测\n\n**渠道架构**：\n\n```\n外部渠道（飞书/微信/QQ/XMPP）\n        ↓ Webhook / 长连接\n   ChannelHub（统一入口）\n        ↓\n   入站队列（快速回执）\n        ↓\n   调度执行（异步处理）\n        ↓\n   channel_outbox（出站队列）\n        ↓\n   渠道适配器（投递 + 重试）\n```\n\n**监控要点**：\n- 入站成功/失败/重试计数\n- 出站成功/失败/重试计数\n- 长连接状态（在线/离线）\n- outbox 积压深度\n\n**恢复机制**：\n- Webhook：幂等处理 + 重试\n- 长连接：自动重连 + 心跳\n- outbox：持久化 + 后台 worker\n\n---\n\n### 5. 监控与 Benchmark\n\n**目标**：提前发现问题、容量规划、性能调优\n\n**关键指标**：\n\n| 指标 | 说明 | 告警阈值 |\n|------|------|----------|\n| **活跃会话数** | 当前正在执行的会话 | > max_active_sessions * 0.8 |\n| **队列深度** | agent_tasks 待执行数 | > 100 |\n| **错误率** | 失败请求 / 总请求 | > 5% |\n| **平均延迟** | 端到端响应时间 | > 30s |\n| **Token 消耗** | 上下文占用量 | 接近 max_context |\n\n**内置能力**：\n- 吞吐量压测接口\n- 性能采样接口\n- PinchBench 能力评估\n- 会话监控面板\n\n---\n\n## 排障优先级建议\n\n当系统出问题时，按这个顺序排查：\n\n1. **入口是否可达**\n   - HTTP 状态码？\n   - WebSocket 能连接吗？\n   - DNS 解析正常吗？\n\n2. **鉴权是否匹配**\n   - API Key 对吗？\n   - Token 过期了吗？\n   - CORS 报错吗？\n\n3. **依赖是否就绪**\n   - PostgreSQL 正常吗？\n   - Weaviate 正常吗？\n   - sandbox 正常吗？\n   - MCP 服务正常吗？\n\n4. **运行态是否健康**\n   - 会话 runtime 状态？\n   - 渠道连接状态？\n   - outbox 积压吗？\n\n5. **指标是否异常**\n   - 错误率突增？\n   - 延迟突增？\n   - 队列突增？\n\n---\n\n## 生产环境检查清单\n\n- [ ] 使用 PostgreSQL 而非 SQLite\n- [ ] 配置数据库自动备份\n- [ ] 工作区存储持久化（NAS/网络存储）\n- [ ] HTTPS 证书配置并自动续期\n- [ ] CORS 策略收紧到必要域名\n- [ ] API Key 复杂度足够（>16 位、混合字符）\n- [ ] 日志收集配置（ELK/Loki 等）\n- [ ] 监控告警设置（Prometheus/Grafana 等）\n- [ ] 资源限制配置（Docker cgroups）\n- [ ] 渠道 outbox worker 启用\n- [ ] 定期清理 temp_dir 的策略\n\n---\n\n## 常见误区澄清\n\n| 误区 | 正确理解 |\n|------|----------|\n| 进程活着 = 服务可用 | ❌ 必须检查入口和依赖健康 |\n| 渠道问题 = 模型问题 | ❌ 先查接入层，再查模型 |\n| temp_dir 可以存长期数据 | ❌ temp_dir 是临时存储，会被清理 |\n| 部署完就没事了 | ❌ 要监控、要备份、要升级 |\n\n---\n\n## 下一步\n\n- 遇到问题？→ [故障排查](/docs/zh-CN/help/troubleshooting/)\n- 想看参考？→ [参考概览](/docs/zh-CN/reference/)\n- 想问问题？→ [FAQ](/docs/zh-CN/help/faq/)\n","source_path":"静态站文档/zh-CN/ops/index.md"}</script>
