  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/ops/index","language":"zh-CN","title":"运维概览","summary":"部署、存储、安全、渠道、监控五条主线。目标：让系统可持续稳定运行。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"运维","group":"概览","group_path":["概览"],"url":"/docs/zh-CN/ops/","headings":[{"id":"section-1","level":1,"text":"运维概览"},{"id":"section-2","level":2,"text":"运维入口"},{"id":"section-3","level":2,"text":"五条主线"},{"id":"section-4","level":3,"text":"1. 部署与运行"},{"id":"section-5","level":3,"text":"2. 数据与存储"},{"id":"section-6","level":3,"text":"3. 账户与安全"},{"id":"section-7","level":3,"text":"4. 渠道管理"},{"id":"section-8","level":3,"text":"5. 监控与评估"},{"id":"section-9","level":2,"text":"排障优先级"},{"id":"section-10","level":2,"text":"生产环境检查清单"},{"id":"section-11","level":3,"text":"必做项"},{"id":"section-12","level":3,"text":"推荐项"},{"id":"section-13","level":2,"text":"按场景的运维建议"},{"id":"section-14","level":3,"text":"个人 Desktop 使用"},{"id":"section-15","level":3,"text":"小团队 Server"},{"id":"section-16","level":3,"text":"组织生产环境"},{"id":"section-17","level":2,"text":"常见运维误区"},{"id":"section-18","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/surfaces/desktop-ui","next_slug":"zh-CN/ops/deployment","markdown":"# 运维概览\n\nWunder 的运维可以理解为**五条主线**：部署、存储、安全、渠道、监控。\n\n目标不是\"启动成功\"，而是**让系统长期稳定运行**。\n\n## 运维入口\n\n<div class=\"docs-card-grid docs-card-grid-compact\">\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/deployment/\"><strong>部署与运行<\/strong><span>选择形态、准备环境、启动检查。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/data-and-storage/\"><strong>数据与存储<\/strong><span>数据库、工作区、知识库的数据管理。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/auth-and-security/\"><strong>账户与安全<\/strong><span>账户体系、权限边界、安全配置。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/channel-runtime/\"><strong>渠道管理<\/strong><span>飞书、微信等外部渠道的接入与运维。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/benchmark-and-observability/\"><strong>监控与评估<\/strong><span>系统健康、性能观测、能力评估。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/ops/desktop-local-mode/\"><strong>Desktop 本地模式<\/strong><span>桌面端本地运行的特点与维护。<\/span><\/a>\n<\/div>\n\n## 五条主线\n\n### 1. 部署与运行\n\n**目标**：正确选择运行形态，顺利启动，健康检查通过。\n\n**关键决策**：\n- 个人使用还是团队使用？\n- 用 PostgreSQL 还是 SQLite？\n- 工作区放在哪里？\n\n### 2. 数据与存储\n\n**目标**：不丢数据、快速恢复、存储性能足够。\n\n**存储分层**：\n\n| 层数据 | 用途 | 备份建议 |\n|--------|------|----------|\n| 数据库 | 用户、会话、配置 | 定期全量备份 |\n| 工作区 | 用户文件和产物 | 文件系统备份 |\n| 向量库 | 知识库检索 | 随数据库备份 |\n| 临时目录 | 上传下载中转 | 定期清理，不需要备份 |\n\n### 3. 账户与安全\n\n**目标**：权限清晰、访问受控、审计可追溯。\n\n**安全要点**：\n- API 密钥足够复杂\n- 路径和命令访问受限\n- 审批模式按需配置\n\n### 4. 渠道管理\n\n**目标**：消息不丢、连接稳定、异常可发现。\n\n**监控要点**：\n- 账号是否在线\n- 消息收发是否正常\n- 出站是否卡在队列\n\n### 5. 监控与评估\n\n**目标**：提前发现问题、量化系统表现。\n\n**观测重点**：\n- 活跃会话数和队列深度\n- 错误率和响应延迟\n- Token 消耗趋势\n\n## 排障优先级\n\n系统出问题时，按这个顺序排查：\n\n1. **入口是否可达**——能打开页面吗？能连接吗？\n2. **账户权限是否正常**——登录正常吗？Token 过期了吗？\n3. **依赖服务是否正常**——数据库正常吗？MCP 服务通吗？\n4. **运行状态是否健康**——会话卡住了吗？队列积压了吗？\n5. **指标是否异常**——错误率突增？延迟变大？\n\n## 生产环境检查清单\n\n### 必做项\n\n- [ ] 使用 PostgreSQL（不要用 SQLite）\n- [ ] 数据库自动备份已配置\n- [ ] 工作区存储持久化（NAS/网络存储）\n- [ ] HTTPS 证书配置\n- [ ] API 密钥复杂度足够\n\n### 推荐项\n\n- [ ] CORS 策略已收紧\n- [ ] 日志收集已配置\n- [ ] 监控告警已设置\n- [ ] 定期清理临时目录\n\n## 按场景的运维建议\n\n### 个人 Desktop 使用\n\n基本不需要运维。关注：\n- 定期更新应用\n- 工作区文件别太大\n- 异常时用重置功能\n\n### 小团队 Server\n\n关注：\n- 数据库备份\n- 用户管理和 Token 发放\n- 基本监控\n\n### 组织生产环境\n\n需要全面运维：\n- 完整的备份策略\n- 监控告警体系\n- 安全审计\n- 渠道管理\n- 性能调优\n\n## 常见运维误区\n\n| 误区 | 正确理解 |\n|------|----------|\n| 进程活着 = 服务可用 | 还要检查入口和依赖健康 |\n| 渠道问题 = 模型问题 | 先查接入层，再查模型 |\n| 临时目录可以存长期数据 | 临时目录会被清理 |\n| 部署完就没事了 | 要监控、要备份、要维护 |\n\n## 延伸阅读\n\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n- [参考概览](/docs/zh-CN/reference/)\n","source_path":"使用说明书/zh-CN/ops/index.md"}</script>
