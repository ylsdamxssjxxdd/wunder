  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/surfaces/orchestration","language":"zh-CN","title":"编排功能","summary":"编排页是蜂群持续推进任务的专用工作台。按轮次推进、查看历史、生成分支。","updated_at":"2026-04-24","read_when":[],"source_docs":[],"tab":"界面","group":"前端与桌面","group_path":["前端与桌面"],"url":"/docs/zh-CN/surfaces/orchestration/","headings":[{"id":"section-1","level":1,"text":"编排功能"},{"id":"section-2","level":2,"text":"适合什么场景"},{"id":"section-3","level":2,"text":"进入方式"},{"id":"section-4","level":2,"text":"页面布局"},{"id":"section-5","level":3,"text":"画布"},{"id":"section-6","level":3,"text":"右侧栏"},{"id":"section-7","level":3,"text":"底部时间线"},{"id":"section-8","level":2,"text":"基本工作流"},{"id":"section-9","level":2,"text":"态势设置"},{"id":"section-10","level":2,"text":"产物查看"},{"id":"section-11","level":2,"text":"历史、回看与分支"},{"id":"section-12","level":3,"text":"回看旧轮次"},{"id":"section-13","level":3,"text":"从旧轮次继续"},{"id":"section-14","level":3,"text":"删除后续内容"},{"id":"section-15","level":2,"text":"编排态与聊天页的关系"},{"id":"section-16","level":2,"text":"启动与关闭"},{"id":"section-17","level":3,"text":"关闭"},{"id":"section-18","level":3,"text":"启动"},{"id":"section-19","level":2,"text":"使用建议"},{"id":"section-20","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/surfaces/frontend","next_slug":"zh-CN/surfaces/web-admin","markdown":"# 编排功能\n\n编排功能是蜂群进入\"持续推进模式\"后的专用工作台。\n\n普通蜂群页适合一次性协作，编排页适合需要**多轮推进、保留轮次记录、从旧轮次分支**的场景。\n\n## 适合什么场景\n\n- 母蜂需要持续统筹多个工蜂，而不是临时做一次任务\n- 你想把每轮产物按目录沉淀下来，后续可以回看\n- 你想从旧轮次重新继续，形成新分支，而不是覆盖旧结果\n\n如果只是临时并行协作，普通蜂群页更轻量。\n\n## 进入方式\n\n1. 左栏打开蜂群区域\n2. 中栏选择一个蜂群\n3. 点击「编排」进入编排页\n4. 右侧栏顶部点击「新建编排」\n\n新建编排时，系统会为母蜂和所有工蜂各自建立新线程，并把蜂群切换到这套编排状态。\n\n注意：只有第一次「新建编排」会创建新线程，后续轮次沿用同一组线程，保持上下文连续。\n\n## 页面布局\n\n### 画布\n\n- 左侧：母蜂卡片\n- 中间：工蜂卡片\n- 右侧：产物容器卡片\n\n节点可拖拽，支持连接线和规整排布。\n\n### 右侧栏\n\n控制当前编排 run：\n\n- **新建编排**：创建新的编排 run\n- **历史**：查看历史 run\n- **启动 / 关闭**：控制当前 run 是否激活\n- **态势设置**：预设每轮的背景信息\n\n蜂群标题旁的状态灯：\n- 灰色 = 未激活\n- 绿色 = 已激活，可继续推进\n- 蓝色 = 正在执行\n\n### 底部时间线\n\n时间线显示的是母蜂的用户轮次，支持：\n- 收起与展开\n- 横向滚动\n- 分支可视化\n- 点击轮次查看当时的消息与产物\n\n## 基本工作流\n\n1. 新建编排\n2. 在「态势」窗口预设各轮背景信息\n3. 向母蜂发送消息\n4. 母蜂调用蜂群工具，唤起工蜂\n5. 工蜂在本轮产物目录里产出文件\n6. 母蜂汇总结果并回复\n7. 时间线新增一个轮次，可继续下一轮\n\n如果某一轮被你主动停止，不会计入正式轮次。\n\n## 态势设置\n\n态势是每轮的背景信息，系统会自动附加到消息上下文中。\n\n- 态势按轮次保存\n- 可以提前预设未来轮次\n- 支持导入 `.txt` 文件批量写入（用 `#1`、`#2` 分隔轮次）\n\n## 产物查看\n\n选中时间线中的某一轮时，页面只显示该轮的产物文件，直观回答\"第 N 轮产出了什么\"。\n\n## 历史、回看与分支\n\n### 回看旧轮次\n\n点击时间线中的旧轮次：\n- 右侧栏显示那一轮的消息\n- 产物区显示那一轮的文件\n- 发送入口禁用（只能查看，不能修改）\n\n### 从旧轮次继续\n\n从旧轮次继续发送时，系统会自动创建新的分支 run，而不是覆盖原 run。\n\n- 原 run 保留不变\n- 新分支从该轮重新继续\n- 时间线显示主干与分支关系\n\n### 删除后续内容\n\n在时间线轮次节点上可以删除\"该轮之后的内容\"。删除后，当前轮保留，后续轮次和分支一起移除。\n\n## 编排态与聊天页的关系\n\n蜂群处于激活编排态时，聊天页中的编排线程会带明显标识，且：\n\n- 不能直接发送消息到编排线程\n- 不能新建线程覆盖编排主线程\n- 历史线程可以查看，但不能破坏编排态\n\n要继续编排，请回到编排页操作。\n\n## 启动与关闭\n\n### 关闭\n\n关闭后不会离开编排页，当前 run 保留为可查看的历史，蜂群切回普通主线程。\n\n### 启动\n\n打开未激活的历史 run 时，可以点击「启动」重新激活。这不是新建 run，而是重新启用当前编排。\n\n## 使用建议\n\n- 新建编排前，先确认蜂群成员与角色已配好\n- 长流程任务建议先预设好几轮态势再开始\n- 想比较两种走法时，从旧轮次继续生成分支，不要覆盖旧轮\n- 编排执行中需要打断，用右侧栏停止，不要切到聊天页操作\n\n## 延伸阅读\n\n- [用户端界面](/docs/zh-CN/surfaces/frontend/)\n- [蜂群协作](/docs/zh-CN/concepts/swarm/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"使用说明书/zh-CN/surfaces/orchestration.md"}</script>
