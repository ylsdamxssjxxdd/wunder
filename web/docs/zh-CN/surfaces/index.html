  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/surfaces/index","language":"zh-CN","title":"界面概览","summary":"用户在蜂巢里工作，管理员用管理端治理。蜂巢有桌面端和网页端两种打开方式。","updated_at":"2026-06-30","read_when":[],"source_docs":[],"tab":"界面","group":"概览","group_path":["概览"],"url":"/docs/zh-CN/surfaces/","headings":[{"id":"section-1","level":1,"text":"界面概览"},{"id":"section-2","level":2,"text":"蜂巢：用户工作台"},{"id":"section-3","level":2,"text":"管理端：治理后台"},{"id":"section-4","level":2,"text":"界面入口"},{"id":"section-5","level":2,"text":"蜂巢的三栏布局"},{"id":"section-6","level":2,"text":"按角色选择"},{"id":"section-7","level":3,"text":"普通用户"},{"id":"section-8","level":3,"text":"管理员"},{"id":"section-9","level":2,"text":"常见误区"},{"id":"section-10","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/integration/mcp-endpoint","next_slug":"zh-CN/surfaces/frontend","markdown":"# 界面概览\n\nwunder 的界面分两类：**蜂巢**是所有用户的工作台，**管理端**是管理员的治理后台。\n\n## 蜂巢：用户工作台\n\n蜂巢是用户日常使用的工作台，覆盖对话、文件、智能体、工具与设置。它有两种打开方式：\n\n| 打开方式 | 适合 | 特点 |\n|------|------|------|\n| **桌面端** | 个人用户 | 本地安装，可访问本机文件与桌面，开箱即用 |\n| **网页端** | 团队成员 | 浏览器访问，多人共用，由服务端统一管理 |\n\n两种方式共用同一套界面与能力。桌面端在蜂巢基础上额外提供本地文件访问、本地运行时和一键重置。\n\n## 管理端：治理后台\n\n管理端面向管理员，负责系统配置、用户管理、渠道监控。它和用户的工作场景完全不同，所以独立设计，不做日常对话。\n\n## 界面入口\n\n<div class=\"docs-card-grid docs-card-grid-compact\">\n  <a class=\"docs-card\" href=\"/docs/zh-CN/surfaces/frontend/\"><strong>蜂巢界面<\/strong><span>聊天、文件、智能体、工具、设置。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/surfaces/orchestration/\"><strong>编排功能<\/strong><span>母蜂、工蜂、产物与时间线的专用工作台。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/surfaces/desktop-ui/\"><strong>桌面端界面<\/strong><span>桌面端特有的本地能力与重置。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/surfaces/web-admin/\"><strong>管理端界面<\/strong><span>用户管理、系统配置、渠道监控。<\/span><\/a>\n<\/div>\n\n## 蜂巢的三栏布局\n\n桌面端和网页端都采用三栏布局：\n\n```\n┌────────┬─────────────┬──────────────────┐\n│ 左栏   │ 中栏        │ 右栏             │\n│ 导航   │ 列表        │ 工作区           │\n│        │ 会话/文件   │ 对话/详情        │\n└────────┴─────────────┴──────────────────┘\n```\n\n- **左栏**：一级导航（聊天、文件、智能体、工具、设置等）\n- **中栏**：列表（会话列表、文件列表、智能体列表等）\n- **右栏**：工作区（对话详情、文件预览、设置面板等）\n\n## 按角色选择\n\n### 普通用户\n\n主要使用蜂巢：\n- 个人用户装[桌面端](/docs/zh-CN/start/desktop/)\n- 团队成员用浏览器访问网页端\n\n### 管理员\n\n主要使用：\n- [管理端](/docs/zh-CN/surfaces/web-admin/)（做治理）\n- 蜂巢（做日常工作）\n\n## 常见误区\n\n- **管理端能聊天？** 不行。管理端是治理后台，不做日常对话。\n- **桌面端能切换连接服务器？** 当前版本专注本地模式。如需团队能力请用网页端。\n- **蜂巢和管理端共用一套界面？** 不行。职责不同，界面分开。\n\n## 延伸阅读\n\n- [蜂巢界面](/docs/zh-CN/surfaces/frontend/)\n- [桌面端安装](/docs/zh-CN/start/desktop/)\n- [编排功能](/docs/zh-CN/surfaces/orchestration/)\n- [核心概览](/docs/zh-CN/concepts/)\n","source_path":"使用说明书/zh-CN/surfaces/index.md"}</script>
