  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/surfaces/index","language":"zh-CN","title":"界面概览","summary":"Wunder 有三个界面：用户端、管理端、桌面端。用户端做日常工作，管理端做系统治理，桌面端是个人主入口。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"界面","group":"概览","group_path":["概览"],"url":"/docs/zh-CN/surfaces/","headings":[{"id":"section-1","level":1,"text":"界面概览"},{"id":"section-2","level":2,"text":"界面入口"},{"id":"section-3","level":2,"text":"界面关系"},{"id":"section-4","level":3,"text":"用户端 vs 管理端"},{"id":"section-5","level":3,"text":"桌面端 vs 用户端"},{"id":"section-6","level":3,"text":"三栏布局"},{"id":"section-7","level":2,"text":"按角色选择"},{"id":"section-8","level":3,"text":"普通用户"},{"id":"section-9","level":3,"text":"管理员"},{"id":"section-10","level":2,"text":"常见误区"},{"id":"section-11","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/integration/mcp-endpoint","next_slug":"zh-CN/surfaces/frontend","markdown":"# 界面概览\n\nWunder 有三个主要界面，各有各的职责：\n\n| 界面 | 用途 | 适合谁 |\n|------|------|--------|\n| **用户端** | 日常对话、文件管理、智能体设置 | 所有用户 |\n| **管理端** | 系统配置、用户管理、渠道管理 | 管理员 |\n| **桌面端** | 本地优先的个人工作台 | 个人用户 |\n\n## 界面入口\n\n<div class=\"docs-card-grid docs-card-grid-compact\">\n  <a class=\"docs-card\" href=\"/docs/zh-CN/surfaces/frontend/\"><strong>用户端界面<\/strong><span>聊天、文件、智能体、工具、设置。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/surfaces/web-admin/\"><strong>管理端界面<\/strong><span>用户管理、系统配置、渠道监控。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/surfaces/desktop-ui/\"><strong>桌面端界面<\/strong><span>本地工作台，桌面端特有功能。<\/span><\/a>\n<\/div>\n\n## 界面关系\n\n### 用户端 vs 管理端\n\n- **用户端**：做具体工作——对话、处理文件、使用工具\n- **管理端**：做系统治理——管理用户、配置系统、监控运行\n\n职责不同，所以界面分开。普通用户不需要关心管理端，管理员日常工作也在用户端完成。\n\n### 桌面端 vs 用户端\n\n桌面端在用户端基础上增加了：\n- 本地文件直接访问\n- 本地运行时配置\n- 桌面系统集成\n- 一键重置功能\n\n可以说桌面端是\"增强版的用户端\"。\n\n### 三栏布局\n\n用户端和桌面端都采用三栏布局：\n\n```\n┌────────┬─────────────┬──────────────────┐\n│ 左栏   │ 中栏        │ 右栏             │\n│ 导航   │ 列表        │ 工作区           │\n│        │ 会话/文件   │ 对话/详情        │\n└────────┴─────────────┴──────────────────┘\n```\n\n- **左栏**：一级导航（聊天、文件、智能体、工具、设置等）\n- **中栏**：列表（会话列表、文件列表、智能体列表等）\n- **右栏**：工作区（对话详情、文件预览、设置面板等）\n\n## 按角色选择\n\n### 普通用户\n\n主要使用：\n- 桌面应用（推荐）\n- 或网页端用户端\n\n### 管理员\n\n主要使用：\n- 管理端（做治理）\n- 用户端或桌面端（做日常工作）\n\n## 常见误区\n\n- **管理端能聊天？** 不行。管理端是治理后台，不做日常对话。\n- **桌面端能切换连接服务器？** 当前版本专注本地模式。如需 Server 能力请用网页端。\n- **用户端和管理端共用一套界面？** 不行。职责不同，界面分开。\n\n## 延伸阅读\n\n- [Desktop 入门](/docs/zh-CN/start/desktop/)\n- [管理端面板指南](/docs/zh-CN/reference/admin-panels/)\n- [核心概览](/docs/zh-CN/concepts/)\n","source_path":"使用说明书/zh-CN/surfaces/index.md"}</script>
