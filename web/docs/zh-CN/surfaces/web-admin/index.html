  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/surfaces/web-admin","language":"zh-CN","title":"管理端界面","summary":"系统治理的后台。配置系统、管理用户、监控渠道、查看运行状态。只有管理员能访问。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"界面","group":"前端与桌面","group_path":["前端与桌面"],"url":"/docs/zh-CN/surfaces/web-admin/","headings":[{"id":"section-1","level":1,"text":"管理端界面"},{"id":"section-2","level":2,"text":"面板分组"},{"id":"section-3","level":2,"text":"系统分组"},{"id":"section-4","level":3,"text":"内部状态"},{"id":"section-5","level":3,"text":"系统设置"},{"id":"section-6","level":3,"text":"用户管理"},{"id":"section-7","level":3,"text":"单位管理"},{"id":"section-8","level":3,"text":"渠道监控"},{"id":"section-9","level":2,"text":"智能体分组"},{"id":"section-10","level":3,"text":"模型配置"},{"id":"section-11","level":3,"text":"线程管理"},{"id":"section-12","level":3,"text":"预设智能体"},{"id":"section-13","level":3,"text":"工具管理"},{"id":"section-14","level":3,"text":"系统提示词"},{"id":"section-15","level":2,"text":"调试分组"},{"id":"section-16","level":3,"text":"吞吐测试"},{"id":"section-17","level":3,"text":"性能测试"},{"id":"section-18","level":3,"text":"蜂群测试"},{"id":"section-19","level":3,"text":"能力评估"},{"id":"section-20","level":3,"text":"调试面板"},{"id":"section-21","level":2,"text":"文档分组"},{"id":"section-22","level":3,"text":"使用说明书"},{"id":"section-23","level":3,"text":"接口参考"},{"id":"section-24","level":2,"text":"Token 账户管理"},{"id":"section-25","level":2,"text":"常用管理操作"},{"id":"section-26","level":3,"text":"新用户加入"},{"id":"section-27","level":3,"text":"配置新模型"},{"id":"section-28","level":3,"text":"接入新渠道"},{"id":"section-29","level":3,"text":"处理异常线程"},{"id":"section-30","level":2,"text":"管理端访问"},{"id":"section-31","level":2,"text":"安全注意"},{"id":"section-32","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/surfaces/orchestration","next_slug":"zh-CN/surfaces/desktop-ui","markdown":"# 管理端界面\n\n管理端是系统治理的后台，只有管理员能访问。它不是一个聊天界面，而是配置、管理、监控的工作台。\n\n## 面板分组\n\n管理端按职责分成几个分组：\n\n| 分组 | 包含面板 | 职责 |\n|------|----------|------|\n| **系统** | 内部状态、系统设置、用户管理、单位管理、渠道监控 | 全局治理 |\n| **智能体** | 模型配置、线程管理、预设智能体、工具管理、系统提示词 | 能力配置 |\n| **调试** | 吞吐测试、性能测试、蜂群测试、能力评估、调试面板 | 工程验证 |\n| **文档** | 使用说明书、接口参考 | 查阅入口 |\n\n## 系统分组\n\n### 内部状态\n\n查看系统整体运行状态：\n- 活跃会话数\n- 系统负载\n- 关键组件状态\n\n### 系统设置\n\n配置全局参数：\n- 服务地址和端口\n- 安全策略\n- 存储设置\n- 工具开关\n\n### 用户管理\n\n管理用户账户：\n- 用户列表查看\n- 创建新用户\n- 编辑用户信息\n- 重置密码\n- Token 账户管理（发放、扣除、设置余额）\n\n### 单位管理\n\n管理组织结构：\n- 创建和管理单位\n- 单位层级关系\n- 成员管理\n\n### 渠道监控\n\n监控外部渠道：\n- 渠道账号状态（在线/离线）\n- 消息收发统计\n- 异常告警\n- 绑定关系管理\n\n## 智能体分组\n\n### 模型配置\n\n管理可用的 AI 模型：\n- 添加新模型\n- 配置模型参数（API 密钥、接口地址）\n- 设置默认模型\n\n### 线程管理\n\n管理活跃线程：\n- 线程状态查看\n- 强制取消异常线程\n- 触发上下文压缩\n\n### 预设智能体\n\n管理预设模板：\n- 创建预设智能体模板\n- 配置工具和模型\n- 同步到用户侧\n\n### 工具管理\n\n管理可用工具：\n- 查看内置工具列表\n- 配置 MCP 外部工具\n- 设置工具权限\n\n### 系统提示词\n\n管理提示词模板：\n- 查看和编辑系统模板\n- 切换默认模板包\n- 创建新的模板包\n\n## 调试分组\n\n### 吞吐测试\n\n测试系统并发能力：\n- 并发请求测试\n- 吞吐量统计\n\n### 性能测试\n\n测试响应性能：\n- 单请求延迟测量\n- 性能采样\n\n### 蜂群测试\n\n测试蜂群协作能力：\n- 蜂群任务测试\n- 工蜂协作验证\n\n### 能力评估\n\n评估智能体能力：\n- 任务完成质量评估\n- 版本回归测试\n\n### 调试面板\n\n实时调试工具：\n- 请求追踪\n- 工具调用日志\n- 错误排查\n\n## 文档分组\n\n### 使用说明书\n\n你正在阅读的文档站入口。\n\n### 接口参考\n\n快速查看接口信息：\n- 接口地址\n- 字段说明\n- 使用示例\n\n## Token 账户管理\n\n在用户管理中，管理员可以操作用户的 Token 账户：\n\n| 操作 | 说明 |\n|------|------|\n| **直接设置余额** | 覆盖当前余额，适合修正账面值 |\n| **发放 Token** | 增加余额，记录累计获得 |\n| **扣除 Token** | 减少余额，记录累计消耗 |\n\n管理员账户不参与 Token 余额限制。\n\n## 常用管理操作\n\n### 新用户加入\n\n1. 用户管理 → 创建用户\n2. 填写用户名、邮箱、密码\n3. 分配所属单位\n4. 根据需要发放初始 Token\n\n### 配置新模型\n\n1. 模型配置 → 添加模型\n2. 填写模型名称、API 密钥、接口地址\n3. 设置是否为默认模型\n\n### 接入新渠道\n\n1. 渠道监控 → 添加账号\n2. 填写渠道类型和凭证\n3. 配置 Webhook 地址\n4. 测试消息收发\n\n### 处理异常线程\n\n1. 线程管理 → 找到异常线程\n2. 查看详情了解问题\n3. 如需终止，点击取消\n4. 查看日志定位原因\n\n## 管理端访问\n\n管理端通过独立地址访问：\n- 浏览器打开管理端 URL\n- 使用管理员账户登录\n- 具体地址由部署配置决定\n\n## 安全注意\n\n管理端拥有系统最高权限：\n- 只有授权的管理员才能访问\n- 管理员密码要足够复杂\n- 定期更换密码\n- 重要操作做好记录\n\n## 延伸阅读\n\n- [管理端面板指南](/docs/zh-CN/reference/admin-panels/)\n- [账户与安全](/docs/zh-CN/ops/auth-and-security/)\n- [监控与评估](/docs/zh-CN/ops/benchmark-and-observability/)\n","source_path":"使用说明书/zh-CN/surfaces/web-admin.md"}</script>
