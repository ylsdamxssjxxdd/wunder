  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/surfaces/web-admin","language":"zh-CN","title":"管理端界面","summary":"管理员的后台工作台。模型配置、工具管理、用户治理、渠道接入，都在这里。","updated_at":"2026-04-24","read_when":[],"source_docs":[],"tab":"界面","group":"前端与桌面","group_path":["前端与桌面"],"url":"/docs/zh-CN/surfaces/web-admin/","headings":[{"id":"section-1","level":1,"text":"管理端界面"},{"id":"section-2","level":2,"text":"什么时候需要管理端"},{"id":"section-3","level":2,"text":"核心功能"},{"id":"section-4","level":3,"text":"模型配置"},{"id":"section-5","level":3,"text":"预设智能体"},{"id":"section-6","level":3,"text":"工具管理"},{"id":"section-7","level":3,"text":"用户与单位"},{"id":"section-8","level":3,"text":"渠道管理"},{"id":"section-9","level":3,"text":"系统监控"},{"id":"section-10","level":2,"text":"访问方式"},{"id":"section-11","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/surfaces/orchestration","next_slug":"zh-CN/surfaces/desktop-ui","markdown":"# 管理端界面\n\n管理端是系统管理员的后台工作台。普通用户不会看到这个界面。\n\n## 什么时候需要管理端\n\n- 需要配置模型和 API Key\n- 需要管理用户、单位、权限\n- 需要接入外部渠道（飞书、微信等）\n- 需要管理工具和技能\n- 需要查看系统运行状态\n\n## 核心功能\n\n### 模型配置\n\n- 添加、编辑、删除模型\n- 配置 API Key 和端点\n- 测试模型连接\n- 设置默认模型\n\n### 预设智能体\n\n- 管理预设智能体卡片\n- 配置头像、名称、描述\n- 设置模型、工具、提示词\n- 管理内置技能\n\n### 工具管理\n\n- 查看所有可用工具\n- 启用 / 禁用工具\n- 管理技能文件\n- 配置 MCP / A2A 服务\n\n### 用户与单位\n\n- 用户列表与状态管理\n- 单位（组织）管理\n- 权限与角色分配\n- 令牌管理\n\n### 渠道管理\n\n- 配置飞书、企业微信、QQ 等渠道\n- 管理渠道接入凭证\n- 查看渠道运行状态\n\n### 系统监控\n\n- 服务健康状态\n- 性能指标\n- 日志查看\n\n## 访问方式\n\n管理端通常在 Server 部署后通过浏览器访问，默认端口 18000。\n\n## 延伸阅读\n\n- [Server 部署](/docs/zh-CN/start/server/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- [配置说明](/docs/zh-CN/reference/config/)\n","source_path":"使用说明书/zh-CN/surfaces/web-admin.md"}</script>
