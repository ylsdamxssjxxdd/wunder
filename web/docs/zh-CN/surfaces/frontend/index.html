  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/surfaces/frontend","language":"zh-CN","title":"用户侧前端","summary":"用户侧前端位于 `frontend/`，已经收敛为统一 Messenger 工作台。","updated_at":"2026-04-05","read_when":["你要理解 Wunder 面向普通用户的主要界面","你要知道聊天、用户世界、工具、文件和设置如何组织"],"source_docs":["docs/系统介绍.md","docs/设计方案.md","README.md"],"tab":"界面","group":"前端与桌面","group_path":["前端与桌面"],"url":"/docs/zh-CN/surfaces/frontend/","headings":[{"id":"section-1","level":1,"text":"用户侧前端"},{"id":"section-2","level":2,"text":"代码位置"},{"id":"section-3","level":2,"text":"当前的主要入口"},{"id":"section-4","level":2,"text":"界面组织方式"},{"id":"section-5","level":2,"text":"消息工作台里怎么找功能"},{"id":"section-6","level":2,"text":"聊天输入区支持什么"},{"id":"section-7","level":2,"text":"本地桌面输入增强"},{"id":"section-8","level":2,"text":"帮助手册入口"},{"id":"section-9","level":2,"text":"这套前端承载什么能力"},{"id":"section-10","level":2,"text":"它和 Desktop 的关系"},{"id":"section-11","level":2,"text":"什么时候你应该先看这部分文档"},{"id":"section-12","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/surfaces/index","next_slug":"zh-CN/surfaces/web-admin","markdown":"# 用户侧前端\n\nWunder 的用户侧前端不是“一个聊天页”，而是一个统一消息工作台。\n\n它当前已经按 Messenger 形态组织，核心目标是把这些东西放进同一套壳里：\n\n- 智能体聊天\n- 用户世界通信\n- 文件与工作区\n- 工具与知识配置\n- 系统设置与个人资料\n\n## 代码位置\n\n- `frontend/`\n\n## 当前的主要入口\n\n- `/app/home`\n- `/app/chat`\n- `/app/user-world`\n- `/app/workspace`\n- `/app/tools`\n- `/app/settings`\n- `/app/profile`\n- `/app/channels`\n- `/app/cron`\n\n这些页面不是彼此割裂的，它们共享同一套 Messenger 壳。\n\n## 界面组织方式\n\n用户侧当前采用三栏结构：\n\n- 左栏：导航与一级入口\n- 中栏：会话、联系人、群聊、智能体或资源列表\n- 右栏：聊天主区与扩展面板\n\n这意味着 Wunder 的“用户侧前端”已经不是传统控制台，而是面向持续协作的工作台。\n\n## 消息工作台里怎么找功能\n\n- 左栏负责切换大分区，常用入口包括消息、智能体、蜂群、联系人、群聊、工具、文件和更多设置。\n- 中栏会跟随左栏切换内容。在消息分区，中栏展示统一会话列表；在智能体分区，中栏展示可管理和可进入的智能体；在更多分区，可以直接进入帮助手册。\n- 右栏承载真正的工作区。你会在这里看到聊天记录、工具智能体循环、智能体设置、文件预览，以及嵌入式帮助手册。\n\n## 聊天输入区支持什么\n\n当前聊天输入区不是纯文本框，而是一个上下文装配器。\n\n- 文本输入：支持普通提问，也支持 `/new`、`/stop`、`/compact`、`/help` 这类快捷命令。\n- 拖拽上传：支持把文件直接拖进输入区，也可以点击回形针按钮选择文件。\n- 图片：直接作为多模态上下文发送。\n- 文档：常见文本和 Office 文档会先解析成 Markdown，再作为可读文本进入模型上下文。\n- 音频：上传后会先转写，附件卡片会显示“已转写”。\n- 视频：不会原样发给模型，而是先拆成图片序列和音频相关附件。默认按 `1 FPS` 抽帧。\n- 视频重抽帧：点击上传预览区里的视频条目，可以展开抽帧控制；当前允许输入 `0.1 ~ 12 FPS`，再点“重新抽帧”即可更新结果。长视频可能会被系统自动下调实际 FPS，以限制总帧数。\n- 发送保护：只要附件还在处理中，发送会被阻止，避免模型收到半成品上下文。\n\n## 本地桌面输入增强\n\n在 desktop 本地模式下，聊天输入区还会额外出现环境相关能力：\n\n- 麦克风按钮：可直接录音并把音频作为附件发送。\n- 截图按钮：当桌面桥接可用时，会提供全屏/区域截图，以及是否隐藏窗口的选项。\n- 这些按钮是否显示，不是纯 UI 开关，而是取决于当前运行环境是否真的具备相应桥接能力。\n\n## 帮助手册入口\n\n用户侧前端已经内置文档入口，不需要离开当前工作台再去找网页。\n\n- 入口位置：左栏“更多” -> “帮助手册”。\n- 打开方式：右栏内嵌 `docs` 站点，实际加载 `/docs/?embed=user`。\n- 适用场景：一边聊天一边查工具说明、接入文档、常见问题，不需要开新标签页。\n\n## 这套前端承载什么能力\n\n- 普通对话\n- 长任务流式回放\n- 工具调用智能体循环\n- 用户世界实时通信\n- 文件预览和工作区操作\n- 智能体设置\n- 记忆碎片管理\n- 渠道与定时任务入口\n\n## 它和 Desktop 的关系\n\nDesktop 并没有重新发明一套页面，而是尽量复用这套用户侧前端壳。\n\n所以可以把关系理解成：\n\n- `frontend/` 是核心交互壳\n- `desktop/` 是把这套壳带到本地桌面并加上本地桥接能力\n\n## 什么时候你应该先看这部分文档\n\n适合这些场景：\n\n- 你要改用户体验或页面结构\n- 你要理解普通用户究竟看到什么\n- 你要判断某个能力应该落在聊天区、工作区还是设置区\n\n## 延伸阅读\n\n- [Desktop 界面](/docs/zh-CN/surfaces/desktop-ui/)\n- [管理端界面](/docs/zh-CN/surfaces/web-admin/)\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n","source_path":"使用说明书/zh-CN/surfaces/frontend.md"}</script>
