  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/surfaces/frontend","language":"zh-CN","title":"用户端界面","summary":"你的主要工作台。左栏导航、中栏列表、右栏工作区，所有日常工作都在这里完成。","updated_at":"2026-04-24","read_when":[],"source_docs":[],"tab":"界面","group":"前端与桌面","group_path":["前端与桌面"],"url":"/docs/zh-CN/surfaces/frontend/","headings":[{"id":"section-1","level":1,"text":"用户端界面"},{"id":"section-2","level":2,"text":"三栏布局"},{"id":"section-3","level":2,"text":"聊天"},{"id":"section-4","level":3,"text":"输入区"},{"id":"section-5","level":3,"text":"斜杠命令"},{"id":"section-6","level":3,"text":"保护机制"},{"id":"section-7","level":2,"text":"编排工作台"},{"id":"section-8","level":2,"text":"文件"},{"id":"section-9","level":2,"text":"智能体"},{"id":"section-10","level":2,"text":"工具与技能"},{"id":"section-11","level":2,"text":"定时任务"},{"id":"section-12","level":2,"text":"我的概况与设置"},{"id":"section-13","level":3,"text":"我的概况"},{"id":"section-14","level":3,"text":"账户管理"},{"id":"section-15","level":3,"text":"系统设置"},{"id":"section-16","level":3,"text":"帮助手册"},{"id":"section-17","level":2,"text":"状态识别"},{"id":"section-18","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/surfaces/index","next_slug":"zh-CN/surfaces/orchestration","markdown":"# 用户端界面\n\n用户端是你的主要工作台。对话、管理文件、配置智能体、使用工具——都在这里。\n\n## 三栏布局\n\n- **左栏**：导航入口（聊天、文件、智能体、工具、定时任务、设置、帮助）\n- **中栏**：列表区（会话列表、文件列表、智能体列表等）\n- **右栏**：工作区（对话、文件预览、设置面板等）\n\n## 聊天\n\n### 输入区\n\n不只是文本框，你可以：\n\n| 能力 | 说明 |\n|------|------|\n| **文本输入** | 普通提问或斜杠命令 |\n| **文件上传** | 点击上传或拖拽文件 |\n| **图片上传** | 直接作为多模态输入 |\n| **文档上传** | 自动转换为 Markdown |\n| **音频上传** | 自动转写为文字 |\n| **视频上传** | 按帧率提取画面分析 |\n\n### 斜杠命令\n\n| 命令 | 作用 |\n|------|------|\n| `/new` | 创建新线程 |\n| `/stop` | 停止当前执行 |\n| `/compact` | 主动压缩对话 |\n| `/help` | 打开帮助文档 |\n\n### 保护机制\n\n- **附件处理中**：发送按钮禁用，等处理完再发\n- **线程运行中**：新建线程按钮禁用，等完成或先停止\n- **编排态中**：编排线程在普通聊天页只读，需回编排页操作\n\n## 编排工作台\n\n编排页适合需要持续推进的蜂群任务：\n\n- 母蜂持续统筹多个工蜂\n- 按轮次查看消息、态势与产物\n- 从旧轮次继续并生成新分支\n\n和普通蜂群页相比，编排页更强调\"持续推进\"，而不是一次性协作。\n\n详见 [编排功能](/docs/zh-CN/surfaces/orchestration/)。\n\n## 文件\n\n- 浏览目录结构\n- 上传、下载、删除文件\n- 预览文本、图片、PDF 等格式\n\n## 智能体\n\n- 查看你的所有智能体\n- 配置模型、工具、提示词\n- 添加专属记忆\n- 每个智能体可以有多个线程\n\n## 工具与技能\n\n- 查看可用工具列表\n- 配置技能（能力包）\n- 添加知识库，让智能体参考你的专属资料\n\n## 定时任务\n\n- 创建定时执行的任务\n- 查看执行历史\n- 管理、暂停、删除任务\n- 手动触发一次执行\n\n## 我的概况与设置\n\n### 我的概况\n\n- 头像、用户名、等级\n- 经验进度条\n- 使用统计（会话数、工具调用数、Token 消耗）\n- Token 账户余额和趋势\n\n### 账户管理\n\n- 修改用户名、邮箱、密码\n- 查看所属单位\n\n### 系统设置\n\n- 界面语言切换\n- 一键重置工作状态（异常恢复）\n\n### 帮助手册\n\n- 内嵌文档入口，不离开工作台即可查阅\n\n## 状态识别\n\n注意界面上的状态指示：\n\n- 🔄 运行中 = 正在执行\n- ⏳ 等待中 = 需要你输入或审批\n- ✅ 已完成 = 可以继续\n\n## 延伸阅读\n\n- [Desktop 入门](/docs/zh-CN/start/desktop/)\n- [编排功能](/docs/zh-CN/surfaces/orchestration/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"使用说明书/zh-CN/surfaces/frontend.md"}</script>
