  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/surfaces/frontend","language":"zh-CN","title":"用户侧前端","summary":"用户侧前端位于 `frontend/`，已经收敛为统一 Messenger 工作台，并覆盖资料、聊天、蜂群、工作区和系统设置。","updated_at":"2026-04-10","read_when":["你要理解 Wunder 面向普通用户的主要界面","你要知道聊天、资料、蜂群、文件和设置如何组织"],"source_docs":["docs/API文档.md","frontend/src/views/MessengerView.vue","frontend/src/components/messenger/MessengerSettingsPanel.vue","frontend/src/components/messenger/DesktopRuntimeSettingsPanel.vue"],"tab":"界面","group":"前端与桌面","group_path":["前端与桌面"],"url":"/docs/zh-CN/surfaces/frontend/","headings":[{"id":"section-1","level":1,"text":"用户侧前端"},{"id":"section-2","level":2,"text":"代码位置"},{"id":"section-3","level":2,"text":"当前主要入口"},{"id":"section-4","level":2,"text":"界面怎么组织"},{"id":"section-5","level":2,"text":"登录、注册与密码"},{"id":"section-6","level":2,"text":"我的概况现在能看什么"},{"id":"section-7","level":2,"text":"聊天区支持什么"},{"id":"section-8","level":2,"text":"新建线程为什么有时会被禁用"},{"id":"section-9","level":2,"text":"蜂群页面现在怎么看状态"},{"id":"section-10","level":2,"text":"系统设置里的危险操作"},{"id":"section-11","level":2,"text":"帮助手册入口"},{"id":"section-12","level":2,"text":"什么时候优先看这页"},{"id":"section-13","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/surfaces/index","next_slug":"zh-CN/surfaces/web-admin","markdown":"# 用户侧前端\n\nWunder 的用户侧前端不是单页聊天框，而是一套统一的消息工作台。\n\n它把这些东西放进同一套 Messenger 壳里：\n\n- 智能体聊天\n- 我的概况与账号资料\n- 蜂群协作\n- 文件与工作区\n- 工具与知识配置\n- 系统设置与帮助文档\n\n## 代码位置\n\n- `frontend/`\n\n## 当前主要入口\n\n- `/app/chat`\n- `/app/profile`\n- `/app/workspace`\n- `/app/tools`\n- `/app/settings`\n- `/app/channels`\n- `/app/cron`\n\n这些入口共享同一套外层框架，不是彼此独立的产品。\n\n## 界面怎么组织\n\n当前仍然是三栏结构：\n\n- 左栏：一级导航\n- 中栏：会话、智能体、蜂群、联系人或资源列表\n- 右栏：真正的工作区\n\n右栏既承载聊天记录，也承载工作流、资料页、设置面板和内嵌帮助手册。\n\n## 登录、注册与密码\n\n登录页现在有三条常用入口：\n\n- 登录\n- 注册账号\n- 重置密码\n\n`重置密码` 按钮位于 `注册账号` 的右侧。展开后，只需要这三项：\n\n- 用户名\n- 邮箱\n- 新密码\n\n如果你已经登录，可以在“我的概况 -> 编辑资料”里同时处理：\n\n- 修改用户名\n- 修改邮箱\n- 修改登录密码\n\n修改密码时，前端会要求：\n\n- 输入当前密码\n- 输入新密码\n- 再确认一次新密码\n\n如果只是改用户名或邮箱，密码项可以留空。\n\n## 我的概况现在能看什么\n\n“我的概况”已经并入 Messenger 设置面板，不再依赖旧页面单独渲染。\n\n当前资料区会展示：\n\n- 头像、用户名、用户 ID、所属单位\n- 等级标签\n- 经验进度条\n- 会话数、近 7 天活跃、工具调用数、智能体数、累计 tokens\n- 今日额度环状图\n\n其中等级相关有两个关键变化：\n\n- 等级标签已经替换掉头像区原来的“正式账号”文案\n- 经验条放在资料卡片区域底部，而不是整个页面最底部\n\n额度展示也改成了环状图，中心显示剩余额度，外圈按剩余/警戒/已用分段显示。\n\n## 聊天区支持什么\n\n聊天输入区仍然是一个上下文装配器，不是纯文本框。\n\n- 文本输入：支持普通提问，也支持 `/new`、`/stop`、`/compact`、`/help`\n- 文件上传：支持回形针选择和拖拽上传\n- 图片：直接作为多模态上下文\n- 文档：会先转成 Markdown 文本\n- 音频：上传后会先转写\n- 视频：默认按 `1 FPS` 抽帧，可手动重抽\n\n只要附件还在处理中，发送会被阻止。这是保护机制，不是前端卡死。\n\n## 新建线程为什么有时会被禁用\n\n当前聊天页在智能体运行中会禁用 `新建线程` 按钮。\n\n这是刻意的保护，不是故障。目的是避免：\n\n- 运行中的主线程还没结束就切走\n- 会话状态和工作流错位\n- 同一个智能体在前台同时抢占主线程\n\n如果你要开新线程，先做其中之一：\n\n- 等当前运行自然完成\n- 先停止当前会话，再新建线程\n\n## 蜂群页面现在怎么看状态\n\n蜂群页的中栏条目已经和消息列表对齐：\n\n- 只要某个蜂群仍有运行中的 mission，列表项会出现呼吸高亮\n\n右侧和画布里的工作流展示也有了更明确的分工：\n\n- 母蜂节点优先展示真实工具轨迹\n- 工蜂节点会持续跟随自己的工作流更新\n- 子智能体节点完成后仍保留已走过的工具轨迹\n\n也就是说，蜂群工作流区域现在关注的重点是“调用了什么工具、走到了哪一步”，而不是只堆状态、会话号或摘要。\n\n## 系统设置里的危险操作\n\n系统设置页现在提供“一键重置工作状态”入口。\n\n它会统一处理当前用户的工作态：\n\n- 中止运行中的会话\n- 清空排队任务\n- 终止蜂群运行\n- 为默认智能体和各用户智能体重建新的主线程\n- 清理工作态目录\n\n这适合用在这些场景：\n\n- 会话卡死\n- 线程状态和前端显示明显错位\n- 蜂群运行异常后想整体回到干净状态\n\n## 帮助手册入口\n\n用户侧前端已经内置文档入口，不需要离开当前工作台。\n\n- 入口位置：左栏“更多” -> “帮助手册”\n- 打开方式：右栏内嵌 `/docs/?embed=user`\n\n## 什么时候优先看这页\n\n适合这些场景：\n\n- 你要改用户体验或页面结构\n- 你要判断某个能力应该落在聊天区、资料区还是设置区\n- 你要确认用户当前在前端到底能看到什么\n\n## 延伸阅读\n\n- [Desktop 入门](/docs/zh-CN/start/desktop/)\n- [Desktop 本地模式](/docs/zh-CN/ops/desktop-local-mode/)\n- [蜂群协作](/docs/zh-CN/concepts/swarm/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"使用说明书/zh-CN/surfaces/frontend.md"}</script>
