  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/surfaces/frontend","language":"zh-CN","title":"用户端界面","summary":"你的主要工作台。三栏布局：左栏导航、中栏列表、右栏工作区。聊天、文件、智能体、工具、设置都在这里。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"界面","group":"前端与桌面","group_path":["前端与桌面"],"url":"/docs/zh-CN/surfaces/frontend/","headings":[{"id":"section-1","level":1,"text":"用户端界面"},{"id":"section-2","level":2,"text":"三栏布局"},{"id":"section-3","level":2,"text":"聊天功能"},{"id":"section-4","level":3,"text":"输入区能力"},{"id":"section-5","level":3,"text":"斜杠命令"},{"id":"section-6","level":3,"text":"保护机制"},{"id":"section-7","level":2,"text":"文件功能"},{"id":"section-8","level":3,"text":"工作区浏览"},{"id":"section-9","level":3,"text":"文件预览"},{"id":"section-10","level":2,"text":"智能体管理"},{"id":"section-11","level":3,"text":"查看智能体"},{"id":"section-12","level":3,"text":"配置智能体"},{"id":"section-13","level":3,"text":"新建线程"},{"id":"section-14","level":2,"text":"工具与技能"},{"id":"section-15","level":3,"text":"工具面板"},{"id":"section-16","level":3,"text":"知识库"},{"id":"section-17","level":2,"text":"定时任务"},{"id":"section-18","level":2,"text":"我的概况与设置"},{"id":"section-19","level":3,"text":"我的概况"},{"id":"section-20","level":3,"text":"账户管理"},{"id":"section-21","level":3,"text":"系统设置"},{"id":"section-22","level":3,"text":"帮助手册"},{"id":"section-23","level":2,"text":"界面使用技巧"},{"id":"section-24","level":3,"text":"快速导航"},{"id":"section-25","level":3,"text":"会话管理"},{"id":"section-26","level":3,"text":"右栏工作"},{"id":"section-27","level":3,"text":"状态识别"},{"id":"section-28","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/surfaces/index","next_slug":"zh-CN/surfaces/web-admin","markdown":"# 用户端界面\n\n用户端是你的主要工作台。所有日常工作——对话、管理文件、配置智能体、使用工具——都在这里完成。\n\n## 三栏布局\n\n```\n┌────────────┬──────────────────┬────────────────────────────┐\n│   左栏     │      中栏        │          右栏              │\n│   导航     │      列表        │         工作区             │\n├────────────┼──────────────────┼────────────────────────────┤\n│ • 聊天     │ 会话列表         │ 对话内容                   │\n│ • 文件     │ 文件列表         │ 文件预览/详情              │\n│ • 智能体   │ 智能体列表       │ 智能体设置                 │\n│ • 工具     │ 工具列表         │ 工具详情                   │\n│ • 定时任务 │ 任务列表         │ 任务详情                   │\n│ • 设置     │ 设置分类         │ 设置内容                   │\n│ • 帮助     │ 文档目录         │ 文档内容                   │\n└────────────┴──────────────────┴────────────────────────────┘\n```\n\n右栏承载主要工作：对话、文件预览、设置面板、帮助文档。\n\n## 聊天功能\n\n### 输入区能力\n\n不只是文本输入框，是一个\"上下文装配器\"：\n\n| 能力 | 说明 |\n|------|------|\n| **文本输入** | 支持普通提问和斜杠命令 |\n| **文件上传** | 点击上传按钮或拖拽文件 |\n| **图片上传** | 直接作为多模态上下文 |\n| **文档上传** | 自动转换为 Markdown |\n| **音频上传** | 自动转写为文字 |\n| **视频上传** | 按帧率提取画面分析 |\n\n### 斜杠命令\n\n| 命令 | 作用 |\n|------|------|\n| `/new` | 创建新线程 |\n| `/stop` | 停止当前执行 |\n| `/compact` | 主动压缩对话 |\n| `/help` | 打开帮助文档 |\n\n### 保护机制\n\n- **附件处理中**：发送按钮禁用，等待处理完成\n- **线程运行中**：新建线程按钮禁用，等待完成或先停止\n\n## 文件功能\n\n### 工作区浏览\n\n- 查看目录结构\n- 上传新文件\n- 下载文件\n- 删除不需要的文件\n\n### 文件预览\n\n- 文本文件：直接预览内容\n- 图片：显示图片\n- PDF/文档：转换后预览\n- 其他：显示基本信息\n\n## 智能体管理\n\n### 查看智能体\n\n- 你的所有智能体列表\n- 每个智能体的模型和工具配置\n- 当前使用的提示词模板\n\n### 配置智能体\n\n- 选择 AI 模型\n- 配置可用工具\n- 选择提示词模板\n- 添加专属记忆\n\n### 新建线程\n\n- 每个智能体可以有多个线程\n- 切换线程继续之前的对话\n- 创建新线程开始新话题\n\n## 工具与技能\n\n### 工具面板\n\n- 查看可用工具列表\n- 了解每个工具的功能\n- 配置技能（能力包）\n- 添加知识库\n\n### 知识库\n\n- 让智能体参考你的专属资料\n- 支持多种文档格式\n- 可检索的知识来源\n\n## 定时任务\n\n- 创建定时执行的任务\n- 查看任务执行历史\n- 管理、暂停、删除任务\n- 手动触发一次执行\n\n## 我的概况与设置\n\n### 我的概况\n\n显示你的个人资料：\n- 头像、用户名、等级\n- 经验进度条\n- 使用统计（会话数、工具调用数、Token 消耗）\n- Token 账户余额和趋势\n\n### 账户管理\n\n- 修改用户名\n- 修改邮箱\n- 修改密码\n- 查看所属单位\n\n### 系统设置\n\n- 界面语言切换\n- 重置工作状态（异常恢复）\n\n### 帮助手册\n\n- 内嵌文档入口\n- 不离开工作台即可查阅\n\n## 界面使用技巧\n\n### 快速导航\n\n左栏是主要入口。点击切换不同功能区。\n\n### 会话管理\n\n中栏列表可以：\n- 快速切换会话\n- 搜索历史会话\n- 创建新会话\n\n### 右栏工作\n\n右栏是主要工作区：\n- 对话在这里进行\n- 文件在这里预览\n- 设置在这里修改\n\n### 状态识别\n\n注意状态指示器：\n- 运行中图标 = 正在执行\n- 等待图标 = 需要你输入或审批\n- 完成图标 = 可以继续\n\n## 延伸阅读\n\n- [Desktop 入门](/docs/zh-CN/start/desktop/)\n- [会话状态说明](/docs/zh-CN/reference/stream-events/)\n- [功能速查](/docs/zh-CN/reference/api-index/)\n","source_path":"使用说明书/zh-CN/surfaces/frontend.md"}</script>
