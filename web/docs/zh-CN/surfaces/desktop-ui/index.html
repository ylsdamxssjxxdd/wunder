  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/surfaces/desktop-ui","language":"zh-CN","title":"桌面端界面","summary":"个人用户的主入口。本地优先的工作台，可以直接访问本机文件，有本地运行时和一键重置功能。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"界面","group":"前端与桌面","group_path":["前端与桌面"],"url":"/docs/zh-CN/surfaces/desktop-ui/","headings":[{"id":"section-1","level":1,"text":"桌面端界面"},{"id":"section-2","level":2,"text":"桌面端特点"},{"id":"section-3","level":3,"text":"本地优先"},{"id":"section-4","level":3,"text":"本机文件访问"},{"id":"section-5","level":3,"text":"本地运行时"},{"id":"section-6","level":3,"text":"一键重置"},{"id":"section-7","level":2,"text":"界面结构"},{"id":"section-8","level":2,"text":"桌面特有功能"},{"id":"section-9","level":3,"text":"桌面运行时设置"},{"id":"section-10","level":3,"text":"一键重置工作状态"},{"id":"section-11","level":3,"text":"本地文件能力"},{"id":"section-12","level":2,"text":"什么时候用桌面端"},{"id":"section-13","level":2,"text":"桌面端安装"},{"id":"section-14","level":2,"text":"使用技巧"},{"id":"section-15","level":3,"text":"工作目录管理"},{"id":"section-16","level":3,"text":"状态异常处理"},{"id":"section-17","level":3,"text":"安全边界"},{"id":"section-18","level":2,"text":"常见问题"},{"id":"section-19","level":3,"text":"数据在哪里？"},{"id":"section-20","level":3,"text":"能迁移到其他电脑吗？"},{"id":"section-21","level":3,"text":"本地模式能联网吗？"},{"id":"section-22","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/surfaces/web-admin","next_slug":"zh-CN/ops/index","markdown":"# 桌面端界面\n\n桌面端是个人用户的主要使用入口。它不只是网页的\"壳\"，而是本地优先的完整工作台。\n\n## 桌面端特点\n\n### 本地优先\n\n- 数据存本地，隐私性强\n- 不依赖服务器\n- 开箱即用，无需配置\n\n### 本机文件访问\n\n可以直接访问本机的文件系统（取决于安全设置），比纯工作区更灵活。\n\n### 本地运行时\n\n安装包自带 Python 运行时，减少首次配置成本。\n\n### 一键重置\n\n异常时可以一键重置工作状态，快速恢复到干净状态。\n\n## 界面结构\n\n桌面端复用用户端的三栏布局，额外增加桌面特有的功能：\n\n```\n┌────────────┬──────────────────┬────────────────────────────┐\n│   左栏     │      中栏        │          右栏              │\n│   导航     │      列表        │         工作区             │\n├────────────┼──────────────────┼────────────────────────────┤\n│ • 聊天     │ 会话列表         │ 对话内容                   │\n│ • 文件     │ 文件列表         │ 文件预览                   │\n│ • 智能体   │ 智能体列表       │ 智能体设置                 │\n│ • 工具     │ 工具列表         │ 工具详情                   │\n│ • 设置     │ 设置分类         │ 设置内容                   │\n│   └桌面设置│                  │ 桌面运行时配置             │\n│   重置     │                  │ 一键重置工作状态           │\n└────────────┴──────────────────┴────────────────────────────┘\n```\n\n## 桌面特有功能\n\n### 桌面运行时设置\n\n配置本地运行环境：\n- Python 运行时路径\n- 本地工作目录\n- 本地工具配置\n\n### 一键重置工作状态\n\n当系统状态异常时使用：\n\n**适用场景**：\n- 会话卡在运行中\n- 蜂群任务状态不一致\n- 工作区有残留的运行态文件\n- 界面状态和实际不一致\n\n**重置后会**：\n- 停止所有运行中的会话\n- 清空排队任务\n- 终止蜂群任务\n- 为所有智能体重建干净的线程\n- 清理工作态目录\n\n**保留的内容**：\n- 你的长期资产（技能、知识）\n- 用户配置\n- 工作区文件\n- 会话历史记录\n\n所以重置是\"清理工作态\"，不是\"恢复出厂设置\"。\n\n### 本地文件能力\n\n桌面端可以让智能体：\n- 读取本机文件（在安全边界内）\n- 写入本机文件\n- 执行本地命令\n\n这是比网页端更强的能力，但也要注意安全边界。\n\n## 什么时候用桌面端\n\n**适合**：\n- 个人日常使用\n- 需要处理本机文件\n- 不想依赖服务器\n- 注重隐私和数据本地化\n\n**如果需要 Server 能力**：\n- 多用户协作\n- 管理员后台\n- 组织级部署\n- 渠道接入\n\n请直接用浏览器访问 Server 的网页端，而不是在桌面端切换连接。\n\n## 桌面端安装\n\n1. 下载安装包\n2. 运行安装程序\n3. 启动应用\n4. 开始使用\n\n不需要额外配置数据库或服务器。\n\n## 使用技巧\n\n### 工作目录管理\n\n- 工作目录默认持久化\n- 定期清理不需要的文件\n- 不要把临时文件放在工作目录\n\n### 状态异常处理\n\n遇到异常时：\n1. 先等几秒看是否自动恢复\n2. 如果不行，尝试重置工作状态\n3. 如果问题持续，重启应用\n\n### 安全边界\n\n虽然是本地模式，智能体仍然受安全限制：\n- 不能随意访问任意目录\n- 命令执行受控制\n- 在安全设置中可以调整\n\n## 常见问题\n\n### 数据在哪里？\n\n- 工作区：本地工作目录\n- 会话历史：本地 SQLite 数据库\n- 配置：本地配置文件\n\n### 能迁移到其他电脑吗？\n\n可以：\n- 复制工作目录\n- 复制数据库文件\n- 在新电脑上配置路径\n\n### 本地模式能联网吗？\n\n可以。本地模式只是数据存本地，不影响联网访问 AI 模型或网页。\n\n## 延伸阅读\n\n- [Desktop 入门](/docs/zh-CN/start/desktop/)\n- [用户端界面](/docs/zh-CN/surfaces/frontend/)\n- [Desktop 本地模式](/docs/zh-CN/ops/desktop-local-mode/)\n","source_path":"使用说明书/zh-CN/surfaces/desktop-ui.md"}</script>
