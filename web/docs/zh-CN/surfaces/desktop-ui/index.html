  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/surfaces/desktop-ui","language":"zh-CN","title":"桌面端界面","summary":"个人用户的主入口。本地优先的工作台，可以直接访问本机文件，有一键重置功能。","updated_at":"2026-04-24","read_when":[],"source_docs":[],"tab":"界面","group":"前端与桌面","group_path":["前端与桌面"],"url":"/docs/zh-CN/surfaces/desktop-ui/","headings":[{"id":"section-1","level":1,"text":"桌面端界面"},{"id":"section-2","level":2,"text":"桌面端特点"},{"id":"section-3","level":3,"text":"本地优先"},{"id":"section-4","level":3,"text":"本机文件访问"},{"id":"section-5","level":3,"text":"自带运行时"},{"id":"section-6","level":3,"text":"一键重置"},{"id":"section-7","level":2,"text":"界面结构"},{"id":"section-8","level":2,"text":"桌面特有功能"},{"id":"section-9","level":3,"text":"桌面运行时设置"},{"id":"section-10","level":3,"text":"一键重置工作状态"},{"id":"section-11","level":3,"text":"本地文件能力"},{"id":"section-12","level":2,"text":"什么时候用桌面端"},{"id":"section-13","level":2,"text":"常见问题"},{"id":"section-14","level":3,"text":"数据在哪里？"},{"id":"section-15","level":3,"text":"本地模式能联网吗？"},{"id":"section-16","level":3,"text":"能迁移到其他电脑吗？"},{"id":"section-17","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/surfaces/web-admin","next_slug":"zh-CN/ops/index","markdown":"# 桌面端界面\n\n桌面端是个人用户的主要入口。它不只是网页的\"壳\"，而是本地优先的完整工作台。\n\n## 桌面端特点\n\n### 本地优先\n\n- 数据存本地，隐私性强\n- 不依赖服务器，开箱即用\n\n### 本机文件访问\n\n可以直接访问本机文件系统（在安全边界内），比纯网页端更灵活。\n\n### 自带运行时\n\n安装包自带 Python 运行时，减少首次配置成本。\n\n### 一键重置\n\n异常时可以一键重置工作状态，快速恢复。\n\n## 界面结构\n\n桌面端复用用户端的三栏布局，额外增加桌面特有的功能：\n\n- **左栏**：导航（聊天、文件、智能体、工具、设置、桌面设置、重置）\n- **中栏**：列表区\n- **右栏**：工作区\n\n## 桌面特有功能\n\n### 桌面运行时设置\n\n配置本地运行环境：Python 路径、本地工作目录、本地工具配置。\n\n### 一键重置工作状态\n\n**什么时候用**：\n- 会话卡在运行中\n- 蜂群任务状态不一致\n- 界面状态和实际不符\n\n**重置后会**：\n- 停止所有运行中的会话\n- 清空排队任务\n- 终止蜂群任务\n- 重建干净的线程\n\n**保留的内容**：\n- 技能、知识库等长期资产\n- 用户配置\n- 工作区文件\n- 会话历史记录\n\n所以重置是\"清理工作状态\"，不是\"恢复出厂设置\"。\n\n### 本地文件能力\n\n桌面端可以让智能体：\n- 读取本机文件\n- 写入本机文件\n- 执行本地命令\n\n这是比网页端更强的能力，但受安全边界限制。\n\n## 什么时候用桌面端\n\n**适合**：\n- 个人日常使用\n- 需要处理本机文件\n- 不想依赖服务器\n- 注重隐私和数据本地化\n\n**如果需要**：\n- 多用户协作\n- 管理员后台\n- 组织级部署\n\n请直接用浏览器访问 Server 的网页端。\n\n## 常见问题\n\n### 数据在哪里？\n\n- 工作区：本地工作目录\n- 会话历史：本地 SQLite 数据库\n- 配置：本地配置文件\n\n### 本地模式能联网吗？\n\n可以。本地模式只是数据存本地，不影响联网访问 AI 模型或网页。\n\n### 能迁移到其他电脑吗？\n\n可以。复制工作目录和数据库文件，在新电脑上配置路径即可。\n\n## 延伸阅读\n\n- [Desktop 入门](/docs/zh-CN/start/desktop/)\n- [用户端界面](/docs/zh-CN/surfaces/frontend/)\n- [Desktop 本地模式](/docs/zh-CN/ops/desktop-local-mode/)\n","source_path":"使用说明书/zh-CN/surfaces/desktop-ui.md"}</script>
