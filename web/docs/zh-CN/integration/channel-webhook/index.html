  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/channel-webhook","language":"zh-CN","title":"渠道 Webhook","summary":"Wunder 用 `/wunder/channel/{provider}/webhook` 统一承接外部渠道入站，再交给 ChannelHub 和 outbox 处理。","updated_at":"2026-03-22","read_when":["你要把飞书、企业微信、QQBot、XMPP 等渠道接进 Wunder","你想知道 Webhook、长连接和 outbox 的关系"],"source_docs":["docs/API文档.md","docs/系统介绍.md","docs/设计方案.md","src/api/channel.rs","src/channels/catalog.rs"],"tab":"接入","group":"扩展接入","group_path":["扩展接入"],"url":"/docs/zh-CN/integration/channel-webhook/","headings":[{"id":"section-1","level":1,"text":"渠道 Webhook"},{"id":"section-2","level":2,"text":"这条链路的核心目标"},{"id":"section-3","level":2,"text":"已有的典型入口"},{"id":"section-4","level":2,"text":"为什么要有统一入口"},{"id":"section-5","level":2,"text":"Webhook 进来之后发生什么"},{"id":"section-6","level":2,"text":"长连接和 Webhook 是对立关系吗"},{"id":"section-7","level":2,"text":"outbox 是做什么的"},{"id":"section-8","level":2,"text":"文件为什么会被改写成下载链接"},{"id":"section-9","level":2,"text":"管理端看什么"},{"id":"section-10","level":2,"text":"最常见的问题"},{"id":"section-11","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/integration/user-world","next_slug":"zh-CN/integration/external-login","markdown":"# 渠道 Webhook\n\n渠道接入在 Wunder 里不是“外设功能”，而是正式入口之一。\n\n它的统一入口是：\n\n- `/wunder/channel/{provider}/webhook`\n\n## 这条链路的核心目标\n\n统一处理这些事情：\n\n- 验签\n- 渠道消息标准化\n- 快速回执\n- 后台异步调度\n- 出站投递与重试\n\n所以 Webhook 只是入口，不是全部逻辑。\n\n## 已有的典型入口\n\n当前系统里已经明确支持这些典型渠道入口：\n\n- `/wunder/channel/feishu/webhook`\n- `/wunder/channel/wechat/webhook`\n- `/wunder/channel/wechat_mp/webhook`\n- `/wunder/channel/qqbot/webhook`\n- `/wunder/channel/whatsapp/webhook`\n- `/wunder/channel/xmpp/webhook`\n\n同时也保留：\n\n- `/wunder/channel/{provider}/webhook`\n\n用于走统一注册表分发。\n\n## 为什么要有统一入口\n\n如果每个渠道都各写一套入站主链路，会很快失控：\n\n- 验签逻辑散掉\n- 出站重试不一致\n- 监控和日志口径不一致\n- 新渠道接入成本越来越高\n\n所以 Wunder 当前用 `ChannelAdapterRegistry` 统一装配适配器。\n\n## Webhook 进来之后发生什么\n\n推荐把它理解成四步：\n\n1. 渠道请求进入 Webhook\n2. 适配器验签并标准化消息\n3. 消息快速 ACK 后进入后台队列\n4. 调度执行结果再通过 outbox 投递出去\n\n这意味着：\n\n- Webhook 不应该长时间卡在模型推理上\n- 出站失败也不应该反过来拖死入站\n\n## 长连接和 Webhook 是对立关系吗\n\n不是。\n\n有些渠道是 Webhook 为主，有些渠道支持长连接补充。\n\n例如系统里已经明确维护运行态的包括：\n\n- Feishu 长连接\n- QQBot 长连接\n- XMPP 长连接\n\n所以你不该把“渠道接入”简单理解成只有一个 Webhook URL。\n\n## outbox 是做什么的\n\noutbox 是出站缓冲层。\n\n它负责：\n\n- 异步投递\n- 重试\n- 失败状态记录\n- 兼容官方适配器和回退 URL\n\n这让渠道链路从“同步请求-同步返回”变成真正的可恢复异步系统。\n\n## 文件为什么会被改写成下载链接\n\n很多渠道客户端不能直接理解 Wunder 内部工作区路径。\n\n所以系统会把正文和附件中的：\n\n- `/workspaces/...`\n\n改写成：\n\n- `/wunder/temp_dir/download?...`\n\n这样外部渠道客户端才能真正点开。\n\n## 管理端看什么\n\n如果你在排查渠道问题，管理员侧最应该先看：\n\n- 渠道监控页\n- 账号运行态\n- 入站/出站统计\n- runtime logs\n\n这比只盯着模型日志更有效，因为很多问题根本发生在接入层。\n\n## 最常见的问题\n\n- 渠道账号配置存在，但 webhook 没通\n- 验签失败\n- outbox 持续重试\n- 长连接配置了但 worker 没起来\n- 文件链接没改写，导致外部客户端打不开\n\n## 延伸阅读\n\n- [管理端界面](/docs/zh-CN/surfaces/web-admin/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- [微信 iLink 渠道（新微信接入）](/docs/zh-CN/integration/weixin-channel/)\n- [API 索引](/docs/zh-CN/reference/api-index/)\n","source_path":"静态站文档/zh-CN/integration/channel-webhook.md"}</script>
