  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/mcp-endpoint","language":"zh-CN","title":"MCP 入口","summary":"Wunder 同时支持自托管 MCP 服务 `/wunder/mcp` 与外部 MCP 服务接入。","updated_at":"2026-04-02","read_when":["你要把 Wunder 作为 MCP 服务暴露出去","你要理解 Wunder 内部 MCP 与 extra_mcp 的关系"],"source_docs":["docs/API文档.md","docs/系统介绍.md","src/services/mcp.rs","config/wunder-example.yaml"],"tab":"接入","group":"扩展接入","group_path":["扩展接入"],"url":"/docs/zh-CN/integration/mcp-endpoint/","headings":[{"id":"section-1","level":1,"text":"MCP 入口"},{"id":"section-2","level":2,"text":"自托管 MCP 端点"},{"id":"section-3","level":2,"text":"自托管 MCP 适合什么"},{"id":"section-4","level":2,"text":"配置示例"},{"id":"section-5","level":2,"text":"external MCP 和 extramcp"},{"id":"section-6","level":2,"text":"管理端怎么看 MCP"},{"id":"section-7","level":2,"text":"MCP 和工具目录的关系"},{"id":"section-8","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/integration/a2a","next_slug":"zh-CN/surfaces/index","markdown":"# MCP 入口\n\nMCP 在 Wunder 里不是附属能力，而是正式接入面。\n\n当前你需要先分清两件事：\n\n1. Wunder 自己暴露的 MCP 服务是 `/wunder/mcp`\n2. Wunder 也可以作为 MCP 客户端去接别的服务，比如 `extra_mcp`\n\n## 自托管 MCP 端点\n\n- `POST /wunder/mcp`\n- 传输方式：Streamable HTTP\n\n当前 Rust 端内置暴露两个工具：\n\n- `excute`\n- `doc2md`\n\n注意，工具名当前实际就是 `excute`，文档需要按代码现状理解，不要自行改写成 `execute`。\n\n## 自托管 MCP 适合什么\n\n适合这些场景：\n\n- 让外部系统通过 MCP 方式调用 Wunder 的能力\n- 把 Wunder 挂入另一个 MCP 编排体系\n- 在同一套协议下暴露内部任务执行与文档解析能力\n\n## 配置示例\n\n```yaml\nmcp:\n  servers:\n    - name: wunder\n      endpoint: http://127.0.0.1:8000/wunder/mcp\n      enabled: false\n      transport: streamable-http\n```\n\n启用后，Wunder 会把这个 MCP 服务视为一个可调用的 MCP server。\n\n## external MCP 和 extra_mcp\n\n仓库里还保留了一个典型外部 MCP 服务：\n\n- `extra_mcp`\n\n它通常用来承载：\n\n- `db_query`\n- `db_export`\n- `kb_query`\n\n也就是说：\n\n- `/wunder/mcp` 偏“Wunder 自己暴露出去”\n- `extra_mcp` 偏“Wunder 去接进来的外部能力”\n\n## 管理端怎么看 MCP\n\n管理端已有一套 MCP 配置和调试入口，用来：\n\n- 配置 `mcp.servers`\n- 刷新工具清单\n- 调试远端工具调用\n\n因此文档接入顺序通常是：\n\n1. 先在配置里声明 MCP server\n2. 再在管理端确认工具规格是否能拉到\n3. 最后在 agent 或工具目录里开放给模型使用\n\n## MCP 和工具目录的关系\n\nWunder 不会把 MCP 当成“旁路系统”。\n\n它会把 MCP 工具和这些能力一起汇总进工具视图：\n\n- 内置工具\n- A2A 工具\n- Skills\n- 知识库工具\n- 用户自建工具\n\n所以对模型来说，MCP 最终还是工具目录的一部分。\n\n## 延伸阅读\n\n- [工具体系](/docs/zh-CN/concepts/tools/)\n- [A2A 接口](/docs/zh-CN/integration/a2a/)\n- [配置说明](/docs/zh-CN/reference/config/)\n","source_path":"使用说明书/zh-CN/integration/mcp-endpoint.md"}</script>
