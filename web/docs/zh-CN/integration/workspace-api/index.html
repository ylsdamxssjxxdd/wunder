  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/workspace-api","language":"zh-CN","title":"工作区 API","summary":"`/wunder/workspace*` 是 Wunder 的文件控制面，负责目录浏览、内容读写、上传下载和容器路由。","read_when":["你在做工作区面板、文件上传下载或产物回传","你要理解 `container_id` 为什么会覆盖 `agent_id`"],"source_docs":["docs/API文档.md","src/api/workspace.rs","docs/设计方案.md"],"tab":"接入","group":"核心接口","group_path":["核心接口"],"url":"/docs/zh-CN/integration/workspace-api/","headings":[{"id":"section-1","level":1,"text":"工作区 API"},{"id":"section-2","level":2,"text":"这页解决什么"},{"id":"section-3","level":2,"text":"最常用的接口"},{"id":"section-4","level":2,"text":"什么时候看这组接口"},{"id":"section-5","level":2,"text":"路由规则先记这一条"},{"id":"section-6","level":2,"text":"这组接口最容易用错的地方"},{"id":"section-7","level":3,"text":"把工作区当临时目录"},{"id":"section-8","level":3,"text":"直接传真实磁盘绝对路径"},{"id":"section-9","level":3,"text":"以为只有下载接口才需要 containerid"},{"id":"section-10","level":2,"text":"最短理解方式"},{"id":"section-11","level":2,"text":"你最需要记住的点"},{"id":"section-12","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/integration/chat-sessions","next_slug":"zh-CN/integration/temp-dir","markdown":"# 工作区 API\n\nWunder 的工作区接口不是简单的文件读写接口，而是文件隔离语义的外部控制面。\n\n## 这页解决什么\n\n这页只回答这些问题：\n\n- 工作区相关接口有哪些\n- `user_id`、`agent_id`、`container_id` 如何共同决定路由\n- 什么时候应该用工作区，而不是 `temp_dir`\n\n## 最常用的接口\n\n- `GET/DELETE /wunder/workspace`\n- `GET /wunder/workspace/content`\n- `GET /wunder/workspace/search`\n- `POST /wunder/workspace/upload`\n- `GET /wunder/workspace/download`\n- `GET /wunder/workspace/archive`\n- `POST /wunder/workspace/dir`\n- `POST /wunder/workspace/move`\n- `POST /wunder/workspace/copy`\n- `POST /wunder/workspace/batch`\n- `POST /wunder/workspace/file`\n\n## 什么时候看这组接口\n\n- 你要做文件树、文件预览和编辑器\n- 你要把工具产物落盘后继续处理\n- 你要按容器隔离不同智能体的产物\n- 你要给用户提供压缩下载或目录归档\n\n## 路由规则先记这一条\n\n工作区路由优先级当前很明确：\n\n1. 显式传入 `container_id`\n2. 否则看 `agent_id` 绑定的 `sandbox_container_id`\n3. 再回退到默认用户工作区或旧兼容路由\n\n所以当你显式传了 `container_id`，它的优先级高于 `agent_id`。\n\n## 这组接口最容易用错的地方\n\n### 把工作区当临时目录\n\n不对。\n\n工作区强调持久化和后续可继续处理，`temp_dir` 强调临时中转。\n\n### 直接传真实磁盘绝对路径\n\n不对。\n\n这里大多数接口都使用相对工作区路径，而不是宿主机绝对路径。\n\n### 以为只有下载接口才需要 `container_id`\n\n不对。\n\n当前 `/wunder/workspace*` 全部接口都支持显式 `container_id`。\n\n## 最短理解方式\n\n如果你在做一个文件面板，可以这样配：\n\n- 目录页：`GET /wunder/workspace`\n- 文件预览：`GET /wunder/workspace/content`\n- 搜索：`GET /wunder/workspace/search`\n- 写文件：`POST /wunder/workspace/file`\n- 上传：`POST /wunder/workspace/upload`\n- 导出：`GET /wunder/workspace/download` 或 `archive`\n\n## 你最需要记住的点\n\n- 工作区的核心不是文件 API，而是隔离后的文件空间。\n- 显式 `container_id` 会覆盖 `agent_id` 推导。\n- 工作区适合持久产物，`temp_dir` 适合中转与分发。\n\n## 相关文档\n\n- [工作区与容器](/docs/zh-CN/concepts/workspaces/)\n- [工作区路由参考](/docs/zh-CN/reference/workspace-routing/)\n- [临时目录与文档转换](/docs/zh-CN/integration/temp-dir/)\n","source_path":"静态站文档/zh-CN/integration/workspace-api.md"}</script>
