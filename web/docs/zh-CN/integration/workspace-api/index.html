  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/workspace-api","language":"zh-CN","title":"工作区 API","summary":"`/wunder/workspace*` 不只是文件接口，它决定文件到底落在哪个隔离工作区。","updated_at":"2026-03-20","read_when":["你在做工作区面板、文件上传下载或产物回传","你要理解 `container_id` 为什么会覆盖 `agent_id`"],"source_docs":["docs/API文档.md","src/api/workspace.rs","docs/设计方案.md"],"tab":"接入","group":"核心接口","group_path":["核心接口"],"url":"/docs/zh-CN/integration/workspace-api/","headings":[{"id":"section-1","level":1,"text":"工作区 API"},{"id":"section-2","level":2,"text":"本页重点"},{"id":"section-3","level":2,"text":"路由规则（先看）"},{"id":"section-4","level":2,"text":"这组接口用在什么地方"},{"id":"section-5","level":2,"text":"最常用的接口怎么分"},{"id":"section-6","level":2,"text":"常见误区"},{"id":"section-7","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/integration/chat-sessions","next_slug":"zh-CN/integration/temp-dir","markdown":"# 工作区 API\n\n如果你要做文件树、编辑器、上传下载或产物面板，这页先看。\n\n`/wunder/workspace*` 不只是文件读写接口，它决定文件到底落在哪个隔离空间。\n\n## 本页重点\n\n- 工作区相关接口有哪些\n- `user_id`、`agent_id`、`container_id` 如何共同决定路由\n- 什么时候应该用工作区，而不是 `temp_dir`\n\n## 路由规则（先看）\n\n工作区路由优先级当前很明确：\n\n1. 显式传入 `container_id`\n2. 否则看 `agent_id` 绑定的 `sandbox_container_id`\n3. 再回退到默认用户工作区或旧兼容路由\n\n所以当你显式传了 `container_id`，它的优先级高于 `agent_id`。\n\n## 这组接口用在什么地方\n\n- 文件树和目录浏览\n- 文件预览和编辑\n- 上传下载和压缩打包\n- 工具产物的持久化回传\n- 按容器隔离不同智能体的文件空间\n\n## 最常用的接口怎么分\n\n- `GET/DELETE /wunder/workspace`\n- `GET /wunder/workspace/content`\n- `GET /wunder/workspace/search`\n- `POST /wunder/workspace/upload`\n- `GET /wunder/workspace/download`\n- `GET /wunder/workspace/archive`\n- `POST /wunder/workspace/dir`\n- `POST /wunder/workspace/move`\n- `POST /wunder/workspace/copy`\n- `POST /wunder/workspace/batch`\n- `POST /wunder/workspace/file`\n\n如果你在做一个文件面板，可以这样理解：\n\n- 目录页：`GET /wunder/workspace`\n- 文件预览：`GET /wunder/workspace/content`\n- 搜索：`GET /wunder/workspace/search`\n- 写文件：`POST /wunder/workspace/file`\n- 上传：`POST /wunder/workspace/upload`\n- 导出：`GET /wunder/workspace/download` 或 `archive`\n\n## 常见误区\n\n- 把工作区当临时目录。工作区适合持久产物，`temp_dir` 适合中转。\n- 直接传真实磁盘绝对路径。这里大多数接口都使用相对工作区路径。\n- 以为只有下载接口才需要 `container_id`。实际上整组 `/wunder/workspace*` 都支持显式 `container_id`。\n\n## 延伸阅读\n\n- [工作区与容器](/docs/zh-CN/concepts/workspaces/)\n- [工作区路由参考](/docs/zh-CN/reference/workspace-routing/)\n- [临时目录与文档转换](/docs/zh-CN/integration/temp-dir/)\n","source_path":"静态站文档/zh-CN/integration/workspace-api.md"}</script>
