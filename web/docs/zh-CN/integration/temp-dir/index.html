  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/temp-dir","language":"zh-CN","title":"临时目录与文档转换","summary":"`/wunder/temp_dir/*` 负责临时上传、下载和中转；文档转换与聊天附件预处理分别走公共转换、调试转换和聊天域转换接口。","updated_at":"2026-04-04","read_when":["你要给外部系统发下载链接","你要区分工作区、temp_dir 和 doc2md 的职责"],"source_docs":["docs/API文档.md","docs/设计方案.md","src/api/temp_dir.rs","src/api/doc2md.rs","src/api/chat.rs"],"tab":"接入","group":"核心接口","group_path":["核心接口"],"url":"/docs/zh-CN/integration/temp-dir/","headings":[{"id":"section-1","level":1,"text":"临时目录与文档转换"},{"id":"section-2","level":2,"text":"本页重点"},{"id":"section-3","level":2,"text":"最常用的接口"},{"id":"section-4","level":2,"text":"什么时候应该用它"},{"id":"section-5","level":2,"text":"四类高频接口怎么分"},{"id":"section-6","level":2,"text":"为什么很多文件最后变成 tempdir 下载链接"},{"id":"section-7","level":2,"text":"常见误区"},{"id":"section-8","level":3,"text":"把 tempdir 当长期存储"},{"id":"section-9","level":3,"text":"把转换后的 Markdown 直接当工作区主文件"},{"id":"section-10","level":3,"text":"以为 tempdir 只给管理端用"},{"id":"section-11","level":2,"text":"实施建议"},{"id":"section-12","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/integration/workspace-api","next_slug":"zh-CN/integration/user-world","markdown":"# 临时目录与文档转换\n\n在 Wunder 里，`temp_dir` 是中转层，不是正式工作区。\n\n## 本页重点\n\n这页只解释四件事：\n\n- 什么应该放进 `temp_dir`\n- 什么情况下应该先经过文档转换\n- 聊天域的附件预处理接口怎么分\n- 为什么很多外部渠道最终拿到的是 `/wunder/temp_dir/download`\n\n## 最常用的接口\n\n- `POST /wunder/doc2md/convert`\n- `POST /wunder/attachments/convert`\n- `POST /wunder/chat/attachments/convert`\n- `POST /wunder/chat/attachments/media/process`\n- `GET /wunder/temp_dir/download`\n- `POST /wunder/temp_dir/upload`\n- `GET /wunder/temp_dir/list`\n- `POST /wunder/temp_dir/remove`\n\n## 什么时候应该用它\n\n- 你要临时上传一个文件给系统处理\n- 你要给外部客户端发一个可点击下载链接\n- 你要先把 doc/pdf/ppt/xlsx 之类文件转成 Markdown\n- 你在做调试面板附件解析\n- 你在做聊天输入区的文档、音频或视频附件预处理\n\n## 四类高频接口怎么分\n\n可以这样记：\n\n| 接口 | 面向对象 | 典型输出 |\n|------|----------|----------|\n| `/wunder/doc2md/convert` | 公共文档转换 | Markdown 内容 |\n| `/wunder/attachments/convert` | 调试面板 / 鉴权联调 | 与 `doc2md` 一致，但要求鉴权 |\n| `/wunder/chat/attachments/convert` | 聊天输入区的文档附件 | 供聊天域装配文本型 `attachments` |\n| `/wunder/chat/attachments/media/process` | 聊天输入区的音频 / 视频附件 | 音频转写结果，或视频拆出的图片帧 + 音轨附件 |\n\n补充两点：\n\n- 图片一般不走这些转换接口，直接作为聊天附件发送即可。\n- 视频不会直接发给模型，而是先拆成图片序列和音轨；重新抽帧依赖 `source_public_path`。\n\n## 为什么很多文件最后变成 `temp_dir` 下载链接\n\n因为很多外部客户端并不理解 Wunder 内部的工作区路径。\n\n所以系统会把：\n\n- `/workspaces/...`\n\n改写成：\n\n- `/wunder/temp_dir/download?...`\n\n这样渠道客户端或外部网页才能真正点开。\n\n聊天媒体预处理时，源文件通常先落到工作区公共路径；真正发给外部客户端下载时，系统仍可能再改写成 `temp_dir` 下载链接。\n\n## 常见误区\n\n### 把 `temp_dir` 当长期存储\n\n不对。\n\n它是中转区，不是长期业务资料区。\n\n### 把转换后的 Markdown 直接当工作区主文件\n\n不一定。\n\n先判断你需要的是“临时消费”还是“后续持续处理”。\n\n### 以为 `temp_dir` 只给管理端用\n\n也不对。\n\n它是正式公共中转层，很多外部渠道链路都会用到。\n\n## 实施建议\n\n- `temp_dir` 适合中转和分发，不适合长期沉淀业务文件。\n- 文档类转换先分清是公共能力、调试面板还是聊天输入区。\n- 音频 / 视频附件应走 `POST /wunder/chat/attachments/media/process`，不要直接把原始视频当模型输入。\n- 外部渠道能点击打开文件，通常依赖的是 `temp_dir` 下载链接。\n\n## 延伸阅读\n\n- [工作区 API](/docs/zh-CN/integration/workspace-api/)\n- [渠道 Webhook](/docs/zh-CN/integration/channel-webhook/)\n- [数据与存储](/docs/zh-CN/ops/data-and-storage/)\n","source_path":"使用说明书/zh-CN/integration/temp-dir.md"}</script>
