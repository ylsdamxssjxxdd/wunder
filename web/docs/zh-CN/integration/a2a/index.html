  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/a2a","language":"zh-CN","title":"A2A 接口","summary":"Wunder 通过 `/a2a` 提供 A2A JSON-RPC 标准接入，并通过 AgentCard 暴露能力发现入口。","updated_at":"2026-04-02","read_when":["你要让 Wunder 被别的智能体系统调用","你要把外部 A2A 服务接进 Wunder 的工具体系"],"source_docs":["docs/API文档.md","docs/系统介绍.md","src/api/a2a.rs","config/wunder-example.yaml"],"tab":"接入","group":"扩展接入","group_path":["扩展接入"],"url":"/docs/zh-CN/integration/a2a/","headings":[{"id":"section-1","level":1,"text":"A2A 接口"},{"id":"section-2","level":2,"text":"对外暴露的端点"},{"id":"section-3","level":2,"text":"目前的协议特征"},{"id":"section-4","level":2,"text":"AgentCard 有什么用"},{"id":"section-5","level":2,"text":"POST /a2a 适合什么场景"},{"id":"section-6","level":2,"text":"与 /wunder 的区别"},{"id":"section-7","level":2,"text":"在 Wunder 内部怎么使用外部 A2A"},{"id":"section-8","level":2,"text":"接入时要注意的点"},{"id":"section-9","level":2,"text":"适合 A2A 的任务"},{"id":"section-10","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/integration/external-login","next_slug":"zh-CN/integration/mcp-endpoint","markdown":"# A2A 接口\n\nA2A 解决的是“智能体系统之间如何标准化互通”。\n\n在 Wunder 里，这条链路有两层含义：\n\n1. Wunder 自己对外暴露 A2A 服务。\n2. Wunder 也能把外部 A2A 服务挂成 `a2a@service` 工具供模型调用。\n\n## 对外暴露的端点\n\n- `POST /a2a`\n- `GET /.well-known/agent-card.json`\n- `GET /a2a/agentCard`\n- `GET /a2a/extendedAgentCard`\n\n## 目前的协议特征\n\n- 请求协议：JSON-RPC 2.0\n- A2A protocol version：`1.0`\n- 支持流式返回\n- 支持 AgentCard 能力发现\n- 当配置了 `api_key` 时，AgentCard 会同时声明 API Key 安全方案\n\n## AgentCard 有什么用\n\nAgentCard 主要用于告诉外部系统：\n\n- 你的服务叫什么\n- 它的入口 URL 是什么\n- 它支持哪些技能\n- 它支持哪些工具类别\n- 它是否支持流式\n\n也就是说，AgentCard 是“发现和介绍自己”的那一层。\n\n## `POST /a2a` 适合什么场景\n\n适合这些场景：\n\n- 让外部智能体平台把 Wunder 当成一个远端协作体\n- 让外部系统通过统一标准接入 Wunder 的模型和工具能力\n- 做跨系统智能体编排，而不是只做单系统工具调用\n\n## 与 `/wunder` 的区别\n\n- `/wunder` 更像 Wunder 自己的统一执行入口\n- `/a2a` 更像对外互操作协议入口\n\n如果你接的是业务系统内部调用，通常先用 `/wunder`。\n\n如果你接的是“另一套智能体系统”，再优先考虑 `/a2a`。\n\n## 在 Wunder 内部怎么使用外部 A2A\n\n配置文件里可以声明外部 A2A 服务：\n\n```yaml\na2a:\n  services:\n    - name: wunder\n      endpoint: http://127.0.0.1:8000/a2a\n      enabled: false\n```\n\n启用后，这个服务会在工具侧以 `a2a@wunder` 的形式出现。\n\n系统还内置了两个辅助工具：\n\n- `a2a观察`\n- `a2a等待`\n\n它们分别用于观察任务状态和等待结果收敛。\n\n## 接入时要注意的点\n\n- A2A 服务名最终会变成工具名的一部分，例如 `a2a@service_name`\n- `service_type=internal` 的服务通常需要固定 `user_id`\n- 是否允许自调用由 `allow_self` 控制\n- 超时由 `a2a.timeout_s` 控制\n\n## 适合 A2A 的任务\n\n适合放到 A2A 的，通常是这些：\n\n- 远端专业能力\n- 跨系统智能体协同\n- 需要明确协议边界的外部代理调用\n\n不适合放到 A2A 的，通常是：\n\n- 只在本系统内执行的普通文件工具\n- 单机内建能力\n- 没有必要跨系统的同步调用\n\n## 延伸阅读\n\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n- [MCP 入口](/docs/zh-CN/integration/mcp-endpoint/)\n- [蜂群协作](/docs/zh-CN/concepts/swarm/)\n","source_path":"使用说明书/zh-CN/integration/a2a.md"}</script>
