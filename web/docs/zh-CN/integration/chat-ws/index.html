  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/chat-ws","language":"zh-CN","title":"聊天 WebSocket","summary":"`/wunder/chat/ws` 是 Wunder 聊天主实时通道；实时会话优先 WS，SSE 作为兜底。","updated_at":"2026-04-02","read_when":["你在开发聊天 UI 或桌面实时会话","你要处理 start/resume/watch/cancel/approval"],"source_docs":["docs/API文档.md","docs/系统介绍.md","src/api/chat_ws.rs"],"tab":"接入","group":"核心接口","group_path":["核心接口"],"url":"/docs/zh-CN/integration/chat-ws/","headings":[{"id":"section-1","level":1,"text":"聊天 WebSocket"},{"id":"section-2","level":2,"text":"适用场景"},{"id":"section-3","level":2,"text":"端点"},{"id":"section-4","level":2,"text":"连接后可做的动作"},{"id":"section-5","level":2,"text":"最短接入顺序"},{"id":"section-6","level":2,"text":"最小握手示例"},{"id":"section-7","level":2,"text":"启动一次执行"},{"id":"section-8","level":2,"text":"客户端建议重点消费的事件"},{"id":"section-9","level":2,"text":"常见误区"},{"id":"section-10","level":2,"text":"失败回退"},{"id":"section-11","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/integration/wunder-api","next_slug":"zh-CN/integration/chat-sessions","markdown":"# 聊天 WebSocket\n\n`/wunder/chat/ws` 不只是“事件推流”，它同时是会话控制通道。\n\n## 适用场景\n\n- 聊天工作台或桌面会话\n- 同连接内执行 `start / resume / watch / cancel`\n- 需要长连接保活与实时状态一致性\n\n## 端点\n\n- `GET /wunder/chat/ws`\n\n## 连接后可做的动作\n\n- `connect`：握手与协议协商\n- `start`：启动一次执行\n- `resume`：断线后续传事件\n- `watch`：只观察某个会话\n- `cancel`：取消当前执行\n- `approval`：回传审批决策\n- `ping`：保活\n\n服务端关键回包：`ready`、`event`、`error`、`pong`\n\n## 最短接入顺序\n\n1. `POST /wunder/chat/sessions` 拿到 `session_id`\n2. 建立 `WebSocket /wunder/chat/ws`\n3. 发送 `connect`\n4. 收到 `ready`\n5. 发送 `start`\n6. 消费后续 `event`，直至 `turn_terminal`\n\n## 最小握手示例\n\n```json\n{\n  \"kind\": \"connect\",\n  \"request_id\": \"req_connect_01\",\n  \"payload\": {\n    \"protocol_version\": \"1.0\",\n    \"client_name\": \"my-chat-ui\"\n  }\n}\n```\n\n## 启动一次执行\n\n```json\n{\n  \"kind\": \"start\",\n  \"request_id\": \"req_start_01\",\n  \"session_id\": \"sess_xxx\",\n  \"payload\": {\n    \"content\": \"继续帮我整理刚才那份周报\",\n    \"stream\": true\n  }\n}\n```\n\n## 客户端建议重点消费的事件\n\n- `queued`\n- `approval_resolved`\n- `error`\n- `turn_terminal`\n\n`turn_terminal` 是单轮执行的终态信号，建议作为前端收敛条件。\n\n## 常见误区\n\n- `start` 必须显式传 `session_id`。\n- 文本字段是 `content`，不是 `/wunder` 的 `question`。\n- `resume`（补事件）和 `watch`（观察会话）不是同一个动作。\n- WS 审批只处理 `source=chat_ws` 的审批项。\n\n## 失败回退\n\nWS 不可用时：\n\n- 回退 `POST /wunder`（SSE）\n- 或回退 `GET /wunder/chat/sessions/{session_id}/resume`\n\n## 延伸阅读\n\n- [聊天会话](/docs/zh-CN/integration/chat-sessions/)\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n- [流式事件参考](/docs/zh-CN/reference/stream-events/)\n","source_path":"静态站文档/zh-CN/integration/chat-ws.md"}</script>
