  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/chat-ws","language":"zh-CN","title":"聊天 WebSocket","summary":"`/wunder/chat/ws` 是 Wunder 聊天域的主实时通道；实时会话优先走它，SSE 只做兜底。","updated_at":"2026-03-20","read_when":["你要做聊天界面或桌面实时会话","你要优先使用 WebSocket，而不是只接 SSE"],"source_docs":["docs/API文档.md","docs/系统介绍.md","src/api/chat_ws.rs"],"tab":"接入","group":"核心接口","group_path":["核心接口"],"url":"/docs/zh-CN/integration/chat-ws/","headings":[{"id":"section-1","level":1,"text":"聊天 WebSocket"},{"id":"section-2","level":2,"text":"这页解决什么"},{"id":"section-3","level":2,"text":"先记这条"},{"id":"section-4","level":2,"text":"端点"},{"id":"section-5","level":2,"text":"什么时候优先接 WebSocket"},{"id":"section-6","level":2,"text":"为什么它比直接 SSE 更适合聊天"},{"id":"section-7","level":2,"text":"最短接入顺序"},{"id":"section-8","level":2,"text":"客户端会发什么"},{"id":"section-9","level":2,"text":"服务端会回什么"},{"id":"section-10","level":2,"text":"最小握手示例"},{"id":"section-11","level":2,"text":"启动一次执行"},{"id":"section-12","level":2,"text":"最容易搞错的点"},{"id":"section-13","level":2,"text":"建议重点消费这些事件"},{"id":"section-14","level":2,"text":"失败回退"},{"id":"section-15","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/integration/wunder-api","next_slug":"zh-CN/integration/chat-sessions","markdown":"# 聊天 WebSocket\n\n如果你在做实时聊天 UI，这页比 SSE 更该先看。\n\nWunder 的实时对话链路默认优先走 WebSocket，SSE 作为兜底。\n\n## 这页解决什么\n\n- 如何接入 `/wunder/chat/ws`\n- 为什么聊天产品优先走 WebSocket\n- start、resume、watch、cancel 和审批回传怎么理解\n\n## 先记这条\n\n- WebSocket 不只是事件流，它同时承担会话控制。\n- 你可以在同一条连接里 start、resume、watch、cancel 和 approval。\n- 这比“一个请求 + 一条 SSE”更适合聊天工作台。\n\n## 端点\n\n- `GET /wunder/chat/ws`\n\n## 什么时候优先接 WebSocket\n\n- 你要做聊天页或桌面端会话\n- 你要切换会话后继续 watch 某个 session\n- 你要在一条连接里做启动、取消、恢复和审批\n- 你要长连接保活和更完整的运行态控制\n\n## 为什么它比直接 SSE 更适合聊天\n\n它不只是把事件推给你，还把“会话控制”也放进了同一条连接：\n\n- 启动会话执行\n- 续传历史事件\n- 只观察某个会话\n- 取消当前执行\n- 回传审批决策\n- 心跳保活\n\n## 最短接入顺序\n\n1. 先通过 `/wunder/chat/sessions` 创建或拿到 `session_id`\n2. 建立 `WebSocket /wunder/chat/ws`\n3. 发送 `connect`\n4. 收到 `ready`\n5. 发送 `start`\n6. 处理后续 `event / error / pong`\n\n## 客户端会发什么\n\n- `connect`\n- `start`\n- `resume`\n- `watch`\n- `cancel`\n- `approval`\n- `ping`\n\n## 服务端会回什么\n\n- `ready`\n- `event`\n- `error`\n- `pong`\n\n## 最小握手示例\n\n```json\n{\n  \"kind\": \"connect\",\n  \"request_id\": \"req_connect_01\",\n  \"payload\": {\n    \"protocol_version\": \"1.0\",\n    \"client_name\": \"my-chat-ui\"\n  }\n}\n```\n\n收到 `ready` 后，可以开始发送业务消息。\n\n## 启动一次执行\n\n```json\n{\n  \"kind\": \"start\",\n  \"request_id\": \"req_start_01\",\n  \"session_id\": \"sess_xxx\",\n  \"payload\": {\n    \"content\": \"继续帮我整理刚才那份周报\",\n    \"stream\": true\n  }\n}\n```\n\n## 最容易搞错的点\n\n- `start` 需要明确 `session_id`。\n- payload 里的文本字段是 `content`，不是 `/wunder` 里的 `question`。\n- `resume` 是断线补事件，`watch` 是只观察会话，不要把两者混成一个动作。\n- 当前实现里，WebSocket 只处理 `source=chat_ws` 的审批项，不会误操作渠道侧审批。\n\n## 建议重点消费这些事件\n\n虽然 `event.data` 里会有很多业务事件，但对实时会话面板来说，这几个最关键：\n\n- `queued`\n- `approval_resolved`\n- `error`\n- `turn_terminal`\n\n尤其是 `turn_terminal`，它是单轮执行的最终终态信号。\n\n## 失败回退\n\n如果 WebSocket 不可用：\n\n- 聊天链路可以回退到 `/wunder` SSE\n- 或回退到 `/wunder/chat/sessions/{session_id}/resume`\n\nWunder 的设计不是“只有 WS 能用”，而是“WS 优先，SSE 保底”。\n\n## 相关文档\n\n- [聊天会话](/docs/zh-CN/integration/chat-sessions/)\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"静态站文档/zh-CN/integration/chat-ws.md"}</script>
