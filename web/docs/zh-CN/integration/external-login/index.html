  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/external-login","language":"zh-CN","title":"外部登录与免登嵌入","summary":"Wunder 保留 `/wunder/auth/external/*` 作为外部系统嵌入和免登接入面。","updated_at":"2026-03-20","read_when":["你要从外部系统直接进入 Wunder","你想分清 external login、launch 和 token_login 的用途"],"source_docs":["docs/API文档.md","docs/设计方案.md","config/wunder-example.yaml","src/api/auth.rs"],"tab":"接入","group":"扩展接入","group_path":["扩展接入"],"url":"/docs/zh-CN/integration/external-login/","headings":[{"id":"section-1","level":1,"text":"外部登录与免登嵌入"},{"id":"section-2","level":2,"text":"为什么不能直接复用普通登录"},{"id":"section-3","level":2,"text":"常见接口"},{"id":"section-4","level":2,"text":"tokenlogin 现在适合什么"},{"id":"section-5","level":2,"text":"为什么还会有 launch / code"},{"id":"section-6","level":2,"text":"安全边界靠什么"},{"id":"section-7","level":2,"text":"接入后会跳到哪里"},{"id":"section-8","level":2,"text":"这套链路适合什么场景"},{"id":"section-9","level":2,"text":"常见误区"},{"id":"section-10","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/integration/channel-webhook","next_slug":"zh-CN/integration/a2a","markdown":"# 外部登录与免登嵌入\n\nWunder 当前保留了一整组外部接入接口：\n\n- `/wunder/auth/external/*`\n\n它们解决的不是普通管理员登录，而是：\n\n- 外部系统嵌入\n- 免登跳转\n- 对齐用户身份\n- 发放 Wunder 自己的登录态\n\n## 为什么不能直接复用普通登录\n\n因为外部系统接入通常有这些特点：\n\n- 用户已经在外部系统里登录了\n- Wunder 只负责承接会话，不适合再让用户输一遍密码\n- 登录后还要直接跳到指定聊天或嵌入页面\n\n所以 Wunder 专门保留了 external 接入面。\n\n## 常见接口\n\n当前代码里至少有这些入口：\n\n- `POST /wunder/auth/external/login`\n- `POST /wunder/auth/external/code`\n- `POST /wunder/auth/external/launch`\n- `POST /wunder/auth/external/token_launch`\n- `POST /wunder/auth/external/token_login`\n- `POST /wunder/auth/external/exchange`\n\n最常见场景可先按下面方式处理：\n\n- `token_login`\n\n## `token_login` 现在适合什么\n\n当前最典型的用法是：\n\n- 外部系统拿 `token + user_id`\n- Wunder 直接换出自己的 `access_token`\n- 同时返回 `agent_id`\n- 前端直接跳嵌入聊天页\n\n也就是说，它更像“外部身份换 Wunder 会话”的桥接接口。\n\n## 为什么还会有 launch / code\n\n因为不同外部系统的接法不一样。\n\n有些系统适合：\n\n- 先申请一次性 code\n- 再交换登录态\n\n有些系统适合：\n\n- 直接 launch\n- 直接跳目标页面\n\nWunder 保留这些入口，是为了兼容不同嵌入方式，而不是要求所有接入方都走一条固定流程。\n\n## 安全边界靠什么\n\n这条链路的关键配置是：\n\n- `security.external_auth_key`\n\n如果它没显式配置，当前会自动回退到：\n\n- `security.api_key`\n\n所以默认并不是“裸开”。\n\n## 接入后会跳到哪里\n\n当前嵌入聊天最典型的目标路由是：\n\n- `/app/embed/chat`\n- `/desktop/embed/chat`\n\n也就是说，Wunder 不是只返回 token，还会给出一个适合前端直接进入的落点。\n\n## 这套链路适合什么场景\n\n适合：\n\n- 统一门户嵌入 Wunder\n- 外部系统单点进入指定智能体\n- 团队系统把用户身份带进 Wunder\n\n不适合：\n\n- 替代管理员后台登录\n- 替代普通用户账号密码体系\n\n## 常见误区\n\n- 只配了外部 JWT，却没配 external_auth_key 回退\n- 只拿到 token，没有处理返回的 `agent_id`\n- 想改当前线程提示词，却忘了外链只会影响新线程\n- 把外部免登当成了普通开放接口\n\n## 延伸阅读\n\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n- [用户世界接口](/docs/zh-CN/integration/user-world/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n","source_path":"静态站文档/zh-CN/integration/external-login.md"}</script>
