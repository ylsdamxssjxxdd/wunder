  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/wunder-api","language":"zh-CN","title":"wunder API","summary":"`/wunder` 是底层执行入口；如果你要稳定绑定某个智能体或做完整聊天产品，优先走 `/wunder/chat/*`。","updated_at":"2026-03-20","read_when":["你要从业务系统接入 Wunder","你需要判断该走 `/wunder` 还是 `/wunder/chat/*`"],"source_docs":["docs/API文档.md","docs/系统介绍.md","docs/设计方案.md"],"tab":"接入","group":"核心接口","group_path":["核心接口"],"url":"/docs/zh-CN/integration/wunder-api/","headings":[{"id":"section-1","level":1,"text":"wunder API"},{"id":"section-2","level":2,"text":"这页解决什么"},{"id":"section-3","level":2,"text":"先做这个判断"},{"id":"section-4","level":2,"text":"什么时候直接调 /wunder"},{"id":"section-5","level":2,"text":"什么时候不要先调 /wunder"},{"id":"section-6","level":2,"text":"一条更稳的接入链路"},{"id":"section-7","level":2,"text":"需要传哪些身份字段"},{"id":"section-8","level":2,"text":"最小请求示例"},{"id":"section-9","level":2,"text":"最容易搞错的点"},{"id":"section-10","level":2,"text":"相关接口"},{"id":"section-11","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/integration/index","next_slug":"zh-CN/integration/chat-ws","markdown":"# wunder API\n\n如果你只是想把 Wunder 当能力服务接进去，这页先看。\n\n先记一条：`/wunder` 是底层执行入口；如果你要稳定绑定某个智能体人格，或者你在做完整聊天产品，优先走 `/wunder/chat/*`。\n\n## 这页解决什么\n\n- 什么时候直接调 `/wunder`\n- 什么时候不要先调 `/wunder`\n- 一条更稳的智能体接入链路是什么\n\n## 先做这个判断\n\n- 你要“把 Wunder 当能力服务调用”，可以先看 `/wunder`\n- 你要“把 Wunder 当聊天系统接入”，先看 `/wunder/chat/*`\n- 你要稳定绑定某个独立人格智能体，也优先走聊天域\n\n## 什么时候直接调 `/wunder`\n\n- 承接 `user_id + question` 形式的直接执行请求\n- 支持 SSE 流式输出和非流式 JSON 返回\n- 允许调用方显式覆盖 `tool_names`、`model_name`、`config_overrides`\n- 可接受 `agent_id`，但当前主要用于主会话绑定和工作区/容器路由\n\n## 什么时候不要先调 `/wunder`\n\n- 你要按 `agent_id` 自动补齐完整智能体快照\n- 你要读取该会话当前实际冻结的 `system_prompt`\n- 你要会话列表、取消、恢复、事件回放和聊天工作台能力\n- 你要把某个独立人格智能体作为稳定产品接口发布\n\n## 一条更稳的接入链路\n\n推荐链路：\n\n`GET /wunder/agents` -> `POST /wunder/chat/sessions` -> `POST /wunder/chat/sessions/{session_id}/messages`\n\n1. `GET /wunder/agents`\n2. 从返回的 `data.items[].id` 里选出目标 `agent_id`\n3. `POST /wunder/chat/sessions` 创建该智能体下的新会话\n4. `POST /wunder/chat/sessions/{session_id}/messages` 发送消息\n\n这条链路的意义是：服务端会在聊天域里按会话绑定的 `agent_id` 自动补齐该智能体的配置快照。\n\n## 需要传哪些身份字段\n\n- `user_id`：表示调用者和隔离空间，可以是注册用户，也可以是在 API Key/管理员场景下使用的虚拟用户\n- `agent_id`：表示目标智能体应用\n\n外部调用方当前不需要显式传“智能体拥有者的 user_id”或额外的 owner 标识。\n\n## 最小请求示例\n\n```json\n{\n  \"user_id\": \"demo_user\",\n  \"question\": \"帮我整理今天的工作计划\",\n  \"stream\": true\n}\n```\n\n常用补充字段：\n\n- `session_id`：复用已有会话\n- `agent_id`：绑定目标智能体作用域\n- `model_name`：临时指定模型配置\n- `tool_names`：显式启用工具\n- `agent_prompt`：仅适合高级集成的低层提示词覆盖\n- `attachments`：附件列表\n\n## 最容易搞错的点\n\n- `/wunder` 能传 `agent_id`，不等于它就是最稳的智能体发布协议。\n- 直调 `/wunder` 时，如果想贴近某个智能体当前配置，很多默认项要你自己补。\n- `user_id` 用来表示调用者和隔离空间，不要求一定是已注册用户。\n\n## 相关接口\n\n- `POST /wunder`\n- `POST /wunder/system_prompt`\n- `GET /wunder/tools`\n- `GET /wunder/agents`\n- `POST /wunder/chat/sessions`\n- `POST /wunder/chat/sessions/{session_id}/messages`\n\n## 相关文档\n\n- [聊天会话](/docs/zh-CN/integration/chat-sessions/)\n- [聊天 WebSocket](/docs/zh-CN/integration/chat-ws/)\n- [A2A 接口](/docs/zh-CN/integration/a2a/)\n- [API 索引](/docs/zh-CN/reference/api-index/)\n","source_path":"静态站文档/zh-CN/integration/wunder-api.md"}</script>
