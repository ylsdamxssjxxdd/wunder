  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/wunder-api","language":"zh-CN","title":"wunder API","summary":"`/wunder` 是统一执行入口，适合能力调用；当你要做完整聊天产品时，优先切到 `/wunder/chat/*`。","updated_at":"2026-04-04","read_when":["你要从业务系统接入 Wunder","你要判断该走 `/wunder` 还是 `/wunder/chat/*`"],"source_docs":["docs/API文档.md","docs/系统介绍.md","docs/设计方案.md"],"tab":"接入","group":"核心接口","group_path":["核心接口"],"url":"/docs/zh-CN/integration/wunder-api/","headings":[{"id":"section-1","level":1,"text":"wunder API"},{"id":"section-2","level":2,"text":"什么时候优先用 /wunder"},{"id":"section-3","level":2,"text":"什么时候不要只用 /wunder"},{"id":"section-4","level":2,"text":"推荐接入链路（稳定绑定智能体）"},{"id":"section-5","level":2,"text":"请求字段（最小集合）"},{"id":"section-6","level":2,"text":"附件不要一股脑直接丢给 /wunder"},{"id":"section-7","level":2,"text":"身份字段说明"},{"id":"section-8","level":2,"text":"常见误区"},{"id":"section-9","level":2,"text":"相关接口"},{"id":"section-10","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/integration/index","next_slug":"zh-CN/integration/chat-ws","markdown":"# wunder API\n\n`POST /wunder` 适合“把 Wunder 当执行能力调用”。\n\n如果你要做会话列表、恢复、取消、实时工作台，建议直接进入聊天域：`/wunder/chat/*`。\n\n## 什么时候优先用 `/wunder`\n\n- 一次请求触发一次执行\n- 调用侧只需要 `user_id + question` 语义\n- 需要快速接入并支持流式输出（SSE）\n\n## 什么时候不要只用 `/wunder`\n\n- 你要完整会话生命周期管理\n- 你要稳定绑定智能体并读取冻结提示词\n- 你要做聊天产品级 UI（历史、恢复、取消、观察）\n\n## 推荐接入链路（稳定绑定智能体）\n\n`GET /wunder/agents` -> `POST /wunder/chat/sessions` -> `POST /wunder/chat/sessions/{session_id}/messages`\n\n1. 用 `GET /wunder/agents` 获取目标 `agent_id`\n2. 用 `POST /wunder/chat/sessions` 创建会话并绑定智能体\n3. 用 `POST /wunder/chat/sessions/{session_id}/messages` 发送消息\n4. 用 WS 或 `resume` 消费流式事件\n\n## 请求字段（最小集合）\n\n```json\n{\n  \"user_id\": \"demo_user\",\n  \"question\": \"帮我整理今天的工作计划\",\n  \"stream\": true\n}\n```\n\n常用补充字段：\n\n- `session_id`：复用会话\n- `agent_id`：指定智能体范围\n- `model_name`：临时覆盖模型\n- `tool_names`：显式挂载工具\n- `config_overrides`：局部配置覆盖\n- `attachments`：附件输入（图片可直接传；文档、音频、视频建议先做预处理）\n\n## 附件不要一股脑直接丢给 `/wunder`\n\n官方前端现在对附件的处理是分流的：\n\n- 图片：可直接作为视觉上下文进入 `attachments`\n- 文档：通常先走 `/wunder/chat/attachments/convert` 或 `/wunder/doc2md/convert`，转成文本再提交\n- 音频：先走 `/wunder/chat/attachments/media/process`，把语音转成文本附件\n- 视频：先走 `/wunder/chat/attachments/media/process`，拆成图片序列和音轨附件；不是直接把原始视频发给模型\n\n如果你绕过这些预处理，自己直接调 `/wunder`，那附件拆解、转写、抽帧和体积控制都要由接入方自己负责。\n\n## 身份字段说明\n\n- `user_id` 表示调用者与隔离空间，不要求一定是已注册用户。\n- `agent_id` 表示目标智能体。\n\n## 常见误区\n\n- `/wunder` 支持 `agent_id`，不代表它等价于聊天域的完整能力。\n- 如果直接调 `/wunder`，很多会话治理能力要你自行补齐。\n- 把 `user_id` 误解为“必须来自用户管理表”，会导致不必要的接入限制。\n\n## 相关接口\n\n- `POST /wunder`\n- `POST /wunder/system_prompt`\n- `GET /wunder/tools`\n- `GET /wunder/agents`\n- `POST /wunder/chat/sessions`\n- `POST /wunder/chat/sessions/{session_id}/messages`\n\n## 延伸阅读\n\n- [聊天会话](/docs/zh-CN/integration/chat-sessions/)\n- [聊天 WebSocket](/docs/zh-CN/integration/chat-ws/)\n- [API 索引](/docs/zh-CN/reference/api-index/)\n","source_path":"使用说明书/zh-CN/integration/wunder-api.md"}</script>
