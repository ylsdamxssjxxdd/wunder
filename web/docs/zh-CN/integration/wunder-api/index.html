  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/integration/wunder-api","language":"zh-CN","title":"wunder API","summary":"`/wunder` 是 Wunder 的底层执行入口；如果你要稳定调用独立人格智能体，优先走 `/wunder/chat/*`。","read_when":["你要从业务系统接入 Wunder","你需要判断该走 `/wunder` 还是 `/wunder/chat/*`"],"source_docs":["docs/API文档.md","docs/系统介绍.md","docs/设计方案.md"],"tab":"接入","group":"核心接口","group_path":["核心接口"],"url":"/docs/zh-CN/integration/wunder-api/","headings":[{"id":"section-1","level":1,"text":"wunder API"},{"id":"section-2","level":2,"text":"/wunder 负责什么"},{"id":"section-3","level":2,"text":"/wunder 当前不负责什么"},{"id":"section-4","level":2,"text":"推荐的开发者接入流程"},{"id":"section-5","level":2,"text":"需要传哪些身份字段"},{"id":"section-6","level":2,"text":"最小请求示例"},{"id":"section-7","level":2,"text":"相关接口"},{"id":"section-8","level":2,"text":"什么时候优先不用 /wunder"},{"id":"section-9","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/integration/index","next_slug":"zh-CN/integration/chat-ws","markdown":"# wunder API\n\n`POST /wunder` 现在更适合作为底层执行内核和调试入口，不应再把它理解为“调用任意独立人格智能体的唯一公开接口”。\n\n> 推荐链路：\n> `GET /wunder/agents` -> `POST /wunder/chat/sessions` -> `POST /wunder/chat/sessions/{session_id}/messages`\n\n## `/wunder` 负责什么\n\n- 承接 `user_id + question` 形式的直接执行请求\n- 支持 SSE 流式输出和非流式 JSON 返回\n- 允许调用方显式覆盖 `tool_names`、`model_name`、`config_overrides`\n- 可接受 `agent_id`，但当前主要用于主会话绑定和工作区/容器路由\n\n## `/wunder` 当前不负责什么\n\n- 不会像 `/wunder/chat/*` 一样按 `agent_id` 自动补齐完整智能体快照\n- 不会自动解析目标智能体当前的 `system_prompt`、模型、工具默认集和审批模式\n- 不应被当成“对外发布单个智能体人格”的稳定调用协议\n\n如果你必须直调 `/wunder`，又想尽量贴近某个智能体当前行为，需要自己传入 `agent_prompt` 等覆盖字段；更稳妥的方式仍然是改走聊天域。\n\n## 推荐的开发者接入流程\n\n1. `GET /wunder/agents`\n2. 从返回的 `data.items[].id` 里选出目标 `agent_id`\n3. `POST /wunder/chat/sessions` 创建该智能体下的新会话\n4. `POST /wunder/chat/sessions/{session_id}/messages` 发送消息\n\n这条链路的意义是：服务端会在聊天域里按会话绑定的 `agent_id` 自动补齐该智能体的配置快照。\n\n## 需要传哪些身份字段\n\n- `user_id`：表示调用者和隔离空间，可以是注册用户，也可以是在 API Key/管理员场景下使用的虚拟用户\n- `agent_id`：表示目标智能体应用\n\n外部调用方当前不需要显式传“智能体拥有者的 user_id”或额外的 owner 标识。\n\n## 最小请求示例\n\n```json\n{\n  \"user_id\": \"demo_user\",\n  \"question\": \"帮我整理今天的工作计划\",\n  \"stream\": true\n}\n```\n\n常用补充字段：\n\n- `session_id`：复用已有会话\n- `agent_id`：绑定目标智能体作用域\n- `model_name`：临时指定模型配置\n- `tool_names`：显式启用工具\n- `agent_prompt`：仅适合高级集成的低层提示词覆盖\n- `attachments`：附件列表\n\n## 相关接口\n\n- `POST /wunder`\n- `POST /wunder/system_prompt`\n- `GET /wunder/tools`\n- `GET /wunder/agents`\n- `POST /wunder/chat/sessions`\n- `POST /wunder/chat/sessions/{session_id}/messages`\n\n## 什么时候优先不用 `/wunder`\n\n如果你的目标是下面这些场景，优先使用 `/wunder/chat/*`：\n\n- 完整聊天 UI\n- 需要稳定复用某个独立人格智能体\n- 需要会话列表、取消、恢复、事件回放\n- 需要读取“该会话当前实际使用的系统提示词”\n\n`/wunder` 更像底层执行入口；`/wunder/chat/*` 更像完整聊天域和智能体会话控制面。\n\n## 相关文档\n\n- [聊天会话](/docs/zh-CN/integration/chat-sessions/)\n- [聊天 WebSocket](/docs/zh-CN/integration/chat-ws/)\n- [A2A 接口](/docs/zh-CN/integration/a2a/)\n- [API 索引](/docs/zh-CN/reference/api-index/)\n","source_path":"静态站文档/zh-CN/integration/wunder-api.md"}</script>
