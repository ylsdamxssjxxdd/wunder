  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/reference/config","language":"zh-CN","title":"系统设置参考","summary":"常用设置项的含义与推荐值，帮助理解各项配置的作用。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"系统参考","group_path":["系统参考"],"url":"/docs/zh-CN/reference/config/","headings":[{"id":"section-1","level":1,"text":"系统设置参考"},{"id":"section-2","level":2,"text":"设置分类"},{"id":"section-3","level":2,"text":"基础设置"},{"id":"section-4","level":3,"text":"服务地址与端口"},{"id":"section-5","level":3,"text":"运行模式"},{"id":"section-6","level":3,"text":"并发限制"},{"id":"section-7","level":2,"text":"安全设置"},{"id":"section-8","level":3,"text":"API 密钥"},{"id":"section-9","level":3,"text":"访问路径控制"},{"id":"section-10","level":3,"text":"外部认证密钥"},{"id":"section-11","level":2,"text":"存储设置"},{"id":"section-12","level":3,"text":"数据库类型"},{"id":"section-13","level":3,"text":"工作区位置"},{"id":"section-14","level":3,"text":"向量存储"},{"id":"section-15","level":2,"text":"工具设置"},{"id":"section-16","level":3,"text":"内置工具开关"},{"id":"section-17","level":3,"text":"浏览器工具"},{"id":"section-18","level":3,"text":"MCP 扩展工具"},{"id":"section-19","level":2,"text":"模型设置"},{"id":"section-20","level":3,"text":"可用模型列表"},{"id":"section-21","level":3,"text":"上下文限制"},{"id":"section-22","level":2,"text":"渠道设置"},{"id":"section-23","level":3,"text":"渠道账号绑定"},{"id":"section-24","level":3,"text":"Webhook 配置"},{"id":"section-25","level":2,"text":"配置生效规则"},{"id":"section-26","level":3,"text":"修改后何时生效"},{"id":"section-27","level":3,"text":"配置层级"},{"id":"section-28","level":2,"text":"常见配置误区"},{"id":"section-29","level":2,"text":"按场景的配置建议"},{"id":"section-30","level":3,"text":"个人本地使用（Desktop）"},{"id":"section-31","level":3,"text":"团队协作（Server）"},{"id":"section-32","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/reference/api-index","next_slug":"zh-CN/reference/stream-events","markdown":"# 系统设置参考\n\n这页解释各项系统设置的含义，帮助你在需要调整配置时做出正确选择。\n\n## 设置分类\n\nWunder 的设置按职责分为几大类：\n\n- **基础设置**：服务地址、端口、运行模式\n- **安全设置**：访问控制、权限边界\n- **存储设置**：数据存储位置和方式\n- **工具设置**：可用工具范围\n- **模型设置**：AI 模型选择和参数\n- **渠道设置**：外部平台接入\n\n## 基础设置\n\n### 服务地址与端口\n\n**作用**：决定 Wunder 服务监听的网络地址和端口。\n\n**推荐做法**：\n- 本地使用：默认值即可\n- 团队部署：设置团队可访问的地址\n\n### 运行模式\n\n**作用**：决定 Wunder 以何种形态运行。\n\n**可选模式**：\n- **Desktop 本地模式**：适合个人本地使用，所有数据存本地\n- **Server 模式**：适合团队/组织使用，支持多用户和集中管理\n\n**选择建议**：\n- 个人使用 → Desktop 本地模式\n- 需要多用户协作、集中管理 → Server 模式\n\n### 并发限制\n\n**作用**：限制同时活跃的会话数量，防止系统过载。\n\n**推荐做法**：\n- 个人使用：默认值足够\n- 团队使用：根据用户数和硬件资源调整\n\n## 安全设置\n\n### API 密钥\n\n**作用**：保护管理端和核心接口的访问安全。\n\n**重要提醒**：\n- 密钥应足够复杂（建议超过 16 位，包含字母、数字、特殊字符）\n- 不要使用容易被猜到的密钥\n- 定期更换密钥\n\n### 访问路径控制\n\n**作用**：限制智能体能访问的文件路径和执行的命令。\n\n**配置要点**：\n- **允许的路径**：指定智能体可以操作的目录范围\n- **禁止的模式**：指定禁止访问的文件类型或路径\n\n**安全建议**：\n- 不要无限制开放整个文件系统\n- 明确指定允许访问的工作目录\n- 禁止访问敏感系统目录\n\n### 外部认证密钥\n\n**作用**：当需要把 Wunder 嵌入其他系统时，用于验证外部请求。\n\n**适用场景**：\n- 从其他系统调用 Wunder 的能力\n- 嵌入式集成场景\n\n## 存储设置\n\n### 数据库类型\n\n**作用**：决定使用哪种数据库存储业务数据。\n\n**可选类型**：\n- **SQLite**：轻量级本地数据库，适合 Desktop 本地模式\n- **PostgreSQL**：专业级数据库，适合 Server 多用户模式\n\n**选择建议**：\n- Desktop 本地使用 → SQLite（默认）\n- Server 团队部署 → PostgreSQL（推荐）\n\n### 工作区位置\n\n**作用**：决定用户文件和智能体产物的存储位置。\n\n**重要提醒**：\n- Server 模式下需要确保工作区目录持久化（使用 NAS 或网络存储）\n- 不要把工作区放在临时目录\n\n### 向量存储\n\n**作用**：知识库检索功能使用的存储后端。\n\n**默认方案**：Weaviate\n\n**适用场景**：需要使用知识库检索能力时配置。\n\n## 工具设置\n\n### 内置工具开关\n\n**作用**：控制哪些内置工具可供智能体使用。\n\n**安全考虑**：\n- 敏感环境建议关闭命令执行类工具\n- 按实际需求开放必要的工具\n\n### 浏览器工具\n\n**作用**：让智能体能够浏览网页、截图。\n\n**配置要点**：\n- 本地使用：直接启用\n- Server 部署：可能需要 Docker 容器支持\n\n### MCP 扩展工具\n\n**作用**：通过 MCP 协议接入外部工具服务。\n\n**适用场景**：\n- 需要更多专业能力（如专业数据库操作、特定 API 调用）\n- 需要接入第三方服务\n\n## 模型设置\n\n### 可用模型列表\n\n**作用**：决定智能体可以选择哪些 AI 模型。\n\n**配置要点**：\n- 添加模型时需要填写 API 密钥和接口地址\n- 不同模型有不同的计费方式和能力特点\n- 建议提供多个选项让用户按需选择\n\n### 上下文限制\n\n**作用**：限制对话的上下文长度，防止超出模型能力。\n\n**推荐做法**：\n- 设置为模型支持的最大值\n- 超出时系统会自动压缩历史内容\n\n## 渠道设置\n\n### 渠道账号绑定\n\n**作用**：绑定飞书、企业微信等外部平台账号。\n\n**配置要点**：\n- 需要在对应平台创建应用并获取凭证\n- 按渠道类型填写相关配置\n\n### Webhook 配置\n\n**作用**：让外部平台能把消息推送到 Wunder。\n\n**配置要点**：\n- 设置可公开访问的接收地址\n- 在外部平台配置 Webhook URL\n\n## 配置生效规则\n\n### 修改后何时生效\n\n- **新设置**：立即对新会话生效\n- **已有会话**：不会自动改变，保持创建时的设置\n\n### 配置层级\n\n- **系统默认配置**：最底层，所有未指定值回退到这里\n- **用户个人设置**：覆盖系统默认，只影响该用户\n- **智能体设置**：最上层，只影响该智能体\n\n**生效顺序**：智能体设置 > 用户设置 > 系统默认\n\n## 常见配置误区\n\n| 误区 | 正确理解 |\n|------|----------|\n| 改了设置旧会话自动变 | 旧会话保持创建时的配置，只有新会话使用新设置 |\n| SQLite 和 PostgreSQL 只是性能不同 | SQLite 适合本地单机，PostgreSQL 适合多用户并发 |\n| 工作区可以放临时目录 | 工作区需要持久化，临时目录会被清理 |\n| 密钥简单点方便记忆 | 密钥复杂是安全的基本要求 |\n\n## 按场景的配置建议\n\n### 个人本地使用（Desktop）\n\n- 数据库：SQLite（默认）\n- 工作区：本地目录\n- 安全：适度限制敏感路径\n- 工具：按需开放\n\n### 团队协作（Server）\n\n- 数据库：PostgreSQL\n- 工作区：网络存储（持久化）\n- 安全：严格配置密钥和路径限制\n- 工具：按角色分配权限\n\n## 延伸阅读\n\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [数据管理](/docs/zh-CN/ops/data-and-storage/)\n- [账户与安全](/docs/zh-CN/ops/auth-and-security/)\n","source_path":"使用说明书/zh-CN/reference/config.md"}</script>
