  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/reference/config","language":"zh-CN","title":"配置说明","summary":"配置不生效时，先确认你改的是哪一层，而不是先怀疑程序没读到。","updated_at":"2026-04-02","read_when":["你在查具体配置应该写到哪里","你要分清基础配置、运行时覆盖和外部 MCP 配置"],"source_docs":["config/wunder-example.yaml","docs/API文档.md","docs/系统介绍.md"],"tab":"参考","group":"系统参考","group_path":["系统参考"],"url":"/docs/zh-CN/reference/config/","headings":[{"id":"section-1","level":1,"text":"配置说明"},{"id":"section-2","level":2,"text":"本页重点"},{"id":"section-3","level":2,"text":"关键配置入口"},{"id":"section-4","level":2,"text":"它们分别负责什么"},{"id":"section-5","level":3,"text":"config/wunder.yaml"},{"id":"section-6","level":3,"text":"config/wunder-example.yaml"},{"id":"section-7","level":3,"text":"WUNDERTEMP/config/wunder.yaml"},{"id":"section-8","level":3,"text":"config/mcpconfig.json"},{"id":"section-9","level":2,"text":"按问题找配置"},{"id":"section-10","level":2,"text":"你最可能先改这些项"},{"id":"section-11","level":2,"text":"配置不生效时先查这三件事"},{"id":"section-12","level":2,"text":"常见误区"},{"id":"section-13","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/reference/api-index","next_slug":"zh-CN/reference/stream-events","markdown":"# 配置说明\n\nWunder 的配置不是一个文件包打天下，而是分层组织的。\n\n核心结论：排查配置问题时，先分清“基础配置、运行时覆盖、外部 MCP 配置”三层。\n\n## 本页重点\n\n- 具体配置应该改到哪里\n- 哪些配置是 server 在读，哪些是 extra_mcp 在读\n- 为什么你改了配置却可能没生效\n\n## 关键配置入口\n\n- `config/wunder.yaml`\n- `config/wunder-example.yaml`\n- `WUNDER_TEMP/config/wunder.yaml`（CLI/Desktop 运行时副本）\n- `config/mcp_config.json`\n\n## 它们分别负责什么\n\n### `config/wunder.yaml`\n\n- 正式基础配置\n- 部署 server 时通常先看这里\n\n### `config/wunder-example.yaml`\n\n- 示例配置和兜底模板\n- 正式配置缺失时，系统会按当前逻辑回退到这里\n\n### `WUNDER_TEMP/config/wunder.yaml`\n\n- CLI/Desktop 运行时实际使用的配置文件\n- 通常对应管理端保存后的内容\n- 不建议手工和基础配置混着改\n\n### `config/mcp_config.json`\n\n- 独立 MCP 服务配置\n- 尤其是数据库和知识库相关工具\n\n## 按问题找配置\n\n- 服务监听和并发限制，看 `server.*`\n- 鉴权、命令和路径控制，看 `security.*`\n- 外部 MCP 服务接入，看 `mcp.*`\n- A2A 服务接入，看 `a2a.*`\n- 存储与向量能力，看 `storage.*` 和 `vector_store.*`\n- 浏览器只需要看 `tools.browser.enabled`、`browser.enabled` 和 `browser.docker.enabled`；其余参数默认由系统内置\n\n## 你最可能先改这些项\n\n- 服务基础：`server.host`、`server.port`、`server.chat_stream_channel`、`server.max_active_sessions`\n- 安全控制：`security.api_key`、`security.external_auth_key`、`security.allow_commands`、`security.allow_paths`、`security.deny_globs`\n- MCP：`mcp.timeout_s`、`mcp.servers[]`\n- A2A：`a2a.timeout_s`、`a2a.services[]`\n\n## 配置不生效时先查这三件事\n\n1. 你改的是仓库配置还是运行时副本\n2. 当前运行实例实际读取的是哪个路径\n3. 这个配置到底是 server、desktop 还是 extra_mcp 在消费\n\n## 常见误区\n\n- 把 `wunder-example.yaml` 当正式配置长期改。\n- 不要同时修改仓库 `config/wunder.yaml` 与运行时副本 `WUNDER_TEMP/config/wunder.yaml`，先确认当前实例实际使用哪一个文件。\n- 以为所有配置都由 server 进程读取，实际上 `extra_mcp` 有自己的配置文件。\n\n## 延伸阅读\n\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n- [MCP 入口](/docs/zh-CN/integration/mcp-endpoint/)\n- [A2A 接口](/docs/zh-CN/integration/a2a/)\n","source_path":"静态站文档/zh-CN/reference/config.md"}</script>
