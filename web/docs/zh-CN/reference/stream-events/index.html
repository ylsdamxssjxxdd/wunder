  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/reference/stream-events","language":"zh-CN","title":"会话状态说明","summary":"聊天过程中各种状态的含义，帮助你理解智能体在做什么、遇到了什么情况。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"系统参考","group_path":["系统参考"],"url":"/docs/zh-CN/reference/stream-events/","headings":[{"id":"section-1","level":1,"text":"会话状态说明"},{"id":"section-2","level":2,"text":"状态概览"},{"id":"section-3","level":2,"text":"基本状态"},{"id":"section-4","level":3,"text":"等待中"},{"id":"section-5","level":3,"text":"正在思考"},{"id":"section-6","level":3,"text":"正在执行工具"},{"id":"section-7","level":3,"text":"已完成"},{"id":"section-8","level":2,"text":"审批状态"},{"id":"section-9","level":3,"text":"需要审批"},{"id":"section-10","level":3,"text":"审批已处理"},{"id":"section-11","level":2,"text":"异常状态"},{"id":"section-12","level":3,"text":"执行失败"},{"id":"section-13","level":3,"text":"已取消"},{"id":"section-14","level":3,"text":"会话卡住"},{"id":"section-15","level":2,"text":"连接状态"},{"id":"section-16","level":3,"text":"已连接"},{"id":"section-17","level":3,"text":"连接断开"},{"id":"section-18","level":2,"text":"状态指示器位置"},{"id":"section-19","level":2,"text":"常见问题解答"},{"id":"section-20","level":3,"text":"为什么有时候响应很慢？"},{"id":"section-21","level":3,"text":"为什么智能体要等我审批？"},{"id":"section-22","level":3,"text":"状态显示异常怎么办？"},{"id":"section-23","level":3,"text":"如何查看智能体刚才做了什么？"},{"id":"section-24","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/reference/config","next_slug":"zh-CN/reference/workspace-routing","markdown":"# 会话状态说明\n\n与智能体对话时，你会看到各种状态提示。这页帮你理解每种状态代表什么，以及遇到异常时该怎么处理。\n\n## 状态概览\n\n一个对话从开始到结束，通常会经历以下状态：\n\n```\n等待 → 思考/执行 → 完成\n          ↓\n       需要审批 → 等待你的决定 → 继续\n          ↓\n       出错/取消 → 结束\n```\n\n## 基本状态\n\n### 等待中\n\n**含义**：你的请求已提交，正在排队等待处理。\n\n**何时出现**：\n- 系统繁忙时\n- 有多个请求同时进行时\n\n**你应该做什么**：等待，通常很快就会开始处理。\n\n### 正在思考\n\n**含义**：智能体正在分析你的请求，准备回答或执行操作。\n\n**这是正常状态**：AI 需要时间来理解你的问题、思考解决方案。\n\n**你应该做什么**：耐心等待，不要重复发送相同消息。\n\n### 正在执行工具\n\n**含义**：智能体正在使用工具完成任务（如读取文件、搜索网页、执行代码等）。\n\n**可能看到的提示**：\n- \"正在读取文件...\"\n- \"正在搜索...\"\n- \"正在执行...\"\n\n**这是正常状态**：复杂任务往往需要多个工具协作完成。\n\n**你应该做什么**：等待执行完成，可以在界面上看到执行进度。\n\n### 已完成\n\n**含义**：智能体已完成你的请求，给出了最终回答。\n\n**这是成功状态**：任务顺利完成。\n\n**你可以做什么**：\n- 继续提问\n- 查看生成的内容或文件\n- 开始新的任务\n\n## 审批状态\n\n### 需要审批\n\n**含义**：智能体想要执行一个需要你确认的操作（如修改重要文件、执行可能有风险的命令等）。\n\n**何时出现**：\n- 智能体想修改重要文件\n- 智能体想执行敏感命令\n- 配置了审批模式时\n\n**你会看到什么**：\n- 一个审批请求弹窗或提示\n- 智能体想要执行的具体操作说明\n\n**你应该做什么**：\n- 仔细阅读操作说明\n- 决定是否批准\n- 点击\"批准\"继续，或点击\"拒绝\"阻止\n\n### 审批已处理\n\n**含义**：你已对审批请求做出了决定。\n\n**两种结果**：\n- **你批准了**：智能体继续执行该操作\n- **你拒绝了**：智能体放弃该操作，可能寻找其他方案\n\n## 异常状态\n\n### 执行失败\n\n**含义**：智能体在执行过程中遇到了问题，无法完成任务。\n\n**可能的原因**：\n- 文件不存在或无法访问\n- 网络请求失败\n- 工具执行出错\n- AI 模型服务异常\n\n**你应该做什么**：\n- 查看错误提示了解原因\n- 根据提示调整请求（如提供正确的文件路径）\n- 重新尝试\n\n### 已取消\n\n**含义**：对话在你或系统主动取消后终止。\n\n**何时出现**：\n- 你点击了\"停止\"按钮\n- 系统超时自动取消\n- 其他原因导致的主动终止\n\n**你可以做什么**：\n- 重新开始对话\n- 查看取消前的执行记录\n\n### 会话卡住\n\n**症状**：长时间停留在某个状态，没有任何进展。\n\n**可能的原因**：\n- 网络连接中断\n- 后端服务异常\n- 任务处理超时\n\n**你应该做什么**：\n1. 先等待几分钟（有时只是处理时间长）\n2. 如果确实卡住，尝试点击\"停止\"\n3. 使用\"重置工作状态\"功能清理异常状态（在设置里）\n4. 如果问题持续，联系管理员或查看故障排查指南\n\n## 连接状态\n\n### 已连接\n\n**含义**：与后端服务的网络连接正常。\n\n**这是正常状态**。\n\n### 连接断开\n\n**含义**：与后端服务的网络连接中断。\n\n**症状**：\n- 无法发送新消息\n- 状态显示异常\n- 提示\"连接已断开\"\n\n**你应该做什么**：\n- 检查网络连接\n- 尝试刷新页面或重启应用\n- 等待自动重连\n\n## 状态指示器位置\n\n在聊天界面上，你可以在以下位置看到状态提示：\n\n- **对话框上方**：显示当前会话的整体状态\n- **消息气泡旁**：显示该消息的处理状态\n- **进度区域**：显示工具执行的详细进度\n- **蜂群页面**：显示各工蜂的工作进度（如果使用了蜂群协作）\n\n## 常见问题解答\n\n### 为什么有时候响应很慢？\n\n可能原因：\n- 任务复杂，需要多步骤执行\n- AI 模型服务响应延迟\n- 系统负载较高\n\n建议：耐心等待，不要重复发送。\n\n### 为什么智能体要等我审批？\n\n因为该操作可能有风险或影响重要文件。这是安全保护机制，确保敏感操作经过你的确认。\n\n如果你想减少审批，可以与管理员沟通调整审批模式设置。\n\n### 状态显示异常怎么办？\n\n1. 先等待，看是否自动恢复\n2. 使用\"重置工作状态\"功能\n3. 刷新页面或重启应用\n4. 查看故障排查指南\n\n### 如何查看智能体刚才做了什么？\n\n在对话界面下方或右侧，通常会有执行轨迹或工具调用记录，显示智能体调用了哪些工具、读取了哪些文件、执行了什么操作。\n\n## 延伸阅读\n\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n- [核心执行循环](/docs/zh-CN/concepts/core-agent-loop/)\n- [工具体系概念](/docs/zh-CN/concepts/tools/)\n","source_path":"使用说明书/zh-CN/reference/stream-events.md"}</script>
