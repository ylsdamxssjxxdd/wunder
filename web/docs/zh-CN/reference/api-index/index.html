  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/reference/api-index","language":"zh-CN","title":"功能与能力速查","summary":"Wunder 能做什么，每个能力在哪使用。按功能类别组织，方便快速定位。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"系统参考","group_path":["系统参考"],"url":"/docs/zh-CN/reference/api-index/","headings":[{"id":"section-1","level":1,"text":"功能与能力速查"},{"id":"section-2","level":2,"text":"智能对话"},{"id":"section-3","level":2,"text":"文件管理"},{"id":"section-4","level":2,"text":"蜂群协作"},{"id":"section-5","level":2,"text":"智能体管理"},{"id":"section-6","level":2,"text":"工具与技能"},{"id":"section-7","level":2,"text":"渠道接入"},{"id":"section-8","level":2,"text":"定时任务"},{"id":"section-9","level":2,"text":"系统设置"},{"id":"section-10","level":2,"text":"管理端功能（管理员专用）"},{"id":"section-11","level":2,"text":"按需求快速定位"},{"id":"section-12","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/reference/index","next_slug":"zh-CN/reference/config","markdown":"# 功能与能力速查\n\n这页帮你快速了解 Wunder 能做什么，以及每个能力在界面中的位置。\n\n## 智能对话\n\n**核心能力：与 AI 智能体进行自然语言对话**\n\n- 位置：桌面应用或网页端 → 左栏\"聊天\"\n- 能做什么：\n  - 提问并获得智能回答\n  - 上传文件让智能体分析\n  - 让智能体执行各种任务（写代码、处理文件、搜索信息等）\n  - 查看对话历史和继续之前的会话\n\n**相关参考**\n\n- [会话状态说明](/docs/zh-CN/reference/stream-events/)\n- [提示词与个性化](/docs/zh-CN/reference/prompt-templates/)\n\n## 文件管理\n\n**核心能力：上传、下载、组织你的工作文件**\n\n- 位置：桌面应用或网页端 → 左栏\"文件\"或\"工作区\"\n- 能做什么：\n  - 上传文档、图片、音频等文件供智能体使用\n  - 下载智能体生成的文件\n  - 浏览和管理个人文件目录\n  - 查看智能体工作过程中产生的文件\n\n**相关参考**\n\n- [工作区管理参考](/docs/zh-CN/reference/workspace-routing/)\n\n## 蜂群协作\n\n**核心能力：多个智能体协同完成复杂任务**\n\n- 位置：桌面应用或网页端 → 左栏\"蜂群\"\n- 能做什么：\n  - 查看正在运行的蜂群任务\n  - 查看每个工蜂的工作进度和工具轨迹\n  - 管理历史蜂群任务记录\n\n**特点说明**\n\n蜂群协作适合需要拆解成多个子任务的复杂工作。母蜂负责拆解任务、分派工蜂、汇总结果；工蜂各司其职，完成后将结果汇报给母蜂。\n\n**相关参考**\n\n- [蜂群协作概念](/docs/zh-CN/concepts/swarm/)\n\n## 智能体管理\n\n**核心能力：配置和定制你的专属智能体**\n\n- 位置：桌面应用或网页端 → 左栏\"智能体\"或聊天页右上角\n- 能做什么：\n  - 创建自定义智能体\n  - 给智能体选择不同的模型\n  - 配置智能体可用的工具\n  - 设置智能体的回答风格（提示词模板）\n  - 管理智能体的长期记忆\n\n**相关参考**\n\n- [提示词与个性化](/docs/zh-CN/reference/prompt-templates/)\n- [工具体系概念](/docs/zh-CN/concepts/tools/)\n\n## 工具与技能\n\n**核心能力：扩展智能体能做的事情**\n\n- 位置：桌面应用或网页端 → 左栏\"工具\"\n- 能做什么：\n  - 查看可用工具列表\n  - 配置技能（预设的能力包）\n  - 添加知识库（让智能体参考你的专属资料）\n\n**工具类型**\n\n内置工具包括：\n\n- 文件操作：读取、写入、搜索文件\n- 网络操作：搜索、抓取网页内容\n- 代码操作：执行命令、编写代码\n- 系统操作：截图、获取系统状态\n- 更多能力通过 MCP 扩展\n\n**相关参考**\n\n- [工具体系概念](/docs/zh-CN/concepts/tools/)\n- [提示词与技能概念](/docs/zh-CN/concepts/prompt-and-skills/)\n\n## 渠道接入\n\n**核心能力：把 Wunder 连接到飞书、微信等外部平台**\n\n- 位置：管理端 → \"渠道管理\"\n- 能做什么：\n  - 绑定飞书/企业微信/微信/QQ 等账号\n  - 让外部平台的用户也能使用智能体\n  - 查看渠道运行状态和消息日志\n  - 排查渠道相关问题\n\n**适用场景**\n\n当你想让组织成员通过飞书、微信等熟悉的平台与智能体对话时，使用渠道接入功能。\n\n**相关参考**\n\n- [渠道管理指南](/docs/zh-CN/ops/channel-runtime/)\n- [管理端面板指南](/docs/zh-CN/reference/admin-panels/)\n\n## 定时任务\n\n**核心能力：设置智能体在指定时间自动执行任务**\n\n- 位置：桌面应用或网页端 → 左栏\"定时任务\"\n- 能做什么：\n  - 创建定时执行的任务\n  - 查看任务执行历史\n  - 管理、暂停、删除定时任务\n\n**适用场景**\n\n适合周期性的工作，比如每天定时汇总报告、定时检查系统状态等。\n\n## 系统设置\n\n**核心能力：配置系统运行参数**\n\n- 位置：桌面应用或网页端 → 左栏\"设置\"\n- 能做什么：\n  - 修改系统语言\n  - 配置连接的服务地址\n  - 管理个人账户信息\n  - 查看使用统计和 Token 余额\n\n**相关参考**\n\n- [系统设置参考](/docs/zh-CN/reference/config/)\n\n## 管理端功能（管理员专用）\n\n**核心能力：管理整个系统**\n\n- 位置：浏览器访问管理端地址\n- 主要面板：\n  - 系统设置：全局配置\n  - 用户管理：用户账户、Token 账户\n  - 单位管理：组织架构\n  - 模型配置：可选用的 AI 模型\n  - 工具管理：可用工具列表\n  - 渠道监控：外部渠道状态\n  - 性能监控：系统运行状态\n\n**相关参考**\n\n- [管理端面板指南](/docs/zh-CN/reference/admin-panels/)\n- [系统设置参考](/docs/zh-CN/reference/config/)\n\n## 按需求快速定位\n\n| 我想... | 去哪里 |\n|---------|--------|\n| 开始一个对话 | 左栏\"聊天\" → 选择智能体 → 开始对话 |\n| 上传文件让智能体分析 | 对话框点击上传按钮或直接拖拽文件 |\n| 查看智能体生成的文件 | 左栏\"文件\"或\"工作区\" |\n| 定制智能体的风格 | 左栏\"智能体\" → 设置 → 提示词模板 |\n| 查看蜂群任务进度 | 左栏\"蜂群\" |\n| 创建定时任务 | 左栏\"定时任务\" → 创建任务 |\n| 管理用户（管理员） | 管理端 → 用户管理 |\n| 配置渠道（管理员） | 管理端 → 渠道管理 |\n\n## 延伸阅读\n\n- [核心概念概览](/docs/zh-CN/concepts/)\n- [快速入门](/docs/zh-CN/start/quickstart/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"使用说明书/zh-CN/reference/api-index.md"}</script>
