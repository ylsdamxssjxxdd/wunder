  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/reference/api-index","language":"zh-CN","title":"API 索引","summary":"这是 Wunder 当前最常用接口族的索引页，用来快速定位入口而不是替代完整 API 文档。","updated_at":"2026-03-20","read_when":["你在找某个接口大概属于哪一类","你不想直接翻完整 `docs/API文档.md`"],"source_docs":["docs/API文档.md","docs/系统介绍.md"],"tab":"参考","group":"系统参考","group_path":["系统参考"],"url":"/docs/zh-CN/reference/api-index/","headings":[{"id":"section-1","level":1,"text":"API 索引"},{"id":"section-2","level":2,"text":"核心执行入口"},{"id":"section-3","level":2,"text":"聊天会话域"},{"id":"section-4","level":2,"text":"A2A"},{"id":"section-5","level":2,"text":"MCP"},{"id":"section-6","level":2,"text":"用户世界"},{"id":"section-7","level":2,"text":"管理接口"},{"id":"section-8","level":2,"text":"什么时候回到完整 API 文档"},{"id":"section-9","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/reference/index","next_slug":"zh-CN/reference/config","markdown":"# API 索引\n\n这不是完整 API 手册，而是 Wunder 当前主要接口族的索引页。\n\n## 核心执行入口\n\n- `POST /wunder`\n- `POST /wunder/system_prompt`\n- `GET /wunder/tools`\n\n适合先看：\n\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n\n## 聊天会话域\n\n- `GET/POST /wunder/chat/sessions`\n- `POST /wunder/chat/sessions/{session_id}/messages`\n- `GET /wunder/chat/sessions/{session_id}/resume`\n- `POST /wunder/chat/sessions/{session_id}/cancel`\n- `GET /wunder/chat/ws`\n\n适合先看：\n\n- [聊天 WebSocket](/docs/zh-CN/integration/chat-ws/)\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n\n## A2A\n\n- `POST /a2a`\n- `GET /.well-known/agent-card.json`\n- `GET /a2a/agentCard`\n- `GET /a2a/extendedAgentCard`\n\n适合先看：\n\n- [A2A 接口](/docs/zh-CN/integration/a2a/)\n\n## MCP\n\n- `POST /wunder/mcp`\n- `GET/POST /wunder/admin/mcp`\n- `POST /wunder/admin/mcp/tools`\n- `POST /wunder/admin/mcp/tools/call`\n\n适合先看：\n\n- [MCP 入口](/docs/zh-CN/integration/mcp-endpoint/)\n\n## 用户世界\n\n- `GET /wunder/user_world/contacts`\n- `GET /wunder/user_world/groups`\n- `GET /wunder/user_world/conversations`\n- `GET /wunder/user_world/ws`\n\n## 管理接口\n\n大部分管理接口都在：\n\n- `/wunder/admin/*`\n\n它们覆盖：\n\n- 模型\n- 工具\n- 用户与组织\n- 预设智能体\n- benchmark\n- 渠道治理\n\n## 什么时候回到完整 API 文档\n\n当你需要这些信息时，就该回完整文档了：\n\n- 字段级请求体\n- 响应结构\n- 错误码\n- 鉴权细节\n- 历史兼容字段\n\n## 延伸阅读\n\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n- [配置说明](/docs/zh-CN/reference/config/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"静态站文档/zh-CN/reference/api-index.md"}</script>
