  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/reference/prompt-templates","language":"zh-CN","title":"提示词与个性化","summary":"如何定制智能体的回答风格，让智能体更贴合你的需求和偏好。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"系统参考","group_path":["系统参考"],"url":"/docs/zh-CN/reference/prompt-templates/","headings":[{"id":"section-1","level":1,"text":"提示词与个性化"},{"id":"section-2","level":2,"text":"什么是提示词模板"},{"id":"section-3","level":2,"text":"内置模板包"},{"id":"section-4","level":3,"text":"中文模板包（default-zh）"},{"id":"section-5","level":3,"text":"英文模板包（default-en）"},{"id":"section-6","level":2,"text":"模板包的组成"},{"id":"section-7","level":2,"text":"如何切换模板包"},{"id":"section-8","level":3,"text":"在界面中切换"},{"id":"section-9","level":3,"text":"生效规则"},{"id":"section-10","level":2,"text":"创建自定义模板"},{"id":"section-11","level":3,"text":"创建方法"},{"id":"section-12","level":3,"text":"编辑建议"},{"id":"section-13","level":3,"text":"示例：创建编程助手模板"},{"id":"section-14","level":2,"text":"模板生效的层级"},{"id":"section-15","level":2,"text":"常见问题解答"},{"id":"section-16","level":3,"text":"切换模板后为什么旧对话没变化？"},{"id":"section-17","level":3,"text":"想修改某个对话的提示词怎么办？"},{"id":"section-18","level":3,"text":"不同智能体可以用不同模板吗？"},{"id":"section-19","level":3,"text":"模板内容越长越好吗？"},{"id":"section-20","level":3,"text":"中文模板可以用英文回答吗？"},{"id":"section-21","level":2,"text":"模板管理技巧"},{"id":"section-22","level":3,"text":"推荐做法"},{"id":"section-23","level":3,"text":"避免的做法"},{"id":"section-24","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/reference/workspace-routing","next_slug":"zh-CN/reference/admin-panels","markdown":"# 提示词与个性化\n\n提示词模板是决定智能体\"性格\"和回答风格的关键配置。通过选择或自定义模板，你可以让智能体更适合你的使用场景。\n\n## 什么是提示词模板\n\n**简单理解**：提示词模板就是给智能体的\"工作手册\"，告诉它：\n- 自己的角色定位\n- 如何思考和回答问题\n- 有哪些工作原则和限制\n- 如何使用工具和技能\n\n不同的模板会让智能体表现出不同的风格和能力侧重。\n\n## 内置模板包\n\nWunder 提供两套内置模板包：\n\n### 中文模板包（default-zh）\n\n- **特点**：使用中文进行思考和回答\n- **适合**：中文对话场景\n- **风格**：默认的中文助手风格\n\n### 英文模板包（default-en）\n\n- **特点**：使用英文进行思考和回答\n- **适合**：英文对话场景\n- **风格**：默认的英文助手风格\n\n**选择建议**：根据你主要使用的语言选择对应模板包。\n\n## 模板包的组成\n\n每个模板包包含多个分段，共同构成智能体的完整\"指导手册\"：\n\n| 分段 | 作用 |\n|------|------|\n| 角色 | 定义智能体是谁、扮演什么角色 |\n| 工程原则 | 定义工作方式和思考方法 |\n| 工具协议 | 定义如何使用工具 |\n| 技能协议 | 定义如何调用技能 |\n| 记忆 | 定义如何使用长期记忆 |\n| 附加说明 | 其他补充指令 |\n\n## 如何切换模板包\n\n### 在界面中切换\n\n1. 进入智能体设置页面\n2. 找到\"提示词模板\"选项\n3. 选择想要的模板包\n4. 保存设置\n\n### 生效规则\n\n- **新对话**：切换后创建的新对话会使用新模板\n- **已有对话**：不会改变，保持创建时的模板\n\n**重要提醒**：模板切换只影响新会话，不会修改已有的对话。\n\n## 创建自定义模板\n\n如果你想进一步定制智能体风格，可以创建自己的模板包：\n\n### 创建方法\n\n1. 在模板设置页面点击\"新建模板包\"\n2. 选择一个基础模板复制（推荐从内置模板开始）\n3. 编辑各个分段的内容\n4. 保存后即可使用\n\n### 编辑建议\n\n- **角色分段**：明确智能体的定位（如\"编程助手\"、\"数据分析专家\"）\n- **工程原则**：设定回答的风格（如简洁/详细、正式/轻松）\n- **工具协议**：不需要修改（除非有特殊需求）\n- **附加说明**：可以添加你的特殊要求\n\n### 示例：创建编程助手模板\n\n角色分段可以这样写：\n\n```\n你是一位专业的编程助手，擅长多种编程语言和软件工程实践。\n你的回答要：\n- 代码示例清晰完整\n- 解释简洁易懂\n- 遵循最佳实践\n- 注意安全性\n```\n\n## 模板生效的层级\n\n智能体的最终提示词由多个层级组合：\n\n1. **系统模板**：管理员设置的全局基础模板\n2. **用户模板**：你个人选择的模板包\n3. **智能体设置**：特定智能体的额外配置\n\n**组合规则**：上层设置覆盖下层，缺失部分回退到下层。\n\n## 常见问题解答\n\n### 切换模板后为什么旧对话没变化？\n\n因为每个对话在创建时就确定了提示词，之后保持冻结。这是为了保证对话的一致性，防止中途改变导致行为混乱。\n\n### 想修改某个对话的提示词怎么办？\n\n没法直接修改已有对话的提示词。你可以：\n- 创建新对话使用新模板\n- 或者把原对话的内容复制到新对话继续\n\n### 不同智能体可以用不同模板吗？\n\n可以。每个智能体可以独立设置模板。\n\n### 模板内容越长越好吗？\n\n不一定。模板应该：\n- 明确关键要求\n- 避免冗余和冲突\n- 简洁有效\n\n过长或矛盾的模板反而可能影响效果。\n\n### 中文模板可以用英文回答吗？\n\n可以，模板只是默认倾向。你可以在对话中明确要求用英文回答，智能体会遵从。\n\n## 模板管理技巧\n\n### 推荐做法\n\n1. 先从内置模板开始，熟悉后再自定义\n2. 创建多个模板包应对不同场景\n3. 保持模板简洁明确\n4. 定期回顾和优化模板内容\n\n### 避免的做法\n\n1. 随意拼凑模板内容\n2. 设置相互矛盾的要求\n3. 模板过长导致核心要求不突出\n4. 不考虑实际效果只追求\"完美\"\n\n## 延伸阅读\n\n- [智能体管理功能](/docs/zh-CN/reference/api-index/)（功能速查）\n- [提示词与技能概念](/docs/zh-CN/concepts/prompt-and-skills/)\n- [长期记忆概念](/docs/zh-CN/concepts/memory/)\n","source_path":"使用说明书/zh-CN/reference/prompt-templates.md"}</script>
