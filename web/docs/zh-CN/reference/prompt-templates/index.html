  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/reference/prompt-templates","language":"zh-CN","title":"提示词模板参考","summary":"Wunder 把系统提示词拆成模板包和分段文件，并同时提供管理员侧与用户侧的模板管理接口。","read_when":["你要修改系统提示词模板包","你想知道 default 包、用户包和线程冻结之间的关系"],"source_docs":["docs/API文档.md","docs/设计方案.md","docs/系统介绍.md","src/api/admin_prompt_templates.rs","src/api/user_prompt_templates.rs"],"tab":"参考","group":"系统参考","group_path":["系统参考"],"url":"/docs/zh-CN/reference/prompt-templates/","headings":[{"id":"section-1","level":1,"text":"提示词模板参考"},{"id":"section-2","level":2,"text":"这页解决什么"},{"id":"section-3","level":2,"text":"当前分段键"},{"id":"section-4","level":2,"text":"管理员侧模板接口"},{"id":"section-5","level":2,"text":"用户侧模板接口"},{"id":"section-6","level":2,"text":"生效时机"},{"id":"section-7","level":2,"text":"回退链路怎么理解"},{"id":"section-8","level":2,"text":"什么时候最需要看这页"},{"id":"section-9","level":2,"text":"你最需要记住的点"},{"id":"section-10","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/reference/workspace-routing","next_slug":"zh-CN/reference/admin-panels","markdown":"# 提示词模板参考\n\n这页是模板治理的参考页，不再重复解释“为什么需要提示词”。\n\n## 这页解决什么\n\n这页只回答这些问题：\n\n- 模板包有哪些分段\n- 管理员和普通用户分别走哪些接口\n- 改完模板后什么时候会生效\n\n## 当前分段键\n\n系统提示词模板当前按这些分段组织：\n\n- `role`\n- `engineering`\n- `tools_protocol`\n- `skills_protocol`\n- `memory`\n- `extra`\n\n你改的不是一整块大 prompt，而是这些分段文件。\n\n## 管理员侧模板接口\n\n- `GET /wunder/admin/prompt_templates`\n- `POST /wunder/admin/prompt_templates/active`\n- `GET/PUT /wunder/admin/prompt_templates/file`\n- `POST /wunder/admin/prompt_templates/packs`\n- `DELETE /wunder/admin/prompt_templates/packs/{pack_id}`\n\n重点约束：\n\n- `default` 包只读\n- 非 default 包默认落在 `./data/prompt_templates`\n\n## 用户侧模板接口\n\n- `GET /wunder/prompt_templates`\n- `POST /wunder/prompt_templates/active`\n- `GET/PUT /wunder/prompt_templates/file`\n- `POST /wunder/prompt_templates/packs`\n- `DELETE /wunder/prompt_templates/packs/{pack_id}`\n\n重点约束：\n\n- 用户自己的 `default` 包会跟随系统当前 active 模板同步\n- 用户自建包只影响自己的新线程\n\n## 生效时机\n\n这是最容易误解的一点。\n\n结论很简单：\n\n- 改模板后，优先影响新线程\n- 已经冻结的旧线程不会被回写\n\n所以模板治理和线程稳定性是一起设计的，不是矛盾关系。\n\n## 回退链路怎么理解\n\n当前回退语义可以简单记成：\n\n- 先找当前 active 包\n- 缺失分段时回退系统 active\n- 再缺失时回退系统 default\n\n所以你不必每次都复制整套模板，按需覆盖分段即可。\n\n## 什么时候最需要看这页\n\n- 管理端切换 prompt template pack\n- 用户想维护自己的提示词风格包\n- 你在解释“为什么改完模板当前线程没变”\n\n## 你最需要记住的点\n\n- `default` 包只读，建议先复制再改。\n- 模板是分段治理，不是单文件硬编码。\n- 模板更新影响新线程，不追写旧线程。\n\n## 相关文档\n\n- [提示词与技能](/docs/zh-CN/concepts/prompt-and-skills/)\n- [聊天会话](/docs/zh-CN/integration/chat-sessions/)\n- [配置说明](/docs/zh-CN/reference/config/)\n","source_path":"静态站文档/zh-CN/reference/prompt-templates.md"}</script>
