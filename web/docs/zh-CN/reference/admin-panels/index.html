  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/reference/admin-panels","language":"zh-CN","title":"管理端面板指南","summary":"管理员后台各面板的功能定位，帮助管理员快速找到需要的管理入口。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"系统参考","group_path":["系统参考"],"url":"/docs/zh-CN/reference/admin-panels/","headings":[{"id":"section-1","level":1,"text":"管理端面板指南"},{"id":"section-2","level":2,"text":"面板分组概览"},{"id":"section-3","level":2,"text":"系统分组"},{"id":"section-4","level":3,"text":"内部状态"},{"id":"section-5","level":3,"text":"系统设置"},{"id":"section-6","level":3,"text":"单位管理"},{"id":"section-7","level":3,"text":"用户管理"},{"id":"section-8","level":3,"text":"外链管理"},{"id":"section-9","level":3,"text":"渠道监控"},{"id":"section-10","level":2,"text":"智能体分组"},{"id":"section-11","level":3,"text":"模型配置"},{"id":"section-12","level":3,"text":"线程管理"},{"id":"section-13","level":3,"text":"预设智能体"},{"id":"section-14","level":3,"text":"工具管理"},{"id":"section-15","level":3,"text":"系统提示词"},{"id":"section-16","level":2,"text":"调试分组"},{"id":"section-17","level":3,"text":"吞吐量测试"},{"id":"section-18","level":3,"text":"性能测试"},{"id":"section-19","level":3,"text":"蜂群测试"},{"id":"section-20","level":3,"text":"能力评估"},{"id":"section-21","level":3,"text":"调试面板"},{"id":"section-22","level":3,"text":"LSP"},{"id":"section-23","level":2,"text":"文档分组"},{"id":"section-24","level":3,"text":"使用说明书"},{"id":"section-25","level":3,"text":"接口参考"},{"id":"section-26","level":2,"text":"按角色常用面板"},{"id":"section-27","level":3,"text":"管理员日常使用"},{"id":"section-28","level":3,"text":"技术运维"},{"id":"section-29","level":3,"text":"运营人员"},{"id":"section-30","level":2,"text":"常用操作流程"},{"id":"section-31","level":3,"text":"新用户加入"},{"id":"section-32","level":3,"text":"配置新渠道"},{"id":"section-33","level":3,"text":"调整系统设置"},{"id":"section-34","level":3,"text":"处理异常会话"},{"id":"section-35","level":2,"text":"快速定位指南"},{"id":"section-36","level":2,"text":"管理端访问方式"},{"id":"section-37","level":2,"text":"安全提醒"},{"id":"section-38","level":2,"text":"廸伸阅读"}],"prev_slug":"zh-CN/reference/prompt-templates","next_slug":"zh-CN/concepts/architecture","markdown":"# 管理端面板指南\n\n管理端是系统管理员的工作台，用于配置系统、管理用户、监控运行状态。这页帮你快速定位各面板的功能。\n\n## 面板分组概览\n\n管理端按职责分成几个分组，每个分组聚焦一类管理任务：\n\n<div class=\"docs-card-grid docs-card-grid-compact\">\n  <a class=\"docs-card\" href=\"#系统分组\"><strong>系统分组<\/strong><span>全局配置与状态查看<\/span><\/a>\n  <a class=\"docs-card\" href=\"#智能体分组\"><strong>智能体分组<\/strong><span>模型与能力配置<\/span><\/a>\n  <a class=\"docs-card\" href=\"#调试分组\"><strong>调试分组<\/strong><span>测试与性能评估<\/span><\/a>\n  <a class=\"docs-card\" href=\"#文档分组\"><strong>文档分组<\/strong><span>使用说明与接口参考<\/span><\/a>\n<\/div>\n\n## 系统分组\n\n这个分组聚焦全局管理：\n\n### 内部状态\n\n查看系统运行状态，包括：\n- 活跃会话数\n- 系统负载\n- 关键组件状态\n\n### 系统设置\n\n配置全局参数，包括：\n- 服务地址和端口\n- 安全设置\n- 存储设置\n- 工具开关\n\n### 单位管理\n\n管理组织架构：\n- 创建和管理单位\n- 单位层级关系\n- 单位成员管理\n\n### 用户管理\n\n管理用户账户：\n- 用户列表查看\n- 创建新用户\n- 编辑用户信息\n- Token 账户管理（发放、扣除、设置余额）\n\n**用户设置中的 Token 操作**：\n- **直接设置余额**：覆盖当前余额，适合修正账面值\n- **发放 Token**：增加余额，记录累计获得\n- **扣除 Token**：减少余额，记录累计消耗\n- 管理员账户不参与 Token 余额限制\n\n### 外链管理\n\n管理外部系统接入：\n- 查看接入配置\n- 管理认证密钥\n\n### 渠道监控\n\n监控外部渠道运行状态：\n- 渠道账号状态\n- 消息收发统计\n- 异常告警\n\n## 智能体分组\n\n这个分组聚焦智能体能力配置：\n\n### 模型配置\n\n管理可用的 AI 模型：\n- 添加新模型（填写 API 密钥、接口地址）\n- 配置模型参数\n- 设定默认模型\n\n### 线程管理\n\n查看和管理活跃线程：\n- 线程状态查看\n- 强制取消线程\n- 线程详情查看\n\n### 预设智能体\n\n管理预设智能体模板：\n- 创建预设智能体（供用户选用）\n- 配置预设智能体的工具和模型\n- 同步到用户侧\n\n### 工具管理\n\n管理可用工具：\n- 查看内置工具列表\n- 配置 MCP 外部工具\n- 设置工具权限\n\n### 系统提示词\n\n管理全局提示词模板：\n- 查看和编辑系统模板\n- 切换默认模板包\n- 创建新的模板包\n\n## 调试分组\n\n这个分组聚焦工程验证和性能评估：\n\n### 吞吐量测试\n\n测试系统并发能力：\n- 并发请求测试\n- 吞吐量统计\n\n### 性能测试\n\n测试响应性能：\n- 单请求延迟测量\n- 性能采样\n\n### 蜂群测试\n\n测试蜂群协作能力：\n- 蜂群任务测试\n- 工蜂协作验证\n\n### 能力评估\n\n评估智能体能力水平：\n- 任务完成质量评估\n- 能力回归测试\n\n### 调试面板\n\n实时调试工具：\n- 实时请求追踪\n- 工具调用日志\n- 错误排查\n\n### LSP\n\n语言服务协议调试：\n- 代码智能服务状态\n- LSP 配置验证\n\n## 文档分组\n\n### 使用说明书\n\n即你正在阅读的文档站：\n- 入门指南\n- 概念说明\n- 操作参考\n- 故障排查\n\n### 接口参考\n\n快速查看接口信息：\n- 接口地址\n- 字段说明\n- 使用示例\n\n## 按角色常用面板\n\n### 管理员日常使用\n\n最常用：\n- 系统设置（配置调整）\n- 用户管理（用户问题处理）\n- 渠道监控（渠道状态检查）\n- 使用说明书（查询操作方法）\n\n### 技术运维\n\n最常用：\n- 内部状态（系统健康）\n- 线程管理（异常会话处理）\n- 渠道监控（渠道运维）\n- 性能测试（性能问题排查）\n- 调试面板（问题定位）\n\n### 运营人员\n\n最常用：\n- 用户管理（用户服务）\n- 单位管理（组织调整）\n- 渠道监控（渠道运营）\n- 使用说明书（操作指导）\n\n## 常用操作流程\n\n### 新用户加入\n\n流程：\n1. 用户管理 → 创建用户\n2. 设置用户名、密码、所属单位\n3. 根据需要发放 Token\n4. 用户即可登录使用\n\n### 配置新渠道\n\n流程：\n1. 渠道监控 → 添加渠道账号\n2. 填写渠道类型和凭证\n3. 配置 Webhook 地址（如需要）\n4. 查看账号状态确认正常\n\n### 调整系统设置\n\n流程：\n1. 系统设置 → 找到对应配置项\n2. 修改设置值\n3. 保存（通常立即生效）\n4. 在内部状态确认效果\n\n### 处理异常会话\n\n流程：\n1. 线程管理 → 查看异常线程\n2. 查看线程详情和状态\n3. 如需终止，点击取消\n4. 查看相关日志定位问题\n\n## 快速定位指南\n\n| 我要... | 去哪个面板 |\n|---------|------------|\n| 添加用户 | 用户管理 |\n| 给用户发放 Token | 用户管理 → 点击用户 → 设置 |\n| 查看系统运行状态 | 内部状态 |\n| 调整系统配置 | 系统设置 |\n| 添加新模型 | 模型配置 |\n| 管理渠道账号 | 渠道监控 |\n| 查看活跃会话 | 线程管理 或 内部状态 |\n| 处理卡住的线程 | 线程管理 → 取消 |\n| 测试系统性能 | 性能测试 或 吞吐量测试 |\n| 查看使用方法 | 使用说明书 |\n\n## 管理端访问方式\n\n管理端通常通过独立地址访问：\n- 浏览器打开管理端 URL\n- 使用管理员账户登录\n- 登录后即可使用各管理面板\n\n具体地址由部署时确定，请询问系统部署人员或查看部署文档。\n\n## 安全提醒\n\n管理端拥有系统最高权限，请注意：\n\n- 只有授权的管理员才能访问\n- 管理员账户密码要足够复杂\n- 定期更换管理员密码\n- 操作前确认影响范围，避免误操作\n- 重要操作做好记录\n\n## 廸伸阅读\n\n- [系统设置参考](/docs/zh-CN/reference/config/)\n- [渠道管理指南](/docs/zh-CN/ops/channel-runtime/)\n- [监控与评估](/docs/zh-CN/ops/benchmark-and-observability/)\n","source_path":"使用说明书/zh-CN/reference/admin-panels.md"}</script>
