  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/reference/admin-panels","language":"zh-CN","title":"管理端面板索引","summary":"管理员侧前端不是单一调试页，而是一组分工明确的治理面板。","updated_at":"2026-03-20","read_when":["你第一次使用管理员侧","你想知道某个配置、监控或文档入口应该去哪看"],"source_docs":["docs/系统介绍.md","docs/设计方案.md","web/index.html"],"tab":"参考","group":"系统参考","group_path":["系统参考"],"url":"/docs/zh-CN/reference/admin-panels/","headings":[{"id":"section-1","level":1,"text":"管理端面板索引"},{"id":"section-2","level":2,"text":"系统分组"},{"id":"section-3","level":2,"text":"智能体分组"},{"id":"section-4","level":2,"text":"调试分组"},{"id":"section-5","level":2,"text":"文档分组"},{"id":"section-6","level":3,"text":"静态文档"},{"id":"section-7","level":3,"text":"幻灯片"},{"id":"section-8","level":3,"text":"论文"},{"id":"section-9","level":3,"text":"接口"},{"id":"section-10","level":2,"text":"不同人最常用什么"},{"id":"section-11","level":3,"text":"管理员"},{"id":"section-12","level":3,"text":"开发者"},{"id":"section-13","level":3,"text":"交付或培训人员"},{"id":"section-14","level":2,"text":"一个实用建议"},{"id":"section-15","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/reference/prompt-templates","next_slug":"zh-CN/help/index","markdown":"# 管理端面板索引\n\n管理员侧前端的关键价值不是“把所有东西堆在一个页面”，而是把治理入口分组。\n\n## 系统分组\n\n这里更偏全局治理：\n\n- 内部状态\n- 系统设置\n- 单位管理\n- 用户管理\n- 外链管理\n- 渠道监控\n\n如果你要看运行态、组织和全局配置，优先来这一组。\n\n## 智能体分组\n\n这里更偏会话和能力治理：\n\n- 模型配置\n- 线程管理\n- 预设智能体\n- 工具管理\n- 系统提示词\n\n如果你要看“模型到底怎么被配置和暴露”，优先来这一组。\n\n## 调试分组\n\n这里更偏工程验证：\n\n- 吞吐量测试\n- 性能测试\n- 蜂群测试\n- 能力评估\n- 调试面板\n- LSP\n\n如果你在做联调、压测或能力验证，这组最重要。\n\n## 文档分组\n\n当前管理员侧已经把文档入口单独分组，主要包括：\n\n- 静态文档\n- 幻灯片\n- 论文\n- 接口\n\n它们的职责并不一样。\n\n### 静态文档\n\n这是公开文档站的嵌入入口。\n\n适合查：\n\n- 入门\n- 概念\n- 接入\n- 运维\n- 参考\n\n### 幻灯片\n\n适合：\n\n- 现场演示\n- 快速介绍系统结构\n\n### 论文\n\n适合：\n\n- 连续阅读系统设计稿\n- 带目录查看长文内容\n\n### 接口\n\n适合：\n\n- 快速查 `/wunder` 和相关接口\n- 看字段、示例和接入方式\n\n## 不同人最常用什么\n\n### 管理员\n\n最常看：\n\n- 系统设置\n- 用户管理\n- 渠道监控\n- 静态文档\n\n### 开发者\n\n最常看：\n\n- 调试面板\n- 接口\n- 工具管理\n- 性能测试\n\n### 交付或培训人员\n\n最常看：\n\n- 静态文档\n- 幻灯片\n- 论文\n\n## 一个实用建议\n\n如果你不知道某个问题应该从哪里开始查，按这个顺序：\n\n1. 先看静态文档有没有现成说明\n2. 再看接口页有没有明确字段\n3. 再回到对应治理面板做验证\n\n## 延伸阅读\n\n- [管理端界面](/docs/zh-CN/surfaces/web-admin/)\n- [配置说明](/docs/zh-CN/reference/config/)\n- [流式事件参考](/docs/zh-CN/reference/stream-events/)\n","source_path":"静态站文档/zh-CN/reference/admin-panels.md"}</script>
