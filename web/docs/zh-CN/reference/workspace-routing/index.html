  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/reference/workspace-routing","language":"zh-CN","title":"工作区管理参考","summary":"文件存放位置与管理技巧，帮助你高效管理智能体工作中的产生的文件。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"系统参考","group_path":["系统参考"],"url":"/docs/zh-CN/reference/workspace-routing/","headings":[{"id":"section-1","level":1,"text":"工作区管理参考"},{"id":"section-2","level":2,"text":"工作区的概念"},{"id":"section-3","level":2,"text":"工作区类型"},{"id":"section-4","level":3,"text":"个人工作区"},{"id":"section-5","level":3,"text":"智能体工作区"},{"id":"section-6","level":2,"text":"如何访问工作区"},{"id":"section-7","level":3,"text":"通过界面访问"},{"id":"section-8","level":3,"text":"通过对话使用"},{"id":"section-9","level":2,"text":"文件上传与处理"},{"id":"section-10","level":3,"text":"上传方式"},{"id":"section-11","level":3,"text":"支持的文件类型"},{"id":"section-12","level":3,"text":"上传后的处理"},{"id":"section-13","level":2,"text":"文件下载"},{"id":"section-14","level":3,"text":"智能体生成的文件"},{"id":"section-15","level":3,"text":"下载位置"},{"id":"section-16","level":2,"text":"工作区组织建议"},{"id":"section-17","level":3,"text":"推荐做法"},{"id":"section-18","level":3,"text":"避免的做法"},{"id":"section-19","level":2,"text":"工作区与临时目录的区别"},{"id":"section-20","level":3,"text":"工作区（长期存储）"},{"id":"section-21","level":3,"text":"临时目录（中转区域）"},{"id":"section-22","level":2,"text":"常见问题解答"},{"id":"section-23","level":3,"text":"文件上传后在哪里？"},{"id":"section-24","level":3,"text":"为什么智能体说找不到文件？"},{"id":"section-25","level":3,"text":"智能体生成的文件怎么保存？"},{"id":"section-26","level":3,"text":"可以访问其他用户的文件吗？"},{"id":"section-27","level":3,"text":"文件会自动清理吗？"},{"id":"section-28","level":3,"text":"Desktop 本地模式的特殊之处"},{"id":"section-29","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/reference/stream-events","next_slug":"zh-CN/reference/prompt-templates","markdown":"# 工作区管理参考\n\nWunder 的工作区是你和智能体的文件存放空间。理解工作区的组织方式，能帮助你更好地管理文件、找到智能体生成的产物。\n\n## 工作区的概念\n\n**简单来说**：工作区就是一个专门的文件夹，用于存放：\n- 你上传给智能体分析的文件\n- 智能体在工作中生成的文件\n- 任务执行过程中的临时文件\n\n## 工作区类型\n\n### 个人工作区\n\n**用途**：存放你个人的文件。\n\n**位置**：每个用户都有独立的个人工作区，其他人无法访问。\n\n**你可以在里面放**：\n- 自己的文档、资料\n- 想让智能体分析的文件\n- 智能体为你生成的产物\n\n### 智能体工作区\n\n**用途**：存放特定智能体的工作文件。\n\n**特点**：\n- 每个智能体可以有独立的工作区\n- 智能体在这个空间里执行文件操作\n- 不同智能体的文件相互隔离\n\n**为什么需要**：\n- 防止不同智能体的文件混在一起\n- 智能体可以有独立的\"工作台\"\n\n## 如何访问工作区\n\n### 通过界面访问\n\n- 位置：桌面应用或网页端 → 左栏\"文件\"或\"工作区\"\n- 操作：可以浏览目录、上传文件、下载文件、删除文件\n\n### 通过对话使用\n\n在对话中，你可以：\n- 直接上传文件让智能体使用\n- 让智能体读取你工作区里的文件\n- 让智能体把结果保存到工作区\n\n## 文件上传与处理\n\n### 上传方式\n\n- **对话框上传**：点击上传按钮或直接拖拽文件到对话框\n- **工作区页面上传**：在工作区界面点击上传\n\n### 支持的文件类型\n\n| 类型 | 说明 |\n|------|------|\n| 文档 | PDF、Word、Markdown 等，会自动转换为文本供智能体分析 |\n| 图片 | PNG、JPG 等，智能体可以直接查看和分析 |\n| 音频 | MP3、WAV 等，会自动转写为文字 |\n| 视频 | MP4 等，会按设定帧率提取画面分析 |\n| 代码文件 | 各种编程语言文件，智能体可直接读取 |\n| 其他 | 其他类型文件按原样存储，智能体可尝试读取 |\n\n### 上传后的处理\n\n某些文件上传后需要处理（如文档转文字、音频转写），处理完成后才能使用。处理过程中发送按钮会被禁用，这是正常保护机制。\n\n## 文件下载\n\n### 智能体生成的文件\n\n当智能体创建了文件（如报告、代码、图片等），你可以：\n- 在工作区中找到并下载\n- 有些可以直接在对话中预览\n\n### 下载位置\n\n- 界面上点击文件 → 选择下载\n- 文件会下载到你本机的下载目录\n\n## 工作区组织建议\n\n### 推荐做法\n\n1. **分类存放**：不同类型的项目文件放在不同子目录\n2. **及时清理**：不需要的文件及时删除，保持整洁\n3. **命名规范**：给文件取有意义的名字，方便查找\n\n### 避免的做法\n\n1. **堆在一起**：所有文件都放根目录，难以管理\n2. **长期不清理**：积累了大量无用文件\n3. **随意命名**：文件名没有意义，找起来困难\n\n## 工作区与临时目录的区别\n\n### 工作区（长期存储）\n\n- 存放长期使用的文件\n- 内容会持久保存\n- 你主动管理的空间\n\n### 临时目录（中转区域）\n\n- 用于文件上传下载的中转\n- 内容可能被自动清理\n- 不适合存放长期文件\n\n**重要提醒**：不要把需要长期保存的文件放在临时目录。\n\n## 常见问题解答\n\n### 文件上传后在哪里？\n\n上传的文件会存入当前智能体的工作区。你可以在\"文件\"或\"工作区\"页面查看。\n\n### 为什么智能体说找不到文件？\n\n可能原因：\n- 文件名或路径不对\n- 文件还没上传\n- 文件在其他工作区（当前智能体无权访问）\n\n解决办法：\n- 确认文件已上传\n- 使用完整正确的文件名\n- 检查当前智能体的工作区\n\n### 智能体生成的文件怎么保存？\n\n智能体通常会自动把文件保存到工作区。你可以在工作区页面找到并下载。\n\n### 可以访问其他用户的文件吗？\n\n不可以。每个用户的工作区是隔离的，你只能访问自己的文件。\n\n### 文件会自动清理吗？\n\n工作区的文件不会自动清理（长期存储）。临时目录的文件可能会被定期清理。\n\n### Desktop 本地模式的特殊之处\n\nDesktop 本地模式下，智能体可以访问你本机的其他目录（取决于安全设置）。这比纯工作区更灵活，但也要注意安全边界。\n\n## 延伸阅读\n\n- [文件工具说明](/docs/zh-CN/tools/workspace-files/)\n- [数据管理](/docs/zh-CN/ops/data-and-storage/)\n- [桌面应用说明](/docs/zh-CN/surfaces/desktop-ui/)\n","source_path":"使用说明书/zh-CN/reference/workspace-routing.md"}</script>
