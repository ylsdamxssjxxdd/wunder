  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/reference/index","language":"zh-CN","title":"参考概览","summary":"参考页提供常用设置的快速查找、系统状态说明和功能定位，适合在需要具体操作指导时查阅。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"概览","group_path":["概览"],"url":"/docs/zh-CN/reference/","headings":[{"id":"section-1","level":1,"text":"参考概览"},{"id":"section-2","level":2,"text":"快速查找入口"},{"id":"section-3","level":2,"text":"按角色查阅"},{"id":"section-4","level":3,"text":"普通用户"},{"id":"section-5","level":3,"text":"系统管理员"},{"id":"section-6","level":2,"text":"什么时候查阅参考页"},{"id":"section-7","level":2,"text":"参考页和其他部分的关系"},{"id":"section-8","level":2,"text":"常见误区"},{"id":"section-9","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/ops/channel-runtime","next_slug":"zh-CN/reference/api-index","markdown":"# 参考概览\n\n这里收录的是日常使用中最常查阅的操作参考和配置说明。当你需要知道\"某个功能在哪\"、\"某个状态意味着什么\"、\"某个设置怎么改\"时，从这里入手。\n\n## 快速查找入口\n\n<div class=\"docs-card-grid docs-card-grid-compact\">\n  <a class=\"docs-card\" href=\"/docs/zh-CN/reference/api-index/\"><strong>功能与能力速查<\/strong><span>Wunder 能做什么，每个能力在哪使用。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/reference/config/\"><strong>系统设置参考<\/strong><span>常用设置项的含义与推荐值。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/reference/stream-events/\"><strong>会话状态说明<\/strong><span>聊天过程中各种状态的含义。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/reference/workspace-routing/\"><strong>工作区管理参考<\/strong><span>文件存放位置与管理技巧。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/reference/prompt-templates/\"><strong>提示词与个性化<\/strong><span>如何定制智能体的回答风格。<\/span><\/a>\n  <a class=\"docs-card\" href=\"/docs/zh-CN/reference/admin-panels/\"><strong>管理端面板指南<\/strong><span>管理员后台各面板的功能定位。<\/span><\/a>\n<\/div>\n\n## 按角色查阅\n\n### 普通用户\n\n优先看：\n\n- 功能与能力速查 —— 了解 Wunder 能帮你做什么\n- 会话状态说明 —— 理解对话过程中的各种提示\n- 工作区管理参考 —— 学会管理自己的文件\n- 提示词与个性化 —— 定制属于自己的智能体风格\n\n### 系统管理员\n\n优先看：\n\n- 系统设置参考 —— 掌握各项配置的作用\n- 管理端面板指南 —— 快速定位管理入口\n- 功能与能力速查 —— 了解系统整体能力范围\n\n## 什么时候查阅参考页\n\n- 你想知道某个设置改了会有什么影响\n- 你想知道某个状态指示器代表什么意思\n- 你想知道某个功能在界面的哪个位置\n- 你想快速确认某项配置的标准做法\n\n## 参考页和其他部分的关系\n\n参考页侧重\"查表\"——提供稳定、可反复查阅的标准信息。如果你想了解系统整体工作原理，可以先看 [核心概念](/docs/zh-CN/concepts/)；如果你想解决具体问题，可以看 [故障排查](/docs/zh-CN/help/troubleshooting/)。\n\n## 常见误区\n\n- 不要把参考页当成入门教程 —— 它们是供查阅的，不是供顺序阅读的\n- 不要凭印象修改设置 —— 先查阅设置说明，理解后再改\n- 遇到状态异常时不要猜测 —— 先查阅状态说明，再采取行动\n\n## 延伸阅读\n\n- [核心概念](/docs/zh-CN/concepts/)\n- [帮助中心](/docs/zh-CN/help/)\n- [故障排查](/docs/zh-CN/help/troubleshooting/)\n","source_path":"使用说明书/zh-CN/reference/index.md"}</script>
