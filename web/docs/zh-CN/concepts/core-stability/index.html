  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-stability","language":"zh-CN","title":"稳定性","summary":"出错不扩散，失败能恢复。系统在各种边界情况下保持稳定运行，而不是直接崩溃。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-stability/","headings":[{"id":"section-1","level":1,"text":"稳定性"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"控扩散"},{"id":"section-4","level":3,"text":"能恢复"},{"id":"section-5","level":3,"text":"可复盘"},{"id":"section-6","level":2,"text":"作用"},{"id":"section-7","level":3,"text":"对普通用户"},{"id":"section-8","level":3,"text":"对管理员"},{"id":"section-9","level":2,"text":"关键机制"},{"id":"section-10","level":3,"text":"上下文超限处理"},{"id":"section-11","level":3,"text":"网络中断恢复"},{"id":"section-12","level":3,"text":"工具失败分类"},{"id":"section-13","level":3,"text":"事务一致性"},{"id":"section-14","level":2,"text":"实践"},{"id":"section-15","level":3,"text":"什么时候耐心等待"},{"id":"section-16","level":3,"text":"什么时候主动介入"},{"id":"section-17","level":3,"text":"系统异常时的排查"},{"id":"section-18","level":2,"text":"常见误区"},{"id":"section-19","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/core-realtime","next_slug":"zh-CN/concepts/core-observability","markdown":"# 稳定性\n\n## 原理\n\nWunder 面对的是复杂场景：长对话、高并发、多工具链、多入口。任何一个环节出错，都可能影响整个系统。\n\n稳定性的设计哲学：**出错不扩散，失败能恢复**。不是指望\"不出错\"，而是出错时系统能兜住、能续跑、能解释。\n\n### 控扩散\n\n最危险的不是单点失败，而是失败把其他部分一起带崩。系统通过各种隔离机制控制扩散：\n- **上下文压缩**：防止超长上下文拖垮线程\n- **工具输出限制**：防止超大返回拖垮上下文\n- **超时机制**：防止无限等待卡住系统\n- **队列控制**：防止请求堆积拖垮服务\n\n### 能恢复\n\n失败不是终点，系统有正式恢复链路：\n- **网络中断**：自动重连 + 事件补发\n- **模型调用失败**：自动重试 + 降级\n- **工具失败**：错误分类 + 重试策略\n- **会话异常**：恢复续跑 + 状态重建\n\n### 可复盘\n\n同类问题要能被归类、复现、回归验证：\n- 完整的错误日志\n- 结构化错误信息\n- 关键事件记录\n\n## 作用\n\n### 对普通用户\n\n- **长对话不会断**：上下文压缩让超长对话能继续\n- **工具失败有兜底**：自动重试，不直接报错\n- **网络波动不怕**：自动重连，不会丢失进度\n- **卡住能处理**：重置功能让你从干净状态重新开始\n\n### 对管理员\n\n- **系统扛得住高并发**：队列和限流控制流量\n- **异常可观测**：完整的日志和监控\n- **问题可追溯**：能回放事件流定位问题\n- **能主动治理**：通过配置控制系统行为\n\n## 关键机制\n\n### 上下文超限处理\n\n| 层级 | 处理方式 |\n|------|----------|\n| Level 1 | 压缩工具结果 |\n| Level 2 | 摘要历史对话 |\n| Level 3 | 移除早期轮次 |\n| Level 4 | 仅保留核心设定和当前请求 |\n\n### 网络中断恢复\n\n```\n连接断开 → 自动重连（指数退避）\n              ↓\n         缓存未推送事件\n              ↓\n         重连成功 → 补发事件\n              ↓\n         重连失败 → 提示手动刷新\n```\n\n### 工具失败分类\n\n| 失败类型 | 处理方式 |\n|----------|----------|\n| 参数错误 | 让智能体修正参数 |\n| 权限拒绝 | 等待用户审批 |\n| 临时错误 | 自动重试 |\n| 系统错误 | 有限重试 + 降级 |\n\n### 事务一致性\n\n涉及多个步骤的操作使用数据库事务：\n- 要么全部成功\n- 要么全部回滚\n- 不会出现中间状态\n\n## 实践\n\n### 什么时候耐心等待\n\n- 上下文压缩：系统在处理，等待即可\n- 网络重连：自动在恢复，等待即可\n- 工具重试：系统在处理，等待即可\n\n### 什么时候主动介入\n\n- **长时间无响应**：超过正常范围，可能需要取消\n- **状态明显异常**：界面显示和实际不一致，考虑重置\n- **审批请求**：需要你确认的操作\n\n### 系统异常时的排查\n\n1. 检查网络连接\n2. 查看界面状态提示\n3. 如果卡住，尝试取消或重置\n4. 查看错误提示了解原因\n5. 联系管理员查看系统日志\n\n## 常见误区\n\n- **只要回答出来了就是稳定？** 不是。稳定性要看长期运行表现，不只是单次。\n- **重试就能解决所有问题？** 不是。错误隔离和资源治理同样重要。\n- **偶发问题不用管？** 不是。没有复盘的问题可能会反复出现。\n\n## 延伸阅读\n\n- [边界处理](/docs/zh-CN/concepts/boundary-handling/) —— 边界情况下的详细行为\n- [故障排查](/docs/zh-CN/help/troubleshooting/) —— 实际问题解决方法\n- [上下文压缩](/docs/zh-CN/concepts/core-context-compression/) —— 超限处理机制\n","source_path":"使用说明书/zh-CN/concepts/core-stability.md"}</script>
