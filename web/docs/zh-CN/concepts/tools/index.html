  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/tools","language":"zh-CN","title":"工具体系","summary":"智能体的能力来自多种工具来源，但调度、展示和权限统一管理。理解工具来源和边界，用好工具。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"深入了解","group_path":["深入了解"],"url":"/docs/zh-CN/concepts/tools/","headings":[{"id":"section-1","level":1,"text":"工具体系"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"五种工具来源"},{"id":"section-4","level":3,"text":"内置工具"},{"id":"section-5","level":3,"text":"MCP 工具"},{"id":"section-6","level":3,"text":"技能（Skills）"},{"id":"section-7","level":2,"text":"作用"},{"id":"section-8","level":3,"text":"为什么必须统一"},{"id":"section-9","level":3,"text":"工具描述的重要性"},{"id":"section-10","level":2,"text":"实践"},{"id":"section-11","level":3,"text":"查看可用工具"},{"id":"section-12","level":3,"text":"工具权限"},{"id":"section-13","level":3,"text":"工具审批"},{"id":"section-14","level":3,"text":"工具结果"},{"id":"section-15","level":2,"text":"常见误区"},{"id":"section-16","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/presence-and-runtime","next_slug":"zh-CN/concepts/prompt-and-skills","markdown":"# 工具体系\n\n## 原理\n\nWunder 的智能体不只会\"说话\"，还会\"做事\"。做事的能力全部来自工具。工具有多种来源，但最终统一调度。\n\n### 五种工具来源\n\n```\n内置工具 ← 系统自带，最稳定\n    +\nMCP 工具 ← 外部服务接入\n    +\n技能（Skills） ← 流程化经验包\n    +\n知识库 ← 可检索的参考资料\n    +\n用户工具 ← 个人扩展能力\n    ↓\n统一调度层（智能体统一使用）\n```\n\n### 内置工具\n\n系统自带的基础能力，覆盖最常见的场景：\n\n| 类别 | 工具举例 | 用途 |\n|------|----------|------|\n| 文件操作 | 读取、写入、搜索、列表 | 处理工作区文件 |\n| 命令执行 | 执行命令 | 运行脚本和代码 |\n| 网络操作 | 网页抓取 | 获取网页内容 |\n| 桌面操作 | 截图、控制 | 桌面端控制 |\n| 会话管理 | 线程控制、记忆管理 | 管理对话状态 |\n| 协作 | 蜂群调度、子智能体 | 多智能体协作 |\n\n### MCP 工具\n\nMCP（Model Context Protocol）是接入外部能力的标准协议。通过 MCP 可以接入：\n- 数据库操作工具\n- 第三方 API 服务\n- 专业领域的工具\n\n### 技能（Skills）\n\n技能是\"流程化的经验包\"，封装了某类任务的完整方法：\n- 操作说明文档\n- 执行步骤和约束\n- 示例文件和资源\n\n技能让智能体面对特定任务时有成熟方法论可以参考。\n\n## 作用\n\n### 为什么必须统一\n\n如果不同来源的工具各自为政：\n- 智能体不知道该用哪个工具\n- 界面无法统一展示\n- 权限和审计被打散\n- 排障找不到问题在哪一层\n\nWunder 的做法：**来源不同，调度统一**。所有工具在同一层面被管理、被调用、被审计。\n\n### 工具描述的重要性\n\n好的工具描述让智能体准确调用。差的描述导致误用和幻觉。工具描述需要：\n- 准确说明工具用途\n- 明确适用场景\n- 说清参数含义\n- 标注限制条件\n\n## 实践\n\n### 查看可用工具\n\n在界面左栏\"工具\"页面可以看到：\n- 当前可用的工具列表\n- 每个工具的功能说明\n- 工具的来源（内置/MCP/技能等）\n\n### 工具权限\n\n不是所有工具对所有用户都可用：\n- 管理员控制哪些工具被启用\n- 敏感工具有审批机制\n- 不同运行形态可能有不同工具集\n\n### 工具审批\n\n当智能体调用敏感工具时：\n1. 系统暂停执行\n2. 弹出审批请求，说明要做什么\n3. 你批准或拒绝\n4. 根据你的决定继续或调整\n\n审批模式可以调整严格程度（由管理员配置）。\n\n### 工具结果\n\n工具返回的结果会被智能体用于下一步判断。如果结果太大，系统会自动精简以保持对话能继续。\n\n## 常见误区\n\n- **工具越多越好？** 不是。工具太多且描述不清反而让智能体更容易选错。\n- **技能只是文档？** 不是。技能是智能体可以主动读取的运行资源。\n- **所有工具始终可用？** 不是。工具可见性受配置、运行形态和安全策略影响。\n\n## 延伸阅读\n\n- [工具总览](/docs/zh-CN/tools/) —— 所有工具的详细说明\n- [工具（核心）](/docs/zh-CN/concepts/core-tools/) —— 工具设计原则\n- [提示词与技能](/docs/zh-CN/concepts/prompt-and-skills/) —— 技能如何工作\n","source_path":"使用说明书/zh-CN/concepts/tools.md"}</script>
