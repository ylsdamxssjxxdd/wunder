  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/tools","language":"zh-CN","title":"工具体系","summary":"Wunder 的核心不是只让模型回答，而是让模型在同一调度层里选择并编排工具。","updated_at":"2026-04-02","read_when":["你要理解 wunder 的能力为什么不只是聊天","你要知道工具来源、边界与编排方式"],"source_docs":["docs/系统介绍.md","docs/API文档.md","docs/工具调用.md"],"tab":"概念","group":"核心概念","group_path":["核心概念"],"url":"/docs/zh-CN/concepts/tools/","headings":[{"id":"section-1","level":1,"text":"工具体系"},{"id":"section-2","level":2,"text":"本页重点"},{"id":"section-3","level":2,"text":"关键结论"},{"id":"section-4","level":2,"text":"工具从哪里来"},{"id":"section-5","level":2,"text":"内置工具先看什么"},{"id":"section-6","level":2,"text":"MCP 负责什么"},{"id":"section-7","level":2,"text":"Skills 负责什么"},{"id":"section-8","level":2,"text":"知识库和用户工具分别解决什么"},{"id":"section-9","level":2,"text":"为什么一定要统一工具体系"},{"id":"section-10","level":2,"text":"常见误区"},{"id":"section-11","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/presence-and-runtime","next_slug":"zh-CN/concepts/prompt-and-skills","markdown":"# 工具体系\n\nWunder 的核心不是“模型回答”，而是“模型调度工具完成任务”。\n\n## 本页重点\n\n- Wunder 里的工具到底从哪里来\n- 为什么不同来源的工具还能统一调度\n- 为什么同一会话里工具可见性会变化\n\n## 关键结论\n\n- 对模型来说，能力尽量统一成工具，而不是散落在不同隐式机制里。\n- 对开发者来说，很多系统能力最终也要落成工具，才能被编排、治理和观察。\n- 工具来源可以不同，但调度层、展示层和权限层尽量统一。\n\n## 工具从哪里来\n\n当前至少包括这些来源：\n\n- 内置工具\n- MCP 工具\n- Skills\n- 知识库工具\n- 用户工具\n\n## 内置工具先看什么\n\n内置工具承载最基础、最稳定的执行面。\n\n高频例子包括：\n\n- 文件与工作区：读取文件、写入文件、应用补丁、搜索内容、列出文件\n- 运行态：执行命令、`ptc`、休眠等待\n- 网页与桌面：`web_fetch`、浏览器、桌面控制\n- 会话与协作：线程控制、子智能体控制、智能体蜂群、记忆管理\n\n如果你现在就想知道某个工具怎么选，直接去看 [工具总览](/docs/zh-CN/tools/)。\n\n## MCP 负责什么\n\nMCP 负责把 Wunder 之外的系统能力接进来。\n\n它不是替代内置工具，而是把额外服务纳入统一调度，比如：\n\n- 数据库\n- 外部服务\n- 第三方系统桥接\n\n## Skills 负责什么\n\nSkill 更像流程化经验包。\n\n它封装的通常不是“一个动作”，而是：\n\n- 一套方法\n- 一组步骤\n- 一批约束\n- 某类任务最佳实践\n\n## 知识库和用户工具分别解决什么\n\n- 知识库提供的是受控上下文来源，适合制度、长文档和领域资料。\n- 用户工具允许不同用户按自己的工作场景扩展能力，但仍在系统治理边界内运行。\n\n## 为什么一定要统一工具体系\n\n如果不同来源的工具各自为政，会出现这些问题：\n\n- 模型不知道该优先调用哪一类能力\n- 前端无法统一展示和搜索\n- 权限、审计和治理被打散\n- 排障时很难看清到底是哪一层出了问题\n\nWunder 的做法是：来源不同，但调度和展示尽量统一。\n\n## 常见误区\n\n- `web_fetch`、浏览器、桌面控制都算工具，但它们不是同一种能力边界。\n- Skill 不是工具别名，它更像“模型可读的操作手册”。\n- 工具是否可见，不只由代码决定，还受运行形态、配置和会话上下文影响。\n\n## 延伸阅读\n\n- [工具总览](/docs/zh-CN/tools/)\n- [网页抓取](/docs/zh-CN/tools/web-fetch/)\n- [MCP 入口](/docs/zh-CN/integration/mcp-endpoint/)\n- [A2A 接口](/docs/zh-CN/integration/a2a/)\n- [系统架构](/docs/zh-CN/concepts/architecture/)\n","source_path":"使用说明书/zh-CN/concepts/tools.md"}</script>
