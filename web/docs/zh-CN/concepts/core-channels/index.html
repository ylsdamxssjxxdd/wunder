  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-channels","language":"zh-CN","title":"渠道","summary":"不同入口共享同一套核心能力。无论用桌面应用、网页端还是飞书微信，体验一致。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-channels/","headings":[{"id":"section-1","level":1,"text":"渠道"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"渠道 = 入口层"},{"id":"section-4","level":3,"text":"多入口共核"},{"id":"section-5","level":2,"text":"作用"},{"id":"section-6","level":3,"text":"对你"},{"id":"section-7","level":3,"text":"对管理员"},{"id":"section-8","level":2,"text":"渠道接入方式"},{"id":"section-9","level":2,"text":"关键规则"},{"id":"section-10","level":3,"text":"协议适配只到入口"},{"id":"section-11","level":3,"text":"线程语义一致"},{"id":"section-12","level":3,"text":"状态同步"},{"id":"section-13","level":2,"text":"实践"},{"id":"section-14","level":3,"text":"配置渠道账号"},{"id":"section-15","level":3,"text":"渠道常见问题排查"},{"id":"section-16","level":3,"text":"文件附件处理"},{"id":"section-17","level":2,"text":"常见误区"},{"id":"section-18","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/core-memory","next_slug":"zh-CN/concepts/core-scheduled-tasks","markdown":"# 渠道\n\n## 原理\n\nWunder 支持多种使用入口：\n- 桌面应用\n- 网页端\n- 命令行\n- 飞书、企业微信、微信、QQ 等第三方平台\n\n但这些入口不是各自独立的系统。它们共享同一套**执行内核**：调度、线程、工具、事件、治理都是统一的。\n\n### 渠道 = 入口层\n\n渠道只负责：\n- 接收你的消息（从什么平台进来）\n- 传递系统返回（把结果送回去）\n\n不负责的：\n- 不重新定义业务逻辑\n- 不改变执行方式\n- 不独立存储数据\n\n### 多入口共核\n\n不管从哪个渠道进来，最终都落到同一条线程执行。这意味着：\n- 在桌面应用里开的会话，在网页端也能看到\n- 从飞书发的消息，和网页端发的消息，智能体用同样的方式处理\n- 渠道只是\"面子\"不同，\"里子\"是同一套\n\n## 作用\n\n### 对你\n\n**体验一致**：习惯用飞书就继续在飞书用，习惯用网页端就用网页端。能力是一样的。\n\n**无缝切换**：在飞书开了个会话，需要传大文件可以去网页端上传，再回来飞书继续对话。\n\n### 对管理员\n\n**统一治理**：管理端配置对所有渠道统一生效，不用每个渠道单独管理。\n\n**渠道管理**：可以统一查看各渠道的运行状态、消息收发情况、异常告警。\n\n## 渠道接入方式\n\n| 渠道 | 接入方式 | 适合场景 |\n|------|----------|----------|\n| **桌面应用** | 本地安装 | 个人日常使用 |\n| **网页端** | 浏览器访问 | 团队 Server 模式 |\n| **飞书** | Webhook + 长连接 | 组织内部协作 |\n| **企业微信** | Webhook | 企业通信 |\n| **微信** | 官方渠道 | 个人用户 |\n| **QQ Bot** | 官方 API | QQ 用户 |\n\n## 关键规则\n\n### 协议适配只到入口\n\n接入层负责协议适配（把飞书消息转成系统能理解的格式，反之亦然），但业务逻辑是统一的。\n\n### 线程语义一致\n\n不管从哪个渠道来的请求，最终都进入同一线程执行。渠道不会创造独立的执行逻辑。\n\n### 状态同步\n\n渠道接入的消息有完整的生命周期管理：\n- 接收 → 排队 → 执行 → 结果投递\n- 失败会自动重试\n- 投递有 outbox 机制保证最终一致性\n\n## 实践\n\n### 配置渠道账号\n\n1. 在对应平台创建应用/机器人（如飞书应用）\n2. 获取凭证（AppID、AppSecret 等）\n3. 在管理端添加渠道账号\n4. 配置 Webhook 回调地址（平台把消息推给 Wunder）\n5. 测试消息收发是否正常\n\n### 渠道常见问题排查\n\n如果渠道消息没收到：\n- 检查渠道账号状态是否在线\n- 查看 Webhook 配置是否正确\n- 检查平台侧的消息推送日志\n- 在管理端查看渠道运行日志\n\n### 文件附件处理\n\n渠道客户端通常无法直接理解内部文件路径，所以附件会临时转成下载链接。如果渠道里的附件打不开，通常需要检查临时目录服务。\n\n## 常见误区\n\n- **渠道是独立系统？** 不是。渠道只是入口，核心是统一的。\n- **不同渠道能力不同？** 核心能力相同，但入口形式可能有差异（如飞书可能不支持某些文件操作）。\n- **Desktop 和 Server 是两个系统？** 不是。Desktop 是本地优先的运行形态，Server 是多用户模式，但核心是同一套。\n\n## 延伸阅读\n\n- [系统架构](/docs/zh-CN/concepts/architecture/) —— 三层架构详解\n- [渠道管理指南](/docs/zh-CN/ops/channel-runtime/) —— 运维和排障\n- [渠道工具](/docs/zh-CN/tools/channel/) —— 渠道相关工具说明\n","source_path":"使用说明书/zh-CN/concepts/core-channels.md"}</script>
