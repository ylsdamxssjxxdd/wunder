  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-channels","language":"zh-CN","title":"渠道","summary":"渠道核心解释 Wunder 为什么允许多入口接入，但绝不允许这些入口长成多套独立运行时。","updated_at":"2026-04-10","read_when":["你在做多入口接入","你想判断某项能力应该放在内核还是接入层"],"source_docs":["docs/总体设计.md"],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-channels/","headings":[{"id":"section-1","level":1,"text":"渠道"},{"id":"section-2","level":2,"text":"先给结论"},{"id":"section-3","level":2,"text":"为什么它必须单列为核心"},{"id":"section-4","level":2,"text":"这个核心真正保护什么"},{"id":"section-5","level":2,"text":"关键约束"},{"id":"section-6","level":2,"text":"设计重点"},{"id":"section-7","level":3,"text":"重点一：渠道多样化不能破坏线程语义"},{"id":"section-8","level":3,"text":"重点二：接入差异是“面”，不是“骨”"},{"id":"section-9","level":3,"text":"重点三：入口越多，统一口径越重要"},{"id":"section-10","level":2,"text":"最容易搞错的点"},{"id":"section-11","level":2,"text":"和其他核心的边界"},{"id":"section-12","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/core-memory","next_slug":"zh-CN/concepts/core-scheduled-tasks","markdown":"# 渠道\n\nWunder 有多种运行形态和接入方式，但这些入口不应该长成互相分裂的系统。渠道核心关注的是“入口怎么多样化”和“内核怎么保持唯一”之间的平衡。\n\n![渠道图：HTTP、WebSocket、Desktop、CLI、第三方渠道共同接入统一运行内核](/docs/assets/manual/core-channels.svg)\n\n## 先给结论\n\n- 渠道只是入口层差异，不是业务内核差异。\n- 新入口应该优先复用线程、工具、事件、治理这些已有能力，而不是复制一套逻辑。\n- 渠道做得越多，越需要收口，不能越做越例外化。\n\n## 为什么它必须单列为核心\n\n如果没有渠道这个核心，系统很容易演化成这样：\n\n- 聊天 WebSocket 一套状态机。\n- `/wunder` SSE 一套状态机。\n- desktop/cli 再各自补一层特例。\n- 第三方渠道再做一轮协议翻译后顺手重写业务逻辑。\n\n最终结果就是多入口各说各话，线程语义、工具语义和事件语义都不再统一。\n\n## 这个核心真正保护什么\n\n- 保护内核唯一性：所有入口共享同一套线程、工具、事件和治理能力。\n- 保护协议边界：接入层负责协议适配，不负责重新定义业务真相。\n- 保护演进速度：新入口可以扩展，但不必重新建一套系统。\n\n## 关键约束\n\n| 约束 | 作用 |\n|------|------|\n| 多入口共核 | 避免一个系统长成多个半独立产品 |\n| 接入层只做协议适配 | 防止入口层篡改线程、工具、事件语义 |\n| 新渠道优先复用已有能力 | 控制维护成本和行为漂移 |\n| 本地形态也要保留内核口径 | desktop 和 cli 不能变成特例系统 |\n\n## 设计重点\n\n### 重点一：渠道多样化不能破坏线程语义\n\n不管消息来自网页、桌面、CLI 还是第三方平台，最终都应落回同一线程和事件体系。\n\n### 重点二：接入差异是“面”，不是“骨”\n\n不同渠道可以有不同鉴权、协议、消息格式、连接方式，但这些都应该止步于接入面。\n\n### 重点三：入口越多，统一口径越重要\n\n渠道不是为了炫技接得更多，而是为了让相同能力在不同入口都可用。真正难的是在扩入口的同时不扩混乱。\n\n## 最容易搞错的点\n\n- Desktop、CLI、Server 是运行形态差异，不是三个独立产品内核。\n- 第三方渠道接入是协议适配，不是重新实现一套调度系统。\n- 渠道越多越需要收口，而不是越需要例外分支。\n\n## 和其他核心的边界\n\n- 和 [实时性](/docs/zh-CN/concepts/core-realtime/) 的区别：渠道讲“从哪里进来”，实时性讲“状态怎么持续送出去”。\n- 和 [多用户管理](/docs/zh-CN/concepts/core-multi-user-management/) 的区别：渠道讲入口统一，多用户管理讲治理统一。\n- 和 [稳定性](/docs/zh-CN/concepts/core-stability/) 的区别：渠道负责不分裂，稳定性负责不崩。\n\n## 延伸阅读\n\n- [核心概览](/docs/zh-CN/concepts/)\n- [系统架构](/docs/zh-CN/concepts/architecture/)\n- [接入概览](/docs/zh-CN/integration/)\n- [聊天 WebSocket](/docs/zh-CN/integration/chat-ws/)\n","source_path":"使用说明书/zh-CN/concepts/core-channels.md"}</script>
