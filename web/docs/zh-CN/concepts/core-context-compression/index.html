  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-context-compression","language":"zh-CN","title":"上下文压缩","summary":"长对话不会因为太长而中断。系统通过智能压缩保留有效信息，让对话持续进行。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-context-compression/","headings":[{"id":"section-1","level":1,"text":"上下文压缩"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"压缩不是删除"},{"id":"section-4","level":3,"text":"压缩层级"},{"id":"section-5","level":2,"text":"作用"},{"id":"section-6","level":3,"text":"为什么需要压缩"},{"id":"section-7","level":3,"text":"压缩保护什么"},{"id":"section-8","level":2,"text":"关键规则"},{"id":"section-9","level":3,"text":"压缩不能改写事实"},{"id":"section-10","level":3,"text":"系统提示词不受压缩影响"},{"id":"section-11","level":3,"text":"压缩是可观测的"},{"id":"section-12","level":2,"text":"实践"},{"id":"section-13","level":3,"text":"什么情况下容易触发压缩"},{"id":"section-14","level":3,"text":"如何减少不必要的压缩"},{"id":"section-15","level":3,"text":"压缩后对话质量会下降吗？"},{"id":"section-16","level":2,"text":"常见误区"},{"id":"section-17","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/core-swarm","next_slug":"zh-CN/concepts/core-memory","markdown":"# 上下文压缩\n\n## 原理\n\n智能体的\"记忆\"有上限——每次对话能携带的历史内容不能无限长（由 AI 模型的上下文窗口决定）。当对话越来越长，历史内容加上工具结果的总和可能超出上限。\n\n上下文压缩就是解决这个问题的：**在不中断对话的前提下，智能地精简历史内容，保留最有效的信息，让对话继续运行。**\n\n### 压缩不是删除\n\n压缩和粗暴删除有本质区别：\n\n- **删除**：直接砍掉内容，不管重要不重要\n- **压缩**：重新组织内容，保留关键事实，精简冗余部分\n\n好的压缩让你几乎感觉不到信息丢失，对话可以自然继续。\n\n### 压缩层级\n\n系统采用渐进式压缩策略，从温和到激进：\n\n| 级别 | 策略 | 损失程度 |\n|------|------|----------|\n| **1级** | 移除工具中间结果 | 很低——工具结果可以重新获取 |\n| **2级** | 对历史消息做摘要 | 中等——保留语义，损失细节 |\n| **3级** | 移除较早的对话轮次 | 较高——只保留最近的内容 |\n| **4级** | 仅保留核心设定和当前请求 | 很高——紧急降级 |\n\n系统会从最温和的策略开始，只在必要时才升级到更激进的策略。\n\n## 作用\n\n### 为什么需要压缩\n\n没有压缩，长对话最终只有三个结局：\n1. 直接报错（超出上下文限制）\n2. 粗暴截断（丢失重要信息）\n3. 需要你手动控制对话长度\n\n这些都不是好体验。Wunder 把压缩做成系统核心能力，让你不用关心上下文长度，尽情进行长对话。\n\n### 压缩保护什么\n\n**保护对话连续性**：对话不会因为太长而中断。\n\n**保护有效事实**：压缩优先保留当前任务真正需要的信息。\n\n**保护可追溯性**：每次压缩都有记录，管理员可以查看压缩了什么、保留了什么。\n\n## 关键规则\n\n### 压缩不能改写事实\n\n压缩只能精简和重组已有内容，不能凭空编造不存在的信息。这是底线原则。\n\n### 系统提示词不受压缩影响\n\n线程的核心设定（系统提示词）在创建时就冻结了，压缩只作用于对话历史和工具结果。你的智能体不会因为压缩而\"忘记自己是谁\"。\n\n### 压缩是可观测的\n\n每次压缩都会产生记录，包含：\n- 使用了什么压缩策略\n- 压缩前后的上下文大小\n- 大致的信息损失评估\n\n这让管理员可以判断压缩是否影响了任务质量。\n\n## 实践\n\n### 什么情况下容易触发压缩\n\n- 长时间持续对话（几十轮以上）\n- 工具返回了大量内容（如读取大文件、搜索结果很多）\n- 复杂的多步骤任务\n\n### 如何减少不必要的压缩\n\n- **及时开新线程**：完成一个话题后，开新线程而不是继续老线程\n- **精简提问**：避免大段重复粘贴内容\n- **使用 `/compact` 命令**：主动触发压缩，在合适时机整理对话\n\n### 压缩后对话质量会下降吗？\n\n大多数情况下不会明显影响。系统优先保留当前任务需要的信息。只有在极端情况下（非常长的对话加上大量工具结果），你可能注意到智能体对早期细节的记忆不够准确。这时建议开启新的对话线程。\n\n## 常见误区\n\n- **压缩等于删除？** 不是。压缩是信息重组，保留关键结构，比删除精细得多。\n- **压缩会改变智能体人格？** 不会。系统提示词是冻结的，不受压缩影响。\n- **对话越长越好？** 不是。虽然系统能处理长对话，但定期开新线程是更好的实践。\n\n## 延伸阅读\n\n- [边界处理](/docs/zh-CN/concepts/boundary-handling/) —— 系统在各种边界情况下的行为\n- [Token 与配额](/docs/zh-CN/concepts/quota-and-token-usage/) —— 上下文占用如何衡量\n- [记忆](/docs/zh-CN/concepts/core-memory/) —— 长期资料和上下文压缩的关系\n","source_path":"使用说明书/zh-CN/concepts/core-context-compression.md"}</script>
