  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/sessions-and-rounds","language":"zh-CN","title":"会话与轮次","summary":"对话不是一次请求，而是由会话、线程、用户轮次和模型轮次组成的层级结构。理解这个结构，就理解了对话的组织方式。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"深入了解","group_path":["深入了解"],"url":"/docs/zh-CN/concepts/sessions-and-rounds/","headings":[{"id":"section-1","level":1,"text":"会话与轮次"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"四个层级"},{"id":"section-4","level":3,"text":"为什么这么拆"},{"id":"section-5","level":2,"text":"作用"},{"id":"section-6","level":3,"text":"对你"},{"id":"section-7","level":3,"text":"对系统"},{"id":"section-8","level":2,"text":"线程的重要性"},{"id":"section-9","level":2,"text":"Token 统计怎么看"},{"id":"section-10","level":2,"text":"实践"},{"id":"section-11","level":3,"text":"什么时候开新会话"},{"id":"section-12","level":3,"text":"什么时候继续老会话"},{"id":"section-13","level":3,"text":"如何判断会话状态"},{"id":"section-14","level":2,"text":"常见误区"},{"id":"section-15","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/workspaces","next_slug":"zh-CN/concepts/streaming","markdown":"# 会话与轮次\n\n## 原理\n\n你和智能体的对话不是\"你说一句、它回一句\"这么简单。Wunder 把一次完整的交互拆成清晰的层级：\n\n```\n会话（一次完整对话）\n├── 用户轮次 1（你说了一句话）\n│   ├── 模型轮次 1（智能体思考）\n│   ├── 模型轮次 2（调用了工具）\n│   └── 模型轮次 3（给出最终回答）\n├── 用户轮次 2（你又说了一句话）\n│   └── 模型轮次 1（直接回答）\n└── ...\n```\n\n### 四个层级\n\n| 层级 | 含义 | 计数方式 |\n|------|------|----------|\n| **会话** | 一次完整的对话过程 | 你点击\"新对话\"开始 |\n| **线程** | 会话的执行主体，维护状态和上下文 | 随会话创建 |\n| **用户轮次** | 你每发送一条消息 | 发一条记一轮 |\n| **模型轮次** | 智能体每执行一次动作 | 思考、工具调用、回答各算一轮 |\n\n### 为什么这么拆\n\n如果不拆分，你就搞不清楚：\n- 你到底问了几次 vs 智能体走了几步\n- 某次工具调用发生在第几步\n- Token 消耗应该算在哪一层\n\n拆分后，统计、回放、排障都有了清晰的坐标系。\n\n## 作用\n\n### 对你\n\n- **上下文连续**：同一会话内，智能体记得你之前说了什么\n- **过程可追溯**：你能看到智能体为了回答你的问题走了几步、调用了什么工具\n- **状态有保障**：线程确保执行过程稳定推进\n\n### 对系统\n\n- **Token 统计精确**：知道每一轮消耗了多少\n- **回放可定位**：能精确找到某个时间点发生了什么\n- **排队有依据**：用户轮次排队，模型轮次顺序执行\n\n## 线程的重要性\n\n线程是会话的\"执行大脑\"，维护着：\n- 系统提示词（创建时冻结，不再改变）\n- 对话上下文（随着对话不断增长）\n- 长期记忆（初始化时注入一次）\n- 执行状态（运行中、等待、完成等）\n\n**关键规则**：\n- 线程的系统提示词一旦确定就冻结\n- 长期记忆只在线程初始化时注入一次\n- 后续轮次复用同一线程上下文\n\n## Token 统计怎么看\n\nWunder 记录的是上下文占用量——当前线程实际占了多少 Token。\n\n几个关键概念：\n\n| 概念 | 含义 |\n|------|------|\n| **上下文占用** | 当前线程对话 + 工具结果的总 Token |\n| **单次消耗** | 某一次请求消耗的 Token |\n| **累计消耗** | 所有请求消耗的 Token 总和 |\n\n**看什么**：主要关注上下文占用。如果占用持续增长，说明对话在变长，可能触发压缩。\n\n## 实践\n\n### 什么时候开新会话\n\n- 完成了一个话题，想开始全新话题\n- 当前会话上下文很长，影响响应质量\n- 切换到完全不同的任务\n\n### 什么时候继续老会话\n\n- 还在同一个话题上\n- 需要引用之前的对话内容\n- 任务还没完成\n\n### 如何判断会话状态\n\n界面上可以看到：\n- **活跃**：当前正在运行\n- **空闲**：上一轮已完成，等待你的下一条消息\n- **等待审批**：智能体在等你确认\n\n## 常见误区\n\n- **会话 = 线程？** 密切相关但不完全相同。会话记录交互历史，线程维护执行状态。\n- **一轮 = 一次问答？** 不一定。一次用户轮次可能包含多轮模型轮次（工具调用等）。\n- **Token 统计 = 账单？** 不是。Wunder 的 Token 统计是上下文占用，不是供应商的计费账单。\n\n## 延伸阅读\n\n- [智能体循环](/docs/zh-CN/concepts/core-agent-loop/) —— 线程如何执行\n- [Token 与配额](/docs/zh-CN/concepts/quota-and-token-usage/) —— Token 的详细说明\n- [会话状态说明](/docs/zh-CN/reference/stream-events/) —— 界面上各种状态\n","source_path":"使用说明书/zh-CN/concepts/sessions-and-rounds.md"}</script>
