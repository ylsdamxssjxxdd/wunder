  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/sessions-and-rounds","language":"zh-CN","title":"会话与轮次","summary":"wunder 将对话拆分为会话、线程、用户轮次与模型轮次。","read_when":["你要理解会话状态、事件流与统计口径","你要区分用户轮次、模型轮次与 token 占用"],"source_docs":["docs/系统介绍.md","docs/API文档.md"],"tab":"概念","group":"核心概念","group_path":["核心概念"],"url":"/docs/zh-CN/concepts/sessions-and-rounds/","headings":[{"id":"section-1","level":1,"text":"会话与轮次"},{"id":"section-2","level":2,"text":"会话是什么"},{"id":"section-3","level":2,"text":"线程是什么"},{"id":"section-4","level":2,"text":"用户轮次与模型轮次"},{"id":"section-5","level":3,"text":"用户轮次"},{"id":"section-6","level":3,"text":"模型轮次"},{"id":"section-7","level":2,"text":"为什么这个区分重要"},{"id":"section-8","level":2,"text":"token 统计口径"},{"id":"section-9","level":2,"text":"流式事件与终结"},{"id":"section-10","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/concepts/workspaces","next_slug":"zh-CN/concepts/streaming","markdown":"# 会话与轮次\n\nwunder 不是把一次对话看成单一请求，而是看成一条持续演进的会话。\n\n## 会话是什么\n\n一个会话通常包含：\n\n- 用户输入\n- 模型响应\n- 工具调用\n- 中间事件\n- 最终结果\n\n在复杂任务中，一个会话可能持续很多轮，并包含多次模型调用和工具调用。\n\n## 线程是什么\n\n线程是会话的更高一层组织方式。\n\n当前系统要求：\n\n- 智能体线程的 system prompt 在首次确定后必须冻结\n- 长期记忆只允许在线程初始化时注入一次\n- 后续轮次继续复用同一条线程上下文\n\n所以“线程”不是一个 UI 标签，而是系统稳定性和上下文一致性的边界。\n\n## 用户轮次与模型轮次\n\nWunder 明确把轮次拆成两层。\n\n### 用户轮次\n\n用户每发送一条消息，记 1 轮用户轮次。\n\n它代表一次明确的业务输入边界。\n\n### 模型轮次\n\n模型每执行一次动作，记 1 轮模型轮次。\n\n动作包括：\n\n- 一次模型调用\n- 一次工具调用\n- 一次最终回复\n\n所以一次用户轮次里，通常会包含多轮模型轮次。\n\n## 为什么这个区分重要\n\n如果不把两种轮次拆开，就很容易把这些事情混在一起：\n\n- 用户到底问了几次\n- 模型为了回答这一次问题走了几步\n- 某次工具爆炸发生在第几步\n- 当前速度、耗时和 token 统计应该挂到哪一层\n\n把用户轮次和模型轮次分开后，时间线、回放、告警和计费口径都会清楚很多。\n\n## token 统计口径\n\nWunder 记录的是 token 占用量，也就是当前上下文实际占了多少 token。\n\n它不是：\n\n- 平台账单总消耗\n- 某个供应商返回的所有计费字段简单累加\n\n你在看聊天页、调试页或回放记录时，应该优先把 token 理解为“当前线程上下文负载”。\n\n## 流式事件与终结\n\n一次用户轮次的执行过程，通常会在事件流里看到：\n\n- 输入进入\n- 模型开始工作\n- 工具调用与观察结果\n- 中间增量输出\n- 终结事件\n\n当前链路里，是否真正结束应以终结语义为准，而不是只看有没有流式文本。\n\n如果你在做接入或排障，至少要分清：\n\n- 会话是否还活着\n- 当前线程 runtime 是否还在 active\n- 当前这轮是否已经发出终结事件\n\n## 相关文档\n\n- [流式执行](/docs/zh-CN/concepts/streaming/)\n- [运行时与在线状态](/docs/zh-CN/concepts/presence-and-runtime/)\n- [流式事件参考](/docs/zh-CN/reference/stream-events/)\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n","source_path":"静态站文档/zh-CN/concepts/sessions-and-rounds.md"}</script>
