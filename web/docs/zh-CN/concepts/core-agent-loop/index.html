  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-agent-loop","language":"zh-CN","title":"智能体循环","summary":"智能体不只是\"收到问题→给出回答\"。它是一个持续运行的循环：思考、行动、观察、继续，直到任务完成。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-agent-loop/","headings":[{"id":"section-1","level":1,"text":"智能体循环"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":2,"text":"为什么这样设计"},{"id":"section-4","level":2,"text":"作用"},{"id":"section-5","level":3,"text":"对你来说"},{"id":"section-6","level":3,"text":"对系统来说"},{"id":"section-7","level":2,"text":"关键规则"},{"id":"section-8","level":3,"text":"线程是执行的主体"},{"id":"section-9","level":3,"text":"循环必须有终态"},{"id":"section-10","level":3,"text":"前端显示的是投影"},{"id":"section-11","level":2,"text":"实践"},{"id":"section-12","level":3,"text":"什么时候耐心等待"},{"id":"section-13","level":3,"text":"什么时候主动介入"},{"id":"section-14","level":3,"text":"什么时候用重置"},{"id":"section-15","level":2,"text":"常见误区"},{"id":"section-16","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/index","next_slug":"zh-CN/concepts/core-tools","markdown":"# 智能体循环\n\n## 原理\n\nWunder 的智能体不是\"一问一答\"模式。它的核心是一个持续运行的循环：\n\n```\n你说话 → 智能体思考 → 决定做什么\n                            ↓\n                    需要用工具？→ 调用工具 → 观察结果\n                            ↓              ↓\n                    直接回答？  ←  继续思考 ←\n                            ↓\n                       任务完成？\n                       ├── 是 → 给出最终回答\n                       └── 否 → 继续循环\n```\n\n这个循环可能转一圈就结束（简单问答），也可能转很多圈（复杂任务）。关键是：**智能体自己决定循环多少次**，不需要你一步步指挥。\n\n## 为什么这样设计\n\n如果智能体只是\"你问一句、它答一句\"，那复杂任务就没法做了。比如你让智能体\"分析这份报告并生成摘要文件\"，它需要：\n\n1. 先读取报告\n2. 分析内容\n3. 决定摘要结构\n4. 写入文件\n5. 确认完成\n\n这每一步都是一个循环。智能体循环让这些步骤可以**在同一次对话中自动完成**。\n\n## 作用\n\n### 对你来说\n\n- **说一次就够了**：你不需要每一步都发指令，智能体会自动推进\n- **过程可见**：你可以在界面上看到智能体正在做什么（读取了什么文件、调用了什么工具）\n- **可以介入**：遇到需要确认的操作（如修改重要文件），智能体会暂停等你审批\n\n### 对系统来说\n\n- **状态连续**：整个过程记录在一条线程里，不会丢失上下文\n- **可以恢复**：如果中途断开，重连后智能体能继续未完成的工作\n- **可以追踪**：每一轮做了什么都有记录，方便回顾和排障\n\n## 关键规则\n\n### 线程是执行的主体\n\n每条线程就像一个独立的工作现场，拥有自己的：\n- 对话历史\n- 执行状态\n- 上下文记忆\n\n线程一旦创建，它的核心设定（系统提示词）就保持冻结，不会因为后续对话而改变。这保证了行为的一致性。\n\n### 循环必须有终态\n\n每一轮循环最终必须落到一个明确的结果：\n\n| 终态 | 含义 |\n|------|------|\n| **已完成** | 任务顺利完成 |\n| **失败** | 执行过程出错 |\n| **已取消** | 你主动停止了执行 |\n| **已拒绝** | 你拒绝了审批请求 |\n\n界面上的状态指示器就是根据这些终态来判断的。\n\n### 前端显示的是投影\n\n你在界面上看到的实时状态（思考中、执行工具中、已完成等）是线程状态的\"投影\"。真正的执行真相始终在后端的线程里。如果界面显示异常，以实际执行状态为准。\n\n## 实践\n\n### 什么时候耐心等待\n\n智能体在执行复杂任务时可能需要较长时间（读大文件、搜索多个网页等）。看到\"正在执行工具\"的提示时，耐心等待即可，不需要重复发送相同消息。\n\n### 什么时候主动介入\n\n- **需要审批**：智能体会弹出审批请求，你可以批准或拒绝\n- **卡住了**：如果长时间没有响应，可以点击\"停止\"取消当前执行\n- **方向不对**：可以随时补充指令调整方向\n\n### 什么时候用重置\n\n如果线程状态明显异常（界面显示和实际不一致），可以在设置中使用\"重置工作状态\"功能。这会：\n- 停止当前运行\n- 清理异常状态\n- 重新创建干净的线程\n\n但你的长期资产（知识、技能、配置）不会被删除。\n\n## 常见误区\n\n- **线程不是会话的别名**。会话记录的是对话历史，线程管理的是执行状态。一条会话对应一条线程。\n- **流式输出不是循环本身**。你看到的文字一点一点出现，只是循环对外的展示方式，不是循环的核心机制。\n- **蜂群任务也遵循循环**。每个工蜂也运行自己的智能体循环，只是由母蜂来协调。\n\n## 延伸阅读\n\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/) —— 对话的详细组织方式\n- [流式执行](/docs/zh-CN/concepts/streaming/) —— 实时输出的原理\n- [会话状态说明](/docs/zh-CN/reference/stream-events/) —— 界面上各种状态的含义\n","source_path":"使用说明书/zh-CN/concepts/core-agent-loop.md"}</script>
