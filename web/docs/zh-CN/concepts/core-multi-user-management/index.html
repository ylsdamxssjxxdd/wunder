  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-multi-user-management","language":"zh-CN","title":"多用户管理","summary":"多用户管理核心解释 Wunder 为什么必须从一开始就把组织、用户、权限和 Token 账户治理放进系统骨架，而不是后补。","updated_at":"2026-04-10","read_when":["你在部署 server 或设计管理员侧","你想理解多用户治理为什么不能后补"],"source_docs":["docs/总体设计.md"],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-multi-user-management/","headings":[{"id":"section-1","level":1,"text":"多用户管理"},{"id":"section-2","level":2,"text":"先给结论"},{"id":"section-3","level":2,"text":"为什么它必须单列为核心"},{"id":"section-4","level":2,"text":"这个核心真正保护什么"},{"id":"section-5","level":2,"text":"关键约束"},{"id":"section-6","level":2,"text":"设计重点"},{"id":"section-7","level":3,"text":"重点一：身份和隔离是两层"},{"id":"section-8","level":3,"text":"重点二：多用户治理一定会下沉到运行时"},{"id":"section-9","level":3,"text":"重点三：管理员能力必须强，但不能模糊边界"},{"id":"section-10","level":2,"text":"最容易搞错的点"},{"id":"section-11","level":2,"text":"和其他核心的边界"},{"id":"section-12","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/core-scheduled-tasks","next_slug":"zh-CN/concepts/core-realtime","markdown":"# 多用户管理\n\nWunder 面向组织和个人，但一旦进入 server 形态，多用户治理就不再是附属功能，而是系统骨架本身。它决定的不是后台长什么样，而是整套运行边界怎样成立。\n\n![多用户管理图：身份层、治理层、隔离层和结果层依次收口](/docs/assets/manual/core-multi-user-management.svg)\n\n## 先给结论\n\n- 多用户管理不是“登录系统”这么简单，而是运行边界、资源边界和治理边界的总和。\n- 如果数据隔离、权限边界和 Token 账户控制不是前置设计，后面几乎一定要返工。\n- 管理后台不是展示页，而是系统治理能力的正式入口。\n\n## 为什么它必须单列为核心\n\n如果没有多用户管理这个核心，系统会在增长后暴露出一系列结构性问题：\n\n- 不知道一个请求到底代表“登录用户”还是“外部映射 user_id”。\n- 线程、工作区、工具可见性和渠道都缺乏一致边界。\n- Token 账户治理和权限只能在接口层打补丁，无法真正收口到运行时。\n\n## 这个核心真正保护什么\n\n- 保护身份边界：区分登录用户、组织用户、虚拟 `user_id` 和外部映射身份。\n- 保护运行边界：线程、工作区、工具和资源都要知道“归谁、谁能碰”。\n- 保护治理边界：管理员有管理权限，不等于系统到处都没有边界。\n\n## 关键约束\n\n| 约束 | 作用 |\n|------|------|\n| 默认按多用户并发设计 | 避免后期才发现系统只适合单人使用 |\n| 数据隔离必须前置 | 工作区、会话、配置和日志都要先想清楚边界 |\n| 权限和 Token 账户治理不能后补 | 否则很容易出现“能看不能管、能调不能控”的灰区 |\n| 后台与运行时共用一套口径 | 管理员看到的治理结果要和实际运行一致 |\n\n## 设计重点\n\n### 重点一：身份和隔离是两层\n\n登录用户、API Key 调用者、外部嵌入映射身份、虚拟 `user_id` 都不完全相同。系统必须分清“谁在认证”和“隔离边界按谁建”。\n\n### 重点二：多用户治理一定会下沉到运行时\n\n它不会停留在后台表单里，最终会落实到：\n\n- 线程归属\n- 工作区隔离\n- 工具可见性\n- Token 账户与资源治理\n\n### 重点三：管理员能力必须强，但不能模糊边界\n\n管理员可以治理系统，不代表系统可以失去边界感。真正健康的做法是“有权治理，但仍可追踪和限制”。\n\n## 最容易搞错的点\n\n- `user_id` 的接入语义和后台注册用户不是同一个层面的概念。\n- 数据隔离不是单靠数据库表字段补丁就能兜住的。\n- 管理后台不是“有了功能再拼 UI”，而是治理能力的正式入口。\n\n## 和其他核心的边界\n\n- 和 [渠道](/docs/zh-CN/concepts/core-channels/) 的区别：渠道讲入口共核，多用户管理讲入口背后的治理边界。\n- 和 [定时任务](/docs/zh-CN/concepts/core-scheduled-tasks/) 的区别：定时任务也要服从多用户归属与权限。\n- 和 [可观测性](/docs/zh-CN/concepts/core-observability/) 的区别：可观测性要能按用户与组织切分，切分规则来自多用户管理。\n\n## 延伸阅读\n\n- [核心概览](/docs/zh-CN/concepts/)\n- [Server 部署](/docs/zh-CN/start/server/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- [管理端面板索引](/docs/zh-CN/reference/admin-panels/)\n","source_path":"使用说明书/zh-CN/concepts/core-multi-user-management.md"}</script>
