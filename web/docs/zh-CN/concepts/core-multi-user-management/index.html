  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-multi-user-management","language":"zh-CN","title":"多用户管理","summary":"Server 模式的核心能力。组织、用户、权限、Token 账户，从架构层面就内置治理。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-multi-user-management/","headings":[{"id":"section-1","level":1,"text":"多用户管理"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"层级结构"},{"id":"section-4","level":2,"text":"作用"},{"id":"section-5","level":3,"text":"对组织"},{"id":"section-6","level":3,"text":"对管理员"},{"id":"section-7","level":2,"text":"关键规则"},{"id":"section-8","level":3,"text":"数据隔离"},{"id":"section-9","level":3,"text":"身份分层"},{"id":"section-10","level":3,"text":"Token 账户"},{"id":"section-11","level":2,"text":"实践"},{"id":"section-12","level":3,"text":"创建用户"},{"id":"section-13","level":3,"text":"设置 Token"},{"id":"section-14","level":3,"text":"单位管理"},{"id":"section-15","level":3,"text":"权限控制"},{"id":"section-16","level":2,"text":"常见误区"},{"id":"section-17","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/core-scheduled-tasks","next_slug":"zh-CN/concepts/core-realtime","markdown":"# 多用户管理\n\n## 原理\n\nWunder 支持个人使用，也支持组织部署。多用户管理就是从架构层面解决\"多个用户如何共享系统又不互相干扰\"。\n\n它不只是\"让用户能登录\"，而是：\n- 谁属于哪个组织\n- 谁能访问什么\n- 谁消耗了多少资源\n- 管理员如何治理\n\n### 层级结构\n\n```\n系统\n└── 单位（组织/团队）\n    └── 用户\n        └── 智能体\n            └── 线程\n```\n\n每个层级有明确的边界：\n- **系统**：全局配置、管理员账户\n- **单位**：组织成员、共享资源\n- **用户**：个人文件、个人设置、Token 账户\n- **智能体**：独立配置、独立线程\n- **线程**：对话现场\n\n## 作用\n\n### 对组织\n\n**资源治理**：\n- Token 账户：控制每个用户的资源配额\n- 单位管理：组织结构和成员管理\n- 渠道管理：统一接入和监控\n\n**权限控制**：\n- 区分管理员和普通用户\n- 控制谁能创建智能体、配置渠道\n- 工具审批级别的控制\n\n### 对管理员\n\n**统一治理**：\n- 管理端可以查看全局状态\n- 管理用户账户和配额\n- 监控渠道运行情况\n- 配置系统参数\n\n**审计追溯**：\n- 用户操作记录\n- Token 消耗统计\n- 渠道消息日志\n\n## 关键规则\n\n### 数据隔离\n\n每个用户的数据严格隔离：\n- 工作区：你只能访问自己的文件\n- 会话：你只能看到自己的对话\n- 配置：你的设置不影响别人\n\n### 身份分层\n\n| 身份类型 | 说明 |\n|----------|------|\n| **登录用户** | 注册用户，有账户密码 |\n| **外部映射 user_id** | 从外部系统映射的身份（如飞书用户） |\n| **虚拟 user_id** | 接口调用时传入的标识（用于隔离） |\n\n### Token 账户\n\nToken 账户是用户可支配的资源余额：\n\n| 字段 | 含义 |\n|------|------|\n| 当前余额 | 还可用的 Token |\n| 累计获得 | 总共发放了多少 Token |\n| 累计消耗 | 总共消耗了多少 Token |\n| 每日发放 | 每天自动获得的 Token |\n\n**消耗规则**：\n- 按实际使用的 Token 消耗\n- 余额不足时可能无法继续对话\n- 管理员账户不受限制\n\n## 实践\n\n### 创建用户\n\n1. 管理端 → 用户管理\n2. 点击\"创建用户\"\n3. 填写：\n   - 用户名\n   - 邮箱\n   - 初始密码\n   - 所属单位\n4. 可选择性发放初始 Token\n5. 保存\n\n### 设置 Token\n\n1. 找到用户 → 点击\"设置\"\n2. Token 操作：\n   - **直接设置余额**：覆盖当前余额\n   - **发放 Token**：增加余额\n   - **扣除 Token**：减少余额\n3. 设置每日发放量\n\n### 单位管理\n\n1. 创建单位（部门/团队）\n2. 设置单位属性\n3. 把用户分配到单位\n4. 配置单位级资源配额\n\n### 权限控制\n\n管理员可以控制：\n- 哪些用户是管理员\n- 哪些用户能创建智能体\n- 哪些用户能配置渠道\n- 审批模式的严格程度\n\n## 常见误区\n\n- **user_id 就是注册用户？** 不一定。user_id 可能只是隔离标识，不一定是登录用户。\n- **数据隔离只靠数据库？** 不是。从工作区、会话到工具调用，都有边界控制。\n- **管理员权限无限制？** 不是。管理员有治理权，但系统仍有边界和可追踪性。\n\n## 延伸阅读\n\n- [Server 部署](/docs/zh-CN/start/server/)\n- [认证与安全](/docs/zh-CN/ops/auth-and-security/)\n- [管理端面板指南](/docs/zh-CN/reference/admin-panels/)\n- [Token 与配额](/docs/zh-CN/concepts/quota-and-token-usage/)\n","source_path":"使用说明书/zh-CN/concepts/core-multi-user-management.md"}</script>
