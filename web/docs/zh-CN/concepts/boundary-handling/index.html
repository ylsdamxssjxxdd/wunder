  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/boundary-handling","language":"zh-CN","title":"边界处理","summary":"上下文超限、网络中断、工具失败...系统在各种边界情况下保持稳定，而不是直接崩溃。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"深入了解","group_path":["深入了解"],"url":"/docs/zh-CN/concepts/boundary-handling/","headings":[{"id":"section-1","level":1,"text":"边界处理"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"处理原则"},{"id":"section-4","level":2,"text":"主要边界情况"},{"id":"section-5","level":3,"text":"上下文超限"},{"id":"section-6","level":3,"text":"网络中断"},{"id":"section-7","level":3,"text":"工具失败"},{"id":"section-8","level":3,"text":"工具输出过大"},{"id":"section-9","level":3,"text":"并发排队"},{"id":"section-10","level":2,"text":"实践"},{"id":"section-11","level":3,"text":"长对话管理"},{"id":"section-12","level":3,"text":"网络波动应对"},{"id":"section-13","level":3,"text":"工具失败处理"},{"id":"section-14","level":3,"text":"系统异常处理"},{"id":"section-15","level":2,"text":"常见误区"},{"id":"section-16","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/swarm","next_slug":"zh-CN/help/index","markdown":"# 边界处理\n\n## 原理\n\n系统不可能永远在\"理想状态\"运行。真实环境中会遇到各种边界情况：\n\n- 对话太长超出上下文限制\n- 网络波动甚至断开\n- 工具执行失败\n- 系统资源紧张\n\nWunder 的设计目标：**在边界情况下保持稳定，而不是崩溃**。\n\n### 处理原则\n\n**控扩散**：一个环节出错，不能把其他环节带崩\n\n**能恢复**：失败不是终点，系统有恢复链路\n\n**可复盘**：同类问题能归类、复现、验证\n\n## 主要边界情况\n\n### 上下文超限\n\n对话越来越长，工具结果越来越多，总 Token 可能超出模型限制。\n\n**处理策略**：渐进式压缩\n\n| 级别 | 策略 | 损失程度 |\n|------|------|----------|\n| 1级 | 移除工具中间结果 | 很低 |\n| 2级 | 摘要历史对话 | 中等 |\n| 3级 | 移除较早的对话 | 较高 |\n| 4级 | 紧急降级 | 很高 |\n\n**关键**：系统提示词不受压缩影响，保持冻结。\n\n### 网络中断\n\nWebSocket 或 SSE 连接可能因网络波动断开。\n\n**处理策略**：自动重连 + 事件补发\n\n```\n连接断开 → 显示提示 → 自动重连（指数退避）\n                ↓\n           缓存未推送事件\n                ↓\n           重连成功 → 补发事件\n                ↓\n           重连失败 → 提示手动刷新\n```\n\n**重连策略**：1s → 2s → 4s → 8s → 16s → 最大32s\n\n### 工具失败\n\n工具调用可能因各种原因失败。\n\n**失败分类**：\n\n| 类型 | 处理 |\n|------|------|\n| 参数错误 | 让智能体修正参数 |\n| 权限拒绝 | 等待用户审批 |\n| 临时错误（文件锁、网络波动） | 自动重试 |\n| 系统错误 | 有限重试 + 降级 |\n\n### 工具输出过大\n\n某些工具可能返回大量内容，撑爆上下文。\n\n**处理策略**：三层防护\n\n| 层级 | 作用 |\n|------|------|\n| 执行层预算 | 限制单次输出大小 |\n| 结果裁剪 | 超出时保留头部和尾部 |\n| 入模检查 | 最终检查并精简 |\n\n裁剪后的结果会告知智能体\"已裁剪\"，让它可以调整策略。\n\n### 并发排队\n\n同一用户可能同时发起多个请求，主线程忙时新请求排队。\n\n**处理策略**：队列 + 优先级\n\n```\n新请求 → 主线程空闲？\n           ├── 是 → 立即执行\n           └── 否 → 进入队列 → 主线程空闲后依次执行\n```\n\n**优先级**：管理员请求 > 高优先级请求 > 普通请求 > 低优先级请求\n\n## 实践\n\n### 长对话管理\n\n- 注意上下文占用指标\n- 适时使用 `/compact` 主动压缩\n- 完成一个话题后开新会话\n\n### 网络波动应对\n\n- 界面显示\"连接断开\"时等待自动重连\n- 不要频繁刷新页面\n- 如果重连失败，按提示手动刷新\n\n### 工具失败处理\n\n- 查看失败提示了解原因\n- 根据提示调整（如提供正确的文件路径）\n- 如果反复失败，联系管理员查看系统日志\n\n### 系统异常处理\n\n- 长时间无响应：尝试取消或重置\n- 状态明显异常：使用\"重置工作状态\"\n- 反复出现问题：联系管理员排障\n\n## 常见误区\n\n- **只要智能体回答了就是正常？** 不一定。要看长期稳定性和异常处理能力。\n- **重试能解决一切？** 不是。不同类型的错误有不同处理方式。\n- **边界情况很少发生？** 不一定。长对话、复杂任务中边界情况很常见。\n\n## 延伸阅读\n\n- [稳定性](/docs/zh-CN/concepts/core-stability/) —— 稳定性设计原则\n- [上下文压缩](/docs/zh-CN/concepts/core-context-compression/) —— 压缩详细机制\n- [故障排查](/docs/zh-CN/help/troubleshooting/) —— 具体问题解决\n","source_path":"使用说明书/zh-CN/concepts/boundary-handling.md"}</script>
