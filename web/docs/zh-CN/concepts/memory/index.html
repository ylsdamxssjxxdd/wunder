  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/memory","language":"zh-CN","title":"长期记忆","summary":"智能体如何\"记住\"你的偏好、背景和长期资料？结构化记忆碎片，初始化注入一次，运行期补充检索。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"深入了解","group_path":["深入了解"],"url":"/docs/zh-CN/concepts/memory/","headings":[{"id":"section-1","level":1,"text":"长期记忆"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"核心规则"},{"id":"section-4","level":3,"text":"为什么不每轮都更新"},{"id":"section-5","level":2,"text":"记忆的形态"},{"id":"section-6","level":2,"text":"作用"},{"id":"section-7","level":3,"text":"记住你是谁"},{"id":"section-8","level":3,"text":"组织知识"},{"id":"section-9","level":3,"text":"个性化服务"},{"id":"section-10","level":2,"text":"初始化注入 vs 运行期检索"},{"id":"section-11","level":2,"text":"实践"},{"id":"section-12","level":3,"text":"管理记忆"},{"id":"section-13","level":3,"text":"记忆生效时机"},{"id":"section-14","level":3,"text":"记忆和知识库的区别"},{"id":"section-15","level":2,"text":"常见误区"},{"id":"section-16","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/prompt-and-skills","next_slug":"zh-CN/concepts/quota-and-token-usage","markdown":"# 长期记忆\n\n## 原理\n\n智能体需要\"记住\"长期信息才能提供个性化服务。Wunder 的记忆系统围绕一个核心原则：**稳定优于灵活**。\n\n### 核心规则\n\n1. **线程创建时注入一次**：长期记忆在对话开始时一次性注入系统提示词\n2. **运行中保持冻结**：后续对话不修改系统提示词\n3. **需要时补充检索**：运行中通过 recall 机制补充资料，但不改写底座\n\n### 为什么不每轮都更新\n\n每轮都改写系统提示词会导致：\n- 智能体行为不稳定（越聊越\"漂移\"）\n- 缓存无法命中（性能下降）\n- 难以追踪问题（不知道基于什么背景在运行）\n\n一次注入 + 冻结 = 稳定的行为 + 可追踪的背景。\n\n## 记忆的形态\n\nWunder 的记忆采用**结构化碎片**形式，不是一大段自由文本：\n\n| 特点 | 好处 |\n|------|------|\n| **易于命中** | 智能体能快速找到需要的信息 |\n| **易于替换** | 更新单个碎片不影响整体 |\n| **易于失效** | 过期信息可以被标记失效 |\n| **易于追踪** | 能追踪记忆片段的版本关系 |\n\n## 作用\n\n### 记住你是谁\n\n- 你的偏好和习惯\n- 你的工作背景\n- 你的历史决策\n\n### 组织知识\n\n- 团队制度和规范\n- 项目背景信息\n- 领域专业知识\n\n### 个性化服务\n\n- 根据你的偏好调整回答风格\n- 参考你的历史上下文\n- 提供针对性的建议\n\n## 初始化注入 vs 运行期检索\n\n| | 初始化注入 | 运行期检索（Recall） |\n|--|-----------|---------------------|\n| **时机** | 线程创建时 | 对话进行中 |\n| **方式** | 写入系统提示词 | 作为工具结果补充 |\n| **影响** | 成为线程认知底座 | 不改写底座 |\n| **持久性** | 整个线程生命周期 | 当前轮次 |\n\n## 实践\n\n### 管理记忆\n\n- **查看记忆**：在智能体设置中查看当前记忆内容\n- **添加记忆**：告诉智能体\"记住这个偏好\"，或在设置中手动添加\n- **删除记忆**：删除过时或不需要的记忆碎片\n- **更新记忆**：添加新的记忆碎片替换旧的\n\n### 记忆生效时机\n\n- **新对话**：立即使用最新记忆\n- **已有对话**：不受影响，保持创建时的记忆\n\n所以更新记忆后需要开新对话才能生效。\n\n### 记忆和知识库的区别\n\n| | 记忆 | 知识库 |\n|--|------|--------|\n| **内容** | 结构化的个人/组织事实 | 文档、资料、制度 |\n| **使用方式** | 初始化时注入 | 运行中检索 |\n| **更新频率** | 相对稳定 | 可以频繁更新 |\n| **适合** | 偏好、背景、决策记录 | 参考资料、技术文档 |\n\n## 常见误区\n\n- **记忆会每轮更新？** 不会。只在初始化注入一次。\n- **Recall 结果会写回系统提示词？** 不会。Recall 是临时补充。\n- **记忆越多越好？** 不是。过多记忆挤占上下文空间，可能干扰判断。\n\n## 延伸阅读\n\n- [记忆（核心）](/docs/zh-CN/concepts/core-memory/) —— 记忆的设计原则\n- [提示词与技能](/docs/zh-CN/concepts/prompt-and-skills/) —— 系统提示词的组织\n- [工作区与容器](/docs/zh-CN/concepts/workspaces/) —— 文件空间管理\n","source_path":"使用说明书/zh-CN/concepts/memory.md"}</script>
