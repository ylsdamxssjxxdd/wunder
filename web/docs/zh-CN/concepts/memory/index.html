  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/memory","language":"zh-CN","title":"长期记忆","summary":"wunder 的长期记忆围绕线程冻结、单次注入与结构化记忆碎片设计。","updated_at":"2026-04-02","read_when":["你要理解 wunder 的长期记忆为什么要强调冻结与单次注入","你要排查线程记忆与 system prompt 的关系"],"source_docs":["docs/系统介绍.md","docs/API文档.md"],"tab":"参考","group":"运行模型参考","group_path":["运行模型参考"],"url":"/docs/zh-CN/concepts/memory/","headings":[{"id":"section-1","level":1,"text":"长期记忆"},{"id":"section-2","level":2,"text":"核心规则"},{"id":"section-3","level":2,"text":"为什么这样设计"},{"id":"section-4","level":2,"text":"记忆的形态"},{"id":"section-5","level":2,"text":"记忆与 recall"},{"id":"section-6","level":2,"text":"记忆与上下文压缩"},{"id":"section-7","level":2,"text":"理解这套机制时最容易犯的错"},{"id":"section-8","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/prompt-and-skills","next_slug":"zh-CN/concepts/quota-and-token-usage","markdown":"# 长期记忆\n\nwunder 的长期记忆设计不是“每轮都往 system prompt 里追加内容”。\n\n相反，它非常强调线程稳定性。\n\n## 核心规则\n\n当前系统有两条必须遵守的约束：\n\n1. 智能体线程的 system prompt 一旦首次确定后必须冻结\n2. 长期记忆只允许在线程初始化时注入一次\n\n后续轮次不能反复改写线程 system prompt。\n\n## 为什么这样设计\n\n原因很直接：\n\n- 避免破坏提示词缓存\n- 降低上下文漂移\n- 保证线程行为更稳定\n- 让“这一条线程到底基于什么提示词运行”可追踪\n\n## 记忆的形态\n\n当前长期记忆采用结构化记忆碎片思路。\n\n它不是一大段自由文本，而是更适合：\n\n- 命中\n- 替代\n- 失效\n- 追踪版本关系\n\n的结构化记录。\n\n## 记忆与 recall\n\n线程初始化时会注入一部分记忆。\n\n如果当前注入不足，调度层和工具层可以再通过 recall 类能力继续补充检索，而不是反复重写线程 system prompt。\n\n## 记忆与上下文压缩\n\n压缩发生后，系统仍然需要解决“记忆是否足够”的问题。\n\n因此应把“线程冻结的初始注入”与“压缩后的补充 recall”区分开看。\n\n## 理解这套机制时最容易犯的错\n\n- 把长期记忆理解成每轮动态 system prompt\n- 把 recall 结果理解成永久写回线程提示词\n- 把 token 占用理解成总账单\n\n## 延伸阅读\n\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n- [系统架构](/docs/zh-CN/concepts/architecture/)\n- [FAQ](/docs/zh-CN/help/faq/)\n","source_path":"使用说明书/zh-CN/concepts/memory.md"}</script>
