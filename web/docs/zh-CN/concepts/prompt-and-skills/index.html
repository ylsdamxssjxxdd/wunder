  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/prompt-and-skills","language":"zh-CN","title":"提示词与技能","summary":"系统提示词决定智能体的\"人格\"，技能是\"操作手册\"。两者配合让智能体既能理解任务，又能正确执行。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"深入了解","group_path":["深入了解"],"url":"/docs/zh-CN/concepts/prompt-and-skills/","headings":[{"id":"section-1","level":1,"text":"提示词与技能"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"系统提示词"},{"id":"section-4","level":3,"text":"技能（Skills）"},{"id":"section-5","level":2,"text":"作用"},{"id":"section-6","level":3,"text":"提示词的作用"},{"id":"section-7","level":3,"text":"技能的作用"},{"id":"section-8","level":3,"text":"技能分层"},{"id":"section-9","level":2,"text":"提示词模板包"},{"id":"section-10","level":3,"text":"切换模板包"},{"id":"section-11","level":3,"text":"创建自定义模板"},{"id":"section-12","level":2,"text":"关键规则"},{"id":"section-13","level":3,"text":"冻结原则"},{"id":"section-14","level":3,"text":"技能资源路径"},{"id":"section-15","level":3,"text":"提示词、技能、记忆的配合"},{"id":"section-16","level":2,"text":"实践"},{"id":"section-17","level":3,"text":"优化提示词"},{"id":"section-18","level":3,"text":"管理技能"},{"id":"section-19","level":3,"text":"自定义智能体风格"},{"id":"section-20","level":2,"text":"常见误区"},{"id":"section-21","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/tools","next_slug":"zh-CN/concepts/memory","markdown":"# 提示词与技能\n\n## 原理\n\n智能体的行为由两个核心配置决定：\n\n- **系统提示词**：定义智能体是谁、怎么思考、遵循什么原则\n- **技能**：定义智能体在某类任务中的具体操作方法\n\n### 系统提示词\n\n系统提示词是智能体的\"工作手册\"，告诉它：\n- 角色定位（你是谁）\n- 工程原则（怎么思考）\n- 工具协议（怎么使用工具）\n- 技能协议（怎么调用技能）\n- 记忆上下文（记住什么）\n\n**关键规则**：系统提示词在线程创建时确定，之后保持冻结。这保证了同一线程中智能体行为一致。\n\n### 技能（Skills）\n\n技能是\"面向智能体的操作手册\"，包含：\n- 完整的方法说明（SKILL.md）\n- 执行脚本\n- 示例和资源\n- 约束和边界\n\n智能体需要时可以通过 `skill_call` 主动读取完整的技能文档。\n\n## 作用\n\n### 提示词的作用\n\n- **角色定位**：让智能体知道自己是\"编程助手\"还是\"分析师\"\n- **行为约束**：定义回答风格、质量标准\n- **工具使用规范**：定义如何安全高效地使用工具\n\n### 技能的作用\n\n- **流程化经验**：把某类任务的最佳实践封装起来\n- **减少错误**：智能体不用每次从零摸索\n- **一致性**：相同类型的任务用相同方法处理\n\n### 技能分层\n\n| 层级 | 说明 | 可修改 |\n|------|------|--------|\n| **内置** | 系统自带的技能 | 只读 |\n| **自定义** | 用户或管理员创建 | 可编辑 |\n| **外部** | 从外部引入的技能 | 取决于来源 |\n\n## 提示词模板包\n\nWunder 支持多套提示词模板包：\n\n- **中文模板包**：默认中文对话风格\n- **英文模板包**：默认英文对话风格\n- **自定义模板包**：根据你的需求定制\n\n### 切换模板包\n\n1. 在智能体设置中找到\"提示词模板\"\n2. 选择想要的模板包\n3. 保存\n\n**生效规则**：新对话使用新模板，已有对话保持不变。\n\n### 创建自定义模板\n\n1. 基于一个内置模板复制\n2. 编辑各分段内容（角色、原则、附加说明等）\n3. 保存后即可使用\n\n## 关键规则\n\n### 冻结原则\n\n线程的提示词一旦确定就冻结。修改提示词模板只影响**新创建的对话**，不会回写已有对话。\n\n如果你改了模板但当前对话没变化——这是正常的。开新对话就会用新模板。\n\n### 技能资源路径\n\n技能文档中的资源路径使用 `{{SKILL_ROOT}}` 占位符。这是因为技能在不同运行形态下实际路径不同，占位符会被系统替换为正确路径。\n\n### 提示词、技能、记忆的配合\n\n| | 职责 |\n|--|------|\n| **提示词** | 定义长期稳定的行为边界 |\n| **技能** | 定义某类任务的附加执行协议 |\n| **记忆** | 定义线程初始化时的长期事实 |\n\n三者配合，不混用职责。\n\n## 实践\n\n### 优化提示词\n\n好的提示词模板应该：\n- **角色明确**：清晰定义智能体是谁\n- **原则简洁**：不要堆砌太多约束，抓住关键\n- **避免矛盾**：前后一致的指导\n- **注重实用**：从实际效果出发调整\n\n### 管理技能\n\n- **查看技能**：在\"工具\"页面查看已安装的技能\n- **启用/禁用**：按需开启或关闭技能\n- **创建技能**：为你的特定工作场景创建专属技能\n- **分享技能**：好的技能可以分享给团队\n\n### 自定义智能体风格\n\n通过组合不同的提示词模板 + 技能 + 模型，你可以创建出各种风格的智能体：\n- 编程助手\n- 文案写手\n- 数据分析师\n- 翻译专家\n\n## 常见误区\n\n- **改模板会立即影响当前对话？** 不会。只影响新对话。\n- **技能只是说明文档？** 不是。技能是智能体可以主动读取的运行资源。\n- **记忆会每轮重写提示词？** 不会。记忆只在初始化注入一次。\n\n## 延伸阅读\n\n- [提示词与个性化](/docs/zh-CN/reference/prompt-templates/) —— 模板操作指南\n- [记忆（核心）](/docs/zh-CN/concepts/core-memory/) —— 记忆的设计原则\n- [工具体系](/docs/zh-CN/concepts/tools/) —— 工具和技能的关系\n","source_path":"使用说明书/zh-CN/concepts/prompt-and-skills.md"}</script>
