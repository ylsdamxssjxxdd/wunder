  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/quota-and-token-usage","language":"zh-CN","title":"Token 账户与占用","summary":"Wunder 用 Token 账户管理用户可支配余额，用 Token 占用观察上下文负载；这两者相关，但不是一回事。","updated_at":"2026-04-10","read_when":["你在看 Token 余额、每日发放或会话资源占用","你要理解为什么系统强调 round_usage.total_tokens 与上下文占用"],"source_docs":["docs/API文档.md","docs/设计方案.md","docs/系统介绍.md"],"tab":"参考","group":"运行模型参考","group_path":["运行模型参考"],"url":"/docs/zh-CN/concepts/quota-and-token-usage/","headings":[{"id":"section-1","level":1,"text":"Token 账户与占用"},{"id":"section-2","level":2,"text":"本页重点"},{"id":"section-3","level":2,"text":"Token 账户是什么"},{"id":"section-4","level":2,"text":"Token 占用是什么"},{"id":"section-5","level":2,"text":"为什么要强调这个口径"},{"id":"section-6","level":2,"text":"当前最该看的字段"},{"id":"section-7","level":2,"text":"Token 账户和 Token 占用不是一回事"},{"id":"section-8","level":2,"text":"适用场景"},{"id":"section-9","level":2,"text":"实施建议"},{"id":"section-10","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/memory","next_slug":"zh-CN/concepts/swarm","markdown":"# Token 账户与占用\n\nWunder 里最容易被误读的一件事，就是把 Token 账户、Token 消耗和供应商账单混成一件事。\n\n## 本页重点\n\n这页解释两个并列概念：\n\n- 什么是用户的 Token 账户\n- 什么是运行时的 Token 占用\n\n## Token 账户是什么\n\n可以把 Token 账户理解成用户在 Wunder 里的可支配货币余额：\n\n- `token_balance`：当前余额，可以累计，也会随着模型消耗而减少\n- `token_granted_total`：累计发放和奖励总额\n- `token_used_total`：累计消耗总额\n- `daily_token_grant`：当前用户每天应发放的 Token 数\n- `last_token_grant_date`：最近一次完成每日发放的日期\n\n当前默认规则是：\n\n- 一级/二级/三级/四级用户每天分别发放 `100M / 50M / 10M / 1M` Token\n- 每日发放会直接累积到 `token_balance`\n- 模型调用按实际 `total_tokens` 扣减\n- 用户升级时会额外奖励 Token，奖励同样直接入账到 Token 账户\n\n所以这里的 Token 更接近系统内货币，而不是“一天一清零”的额度条。\n\n## Token 占用是什么\n\nToken 占用是运行时观测口径，回答的是：\n\n- 当前这一轮请求到底占了多少上下文\n- 这次请求实际消耗了多少 Token\n\n它不是供应商账单口径，也不是用户余额本身。\n\n## 为什么要强调这个口径\n\n因为 Wunder 的很多稳定性问题，本质都和上下文大小有关：\n\n- 线程会不会过长\n- 压缩是否及时\n- 工具结果是否把上下文顶满\n- 某类任务是否长期占着高输入窗口\n\n如果只盯账单，很难指导系统治理。\n\n## 当前最该看的字段\n\n在监控和会话汇总里，最有意义的是：\n\n- `round_usage.total_tokens`\n- `token_usage.total_tokens`\n\n其中：\n\n- `round_usage.total_tokens` 表示**单轮请求完成后的实际上下文占用**，当前作为上下文占用的权威口径。\n- `token_usage.total_tokens` 表示**单次模型调用的 usage 明细**；当一轮只发生一次模型调用时，它通常会和 `round_usage.total_tokens` 一致。\n\n如果你在做新接入，推荐直接消费这些显式别名：\n\n- `context_occupancy_tokens`：当前上下文占用\n- `request_consumed_tokens`：单次请求消耗\n- `consumed_tokens`：聚合接口里的累计消耗\n\n而 `context_usage` 这类字段更偏过程估算，适合观测，不适合当唯一准绳。\n\n## Token 账户和 Token 占用不是一回事\n\n可以这样理解：\n\n- Token 账户：治理与结算口径，决定用户还剩多少可支配 Token\n- Token 占用：运行观测口径，告诉你这轮上下文实际有多重\n\n所以一个请求可能：\n\n- 余额还够，但上下文已经很重\n- 账单不算高，但线程治理已经开始吃紧\n\n## 适用场景\n\n- 监控里某些会话 token_usage 异常高\n- 你在排查某个用户为什么余额不足\n- 你在做压缩、裁剪和工具结果长度治理\n- 你在解释“为什么管理员态和普通用户态口径不同”\n\n## 实施建议\n\n- 看用户还能不能继续使用时，优先看 Token 账户字段。\n- Wunder 记录的当前上下文占用，优先看 `round_usage.total_tokens`。\n- Wunder 记录的累计消耗，按每次请求的 `round_usage.total_tokens` 累加。\n- 不要把单次调用 usage、上下文占用、累计消耗、Token 账户和供应商账单混成一个概念。\n\n## 延伸阅读\n\n- [流式事件参考](/docs/zh-CN/reference/stream-events/)\n- [运维概览](/docs/zh-CN/ops/)\n- [长期记忆](/docs/zh-CN/concepts/memory/)\n","source_path":"使用说明书/zh-CN/concepts/quota-and-token-usage.md"}</script>
