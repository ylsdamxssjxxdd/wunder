  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/quota-and-token-usage","language":"zh-CN","title":"Token 与配额","summary":"Token 账户是你的资源余额，Token 占用是当前上下文的实际负载。两个概念相关但不同，理解区别才能用好配额。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"深入了解","group_path":["深入了解"],"url":"/docs/zh-CN/concepts/quota-and-token-usage/","headings":[{"id":"section-1","level":1,"text":"Token 与配额"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"Token 账户"},{"id":"section-4","level":3,"text":"Token 占用"},{"id":"section-5","level":2,"text":"作用"},{"id":"section-6","level":3,"text":"Token 账户的作用"},{"id":"section-7","level":3,"text":"Token 占用的作用"},{"id":"section-8","level":2,"text":"实践"},{"id":"section-9","level":3,"text":"查看账户余额"},{"id":"section-10","level":3,"text":"查看上下文占用"},{"id":"section-11","level":3,"text":"优化使用"},{"id":"section-12","level":3,"text":"管理员管理 Token"},{"id":"section-13","level":2,"text":"用户等级与发放"},{"id":"section-14","level":2,"text":"常见误区"},{"id":"section-15","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/memory","next_slug":"zh-CN/concepts/swarm","markdown":"# Token 与配额\n\n## 原理\n\nWunder 里有两个关于 Token 的概念，经常被混用：\n\n| 概念 | 含义 | 用途 |\n|------|------|------|\n| **Token 账户** | 用户可支配的资源余额 | 治理和结算 |\n| **Token 占用** | 当前上下文的实际大小 | 运行观测 |\n\n### Token 账户\n\n类似\"账户余额\"：\n\n| 字段 | 含义 |\n|------|------|\n| 当前余额 | 还可以用的 Token |\n| 累计获得 | 总共发放了多少 |\n| 累计消耗 | 总共用了多少 |\n| 每日发放 | 每天自动获得的量 |\n\n**消耗规则**：按实际使用的 Token 消减余额。余额不足可能无法继续对话。\n\n### Token 占用\n\n类似\"当前负载\"：告诉你这一轮上下文实际有多大。\n\n**关注什么**：\n- `round_usage.total_tokens`：当前上下文占用\n- `request_consumed_tokens`：单次请求消耗\n\n## 作用\n\n### Token 账户的作用\n\n- **资源治理**：控制用户能消耗多少资源\n- **公平分配**：不同等级用户有不同配额\n- **防止滥用**：余额机制限制过度使用\n\n### Token 占用的作用\n\n- **性能观测**：上下文太大会影响响应速度\n- **压缩判断**：占用过高会触发压缩\n- **排障依据**：某些问题来自上下文过大\n\n## 实践\n\n### 查看账户余额\n\n在\"我的概况\"或\"系统设置\"可以看到：\n- 当前 Token 余额\n- 累计获得和消耗\n- 每日发放量\n\n### 查看上下文占用\n\n对话过程中可以看到：\n- 当前轮次的 Token 占用\n- 累计消耗\n\n### 优化使用\n\n- **及时开新会话**：避免单一会话过长\n- **精简输入**：避免大段粘贴重复内容\n- **使用 `/compact`**：主动压缩对话历史\n\n### 管理员管理 Token\n\n在管理端 → 用户管理 → 设置：\n- 直接设置余额\n- 发放额外 Token\n- 扣除 Token\n\n## 用户等级与发放\n\n不同等级用户每天自动获得不同量 Token：\n\n| 等级 | 每日发放 |\n|------|----------|\n| 一级 | 较高配额 |\n| 二级 | 中等配额 |\n| 三级 | 较低配额 |\n| 四级 | 基础配额 |\n\n升级时可能有额外奖励 Token。\n\n## 常见误区\n\n- **Token 账户 = 上下文占用？** 不是。账户是余额，占用是当前负载。\n- **Token 统计 = 供应商账单？** 不是。Wunder 的统计是系统内口径，供应商有自己的计费方式。\n- **余额够就一切正常？** 不一定。上下文过大也可能影响执行。\n\n## 延伸阅读\n\n- [多用户管理](/docs/zh-CN/concepts/core-multi-user-management/) —— 配额治理机制\n- [上下文压缩](/docs/zh-CN/concepts/core-context-compression/) —— 上下文过大的处理\n- [管理端面板指南](/docs/zh-CN/reference/admin-panels/) —— Token 管理操作\n","source_path":"使用说明书/zh-CN/concepts/quota-and-token-usage.md"}</script>
