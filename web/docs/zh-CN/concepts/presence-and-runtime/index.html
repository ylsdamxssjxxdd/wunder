  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/presence-and-runtime","language":"zh-CN","title":"运行时与在线状态","summary":"Wunder 不只返回消息内容，还持续维护线程和会话的运行时投影，用于表达 loaded、waiting、streaming、idle 等状态。","updated_at":"2026-03-20","read_when":["你在做会话列表、状态徽标或运行面板","你在排查线程到底是卡住了还是已经结束"],"source_docs":["docs/API文档.md","src/api/chat.rs","src/core/session_runtime.rs"],"tab":"概念","group":"核心概念","group_path":["核心概念"],"url":"/docs/zh-CN/concepts/presence-and-runtime/","headings":[{"id":"section-1","level":1,"text":"运行时与在线状态"},{"id":"section-2","level":2,"text":"本页重点"},{"id":"section-3","level":2,"text":"两层状态不要混"},{"id":"section-4","level":3,"text":"线程事件状态"},{"id":"section-5","level":3,"text":"会话运行时投影"},{"id":"section-6","level":2,"text":"为什么不能只保留一个 running"},{"id":"section-7","level":2,"text":"会话页最常见的状态判断"},{"id":"section-8","level":2,"text":"什么时候最容易用错"},{"id":"section-9","level":3,"text":"把“等待审批”当成“已经结束”"},{"id":"section-10","level":3,"text":"只在详情页读状态"},{"id":"section-11","level":3,"text":"把事件流和摘要状态混成一层"},{"id":"section-12","level":2,"text":"实施建议"},{"id":"section-13","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/streaming","next_slug":"zh-CN/concepts/tools","markdown":"# 运行时与在线状态\n\nWunder 的会话不是一条静态历史记录，它始终带着一层运行时状态。\n\n## 本页重点\n\n如果你想知道：\n\n- 线程现在是不是还活着\n- 为什么会话列表需要 `runtime`\n- `running`、`thread_status`、`terminal_status` 分别表达什么\n\n这页就是给这些问题用的。\n\n## 两层状态不要混\n\n### 线程事件状态\n\n事件流里的 `thread_status` 更像“线程现在在干什么”。\n\n常见值包括：\n\n- `running`\n- `waiting_approval`\n- `waiting_user_input`\n- `interrupting`\n- `idle`\n- `not_loaded`\n\n### 会话运行时投影\n\n聊天域会把状态再汇总成 `runtime` 对象，给列表页和详情页直接消费。\n\n当前重点字段包括：\n\n- `status`\n- `loaded`\n- `active`\n- `streaming`\n- `waiting`\n- `watcher_count`\n- `pending_approval_count`\n- `monitor_status`\n- `monitor_stage`\n- `terminal_status`\n\n## 为什么不能只保留一个 `running`\n\n因为 `running=true/false` 太粗了。\n\n它回答不了这些问题：\n\n- 是在持续输出，还是在等审批\n- 会话是否已经加载到内存\n- 有没有观察者挂在这个线程上\n- 这轮是不是已经进入 `completed/failed/cancelled/rejected`\n\n所以 Wunder 现在保留 `running` 兼容字段，但真正稳定的接入应该看 `runtime`。\n\n## 会话页最常见的状态判断\n\n如果你在做列表或详情页，通常按这个思路就够了：\n\n- 是否还在持续执行：看 `runtime.streaming`\n- 是否处于等待态：看 `runtime.waiting`\n- 是否已经有终态：看 `runtime.terminal_status`\n- 是否还能被继续观察：看 `runtime.loaded` 和 `runtime.active`\n\n## 什么时候最容易用错\n\n### 把“等待审批”当成“已经结束”\n\n这会导致前端错误地恢复输入框或隐藏审批区。\n\n### 只在详情页读状态\n\n会话列表、事件页和线程面板都应该复用同一套运行时语义。\n\n### 把事件流和摘要状态混成一层\n\n事件负责时间线，`runtime` 负责当前快照。\n\n## 实施建议\n\n- `thread_status` 适合表达过程中的线程状态。\n- `runtime` 适合给会话列表、详情页和控制面板直接消费。\n- `running` 只是兼容字段，不应该再承担完整状态机。\n\n## 延伸阅读\n\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n- [流式执行](/docs/zh-CN/concepts/streaming/)\n- [聊天会话](/docs/zh-CN/integration/chat-sessions/)\n","source_path":"静态站文档/zh-CN/concepts/presence-and-runtime.md"}</script>
