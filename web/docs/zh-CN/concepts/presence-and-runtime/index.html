  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/presence-and-runtime","language":"zh-CN","title":"运行时与在线状态","summary":"会话不只是静态历史，还带着运行时状态。loaded、streaming、waiting...这些状态告诉你线程现在在干什么。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"深入了解","group_path":["深入了解"],"url":"/docs/zh-CN/concepts/presence-and-runtime/","headings":[{"id":"section-1","level":1,"text":"运行时与在线状态"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"两层状态"},{"id":"section-4","level":2,"text":"作用"},{"id":"section-5","level":3,"text":"会话列表展示"},{"id":"section-6","level":3,"text":"详情页状态"},{"id":"section-7","level":3,"text":"排障依据"},{"id":"section-8","level":2,"text":"实践"},{"id":"section-9","level":3,"text":"状态判断"},{"id":"section-10","level":3,"text":"不要只看 running"},{"id":"section-11","level":3,"text":"状态不一致时"},{"id":"section-12","level":2,"text":"常见误区"},{"id":"section-13","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/streaming","next_slug":"zh-CN/concepts/tools","markdown":"# 运行时与在线状态\n\n## 原理\n\n你和智能体的对话不只是一条聊天记录，它还带着**运行时状态**——告诉你线程现在在干什么。\n\n### 两层状态\n\n**线程事件状态**：表达线程现在在做什么\n\n| 状态 | 含义 |\n|------|------|\n| `running` | 正在执行 |\n| `waiting_approval` | 等待审批 |\n| `waiting_user_input` | 等待你输入 |\n| `interrupting` | 正在中断 |\n| `idle` | 空闲，等待下一条消息 |\n| `not_loaded` | 未加载到内存 |\n\n**会话运行时投影**：给界面直接消费的汇总状态\n\n| 字段 | 含义 |\n|------|------|\n| `streaming` | 是否正在持续输出 |\n| `waiting` | 是否处于等待态 |\n| `loaded` | 会话是否已加载 |\n| `active` | 会话是否活跃 |\n| `terminal_status` | 是否已有终态 |\n\n## 作用\n\n### 会话列表展示\n\n你在会话列表看到的状态徽标来自运行时状态：\n- 绿点 = 活跃会话\n- 旋转图标 = 正在执行\n- 等待图标 = 等待审批或输入\n\n### 详情页状态\n\n详情页的状态指示器告诉你：\n- 当前在哪个阶段\n- 是否可以发送新消息\n- 是否有待处理的审批\n\n### 排障依据\n\n状态异常时，运行时状态是排障的起点：\n- 卡住了？看 streaming 和 waiting\n- 消失了？看 loaded 和 active\n- 状态不对？看 terminal_status\n\n## 实践\n\n### 状态判断\n\n| 想知道... | 看什么 |\n|-----------|--------|\n| 是否还在执行 | `runtime.streaming` |\n| 是否在等待 | `runtime.waiting` |\n| 是否已结束 | `runtime.terminal_status` |\n| 是否能继续观察 | `runtime.loaded` 和 `runtime.active` |\n\n### 不要只看 running\n\n`running=true/false` 太粗了，不能区分：\n- 是持续输出还是等待审批\n- 会话是否已加载\n- 是否已经有终态\n\n要看完整的 `runtime` 对象。\n\n### 状态不一致时\n\n如果界面显示和实际状态不一致：\n1. 等待几秒看是否自动恢复\n2. 刷新页面或重启应用\n3. 使用\"重置工作状态\"功能\n\n## 常见误区\n\n- **等待审批 = 已经结束？** 不是。等待审批是暂停，不是终态。\n- **只在详情页看状态？** 不是。列表、事件页都应该显示状态。\n- **事件流和摘要状态是同一层？** 不是。事件负责时间线，runtime 负责当前快照。\n\n## 延伸阅读\n\n- [会话状态说明](/docs/zh-CN/reference/stream-events/) —— 状态详细含义\n- [智能体循环](/docs/zh-CN/concepts/core-agent-loop/) —— 状态变化机制\n- [流式执行](/docs/zh-CN/concepts/streaming/) —— 状态推送方式\n","source_path":"使用说明书/zh-CN/concepts/presence-and-runtime.md"}</script>
