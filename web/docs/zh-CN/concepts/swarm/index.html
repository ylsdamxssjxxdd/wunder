  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/swarm","language":"zh-CN","title":"蜂群协作","summary":"蜂群的实际运作：母蜂如何拆解任务、工蜂如何执行、结果如何归并、状态如何展示。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"深入了解","group_path":["深入了解"],"url":"/docs/zh-CN/concepts/swarm/","headings":[{"id":"section-1","level":1,"text":"蜂群协作"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"核心概念"},{"id":"section-4","level":3,"text":"工作流程"},{"id":"section-5","level":2,"text":"作用"},{"id":"section-6","level":3,"text":"协作优势"},{"id":"section-7","level":3,"text":"蜂群 vs 子智能体"},{"id":"section-8","level":2,"text":"工蜂的线程约定"},{"id":"section-9","level":2,"text":"实践"},{"id":"section-10","level":3,"text":"在界面上查看蜂群"},{"id":"section-11","level":3,"text":"状态说明"},{"id":"section-12","level":3,"text":"什么时候用蜂群"},{"id":"section-13","level":3,"text":"主线程保护"},{"id":"section-14","level":2,"text":"常见误区"},{"id":"section-15","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/quota-and-token-usage","next_slug":"zh-CN/concepts/boundary-handling","markdown":"# 蜂群协作\n\n## 原理\n\n蜂群是 Wunder 的多智能体协作机制。当任务复杂到需要多个智能体协同完成时，蜂群把协作变成系统内可追踪、可重复、可恢复的正式能力。\n\n### 核心概念\n\n| 角色 | 说明 | 比喻 |\n|------|------|------|\n| **母蜂** | 当前主持协作的主智能体 | 项目经理 |\n| **工蜂** | 已存在的智能体，被调度参与协作 | 团队成员 |\n| **Mission** | 一次具体的协作任务 | 工作任务 |\n| **任务** | 分配给工蜂的具体子任务 | 待办事项 |\n\n### 工作流程\n\n```\n你的需求：复杂的、需要分工的任务\n         ↓\n    母蜂接收并分析\n         ↓\n    拆解为多个子任务\n         ↓\n    ┌────┼────┐\n    ↓    ↓    ↓\n  工蜂A 工蜂B 工蜂C\n  搜集  分析  撰写\n    ↓    ↓    ↓\n    └────┼────┘\n         ↓\n    母蜂汇总结果\n         ↓\n    返回最终成果\n```\n\n## 作用\n\n### 协作优势\n\n- **并行执行**：多个智能体同时工作，效率更高\n- **专业分工**：不同智能体有不同专长，各司其职\n- **过程可见**：你能看到每个工蜂的进度和轨迹\n- **结果可靠**：工蜂结果归并到母蜂，不会散落\n\n### 蜂群 vs 子智能体\n\n| | 蜂群 | 子智能体 |\n|--|------|----------|\n| **调度对象** | 已存在的智能体 | 临时派生的子会话 |\n| **线程** | 工蜂独立线程 | 当前会话内派生 |\n| **适合** | 复杂的分工协作 | 轻量的临时任务 |\n| **资源** | 需要预先创建好智能体 | 不需要额外准备 |\n\n## 工蜂的线程约定\n\n工蜂被派发任务时，默认创建新线程作为主线程。为什么？\n\n- **上下文干净**：不受旧对话干扰\n- **专注当前任务**：只看母蜂派发的内容\n- **避免污染**：不同任务之间不互相影响\n\n你也可以指定复用工蜂的现有线程，或强制使用全新线程。\n\n## 实践\n\n### 在界面上查看蜂群\n\n**中栏列表**：\n- 显示所有蜂群任务\n- 有运行中任务的蜂群会有呼吸高亮\n- 可以快速了解哪些在运行\n\n**画布视图**：\n- 可视化展示协作关系\n- 母蜂和工蜂之间的连线表示派发关系\n- 每个节点显示当前状态\n\n**工具轨迹**：\n- 每个节点显示调用了什么工具\n- 显示当前走到了哪一步\n- 完成后仍保留轨迹记录\n\n### 状态说明\n\n| 状态 | 含义 |\n|------|------|\n| 运行中 | 工蜂正在执行任务 |\n| 已完成 | 工蜂已完成任务 |\n| 失败 | 工蜂执行出错 |\n| 等待中 | 等待被调度 |\n\n### 什么时候用蜂群\n\n**适合**：\n- 任务可以明确拆分为多个子任务\n- 不同子任务需要不同专长\n- 需要并行处理提高效率\n\n**不适合**：\n- 简单任务，一个智能体就能完成\n- 只是需要临时分叉一个小任务\n\n### 主线程保护\n\n界面会阻止在智能体运行中切换线程。这是保护机制，避免：\n- 运行中的主线程还没结束就切走\n- 会话状态和工作流错位\n\n如果要开新线程，先等当前运行完成或先停止。\n\n## 常见误区\n\n- **蜂群 = 并行请求？** 不是。重点是协作关系和结果归并。\n- **工蜂越多越好？** 不是。粒度过粗或过细都降低效率。\n- **工蜂能访问母蜂的上下文？** 不能。工蜂只看到被派发的任务内容。\n\n## 延伸阅读\n\n- [蜂群（核心）](/docs/zh-CN/concepts/core-swarm/) —— 蜂群的设计原则\n- [智能体蜂群工具](/docs/zh-CN/tools/agent-swarm/) —— 工具操作说明\n- [子智能体控制](/docs/zh-CN/tools/subagent-control/) —— 子智能体的使用\n","source_path":"使用说明书/zh-CN/concepts/swarm.md"}</script>
