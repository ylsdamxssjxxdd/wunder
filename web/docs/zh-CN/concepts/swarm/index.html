  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/swarm","language":"zh-CN","title":"蜂群协作","summary":"wunder 的蜂群能力用于多智能体协同、资产化与工作流编排。","read_when":["你要理解 wunder 的多智能体能力","你要区分普通单智能体会话和蜂群协作"],"source_docs":["docs/系统介绍.md","docs/蜂巢协议设计.md"],"tab":"概念","group":"核心概念","group_path":["核心概念"],"url":"/docs/zh-CN/concepts/swarm/","headings":[{"id":"section-1","level":1,"text":"蜂群协作"},{"id":"section-2","level":2,"text":"蜂群解决什么问题"},{"id":"section-3","level":2,"text":"相关概念"},{"id":"section-4","level":2,"text":"为什么它重要"},{"id":"section-5","level":2,"text":"当前你需要先知道的事"},{"id":"section-6","level":2,"text":"相关文档"}],"prev_slug":"zh-CN/concepts/quota-and-token-usage","next_slug":"zh-CN/tools/index","markdown":"# 蜂群协作\n\n在 wunder 中，蜂群用于承载多智能体协作。\n\n## 蜂群解决什么问题\n\n单个智能体适合独立完成一个任务，但很多任务天然需要拆分：\n\n- 一个负责搜集信息\n- 一个负责生成结果\n- 一个负责复核\n- 一个负责交付产物\n\n蜂群能力就是把这种协作变成系统内的正式结构。\n\n## 相关概念\n\n在当前仓库语义里，常见概念包括：\n\n- 蜂群\n- 工蜂\n- WorkerCard\n- HivePack\n\n这些概念分别用于表达：\n\n- 协作单元\n- 单智能体角色\n- 角色配置载体\n- 可导入导出的协作资产包\n\n## 为什么它重要\n\n如果多智能体只是“多开几个聊天窗口”，就很难治理：\n\n- 难以复用\n- 难以迁移\n- 难以导出\n- 难以批量配置\n\n蜂群能力让多智能体从临时玩法变成正式资产。\n\n## 当前你需要先知道的事\n\n- 蜂群是正式能力，不只是 UI 概念\n- 它和工具、技能、工作区、会话状态都有关系\n- 它适合复杂任务，不适合每个简单问题都强行拆分\n\n## 相关文档\n\n- [系统架构](/docs/zh-CN/concepts/architecture/)\n- [工具体系](/docs/zh-CN/concepts/tools/)\n","source_path":"静态站文档/zh-CN/concepts/swarm.md"}</script>
