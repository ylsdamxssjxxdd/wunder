  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/swarm","language":"zh-CN","title":"蜂群协作","summary":"wunder 的蜂群能力用于多智能体协作，核心是母蜂编排、工蜂执行、必要时再派生子智能体。","updated_at":"2026-04-10","read_when":["你要理解 wunder 的多智能体能力","你要区分母蜂、工蜂和子智能体"],"source_docs":["docs/API文档.md","frontend/src/components/beeroom/canvas/swarmCanvasModel.ts","frontend/src/components/beeroom/canvas/BeeroomSwarmNodeCard.vue"],"tab":"参考","group":"运行模型参考","group_path":["运行模型参考"],"url":"/docs/zh-CN/concepts/swarm/","headings":[{"id":"section-1","level":1,"text":"蜂群协作"},{"id":"section-2","level":2,"text":"蜂群解决什么问题"},{"id":"section-3","level":2,"text":"先分清三个角色"},{"id":"section-4","level":3,"text":"母蜂"},{"id":"section-5","level":3,"text":"工蜂"},{"id":"section-6","level":3,"text":"子智能体"},{"id":"section-7","level":2,"text":"蜂群和子智能体控制有什么区别"},{"id":"section-8","level":2,"text":"工蜂为什么默认会新建线程"},{"id":"section-9","level":2,"text":"主线程为什么重要"},{"id":"section-10","level":2,"text":"当前前端怎么显示蜂群状态"},{"id":"section-11","level":2,"text":"现在工作流区域重点看什么"},{"id":"section-12","level":2,"text":"什么时候适合用蜂群"},{"id":"section-13","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/quota-and-token-usage","next_slug":"zh-CN/concepts/boundary-handling","markdown":"# 蜂群协作\n\n在 wunder 中，蜂群不是“多开几个聊天窗口”，而是一套正式的多智能体协作结构。\n\n## 蜂群解决什么问题\n\n单个智能体适合独立完成一个任务，但很多任务天然需要拆分，例如：\n\n- 一个负责搜集信息\n- 一个负责生成结果\n- 一个负责复核\n- 一个负责整理最终交付\n\n蜂群把这种协作变成系统内可追踪、可重复、可恢复的正式能力。\n\n## 先分清三个角色\n\n### 母蜂\n\n母蜂是当前正在主持协作的主智能体。\n\n它负责：\n\n- 拆分任务\n- 派发给工蜂\n- 汇总结果\n- 决定后续是否继续协作\n\n### 工蜂\n\n工蜂是蜂群里已经存在的其他智能体。\n\n它们负责执行被派发的具体任务。\n\n### 子智能体\n\n子智能体不是蜂群成员本身，而是某个母蜂或工蜂在执行过程中临时派生出来的子会话。\n\n所以要记住：\n\n- 工蜂是“已有智能体”\n- 子智能体是“临时派生运行”\n\n## 蜂群和子智能体控制有什么区别\n\n两者都能做协作，但边界不同：\n\n- 蜂群：调度已有智能体\n- 子智能体控制：派生当前会话的临时子运行\n\n如果你要的是“叫现成的其他智能体一起干活”，优先用蜂群。\n\n如果你要的是“当前会话临时分叉一条子任务”，优先用子智能体控制。\n\n## 工蜂为什么默认会新建线程\n\n当前蜂群有一个非常重要的约定：\n\n- 工蜂被派发任务时，默认会新建线程\n- 这个新线程会成为该工蜂新的主线程\n\n这样做是为了让工蜂上下文保持干净，避免把旧对话脏上下文直接带进新任务。\n\n只有在你显式提供 `sessionKey` 时，系统才会复用已有线程。\n\n## 主线程为什么重要\n\n在 Wunder 里，智能体的主线程是它当前的一等现实状态。\n\n这意味着：\n\n- 新任务优先落到主线程\n- 工蜂切换到新主线程后，后续协作也会围绕这个新线程展开\n\n这也是为什么前端会严格保护运行中的线程切换。\n\n## 当前前端怎么显示蜂群状态\n\n蜂群页当前有几条比较稳定的状态语义：\n\n- 中栏蜂群条目只要仍有运行中的 mission，就会呼吸高亮\n- 画布节点运行中会有呼吸态边框或高亮反馈\n- 工蜂和子智能体节点的工作流区域会自动跟随最新进展\n\n所以现在用户看到的不只是“谁在忙”，还能看到“忙到了哪一步”。\n\n## 现在工作流区域重点看什么\n\n蜂群画布里的工作流区域，当前主要展示工具轨迹。\n\n尤其是：\n\n- 母蜂节点优先保留真实工具工作流\n- 工蜂节点会持续显示自己的工具步骤\n- 子智能体完成后仍保留工具轨迹，不会只剩一个终态标签\n\n换句话说，工作流区域现在优先表达：\n\n- 调用了什么工具\n- 当前走到哪一步\n- 哪个节点仍在活跃\n\n而不是只堆状态、会话号或摘要。\n\n## 什么时候适合用蜂群\n\n适合：\n\n- 研究、写作、复核并行\n- 让不同角色分别处理同一问题的不同方面\n- 需要在多个现有智能体之间做分工\n\n不适合：\n\n- 只需要一个智能体就能完成的小任务\n- 只是想临时分叉一个很小的子任务\n\n## 延伸阅读\n\n- [智能体蜂群](/docs/zh-CN/tools/agent-swarm/)\n- [子智能体控制](/docs/zh-CN/tools/subagent-control/)\n- [会话线程控制](/docs/zh-CN/tools/thread-control/)\n","source_path":"使用说明书/zh-CN/concepts/swarm.md"}</script>
