  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-observability","language":"zh-CN","title":"可观测性","summary":"系统能解释自己发生了什么。事实层、回放层、画像层三层分明，排障和治理都有据可依。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-observability/","headings":[{"id":"section-1","level":1,"text":"可观测性"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"三层架构"},{"id":"section-4","level":2,"text":"作用"},{"id":"section-5","level":3,"text":"排障"},{"id":"section-6","level":3,"text":"审计"},{"id":"section-7","level":3,"text":"治理"},{"id":"section-8","level":2,"text":"关键区分"},{"id":"section-9","level":3,"text":"Monitor vs Throughput vs Benchmark"},{"id":"section-10","level":3,"text":"实时性 vs 可观测性"},{"id":"section-11","level":2,"text":"实践"},{"id":"section-12","level":3,"text":"管理员看什么"},{"id":"section-13","level":3,"text":"如何排障"},{"id":"section-14","level":3,"text":"指标口径"},{"id":"section-15","level":2,"text":"常见误区"},{"id":"section-16","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/core-stability","next_slug":"zh-CN/tools/index","markdown":"# 可观测性\n\n## 原理\n\n如果系统只能运行、不能解释，出了问题时只能靠猜。可观测性就是让系统\"能说话\"：\n- 发生了什么？\n- 为什么这样？\n- 从哪里开始不对的？\n\n### 三层架构\n\n| 层级 | 用途 | 面向谁 |\n|------|------|--------|\n| **事实层** | 原始事件流，记录真实发生了什么 | 开发和运维 |\n| **回放层** | 能按时间线重建执行过程 | 排障和审计 |\n| **画像层** | 整理后的统计视图，展示趋势和热点 | 管理员 |\n\n**关键原则**：画像不能代替事实。管理员面板看到的是整理后的视角，不是底层真相。出问题时要能从画像层追到事实层。\n\n## 作用\n\n### 排障\n\n出了问题能快速定位：\n- 看事件流了解执行步骤\n- 看状态变化找到异常点\n- 看工具调用记录定位失败\n\n### 审计\n\n操作有记录：\n- 谁做了什么\n- 什么时候做的\n- 结果是什么\n\n### 治理\n\n管理员能看到：\n- 哪些工具是热点\n- 哪些会话资源消耗高\n- 系统整体负载趋势\n\n## 关键区分\n\n### Monitor vs Throughput vs Benchmark\n\n三者都是观测能力，但关注点不同：\n\n| 能力 | 看什么 | 用途 |\n|------|--------|------|\n| **Monitor** | 线程事实与运行细节 | 排障、实时状态 |\n| **Throughput** | 系统承压能力 | 容量规划 |\n| **Benchmark** | 能力质量与回归 | 质量评估 |\n\n### 实时性 vs 可观测性\n\n- **实时性**：在线同步，关注\"现在\"\n- **可观测性**：事后解释，关注\"过去\"\n\n两者结合，既能及时响应，又能复盘分析。\n\n## 实践\n\n### 管理员看什么\n\n**会话监控**：\n- 活跃会话列表\n- 线程状态和阶段\n- Token 消耗统计\n- 工具调用记录\n\n**性能观测**：\n- 吞吐量和并发数\n- 响应延迟分布\n- 错误率趋势\n- 队列深度\n\n**Benchmark**：\n- 任务完成质量\n- 能力退化检测\n- 版本对比\n\n### 如何排障\n\n1. **看现象**：界面显示什么状态\n2. **追事件**：查看事件流找到异常点\n3. **查工具**：看工具调用记录\n4. **看日志**：查看详细日志\n5. **定位根因**：综合判断问题所在\n\n### 指标口径\n\n**最重要的字段**：\n- `round_usage.total_tokens`：当前上下文占用\n- `thread_status`：线程当前状态\n- `turn_terminal`：轮次是否结束\n\n**不要混用口径**：\n- 不要混用\"单次调用 Token\"和\"上下文占用\"\n- 不要混用\"会话数\"和\"线程数\"\n- 统一口径才能有效比较\n\n## 常见误区\n\n- **日志多 = 可观测性好？** 不是。要有结构、有分层、有口径。\n- **画像 = 真相？** 不是。画像是整理后的视图，原始真相在事实层。\n- **指标越多越好？** 不是。口径统一的指标才有意义。\n\n## 延伸阅读\n\n- [性能与可观测性](/docs/zh-CN/ops/benchmark-and-observability/) —— 运维指南\n- [流式事件参考](/docs/zh-CN/reference/stream-events/) —— 事件详细说明\n- [管理端面板指南](/docs/zh-CN/reference/admin-panels/) —— 治理入口\n","source_path":"使用说明书/zh-CN/concepts/core-observability.md"}</script>
