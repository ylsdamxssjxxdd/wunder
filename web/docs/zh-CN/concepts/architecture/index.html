  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/architecture","language":"zh-CN","title":"系统架构","summary":"wunder 通过统一调度内核承载 server、cli、desktop 三种运行形态。","updated_at":"2026-04-02","read_when":["你要理解 wunder 的整体结构","你要知道 API、调度、工具、前端与存储之间如何协作"],"source_docs":["docs/系统介绍.md","docs/设计方案.md"],"tab":"参考","group":"运行模型参考","group_path":["运行模型参考"],"url":"/docs/zh-CN/concepts/architecture/","headings":[{"id":"section-1","level":1,"text":"系统架构"},{"id":"section-2","level":2,"text":"顶层结构"},{"id":"section-3","level":2,"text":"接入层"},{"id":"section-4","level":2,"text":"调度层"},{"id":"section-5","level":2,"text":"工具与能力层"},{"id":"section-6","level":2,"text":"存储与工作区层"},{"id":"section-7","level":2,"text":"前端与桌面壳层"},{"id":"section-8","level":2,"text":"当前最重要的架构约束"},{"id":"section-9","level":2,"text":"图示"},{"id":"section-10","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/reference/admin-panels","next_slug":"zh-CN/concepts/workspaces","markdown":"# 系统架构\n\nwunder 的架构目标很明确：用一套统一内核承载多种运行形态与多种能力来源。\n\n## 顶层结构\n\n从仓库结构和当前实现看，wunder 可以分成几层：\n\n1. 接入层\n2. 调度层\n3. 工具与能力层\n4. 存储与工作区层\n5. 前端与桌面壳层\n\n## 接入层\n\n接入层主要包含：\n\n- `/wunder` 主接口\n- 聊天 WebSocket 与 SSE\n- 用户侧前端\n- 管理端前端\n- 渠道入口\n- A2A 与 MCP 接入点\n\n这一层的作用是把“外部如何进入系统”统一起来。\n\n## 调度层\n\n调度层是系统核心，主要由这些模块构成：\n\n- `src/api/`\n- `src/orchestrator/`\n- `src/services/`\n- `src/core/`\n\n它负责：\n\n- 解析请求\n- 管理会话与线程\n- 构建模型上下文\n- 发起模型调用\n- 处理工具调用\n- 记录事件与状态\n\n## 工具与能力层\n\nwunder 的能力不是只来自一个地方，而是多源统一：\n\n- 内置工具\n- MCP 工具\n- Skills\n- 知识库\n- 用户工具\n- 蜂群与多智能体协作能力\n\n这也是 wunder 和单纯聊天产品最大的区别之一。\n\n## 存储与工作区层\n\n工作区与存储是长期运行的基础：\n\n- 用户工作区用于持久文件与产物\n- 会话数据用于历史与回放\n- 监控与事件用于可观测性\n- 长期记忆用于线程初始化阶段的记忆注入\n\n## 前端与桌面壳层\n\nwunder 当前至少有三套用户可见界面：\n\n- 用户侧前端：`frontend/`\n- 管理端前端：`web/`\n- 桌面端壳：`desktop/`\n\n它们共享底层能力，但交互目标不同。\n\n## 当前最重要的架构约束\n\n- `server` 是平台核心\n- `desktop` 是当前主交付形态\n- `cli` 是开发与自动化入口\n- 用户侧前端与管理员侧前端必须区分\n- WebSocket 优先，SSE 兜底\n\n## 图示\n\n当前使用说明书内保留了一张核心层级图，适合先建立系统边界：\n\n- [层级结构图（心舰 -> 用户 -> 蜂群 -> 智能体 -> 线程）](/docs/assets/manual/08-hierarchy-structure.svg)\n\n## 延伸阅读\n\n- [会话与轮次](/docs/zh-CN/concepts/sessions-and-rounds/)\n- [工具体系](/docs/zh-CN/concepts/tools/)\n- [部署与运行](/docs/zh-CN/ops/deployment/)\n","source_path":"使用说明书/zh-CN/concepts/architecture.md"}</script>
