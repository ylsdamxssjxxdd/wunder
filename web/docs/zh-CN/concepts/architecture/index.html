  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/architecture","language":"zh-CN","title":"系统架构","summary":"Wunder 的整体结构：三层架构、统一内核、多种形态，用一张图建立全局认知。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"深入了解","group_path":["深入了解"],"url":"/docs/zh-CN/concepts/architecture/","headings":[{"id":"section-1","level":1,"text":"系统架构"},{"id":"section-2","level":2,"text":"三层架构"},{"id":"section-3","level":3,"text":"第一层：界面层"},{"id":"section-4","level":3,"text":"第二层：调度与能力层"},{"id":"section-5","level":3,"text":"第三层：数据与存储层"},{"id":"section-6","level":2,"text":"三种运行形态"},{"id":"section-7","level":3,"text":"Desktop（桌面应用）"},{"id":"section-8","level":3,"text":"Server（服务端）"},{"id":"section-9","level":3,"text":"CLI（命令行）"},{"id":"section-10","level":2,"text":"关键设计原则"},{"id":"section-11","level":3,"text":"统一内核"},{"id":"section-12","level":3,"text":"线程为重"},{"id":"section-13","level":3,"text":"安全边界"},{"id":"section-14","level":2,"text":"层级关系图"},{"id":"section-15","level":2,"text":"常见架构问题"},{"id":"section-16","level":3,"text":"为什么桌面应用和网页端看起来一样？"},{"id":"section-17","level":3,"text":"管理端为什么是独立的？"},{"id":"section-18","level":3,"text":"Server 模式和 Desktop 模式可以共存吗？"},{"id":"section-19","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/reference/admin-panels","next_slug":"zh-CN/concepts/workspaces","markdown":"# 系统架构\n\n理解 Wunder 的架构，不需要记很多术语。核心思路很简单：**一套统一内核，承载多种使用形态**。\n\n## 三层架构\n\nWunder 从上到下可以理解为三层：\n\n```\n┌────────────────────────────────────────────┐\n│            你看到的界面                      │\n│    桌面应用 / 网页端 / 管理端 / 飞书微信     │\n├────────────────────────────────────────────┤\n│            系统的大脑                        │\n│    调度 · 对话 · 工具 · 蜂群 · 记忆         │\n├────────────────────────────────────────────┤\n│            数据的地基                        │\n│    数据库 · 文件存储 · 向量知识库             │\n└────────────────────────────────────────────┘\n```\n\n### 第一层：界面层\n\n这是你直接接触的部分。Wunder 有多种使用形态：\n\n- **桌面应用**：个人本地使用的主要方式，功能最完整\n- **网页端**：通过浏览器访问，适合在 Server 模式下使用\n- **管理端**：管理员配置系统、管理用户的后台\n- **外部渠道**：通过飞书、企业微信等第三方平台使用\n\n不同入口的体验不同，但背后共享同一套核心能力。\n\n### 第二层：调度与能力层\n\n这是 Wunder 的\"大脑\"，负责：\n\n- **调度执行**：接收请求，安排智能体执行任务\n- **对话管理**：维护会话历史，管理线程状态\n- **工具调用**：让智能体能读写文件、搜索网页、执行命令等\n- **蜂群协作**：调度多个智能体协同工作\n- **记忆管理**：长期资料的存储和检索\n\n### 第三层：数据与存储层\n\n这是数据持久化的基础：\n\n- **数据库**：存储用户、会话、配置等核心业务数据\n- **文件存储**：存放用户文件和智能体产物（工作区）\n- **向量知识库**：用于知识库检索功能\n\n## 三种运行形态\n\nWunder 有三种运行形态，选择取决于你的使用场景：\n\n### Desktop（桌面应用）\n\n**适合谁**：个人用户\n\n**特点**：\n- 本地安装，开箱即用\n- 数据存在本地，隐私性强\n- 可以访问本机文件和桌面\n- 不需要搭建服务器\n\n### Server（服务端）\n\n**适合谁**：团队、组织\n\n**特点**：\n- 支持多用户同时使用\n- 集中管理用户、权限和资源\n- 可以接入外部渠道\n- 适合生产环境部署\n\n### CLI（命令行）\n\n**适合谁**：开发者、自动化场景\n\n**特点**：\n- 在终端中使用\n- 适合脚本化和自动化\n- 开发调试方便\n\n## 关键设计原则\n\n### 统一内核\n\n不管你用哪种形态，背后的调度逻辑、工具体系、事件系统都是同一套。这意味着：\n- 在桌面应用里能做的事，在网页端同样能做\n- 从飞书发消息给智能体，和直接在网页端对话，体验一致\n- 管理员修改的设置，对所有入口统一生效\n\n### 线程为重\n\nWunder 不是\"一问一答\"的模式，而是以持续运行的线程为中心。每条线程维护着自己的对话历史、执行状态和上下文。这让智能体可以：\n- 处理需要多步骤完成的复杂任务\n- 在对话中途使用工具、等待审批后继续\n- 保持长时间的上下文连续性\n\n### 安全边界\n\n从架构层面就内置了安全考虑：\n- 不同用户的数据严格隔离\n- 工具执行受权限控制\n- 敏感操作需要审批\n- 资源使用有配额限制\n\n## 层级关系图\n\nWunder 的组织层级从上到下是：\n\n```\n心舰（系统）\n  └── 用户\n        └── 智能体\n              └── 线程（对话）\n                    └── 轮次（每一步交互）\n```\n\n每一层都有明确的职责边界：\n- **系统**管理全局配置和资源\n- **用户**拥有独立的文件空间和设置\n- **智能体**有独立的角色配置和工具集\n- **线程**承载一次完整的对话或任务\n- **轮次**记录每一次交互\n\n## 常见架构问题\n\n### 为什么桌面应用和网页端看起来一样？\n\n因为它们复用了同一套前端界面代码。区别在于桌面应用额外提供了本地文件访问、本地运行时等桌面能力。\n\n### 管理端为什么是独立的？\n\n管理端面向的是系统管理员，负责的是全局配置、用户管理、渠道管理等治理工作。它和普通用户的使用场景完全不同，所以独立设计。\n\n### Server 模式和 Desktop 模式可以共存吗？\n\n可以。你可以在本地用桌面应用做个人工作，同时组织里的 Server 为团队提供服务。两者互不干扰。\n\n## 延伸阅读\n\n- [核心概览](/docs/zh-CN/concepts/) —— 11 个核心设计原则\n- [部署指南](/docs/zh-CN/ops/deployment/) —— 如何选择和部署运行形态\n- [功能速查](/docs/zh-CN/reference/api-index/) —— 系统功能一览\n","source_path":"使用说明书/zh-CN/concepts/architecture.md"}</script>
