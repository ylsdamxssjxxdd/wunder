  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-scheduled-tasks","language":"zh-CN","title":"定时任务","summary":"让智能体在指定时间自动执行任务。不是 sleep 的升级版，而是系统级的异步调度能力。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-scheduled-tasks/","headings":[{"id":"section-1","level":1,"text":"定时任务"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"任务类型"},{"id":"section-4","level":2,"text":"作用"},{"id":"section-5","level":3,"text":"自动化"},{"id":"section-6","level":3,"text":"异步处理"},{"id":"section-7","level":3,"text":"后台治理"},{"id":"section-8","level":2,"text":"关键规则"},{"id":"section-9","level":3,"text":"与在线会话语义区分"},{"id":"section-10","level":3,"text":"执行必须可追踪"},{"id":"section-11","level":3,"text":"失败重试"},{"id":"section-12","level":2,"text":"实践"},{"id":"section-13","level":3,"text":"创建定时任务"},{"id":"section-14","level":3,"text":"查看执行记录"},{"id":"section-15","level":3,"text":"管理任务"},{"id":"section-16","level":3,"text":"常见场景"},{"id":"section-17","level":2,"text":"常见误区"},{"id":"section-18","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/core-channels","next_slug":"zh-CN/concepts/core-multi-user-management","markdown":"# 定时任务\n\n## 原理\n\nWunder 不只在\"收到请求\"时才响应，也能在\"指定时间\"主动执行任务。这就是定时任务。\n\n和临时用 `sleep` 等待不同，定时任务是系统级的异步调度：\n- 定义**什么时间**做什么\n- 系统承诺在未来某个时间**自动执行**\n- 执行记录、失败重试、状态追踪都有保障\n\n### 任务类型\n\n| 类型 | 说明 | 例子 |\n|------|------|------|\n| **周期性任务** | 按固定周期执行 | 每天生成日报、每周巡检 |\n| **延迟任务** | 延迟一定时间后执行 | 30分钟后提醒 |\n| **定点任务** | 在指定时间点执行 | 明天上午9点发送通知 |\n\n## 作用\n\n### 自动化\n\n让智能体自动执行周期性工作：\n- 定时汇总数据生成报告\n- 定时巡检系统状态\n- 定时提醒待办事项\n\n### 异步处理\n\n某些任务不需要立即响应，可以延后异步执行：\n- 大文件处理\n- 批量操作\n- 延迟通知\n\n### 后台治理\n\n系统自动执行维护任务：\n- 清理临时文件\n- 归档历史数据\n- 更新索引\n\n## 关键规则\n\n### 与在线会话语义区分\n\n定时任务不是\"延迟的对话\"，而是独立的异步执行链。它有：\n- 自己的调度规则\n- 独立的执行状态\n- 完整的执行记录\n\n### 执行必须可追踪\n\n每次计划执行都要有记录，回答：\n- 跑了没有？\n- 成功还是失败？\n- 下次什么时候执行？\n\n### 失败重试\n\n任务失败不会直接失效，会有重试策略：\n- 指数退避重试\n- 最大重试次数限制\n- 重试记录可查\n\n## 实践\n\n### 创建定时任务\n\n1. 进入\"定时任务\"页面\n2. 点击\"创建任务\"\n3. 设置：\n   - 任务名称\n   - 执行规则（周期、时间点）\n   - 执行内容（触发哪个智能体做什么）\n4. 保存并启用\n\n### 查看执行记录\n\n在任务详情页可以看到：\n- 执行历史列表\n- 每次执行的状态\n- 执行耗时\n- 输出结果\n\n### 管理任务\n\n- **暂停/恢复**：暂时停止或重新启用任务\n- **立即执行**：手动触发一次执行（用于测试）\n- **编辑规则**：修改执行时间或内容\n- **删除**：永久删除任务\n\n### 常见场景\n\n**场景1：每日日报**\n\n设置：每天早上 9 点，让\"分析师\"智能体汇总昨日数据生成报告。\n\n**场景2：定时巡检**\n\n设置：每小时执行一次\"巡检\"任务，检查系统状态并记录异常。\n\n**场景3：延迟提醒**\n\n设置：30 分钟后发送提醒通知。\n\n## 常见误区\n\n- **定时任务 = sleep？** 不是。sleep 是当前流程的等待，定时任务是系统级调度。\n- **任务越多越好？** 不是。要考虑系统资源和任务队列长度。\n- **任务失败了怎么办？** 会自动重试，重试策略可配置。\n\n## 延伸阅读\n\n- [定时任务工具](/docs/zh-CN/tools/schedule-task/) —— 工具使用说明\n- [智能体循环](/docs/zh-CN/concepts/core-agent-loop/) —— 任务执行的本质\n- [稳定性](/docs/zh-CN/concepts/core-stability/) —— 失败处理和重试\n","source_path":"使用说明书/zh-CN/concepts/core-scheduled-tasks.md"}</script>
