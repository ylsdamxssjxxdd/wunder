  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-realtime","language":"zh-CN","title":"实时性","summary":"执行过程实时可见。状态持续推送，断线可恢复，客户端看到的与后端真相一致。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-realtime/","headings":[{"id":"section-1","level":1,"text":"实时性"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"不是简单的字符流"},{"id":"section-4","level":3,"text":"技术实现"},{"id":"section-5","level":2,"text":"作用"},{"id":"section-6","level":3,"text":"对你"},{"id":"section-7","level":3,"text":"对系统"},{"id":"section-8","level":2,"text":"关键规则"},{"id":"section-9","level":3,"text":"前端是投影，后端是真相"},{"id":"section-10","level":3,"text":"终态必须有明确事件"},{"id":"section-11","level":3,"text":"事件语义稳定"},{"id":"section-12","level":2,"text":"实践"},{"id":"section-13","level":3,"text":"连接断开了怎么办"},{"id":"section-14","level":3,"text":"如何看懂状态提示"},{"id":"section-15","level":3,"text":"实时更新 vs 刷新"},{"id":"section-16","level":2,"text":"常见误区"},{"id":"section-17","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/core-multi-user-management","next_slug":"zh-CN/concepts/core-stability","markdown":"# 实时性\n\n## 原理\n\n你和智能体对话时，不只是\"发送请求→等待→收到结果\"这么简单。智能体的思考过程、工具调用、状态变化都是**持续推送**给你的。\n\n这就是实时性：让前端和外部系统持续获得线程的变化状态。\n\n### 不是简单的字符流\n\n实时性不只是\"文字一点点出来\"，而是包含：\n- **过程事件**：智能体在做什么\n- **状态事件**：当前运行到什么阶段\n- **终态事件**：一轮是否已经结束\n- **恢复机制**：断线后能补发遗漏的事件\n\n### 技术实现\n\nWunder 使用 **WebSocket** 作为主要传输方式，SSE 作为兜底。WebSocket 能双向通信，适合：\n- 持续接收状态更新\n- 发送控制命令（如取消）\n- 恢复连接后补发事件\n\n## 作用\n\n### 对你\n\n**过程可见**：\n- 看到智能体\"正在思考\"\n- 看到智能体\"正在读取文件\"\n- 知道它卡在哪里、还需要多久\n\n**控制及时**：\n- 可以实时取消执行\n- 可以实时审批或拒绝\n- 不会\"发出去就失去控制\"\n\n**断线可恢复**：\n- 网络断了重连后，自动补发遗漏的内容\n- 不会错过重要状态变化\n\n### 对系统\n\n**状态同步**：\n- 多端状态一致（桌面、网页、飞书看到同样的状态）\n- 不会一个端显示\"运行中\"，另一个显示\"已完成\"\n\n**事件驱动**：\n- 界面更新基于真实事件，不是猜测\n- 审计和追踪有完整的事件流\n\n## 关键规则\n\n### 前端是投影，后端是真相\n\n你在界面上看到的状态是后端线程状态的\"投影\"。投影要贴近真相，但不能替代真相。如果前端显示异常，以实际执行状态为准。\n\n### 终态必须有明确事件\n\n不能靠\"好像没动静了\"来判断一轮是否结束。系统会推送明确的终态事件（完成、失败、取消、拒绝），客户端据此判断。\n\n### 事件语义稳定\n\n状态事件的名称和含义保持一致，不因页面或渠道而异。这保证了多端状态能对齐。\n\n## 实践\n\n### 连接断开了怎么办\n\n1. 系统会显示\"连接断开\"\n2. 自动开始重连（指数退避）\n3. 重连成功后：\n   - 自动恢复会话\n   - 补发遗漏的事件\n4. 如果重连失败，会提示手动刷新\n\n### 如何看懂状态提示\n\n界面上的状态提示通常表示：\n\n| 状态 | 含义 |\n|------|------|\n| 等待中 | 请求已提交，在排队 |\n| 正在思考 | 智能体在处理 |\n| 执行工具中 | 智能体调用了工具 |\n| 需要审批 | 智能体等待你确认 |\n| 已完成 | 任务顺利结束 |\n| 已失败 | 执行过程出错 |\n\n### 实时更新 vs 刷新\n\n- **实时更新**：通过 WebSocket 自动推送\n- **手动刷新**：断网重连或页面刷新后的恢复\n\n两者结合保证你始终能看到最新状态。\n\n## 常见误区\n\n- **实时性 = 速度快？** 不是。实时性是指状态可见，不是指执行速度快。复杂任务本身需要时间。\n- **前端状态 = 后端真相？** 不是。前端是投影，后端是真相。正常情况下一致，但可能因网络延迟有短暂差异。\n- **final 事件就是完成？** 不一定。还要看完整的终态判断，包括失败、取消等。\n\n## 延伸阅读\n\n- [流式执行](/docs/zh-CN/concepts/streaming/) —— 流式输出的详细机制\n- [会话状态说明](/docs/zh-CN/reference/stream-events/) —— 各种状态的详细含义\n- [稳定性](/docs/zh-CN/concepts/core-stability/) —— 异常时的行为保证\n","source_path":"使用说明书/zh-CN/concepts/core-realtime.md"}</script>
