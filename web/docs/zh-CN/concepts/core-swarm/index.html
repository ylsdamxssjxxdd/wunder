  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-swarm","language":"zh-CN","title":"蜂群","summary":"复杂任务拆解给多个智能体协作完成：母蜂调度、工蜂执行、结果归并，过程持续可见。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-swarm/","headings":[{"id":"section-1","level":1,"text":"蜂群"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"三个角色"},{"id":"section-4","level":3,"text":"工作流程"},{"id":"section-5","level":2,"text":"作用"},{"id":"section-6","level":3,"text":"为什么要用蜂群"},{"id":"section-7","level":3,"text":"什么时候用蜂群"},{"id":"section-8","level":2,"text":"关键规则"},{"id":"section-9","level":3,"text":"工蜂使用干净线程"},{"id":"section-10","level":3,"text":"母蜂只做编排"},{"id":"section-11","level":3,"text":"结果必须归并"},{"id":"section-12","level":2,"text":"实践"},{"id":"section-13","level":3,"text":"在界面上查看蜂群状态"},{"id":"section-14","level":3,"text":"蜂群 vs 子智能体"},{"id":"section-15","level":2,"text":"常见误区"},{"id":"section-16","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/core-tools","next_slug":"zh-CN/concepts/core-context-compression","markdown":"# 蜂群\n\n## 原理\n\n单个智能体适合独立任务，但有些任务天然需要分工：\n\n- 一个人负责搜集信息\n- 一个人负责分析整理\n- 一个人负责复核结果\n- 一个人负责最终交付\n\n蜂群就是 Wunder 对多智能体协作的解决方案。它不是\"多开几个聊天窗口\"，而是一套正式的协作结构。\n\n### 三个角色\n\n| 角色 | 职责 | 比喻 |\n|------|------|------|\n| **母蜂** | 拆解任务、派发工作、汇总结果 | 项目经理 |\n| **工蜂** | 执行被派发的具体任务 | 团队成员 |\n| **子智能体** | 某个智能体临时派生的子任务 | 临时帮手 |\n\n**关键区别**：\n- **工蜂**是已经存在的智能体，被母蜂调度参与协作\n- **子智能体**是临时派生的，任务完成后就结束\n\n### 工作流程\n\n```\n你提出复杂任务\n     ↓\n母蜂分析并拆解任务\n     ↓\n母蜂派发子任务给各个工蜂\n  ├── 工蜂A：搜集资料\n  ├── 工蜂B：分析数据\n  └── 工蜂C：撰写报告\n     ↓\n各工蜂完成后汇报结果\n     ↓\n母蜂汇总所有结果\n     ↓\n返回最终成果给你\n```\n\n## 作用\n\n### 为什么要用蜂群\n\n**效率更高**：多个智能体同时工作，比一个智能体串行完成所有步骤快得多。\n\n**专业分工**：不同智能体可以有不同的专长（一个擅长编程、一个擅长写作、一个擅长分析），让合适的智能体做合适的事。\n\n**过程可控**：协作过程持续可见，你能看到每个工蜂在做什么、做到了哪一步。\n\n### 什么时候用蜂群\n\n**适合**：\n- 研究、写作、复核需要并行\n- 不同方面需要不同专长的智能体\n- 任务可以明确拆分为多个子任务\n\n**不适合**：\n- 只需一个智能体就能完成的简单任务\n- 只是临时分叉一个很小的子任务（用子智能体即可）\n\n## 关键规则\n\n### 工蜂使用干净线程\n\n工蜂被派发任务时，默认会创建新线程。为什么？因为旧对话的上下文可能会干扰新任务。干净的线程让工蜂专注于当前任务，不受历史包袱影响。\n\n### 母蜂只做编排\n\n母蜂负责分配任务和汇总结果，不应该把所有执行工作都自己做了。这是职责分离——编排和执行分开，才能保持清晰。\n\n### 结果必须归并\n\n工蜂的结果最终要回到母蜂的主线程里，而不是散落在外。这样你看到的最终结果是统一的、完整的。\n\n## 实践\n\n### 在界面上查看蜂群状态\n\n蜂群页面提供完整的工作状态视图：\n\n- **中栏列表**：有运行中任务的蜂群会呼吸高亮\n- **画布视图**：可视化展示母蜂和工蜂的协作关系\n- **工具轨迹**：每个节点会显示\"调用了什么工具、走到了哪一步\"\n\n### 蜂群 vs 子智能体\n\n两者都能协作，但场景不同：\n\n| 对比 | 蜂群 | 子智能体 |\n|------|------|----------|\n| **适合** | 调度已存在的专业智能体 | 当前会话临时分叉子任务 |\n| **线程** | 工蜂使用独立线程 | 在当前会话内派生 |\n| **持久性** | 智能体持续存在 | 任务完成后结束 |\n| **选择** | 需要分工协作的复杂任务 | 轻量的临时子任务 |\n\n## 常见误区\n\n- **蜂群不是并行请求**。重点是协作关系和结果归并，而不是简单地同时跑多个请求。\n- **工蜂越多越好？** 不是。拆解粒度过粗或过细都会降低效率。关键是职责清晰。\n- **蜂群和子智能体不一样**。蜂群强调正式的编排语义，子智能体是轻量的临时分叉。\n\n## 延伸阅读\n\n- [蜂群协作详解](/docs/zh-CN/concepts/swarm/) —— 蜂群的实际运作方式\n- [智能体蜂群工具](/docs/zh-CN/tools/agent-swarm/) —— 蜂群工具的操作说明\n- [子智能体控制](/docs/zh-CN/tools/subagent-control/) —— 子智能体的使用方法\n","source_path":"使用说明书/zh-CN/concepts/core-swarm.md"}</script>
