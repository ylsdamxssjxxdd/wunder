  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/streaming","language":"zh-CN","title":"流式执行","summary":"对话不是\"发送→等待→返回\"。执行过程实时推送：思考、工具调用、状态变化，一步步展现在你眼前。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"参考","group":"深入了解","group_path":["深入了解"],"url":"/docs/zh-CN/concepts/streaming/","headings":[{"id":"section-1","level":1,"text":"流式执行"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":3,"text":"流式不是只有文字"},{"id":"section-4","level":3,"text":"WebSocket vs SSE"},{"id":"section-5","level":2,"text":"作用"},{"id":"section-6","level":3,"text":"过程可见"},{"id":"section-7","level":3,"text":"控制及时"},{"id":"section-8","level":3,"text":"断线可恢复"},{"id":"section-9","level":2,"text":"实践"},{"id":"section-10","level":3,"text":"状态判断"},{"id":"section-11","level":3,"text":"网络断开"},{"id":"section-12","level":3,"text":"事件解读"},{"id":"section-13","level":2,"text":"常见误区"},{"id":"section-14","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/sessions-and-rounds","next_slug":"zh-CN/concepts/presence-and-runtime","markdown":"# 流式执行\n\n## 原理\n\nWunder 的对话不是\"黑盒处理\"——你发送消息后只能等待最终结果。整个过程是流式的，每一步变化都会实时推送给你。\n\n### 流式不是只有文字\n\n很多人以为流式就是\"文字一点一点出来\"。实际上，Wunder 的流式包含：\n\n| 类型 | 说明 | 例子 |\n|------|------|------|\n| **过程事件** | 发生了什么 | 智能体正在思考、正在调用工具 |\n| **状态事件** | 当前在什么阶段 | 运行中、等待审批、已完成 |\n| **终态事件** | 是否已经结束 | 完成、失败、取消、拒绝 |\n| **恢复机制** | 断线后能补发 | 重连后自动补发遗漏的事件 |\n\n### WebSocket vs SSE\n\nWunder 使用两种传输方式：\n\n| 方式 | 特点 | 用途 |\n|------|------|------|\n| **WebSocket** | 双向通信，可控制 | 主要方式，适合会话控制 |\n| **SSE** | 单向流，浏览器友好 | 兜底方案，兼容性好 |\n\n聊天场景优先 WebSocket，通用执行和兼容场景可用 SSE。\n\n## 作用\n\n### 过程可见\n\n你不用等到最后才知道发生了什么：\n- 看到\"正在思考\" → 知道智能体在处理\n- 看到\"正在读取文件\" → 知道它用了什么资料\n- 看到\"工具执行完成\" → 知道它完成了这一步\n\n### 控制及时\n\n不是发出去就失去控制：\n- 可以实时取消执行\n- 需要审批时立即收到请求\n- 状态变化实时反映\n\n### 断线可恢复\n\n网络波动不会丢失进度：\n- 自动重连\n- 重连后补发遗漏的事件\n- 状态自动同步\n\n## 实践\n\n### 状态判断\n\n如何判断一轮是否结束？看以下事件：\n\n| 状态 | 看什么 |\n|------|--------|\n| 一轮是否结束 | `turn_terminal` 事件 |\n| 线程当前状态 | `thread_status` 事件 |\n| 审批是否完成 | `approval_resolved` 事件 |\n\n不要只看\"好像不动了\"来判断结束——要看明确的状态事件。\n\n### 网络断开\n\n遇到网络断开时：\n1. 界面会显示\"连接断开\"\n2. 系统自动重连（指数退避）\n3. 重连成功后自动恢复\n4. 如果一直失败，提示手动刷新\n\n### 事件解读\n\n常见事件含义：\n\n| 事件 | 含义 |\n|------|------|\n| `queued` | 请求已进入队列 |\n| `progress` | 执行进度更新 |\n| `tool_call` | 智能体调用了工具 |\n| `tool_result` | 工具返回了结果 |\n| `approval_request` | 需要你审批 |\n| `turn_terminal` | 当前轮次结束 |\n\n## 常见误区\n\n- **流式输出 = 实时性？** 不完全。流式输出只是实时性的表现形式，状态同步和恢复机制同样重要。\n- **final = 完成？** 不一定。要结合终态事件判断，包括失败、取消等。\n- **不动了 = 结束了？** 不一定。可能是等待审批或网络问题，要看状态指示。\n\n## 延伸阅读\n\n- [会话状态说明](/docs/zh-CN/reference/stream-events/) —— 各种状态的详细含义\n- [实时性](/docs/zh-CN/concepts/core-realtime/) —— 实时性的设计原则\n- [稳定性](/docs/zh-CN/concepts/core-stability/) —— 异常时的行为\n","source_path":"使用说明书/zh-CN/concepts/streaming.md"}</script>
