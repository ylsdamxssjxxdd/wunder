  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/streaming","language":"zh-CN","title":"流式执行","summary":"Wunder 的流式不是简单的字符流，而是把线程执行、工具调用和终态一起暴露出来。","updated_at":"2026-03-20","read_when":["你在接 SSE 或 WebSocket","你在给聊天界面设计状态机"],"source_docs":["docs/API文档.md","docs/设计方案.md","src/api/chat.rs","src/api/core.rs"],"tab":"概念","group":"核心概念","group_path":["核心概念"],"url":"/docs/zh-CN/concepts/streaming/","headings":[{"id":"section-1","level":1,"text":"流式执行"},{"id":"section-2","level":2,"text":"本页重点"},{"id":"section-3","level":2,"text":"什么时候看"},{"id":"section-4","level":2,"text":"流式不是只有一种入口"},{"id":"section-5","level":2,"text":"你真正要关心的不是所有事件名"},{"id":"section-6","level":3,"text":"过程事件"},{"id":"section-7","level":3,"text":"状态事件"},{"id":"section-8","level":3,"text":"终态事件"},{"id":"section-9","level":2,"text":"客户端最容易犯的错"},{"id":"section-10","level":3,"text":"只看 final"},{"id":"section-11","level":3,"text":"只看 running"},{"id":"section-12","level":3,"text":"把 SSE 当成完整聊天协议"},{"id":"section-13","level":2,"text":"实施建议"},{"id":"section-14","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/sessions-and-rounds","next_slug":"zh-CN/concepts/presence-and-runtime","markdown":"# 流式执行\n\n在 Wunder 里，流式的重点不是“文字一点点出来”，而是“整个线程状态被连续投影出来”。\n\n## 本页重点\n\n这页只回答三件事：\n\n- 为什么流式链路要同时暴露过程事件和终态事件\n- 为什么聊天优先用 WebSocket，通用执行入口仍保留 SSE\n- 客户端应该用什么信号判断“还在跑”与“已经结束”\n\n## 什么时候看\n\n如果你正在做这些事，就应该先看这页：\n\n- 聊天窗口流式输出\n- 工具调用中间过程展示\n- 断线续传或恢复播放\n- 一轮执行的状态机设计\n\n## 流式不是只有一种入口\n\nWunder 当前有两条主流式路径：\n\n- `/wunder`：统一执行入口，`stream=true` 时返回 SSE\n- `/wunder/chat/ws`：聊天主实时通道，支持 start、resume、watch、cancel、approval\n\n所以正确理解不是“WS 和 SSE 二选一”，而是：\n\n- 聊天场景优先 WS\n- 通用执行和兼容场景走 SSE\n\n## 你真正要关心的不是所有事件名\n\n事件很多，但语义不平权。\n\n### 过程事件\n\n它们用于展示发生了什么：\n\n- `progress`\n- `llm_output_delta`\n- `tool_call`\n- `tool_output_delta`\n- `tool_result`\n\n### 状态事件\n\n它们用于表达线程当前跑到哪：\n\n- `queued`\n- `approval_request`\n- `thread_status`\n\n### 终态事件\n\n它们用于表达是否已经闭环：\n\n- `approval_resolved`\n- `turn_terminal`\n\n## 客户端最容易犯的错\n\n### 只看 `final`\n\n这会漏掉失败、拒绝、取消和等待审批。\n\n### 只看 `running`\n\n这在聊天域里只是兼容字段，不足以表达完整运行态。\n\n### 把 SSE 当成完整聊天协议\n\nSSE 可以看结果，但 WebSocket 才更适合会话控制。\n\n## 实施建议\n\n- 判断一轮是否结束，看 `turn_terminal`。\n- 判断线程当前处于什么状态，看 `thread_status` 或会话 `runtime`。\n- 审批是否彻底闭环，看 `approval_resolved`。\n- 聊天面板默认应优先接 WebSocket，SSE 作为兜底。\n\n## 延伸阅读\n\n- [流式事件参考](/docs/zh-CN/reference/stream-events/)\n- [聊天 WebSocket](/docs/zh-CN/integration/chat-ws/)\n- [wunder API](/docs/zh-CN/integration/wunder-api/)\n","source_path":"静态站文档/zh-CN/concepts/streaming.md"}</script>
