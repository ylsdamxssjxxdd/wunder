  <script id="docs-page-data" type="application/json">{"slug":"zh-CN/concepts/core-tools","language":"zh-CN","title":"工具","summary":"智能体不只会说话，还能做事。工具是智能体执行能力的统一接口——读文件、写代码、搜索网页，都是工具。","updated_at":"2026-04-14","read_when":[],"source_docs":[],"tab":"核心","group":"11个核心","group_path":["11个核心"],"url":"/docs/zh-CN/concepts/core-tools/","headings":[{"id":"section-1","level":1,"text":"工具"},{"id":"section-2","level":2,"text":"原理"},{"id":"section-3","level":2,"text":"工具从哪里来"},{"id":"section-4","level":2,"text":"作用"},{"id":"section-5","level":3,"text":"对你来说"},{"id":"section-6","level":3,"text":"工具设计的原则"},{"id":"section-7","level":2,"text":"实践"},{"id":"section-8","level":3,"text":"工具审批"},{"id":"section-9","level":3,"text":"工具与上下文"},{"id":"section-10","level":3,"text":"工具可见性"},{"id":"section-11","level":2,"text":"技能和工具的关系"},{"id":"section-12","level":2,"text":"常见误区"},{"id":"section-13","level":2,"text":"延伸阅读"}],"prev_slug":"zh-CN/concepts/core-agent-loop","next_slug":"zh-CN/concepts/core-swarm","markdown":"# 工具\n\n## 原理\n\n在 Wunder 里，智能体能做的每一件事都被统一抽象为\"工具\"。不管是读写文件、搜索网页、执行命令还是管理记忆，对智能体来说都是\"调用一个工具\"。\n\n这种设计的好处是：\n- 智能体不需要学习各种不同的调用方式\n- 所有能力有一致的权限和审计控制\n- 你可以统一管理智能体能用哪些工具\n\n## 工具从哪里来\n\nWunder 的工具有多种来源，但最终都进入统一调度：\n\n| 来源 | 说明 | 例子 |\n|------|------|------|\n| **内置工具** | 系统自带的基础能力 | 文件读写、命令执行、网页抓取 |\n| **MCP 工具** | 通过 MCP 协议接入的外部能力 | 数据库操作、第三方 API |\n| **技能** | 封装了完整流程的能力包 | 数据分析方法、报告生成流程 |\n| **知识库** | 提供可检索的参考资料 | 制度文档、技术资料 |\n| **用户工具** | 用户自己扩展的能力 | 自定义脚本、个性化工具 |\n\n## 作用\n\n### 对你来说\n\n- **智能体能真正干活**：不只是聊天，而是能操作文件、运行代码、搜索信息\n- **能力可控**：管理员可以控制哪些工具可用，敏感工具有审批机制\n- **过程可见**：你可以在界面上看到智能体调用了什么工具、得到了什么结果\n\n### 工具设计的原则\n\n好的工具设计有三个关键：\n\n**1. 描述清晰**\n\n工具的说明必须让智能体准确理解\"这个工具是干什么的、什么时候该用\"。描述模糊的工具会导致智能体误用。\n\n**2. 参数结构化**\n\n工具参数像表格一样有明确的字段和类型，智能体只需\"填表\"而不是\"自由发挥\"。这大大降低了调用错误。\n\n**3. 返回精简**\n\n工具返回的结果必须精简明确。动辄几万字的返回不仅浪费上下文，还会干扰智能体的判断。好的工具返回是\"当前最关键的事实 + 下一步需要的信号\"。\n\n## 实践\n\n### 工具审批\n\n当智能体想要执行敏感操作（如修改重要文件、执行命令）时，系统可能会暂停并要求你确认：\n\n- 你会看到操作说明\n- 选择\"批准\"继续或\"拒绝\"阻止\n- 审批结果会被记录\n\n管理员可以调整审批的严格程度。\n\n### 工具与上下文\n\n每个工具调用的结果都会消耗对话的上下文空间。如果一个工具返回了大量内容，系统会自动压缩以保持对话能继续。这就是为什么工具返回要精简——不然上下文会被撑爆。\n\n### 工具可见性\n\n不是所有工具都始终可见。哪些工具可用取决于：\n- 系统配置（管理员启用了哪些）\n- 运行形态（桌面应用可能有更多本地工具）\n- 智能体设置（给智能体配置了哪些工具）\n- 安全限制（某些路径下的操作可能被禁止）\n\n## 技能和工具的关系\n\n技能不是另一种工具，而是\"流程化的经验包\"。一个技能通常包含：\n- 操作说明文档\n- 执行脚本\n- 示例和资源\n\n技能让智能体在面对某类任务时有一套成熟的方法论可以参考，而不是每次都从零开始。\n\n## 常见误区\n\n- **工具越多越好？** 不是。工具太多且描述不清会反而让智能体更容易选错工具。\n- **返回内容越多越好？** 不是。能被智能体高效利用的精简结果才是好结果。\n- **技能只是说明文档？** 不是。在 Wunder 里，技能是智能体可以主动读取和使用的运行资源。\n\n## 延伸阅读\n\n- [工具体系](/docs/zh-CN/concepts/tools/) —— 工具分类和使用指南\n- [工具总览](/docs/zh-CN/tools/) —— 所有内置工具的详细说明\n- [上下文压缩](/docs/zh-CN/concepts/core-context-compression/) —— 工具结果太大时怎么办\n","source_path":"使用说明书/zh-CN/concepts/core-tools.md"}</script>
