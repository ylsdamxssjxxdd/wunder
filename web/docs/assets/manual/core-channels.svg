<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<style>
  .title { font: 700 38px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .eyebrow { font: 700 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; letter-spacing: 1px; }
  .badge { font: 700 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-title { font: 700 24px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .center-title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .center-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .ribbon { font: 700 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .tag { font: 700 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #FFFDF9; letter-spacing: 0.5px; }
  .flow { stroke: #21313A; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
  .flow-soft { stroke: #63707A; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-soft); }
  .dash { stroke-dasharray: 8 8; }
</style>
<defs>
  <linearGradient id='bg-grad' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='#FBF5EE'/>
    <stop offset='100%' stop-color='#F1E7DA'/>
  </linearGradient>
  <filter id='shadow' x='-10%' y='-10%' width='120%' height='120%'>
    <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='#B39C82' flood-opacity='0.16'/>
  </filter>
  <pattern id='grid' width='40' height='40' patternUnits='userSpaceOnUse'>
    <path d='M 40 0 L 0 0 0 40' fill='none' stroke='#E8DCCD' stroke-width='1'/>
  </pattern>
  <marker id='arrow' markerWidth='11' markerHeight='11' refX='8.5' refY='5.5' orient='auto'>
    <path d='M0,0 L11,5.5 L0,11 z' fill='#21313A'/>
  </marker>
  <marker id='arrow-soft' markerWidth='10' markerHeight='10' refX='8' refY='5' orient='auto'>
    <path d='M0,0 L10,5 L0,10 z' fill='#63707A'/>
  </marker>
</defs>
<rect x='0' y='0' width='1200' height='720' fill='url(#bg-grad)'/><rect x='0' y='0' width='1200' height='720' fill='url(#grid)' opacity='0.45'/><ellipse cx='150' cy='90' rx='200' ry='110' fill='#FFF7E8' opacity='0.8'/><ellipse cx='1050' cy='620' rx='240' ry='140' fill='#F7EEE3' opacity='0.7'/><ellipse cx='980' cy='120' rx='190' ry='90' fill='#E8F4F0' opacity='0.45'/><rect x='60' y='42' width='160' height='34' rx='17' ry='17' fill='#F2E6D7'/><text x='140.0' y='63.0' class='eyebrow' text-anchor='middle' fill='#21313A'>核心 06 · 接入与治理</text><text x='60' y='122' class='title' text-anchor='start'><tspan x='60' dy='0'>渠道可以很多，但运行内核只能有一套</tspan></text><text x='60' y='166' class='subtitle' text-anchor='start'><tspan x='60' dy='0'>HTTP、WebSocket、Desktop、CLI、第三方渠道只是入口形态不同。它们可以适配协议，但不能改写线程、工具和治理</tspan><tspan x='60' dy='28'>语义。</tspan></text><rect x='970' y='48' width='170' height='30' rx='15' ry='15' fill='#23313B'/><text x='1055.0' y='67.0' class='tag' text-anchor='middle' fill='#FFFDF9'>WUNDER CORE MAP</text><g filter='url(#shadow)'><rect x='60' y='214' width='210' height='122' rx='28' ry='28' fill='#FFF5E7' stroke='#E4C391' stroke-width='2.2'/><rect x='60' y='214' width='210' height='16' rx='28' ry='28' fill='#D68A2B' opacity='0.92'/><rect x='78' y='238' width='174' height='80' rx='22' ry='22' fill='#FDF1DD' opacity='0.58'/></g><rect x='170' y='238' width='78' height='28' rx='14' ry='14' fill='#D68A2B'/><text x='209.0' y='256.0' class='tag' text-anchor='middle' fill='#FFFDF9'>入口</text><text x='84' y='266' class='card-title' text-anchor='start'><tspan x='84' dy='0'>HTTP</tspan></text><circle cx='94' cy='294' r='4.5' fill='#D68A2B'/><text x='108' y='300' class='card-body' text-anchor='start'><tspan x='108' dy='0'>通用执行入口。</tspan></text><g filter='url(#shadow)'><rect x='60' y='356' width='210' height='122' rx='28' ry='28' fill='#EDF8F4' stroke='#9BCDBD' stroke-width='2.2'/><rect x='60' y='356' width='210' height='16' rx='28' ry='28' fill='#2F8B73' opacity='0.92'/><rect x='78' y='380' width='174' height='80' rx='22' ry='22' fill='#E7F6F1' opacity='0.58'/></g><rect x='170' y='380' width='78' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='209.0' y='398.0' class='tag' text-anchor='middle' fill='#FFFDF9'>入口</text><text x='84' y='408' class='card-title' text-anchor='start'><tspan x='84' dy='0'>WebSocket</tspan></text><circle cx='94' cy='436' r='4.5' fill='#2F8B73'/><text x='108' y='442' class='card-body' text-anchor='start'><tspan x='108' dy='0'>实时会话入口。</tspan></text><g filter='url(#shadow)'><rect x='60' y='498' width='210' height='122' rx='28' ry='28' fill='#EEF6FD' stroke='#A9C5E0' stroke-width='2.2'/><rect x='60' y='498' width='210' height='16' rx='28' ry='28' fill='#3D78B0' opacity='0.92'/><rect x='78' y='522' width='174' height='80' rx='22' ry='22' fill='#EAF3FB' opacity='0.58'/></g><rect x='170' y='522' width='78' height='28' rx='14' ry='14' fill='#3D78B0'/><text x='209.0' y='540.0' class='tag' text-anchor='middle' fill='#FFFDF9'>入口</text><text x='84' y='550' class='card-title' text-anchor='start'><tspan x='84' dy='0'>桌面与命令行</tspan></text><text x='84' y='584' class='card-body' text-anchor='start'><tspan x='84' dy='0'>本地工作台与终端。</tspan></text><g filter='url(#shadow)'><rect x='298' y='278' width='236' height='240' rx='28' ry='28' fill='#EEF1F4' stroke='#B8C4CE' stroke-width='2.2'/><rect x='298' y='278' width='236' height='16' rx='28' ry='28' fill='#4C6477' opacity='0.92'/><rect x='316' y='302' width='200' height='198' rx='22' ry='22' fill='#F2F5F7' opacity='0.58'/></g><rect x='434' y='302' width='78' height='28' rx='14' ry='14' fill='#4C6477'/><text x='473.0' y='320.0' class='tag' text-anchor='middle' fill='#FFFDF9'>适配</text><text x='322' y='336' class='card-title' text-anchor='start'><tspan x='322' dy='0'>协议适配层</tspan></text><circle cx='332' cy='374' r='4.5' fill='#4C6477'/><text x='346' y='380' class='card-body' text-anchor='start'><tspan x='346' dy='0'>把外部协议翻成统一请</tspan><tspan x='346' dy='24'>求。</tspan></text><circle cx='332' cy='432' r='4.5' fill='#4C6477'/><text x='346' y='438' class='card-body' text-anchor='start'><tspan x='346' dy='0'>处理身份、连接、附件</tspan><tspan x='346' dy='24'>与会话包装。</tspan></text><circle cx='764' cy='372' r='132' fill='#FDF1DD' opacity='0.72'/><circle cx='764' cy='372' r='118' fill='#FFFDF9' stroke='#E4C391' stroke-width='3'/><circle cx='764' cy='372' r='94' fill='#FFF0D9' stroke='#D68A2B' stroke-width='2.5'/><text x='764' y='364' class='center-title' text-anchor='middle'><tspan x='764' dy='0'>统一运行内核</tspan></text><text x='764' y='412' class='center-body' text-anchor='middle'><tspan x='764' dy='0'>线程</tspan><tspan x='764' dy='24'>工具</tspan><tspan x='764' dy='24'>事件</tspan><tspan x='764' dy='24'>治理</tspan></text><g filter='url(#shadow)'><rect x='948' y='250' width='188' height='244' rx='28' ry='28' fill='#FDF0EA' stroke='#E7B4A0' stroke-width='2.2'/><rect x='948' y='250' width='188' height='16' rx='28' ry='28' fill='#C96D4C' opacity='0.92'/><rect x='966' y='274' width='152' height='202' rx='22' ry='22' fill='#FBEAE2' opacity='0.58'/></g><rect x='1036' y='274' width='78' height='28' rx='14' ry='14' fill='#C96D4C'/><text x='1075.0' y='292.0' class='tag' text-anchor='middle' fill='#FFFDF9'>扩展</text><text x='972' y='308' class='card-title' text-anchor='start'><tspan x='972' dy='0'>第三方渠道</tspan></text><circle cx='982' cy='346' r='4.5' fill='#C96D4C'/><text x='996' y='352' class='card-body' text-anchor='start'><tspan x='996' dy='0'>Webhook。</tspan></text><circle cx='982' cy='380' r='4.5' fill='#C96D4C'/><text x='996' y='386' class='card-body' text-anchor='start'><tspan x='996' dy='0'>长连接。</tspan></text><circle cx='982' cy='414' r='4.5' fill='#C96D4C'/><text x='996' y='420' class='card-body' text-anchor='start'><tspan x='996' dy='0'>企业协同平台。</tspan></text><path class='flow' d='M270,276 L298,332'/><path class='flow' d='M270,418 L298,398'/><path class='flow' d='M270,560 L298,462'/><path class='flow' d='M534,398 L646,382'/><path class='flow' d='M876,372 L948,372'/><rect x='60' y='634' width='1080' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='78' y='646' width='96' height='30' rx='15' ry='15' fill='#21313B'/><text x='126.0' y='665.0' class='tag' text-anchor='middle' fill='#FFFDF9'>核心结论</text><text x='194' y='670' class='ribbon' text-anchor='start'><tspan x='194' dy='0'>渠道层只负责接入差异，不能偷偷长出另一套运行逻辑。入口越多，越要守住同一内核。</tspan></text></svg>
