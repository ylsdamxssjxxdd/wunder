<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<style>
  .title { font: 700 38px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .eyebrow { font: 700 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; letter-spacing: 1px; }
  .badge { font: 700 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-title { font: 700 24px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .center-title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .center-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .ribbon { font: 700 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .tag { font: 700 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #FFFDF9; letter-spacing: 0.5px; }
  .flow { stroke: #21313A; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
  .flow-soft { stroke: #63707A; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-soft); }
  .dash { stroke-dasharray: 8 8; }
</style>
<defs>
  <linearGradient id='bg-grad' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='#FBF5EE'/>
    <stop offset='100%' stop-color='#F1E7DA'/>
  </linearGradient>
  <filter id='shadow' x='-10%' y='-10%' width='120%' height='120%'>
    <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='#B39C82' flood-opacity='0.16'/>
  </filter>
  <pattern id='grid' width='40' height='40' patternUnits='userSpaceOnUse'>
    <path d='M 40 0 L 0 0 0 40' fill='none' stroke='#E8DCCD' stroke-width='1'/>
  </pattern>
  <marker id='arrow' markerWidth='11' markerHeight='11' refX='8.5' refY='5.5' orient='auto'>
    <path d='M0,0 L11,5.5 L0,11 z' fill='#21313A'/>
  </marker>
  <marker id='arrow-soft' markerWidth='10' markerHeight='10' refX='8' refY='5' orient='auto'>
    <path d='M0,0 L10,5 L0,10 z' fill='#63707A'/>
  </marker>
</defs>
<rect x='0' y='0' width='1200' height='720' fill='url(#bg-grad)'/><rect x='0' y='0' width='1200' height='720' fill='url(#grid)' opacity='0.45'/><ellipse cx='150' cy='90' rx='200' ry='110' fill='#FFF7E8' opacity='0.8'/><ellipse cx='1050' cy='620' rx='240' ry='140' fill='#F7EEE3' opacity='0.7'/><ellipse cx='980' cy='120' rx='190' ry='90' fill='#E8F4F0' opacity='0.45'/><rect x='60' y='42' width='160' height='34' rx='17' ry='17' fill='#F2E6D7'/><text x='140.0' y='63.0' class='eyebrow' text-anchor='middle' fill='#21313A'>核心 00 · 总览</text><text x='60' y='122' class='title' text-anchor='start'><tspan x='60' dy='0'>Wunder 的 11 个核心不是功能清单，而是一套统一运</tspan><tspan x='60' dy='44'>行结构</tspan></text><text x='60' y='210' class='subtitle' text-anchor='start'><tspan x='60' dy='0'>先看三层骨架，再进入细页。执行内核决定系统能不能跑，接入治理决定能不能扩，交付保障决定能不能长期用。</tspan></text><rect x='970' y='48' width='170' height='30' rx='15' ry='15' fill='#23313B'/><text x='1055.0' y='67.0' class='tag' text-anchor='middle' fill='#FFFDF9'>WUNDER CORE MAP</text><rect x='60' y='214' width='1080' height='72' rx='26' ry='26' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='82' y='234' width='128' height='30' rx='15' ry='15' fill='#23313B'/><text x='146.0' y='253.0' class='tag' text-anchor='middle' fill='#FFFDF9'>阅读顺序</text><text x='232' y='259' class='ribbon' text-anchor='start'><tspan x='232' dy='0'>先建立执行内核，再处理入口与治理，最后补齐实时、稳定与可观测能力。</tspan></text><g filter='url(#shadow)'><rect x='60' y='314' width='320' height='286' rx='28' ry='28' fill='#FFF5E7' stroke='#E4C391' stroke-width='2.2'/><rect x='60' y='314' width='320' height='16' rx='28' ry='28' fill='#D68A2B' opacity='0.92'/><rect x='78' y='338' width='284' height='244' rx='22' ry='22' fill='#FDF1DD' opacity='0.58'/></g><rect x='260' y='338' width='98' height='28' rx='14' ry='14' fill='#D68A2B'/><text x='309.0' y='356.0' class='tag' text-anchor='middle' fill='#FFFDF9'>01-05</text><text x='84' y='372' class='card-title' text-anchor='start'><tspan x='84' dy='0'>执行内核</tspan></text><circle cx='94' cy='410' r='4.5' fill='#D68A2B'/><text x='108' y='416' class='card-body' text-anchor='start'><tspan x='108' dy='0'>智能体循环是主链路。</tspan></text><circle cx='94' cy='444' r='4.5' fill='#D68A2B'/><text x='108' y='450' class='card-body' text-anchor='start'><tspan x='108' dy='0'>工具把能力变成可调度对象。</tspan></text><circle cx='94' cy='478' r='4.5' fill='#D68A2B'/><text x='108' y='484' class='card-body' text-anchor='start'><tspan x='108' dy='0'>蜂群、压缩、记忆都围绕线程一致</tspan><tspan x='108' dy='24'>性服务。</tspan></text><rect x='86' y='500' width='88' height='30' rx='15' ry='15' fill='#FFF0D9'/><text x='130.0' y='519.0' class='badge' text-anchor='middle' fill='#21313A'>智能体循环</text><rect x='186' y='500' width='86' height='30' rx='15' ry='15' fill='#FFF0D9'/><text x='229.0' y='519.0' class='badge' text-anchor='middle' fill='#21313A'>工具</text><rect x='284' y='500' width='86' height='30' rx='15' ry='15' fill='#FFF0D9'/><text x='327.0' y='519.0' class='badge' text-anchor='middle' fill='#21313A'>蜂群</text><rect x='86' y='542' width='88' height='30' rx='15' ry='15' fill='#FFF0D9'/><text x='130.0' y='561.0' class='badge' text-anchor='middle' fill='#21313A'>上下文压缩</text><rect x='186' y='542' width='86' height='30' rx='15' ry='15' fill='#FFF0D9'/><text x='229.0' y='561.0' class='badge' text-anchor='middle' fill='#21313A'>记忆</text><g filter='url(#shadow)'><rect x='440' y='314' width='320' height='286' rx='28' ry='28' fill='#EDF8F4' stroke='#9BCDBD' stroke-width='2.2'/><rect x='440' y='314' width='320' height='16' rx='28' ry='28' fill='#2F8B73' opacity='0.92'/><rect x='458' y='338' width='284' height='244' rx='22' ry='22' fill='#E7F6F1' opacity='0.58'/></g><rect x='640' y='338' width='98' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='689.0' y='356.0' class='tag' text-anchor='middle' fill='#FFFDF9'>06-08</text><text x='464' y='372' class='card-title' text-anchor='start'><tspan x='464' dy='0'>接入与治理</tspan></text><circle cx='474' cy='410' r='4.5' fill='#2F8B73'/><text x='488' y='416' class='card-body' text-anchor='start'><tspan x='488' dy='0'>渠道只做协议适配。</tspan></text><circle cx='474' cy='444' r='4.5' fill='#2F8B73'/><text x='488' y='450' class='card-body' text-anchor='start'><tspan x='488' dy='0'>定时任务把时间纳入能力边界。</tspan></text><circle cx='474' cy='478' r='4.5' fill='#2F8B73'/><text x='488' y='484' class='card-body' text-anchor='start'><tspan x='488' dy='0'>多用户管理把身份、权限与隔离前</tspan><tspan x='488' dy='24'>置。</tspan></text><rect x='466' y='502' width='86' height='30' rx='15' ry='15' fill='#DFF1EA'/><text x='509.0' y='521.0' class='badge' text-anchor='middle' fill='#21313A'>渠道</text><rect x='564' y='502' width='86' height='30' rx='15' ry='15' fill='#DFF1EA'/><text x='607.0' y='521.0' class='badge' text-anchor='middle' fill='#21313A'>定时任务</text><rect x='466' y='544' width='88' height='30' rx='15' ry='15' fill='#DFF1EA'/><text x='510.0' y='563.0' class='badge' text-anchor='middle' fill='#21313A'>多用户管理</text><g filter='url(#shadow)'><rect x='820' y='314' width='320' height='286' rx='28' ry='28' fill='#FDF0EA' stroke='#E7B4A0' stroke-width='2.2'/><rect x='820' y='314' width='320' height='16' rx='28' ry='28' fill='#C96D4C' opacity='0.92'/><rect x='838' y='338' width='284' height='244' rx='22' ry='22' fill='#FBEAE2' opacity='0.58'/></g><rect x='1020' y='338' width='98' height='28' rx='14' ry='14' fill='#C96D4C'/><text x='1069.0' y='356.0' class='tag' text-anchor='middle' fill='#FFFDF9'>09-11</text><text x='844' y='372' class='card-title' text-anchor='start'><tspan x='844' dy='0'>交付保障</tspan></text><circle cx='854' cy='410' r='4.5' fill='#C96D4C'/><text x='868' y='416' class='card-body' text-anchor='start'><tspan x='868' dy='0'>实时性负责持续可见。</tspan></text><circle cx='854' cy='444' r='4.5' fill='#C96D4C'/><text x='868' y='450' class='card-body' text-anchor='start'><tspan x='868' dy='0'>稳定性负责风险不扩散。</tspan></text><circle cx='854' cy='478' r='4.5' fill='#C96D4C'/><text x='868' y='484' class='card-body' text-anchor='start'><tspan x='868' dy='0'>可观测性负责事实、回放与画像统</tspan><tspan x='868' dy='24'>一。</tspan></text><rect x='846' y='502' width='86' height='30' rx='15' ry='15' fill='#F9E0D5'/><text x='889.0' y='521.0' class='badge' text-anchor='middle' fill='#21313A'>实时性</text><rect x='944' y='502' width='86' height='30' rx='15' ry='15' fill='#F9E0D5'/><text x='987.0' y='521.0' class='badge' text-anchor='middle' fill='#21313A'>稳定性</text><rect x='846' y='544' width='86' height='30' rx='15' ry='15' fill='#F9E0D5'/><text x='889.0' y='563.0' class='badge' text-anchor='middle' fill='#21313A'>可观测性</text><path class='flow' d='M380,456 L440,456'/><path class='flow' d='M760,456 L820,456'/><rect x='60' y='634' width='1080' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='78' y='646' width='96' height='30' rx='15' ry='15' fill='#21313B'/><text x='126.0' y='665.0' class='tag' text-anchor='middle' fill='#FFFDF9'>核心结论</text><text x='194' y='670' class='ribbon' text-anchor='start'><tspan x='194' dy='0'>核心不是堆出 11 个名词，而是让所有能力都服从同一运行真相、同一治理边界和同一交付标准。</tspan></text></svg>
