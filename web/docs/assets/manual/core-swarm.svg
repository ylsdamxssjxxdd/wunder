<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<style>
  .title { font: 700 38px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .eyebrow { font: 700 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; letter-spacing: 1px; }
  .badge { font: 700 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-title { font: 700 24px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .center-title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .center-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .ribbon { font: 700 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .tag { font: 700 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #FFFDF9; letter-spacing: 0.5px; }
  .flow { stroke: #21313A; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
  .flow-soft { stroke: #63707A; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-soft); }
  .dash { stroke-dasharray: 8 8; }
</style>
<defs>
  <linearGradient id='bg-grad' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='#FBF5EE'/>
    <stop offset='100%' stop-color='#F1E7DA'/>
  </linearGradient>
  <filter id='shadow' x='-10%' y='-10%' width='120%' height='120%'>
    <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='#B39C82' flood-opacity='0.16'/>
  </filter>
  <pattern id='grid' width='40' height='40' patternUnits='userSpaceOnUse'>
    <path d='M 40 0 L 0 0 0 40' fill='none' stroke='#E8DCCD' stroke-width='1'/>
  </pattern>
  <marker id='arrow' markerWidth='11' markerHeight='11' refX='8.5' refY='5.5' orient='auto'>
    <path d='M0,0 L11,5.5 L0,11 z' fill='#21313A'/>
  </marker>
  <marker id='arrow-soft' markerWidth='10' markerHeight='10' refX='8' refY='5' orient='auto'>
    <path d='M0,0 L10,5 L0,10 z' fill='#63707A'/>
  </marker>
</defs>
<rect x='0' y='0' width='1200' height='720' fill='url(#bg-grad)'/><rect x='0' y='0' width='1200' height='720' fill='url(#grid)' opacity='0.45'/><ellipse cx='150' cy='90' rx='200' ry='110' fill='#FFF7E8' opacity='0.8'/><ellipse cx='1050' cy='620' rx='240' ry='140' fill='#F7EEE3' opacity='0.7'/><ellipse cx='980' cy='120' rx='190' ry='90' fill='#E8F4F0' opacity='0.45'/><rect x='60' y='42' width='160' height='34' rx='17' ry='17' fill='#F2E6D7'/><text x='140.0' y='63.0' class='eyebrow' text-anchor='middle' fill='#21313A'>核心 03 · 执行内核</text><text x='60' y='122' class='title' text-anchor='start'><tspan x='60' dy='0'>蜂群不是“多开几个模型”，而是正式的协作语义</tspan></text><text x='60' y='166' class='subtitle' text-anchor='start'><tspan x='60' dy='0'>母蜂负责拆解与归并，工蜂必须以新线程执行。关键不在并行本身，而在边界是否清楚、结果是否可回收。</tspan></text><rect x='970' y='48' width='170' height='30' rx='15' ry='15' fill='#23313B'/><text x='1055.0' y='67.0' class='tag' text-anchor='middle' fill='#FFFDF9'>WUNDER CORE MAP</text><g filter='url(#shadow)'><rect x='430' y='154' width='340' height='150' rx='28' ry='28' fill='#FFF5E7' stroke='#E4C391' stroke-width='2.2'/><rect x='430' y='154' width='340' height='16' rx='28' ry='28' fill='#D68A2B' opacity='0.92'/><rect x='448' y='178' width='304' height='108' rx='22' ry='22' fill='#FDF1DD' opacity='0.58'/></g><rect x='670' y='178' width='78' height='28' rx='14' ry='14' fill='#D68A2B'/><text x='709.0' y='196.0' class='tag' text-anchor='middle' fill='#FFFDF9'>主控</text><text x='454' y='206' class='card-title' text-anchor='start'><tspan x='454' dy='0'>母蜂主线程</tspan></text><text x='454' y='240' class='card-body' text-anchor='start'><tspan x='454' dy='0'>拆任务、派工、汇总结论，所有协作最终重</tspan><tspan x='454' dy='22'>新回到母蜂主链路。</tspan></text><rect x='90' y='310' width='1020' height='222' rx='34' ry='34' fill='#FFFDF9' stroke='#E8DCCD' stroke-width='2'/><text x='118' y='350' class='subtitle' text-anchor='start'><tspan x='118' dy='0'>蜂群运行面</tspan></text><g filter='url(#shadow)'><rect x='126' y='372' width='250' height='132' rx='28' ry='28' fill='#EDF8F4' stroke='#9BCDBD' stroke-width='2.2'/><rect x='126' y='372' width='250' height='16' rx='28' ry='28' fill='#2F8B73' opacity='0.92'/><rect x='144' y='396' width='214' height='90' rx='22' ry='22' fill='#E7F6F1' opacity='0.58'/></g><rect x='276' y='396' width='78' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='315.0' y='414.0' class='tag' text-anchor='middle' fill='#FFFDF9'>新线程</text><text x='150' y='424' class='card-title' text-anchor='start'><tspan x='150' dy='0'>工蜂 A</tspan></text><circle cx='160' cy='452' r='4.5' fill='#2F8B73'/><text x='174' y='458' class='card-body' text-anchor='start'><tspan x='174' dy='0'>新建线程执行。</tspan></text><circle cx='160' cy='482' r='4.5' fill='#2F8B73'/><text x='174' y='488' class='card-body' text-anchor='start'><tspan x='174' dy='0'>持续回报进度与结论。</tspan></text><g filter='url(#shadow)'><rect x='474' y='372' width='250' height='132' rx='28' ry='28' fill='#EEF6FD' stroke='#A9C5E0' stroke-width='2.2'/><rect x='474' y='372' width='250' height='16' rx='28' ry='28' fill='#3D78B0' opacity='0.92'/><rect x='492' y='396' width='214' height='90' rx='22' ry='22' fill='#EAF3FB' opacity='0.58'/></g><rect x='624' y='396' width='78' height='28' rx='14' ry='14' fill='#3D78B0'/><text x='663.0' y='414.0' class='tag' text-anchor='middle' fill='#FFFDF9'>新线程</text><text x='498' y='424' class='card-title' text-anchor='start'><tspan x='498' dy='0'>工蜂 B</tspan></text><circle cx='508' cy='452' r='4.5' fill='#3D78B0'/><text x='522' y='458' class='card-body' text-anchor='start'><tspan x='522' dy='0'>必要时再拆子任务。</tspan></text><circle cx='508' cy='482' r='4.5' fill='#3D78B0'/><text x='522' y='488' class='card-body' text-anchor='start'><tspan x='522' dy='0'>但它的上下文必须独立。</tspan></text><g filter='url(#shadow)'><rect x='822' y='372' width='250' height='132' rx='28' ry='28' fill='#FDF0EA' stroke='#E7B4A0' stroke-width='2.2'/><rect x='822' y='372' width='250' height='16' rx='28' ry='28' fill='#C96D4C' opacity='0.92'/><rect x='840' y='396' width='214' height='90' rx='22' ry='22' fill='#FBEAE2' opacity='0.58'/></g><rect x='972' y='396' width='78' height='28' rx='14' ry='14' fill='#C96D4C'/><text x='1011.0' y='414.0' class='tag' text-anchor='middle' fill='#FFFDF9'>新线程</text><text x='846' y='424' class='card-title' text-anchor='start'><tspan x='846' dy='0'>工蜂 C</tspan></text><circle cx='856' cy='452' r='4.5' fill='#C96D4C'/><text x='870' y='458' class='card-body' text-anchor='start'><tspan x='870' dy='0'>返回结果，也要返回失败</tspan><tspan x='870' dy='22'>原因。</tspan></text><rect x='266' y='550' width='668' height='50' rx='20' ry='20' fill='#23313B' opacity='0.96'/><text x='600' y='582' class='tag' text-anchor='middle'><tspan x='600' dy='0'>结果归并层：协作可以并行发生，但结论必须重新收束到母蜂线程。</tspan></text><path class='flow' d='M526,298 C470,330 360,356 250,372'/><path class='flow' d='M600,298 C600,328 600,348 600,372'/><path class='flow' d='M674,298 C734,330 846,356 948,372'/><path class='flow-soft' d='M250,504 C314,528 402,544 466,552'/><path class='flow-soft' d='M600,504 C600,526 600,538 600,552'/><path class='flow-soft' d='M948,504 C880,528 798,544 734,552'/><rect x='60' y='634' width='1080' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='78' y='646' width='96' height='30' rx='15' ry='15' fill='#21313B'/><text x='126.0' y='665.0' class='tag' text-anchor='middle' fill='#FFFDF9'>核心结论</text><text x='194' y='670' class='ribbon' text-anchor='start'><tspan x='194' dy='0'>蜂群的核心不是更多智能体，而是把拆解、隔离、回报、归并这四件事做成正式结构。</tspan></text></svg>
