<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<style>
  .title { font: 700 38px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .eyebrow { font: 700 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; letter-spacing: 1px; }
  .badge { font: 700 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-title { font: 700 24px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .center-title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .center-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .ribbon { font: 700 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .tag { font: 700 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #FFFDF9; letter-spacing: 0.5px; }
  .flow { stroke: #21313A; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
  .flow-soft { stroke: #63707A; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-soft); }
  .dash { stroke-dasharray: 8 8; }
</style>
<defs>
  <linearGradient id='bg-grad' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='#FBF5EE'/>
    <stop offset='100%' stop-color='#F1E7DA'/>
  </linearGradient>
  <filter id='shadow' x='-10%' y='-10%' width='120%' height='120%'>
    <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='#B39C82' flood-opacity='0.16'/>
  </filter>
  <pattern id='grid' width='40' height='40' patternUnits='userSpaceOnUse'>
    <path d='M 40 0 L 0 0 0 40' fill='none' stroke='#E8DCCD' stroke-width='1'/>
  </pattern>
  <marker id='arrow' markerWidth='11' markerHeight='11' refX='8.5' refY='5.5' orient='auto'>
    <path d='M0,0 L11,5.5 L0,11 z' fill='#21313A'/>
  </marker>
  <marker id='arrow-soft' markerWidth='10' markerHeight='10' refX='8' refY='5' orient='auto'>
    <path d='M0,0 L10,5 L0,10 z' fill='#63707A'/>
  </marker>
</defs>
<rect x='0' y='0' width='1200' height='720' fill='url(#bg-grad)'/><rect x='0' y='0' width='1200' height='720' fill='url(#grid)' opacity='0.45'/><ellipse cx='150' cy='90' rx='200' ry='110' fill='#FFF7E8' opacity='0.8'/><ellipse cx='1050' cy='620' rx='240' ry='140' fill='#F7EEE3' opacity='0.7'/><ellipse cx='980' cy='120' rx='190' ry='90' fill='#E8F4F0' opacity='0.45'/><rect x='60' y='42' width='174' height='34' rx='17' ry='17' fill='#F2E6D7'/><text x='147.0' y='63.0' class='eyebrow' text-anchor='middle' fill='#21313A'>核心 08 · 接入与治理</text><text x='60' y='122' class='title' text-anchor='start'><tspan x='60' dy='0'>多用户管理不是后台附属功能，而是运行边界本身</tspan></text><text x='60' y='166' class='subtitle' text-anchor='start'><tspan x='60' dy='0'>组织、单位、用户、权限、配额与工作区隔离必须前置，否则系统一扩容就会把线程、工具和数据边界全部冲散。</tspan></text><rect x='970' y='48' width='170' height='30' rx='15' ry='15' fill='#23313B'/><text x='1055.0' y='67.0' class='tag' text-anchor='middle' fill='#FFFDF9'>WUNDER CORE MAP</text><g filter='url(#shadow)'><rect x='82' y='228' width='222' height='260' rx='28' ry='28' fill='#FFF5E7' stroke='#E4C391' stroke-width='2.2'/><rect x='82' y='228' width='222' height='16' rx='28' ry='28' fill='#D68A2B' opacity='0.92'/><rect x='100' y='252' width='186' height='218' rx='22' ry='22' fill='#FDF1DD' opacity='0.58'/></g><rect x='204' y='252' width='78' height='28' rx='14' ry='14' fill='#D68A2B'/><text x='243.0' y='270.0' class='tag' text-anchor='middle' fill='#FFFDF9'>身份</text><text x='106' y='286' class='card-title' text-anchor='start' style='font-size:24px'><tspan x='106' dy='0'>身份层</tspan></text><circle cx='116' cy='322' r='4.5' fill='#D68A2B'/><text x='130' y='328' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='130' dy='0'>组织、单位、用户分</tspan><tspan x='130' dy='23'>层。</tspan></text><circle cx='116' cy='378' r='4.5' fill='#D68A2B'/><text x='130' y='384' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='130' dy='0'>登录用户与虚拟 use</tspan><tspan x='130' dy='23'>r_id 要区分。</tspan></text><g filter='url(#shadow)'><rect x='346' y='206' width='242' height='304' rx='28' ry='28' fill='#EDF8F4' stroke='#9BCDBD' stroke-width='2.2'/><rect x='346' y='206' width='242' height='16' rx='28' ry='28' fill='#2F8B73' opacity='0.92'/><rect x='364' y='230' width='206' height='262' rx='22' ry='22' fill='#E7F6F1' opacity='0.58'/></g><rect x='488' y='230' width='78' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='527.0' y='248.0' class='tag' text-anchor='middle' fill='#FFFDF9'>规则</text><text x='370' y='264' class='card-title' text-anchor='start' style='font-size:24px'><tspan x='370' dy='0'>治理层</tspan></text><circle cx='380' cy='300' r='4.5' fill='#2F8B73'/><text x='394' y='306' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='394' dy='0'>权限控制决定能不能做</tspan><tspan x='394' dy='23'>。</tspan></text><circle cx='380' cy='356' r='4.5' fill='#2F8B73'/><text x='394' y='362' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='394' dy='0'>资源配额决定能做多少</tspan><tspan x='394' dy='23'>。</tspan></text><circle cx='380' cy='412' r='4.5' fill='#2F8B73'/><text x='394' y='418' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='394' dy='0'>管理员面板决定如何集</tspan><tspan x='394' dy='23'>中治理。</tspan></text><g filter='url(#shadow)'><rect x='630' y='206' width='248' height='304' rx='28' ry='28' fill='#EEF6FD' stroke='#A9C5E0' stroke-width='2.2'/><rect x='630' y='206' width='248' height='16' rx='28' ry='28' fill='#3D78B0' opacity='0.92'/><rect x='648' y='230' width='212' height='262' rx='22' ry='22' fill='#EAF3FB' opacity='0.58'/></g><rect x='778' y='230' width='78' height='28' rx='14' ry='14' fill='#3D78B0'/><text x='817.0' y='248.0' class='tag' text-anchor='middle' fill='#FFFDF9'>隔离</text><text x='654' y='264' class='card-title' text-anchor='start' style='font-size:24px'><tspan x='654' dy='0'>隔离层</tspan></text><circle cx='664' cy='300' r='4.5' fill='#3D78B0'/><text x='678' y='306' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='678' dy='0'>工作区边界。</tspan></text><circle cx='664' cy='333' r='4.5' fill='#3D78B0'/><text x='678' y='339' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='678' dy='0'>线程归属。</tspan></text><circle cx='664' cy='366' r='4.5' fill='#3D78B0'/><text x='678' y='372' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='678' dy='0'>工具可见性与资源访问范</tspan><tspan x='678' dy='23'>围。</tspan></text><g filter='url(#shadow)'><rect x='920' y='228' width='222' height='260' rx='28' ry='28' fill='#FDF0EA' stroke='#E7B4A0' stroke-width='2.2'/><rect x='920' y='228' width='222' height='16' rx='28' ry='28' fill='#C96D4C' opacity='0.92'/><rect x='938' y='252' width='186' height='218' rx='22' ry='22' fill='#FBEAE2' opacity='0.58'/></g><rect x='1042' y='252' width='78' height='28' rx='14' ry='14' fill='#C96D4C'/><text x='1081.0' y='270.0' class='tag' text-anchor='middle' fill='#FFFDF9'>结果</text><text x='944' y='286' class='card-title' text-anchor='start' style='font-size:24px'><tspan x='944' dy='0'>并发运行</tspan><tspan x='944' dy='28'>结果</tspan></text><circle cx='954' cy='350' r='4.5' fill='#C96D4C'/><text x='968' y='356' class='card-body' text-anchor='start' style='font-size:15px'><tspan x='968' dy='0'>多用户并发访问仍保持</tspan><tspan x='968' dy='21'>清晰边界。</tspan></text><circle cx='954' cy='402' r='4.5' fill='#C96D4C'/><text x='968' y='408' class='card-body' text-anchor='start' style='font-size:15px'><tspan x='968' dy='0'>能力可开放，也可按租</tspan><tspan x='968' dy='21'>户收口。</tspan></text><path class='flow' d='M304,358 L346,358'/><path class='flow' d='M588,358 L630,358'/><path class='flow' d='M878,358 L920,358'/><rect x='346' y='540' width='532' height='52' rx='20' ry='20' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2'/><text x='612' y='572' class='ribbon' text-anchor='middle'><tspan x='612' dy='0'>边界前置比事后补权限更重要。</tspan></text><rect x='60' y='634' width='1080' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='78' y='646' width='96' height='30' rx='15' ry='15' fill='#21313B'/><text x='126.0' y='665.0' class='tag' text-anchor='middle' fill='#FFFDF9'>核心结论</text><text x='194' y='670' class='ribbon' text-anchor='start'><tspan x='194' dy='0'>多用户系统真正难的不是多几张表，而是让身份、治理和隔离在运行前就已经决定资源边界。</tspan></text></svg>
