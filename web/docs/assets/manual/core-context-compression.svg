<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<style>
  .title { font: 700 38px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .eyebrow { font: 700 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; letter-spacing: 1px; }
  .badge { font: 700 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-title { font: 700 24px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .center-title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .center-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .ribbon { font: 700 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .tag { font: 700 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #FFFDF9; letter-spacing: 0.5px; }
  .flow { stroke: #21313A; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
  .flow-soft { stroke: #63707A; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-soft); }
  .dash { stroke-dasharray: 8 8; }
</style>
<defs>
  <linearGradient id='bg-grad' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='#FBF5EE'/>
    <stop offset='100%' stop-color='#F1E7DA'/>
  </linearGradient>
  <filter id='shadow' x='-10%' y='-10%' width='120%' height='120%'>
    <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='#B39C82' flood-opacity='0.16'/>
  </filter>
  <pattern id='grid' width='40' height='40' patternUnits='userSpaceOnUse'>
    <path d='M 40 0 L 0 0 0 40' fill='none' stroke='#E8DCCD' stroke-width='1'/>
  </pattern>
  <marker id='arrow' markerWidth='11' markerHeight='11' refX='8.5' refY='5.5' orient='auto'>
    <path d='M0,0 L11,5.5 L0,11 z' fill='#21313A'/>
  </marker>
  <marker id='arrow-soft' markerWidth='10' markerHeight='10' refX='8' refY='5' orient='auto'>
    <path d='M0,0 L10,5 L0,10 z' fill='#63707A'/>
  </marker>
</defs>
<rect x='0' y='0' width='1200' height='720' fill='url(#bg-grad)'/><rect x='0' y='0' width='1200' height='720' fill='url(#grid)' opacity='0.45'/><ellipse cx='150' cy='90' rx='200' ry='110' fill='#FFF7E8' opacity='0.8'/><ellipse cx='1050' cy='620' rx='240' ry='140' fill='#F7EEE3' opacity='0.7'/><ellipse cx='980' cy='120' rx='190' ry='90' fill='#E8F4F0' opacity='0.45'/><rect x='60' y='42' width='172' height='34' rx='17' ry='17' fill='#F2E6D7'/><text x='146.0' y='63.0' class='eyebrow' text-anchor='middle' fill='#21313A'>核心 04 · 执行内核</text><text x='60' y='122' class='title' text-anchor='start'><tspan x='60' dy='0'>上下文压缩不是简单截断，而是有约束地收缩</tspan></text><text x='60' y='166' class='subtitle' text-anchor='start'><tspan x='60' dy='0'>压缩必须同时满足三件事：保留有效信息、留下可追溯痕迹、绝不伪造线程事实。</tspan></text><rect x='970' y='48' width='170' height='30' rx='15' ry='15' fill='#23313B'/><text x='1055.0' y='67.0' class='tag' text-anchor='middle' fill='#FFFDF9'>WUNDER CORE MAP</text><g filter='url(#shadow)'><rect x='72' y='246' width='252' height='284' rx='28' ry='28' fill='#FFF5E7' stroke='#E4C391' stroke-width='2.2'/><rect x='72' y='246' width='252' height='16' rx='28' ry='28' fill='#D68A2B' opacity='0.92'/><rect x='90' y='270' width='216' height='242' rx='22' ry='22' fill='#FDF1DD' opacity='0.58'/></g><rect x='224' y='270' width='78' height='28' rx='14' ry='14' fill='#D68A2B'/><text x='263.0' y='288.0' class='tag' text-anchor='middle' fill='#FFFDF9'>原料</text><text x='96' y='304' class='card-title' text-anchor='start' style='font-size:24px'><tspan x='96' dy='0'>完整上下</tspan><tspan x='96' dy='28'>文</tspan></text><circle cx='106' cy='368' r='4.5' fill='#D68A2B'/><text x='120' y='374' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='120' dy='0'>历史消息。</tspan></text><circle cx='106' cy='401' r='4.5' fill='#D68A2B'/><text x='120' y='407' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='120' dy='0'>工具 observation。</tspan></text><circle cx='106' cy='434' r='4.5' fill='#D68A2B'/><text x='120' y='440' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='120' dy='0'>当前请求与运行状态。</tspan></text><g filter='url(#shadow)'><rect x='388' y='204' width='286' height='110' rx='28' ry='28' fill='#EDF8F4' stroke='#9BCDBD' stroke-width='2.2'/><rect x='388' y='204' width='286' height='16' rx='28' ry='28' fill='#2F8B73' opacity='0.92'/><rect x='406' y='228' width='250' height='68' rx='22' ry='22' fill='#E7F6F1' opacity='0.58'/></g><rect x='574' y='228' width='78' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='613.0' y='246.0' class='tag' text-anchor='middle' fill='#FFFDF9'>轻压缩</text><text x='412' y='254' class='card-title' text-anchor='start' style='font-size:18px'><tspan x='412' dy='0'>Level 1</tspan></text><text x='412' y='288' class='card-body' text-anchor='start' style='font-size:13px'><tspan x='412' dy='0'>去掉中间噪声与可再生细节。</tspan></text><g filter='url(#shadow)'><rect x='424' y='330' width='250' height='110' rx='28' ry='28' fill='#EEF6FD' stroke='#A9C5E0' stroke-width='2.2'/><rect x='424' y='330' width='250' height='16' rx='28' ry='28' fill='#3D78B0' opacity='0.92'/><rect x='442' y='354' width='214' height='68' rx='22' ry='22' fill='#EAF3FB' opacity='0.58'/></g><rect x='574' y='354' width='78' height='28' rx='14' ry='14' fill='#3D78B0'/><text x='613.0' y='372.0' class='tag' text-anchor='middle' fill='#FFFDF9'>摘要</text><text x='448' y='380' class='card-title' text-anchor='start' style='font-size:18px'><tspan x='448' dy='0'>Level 2</tspan></text><text x='448' y='414' class='card-body' text-anchor='start' style='font-size:13px'><tspan x='448' dy='0'>把可合并历史整理成摘要。</tspan></text><g filter='url(#shadow)'><rect x='458' y='456' width='216' height='110' rx='28' ry='28' fill='#FDF0EA' stroke='#E7B4A0' stroke-width='2.2'/><rect x='458' y='456' width='216' height='16' rx='28' ry='28' fill='#C96D4C' opacity='0.92'/><rect x='476' y='480' width='180' height='68' rx='22' ry='22' fill='#FBEAE2' opacity='0.58'/></g><rect x='574' y='480' width='78' height='28' rx='14' ry='14' fill='#C96D4C'/><text x='613.0' y='498.0' class='tag' text-anchor='middle' fill='#FFFDF9'>强压缩</text><text x='482' y='506' class='card-title' text-anchor='start' style='font-size:18px'><tspan x='482' dy='0'>Level 3</tspan><tspan x='482' dy='24'> / 4</tspan></text><text x='482' y='564' class='card-body' text-anchor='start' style='font-size:13px'><tspan x='482' dy='0'>丢弃早期轮次或进入紧急降级</tspan><tspan x='482' dy='20'>。</tspan></text><g filter='url(#shadow)'><rect x='756' y='250' width='280' height='160' rx='28' ry='28' fill='#EEF1F4' stroke='#B8C4CE' stroke-width='2.2'/><rect x='756' y='250' width='280' height='16' rx='28' ry='28' fill='#4C6477' opacity='0.92'/><rect x='774' y='274' width='244' height='118' rx='22' ry='22' fill='#F2F5F7' opacity='0.58'/></g><rect x='936' y='274' width='78' height='28' rx='14' ry='14' fill='#4C6477'/><text x='975.0' y='292.0' class='tag' text-anchor='middle' fill='#FFFDF9'>目标</text><text x='780' y='308' class='card-title' text-anchor='start' style='font-size:18px'><tspan x='780' dy='0'>可继续执行的窗</tspan><tspan x='780' dy='24'>口</tspan></text><circle cx='790' cy='364' r='4.5' fill='#4C6477'/><text x='804' y='370' class='card-body' text-anchor='start' style='font-size:13px'><tspan x='804' dy='0'>目标不是“更短”，而是“还能正确</tspan><tspan x='804' dy='20'>判断与继续执行”。</tspan></text><g filter='url(#shadow)'><rect x='984' y='228' width='156' height='242' rx='28' ry='28' fill='#EDF8F4' stroke='#9BCDBD' stroke-width='2.2'/><rect x='984' y='228' width='156' height='16' rx='28' ry='28' fill='#2F8B73' opacity='0.92'/><rect x='1002' y='252' width='120' height='200' rx='22' ry='22' fill='#E7F6F1' opacity='0.58'/></g><rect x='1040' y='252' width='78' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='1079.0' y='270.0' class='tag' text-anchor='middle' fill='#FFFDF9'>审计</text><text x='1008' y='286' class='card-title' text-anchor='start' style='font-size:20px'><tspan x='1008' dy='0'>观测轨</tspan></text><text x='1008' y='324' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='1008' dy='0'>记录事件</tspan><tspan x='1008' dy='23'>标注损失</tspan><tspan x='1008' dy='23'>支持复盘</tspan></text><path class='flow' d='M324,388 L388,260'/><path class='flow' d='M324,388 L424,386'/><path class='flow' d='M324,388 L458,512'/><path class='flow' d='M674,260 L756,302'/><path class='flow' d='M674,386 L756,332'/><path class='flow' d='M674,512 L756,362'/><path class='flow-soft' d='M1036,330 L984,330'/><rect x='60' y='634' width='1080' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='78' y='646' width='96' height='30' rx='15' ry='15' fill='#21313B'/><text x='126.0' y='665.0' class='tag' text-anchor='middle' fill='#FFFDF9'>核心结论</text><text x='194' y='670' class='ribbon' text-anchor='start'><tspan x='194' dy='0'>压缩的成功标准不是字数下降，而是线程还能继续跑、损失还能被解释、事实没有被篡改。</tspan></text></svg>
