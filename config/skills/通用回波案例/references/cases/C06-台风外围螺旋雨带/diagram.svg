<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">C06 台风外围螺旋雨带示意图</title>
  <desc id="desc">台风环流外围的螺旋雨带中嵌入局地强回波单体，提示短时强降水和大风风险。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f8fafc"/>
  <rect x="42" y="52" width="650" height="428" rx="8" fill="#ecfeff" stroke="#94a3b8"/>
  <circle cx="340" cy="268" r="34" fill="#bae6fd" stroke="#0284c7" stroke-width="3"/>
  <circle cx="340" cy="268" r="12" fill="#f8fafc" stroke="#0284c7" stroke-width="2"/>
  <path d="M342 268 C414 214 500 206 586 236" fill="none" stroke="#f59e0b" stroke-width="34" stroke-linecap="round" opacity="0.75"/>
  <path d="M332 282 C250 340 168 346 98 314" fill="none" stroke="#f59e0b" stroke-width="30" stroke-linecap="round" opacity="0.62"/>
  <path d="M352 250 C292 182 210 158 126 178" fill="none" stroke="#f59e0b" stroke-width="28" stroke-linecap="round" opacity="0.55"/>
  <ellipse cx="520" cy="226" rx="46" ry="28" fill="#dc2626" opacity="0.92" transform="rotate(14 520 226)"/>
  <ellipse cx="184" cy="332" rx="44" ry="26" fill="#dc2626" opacity="0.86" transform="rotate(-18 184 332)"/>
  <ellipse cx="252" cy="172" rx="36" ry="22" fill="#dc2626" opacity="0.8" transform="rotate(20 252 172)"/>
  <path d="M405 154 C440 118 500 108 554 126" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="424" y="106" fill="#334155" font-size="16">环流方向</text>
  <text x="72" y="88" fill="#0f172a" font-size="22" font-weight="700">外围螺旋雨带</text>
  <text x="498" y="190" fill="#7f1d1d" font-size="17" font-weight="700">嵌入对流</text>
  <rect x="725" y="88" width="198" height="144" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="745" y="122" fill="#1d4ed8" font-size="18" font-weight="700">判读重点</text>
  <text x="745" y="152" fill="#334155" font-size="15">雨带移动</text>
  <text x="745" y="178" fill="#334155" font-size="15">嵌入强回波核</text>
  <text x="745" y="204" fill="#334155" font-size="15">低层风切变</text>
  <rect x="725" y="270" width="198" height="124" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="745" y="304" fill="#0f172a" font-size="18" font-weight="700">风险</text>
  <text x="745" y="334" fill="#334155" font-size="15">短时强降水</text>
  <text x="745" y="360" fill="#334155" font-size="15">局地大风</text>
  <text x="42" y="514" fill="#64748b" font-size="14">台风外围影响不能只看中心路径，雨带和嵌入对流常造成局地风险。</text>
</svg>

