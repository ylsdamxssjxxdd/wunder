<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<style>
  .title { font: 700 38px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .eyebrow { font: 700 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; letter-spacing: 1px; }
  .badge { font: 700 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-title { font: 700 24px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .center-title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .center-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .ribbon { font: 700 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .tag { font: 700 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #FFFDF9; letter-spacing: 0.5px; }
  .flow { stroke: #21313A; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
  .flow-soft { stroke: #63707A; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-soft); }
  .dash { stroke-dasharray: 8 8; }
</style>
<defs>
  <linearGradient id='bg-grad' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='#FBF5EE'/>
    <stop offset='100%' stop-color='#F1E7DA'/>
  </linearGradient>
  <filter id='shadow' x='-10%' y='-10%' width='120%' height='120%'>
    <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='#B39C82' flood-opacity='0.16'/>
  </filter>
  <pattern id='grid' width='40' height='40' patternUnits='userSpaceOnUse'>
    <path d='M 40 0 L 0 0 0 40' fill='none' stroke='#E8DCCD' stroke-width='1'/>
  </pattern>
  <marker id='arrow' markerWidth='11' markerHeight='11' refX='8.5' refY='5.5' orient='auto'>
    <path d='M0,0 L11,5.5 L0,11 z' fill='#21313A'/>
  </marker>
  <marker id='arrow-soft' markerWidth='10' markerHeight='10' refX='8' refY='5' orient='auto'>
    <path d='M0,0 L10,5 L0,10 z' fill='#63707A'/>
  </marker>
</defs>
<rect x='0' y='0' width='1200' height='720' fill='url(#bg-grad)'/><rect x='0' y='0' width='1200' height='720' fill='url(#grid)' opacity='0.45'/><ellipse cx='150' cy='90' rx='200' ry='110' fill='#FFF7E8' opacity='0.8'/><ellipse cx='1050' cy='620' rx='240' ry='140' fill='#F7EEE3' opacity='0.7'/><ellipse cx='980' cy='120' rx='190' ry='90' fill='#E8F4F0' opacity='0.45'/><rect x='60' y='42' width='172' height='34' rx='17' ry='17' fill='#F2E6D7'/><text x='146.0' y='63.0' class='eyebrow' text-anchor='middle' fill='#21313A'>核心 05 · 执行内核</text><text x='60' y='122' class='title' text-anchor='start'><tspan x='60' dy='0'>记忆的关键不是“放更多内容”，而是保护线程认知底座</tspan></text><text x='60' y='166' class='subtitle' text-anchor='start'><tspan x='60' dy='0'>长期记忆只允许在线程初始化时注入一次。运行中可以 recall，但不能反复改写 system prompt。</tspan></text><rect x='970' y='48' width='170' height='30' rx='15' ry='15' fill='#23313B'/><text x='1055.0' y='67.0' class='tag' text-anchor='middle' fill='#FFFDF9'>WUNDER CORE MAP</text><rect x='70' y='520' width='1060' height='94' rx='32' ry='32' fill='#EEF1F4' stroke='#B8C4CE' stroke-width='2.2' filter='url(#shadow)'/><rect x='96' y='548' width='112' height='30' rx='15' ry='15' fill='#4C6477'/><text x='152.0' y='567.0' class='tag' text-anchor='middle' fill='#FFFDF9'>冻结底座</text><text x='268' y='574' class='ribbon' text-anchor='start'><tspan x='268' dy='0'>线程初始化后，prompt 语义不再漂移。这样模型缓存稳定、行为稳定、历史线程也不会被新模板反写。</tspan></text><g filter='url(#shadow)'><rect x='88' y='218' width='250' height='190' rx='28' ry='28' fill='#FFF5E7' stroke='#E4C391' stroke-width='2.2'/><rect x='88' y='218' width='250' height='16' rx='28' ry='28' fill='#D68A2B' opacity='0.92'/><rect x='106' y='242' width='214' height='148' rx='22' ry='22' fill='#FDF1DD' opacity='0.58'/></g><rect x='238' y='242' width='78' height='28' rx='14' ry='14' fill='#D68A2B'/><text x='277.0' y='260.0' class='tag' text-anchor='middle' fill='#FFFDF9'>一次性</text><text x='112' y='276' class='card-title' text-anchor='start' style='font-size:20px'><tspan x='112' dy='0'>初始化注入</tspan></text><circle cx='122' cy='308' r='4.5' fill='#D68A2B'/><text x='136' y='314' class='card-body' text-anchor='start' style='font-size:15px'><tspan x='136' dy='0'>构造 system prompt。</tspan></text><circle cx='122' cy='339' r='4.5' fill='#D68A2B'/><text x='136' y='345' class='card-body' text-anchor='start' style='font-size:15px'><tspan x='136' dy='0'>只在这一刻注入长期记忆。</tspan></text><circle cx='600' cy='322' r='116' fill='#E7F6F1' opacity='0.72'/><circle cx='600' cy='322' r='102' fill='#FFFDF9' stroke='#9BCDBD' stroke-width='3'/><circle cx='600' cy='322' r='78' fill='#DFF1EA' stroke='#2F8B73' stroke-width='2.5'/><text x='600' y='314' class='center-title' text-anchor='middle'><tspan x='600' dy='0'>冻结边界</tspan></text><text x='600' y='362' class='center-body' text-anchor='middle'><tspan x='600' dy='0'>后续轮次</tspan><tspan x='600' dy='24'>不重写底座</tspan></text><g filter='url(#shadow)'><rect x='840' y='214' width='272' height='204' rx='28' ry='28' fill='#FDF0EA' stroke='#E7B4A0' stroke-width='2.2'/><rect x='840' y='214' width='272' height='16' rx='28' ry='28' fill='#C96D4C' opacity='0.92'/><rect x='858' y='238' width='236' height='162' rx='22' ry='22' fill='#FBEAE2' opacity='0.58'/></g><rect x='1012' y='238' width='78' height='28' rx='14' ry='14' fill='#C96D4C'/><text x='1051.0' y='256.0' class='tag' text-anchor='middle' fill='#FFFDF9'>运行中</text><text x='864' y='272' class='card-title' text-anchor='start' style='font-size:24px'><tspan x='864' dy='0'>运行期补充</tspan></text><text x='864' y='314' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='864' dy='0'>需要资料时，通过 recall 或工</tspan><tspan x='864' dy='23'>具再取回；补充的是工作信息，</tspan><tspan x='864' dy='23'>不是再改线程底座。</tspan></text><path class='flow' d='M338,312 C414,286 472,278 504,290'/><path class='flow' d='M696,290 C754,278 804,284 840,304'/><path class='flow-soft dash' d='M980,410 C980,470 892,506 760,520'/><text x='980' y='446' class='small' text-anchor='middle'><tspan x='980' dy='0'>只补工作面</tspan></text><rect x='60' y='634' width='1080' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='78' y='646' width='96' height='30' rx='15' ry='15' fill='#21313B'/><text x='126.0' y='665.0' class='tag' text-anchor='middle' fill='#FFFDF9'>核心结论</text><text x='194' y='670' class='ribbon' text-anchor='start'><tspan x='194' dy='0'>长期记忆要提升可用性，但不能以破坏线程稳定为代价。底座一旦漂移，整个运行链路都会失真。</tspan></text></svg>
