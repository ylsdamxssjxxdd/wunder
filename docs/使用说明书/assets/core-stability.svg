<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<style>
  .title { font: 700 38px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .eyebrow { font: 700 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; letter-spacing: 1px; }
  .badge { font: 700 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-title { font: 700 24px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .center-title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .center-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .ribbon { font: 700 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .tag { font: 700 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #FFFDF9; letter-spacing: 0.5px; }
  .flow { stroke: #21313A; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
  .flow-soft { stroke: #63707A; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-soft); }
  .dash { stroke-dasharray: 8 8; }
</style>
<defs>
  <linearGradient id='bg-grad' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='#FBF5EE'/>
    <stop offset='100%' stop-color='#F1E7DA'/>
  </linearGradient>
  <filter id='shadow' x='-10%' y='-10%' width='120%' height='120%'>
    <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='#B39C82' flood-opacity='0.16'/>
  </filter>
  <pattern id='grid' width='40' height='40' patternUnits='userSpaceOnUse'>
    <path d='M 40 0 L 0 0 0 40' fill='none' stroke='#E8DCCD' stroke-width='1'/>
  </pattern>
  <marker id='arrow' markerWidth='11' markerHeight='11' refX='8.5' refY='5.5' orient='auto'>
    <path d='M0,0 L11,5.5 L0,11 z' fill='#21313A'/>
  </marker>
  <marker id='arrow-soft' markerWidth='10' markerHeight='10' refX='8' refY='5' orient='auto'>
    <path d='M0,0 L10,5 L0,10 z' fill='#63707A'/>
  </marker>
</defs>
<rect x='0' y='0' width='1200' height='720' fill='url(#bg-grad)'/><rect x='0' y='0' width='1200' height='720' fill='url(#grid)' opacity='0.45'/><ellipse cx='150' cy='90' rx='200' ry='110' fill='#FFF7E8' opacity='0.8'/><ellipse cx='1050' cy='620' rx='240' ry='140' fill='#F7EEE3' opacity='0.7'/><ellipse cx='980' cy='120' rx='190' ry='90' fill='#E8F4F0' opacity='0.45'/><rect x='60' y='42' width='160' height='34' rx='17' ry='17' fill='#F2E6D7'/><text x='140.0' y='63.0' class='eyebrow' text-anchor='middle' fill='#21313A'>核心 10 · 交付保障</text><text x='60' y='122' class='title' text-anchor='start'><tspan x='60' dy='0'>稳定性不是少报错，而是错误出现时不扩散、可恢复、可</tspan><tspan x='60' dy='44'>复盘</tspan></text><text x='60' y='210' class='subtitle' text-anchor='start'><tspan x='60' dy='0'>真正的稳定性来自结构：超时、重试、隔离、预算、事务与补偿要把风险消化在系统内部，而不是推给人盯着跑。</tspan></text><rect x='970' y='48' width='170' height='30' rx='15' ry='15' fill='#23313B'/><text x='1055.0' y='67.0' class='tag' text-anchor='middle' fill='#FFFDF9'>WUNDER CORE MAP</text><g filter='url(#shadow)'><rect x='72' y='244' width='230' height='258' rx='28' ry='28' fill='#FDF0EA' stroke='#E7B4A0' stroke-width='2.2'/><rect x='72' y='244' width='230' height='16' rx='28' ry='28' fill='#C96D4C' opacity='0.92'/><rect x='90' y='268' width='194' height='216' rx='22' ry='22' fill='#FBEAE2' opacity='0.58'/></g><rect x='202' y='268' width='78' height='28' rx='14' ry='14' fill='#C96D4C'/><text x='241.0' y='286.0' class='tag' text-anchor='middle' fill='#FFFDF9'>输入</text><text x='96' y='302' class='card-title' text-anchor='start'><tspan x='96' dy='0'>风险源</tspan></text><circle cx='106' cy='340' r='4.5' fill='#C96D4C'/><text x='120' y='346' class='card-body' text-anchor='start'><tspan x='120' dy='0'>模型超时。</tspan></text><circle cx='106' cy='374' r='4.5' fill='#C96D4C'/><text x='120' y='380' class='card-body' text-anchor='start'><tspan x='120' dy='0'>工具失败。</tspan></text><circle cx='106' cy='408' r='4.5' fill='#C96D4C'/><text x='120' y='414' class='card-body' text-anchor='start'><tspan x='120' dy='0'>网络抖动。</tspan></text><circle cx='106' cy='442' r='4.5' fill='#C96D4C'/><text x='120' y='448' class='card-body' text-anchor='start'><tspan x='120' dy='0'>并发积压。</tspan></text><rect x='366' y='204' width='394' height='338' rx='42' ry='42' fill='#FFFDF9' stroke='#B8C4CE' stroke-width='2.4' filter='url(#shadow)'/><rect x='398' y='236' width='330' height='122' rx='28' ry='28' fill='#EEF1F4' stroke='#B8C4CE' stroke-width='2'/><rect x='424' y='256' width='114' height='28' rx='14' ry='14' fill='#4C6477'/><text x='481.0' y='274.0' class='tag' text-anchor='middle' fill='#FFFDF9'>隔离与治理</text><text x='424' y='308' class='card-body' text-anchor='start'><tspan x='424' dy='0'>超时、队列、资源预算把风险限制在边</tspan><tspan x='424' dy='23'>界内。</tspan></text><rect x='398' y='382' width='330' height='122' rx='28' ry='28' fill='#EDF8F4' stroke='#9BCDBD' stroke-width='2'/><rect x='424' y='402' width='98' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='473.0' y='420.0' class='tag' text-anchor='middle' fill='#FFFDF9'>恢复链路</text><text x='424' y='454' class='card-body' text-anchor='start'><tspan x='424' dy='0'>续跑、补发、原子写入、事务与 outbo</tspan><tspan x='424' dy='23'>x 负责把任务重新带回收敛面。</tspan></text><g filter='url(#shadow)'><rect x='834' y='258' width='292' height='230' rx='28' ry='28' fill='#FFF5E7' stroke='#E4C391' stroke-width='2.2'/><rect x='834' y='258' width='292' height='16' rx='28' ry='28' fill='#D68A2B' opacity='0.92'/><rect x='852' y='282' width='256' height='188' rx='22' ry='22' fill='#FDF1DD' opacity='0.58'/></g><rect x='1026' y='282' width='78' height='28' rx='14' ry='14' fill='#D68A2B'/><text x='1065.0' y='300.0' class='tag' text-anchor='middle' fill='#FFFDF9'>收敛</text><text x='858' y='316' class='card-title' text-anchor='start'><tspan x='858' dy='0'>结果</tspan></text><circle cx='868' cy='354' r='4.5' fill='#D68A2B'/><text x='882' y='360' class='card-body' text-anchor='start'><tspan x='882' dy='0'>故障不会一路级联。</tspan></text><circle cx='868' cy='388' r='4.5' fill='#D68A2B'/><text x='882' y='394' class='card-body' text-anchor='start'><tspan x='882' dy='0'>任务可以落回终态。</tspan></text><circle cx='868' cy='422' r='4.5' fill='#D68A2B'/><text x='882' y='428' class='card-body' text-anchor='start'><tspan x='882' dy='0'>问题还能被回归验证。</tspan></text><path class='flow' d='M302,374 L366,374'/><path class='flow' d='M760,374 L834,374'/><rect x='60' y='634' width='1080' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='78' y='646' width='96' height='30' rx='15' ry='15' fill='#21313B'/><text x='126.0' y='665.0' class='tag' text-anchor='middle' fill='#FFFDF9'>核心结论</text><text x='194' y='670' class='ribbon' text-anchor='start'><tspan x='194' dy='0'>稳定性是系统结构消化风险的能力。没有隔离与恢复，再多人工值守也只是延后事故。</tspan></text></svg>
