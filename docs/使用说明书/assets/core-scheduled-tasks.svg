<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<style>
  .title { font: 700 38px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .eyebrow { font: 700 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; letter-spacing: 1px; }
  .badge { font: 700 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-title { font: 700 24px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .center-title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .center-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .ribbon { font: 700 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .tag { font: 700 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #FFFDF9; letter-spacing: 0.5px; }
  .flow { stroke: #21313A; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
  .flow-soft { stroke: #63707A; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-soft); }
  .dash { stroke-dasharray: 8 8; }
</style>
<defs>
  <linearGradient id='bg-grad' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='#FBF5EE'/>
    <stop offset='100%' stop-color='#F1E7DA'/>
  </linearGradient>
  <filter id='shadow' x='-10%' y='-10%' width='120%' height='120%'>
    <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='#B39C82' flood-opacity='0.16'/>
  </filter>
  <pattern id='grid' width='40' height='40' patternUnits='userSpaceOnUse'>
    <path d='M 40 0 L 0 0 0 40' fill='none' stroke='#E8DCCD' stroke-width='1'/>
  </pattern>
  <marker id='arrow' markerWidth='11' markerHeight='11' refX='8.5' refY='5.5' orient='auto'>
    <path d='M0,0 L11,5.5 L0,11 z' fill='#21313A'/>
  </marker>
  <marker id='arrow-soft' markerWidth='10' markerHeight='10' refX='8' refY='5' orient='auto'>
    <path d='M0,0 L10,5 L0,10 z' fill='#63707A'/>
  </marker>
</defs>
<rect x='0' y='0' width='1200' height='720' fill='url(#bg-grad)'/><rect x='0' y='0' width='1200' height='720' fill='url(#grid)' opacity='0.45'/><ellipse cx='150' cy='90' rx='200' ry='110' fill='#FFF7E8' opacity='0.8'/><ellipse cx='1050' cy='620' rx='240' ry='140' fill='#F7EEE3' opacity='0.7'/><ellipse cx='980' cy='120' rx='190' ry='90' fill='#E8F4F0' opacity='0.45'/><rect x='60' y='42' width='174' height='34' rx='17' ry='17' fill='#F2E6D7'/><text x='147.0' y='63.0' class='eyebrow' text-anchor='middle' fill='#21313A'>核心 07 · 接入与治理</text><text x='60' y='122' class='title' text-anchor='start'><tspan x='60' dy='0'>定时任务把系统时间轴正式纳入能力边界</tspan></text><text x='60' y='166' class='subtitle' text-anchor='start'><tspan x='60' dy='0'>它不是 sleep 的放大版，而是拥有规则、唤醒、执行、记录和治理语义的后台运行链。</tspan></text><rect x='970' y='48' width='170' height='30' rx='15' ry='15' fill='#23313B'/><text x='1055.0' y='67.0' class='tag' text-anchor='middle' fill='#FFFDF9'>WUNDER CORE MAP</text><path class='flow-soft' d='M110,222 L1090,222'/><rect x='118' y='202' width='110' height='28' rx='14' ry='14' fill='#F2E6D7'/><text x='173.0' y='220.0' class='badge' text-anchor='middle' fill='#21313A'>at / every</text><rect x='248' y='202' width='82' height='28' rx='14' ry='14' fill='#F2E6D7'/><text x='289.0' y='220.0' class='badge' text-anchor='middle' fill='#21313A'>cron</text><rect x='346' y='202' width='92' height='28' rx='14' ry='14' fill='#F2E6D7'/><text x='392.0' y='220.0' class='badge' text-anchor='middle' fill='#21313A'>enable</text><g filter='url(#shadow)'><rect x='76' y='270' width='248' height='206' rx='28' ry='28' fill='#FFF5E7' stroke='#E4C391' stroke-width='2.2'/><rect x='76' y='270' width='248' height='16' rx='28' ry='28' fill='#D68A2B' opacity='0.92'/><rect x='94' y='294' width='212' height='164' rx='22' ry='22' fill='#FDF1DD' opacity='0.58'/></g><rect x='224' y='294' width='78' height='28' rx='14' ry='14' fill='#D68A2B'/><text x='263.0' y='312.0' class='tag' text-anchor='middle' fill='#FFFDF9'>规则</text><text x='100' y='328' class='card-title' text-anchor='start' style='font-size:24px'><tspan x='100' dy='0'>调度规则</tspan></text><circle cx='110' cy='364' r='4.5' fill='#D68A2B'/><text x='124' y='370' class='card-body' text-anchor='start' style='font-size:14px'><tspan x='124' dy='0'>定义下一次执行时间。</tspan></text><circle cx='110' cy='394' r='4.5' fill='#D68A2B'/><text x='124' y='400' class='card-body' text-anchor='start' style='font-size:14px'><tspan x='124' dy='0'>决定是否启用、暂停或删除</tspan><tspan x='124' dy='20'>。</tspan></text><g filter='url(#shadow)'><rect x='392' y='242' width='284' height='262' rx='28' ry='28' fill='#EDF8F4' stroke='#9BCDBD' stroke-width='2.2'/><rect x='392' y='242' width='284' height='16' rx='28' ry='28' fill='#2F8B73' opacity='0.92'/><rect x='410' y='266' width='248' height='220' rx='22' ry='22' fill='#E7F6F1' opacity='0.58'/></g><rect x='576' y='266' width='78' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='615.0' y='284.0' class='tag' text-anchor='middle' fill='#FFFDF9'>主控</text><text x='416' y='300' class='card-title' text-anchor='start' style='font-size:24px'><tspan x='416' dy='0'>调度器</tspan></text><circle cx='426' cy='336' r='4.5' fill='#2F8B73'/><text x='440' y='342' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='440' dy='0'>轮询时间点。</tspan></text><circle cx='426' cy='369' r='4.5' fill='#2F8B73'/><text x='440' y='375' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='440' dy='0'>唤醒待跑任务。</tspan></text><circle cx='426' cy='402' r='4.5' fill='#2F8B73'/><text x='440' y='408' class='card-body' text-anchor='start' style='font-size:16px'><tspan x='440' dy='0'>选择进入后台执行的对象。</tspan></text><g filter='url(#shadow)'><rect x='744' y='236' width='212' height='130' rx='28' ry='28' fill='#EEF6FD' stroke='#A9C5E0' stroke-width='2.2'/><rect x='744' y='236' width='212' height='16' rx='28' ry='28' fill='#3D78B0' opacity='0.92'/><rect x='762' y='260' width='176' height='88' rx='22' ry='22' fill='#EAF3FB' opacity='0.58'/></g><rect x='856' y='260' width='78' height='28' rx='14' ry='14' fill='#3D78B0'/><text x='895.0' y='278.0' class='tag' text-anchor='middle' fill='#FFFDF9'>执行</text><text x='768' y='286' class='card-title' text-anchor='start' style='font-size:20px'><tspan x='768' dy='0'>主会话</tspan></text><text x='768' y='320' class='card-body' text-anchor='start' style='font-size:14px'><tspan x='768' dy='0'>挂回主线程语义。</tspan></text><g filter='url(#shadow)'><rect x='744' y='384' width='212' height='156' rx='28' ry='28' fill='#FDF0EA' stroke='#E7B4A0' stroke-width='2.2'/><rect x='744' y='384' width='212' height='16' rx='28' ry='28' fill='#C96D4C' opacity='0.92'/><rect x='762' y='408' width='176' height='114' rx='22' ry='22' fill='#FBEAE2' opacity='0.58'/></g><rect x='856' y='408' width='78' height='28' rx='14' ry='14' fill='#C96D4C'/><text x='895.0' y='426.0' class='tag' text-anchor='middle' fill='#FFFDF9'>执行</text><text x='768' y='442' class='card-title' text-anchor='start' style='font-size:18px'><tspan x='768' dy='0'>隔离会话</tspan></text><text x='768' y='480' class='card-body' text-anchor='start' style='font-size:13px'><tspan x='768' dy='0'>隔离线程运行，避免污染在</tspan><tspan x='768' dy='20'>线上下文。</tspan></text><g filter='url(#shadow)'><rect x='970' y='278' width='170' height='214' rx='28' ry='28' fill='#EEF1F4' stroke='#B8C4CE' stroke-width='2.2'/><rect x='970' y='278' width='170' height='16' rx='28' ry='28' fill='#4C6477' opacity='0.92'/><rect x='988' y='302' width='134' height='172' rx='22' ry='22' fill='#F2F5F7' opacity='0.58'/></g><rect x='1040' y='302' width='78' height='28' rx='14' ry='14' fill='#4C6477'/><text x='1079.0' y='320.0' class='tag' text-anchor='middle' fill='#FFFDF9'>留痕</text><text x='994' y='336' class='card-title' text-anchor='start' style='font-size:18px'><tspan x='994' dy='0'>执行记录</tspan></text><circle cx='1004' cy='368' r='4.5' fill='#4C6477'/><text x='1018' y='374' class='card-body' text-anchor='start' style='font-size:13px'><tspan x='1018' dy='0'>下次执行时间。</tspan></text><circle cx='1004' cy='398' r='4.5' fill='#4C6477'/><text x='1018' y='404' class='card-body' text-anchor='start' style='font-size:13px'><tspan x='1018' dy='0'>最近运行状态。</tspan></text><circle cx='1004' cy='428' r='4.5' fill='#4C6477'/><text x='1018' y='434' class='card-body' text-anchor='start' style='font-size:13px'><tspan x='1018' dy='0'>运行日志与失败</tspan><tspan x='1018' dy='20'>原因。</tspan></text><path class='flow' d='M324,372 L392,372'/><path class='flow' d='M676,322 L744,300'/><path class='flow' d='M676,424 L744,462'/><path class='flow' d='M956,300 L970,332'/><path class='flow' d='M956,444 L970,414'/><rect x='60' y='634' width='1080' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='78' y='646' width='96' height='30' rx='15' ry='15' fill='#21313B'/><text x='126.0' y='665.0' class='tag' text-anchor='middle' fill='#FFFDF9'>核心结论</text><text x='194' y='670' class='ribbon' text-anchor='start'><tspan x='194' dy='0'>定时任务是系统级后台能力。只有把时间、执行语义和留痕统一起来，它才不是一段脆弱脚本。</tspan></text></svg>
