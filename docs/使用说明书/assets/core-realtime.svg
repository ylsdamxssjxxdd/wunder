<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<style>
  .title { font: 700 38px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .eyebrow { font: 700 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; letter-spacing: 1px; }
  .badge { font: 700 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-title { font: 700 24px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .center-title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .center-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .ribbon { font: 700 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .tag { font: 700 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #FFFDF9; letter-spacing: 0.5px; }
  .flow { stroke: #21313A; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
  .flow-soft { stroke: #63707A; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-soft); }
  .dash { stroke-dasharray: 8 8; }
</style>
<defs>
  <linearGradient id='bg-grad' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='#FBF5EE'/>
    <stop offset='100%' stop-color='#F1E7DA'/>
  </linearGradient>
  <filter id='shadow' x='-10%' y='-10%' width='120%' height='120%'>
    <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='#B39C82' flood-opacity='0.16'/>
  </filter>
  <pattern id='grid' width='40' height='40' patternUnits='userSpaceOnUse'>
    <path d='M 40 0 L 0 0 0 40' fill='none' stroke='#E8DCCD' stroke-width='1'/>
  </pattern>
  <marker id='arrow' markerWidth='11' markerHeight='11' refX='8.5' refY='5.5' orient='auto'>
    <path d='M0,0 L11,5.5 L0,11 z' fill='#21313A'/>
  </marker>
  <marker id='arrow-soft' markerWidth='10' markerHeight='10' refX='8' refY='5' orient='auto'>
    <path d='M0,0 L10,5 L0,10 z' fill='#63707A'/>
  </marker>
</defs>
<rect x='0' y='0' width='1200' height='720' fill='url(#bg-grad)'/><rect x='0' y='0' width='1200' height='720' fill='url(#grid)' opacity='0.45'/><ellipse cx='150' cy='90' rx='200' ry='110' fill='#FFF7E8' opacity='0.8'/><ellipse cx='1050' cy='620' rx='240' ry='140' fill='#F7EEE3' opacity='0.7'/><ellipse cx='980' cy='120' rx='190' ry='90' fill='#E8F4F0' opacity='0.45'/><rect x='60' y='42' width='160' height='34' rx='17' ry='17' fill='#F2E6D7'/><text x='140.0' y='63.0' class='eyebrow' text-anchor='middle' fill='#21313A'>核心 09 · 交付保障</text><text x='60' y='122' class='title' text-anchor='start'><tspan x='60' dy='0'>实时性负责把线程事实持续投影到客户端</tspan></text><text x='60' y='166' class='subtitle' text-anchor='start'><tspan x='60' dy='0'>关键不是 WebSocket 本身，而是线程变化如何变成可消费事件，以及断线后如何恢复到正确状态。</tspan></text><rect x='970' y='48' width='170' height='30' rx='15' ry='15' fill='#23313B'/><text x='1055.0' y='67.0' class='tag' text-anchor='middle' fill='#FFFDF9'>WUNDER CORE MAP</text><g filter='url(#shadow)'><rect x='84' y='254' width='238' height='228' rx='28' ry='28' fill='#FFF5E7' stroke='#E4C391' stroke-width='2.2'/><rect x='84' y='254' width='238' height='16' rx='28' ry='28' fill='#D68A2B' opacity='0.92'/><rect x='102' y='278' width='202' height='186' rx='22' ry='22' fill='#FDF1DD' opacity='0.58'/></g><rect x='222' y='278' width='78' height='28' rx='14' ry='14' fill='#D68A2B'/><text x='261.0' y='296.0' class='tag' text-anchor='middle' fill='#FFFDF9'>真相源</text><text x='108' y='312' class='card-title' text-anchor='start'><tspan x='108' dy='0'>线程事实</tspan></text><circle cx='118' cy='350' r='4.5' fill='#D68A2B'/><text x='132' y='356' class='card-body' text-anchor='start'><tspan x='132' dy='0'>运行态变化。</tspan></text><circle cx='118' cy='384' r='4.5' fill='#D68A2B'/><text x='132' y='390' class='card-body' text-anchor='start'><tspan x='132' dy='0'>工具调用。</tspan></text><circle cx='118' cy='418' r='4.5' fill='#D68A2B'/><text x='132' y='424' class='card-body' text-anchor='start'><tspan x='132' dy='0'>终态收敛。</tspan></text><g filter='url(#shadow)'><rect x='388' y='202' width='334' height='188' rx='28' ry='28' fill='#EDF8F4' stroke='#9BCDBD' stroke-width='2.2'/><rect x='388' y='202' width='334' height='16' rx='28' ry='28' fill='#2F8B73' opacity='0.92'/><rect x='406' y='226' width='298' height='146' rx='22' ry='22' fill='#E7F6F1' opacity='0.58'/></g><rect x='622' y='226' width='78' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='661.0' y='244.0' class='tag' text-anchor='middle' fill='#FFFDF9'>投影层</text><text x='412' y='260' class='card-title' text-anchor='start'><tspan x='412' dy='0'>事件流</tspan></text><text x='412' y='304' class='card-body' text-anchor='start'><tspan x='412' dy='0'>WebSocket / SSE 负责增量投影，thr</tspan><tspan x='412' dy='24'>ead_status、增量输出与工作流都从事</tspan><tspan x='412' dy='24'>实流派生。</tspan></text><rect x='388' y='412' width='334' height='122' rx='28' ry='28' fill='#E7F6F1' stroke='#9BCDBD' stroke-width='2.2' filter='url(#shadow)'/><rect x='414' y='432' width='126' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='477.0' y='450.0' class='tag' text-anchor='middle' fill='#FFFDF9'>恢复机制</text><text x='414' y='482' class='card-body' text-anchor='start'><tspan x='414' dy='0'>resume、快照补偿、断线重连要把客户</tspan><tspan x='414' dy='23'>端重新拉回当前线程事实。</tspan></text><g filter='url(#shadow)'><rect x='796' y='214' width='160' height='132' rx='28' ry='28' fill='#EEF6FD' stroke='#A9C5E0' stroke-width='2.2'/><rect x='796' y='214' width='160' height='16' rx='28' ry='28' fill='#3D78B0' opacity='0.92'/><rect x='814' y='238' width='124' height='90' rx='22' ry='22' fill='#EAF3FB' opacity='0.58'/></g><rect x='856' y='238' width='78' height='28' rx='14' ry='14' fill='#3D78B0'/><text x='895.0' y='256.0' class='tag' text-anchor='middle' fill='#FFFDF9'>客户端</text><text x='820' y='266' class='card-title' text-anchor='start'><tspan x='820' dy='0'>列表页</tspan></text><circle cx='830' cy='294' r='4.5' fill='#3D78B0'/><text x='844' y='300' class='card-body' text-anchor='start'><tspan x='844' dy='0'>看状态变化</tspan><tspan x='844' dy='22'>。</tspan></text><g filter='url(#shadow)'><rect x='980' y='214' width='160' height='132' rx='28' ry='28' fill='#FDF0EA' stroke='#E7B4A0' stroke-width='2.2'/><rect x='980' y='214' width='160' height='16' rx='28' ry='28' fill='#C96D4C' opacity='0.92'/><rect x='998' y='238' width='124' height='90' rx='22' ry='22' fill='#FBEAE2' opacity='0.58'/></g><rect x='1040' y='238' width='78' height='28' rx='14' ry='14' fill='#C96D4C'/><text x='1079.0' y='256.0' class='tag' text-anchor='middle' fill='#FFFDF9'>客户端</text><text x='1004' y='266' class='card-title' text-anchor='start'><tspan x='1004' dy='0'>详情页</tspan></text><circle cx='1014' cy='294' r='4.5' fill='#C96D4C'/><text x='1028' y='300' class='card-body' text-anchor='start'><tspan x='1028' dy='0'>看工作流与</tspan><tspan x='1028' dy='22'>细节。</tspan></text><g filter='url(#shadow)'><rect x='888' y='392' width='168' height='126' rx='28' ry='28' fill='#EEF1F4' stroke='#B8C4CE' stroke-width='2.2'/><rect x='888' y='392' width='168' height='16' rx='28' ry='28' fill='#4C6477' opacity='0.92'/><rect x='906' y='416' width='132' height='84' rx='22' ry='22' fill='#F2F5F7' opacity='0.58'/></g><rect x='956' y='416' width='78' height='28' rx='14' ry='14' fill='#4C6477'/><text x='995.0' y='434.0' class='tag' text-anchor='middle' fill='#FFFDF9'>一致</text><text x='912' y='444' class='card-title' text-anchor='start'><tspan x='912' dy='0'>终态收敛</tspan></text><circle cx='922' cy='472' r='4.5' fill='#4C6477'/><text x='936' y='478' class='card-body' text-anchor='start'><tspan x='936' dy='0'>回到一致终</tspan><tspan x='936' dy='22'>态。</tspan></text><path class='flow' d='M322,368 L388,300'/><path class='flow' d='M322,368 L388,470'/><path class='flow' d='M722,300 L796,280'/><path class='flow' d='M722,300 L980,280'/><path class='flow-soft dash' d='M722,470 C792,520 852,520 888,458'/><rect x='60' y='634' width='1080' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='78' y='646' width='96' height='30' rx='15' ry='15' fill='#21313B'/><text x='126.0' y='665.0' class='tag' text-anchor='middle' fill='#FFFDF9'>核心结论</text><text x='194' y='670' class='ribbon' text-anchor='start'><tspan x='194' dy='0'>实时性不是再造一套事实，而是让同一线程事实可以被持续消费、掉线补偿、最终收敛。</tspan></text></svg>
