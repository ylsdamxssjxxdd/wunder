<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<style>
  .title { font: 700 38px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .eyebrow { font: 700 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; letter-spacing: 1px; }
  .badge { font: 700 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-title { font: 700 24px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .center-title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .center-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .ribbon { font: 700 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .tag { font: 700 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #FFFDF9; letter-spacing: 0.5px; }
  .flow { stroke: #21313A; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
  .flow-soft { stroke: #63707A; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-soft); }
  .dash { stroke-dasharray: 8 8; }
</style>
<defs>
  <linearGradient id='bg-grad' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='#FBF5EE'/>
    <stop offset='100%' stop-color='#F1E7DA'/>
  </linearGradient>
  <filter id='shadow' x='-10%' y='-10%' width='120%' height='120%'>
    <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='#B39C82' flood-opacity='0.16'/>
  </filter>
  <pattern id='grid' width='40' height='40' patternUnits='userSpaceOnUse'>
    <path d='M 40 0 L 0 0 0 40' fill='none' stroke='#E8DCCD' stroke-width='1'/>
  </pattern>
  <marker id='arrow' markerWidth='11' markerHeight='11' refX='8.5' refY='5.5' orient='auto'>
    <path d='M0,0 L11,5.5 L0,11 z' fill='#21313A'/>
  </marker>
  <marker id='arrow-soft' markerWidth='10' markerHeight='10' refX='8' refY='5' orient='auto'>
    <path d='M0,0 L10,5 L0,10 z' fill='#63707A'/>
  </marker>
</defs>
<rect x='0' y='0' width='1200' height='720' fill='url(#bg-grad)'/><rect x='0' y='0' width='1200' height='720' fill='url(#grid)' opacity='0.45'/><ellipse cx='150' cy='90' rx='200' ry='110' fill='#FFF7E8' opacity='0.8'/><ellipse cx='1050' cy='620' rx='240' ry='140' fill='#F7EEE3' opacity='0.7'/><ellipse cx='980' cy='120' rx='190' ry='90' fill='#E8F4F0' opacity='0.45'/><rect x='60' y='42' width='160' height='34' rx='17' ry='17' fill='#F2E6D7'/><text x='140.0' y='63.0' class='eyebrow' text-anchor='middle' fill='#21313A'>核心 02 · 执行内核</text><text x='60' y='122' class='title' text-anchor='start'><tspan x='60' dy='0'>工具的价值不在“能做事”，而在“可治理地做事”</tspan></text><text x='60' y='166' class='subtitle' text-anchor='start'><tspan x='60' dy='0'>对模型来说一切皆工具，但对系统来说，工具必须有统一描述、统一预算、统一权限和统一结果裁剪。</tspan></text><rect x='970' y='48' width='170' height='30' rx='15' ry='15' fill='#23313B'/><text x='1055.0' y='67.0' class='tag' text-anchor='middle' fill='#FFFDF9'>WUNDER CORE MAP</text><g filter='url(#shadow)'><rect x='80' y='248' width='250' height='262' rx='28' ry='28' fill='#FFF5E7' stroke='#E4C391' stroke-width='2.2'/><rect x='80' y='248' width='250' height='16' rx='28' ry='28' fill='#D68A2B' opacity='0.92'/><rect x='98' y='272' width='214' height='220' rx='22' ry='22' fill='#FDF1DD' opacity='0.58'/></g><rect x='230' y='272' width='78' height='28' rx='14' ry='14' fill='#D68A2B'/><text x='269.0' y='290.0' class='tag' text-anchor='middle' fill='#FFFDF9'>定义</text><text x='104' y='306' class='card-title' text-anchor='start'><tspan x='104' dy='0'>工具规格</tspan></text><circle cx='114' cy='344' r='4.5' fill='#D68A2B'/><text x='128' y='350' class='card-body' text-anchor='start'><tspan x='128' dy='0'>描述足够清晰，模型才会</tspan><tspan x='128' dy='24'>稳定调用。</tspan></text><circle cx='114' cy='402' r='4.5' fill='#D68A2B'/><text x='128' y='408' class='card-body' text-anchor='start'><tspan x='128' dy='0'>参数必须结构化，失败信</tspan><tspan x='128' dy='24'>号必须明确。</tspan></text><g filter='url(#shadow)'><rect x='390' y='206' width='360' height='304' rx='28' ry='28' fill='#EDF8F4' stroke='#9BCDBD' stroke-width='2.2'/><rect x='390' y='206' width='360' height='16' rx='28' ry='28' fill='#2F8B73' opacity='0.92'/><rect x='408' y='230' width='324' height='262' rx='22' ry='22' fill='#E7F6F1' opacity='0.58'/></g><rect x='650' y='230' width='78' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='689.0' y='248.0' class='tag' text-anchor='middle' fill='#FFFDF9'>内核</text><text x='414' y='264' class='card-title' text-anchor='start'><tspan x='414' dy='0'>执行治理层</tspan></text><circle cx='424' cy='302' r='4.5' fill='#2F8B73'/><text x='438' y='308' class='card-body' text-anchor='start'><tspan x='438' dy='0'>预算控制：限制时间、token、资源开销</tspan><tspan x='438' dy='24'>。</tspan></text><circle cx='424' cy='360' r='4.5' fill='#2F8B73'/><text x='438' y='366' class='card-body' text-anchor='start'><tspan x='438' dy='0'>权限与审批：避免危险动作直接穿透。</tspan></text><circle cx='424' cy='394' r='4.5' fill='#2F8B73'/><text x='438' y='400' class='card-body' text-anchor='start'><tspan x='438' dy='0'>结果裁剪：把必要事实返回给模型，而不</tspan><tspan x='438' dy='24'>是把噪声原样塞回上下文。</tspan></text><g filter='url(#shadow)'><rect x='820' y='212' width='300' height='134' rx='28' ry='28' fill='#FDF0EA' stroke='#E7B4A0' stroke-width='2.2'/><rect x='820' y='212' width='300' height='16' rx='28' ry='28' fill='#C96D4C' opacity='0.92'/><rect x='838' y='236' width='264' height='92' rx='22' ry='22' fill='#FBEAE2' opacity='0.58'/></g><rect x='1020' y='236' width='78' height='28' rx='14' ry='14' fill='#C96D4C'/><text x='1059.0' y='254.0' class='tag' text-anchor='middle' fill='#FFFDF9'>模型侧</text><text x='844' y='264' class='card-title' text-anchor='start'><tspan x='844' dy='0'>入模结果</tspan></text><circle cx='854' cy='292' r='4.5' fill='#C96D4C'/><text x='868' y='298' class='card-body' text-anchor='start'><tspan x='868' dy='0'>只保留能支持下一轮判断的事实</tspan><tspan x='868' dy='22'>。</tspan></text><g filter='url(#shadow)'><rect x='820' y='376' width='300' height='134' rx='28' ry='28' fill='#EEF1F4' stroke='#B8C4CE' stroke-width='2.2'/><rect x='820' y='376' width='300' height='16' rx='28' ry='28' fill='#4C6477' opacity='0.92'/><rect x='838' y='400' width='264' height='92' rx='22' ry='22' fill='#F2F5F7' opacity='0.58'/></g><rect x='1020' y='400' width='78' height='28' rx='14' ry='14' fill='#4C6477'/><text x='1059.0' y='418.0' class='tag' text-anchor='middle' fill='#FFFDF9'>界面侧</text><text x='844' y='428' class='card-title' text-anchor='start'><tspan x='844' dy='0'>展示投影</tspan></text><circle cx='854' cy='456' r='4.5' fill='#4C6477'/><text x='868' y='462' class='card-body' text-anchor='start'><tspan x='868' dy='0'>审批、工作流卡片、增量输出都</tspan><tspan x='868' dy='22'>来自同一执行事实。</tspan></text><path class='flow' d='M330,378 L390,378'/><path class='flow' d='M750,300 L820,278'/><path class='flow' d='M750,416 L820,444'/><rect x='390' y='540' width='730' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2'/><rect x='412' y='553' width='116' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='470.0' y='571.0' class='tag' text-anchor='middle' fill='#FFFDF9'>统一协议</text><text x='552' y='576' class='small' text-anchor='start'><tspan x='552' dy='0'>模型调用、执行层治理、前端投影必须基于同一份工具事实，而不是各写各的解释。</tspan></text><rect x='60' y='634' width='1080' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='78' y='646' width='96' height='30' rx='15' ry='15' fill='#21313B'/><text x='126.0' y='665.0' class='tag' text-anchor='middle' fill='#FFFDF9'>核心结论</text><text x='194' y='670' class='ribbon' text-anchor='start'><tspan x='194' dy='0'>工具不是插件堆砌，而是把能力压成一种系统能调度、能约束、能解释的公共对象。</tspan></text></svg>
