<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='720' viewBox='0 0 1200 720'>
<style>
  .title { font: 700 38px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .subtitle { font: 400 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .eyebrow { font: 700 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; letter-spacing: 1px; }
  .badge { font: 700 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-title { font: 700 24px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .card-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .small { font: 400 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #63707A; }
  .center-title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .center-body { font: 400 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .ribbon { font: 700 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #21313A; }
  .tag { font: 700 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #FFFDF9; letter-spacing: 0.5px; }
  .flow { stroke: #21313A; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
  .flow-soft { stroke: #63707A; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-soft); }
  .dash { stroke-dasharray: 8 8; }
</style>
<defs>
  <linearGradient id='bg-grad' x1='0' y1='0' x2='0' y2='1'>
    <stop offset='0%' stop-color='#FBF5EE'/>
    <stop offset='100%' stop-color='#F1E7DA'/>
  </linearGradient>
  <filter id='shadow' x='-10%' y='-10%' width='120%' height='120%'>
    <feDropShadow dx='0' dy='10' stdDeviation='12' flood-color='#B39C82' flood-opacity='0.16'/>
  </filter>
  <pattern id='grid' width='40' height='40' patternUnits='userSpaceOnUse'>
    <path d='M 40 0 L 0 0 0 40' fill='none' stroke='#E8DCCD' stroke-width='1'/>
  </pattern>
  <marker id='arrow' markerWidth='11' markerHeight='11' refX='8.5' refY='5.5' orient='auto'>
    <path d='M0,0 L11,5.5 L0,11 z' fill='#21313A'/>
  </marker>
  <marker id='arrow-soft' markerWidth='10' markerHeight='10' refX='8' refY='5' orient='auto'>
    <path d='M0,0 L10,5 L0,10 z' fill='#63707A'/>
  </marker>
</defs>
<rect x='0' y='0' width='1200' height='720' fill='url(#bg-grad)'/><rect x='0' y='0' width='1200' height='720' fill='url(#grid)' opacity='0.45'/><ellipse cx='150' cy='90' rx='200' ry='110' fill='#FFF7E8' opacity='0.8'/><ellipse cx='1050' cy='620' rx='240' ry='140' fill='#F7EEE3' opacity='0.7'/><ellipse cx='980' cy='120' rx='190' ry='90' fill='#E8F4F0' opacity='0.45'/><rect x='60' y='42' width='160' height='34' rx='17' ry='17' fill='#F2E6D7'/><text x='140.0' y='63.0' class='eyebrow' text-anchor='middle' fill='#21313A'>核心 01 · 执行内核</text><text x='60' y='122' class='title' text-anchor='start'><tspan x='60' dy='0'>智能体循环不是 UI 流程，而是系统主链路</tspan></text><text x='60' y='166' class='subtitle' text-anchor='start'><tspan x='60' dy='0'>真正要保护的是线程事实。用户输入、模型判断、工具执行、状态收敛、事件投影都必须围绕主线程形成闭环。</tspan></text><rect x='970' y='48' width='170' height='30' rx='15' ry='15' fill='#23313B'/><text x='1055.0' y='67.0' class='tag' text-anchor='middle' fill='#FFFDF9'>WUNDER CORE MAP</text><circle cx='600' cy='370' r='124' fill='#FDF1DD' opacity='0.72'/><circle cx='600' cy='370' r='110' fill='#FFFDF9' stroke='#E4C391' stroke-width='3'/><circle cx='600' cy='370' r='86' fill='#FFF0D9' stroke='#D68A2B' stroke-width='2.5'/><text x='600' y='362' class='center-title' text-anchor='middle'><tspan x='600' dy='0'>主线程</tspan></text><text x='600' y='410' class='center-body' text-anchor='middle'><tspan x='600' dy='0'>唯一真相</tspan><tspan x='600' dy='24'>所有动作回流</tspan></text><g filter='url(#shadow)'><rect x='90' y='282' width='220' height='178' rx='28' ry='28' fill='#FFF5E7' stroke='#E4C391' stroke-width='2.2'/><rect x='90' y='282' width='220' height='16' rx='28' ry='28' fill='#D68A2B' opacity='0.92'/><rect x='108' y='306' width='184' height='136' rx='22' ry='22' fill='#FDF1DD' opacity='0.58'/></g><rect x='210' y='306' width='78' height='28' rx='14' ry='14' fill='#D68A2B'/><text x='249.0' y='324.0' class='tag' text-anchor='middle' fill='#FFFDF9'>入口</text><text x='114' y='340' class='card-title' text-anchor='start'><tspan x='114' dy='0'>输入进入线程</tspan></text><text x='114' y='384' class='card-body' text-anchor='start'><tspan x='114' dy='0'>用户轮次先入主线程，初</tspan><tspan x='114' dy='24'>始化时 prompt 冻结。</tspan></text><g filter='url(#shadow)'><rect x='470' y='144' width='260' height='178' rx='28' ry='28' fill='#EDF8F4' stroke='#9BCDBD' stroke-width='2.2'/><rect x='470' y='144' width='260' height='16' rx='28' ry='28' fill='#2F8B73' opacity='0.92'/><rect x='488' y='168' width='224' height='136' rx='22' ry='22' fill='#E7F6F1' opacity='0.58'/></g><rect x='630' y='168' width='78' height='28' rx='14' ry='14' fill='#2F8B73'/><text x='669.0' y='186.0' class='tag' text-anchor='middle' fill='#FFFDF9'>决策</text><text x='494' y='202' class='card-title' text-anchor='start'><tspan x='494' dy='0'>模型判断</tspan></text><text x='494' y='246' class='card-body' text-anchor='start'><tspan x='494' dy='0'>读取上下文后，决定直接回答</tspan><tspan x='494' dy='24'>还是继续调工具。</tspan></text><g filter='url(#shadow)'><rect x='440' y='448' width='280' height='184' rx='28' ry='28' fill='#FDF0EA' stroke='#E7B4A0' stroke-width='2.2'/><rect x='440' y='448' width='280' height='16' rx='28' ry='28' fill='#C96D4C' opacity='0.92'/><rect x='458' y='472' width='244' height='142' rx='22' ry='22' fill='#FBEAE2' opacity='0.58'/></g><rect x='620' y='472' width='78' height='28' rx='14' ry='14' fill='#C96D4C'/><text x='659.0' y='490.0' class='tag' text-anchor='middle' fill='#FFFDF9'>执行</text><text x='464' y='506' class='card-title' text-anchor='start'><tspan x='464' dy='0'>工具动作</tspan></text><text x='464' y='550' class='card-body' text-anchor='start'><tspan x='464' dy='0'>命令、文件、外部能力都只是 obs</tspan><tspan x='464' dy='24'>ervation 来源，结果必须再回线</tspan><tspan x='464' dy='24'>程。</tspan></text><g filter='url(#shadow)'><rect x='860' y='282' width='240' height='182' rx='28' ry='28' fill='#EEF1F4' stroke='#B8C4CE' stroke-width='2.2'/><rect x='860' y='282' width='240' height='16' rx='28' ry='28' fill='#4C6477' opacity='0.92'/><rect x='878' y='306' width='204' height='140' rx='22' ry='22' fill='#F2F5F7' opacity='0.58'/></g><rect x='1000' y='306' width='78' height='28' rx='14' ry='14' fill='#4C6477'/><text x='1039.0' y='324.0' class='tag' text-anchor='middle' fill='#FFFDF9'>收束</text><text x='884' y='340' class='card-title' text-anchor='start'><tspan x='884' dy='0'>状态收敛与投影</tspan></text><text x='884' y='384' class='card-body' text-anchor='start'><tspan x='884' dy='0'>重试、等待、恢复与终态统</tspan><tspan x='884' dy='24'>一记录，前端看到的只是投</tspan><tspan x='884' dy='24'>影。</tspan></text><path class='flow' d='M312,374 C380,314 448,276 494,286'/><path class='flow' d='M650,266 C670,240 724,232 756,252'/><path class='flow' d='M880,374 C830,446 764,504 704,520'/><path class='flow' d='M490,520 C404,508 336,466 300,414'/><path class='flow-soft' d='M730,230 L848,316'/><rect x='60' y='634' width='1080' height='56' rx='22' ry='22' fill='#FFFDF9' stroke='#D7C5AF' stroke-width='2' filter='url(#shadow)'/><rect x='78' y='646' width='96' height='30' rx='15' ry='15' fill='#21313B'/><text x='126.0' y='665.0' class='tag' text-anchor='middle' fill='#FFFDF9'>核心结论</text><text x='194' y='670' class='ribbon' text-anchor='start'><tspan x='194' dy='0'>线程不是展示概念，而是执行一致性的硬边界。只要有一步绕开线程，系统就会出现两套事实。</tspan></text></svg>
