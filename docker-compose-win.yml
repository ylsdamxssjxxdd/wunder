x-rust-build: &rust-build
  context: .
  dockerfile: Dockerfile
  args:
    RUST_BASE_IMAGE: public.ecr.aws/docker/library/rust:1.92-slim-bookworm
    INSTALL_PLAYWRIGHT_BROWSERS: ${INSTALL_PLAYWRIGHT_BROWSERS:-1}

services:
  wunder-server:
    container_name: wunder-server
    build: *rust-build
    shm_size: "2gb"
    privileged: true
    security_opt:
      - seccomp:unconfined
    image: wunder-x86
    pull_policy: never
    working_dir: /app
    ports:
      - "0.0.0.0:${WUNDER_PORT:-18000}:${WUNDER_PORT:-18000}"
    volumes:
      - ./:/app
      - wunder_win_data:/app/config/data
      - wunder_win_workspaces:/workspaces
      - wunder_win_browser:/app/config/data/browser
      - wunder_win_user_tools:/app/config/data/user_tools
      - wunder_win_vector_knowledge:/app/config/data/vector_knowledge
      - wunder_win_temp_dir:/app/config/data/temp_dir
      - wunder_win_playwright:/ms-playwright
      - wunder_win_cargo_home:/app/.cargo/x86
      - wunder_win_cargo_target:/app/target/x86
      - ./config/fonts:/usr/share/fonts/wunder:ro
    environment:
      - TZ=Asia/Shanghai
      - WUNDER_SANDBOX_ENDPOINT=${WUNDER_SANDBOX_ENDPOINT:-http://wunder-sandbox:9001}
      - WUNDER_POSTGRES_DSN=${WUNDER_POSTGRES_DSN:-postgresql://wunder:wunder@wunder-postgres:5432/wunder}
      - WUNDER_STORAGE_BACKEND=${WUNDER_STORAGE_BACKEND:-postgres}
      - WUNDER_WEAVIATE_URL=${WUNDER_WEAVIATE_URL:-http://wunder-weaviate:8080}
      - WUNDER_WEAVIATE_API_KEY=${WUNDER_WEAVIATE_API_KEY:-}
      - WUNDER_WORKSPACE_ROOT=${WUNDER_WORKSPACE_ROOT:-/workspaces}
      - WUNDER_CONFIG_PATH=${WUNDER_CONFIG_PATH:-/app/config/wunder.yaml}
      - WUNDER_USER_TOOLS_ROOT=${WUNDER_USER_TOOLS_ROOT:-/app/config/data/user_tools}
      - WUNDER_VECTOR_KNOWLEDGE_ROOT=${WUNDER_VECTOR_KNOWLEDGE_ROOT:-/app/config/data/vector_knowledge}
      - WUNDER_TEMP_DIR_ROOT=${WUNDER_TEMP_DIR_ROOT:-/app/config/data/temp_dir}
      - WUNDER_BROWSER_ENABLED=${WUNDER_BROWSER_ENABLED:-true}
      - WUNDER_BROWSER_TOOL_ENABLED=${WUNDER_BROWSER_TOOL_ENABLED:-true}
      - WUNDER_BROWSER_DOCKER_ENABLED=${WUNDER_BROWSER_DOCKER_ENABLED:-true}
      - WUNDER_HOST=${WUNDER_HOST:-0.0.0.0}
      - WUNDER_PORT=${WUNDER_PORT:-18000}
      - WUNDER_MCP_HOST=${WUNDER_MCP_HOST:-extra-mcp}
      - WUNDER_MCP_PORT=${WUNDER_MCP_PORT:-9010}
      - WUNDER_API_KEY=${WUNDER_API_KEY:-ylsdamxssjxxdd}
      - WUNDER_LOG_LEVEL=${WUNDER_LOG_LEVEL:-info}
      - WUNDER_LOG_COLOR=${WUNDER_LOG_COLOR:-always}
      - WUNDER_ATOMIC_WRITE_MODE=${WUNDER_ATOMIC_WRITE_MODE:-relaxed}
      - FONTCONFIG_FILE=/app/config/fonts.conf
      - XDG_CACHE_HOME=/workspaces/.cache
      - MATPLOTLIBRC=/app/config/matplotlibrc
      - MPLCONFIGDIR=/workspaces/.matplotlib
      - NODE_PATH=${NODE_PATH:-/usr/lib/node_modules:/usr/local/lib/node_modules}
      - PLAYWRIGHT_BROWSERS_PATH=${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}
      - RUST_LOG=${WUNDER_LOG_LEVEL:-info}
      - CARGO_HOME=/app/.cargo/x86
      - CARGO_TARGET_DIR=/app/target/x86
    command: ["bash", "/app/scripts/docker-rust-entry.sh", "wait-or-run"]
    depends_on:
      wunder-sandbox:
        condition: service_started
      extra-mcp:
        condition: service_started
      wunder-postgres:
        condition: service_healthy
      wunder-weaviate:
        condition: service_started
    restart: always

  wunder-sandbox:
    container_name: wunder-sandbox
    build: *rust-build
    shm_size: "2gb"
    privileged: true
    security_opt:
      - seccomp:unconfined
    image: wunder-x86
    pull_policy: never
    working_dir: /app
    environment:
      - TZ=Asia/Shanghai
      - FONTCONFIG_FILE=/app/config/fonts.conf
      - XDG_CACHE_HOME=/workspaces/.cache
      - MATPLOTLIBRC=/app/config/matplotlibrc
      - MPLCONFIGDIR=/workspaces/.matplotlib
      - NODE_PATH=${NODE_PATH:-/usr/lib/node_modules:/usr/local/lib/node_modules}
      - WUNDER_LOG_LEVEL=${WUNDER_LOG_LEVEL:-info}
      - RUST_LOG=${WUNDER_LOG_LEVEL:-info}
      - WUNDER_ATOMIC_WRITE_MODE=${WUNDER_ATOMIC_WRITE_MODE:-relaxed}
      - WUNDER_SERVER_MODE=sandbox
      - WUNDER_WORKSPACE_ROOT=${WUNDER_WORKSPACE_ROOT:-/workspaces}
      - WUNDER_WEAVIATE_URL=${WUNDER_WEAVIATE_URL:-http://wunder-weaviate:8080}
      - WUNDER_WEAVIATE_API_KEY=${WUNDER_WEAVIATE_API_KEY:-}
      - WUNDER_CONFIG_PATH=${WUNDER_CONFIG_PATH:-/app/config/wunder.yaml}
      - WUNDER_USER_TOOLS_ROOT=${WUNDER_USER_TOOLS_ROOT:-/app/config/data/user_tools}
      - WUNDER_VECTOR_KNOWLEDGE_ROOT=${WUNDER_VECTOR_KNOWLEDGE_ROOT:-/app/config/data/vector_knowledge}
      - WUNDER_TEMP_DIR_ROOT=${WUNDER_TEMP_DIR_ROOT:-/app/config/data/temp_dir}
      - WUNDER_HOST=0.0.0.0
      - WUNDER_PORT=9001
      - CARGO_HOME=/app/.cargo/x86
      - CARGO_TARGET_DIR=/app/target/x86
    volumes:
      - ./:/app
      - wunder_win_data:/app/config/data
      - wunder_win_workspaces:/workspaces
      - wunder_win_browser:/app/config/data/browser
      - wunder_win_user_tools:/app/config/data/user_tools
      - wunder_win_vector_knowledge:/app/config/data/vector_knowledge
      - wunder_win_temp_dir:/app/config/data/temp_dir
      - wunder_win_playwright:/ms-playwright
      - wunder_win_cargo_home:/app/.cargo/x86
      - wunder_win_cargo_target:/app/target/x86
      - ./config/fonts:/usr/share/fonts/wunder:ro
    command: ["bash", "/app/scripts/docker-rust-entry.sh", "run-or-build"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9001/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: always

  extra-mcp:
    container_name: extra-mcp
    build: *rust-build
    image: wunder-x86
    pull_policy: never
    privileged: true
    security_opt:
      - seccomp:unconfined
    working_dir: /app
    volumes:
      - ./:/app
      - wunder_win_data:/app/config/data
      - wunder_win_workspaces:/workspaces
    ports:
      - "127.0.0.1:${MCP_PORT:-9010}:${MCP_PORT:-9010}"
    environment:
      - TZ=Asia/Shanghai
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=${MCP_PORT:-9010}
      - WUNDER_WORKSPACE_ROOT=${WUNDER_WORKSPACE_ROOT:-/workspaces}
    command: ["bash", "-lc", "python3 -m extra_mcp.main"]
    restart: always

  wunder-postgres:
    container_name: wunder-postgres
    image: postgres:16
    privileged: true
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=Asia/Shanghai
      - POSTGRES_DB=wunder
      - POSTGRES_USER=wunder
      - POSTGRES_PASSWORD=wunder
      - PGDATA=/var/lib/postgresql/data/postgres
    ports:
      - "127.0.0.1:${WUNDER_POSTGRES_PORT:-5432}:5432"
    volumes:
      - wunder_win_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wunder -d wunder"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  wunder-weaviate:
    container_name: wunder-weaviate
    image: semitechnologies/weaviate:1.27.0
    privileged: true
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=Asia/Shanghai
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - DEFAULT_VECTORIZER_MODULE=none
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate/weaviate
      - ENABLE_MODULES=
      - CLUSTER_HOSTNAME=node1
    ports:
      - "127.0.0.1:${WEAVIATE_PORT:-18003}:8080"
    volumes:
      - wunder_win_weaviate:/var/lib/weaviate
    restart: always

  wunder-frontend:
    image: node:22.14
    privileged: true
    security_opt:
      - seccomp:unconfined
    container_name: wunder-frontend
    working_dir: /workspace
    restart: always
    volumes:
      - ./:/workspace
      - wunder_win_data:/workspace/config/data
      - wunder_win_frontend_node_modules:/workspace/node_modules
      - wunder_win_frontend_dist:/workspace/frontend/dist
      - wunder_win_frontend_dist_tmp:/workspace/frontend/dist.__docker_tmp
    ports:
      - "${FRONTEND_PORT:-18001}:${FRONTEND_PORT:-18001}"
    environment:
      - TZ=Asia/Shanghai
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-1}
      - VITE_API_BASE=${VITE_API_BASE:-/wunder}
      - VITE_DEV_PROXY_TARGET=${VITE_DEV_PROXY_TARGET:-http://wunder-server:18000}
      - FRONTEND_UMASK=${FRONTEND_UMASK:-022}
      - FRONTEND_PORT=${FRONTEND_PORT:-18001}
      - FRONTEND_HOST=${FRONTEND_HOST:-0.0.0.0}
      - FRONTEND_STRICT_PORT=${FRONTEND_STRICT_PORT:-1}
      - FRONTEND_WAIT_BACKEND_TIMEOUT_S=${FRONTEND_WAIT_BACKEND_TIMEOUT_S:-900}
      - FRONTEND_WAIT_BACKEND_INTERVAL_MS=${FRONTEND_WAIT_BACKEND_INTERVAL_MS:-1000}
      - FRONTEND_SKIP_DIST_BUILD=${FRONTEND_SKIP_DIST_BUILD:-0}
    # Force a safe umask so build artifacts remain readable by nginx.
    entrypoint: ["sh", "-lc", "umask ${FRONTEND_UMASK:-022}; exec \"$@\"", "--"]
    command: ["node", "./frontend/scripts/docker-dev-bootstrap.mjs"]
    healthcheck:
      test: ["CMD-SHELL", "[ -f /workspace/frontend/dist/index.html ]"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    # command: ["sh", "-c", "npm install --workspace wunder-frontend --include-workspace-root=false && npm run build --workspace wunder-frontend"]

  wunder-nginx:
    image: nginx:latest
    privileged: true
    security_opt:
      - seccomp:unconfined
    container_name: wunder-nginx
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      wunder-server:
        condition: service_started
      wunder-frontend:
        condition: service_started
    command: ["/bin/sh", "-lc", "until [ -f /usr/share/nginx/html/index.html ]; do echo '[wunder-nginx] waiting for frontend dist/index.html'; sleep 1; done; exec nginx -g 'daemon off;'"]
    restart: always
    volumes:
      - wunder_win_frontend_dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro${NGINX_BIND_OPTS:-}
      - ./frontend/public/config.json:/etc/wunder/config.json:ro${NGINX_BIND_OPTS:-}
    ports:
      - "${NGINX_PORT:-18002}:80"

volumes:
  wunder_win_data:
  wunder_win_workspaces:
  wunder_win_browser:
  wunder_win_user_tools:
  wunder_win_vector_knowledge:
  wunder_win_temp_dir:
  wunder_win_playwright:
  wunder_win_cargo_home:
  wunder_win_cargo_target:
  wunder_win_postgres:
  wunder_win_weaviate:
  wunder_win_frontend_node_modules:
  wunder_win_frontend_dist:
  wunder_win_frontend_dist_tmp:
