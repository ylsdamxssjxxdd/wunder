[[test]]
name = "backend_contracts"
required-features = ["sqlite-storage"]

[[test]]
name = "channel_runtime_logs_routes"
required-features = ["sqlite-storage"]

[[test]]
name = "context_overflow_recovery_regression"
required-features = ["sqlite-storage"]

[[test]]
name = "cron_finish_job"
required-features = ["sqlite-storage"]

[[test]]
name = "cron_lease"
required-features = ["sqlite-storage"]

[[test]]
name = "cron_session_delete"
required-features = ["sqlite-storage"]

[[test]]
name = "cron_tool"
required-features = ["sqlite-storage"]

[[test]]
name = "gateway_regression"
required-features = ["sqlite-storage"]

[[test]]
name = "inner_visible_agent_routes"
required-features = ["sqlite-storage"]

[[test]]
name = "memory_routes"
