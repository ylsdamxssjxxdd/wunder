[package]
name = "wunder-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lib]
name = "wunder_server"
path = "src/lib.rs"

[features]
default = []
desktop-control = ["dep:windows-sys"]
doc2md = ["dep:cfb", "dep:pdf-extract", "dep:rlsx"]
host-metrics = ["dep:sysinfo"]
mcp = ["dep:rmcp", "dep:sse-stream"]
postgres-storage = ["dep:deadpool-postgres", "dep:tokio-postgres"]
sim-bins = ["sqlite-storage"]
sqlite-storage = ["dep:rusqlite"]
web-fetch = ["dep:hickory-resolver", "dep:idna", "dep:kuchiki"]
xmpp = ["dep:hickory-resolver", "dep:idna", "dep:sasl", "dep:scraper", "dep:tokio-xmpp"]

# Simulation binaries are used for local benchmarking only.
# Keep them behind an explicit feature so regular workspace checks do not
# build local benchmark targets.
[[bin]]
name = "backend_sim"
path = "src/bin/backend_sim.rs"
required-features = ["sim-bins"]
test = false
bench = false

[[bin]]
name = "swarm_sim"
path = "src/bin/swarm_sim.rs"
required-features = ["sim-bins"]
test = false
bench = false

[[bin]]
name = "swarm_flow_sim"
path = "src/bin/swarm_flow_sim.rs"
required-features = ["sim-bins"]
test = false
bench = false

[[test]]
name = "admin_channel_accounts_routes"
required-features = ["sqlite-storage"]

[[test]]
name = "admin_org_units_import_routes"
required-features = ["sqlite-storage"]

[[test]]
name = "admin_user_account_token_adjustment_routes"
required-features = ["sqlite-storage"]

[[test]]
name = "admin_user_accounts_import_routes"
required-features = ["sqlite-storage"]

[[test]]
name = "agent_model_routes"
required-features = ["sqlite-storage"]

[[test]]
name = "auth_profile_routes"
