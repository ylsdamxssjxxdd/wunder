<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" href="/beeroom.png?v=20260409-1" type="image/png" />
    <link rel="shortcut icon" href="/beeroom.png?v=20260409-1" type="image/png" />
    <title>蜂巢</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        background: #f1f1f1;
        color: #344255;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      #wunder-desktop-startup-shell {
        display: none;
      }

      html[data-wunder-desktop-starting] #wunder-desktop-startup-shell {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: grid;
        place-items: center;
        background: #f1f1f1;
        pointer-events: none;
        opacity: 1;
        transition: opacity 140ms ease-out;
      }

      #wunder-desktop-startup-shell.is-ready {
        opacity: 0;
      }

      .wunder-startup-shell__content {
        width: min(340px, calc(100% - 48px));
        padding: 28px 30px;
        border: 1px solid #e3e3e3;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      .wunder-startup-shell__title {
        margin: 0 0 12px;
        font-size: 18px;
        font-weight: 600;
        color: #344255;
      }

      .wunder-startup-shell__spinner {
        width: 30px;
        height: 30px;
        margin: 0 auto 12px;
        border: 3px solid #e2e8f0;
        border-top-color: #ff9448;
        border-radius: 50%;
        animation: wunder-startup-spin 0.8s linear infinite;
      }

      .wunder-startup-shell__hint {
        margin: 0;
        color: #7a8594;
        font-size: 13px;
      }

      @keyframes wunder-startup-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      if (window.wunderDesktop) {
        document.documentElement.setAttribute('data-wunder-desktop-starting', '');
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <div id="wunder-desktop-startup-shell" role="status" aria-live="polite">
      <div class="wunder-startup-shell__content">
        <div class="wunder-startup-shell__title">Wunder Desktop</div>
        <div class="wunder-startup-shell__spinner" aria-hidden="true"></div>
        <p class="wunder-startup-shell__hint">Starting local workspace...</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
